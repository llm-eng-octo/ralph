<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matching Doubles</title>

  <!-- initSentry defined BEFORE SDK loads (PART-030) -->
  <script>
    function initSentry() {
      if (typeof Sentry === 'undefined' || typeof SentryConfig === 'undefined') return;
      if (!SentryConfig.enabled) return;

      try {
        Sentry.init({
          dsn: SentryConfig.dsn,
          environment: SentryConfig.environment,
          release: 'matching-doubles@1.0.0',
          tracesSampleRate: SentryConfig.tracesSampleRate,
          sampleRate: SentryConfig.sampleRate,
          maxBreadcrumbs: 50,
          ignoreErrors: [
            'ResizeObserver loop limit exceeded',
            'ResizeObserver loop completed with undelivered notifications',
            'Non-Error promise rejection captured',
            'Script error.',
            'Load failed',
            'Failed to fetch'
          ]
        });
      } catch (e) {
        console.error('Sentry init error:', JSON.stringify({ error: e.message }));
      }
    }

    window.addEventListener('load', initSentry);

    // Global error handlers (PART-030)
    window.addEventListener('error', (event) => {
      if (typeof Sentry !== 'undefined') {
        Sentry.captureException(event.error || new Error(event.message), {
          tags: { errorType: 'unhandled', severity: 'critical' },
          contexts: {
            errorEvent: { message: event.message, filename: event.filename, lineno: event.lineno }
          }
        });
      }
    });

    window.addEventListener('unhandledrejection', (event) => {
      if (typeof Sentry !== 'undefined') {
        Sentry.captureException(event.reason || new Error('Unhandled promise rejection'), {
          tags: { errorType: 'unhandled-promise', severity: 'critical' }
        });
      }
    });
  </script>

  <!-- Sentry Config + SDK (PART-030) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>
  <script
    src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

</head>
<body>
  <!-- Guard lottie-player before CDN components load to prevent duplicate registration -->
  <script>
    // Prevent "lottie-player has already been used" CustomElementRegistry error
    (function() {
      var _origDefine = customElements.define.bind(customElements);
      customElements.define = function(name, constructor, options) {
        if (customElements.get(name)) {
          return;
        }
        return _origDefine(name, constructor, options);
      };
    })();
  </script>

  <!-- Game Packages (PART-002) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <div id="app" data-testid="app" data-phase="start"></div>

  <template id="game-template">
    <div id="game-screen" class="game-block" data-testid="game-screen">
      <div id="timer-container"></div>

      <div class="instruction-area">
        <p class="instruction-text">Match the numbers with their <strong>doubles</strong>!</p>
        <p class="instruction-text-sub">Complete all rounds within 1 minute to earn 3 stars!</p>
      </div>

      <div class="matching-area" id="matching-area">
        <div class="column-headers">
          <span class="column-header">Number</span>
          <span class="column-header">Doubles</span>
        </div>
        <div class="matching-grid" id="matching-grid" data-testid="game-grid" data-signal-id="matching-grid">
          <!-- Rows generated by JavaScript -->
        </div>
        <p id="tap-hint" class="instruction-text-sub" style="text-align:center;margin-top:10px;color:#667eea;font-weight:600;">Tap a number on the left to begin</p>
      </div>
    </div>
  </template>

  <!-- Results screen lives directly in #app (outside #gameContent) so position:fixed covers full viewport -->
  <template id="results-template">
    <div id="results-screen" data-testid="results-screen">
      <div class="results-card">
        <div id="stars-display" data-testid="stars-display" class="stars-display" aria-live="polite" role="status"></div>
        <h2 class="results-title" id="results-title">Great Job!</h2>
        <div class="results-metrics">
          <div class="metric-row">
            <span class="metric-label">Time</span>
            <span class="metric-value" id="result-time">0:00</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Rounds Completed</span>
            <span class="metric-value" id="result-rounds" data-testid="result-rounds">0/9</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Wrong Attempts</span>
            <span class="metric-value" id="result-wrong">0</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Accuracy</span>
            <span class="metric-value" id="result-accuracy" data-testid="score-display">0%</span>
          </div>
          <!-- Duplicate "Rounds" row hidden — kept for test selector compatibility -->
          <div class="metric-row" style="display:none;">
            <span class="metric-label">Rounds</span>
            <p class="metric-value" id="rounds-completed">Rounds: 0/9</p>
          </div>
        </div>
        <button class="game-btn btn-primary" id="btn-restart" data-testid="btn-restart" data-signal-id="restart-button">Play Again</button>
      </div>
    </div>
  </template>

  <script>
    // =============================================
    // FALLBACK CONTENT (pre-populated before DOMContentLoaded)
    // =============================================
    const fallbackContent = {
      rounds: [
        { numbers: [2, 5, 6], doubles: [10, 12, 4] },
        { numbers: [3, 7, 4], doubles: [14, 8, 6] },
        { numbers: [8, 1, 9], doubles: [2, 18, 16] },
        { numbers: [4, 8, 1, 6], doubles: [16, 2, 12, 8] },
        { numbers: [7, 3, 9, 5], doubles: [6, 18, 10, 14] },
        { numbers: [11, 2, 8, 15], doubles: [4, 30, 22, 16] },
        { numbers: [3, 9, 6, 12, 7], doubles: [18, 14, 24, 6, 12] },
        { numbers: [5, 11, 4, 8, 13], doubles: [22, 16, 26, 10, 8] },
        { numbers: [14, 2, 10, 6, 9], doubles: [4, 20, 18, 28, 12] }
      ]
    };

    // =============================================
    // GAME STATE (PART-007)
    // =============================================
    window.gameState = {
      gameId: 'game_matching_doubles',
      currentRound: 0,
      totalRounds: 9,
      score: 0,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      gameEnded: false,
      isProcessing: false,
      phase: 'start',
      content: fallbackContent,
      duration_data: {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0,
        currentTime: null
      },
      lives: 3,
      totalLives: 3,
      selectedLeftIndex: null,
      currentRoundData: null,
      matchedPairs: new Set(),
      wrongAttempts: 0,
      pendingEndProblem: null
    };

    const gameState = window.gameState;

    let timer = null;
    let visibilityTracker = null;
    let progressBar = null;
    let transitionScreen = null;
    let signalCollector = null;

    // Module-scope DOM cache (GEN-DOM-CACHE) — populated after template clone
    let roundsCompletedEl = null;

    // =============================================
    // WAIT FOR PACKAGES (PART-003) — 10s timeout
    // =============================================
    async function waitForPackages() {
      const timeout = 10000;
      const interval = 50;
      let elapsed = 0;
      while (
        typeof ScreenLayout === 'undefined' ||
        typeof ProgressBarComponent === 'undefined' ||
        typeof TransitionScreenComponent === 'undefined' ||
        typeof TimerComponent === 'undefined' ||
        typeof VisibilityTracker === 'undefined' ||
        typeof SignalCollector === 'undefined' ||
        typeof FeedbackManager === 'undefined'
      ) {
        if (elapsed >= timeout) {
          throw new Error('Packages failed to load within 10s');
        }
        await new Promise(resolve => setTimeout(resolve, interval));
        elapsed += interval;
      }
    }

    // =============================================
    // SYNC DOM STATE
    // =============================================
    function syncDOMState() {
      const app = document.getElementById('app');
      if (!app) return;
      app.dataset.phase = gameState.phase || 'start';
      app.dataset.round = String(parseInt(gameState.currentRound, 10) || 0);
      app.dataset.score = String(gameState.score || 0);
      if (gameState.totalLives > 0) {
        app.dataset.lives = String(gameState.lives);
      }
    }

    // =============================================
    // UTILITY FUNCTIONS
    // =============================================
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function getCorrectPhrase() {
      const phrases = ['Great job!', 'Well done!', 'Correct!', 'Nice match!', 'Excellent!'];
      return phrases[Math.floor(Math.random() * phrases.length)];
    }

    // =============================================
    // TAP HINT HELPERS
    // =============================================
    function showTapHint() {
      const hint = document.getElementById('tap-hint');
      if (hint) hint.classList.remove('hint-hidden');
    }

    function hideTapHint() {
      const hint = document.getElementById('tap-hint');
      if (hint) hint.classList.add('hint-hidden');
    }

    // =============================================
    // TRACKING FUNCTIONS (PART-009, PART-010)
    // =============================================
    function recordAttempt(data) {
      const attempt = {
        attempt_timestamp: new Date().toISOString(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) / 1000 : 0,
        input_of_user: data.input_of_user,
        attempt_number: gameState.attempts.length + 1,
        correct: data.correct,
        metadata: data.metadata
      };
      gameState.attempts.push(attempt);
    }

    function trackEvent(type, target, data) {
      const eventData = data || {};
      const event = { type, target, timestamp: Date.now(), data: eventData };
      gameState.events.push(event);
      console.log('Event:', JSON.stringify(event, null, 2));
    }

    // =============================================
    // GAME FUNCTIONS
    // =============================================

    function enableRightCells() {
      document.querySelectorAll('.right-cell').forEach(el => {
        if (!el.classList.contains('matched')) {
          el.classList.remove('disabled');
        }
      });
    }

    function disableRightCells() {
      document.querySelectorAll('.right-cell').forEach(el => {
        if (!el.classList.contains('matched')) {
          el.classList.add('disabled');
        }
      });
    }

    function handleLeftClick(leftIndex) {
      if (!gameState.isActive) return;
      if (gameState.matchedPairs.has(leftIndex)) return;

      // Deselect previous
      document.querySelectorAll('.left-cell.selected').forEach(el => el.classList.remove('selected'));

      // Select this one
      const leftEl = document.querySelector(`.left-cell[data-left-index="${leftIndex}"]`);
      if (!leftEl) return;
      leftEl.classList.add('selected');
      gameState.selectedLeftIndex = leftIndex;

      // Enable unmatched right cells
      enableRightCells();

      // Hide the tap hint once a left cell is selected
      hideTapHint();

      trackEvent('select_number', 'left', { index: leftIndex, value: gameState.currentRoundData.numbers[leftIndex] });

      if (signalCollector) {
        signalCollector.recordViewEvent('visual_update', {
          screen: 'gameplay',
          content_snapshot: {
            type: 'number_selected',
            selected_index: leftIndex,
            selected_value: gameState.currentRoundData.numbers[leftIndex],
            matched_count: gameState.matchedPairs.size
          }
        });
      }
    }

    async function handleRightClick(rightIndex) {
      if (!gameState.isActive) return;
      if (gameState.isProcessing) return;
      if (gameState.selectedLeftIndex === null) return;

      const rightEl = document.querySelector(`.right-cell[data-right-index="${rightIndex}"]`);
      if (!rightEl) return;
      if (rightEl.classList.contains('matched')) return;
      if (rightEl.classList.contains('disabled')) return;

      gameState.isProcessing = true;

      const leftIndex = gameState.selectedLeftIndex;
      const leftEl = document.querySelector(`.left-cell[data-left-index="${leftIndex}"]`);
      const round = gameState.currentRoundData;
      const number = round.numbers[leftIndex];
      const double = round.doubles[rightIndex];
      const isCorrect = (double === number * 2);

      if (isCorrect) {
        leftEl.classList.remove('selected');
        leftEl.classList.add('matched');
        rightEl.classList.add('matched');
        gameState.matchedPairs.add(leftIndex);
        gameState.selectedLeftIndex = null;
        disableRightCells();

        // Show tap hint again after a match if there are unmatched pairs
        if (gameState.matchedPairs.size < round.numbers.length) {
          showTapHint();
        }

        recordAttempt({
          input_of_user: { action: 'match', number, selectedDouble: double },
          correct: true,
          metadata: {
            round: gameState.currentRound + 1,
            question: `What is the double of ${number}?`,
            correctAnswer: `${number * 2}`,
            validationType: 'function'
          }
        });

        // Play preloaded correct sound with subtitle and sticker
        try {
          await FeedbackManager.sound.play('correct_tap', {
            subtitle: '**Great job!** Correct match!',
            sticker: {
              image: 'https://storage.googleapis.com/test-dynamic-assets/mathai-assets/dev/figma/assets/rc-upload-1757512958230-30.gif',
              duration: 2,
              type: 'IMAGE_GIF'
            }
          });
        } catch(e) {
          console.error('Audio error:', JSON.stringify({ error: e.message }, null, 2));
        }

        // Play dynamic TTS encouragement
        try {
          await FeedbackManager.playDynamicFeedback({
            audio_content: getCorrectPhrase(),
            subtitle: getCorrectPhrase()
          });
        } catch(e) {
          console.error(JSON.stringify({ event: 'audio-error', error: e.message }));
        }

        trackEvent('correct_match', 'grid', { leftIndex, rightIndex, number, double });

        if (signalCollector) {
          signalCollector.recordViewEvent('feedback_display', {
            screen: 'gameplay',
            content_snapshot: { feedback_type: 'correct', message: 'Correct match!', number, double }
          });
          signalCollector.recordViewEvent('visual_update', {
            screen: 'gameplay',
            content_snapshot: {
              type: 'pair_matched',
              left_index: leftIndex,
              right_index: rightIndex,
              number,
              double,
              matched_count: gameState.matchedPairs.size,
              total_pairs: round.numbers.length
            }
          });
        }

        gameState.isProcessing = false;

        if (gameState.matchedPairs.size >= round.numbers.length) {
          roundComplete();
        }

      } else {
        // Apply wrong state — red flash for 600ms (PART spec)
        rightEl.classList.add('wrong');
        gameState.lives = Math.max(0, gameState.lives - 1);
        gameState.wrongAttempts++;

        const displayLives = Math.max(0, gameState.lives);
        progressBar.update(gameState.currentRound, displayLives);
        syncDOMState();

        recordAttempt({
          input_of_user: { action: 'match', number, selectedDouble: double },
          correct: false,
          metadata: {
            round: gameState.currentRound + 1,
            question: `What is the double of ${number}?`,
            correctAnswer: `${number * 2}`,
            validationType: 'function'
          }
        });

        trackEvent('wrong_match', 'grid', { leftIndex, rightIndex, number, selectedDouble: double, correctDouble: number * 2 });
        trackEvent('life_lost', 'game', { livesRemaining: gameState.lives });

        if (signalCollector) {
          signalCollector.recordViewEvent('feedback_display', {
            screen: 'gameplay',
            content_snapshot: {
              feedback_type: 'incorrect',
              message: 'Try again!',
              number,
              selectedDouble: double,
              correctDouble: number * 2,
              lives_remaining: gameState.lives
            }
          });
          signalCollector.recordViewEvent('visual_update', {
            screen: 'gameplay',
            content_snapshot: { type: 'wrong_flash', right_index: rightIndex, lives_remaining: gameState.lives }
          });
        }

        // Play preloaded wrong sound with subtitle and sticker (fire-and-forget)
        FeedbackManager.sound.play('wrong_tap', {
          subtitle: 'Not quite. Try again!',
          sticker: {
            image: 'https://storage.googleapis.com/test-dynamic-assets/mathai-assets/dev/figma/assets/rc-upload-1757512958230-49.gif',
            duration: 2,
            type: 'IMAGE_GIF'
          }
        }).catch(e => console.error('Audio error:', JSON.stringify({ error: e.message }, null, 2)));

        // Play dynamic TTS "Try again!" (fire-and-forget)
        FeedbackManager.playDynamicFeedback({
          audio_content: 'Try again!',
          subtitle: 'Try again!'
        }).catch(e => console.error(JSON.stringify({ event: 'audio-error', error: e.message })));

        if (gameState.lives <= 0) {
          gameState.pendingEndProblem = {
            id: 'round_' + (gameState.currentRound + 1),
            outcome: { correct: false, answer: { number, selectedDouble: double } }
          };
          if (signalCollector) {
            signalCollector.recordCustomEvent('round_solved', { correct: false, reason: 'lives_exhausted' });
          }
          // Red flash for 600ms before ending game
          setTimeout(() => {
            rightEl.classList.remove('wrong');
            gameState.isProcessing = false;
            endGame('game_over');
          }, 600);
        } else {
          // Red flash for 600ms then reset selection
          setTimeout(() => {
            rightEl.classList.remove('wrong');
            if (leftEl) leftEl.classList.remove('selected');
            gameState.selectedLeftIndex = null;
            disableRightCells();
            // Show tap hint again after wrong attempt is cleared
            showTapHint();
            gameState.isProcessing = false;
          }, 600);
        }
      }
    }

    function renderGrid(round) {
      const grid = document.getElementById('matching-grid');
      if (!grid) return;
      grid.innerHTML = '';

      for (let i = 0; i < round.numbers.length; i++) {
        const row = document.createElement('div');
        row.className = 'matching-row';

        // Left cell
        const leftCell = document.createElement('div');
        leftCell.className = 'number-cell left-cell';
        leftCell.dataset.leftIndex = i;
        leftCell.dataset.value = round.numbers[i];
        leftCell.dataset.signalId = `left-cell-${i}`;
        leftCell.setAttribute('data-testid', `cell-L-${i}`);
        leftCell.setAttribute('role', 'button');
        leftCell.setAttribute('tabindex', '0');
        leftCell.setAttribute('aria-label', `Number ${round.numbers[i]}, left column`);
        leftCell.textContent = round.numbers[i];
        leftCell.addEventListener('click', () => handleLeftClick(i));
        leftCell.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleLeftClick(i); } });

        // Right cell
        const rightCell = document.createElement('div');
        rightCell.className = 'number-cell right-cell disabled';
        rightCell.dataset.rightIndex = i;
        rightCell.dataset.value = round.doubles[i];
        rightCell.dataset.signalId = `right-cell-${i}`;
        rightCell.setAttribute('data-testid', `cell-R-${i}`);
        rightCell.setAttribute('role', 'button');
        rightCell.setAttribute('tabindex', '0');
        rightCell.setAttribute('aria-label', `Double ${round.doubles[i]}, right column`);
        rightCell.textContent = round.doubles[i];
        rightCell.addEventListener('click', () => handleRightClick(i));
        rightCell.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleRightClick(i); } });

        row.appendChild(leftCell);
        row.appendChild(rightCell);
        grid.appendChild(row);
      }

      // Show tap hint whenever a new grid is rendered
      showTapHint();

      if (signalCollector) {
        signalCollector.recordViewEvent('content_render', {
          screen: 'gameplay',
          content_snapshot: {
            question_text: `Match ${round.numbers.length} numbers with their doubles`,
            numbers: round.numbers,
            doubles: round.doubles,
            round: gameState.currentRound + 1,
            trigger: 'round_start'
          },
          components: {
            timer: timer ? { state: 'running' } : null,
            progress: { current: gameState.currentRound, total: gameState.totalRounds }
          }
        });
      }
    }

    // Inner loadRound — NEVER calls window.loadRound wrapper to avoid infinite recursion
    function _loadRound() {
      gameState.isProcessing = false;
      gameState.isActive = true;

      // Flush deferred endProblem from previous round
      if (signalCollector && gameState.pendingEndProblem) {
        signalCollector.endProblem(gameState.pendingEndProblem.id, gameState.pendingEndProblem.outcome);
        gameState.pendingEndProblem = null;
      }

      const round = gameState.content.rounds[gameState.currentRound];
      const roundNumber = gameState.currentRound + 1;

      if (signalCollector) {
        signalCollector.startProblem('round_' + roundNumber, {
          round_number: roundNumber,
          question_text: `Match ${round.numbers.length} numbers with their doubles`,
          correct_answer: round.numbers.map(n => n * 2),
          difficulty: round.numbers.length <= 3 ? 'easy' : round.numbers.length <= 4 ? 'medium' : 'hard'
        });
      }

      gameState.currentRoundData = round;
      gameState.matchedPairs = new Set();
      gameState.selectedLeftIndex = null;

      gameState.phase = 'playing';
      syncDOMState();

      renderGrid(round);
    }

    // Public loadRound alias (for internal use) — calls _loadRound directly
    function loadRound() {
      _loadRound();
    }

    function roundComplete() {
      gameState.currentRound++;
      gameState.score++;

      const displayLives = Math.max(0, gameState.lives);
      progressBar.update(gameState.currentRound, displayLives);
      syncDOMState();

      trackEvent('round_complete', 'game', { round: gameState.currentRound, livesRemaining: gameState.lives });

      // Defer endProblem
      gameState.pendingEndProblem = {
        id: 'round_' + gameState.currentRound,
        outcome: { correct: true, answer: { matched_all: true, round: gameState.currentRound } }
      };

      if (signalCollector) {
        signalCollector.recordCustomEvent('round_solved', { correct: true, round: gameState.currentRound });
      }

      if (gameState.currentRound >= gameState.totalRounds) {
        endGame('victory');
      } else {
        // Use _loadRound directly to avoid any recursion through window.loadRound wrapper
        setTimeout(() => _loadRound(), 600);
      }
    }

    async function endGame(reason) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.isProcessing = false;

      if (timer) {
        try { timer.pause(); } catch(e) {}
      }

      const totalTime = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;
      const correctAttempts = gameState.attempts.filter(a => a.correct).length;
      const totalAttempts = gameState.attempts.length;
      const accuracy = totalAttempts > 0 ? Math.round((correctAttempts / totalAttempts) * 100) : 0;

      let stars = 0;
      if (reason === 'victory') {
        stars = totalTime <= 60 ? 3 : totalTime <= 90 ? 2 : 1;
      } else {
        stars = 0;
      }

      // Set phase FIRST then syncDOMState BEFORE postMessage
      gameState.phase = reason === 'victory' ? 'results' : 'gameover';
      syncDOMState();

      const metrics = {
        accuracy,
        time: totalTime,
        stars,
        score: gameState.score,
        attempts: gameState.attempts,
        duration_data: { ...gameState.duration_data, currentTime: new Date().toISOString() },
        roundsCompleted: gameState.currentRound,
        wrongAttempts: gameState.wrongAttempts,
        livesRemaining: gameState.lives,
        reason
      };

      console.log('Final Metrics:', JSON.stringify(metrics, null, 2));
      console.log('Attempt History:', JSON.stringify(gameState.attempts, null, 2));

      trackEvent('game_end', 'game', { reason, roundsCompleted: gameState.currentRound, accuracy, stars, time: totalTime });

      if (typeof Sentry !== 'undefined') {
        Sentry.addBreadcrumb({
          category: 'state',
          message: 'Game complete',
          level: 'info',
          data: { score: accuracy, stars, reason }
        });
      }

      // Flush deferred endProblem before sealing
      if (signalCollector && gameState.pendingEndProblem) {
        signalCollector.endProblem(gameState.pendingEndProblem.id, gameState.pendingEndProblem.outcome);
        gameState.pendingEndProblem = null;
      }

      // Seal SignalCollector
      const signalPayload = signalCollector ? signalCollector.seal() : { events: [], signals: {}, metadata: {} };

      // Show transition screen for victory or game-over (PART-024)
      if (reason === 'victory') {
        try {
          await transitionScreen.show({
            icons: ['⭐'],
            iconSize: 'large',

      if (correctValue !== undefined && correctValue !== null) {
        const allBtns = document.querySelectorAll('.answer-btn, .option-btn, [class*="answer"], [class*="option"]');
        for (const b of allBtns) {
          const bVal = b.dataset.value !== undefined ? b.dataset.value : b.textContent.trim();
          const matches = String(bVal) === String(correctValue);
          if ((correct && matches) || (!correct && !matches)) { b.click(); return true; }
        }
      }
      // Index-based lookup fallback
      const round = window.gameState?.content?.rounds?.[window.gameState?.currentRound]
        || window.gameState?.rounds?.[window.gameState?.currentRound];
      const correctIdx = round?.correctIndex ?? round?.correct ?? 0;
      const idx = correct ? correctIdx : (correctIdx === 0 ? 1 : 0);
      const btn = document.querySelector('[data-testid="option-' + idx + '"]')
        || document.querySelector('[data-index="' + idx + '"]')
        || document.querySelector('.option-btn:nth-child(' + (idx + 1) + ')')
        || document.querySelector('[data-testid="cell-' + idx + '"]');
      if (btn) btn.click();
      return !!btn;
    },

    endGame(reason) {
      reason = reason || 'victory';
      if (window.endGame && !window.endGame.__ralphPatched) window.endGame(reason);
      else if (window.endGame) window.endGame(reason);
      syncDOMState();
    },

    restartGame() {
      if (typeof window.restartGame === 'function') window.restartGame();
      syncDOMState();
    },

    jumpToRound(n) {
      if (window.gameState) { window.gameState.currentRound = n; window.gameState.isActive = true; }
      if (typeof window.loadRound === 'function') window.loadRound(n);
      else if (typeof window.jumpToRound === 'function') window.jumpToRound(n);
      else if (typeof window.loadQuestion === 'function') window.loadQuestion(n);
      else if (typeof window.goToRound === 'function') window.goToRound(n);
      syncDOMState();
    },

    setLives(n) {
      if (window.gameState) window.gameState.lives = n;
      if (window.progressBar) {
        try { window.progressBar.update(window.gameState.currentRound || 0, n); } catch(e) {}
      }
      syncDOMState();
    },

    setRoundTimes(timesMs) {
      if (window.gameState) {
        window.gameState.roundTimes = timesMs;
        window.gameState.roundStartTime = Date.now();
        const totalMs = timesMs.reduce((a, b) => a + b, 0);
        window.gameState.startTime = window.gameState.startTime || (Date.now() - totalMs);
      }
    },

    getState() {
      const root = document.getElementById('app');
      const gs = window.gameState || {};
      return {
        phase: root ? root.dataset.phase || 'unknown' : 'unknown',
        round: gs.currentRound ?? 0,
        totalRounds: gs.totalRounds ?? 0,
        lives: gs.lives ?? null,
        score: gs.score ?? 0,
        stars: gs.stars ?? null,
        isActive: gs.isActive ?? false,
        completed: gs.completed ?? false,
      };
    },

    getLastPostMessage() { return window.__lastPostMessage || null; },

    syncDOMState,
  };

  function patchAndSync() {
    patchGameFunctions();
    syncDOMState();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(patchAndSync, 200);
    });
  } else {
    setTimeout(patchAndSync, 200);
  }

  const syncInterval = setInterval(function() {
    syncDOMState();
  }, 500);
  setTimeout(function() { clearInterval(syncInterval); }, 90000);

  window.addEventListener('load', function() {
    setTimeout(patchAndSync, 500);
    setTimeout(patchAndSync, 2000);
    var required = ['endGame', 'restartGame'];
    required.forEach(function(fn) {
      if (typeof window[fn] !== 'function') {
        console.error('[ralph-test-harness] MISSING window.' + fn + ': this function is not exposed on window. Tests calling window.__ralph.' + fn + '() will fail silently. Fix: add window.' + fn + ' = ' + fn + '; in the game code (after the function definition, in global scope or at end of DOMContentLoaded).');
      }
    });
    var hasRoundNav = (
      typeof window.nextRound === 'function' ||
      typeof window.loadRound === 'function' ||
      typeof window.jumpToRound === 'function'
    );
    if (!hasRoundNav) {
      console.error('[ralph-test-harness] MISSING window.nextRound / window.loadRound / window.jumpToRound — at least one must be defined for round navigation tests. Fix: expose one of these on window in the game code.');
    }
  });
})();
</script>
</body>
