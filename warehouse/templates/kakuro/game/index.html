<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Kakuro</title>

  <!-- Guard against double customElements.define (lottie-player) -->
  <script>
    (function() {
      const origDefine = customElements.define.bind(customElements);
      customElements.define = function(name, constructor, options) {
        if (customElements.get(name)) {
          console.warn('customElements.define skipped duplicate: ' + name);
          return;
        }
        return origDefine(name, constructor, options);
      };
    })();
  </script>

  <!-- SentryConfig BEFORE Sentry SDK (PART-030) -->
  <script>
    window.SentryConfig = {
      enabled: true,
      dsn: 'https://examplePublicKey@o0.ingest.sentry.io/0',
      environment: 'production',
      release: 'kakuro@1.0.0',
      init: function() {
        if (!SentryConfig.enabled) return;
        if (typeof Sentry === 'undefined') return;
        try {
          Sentry.init({
            dsn: SentryConfig.dsn,
            environment: SentryConfig.environment,
            release: SentryConfig.release,
            integrations: [
              Sentry.browserTracingIntegration(),
              Sentry.replayIntegration(),
              Sentry.browserProfilingIntegration(),
              Sentry.captureConsoleIntegration({ levels: ['error'] })
            ],
            tracesSampleRate: 0.1,
            replaysSessionSampleRate: 0.1,
            replaysOnErrorSampleRate: 1.0,
            ignoreErrors: [
              'ResizeObserver loop limit exceeded',
              'ResizeObserver loop completed with undelivered notifications',
              'Non-Error promise rejection captured',
              'AbortError',
              'NotAllowedError',
              'TypeError: Failed to fetch'
            ]
          });
        } catch(e) {
          console.error(JSON.stringify({ event: 'sentry-init-error', error: e.message }));
        }
      }
    };
  </script>

  <!-- Sentry SDK v10.23.0 (PART-030) -->
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

  <!-- Global error handlers (PART-030) -->
  <script>
    window.addEventListener('error', function(event) {
      if (typeof Sentry !== 'undefined' && SentryConfig.enabled) {
        try { Sentry.captureException(event.error || event.message); } catch(e) {}
      }
    });
    window.addEventListener('unhandledrejection', function(event) {
      if (typeof Sentry !== 'undefined' && SentryConfig.enabled) {
        try { Sentry.captureException(event.reason); } catch(e) {}
      }
    });
  </script>

  <!-- CDN Packages (PART-002) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
/* === BASE LAYOUT (PART-021) === */
:root {
  --game-max-width: 480px;
  --stack-gap: 10px;
  --mathai-primary: #270f36;
  --mathai-white: #fff;
  --mathai-light-gray: #f5f5f5;
  --mathai-gray: #666;
  --mathai-border-gray: #e0e0e0;
  --mathai-blue: #667eea;
  --mathai-green: #219653;
  --mathai-font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --mathai-font-size-title: 32px;
  --mathai-font-size-button: 16px;
  --mathai-border-radius-button: 10px;
  --mathai-padding-small: 10px;
  --mathai-cell-bg-yellow: #FFF9E6;
  --mathai-cell-bg-green: #D9F8D9;
  --mathai-cell-border-green: #27ae60;
  --mathai-cell-bg-red: #FFD9D9;
  --mathai-cell-border-red: #e74c3c;
}

html, body {
  height: 100%;
  margin: 0;
  background: var(--mathai-light-gray);
  font-family: var(--mathai-font-family);
}

.page-center {
  display: flex;
  justify-content: center;
  width: 100%;
  min-height: 100dvh;
  box-sizing: border-box;
}

.game-wrapper {
  width: 100vw;
  max-width: var(--game-max-width);
  box-sizing: border-box;
  background: var(--mathai-white);
  display: flex;
  flex-direction: column;
  align-items: stretch;
  min-height: 100dvh;
  padding-top: 54px;
}

.game-stack {
  display: flex;
  flex-direction: column;
  gap: var(--stack-gap);
  padding: 0 10px 20px 10px;
  box-sizing: border-box;
  width: 100%;
  overflow-x: hidden;
}

.game-block {
  padding: var(--stack-gap);
  margin-bottom: var(--stack-gap);
  background: transparent;
  border-radius: 8px;
  box-sizing: border-box;
}

.content-fill {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: calc(100dvh - 54px);
  box-sizing: border-box;
}

@media (min-width: 520px) {
  .game-wrapper { width: 100%; }
}

/* === GAME TITLE & INSTRUCTIONS === */
.game-title {
  font-size: var(--mathai-font-size-title);
  color: var(--mathai-primary);
  text-align: center;
  margin: 0 0 8px 0;
}

.game-instructions {
  font-size: 14px;
  color: var(--mathai-gray);
  text-align: center;
  margin: 0 0 16px 0;
}

/* === KAKURO GRID === */
.kakuro-grid {
  display: grid;
  grid-template-columns: repeat(var(--grid-size, 5), 1fr);
  gap: 2px;
  max-width: 100%;
  aspect-ratio: 1;
  margin: 0 auto;
  background: var(--mathai-primary);
  border: 2px solid var(--mathai-primary);
  border-radius: 4px;
}

.kakuro-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  aspect-ratio: 1;
  font-size: 18px;
  font-weight: 600;
  position: relative;
  box-sizing: border-box;
}

.kakuro-cell.cell-black {
  background: var(--mathai-primary);
}

.kakuro-cell.cell-clue {
  background: var(--mathai-primary);
  color: var(--mathai-white);
  font-size: 11px;
  font-weight: 400;
}

.clue-container {
  position: relative;
  width: 100%;
  height: 100%;
}

.clue-container::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom right, transparent calc(50% - 0.5px), var(--mathai-gray) calc(50% - 0.5px), var(--mathai-gray) calc(50% + 0.5px), transparent calc(50% + 0.5px));
  pointer-events: none;
}

.clue-right {
  position: absolute;
  bottom: 4px;
  left: 4px;
  font-size: 11px;
  color: var(--mathai-white);
  z-index: 1;
}

.clue-down {
  position: absolute;
  top: 4px;
  right: 4px;
  font-size: 11px;
  color: var(--mathai-white);
  z-index: 1;
}

.kakuro-cell.cell-fillable {
  background: var(--mathai-white);
  cursor: pointer;
  font-size: 20px;
  font-weight: 700;
  color: var(--mathai-primary);
  border: 2px dashed var(--mathai-border-gray);
  transition: all 0.2s ease;
}

.kakuro-cell.cell-fillable.drag-over {
  border-color: var(--mathai-blue);
  background: var(--mathai-cell-bg-yellow);
}

.kakuro-cell.cell-fillable.filled {
  border-style: solid;
  border-color: var(--mathai-blue);
  background: var(--mathai-cell-bg-yellow);
}

.kakuro-cell.cell-fillable.filled:hover {
  opacity: 0.8;
}

.kakuro-cell.cell-fillable.correct {
  background: var(--mathai-cell-bg-green);
  border: 2px solid var(--mathai-cell-border-green);
}

.kakuro-cell.cell-fillable.incorrect {
  background: var(--mathai-cell-bg-red);
  border: 2px solid var(--mathai-cell-border-red);
}

/* === NUMBER TAG CLUSTER === */
.tag-cluster {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  padding: 16px 8px;
  margin-top: 12px;
  min-height: 52px;
  background: var(--mathai-light-gray);
  border-radius: 12px;
  border: 1px solid var(--mathai-border-gray);
}

.number-tag {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--mathai-blue);
  color: var(--mathai-white);
  border-radius: 10px;
  cursor: grab;
  font-size: 18px;
  font-weight: 700;
  user-select: none;
  transition: opacity 0.2s, transform 0.2s;
  -webkit-user-select: none;
  touch-action: none;
}

.number-tag:active { cursor: grabbing; }
.number-tag.dragging { opacity: 0.4; transform: scale(0.9); }
.number-tag.used { display: none; }

.floating-tag {
  position: fixed;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--mathai-blue);
  color: var(--mathai-white);
  border-radius: 10px;
  font-size: 18px;
  font-weight: 700;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
}

/* === BUTTONS (PART-022) === */
.btn-container {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: var(--mathai-padding-small);
  flex-wrap: wrap;
}

.game-btn {
  padding: 14px 32px;
  font-size: var(--mathai-font-size-button);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  border: none;
  border-radius: var(--mathai-border-radius-button);
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--mathai-white);
}

.game-btn:active { transform: translateY(0); }
.game-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.btn-primary { background: var(--mathai-green); }
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(33, 150, 83, 0.4);
}

.btn-secondary { background: var(--mathai-blue); }
.btn-secondary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}

/* === FEEDBACK === */
.feedback-section {
  text-align: center;
  padding: 8px;
  border-radius: 8px;
  margin-top: 8px;
}

.feedback-section p {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
}

/* === RESULTS SCREEN (PART-019) === */
.results-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  text-align: center;
}

.results-container h2 {
  font-size: var(--mathai-font-size-title);
  color: var(--mathai-primary);
  margin-bottom: 16px;
}

.stars-display {
  font-size: 48px;
  margin-bottom: 24px;
}

.results-metrics {
  width: 100%;
  max-width: 300px;
  margin-bottom: 24px;
}

.metric-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--mathai-border-gray);
}

.metric-label {
  color: var(--mathai-gray);
  font-size: 14px;
}

.metric-value {
  font-weight: 700;
  color: var(--mathai-primary);
  font-size: 16px;
}

.results-container button {
  padding: 14px 48px;
  font-size: var(--mathai-font-size-button);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  background: var(--mathai-green);
  color: var(--mathai-white);
  border: none;
  border-radius: var(--mathai-border-radius-button);
  cursor: pointer;
  transition: all 0.2s ease;
}

.results-container button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(33, 150, 83, 0.4);
}

/* === UTILITY === */
.hidden { display: none !important; }
</style>
</head>
<body>
  <div id="app" data-testid="app" data-phase="start"></div>

  <template id="game-template">
    <div id="game-screen" data-testid="game-screen" style="display:none;">
      <div class="game-block" id="play-area">
        <div class="question-section">
          <h2 class="game-title">Kakuro</h2>
          <p class="game-instructions">Fill cells with digits 1-9. Each group must sum to its clue with no repeats.</p>
        </div>

        <div class="kakuro-grid" id="kakuro-grid" data-testid="game-grid" data-signal-id="kakuro-grid" style="--grid-size: 5;">
        </div>

        <div class="feedback-section hidden" id="feedback-area" data-testid="feedback-area" aria-live="polite" role="status">
          <p id="feedback-text" data-testid="feedback-text"></p>
        </div>

        <div class="tag-cluster" id="tag-cluster" data-testid="tag-cluster" data-signal-id="tag-cluster">
        </div>
      </div>

      <div class="btn-container">
        <button class="game-btn btn-secondary" id="btn-reset" data-testid="btn-reset" data-signal-id="reset-button">Reset</button>
        <button class="game-btn btn-primary" id="btn-check" data-testid="btn-check" data-signal-id="submit-button">Check</button>
      </div>
    </div>

    <div id="results-screen" data-testid="results-screen">
      <div class="results-container">
        <h2 id="results-title" data-testid="results-title">Game Complete!</h2>
        <div id="stars-display" data-testid="stars-display" class="stars-display"></div>
        <div class="results-metrics">
          <div class="metric-row">
            <span class="metric-label">Score</span>
            <span id="result-score" data-testid="score-display" class="metric-value">0%</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Time</span>
            <span id="result-time" class="metric-value">0s</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Correct</span>
            <span id="result-correct" class="metric-value">0/0</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Lives Remaining</span>
            <span id="result-lives" data-testid="lives-display" class="metric-value">0</span>
          </div>
        </div>
        <button id="btn-restart" data-testid="btn-restart" onclick="restartGame()">Play Again</button>
      </div>
    </div>
  </template>

  <script>
    // === Fallback Content ===
    const fallbackContent = {
      gridSize: 5,
      cells: [
        { row: 0, col: 0, type: "black" },
        { row: 0, col: 1, type: "clue", clueDown: 6 },
        { row: 0, col: 2, type: "clue", clueDown: 9 },
        { row: 0, col: 3, type: "black" },
        { row: 0, col: 4, type: "black" },
        { row: 1, col: 0, type: "clue", clueRight: 3 },
        { row: 1, col: 1, type: "fillable", answer: 1 },
        { row: 1, col: 2, type: "fillable", answer: 2 },
        { row: 1, col: 3, type: "clue", clueDown: 8 },
        { row: 1, col: 4, type: "clue", clueDown: 9 },
        { row: 2, col: 0, type: "clue", clueRight: 26 },
        { row: 2, col: 1, type: "fillable", answer: 5 },
        { row: 2, col: 2, type: "fillable", answer: 7 },
        { row: 2, col: 3, type: "fillable", answer: 6 },
        { row: 2, col: 4, type: "fillable", answer: 8 },
        { row: 3, col: 0, type: "black" },
        { row: 3, col: 1, type: "black" },
        { row: 3, col: 2, type: "clue", clueRight: 3 },
        { row: 3, col: 3, type: "fillable", answer: 2 },
        { row: 3, col: 4, type: "fillable", answer: 1 },
        { row: 4, col: 0, type: "black" },
        { row: 4, col: 1, type: "black" },
        { row: 4, col: 2, type: "black" },
        { row: 4, col: 3, type: "black" },
        { row: 4, col: 4, type: "black" }
      ],
      numberTags: [8, 2, 5, 1, 7, 1, 6, 2]
    };

    // === Game State (PART-007) ===
    window.gameState = {
      gameId: 'game_1710000000_kakuro001',
      currentRound: 0,
      totalRounds: 1,
      score: 0,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      phase: 'start',
      content: fallbackContent,
      duration_data: {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0,
        currentTime: null
      },
      lives: 3,
      totalLives: 3,
      grid: null,
      solution: null,
      clues: null,
      numberTags: [],
      userValues: {},
      dragState: null,
      pendingEndProblem: null,
      groups: [],
      showingFeedback: false,
      cellTagMap: {}
    };

    const gameState = window.gameState;

    let timer = null;
    let visibilityTracker = null;
    let signalCollector = null;
    let progressBar = null;
    let transitionScreen = null;

    // === DOM Cache (set after ScreenLayout) ===
    let gameScreenEl = null;
    let resultsScreenEl = null;
    let kakuroGridEl = null;
    let tagClusterEl = null;
    let feedbackAreaEl = null;
    let feedbackTextEl = null;
    let btnCheckEl = null;
    let btnResetEl = null;
    let starsDisplayEl = null;
    let resultScoreEl = null;
    let resultTimeEl = null;
    let resultCorrectEl = null;
    let resultLivesEl = null;
    let resultsTitleEl = null;

    // === Sentry helpers (PART-030) ===
    function initSentry() {
      try {
        if (typeof SentryConfig !== 'undefined' && SentryConfig.enabled) {
          SentryConfig.init();
          if (typeof Sentry !== 'undefined') {
            Sentry.addBreadcrumb({ category: 'lifecycle', message: 'Sentry initialized', level: 'info' });
          }
        }
      } catch(e) {
        console.error(JSON.stringify({ event: 'sentry-init-error', error: e.message }));
      }
    }

    function verifySentry() {
      try {
        const client = typeof Sentry !== 'undefined' ? Sentry.getClient() : null;
        console.log('Sentry active:', !!client);
      } catch(e) {
        console.error(JSON.stringify({ event: 'sentry-verify-error', error: e.message }));
      }
    }

    function testSentry() {
      try {
        if (typeof Sentry !== 'undefined') {
          Sentry.captureMessage('Test sentry message from Kakuro');
          console.log('Sentry test message sent');
        }
      } catch(e) {
        console.error(JSON.stringify({ event: 'sentry-test-error', error: e.message }));
      }
    }

    function addSentryBreadcrumb(category, message, data) {
      try {
        if (typeof Sentry !== 'undefined' && typeof SentryConfig !== 'undefined' && SentryConfig.enabled) {
          Sentry.addBreadcrumb({ category: category, message: message, level: 'info', data: data || {} });
        }
      } catch(e) {}
    }

    // === Utility ===
    function syncDOMState() {
      const app = document.getElementById('app');
      if (!app) return;
      app.dataset.phase = gameState.phase || 'start';
      app.dataset.round = String(gameState.currentRound || 0);
      app.dataset.score = String(gameState.score || 0);
      if (gameState.totalLives > 0) {
        app.dataset.lives = String(gameState.lives);
      }
    }

    // === waitForPackages (PART-003) ===
    async function waitForPackages() {
      const timeout = 180000;
      const interval = 50;
      let elapsed = 0;
      while (
        typeof FeedbackManager === 'undefined' ||
        typeof ScreenLayout === 'undefined' ||
        typeof ProgressBarComponent === 'undefined' ||
        typeof TransitionScreenComponent === 'undefined' ||
        typeof VisibilityTracker === 'undefined' ||
        typeof SignalCollector === 'undefined'
      ) {
        if (elapsed >= timeout) {
          throw new Error('Packages failed to load within 180s');
        }
        await new Promise(resolve => setTimeout(resolve, interval));
        elapsed += interval;
      }
      addSentryBreadcrumb('lifecycle', 'Packages loaded');
    }

    // === Event Tracking (PART-010) ===
    function trackEvent(type, target, data) {
      const event = {
        type,
        target,
        timestamp: Date.now(),
        data: data || {}
      };
      gameState.events.push(event);
      console.log(JSON.stringify({ event: 'trackEvent', type, target, data }));
    }

    // === Attempt Recording (PART-009) ===
    function recordAttempt(data) {
      const attempt = {
        timestamp: Date.now(),
        question: data.question || 'kakuro_puzzle',
        userAnswer: data.userAnswer,
        correctAnswer: data.correctAnswer,
        correct: data.correct,
        validationType: data.validationType || 'function',
        round: gameState.currentRound
      };
      gameState.attempts.push(attempt);
      gameState.duration_data.attempts.push({
        timestamp: new Date().toISOString(),
        correct: data.correct
      });
    }

    // === EventCapture placeholder (PART-036) ===
    const EventCapture = {
      _events: [],
      init() { console.log(JSON.stringify({ event: 'EventCapture.init' })); },
      buttonPress(id, meta) { this._events.push({ type: 'buttonPress', id, meta, ts: Date.now() }); },
      drop(id, meta) { this._events.push({ type: 'drop', id, meta, ts: Date.now() }); },
      getSummary() { return { totalEvents: this._events.length }; },
      getEvents() { return this._events; }
    };

    // === Build Groups ===
    function buildGroups(cells, gridSize) {
      const cellMap = {};
      cells.forEach(c => { cellMap[`${c.row}-${c.col}`] = c; });

      const groups = [];

      cells.forEach(c => {
        if (c.type !== 'clue') return;

        if (c.clueRight != null) {
          const members = [];
          for (let col = c.col + 1; col < gridSize; col++) {
            const next = cellMap[`${c.row}-${col}`];
            if (next && next.type === 'fillable') {
              members.push({ row: next.row, col: next.col });
            } else {
              break;
            }
          }
          if (members.length > 0) {
            groups.push({ clueValue: c.clueRight, direction: 'right', cells: members });
          }
        }

        if (c.clueDown != null) {
          const members = [];
          for (let row = c.row + 1; row < gridSize; row++) {
            const next = cellMap[`${row}-${c.col}`];
            if (next && next.type === 'fillable') {
              members.push({ row: next.row, col: next.col });
            } else {
              break;
            }
          }
          if (members.length > 0) {
            groups.push({ clueValue: c.clueDown, direction: 'down', cells: members });
          }
        }
      });

      return groups;
    }

    // === Validate Group ===
    function validateGroup(group, userValues) {
      const values = [];
      for (const cell of group.cells) {
        const key = `${cell.row}-${cell.col}`;
        const v = userValues[key];
        if (v == null) return { valid: false, reason: 'incomplete', cells: group.cells };
        values.push(v);
      }
      const sum = values.reduce((a, b) => a + b, 0);
      const noDups = new Set(values).size === values.length;
      return { valid: sum === group.clueValue && noDups, cells: group.cells };
    }

    // === calcStars ===
    function calcStars(outcome) {
      if (outcome === 'game_over') return 0;
      // Custom: based on remaining lives
      if (gameState.lives >= 3) return 3;
      if (gameState.lives === 2) return 2;
      if (gameState.lives === 1) return 1;
      return 0;
    }
    // Expose calcStars on window for contract tests
    window.calcStars = calcStars;

    // === Render Grid ===
    function renderGrid() {
      const content = gameState.content || fallbackContent;
      const gridSize = content.gridSize || 5;
      kakuroGridEl.innerHTML = '';
      kakuroGridEl.style.setProperty('--grid-size', gridSize);

      const cellMap = {};
      content.cells.forEach(c => { cellMap[`${c.row}-${c.col}`] = c; });

      for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
          const cellDef = cellMap[`${r}-${c}`];
          const div = document.createElement('div');
          div.classList.add('kakuro-cell');
          div.dataset.row = r;
          div.dataset.col = c;

          if (!cellDef || cellDef.type === 'black') {
            div.classList.add('cell-black');
          } else if (cellDef.type === 'clue') {
            div.classList.add('cell-clue');
            const container = document.createElement('div');
            container.classList.add('clue-container');
            if (cellDef.clueRight != null) {
              const span = document.createElement('span');
              span.classList.add('clue-right');
              span.textContent = cellDef.clueRight;
              container.appendChild(span);
            }
            if (cellDef.clueDown != null) {
              const span = document.createElement('span');
              span.classList.add('clue-down');
              span.textContent = cellDef.clueDown;
              container.appendChild(span);
            }
            div.appendChild(container);
          } else if (cellDef.type === 'fillable') {
            div.classList.add('cell-fillable');
            div.dataset.signalId = `cell-${r}-${c}`;
            div.setAttribute('data-testid', `cell-${r}-${c}`);
            div.setAttribute('role', 'button');
            div.setAttribute('tabindex', '0');
            div.setAttribute('aria-label', `cell row ${r} column ${c}, empty`);

            // Desktop drop events
            div.addEventListener('dragover', (e) => {
              e.preventDefault();
              div.classList.add('drag-over');
            });
            div.addEventListener('dragleave', () => {
              div.classList.remove('drag-over');
            });
            div.addEventListener('drop', (e) => {
              e.preventDefault();
              div.classList.remove('drag-over');
              const tagId = e.dataTransfer.getData('text/plain');
              if (tagId) placeTag(tagId, r, c);
            });

            // Tap to return
            div.addEventListener('click', () => {
              handleCellTap(r, c, div);
            });

            // Restore filled state if restarting mid-game
            const key = `${r}-${c}`;
            if (gameState.userValues[key] != null) {
              div.textContent = gameState.userValues[key];
              div.classList.add('filled');
              div.setAttribute('aria-label', `cell row ${r} column ${c}, value ${gameState.userValues[key]}`);
            }
          }

          kakuroGridEl.appendChild(div);
        }
      }

      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('content_render', {
            screen: 'gameplay',
            content_snapshot: {
              type: 'grid_rendered',
              grid_size: gridSize,
              fillable_cells: Object.keys(gameState.solution || {}).length,
              tags_available: (gameState.numberTags || []).length,
              trigger: 'round_start'
            },
            components: {
              progress: { current: 1, total: gameState.totalRounds }
            }
          });
        } catch(e) { console.error(JSON.stringify({ event: 'signal-error', error: e.message })); }
      }
    }

    // === Render Tags ===
    function renderTags() {
      tagClusterEl.innerHTML = '';
      (gameState.numberTags || []).forEach((num, idx) => {
        const tag = document.createElement('div');
        tag.classList.add('number-tag');
        tag.dataset.tagId = String(idx);
        tag.dataset.value = String(num);
        tag.dataset.signalId = `tag-${idx}`;
        tag.setAttribute('data-testid', `tag-${idx}`);
        tag.setAttribute('role', 'button');
        tag.setAttribute('tabindex', '0');
        tag.setAttribute('aria-label', `number tag ${num}`);
        tag.textContent = num;
        tag.draggable = true;

        // Check if this tag is already used
        const usedTagIds = Object.values(gameState.cellTagMap);
        if (usedTagIds.includes(String(idx))) {
          tag.classList.add('used');
        }

        // Desktop drag
        tag.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', String(idx));
          tag.classList.add('dragging');
        });
        tag.addEventListener('dragend', () => {
          tag.classList.remove('dragging');
        });

        // Mobile touch
        tag.addEventListener('touchstart', (e) => {
          e.preventDefault();
          gameState.dragState = { tagId: String(idx), value: num, element: tag };
          tag.classList.add('dragging');

          const touch = e.touches[0];
          const clone = document.createElement('div');
          clone.classList.add('floating-tag');
          clone.textContent = num;
          clone.id = 'floating-clone';
          clone.style.left = touch.clientX + 'px';
          clone.style.top = touch.clientY + 'px';
          document.body.appendChild(clone);
        }, { passive: false });

        tagClusterEl.appendChild(tag);
      });

      // Global touch handlers for mobile drag
      // Remove old listeners by using a flag
      if (!window._touchMoveAttached) {
        window._touchMoveAttached = true;

        document.addEventListener('touchmove', (e) => {
          if (!gameState.dragState) return;
          e.preventDefault();
          const clone = document.getElementById('floating-clone');
          if (clone && e.touches[0]) {
            clone.style.left = e.touches[0].clientX + 'px';
            clone.style.top = e.touches[0].clientY + 'px';
          }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
          if (!gameState.dragState) return;
          const clone = document.getElementById('floating-clone');
          if (clone) clone.remove();

          const ds = gameState.dragState;
          if (ds.element) ds.element.classList.remove('dragging');

          if (e.changedTouches && e.changedTouches[0]) {
            const touch = e.changedTouches[0];
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (el && el.classList.contains('cell-fillable')) {
              const row = parseInt(el.dataset.row);
              const col = parseInt(el.dataset.col);
              placeTag(ds.tagId, row, col);
            }
          }
          gameState.dragState = null;
        });

        document.addEventListener('touchcancel', () => {
          const clone = document.getElementById('floating-clone');
          if (clone) clone.remove();
          if (gameState.dragState && gameState.dragState.element) {
            gameState.dragState.element.classList.remove('dragging');
          }
          gameState.dragState = null;
        });
      }
    }

    // === Place Tag ===
    function placeTag(tagId, row, col) {
      if (!gameState.isActive || gameState.gameEnded) return;

      const key = `${row}-${col}`;
      const tagEl = tagClusterEl.querySelector(`[data-tag-id="${tagId}"]`);
      if (!tagEl) return;
      if (tagEl.classList.contains('used')) return;

      const cellEl = kakuroGridEl.querySelector(`.cell-fillable[data-row="${row}"][data-col="${col}"]`);
      if (!cellEl) return;

      // If cell already has a value, return it first
      if (gameState.userValues[key] != null) {
        const existingTagId = gameState.cellTagMap[key];
        if (existingTagId != null) {
          returnTagInternal(existingTagId, row, col);
        }
      }

      const value = Number(tagEl.dataset.value);
      cellEl.textContent = value;
      cellEl.classList.add('filled');
      cellEl.classList.remove('drag-over');
      cellEl.setAttribute('aria-label', `cell row ${row} column ${col}, value ${value}`);
      tagEl.classList.add('used');
      gameState.userValues[key] = value;
      gameState.cellTagMap[key] = String(tagId);

      trackEvent('tag_drop', 'game', { tagId, value, row, col });
      EventCapture.drop(`cell-${row}-${col}`, { tagId, value, row, col, round: 0 });

      if (signalCollector) {
        try {
          signalCollector.updateCurrentAnswer(gameState.userValues);
          signalCollector.recordViewEvent('visual_update', {
            screen: 'gameplay',
            content_snapshot: {
              type: 'tag_placed',
              cell: { row, col },
              value: value,
              cells_filled: Object.keys(gameState.userValues).length,
              trigger: 'user_action'
            }
          });
        } catch(e) { console.error(JSON.stringify({ event: 'signal-error', error: e.message })); }
      }
    }

    // === Handle Cell Tap ===
    function handleCellTap(row, col, cell) {
      if (!gameState.isActive || gameState.gameEnded || gameState.showingFeedback) return;
      const key = `${row}-${col}`;
      if (gameState.userValues[key] == null) return;
      const tagId = gameState.cellTagMap[key];
      if (tagId == null) return;
      returnTag(tagId, row, col);
    }

    // === Return Tag (public) ===
    function returnTag(tagId, row, col) {
      returnTagInternal(tagId, row, col);
      trackEvent('tag_return', 'game', { tagId, row, col });
      EventCapture.buttonPress(`cell-${row}-${col}`, { tagId, row, col, round: 0 });

      if (signalCollector) {
        try {
          signalCollector.updateCurrentAnswer(gameState.userValues);
          signalCollector.recordViewEvent('visual_update', {
            screen: 'gameplay',
            content_snapshot: {
              type: 'tag_returned',
              cell: { row, col },
              cells_filled: Object.keys(gameState.userValues).length,
              trigger: 'user_action'
            }
          });
        } catch(e) { console.error(JSON.stringify({ event: 'signal-error', error: e.message })); }
      }
    }

    // === Return Tag (internal, no events) ===
    function returnTagInternal(tagId, row, col) {
      const key = `${row}-${col}`;
      const cellEl = kakuroGridEl.querySelector(`.cell-fillable[data-row="${row}"][data-col="${col}"]`);
      if (cellEl) {
        cellEl.textContent = '';
        cellEl.classList.remove('filled', 'correct', 'incorrect');
        cellEl.setAttribute('aria-label', `cell row ${row} column ${col}, empty`);
      }

      const tagEl = tagClusterEl.querySelector(`[data-tag-id="${tagId}"]`);
      if (tagEl) {
        tagEl.classList.remove('used');
      }

      delete gameState.userValues[key];
      delete gameState.cellTagMap[key];
    }

    // === Handle Submit ===
    async function handleSubmit() {
      if (!gameState.isActive || gameState.gameEnded || gameState.isProcessing) return;
      gameState.isProcessing = true;

      EventCapture.buttonPress('btn-submit', { round: 0 });

      const content = gameState.content || fallbackContent;
      const fillableCells = content.cells.filter(c => c.type === 'fillable');
      const allFilled = fillableCells.every(c => gameState.userValues[`${c.row}-${c.col}`] != null);

      if (!allFilled) {
        feedbackAreaEl.classList.remove('hidden');
        feedbackTextEl.textContent = 'Place all numbers first!';
        feedbackTextEl.style.color = var_warning();
        gameState.isProcessing = false;
        return;
      }

      // Validate all groups
      const incorrectCellKeys = new Set();
      const correctCellKeys = new Set();
      let allValid = true;

      for (const group of gameState.groups) {
        const result = validateGroup(group, gameState.userValues);
        if (!result.valid) {
          allValid = false;
          result.cells.forEach(c => incorrectCellKeys.add(`${c.row}-${c.col}`));
        } else {
          result.cells.forEach(c => correctCellKeys.add(`${c.row}-${c.col}`));
        }
      }

      // Remove correct keys that are also in incorrect groups
      incorrectCellKeys.forEach(k => correctCellKeys.delete(k));

      const isCorrect = allValid;

      recordAttempt({
        userAnswer: { ...gameState.userValues },
        correct: isCorrect,
        question: 'kakuro_puzzle',
        correctAnswer: gameState.solution,
        validationType: 'function'
      });

      gameState.pendingEndProblem = {
        id: 'round_1',
        outcome: { correct: isCorrect, answer: { ...gameState.userValues } }
      };

      if (signalCollector) {
        try {
          signalCollector.recordCustomEvent('round_solved', { correct: isCorrect, answer: { ...gameState.userValues } });
        } catch(e) { console.error(JSON.stringify({ event: 'signal-error', error: e.message })); }
      }

      if (isCorrect) {
        // Mark all cells correct
        highlightCells(fillableCells.map(c => `${c.row}-${c.col}`), 'correct');
        trackEvent('game_won', 'game', { lives: gameState.lives, attempts: gameState.attempts.length });
        gameState.score = 1;
        syncDOMState();

        if (signalCollector) {
          try {
            signalCollector.recordViewEvent('feedback_display', {
              screen: 'gameplay',
              content_snapshot: { feedback_type: 'correct', message: 'You solved it!', audio_id: 'dynamic' }
            });
          } catch(e) {}
        }

        try {
          await FeedbackManager.sound.play('correct_tap', {
            subtitle: '**Great job!** You solved the puzzle!',
            sticker: { image: 'https://storage.googleapis.com/test-dynamic-assets/mathai-assets/dev/figma/assets/rc-upload-1757512958230-30.gif', duration: 2, type: 'IMAGE_GIF' }
          });
        } catch(e) {
          console.error(JSON.stringify({ event: 'audio-error', error: e.message }));
          if (typeof Sentry !== 'undefined' && SentryConfig.enabled) { try { Sentry.captureException(e); } catch(se) {} }
        }

        const accuracy = 100;
        const timeTaken = Math.round((Date.now() - gameState.startTime) / 1000);

        try {
          await FeedbackManager.playDynamicFeedback({
            event: 'success',
            audio_content: `You scored ${accuracy}% in ${timeTaken} seconds!`,
            subtitle: `You scored ${accuracy}% in ${timeTaken} seconds!`,
            sticker: 'https://storage.googleapis.com/test-dynamic-assets/mathai-assets/lottie/trophy.json'
          });
        } catch(e) {
          console.error(JSON.stringify({ event: 'audio-error', error: e.message }));
          if (typeof Sentry !== 'undefined' && SentryConfig.enabled) { try { Sentry.captureException(e); } catch(se) {} }
        }

        gameState.isProcessing = false;
        await endGame('victory');
      } else {
        gameState.lives = Math.max(0, gameState.lives - 1);
        syncDOMState();
        trackEvent('life_lost', 'game', { livesRemaining: gameState.lives });
        const displayLives = Math.max(0, gameState.lives);
        progressBar.update(0, displayLives);

        // Highlight cells
        highlightCells(Array.from(incorrectCellKeys), 'incorrect');
        highlightCells(Array.from(correctCellKeys), 'correct');
        gameState.showingFeedback = true;

        if (signalCollector) {
          try {
            signalCollector.recordViewEvent('visual_update', {
              screen: 'gameplay',
              content_snapshot: {
                type: 'validation_highlights',
                incorrect_cells: incorrectCellKeys.size,
                trigger: 'user_action'
              }
            });
            signalCollector.recordViewEvent('feedback_display', {
              screen: 'gameplay',
              content_snapshot: { feedback_type: 'incorrect', message: 'Some fields are wrong!', audio_id: 'dynamic' }
            });
          } catch(e) {}
        }

        try {
          await FeedbackManager.sound.play('wrong_tap', {
            subtitle: 'Not quite. Try again!',
            sticker: { image: 'https://storage.googleapis.com/test-dynamic-assets/mathai-assets/dev/figma/assets/rc-upload-1757512958230-49.gif', duration: 2, type: 'IMAGE_GIF' }
          });
        } catch(e) {
          console.error(JSON.stringify({ event: 'audio-error', error: e.message }));
          if (typeof Sentry !== 'undefined' && SentryConfig.enabled) { try { Sentry.captureException(e); } catch(se) {} }
        }

        if (gameState.lives <= 0) {
          trackEvent('game_over', 'game', { reason: 'lives_lost' });

          if (signalCollector) {
            try {
              signalCollector.recordViewEvent('feedback_display', {
                screen: 'gameplay',
                content_snapshot: { feedback_type: 'game_over', message: 'All lives lost!', audio_id: 'dynamic' }
              });
            } catch(e) {}
          }

          try {
            await FeedbackManager.sound.play('wrong_tap', {
              subtitle: 'All lives lost!',
              sticker: { image: 'https://storage.googleapis.com/test-dynamic-assets/mathai-assets/dev/figma/assets/rc-upload-1757512958230-49.gif', duration: 2, type: 'IMAGE_GIF' }
            });
          } catch(e) {
            console.error(JSON.stringify({ event: 'audio-error', error: e.message }));
            if (typeof Sentry !== 'undefined' && SentryConfig.enabled) { try { Sentry.captureException(e); } catch(se) {} }
          }

          const accuracy2 = 0;
          const timeTaken2 = Math.round((Date.now() - gameState.startTime) / 1000);
          try {
            await FeedbackManager.playDynamicFeedback({
              event: 'error',
              audio_content: `You scored ${accuracy2}% in ${timeTaken2} seconds!`,
              subtitle: `You scored ${accuracy2}% in ${timeTaken2} seconds!`,
              sticker: 'https://storage.googleapis.com/test-dynamic-assets/mathai-assets/lottie/trophy.json'
            });
          } catch(e) {
            console.error(JSON.stringify({ event: 'audio-error', error: e.message }));
            if (typeof Sentry !== 'undefined' && SentryConfig.enabled) { try { Sentry.captureException(e); } catch(se) {} }
          }

          gameState.isProcessing = false;
          await endGame('game_over');
        } else {
          feedbackAreaEl.classList.remove('hidden');
          feedbackTextEl.textContent = `Incorrect! ${gameState.lives} ${gameState.lives === 1 ? 'life' : 'lives'} remaining.`;
          feedbackTextEl.style.color = '#e74c3c';

          setTimeout(() => {
            clearHighlights();
            gameState.showingFeedback = false;
          }, 2000);

          gameState.isProcessing = false;
        }
      }
    }

    function var_warning() {
      return '#e67e22';
    }

    // === Highlight Cells ===
    function highlightCells(keys, className) {
      keys.forEach(key => {
        const [r, c] = key.split('-');
        const cellEl = kakuroGridEl.querySelector(`.cell-fillable[data-row="${r}"][data-col="${c}"]`);
        if (cellEl) {
          cellEl.classList.remove('correct', 'incorrect');
          cellEl.classList.add(className);
        }
      });
    }

    // === Clear Highlights ===
    function clearHighlights() {
      const cells = kakuroGridEl.querySelectorAll('.cell-fillable');
      cells.forEach(cell => {
        cell.classList.remove('correct', 'incorrect');
      });
      feedbackAreaEl.classList.add('hidden');
    }

    // === Reset Drag Drop ===
    function resetDragDrop() {
      if (!gameState.isActive || gameState.gameEnded) return;
      EventCapture.buttonPress('btn-reset', { round: 0 });

      const keys = Object.keys(gameState.userValues);
      keys.forEach(key => {
        const tagId = gameState.cellTagMap[key];
        const [r, c] = key.split('-').map(Number);
        if (tagId != null) {
          returnTagInternal(tagId, r, c);
        }
      });
      gameState.userValues = {};
      gameState.cellTagMap = {};
      clearHighlights();
      gameState.showingFeedback = false;
    }

    // === Setup Game ===
    function setupGame() {
      const content = gameState.content || fallbackContent;
      gameState.content = content;

      // Build solution map
      const solution = {};
      content.cells.forEach(c => {
        if (c.type === 'fillable') {
          solution[`${c.row}-${c.col}`] = c.answer;
        }
      });
      gameState.solution = solution;

      // Build groups
      gameState.groups = buildGroups(content.cells, content.gridSize);

      // Number tags
      gameState.numberTags = content.numberTags ? [...content.numberTags] : Object.values(solution);

      // Reset user state
      gameState.userValues = {};
      gameState.cellTagMap = {};
      gameState.showingFeedback = false;

      renderGrid();
      renderTags();

      gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.isActive = true;
      gameState.isProcessing = false;

      trackEvent('game_start', 'game');
      addSentryBreadcrumb('lifecycle', 'game_init', { gridSize: content.gridSize });

      if (signalCollector) {
        try {
          signalCollector.startProblem('round_1', {
            round_number: 1,
            question_text: 'kakuro_puzzle',
            correct_answer: gameState.solution,
            difficulty: null
          });
        } catch(e) { console.error(JSON.stringify({ event: 'signal-error', error: e.message })); }
      }

      const displayLives = Math.max(0, gameState.lives);
      progressBar.update(0, displayLives);

      gameScreenEl.style.display = 'block';
      resultsScreenEl.style.display = 'none';

      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('screen_transition', {
            screen: 'gameplay',
            metadata: { transition_from: 'ready' }
          });
        } catch(e) {}
      }
    }

    // === Start Game ===
    async function startGame() {
      try {
        await transitionScreen.hide();
      } catch(e) { console.error('transitionScreen.hide failed', e); }

      document.getElementById('gameContent').style.display = 'block';

      gameState.phase = 'playing';
      syncDOMState();

      setupGame();
    }

    // === End Game ===
    async function endGame(reason) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.isProcessing = false;

      gameState.duration_data.currentTime = new Date().toISOString();

      const outcome = reason || 'victory';
      const accuracy = gameState.score > 0 ? 100 : 0;
      const timeTaken = Math.round((Date.now() - (gameState.startTime || Date.now())) / 1000);
      const stars = calcStars(outcome);

      gameState.phase = outcome === 'victory' ? 'results' : 'gameover';
      syncDOMState();

      const metrics = {
        score: gameState.score,
        accuracy: accuracy,
        time: timeTaken,
        stars: stars,
        livesRemaining: gameState.lives,
        attempts: gameState.attempts,
        duration_data: { ...gameState.duration_data, currentTime: new Date().toISOString() }
      };

      console.log(JSON.stringify({ event: 'game_end', metrics }));
      trackEvent('game_end', 'game', { metrics });
      addSentryBreadcrumb('lifecycle', 'endGame', { outcome, accuracy, stars });

      // Flush deferred endProblem
      if (signalCollector && gameState.pendingEndProblem) {
        try {
          signalCollector.endProblem(gameState.pendingEndProblem.id, gameState.pendingEndProblem.outcome);
        } catch(e) {}
        gameState.pendingEndProblem = null;
      }

      const signalPayload = signalCollector ? signalCollector.seal() : { events: [], signals: {}, metadata: {} };

      showResults(metrics, stars);

      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('screen_transition', {
            screen: 'results',
            metadata: { transition_from: 'gameplay' }
          });
        } catch(e) {}
      }

      window.parent.postMessage({
        type: 'game_complete',
        gameId: gameState.gameId,
        reason: outcome,
        data: {
          metrics,
          attempts: gameState.attempts,
          ...signalPayload,
          completedAt: Date.now()
        }
      }, '*');

      // Show transition screen
      if (outcome === 'victory') {
        try {
          await transitionScreen.show({
            icons: ['🎉'],
            title: 'Puzzle Solved!',
            subtitle: `You earned ${stars} star${stars !== 1 ? 's' : ''}!`,
            buttons: [{ text: 'Play Again', type: 'primary', action: () => restartGame() }]
          });
          const restartBtn = document.querySelector('.mathai-transition-btn[data-index="0"]');
          if (restartBtn) restartBtn.setAttribute('data-testid', 'btn-restart');
        } catch(e) { console.error('transitionScreen.show failed', e); }
      } else {
        try {
          await transitionScreen.show({
            icons: ['😔'],
            title: 'Game Over',
            subtitle: 'All lives lost! Try again?',
            buttons: [{ text: 'Try Again', type: 'primary', action: () => restartGame() }]
          });
          const restartBtn = document.querySelector('.mathai-transition-btn[data-index="0"]');
          if (restartBtn) restartBtn.setAttribute('data-testid', 'btn-restart');
        } catch(e) { console.error('transitionScreen.show failed', e); }
      }

      // Cleanup (RULE-005)
      try { visibilityTracker?.destroy?.(); } catch(e) {}
      try { progressBar?.destroy?.(); } catch(e) {}
      try { FeedbackManager.sound.pause(); } catch(e) {}
      try { FeedbackManager.stream.pauseAll(); } catch(e) {}
    }

    // === Show Results ===
    function showResults(metrics, stars) {
      resultScoreEl.textContent = metrics.accuracy + '%';
      resultTimeEl.textContent = metrics.time + 's';
      resultCorrectEl.textContent = (gameState.score > 0 ? '1' : '0') + '/1';
      resultLivesEl.textContent = String(gameState.lives);

      if (stars > 0) {
        starsDisplayEl.textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
      } else {
        starsDisplayEl.textContent = '☆☆☆';
      }

      if (metrics.accuracy === 100) {
        resultsTitleEl.textContent = 'Puzzle Solved!';
      } else {
        resultsTitleEl.textContent = 'Game Over';
      }

      resultsScreenEl.style.display = 'block';
    }

    // === Restart Game ===
    async function restartGame() {
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.gameEnded = false;
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.userValues = {};
      gameState.cellTagMap = {};
      gameState.dragState = null;
      gameState.pendingEndProblem = null;
      gameState.showingFeedback = false;
      gameState.startTime = null;
      gameState.duration_data = {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0,
        currentTime: null
      };

      gameState.phase = 'start';
      syncDOMState();

      // Re-instantiate SignalCollector
      signalCollector = new SignalCollector({
        sessionId: window.gameVariableState?.sessionId || 'session_' + Date.now(),
        studentId: window.gameVariableState?.studentId || null,
        templateId: gameState.gameId || null
      });
      window.signalCollector = signalCollector;

      // Hide results
      resultsScreenEl.style.display = 'none';
      gameScreenEl.style.display = 'none';

      // Hide popup backdrop
      const bd = document.getElementById('popup-backdrop');
      if (bd) { bd.style.display = 'none'; bd.style.pointerEvents = 'none'; }

      progressBar.update(0, gameState.totalLives);

      try {
        await transitionScreen.show({
          icons: ['🧩'],
          iconSize: 'large',
          title: 'Kakuro',
          subtitle: 'Fill cells so groups sum to clues. No repeats!',
          buttons: [{ text: "Let's Go!", type: 'primary', action: () => startGame() }]
        });
        const startBtn = document.querySelector('.mathai-transition-btn[data-index="0"]');
        if (startBtn) startBtn.setAttribute('data-testid', 'btn-start');
      } catch(e) { console.error('transitionScreen.show failed', e); }
    }

    // === Handle PostMessage (PART-008) ===
    function handlePostMessage(event) {
      try {
        const data = event.data;
        if (!data || !data.type) return;

        switch (data.type) {
          case 'game_init':
            addSentryBreadcrumb('lifecycle', 'game_init postMessage received');
            if (data.content) {
              gameState.content = data.content;
            }
            if (data.variableState) {
              window.gameVariableState = data.variableState;
            }
            gameState.phase = 'playing';
            syncDOMState();
            setupGame();
            break;
        }
      } catch(e) {
        console.error(JSON.stringify({ event: 'postMessage-error', error: e.message }));
        if (typeof Sentry !== 'undefined' && SentryConfig.enabled) { try { Sentry.captureException(e); } catch(se) {} }
      }
    }

    // === Debug Functions (PART-012) ===
    window.debugGame = function() {
      console.log('Game State:', JSON.stringify(gameState, null, 2));
    };

    window.debugAudio = function() {
      try {
        console.log('Audio State:', JSON.stringify({
          sound: FeedbackManager.sound.getState(),
          stream: FeedbackManager.stream.getState()
        }, null, 2));
      } catch(e) {
        console.error(JSON.stringify({ event: 'debug-audio-error', error: e.message }));
      }
    };

    window.testAudio = async function(id) {
      console.log('Testing audio:', id);
      try {
        await FeedbackManager.sound.play(id);
      } catch (e) {
        console.error('Audio test failed:', JSON.stringify({ error: e.message }, null, 2));
      }
    };

    window.testPause = function() {
      if (visibilityTracker) visibilityTracker.triggerInactive();
    };

    window.testResume = function() {
      if (visibilityTracker) visibilityTracker.triggerResume();
    };

    window.testSentry = testSentry;
    window.verifySentry = verifySentry;

    window.debugEventCapture = function() {
      const summary = EventCapture.getSummary();
      console.log('EventCapture Debug:', JSON.stringify(summary, null, 2));
      console.log('All Events:', JSON.stringify(EventCapture.getEvents(), null, 2));
      return summary;
    };

    // === DOMContentLoaded (PART-004) ===
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        await waitForPackages();

        initSentry();
        addSentryBreadcrumb('lifecycle', 'package_loading_complete');

        await FeedbackManager.init();

        // Audio preload (PART-017)
        try {
          await FeedbackManager.sound.preload([
            { id: 'correct_tap', url: 'https://storage.googleapis.com/test-dynamic-assets/mathai-assets/dev/home-explore/document/1757501597903.mp3' },
            { id: 'wrong_tap', url: 'https://storage.googleapis.com/test-dynamic-assets/mathai-assets/dev/home-explore/document/1757501956470.mp3' }
          ]);
        } catch(e) {
          console.error('Sound preload error:', JSON.stringify({ error: e.message }, null, 2));
          if (typeof Sentry !== 'undefined' && SentryConfig.enabled) { try { Sentry.captureException(e); } catch(se) {} }
        }

        try {
          await FeedbackManager.sound.preload([
            { id: 'all_correct', url: 'https://storage.googleapis.com/test-dynamic-assets/mathai-assets/dev/worksheet/audio/ab12c9db-1f0c-4ce3-a215-afc86e385df8.mp3' },
            { id: 'all_incorrect_attempt1', url: 'https://storage.googleapis.com/test-dynamic-assets/mathai-assets/dev/worksheet/audio/b3faaea8-4fc0-4169-ab5e-6699097b8257.mp3' },
            { id: 'all_incorrect_last_attempt', url: 'https://storage.googleapis.com/test-dynamic-assets/mathai-assets/dev/worksheet/audio/6420e861-2213-4855-8992-e3e964fabb29.mp3' }
          ]);
        } catch(e) {
          console.error('Sound preload error:', JSON.stringify({ error: e.message }, null, 2));
          if (typeof Sentry !== 'undefined' && SentryConfig.enabled) { try { Sentry.captureException(e); } catch(se) {} }
        }

        // SignalCollector (PART-010)
        signalCollector = new SignalCollector({
          sessionId: window.gameVariableState?.sessionId || 'session_' + Date.now(),
          studentId: window.gameVariableState?.studentId || null,
          templateId: gameState.gameId || null
        });
        window.signalCollector = signalCollector;

        // EventCapture (PART-036)
        EventCapture.init();

        // ScreenLayout (PART-025)
        ScreenLayout.inject('app', {
          slots: { progressBar: true, transitionScreen: true }
        });

        if (!document.getElementById('gameContent')) {
          throw new Error('ScreenLayout.inject() did not create #gameContent — check slots: wrapper');
        }

        // Clone template
        const tpl = document.getElementById('game-template');
        if (tpl) {
          document.getElementById('gameContent').appendChild(tpl.content.cloneNode(true));
        }

        // Cache DOM elements
        gameScreenEl = document.getElementById('game-screen');
        resultsScreenEl = document.getElementById('results-screen');
        kakuroGridEl = document.getElementById('kakuro-grid');
        tagClusterEl = document.getElementById('tag-cluster');
        feedbackAreaEl = document.getElementById('feedback-area');
        feedbackTextEl = document.getElementById('feedback-text');
        btnCheckEl = document.getElementById('btn-check');
        btnResetEl = document.getElementById('btn-reset');
        starsDisplayEl = document.getElementById('stars-display');
        resultScoreEl = document.getElementById('result-score');
        resultTimeEl = document.getElementById('result-time');
        resultCorrectEl = document.getElementById('result-correct');
        resultLivesEl = document.getElementById('result-lives');
        resultsTitleEl = document.getElementById('results-title');

        // Button event listeners (event delegation alternative: direct)
        if (btnCheckEl) {
          btnCheckEl.addEventListener('click', () => handleSubmit());
        }
        if (btnResetEl) {
          btnResetEl.addEventListener('click', () => resetDragDrop());
        }

        // ProgressBar (PART-023)
        progressBar = new ProgressBarComponent({
          autoInject: true,
          totalRounds: 1,
          totalLives: 3,
          slotId: 'mathai-progress-slot'
        });

        // TransitionScreen (PART-024)
        transitionScreen = new TransitionScreenComponent({
          autoInject: true
        });

        // VisibilityTracker (PART-005)
        visibilityTracker = new VisibilityTracker({
          onInactive: () => {
            const inactiveStart = Date.now();
            gameState.duration_data.inActiveTime.push({ start: inactiveStart });
            if (signalCollector) {
              try {
                signalCollector.pause();
                signalCollector.recordCustomEvent('visibility_hidden', {});
              } catch(e) {}
            }
            if (timer) {
              try { timer.pause({ fromVisibilityTracker: true }); } catch(e) {}
            }
            try { FeedbackManager.sound.pause(); } catch(e) {}
            try { FeedbackManager.stream.pauseAll(); } catch(e) {}
            trackEvent('game_paused', 'system');
          },
          onResume: () => {
            const lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
            if (lastInactive && !lastInactive.end) {
              lastInactive.end = Date.now();
              gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
            }
            if (signalCollector) {
              try {
                signalCollector.resume();
                signalCollector.recordCustomEvent('visibility_visible', {});
              } catch(e) {}
            }
            if (timer && timer.isPaused) {
              try { timer.resume({ fromVisibilityTracker: true }); } catch(e) {}
            }
            try { FeedbackManager.sound.resume(); } catch(e) {}
            try { FeedbackManager.stream.resumeAll(); } catch(e) {}
            trackEvent('game_resumed', 'system');

            // Hide popup backdrop
            const bd = document.getElementById('popup-backdrop');
            if (bd) { bd.style.display = 'none'; bd.style.pointerEvents = 'none'; }
          },
          popupProps: {
            title: 'Game Paused',
            description: 'Click Resume to continue.',
            buttonText: 'Resume'
          }
        });

        window.addEventListener('message', handlePostMessage);

        // Expose to window
        window.gameState = gameState;
        window.endGame = endGame;
        window.restartGame = restartGame;
        window.nextRound = function() {};
        window.loadRound = function() {};
        window.calcStars = calcStars;
        window.visibilityTracker = visibilityTracker;
        window.timer = timer;

        // Show start screen
        gameState.phase = 'start';
        syncDOMState();

        await transitionScreen.show({
          icons: ['🧩'],
          iconSize: 'large',
          title: 'Kakuro',
          subtitle: 'Fill cells so groups sum to clues. No repeats!',
          buttons: [{ text: "Let's Go!", type: 'primary', action: () => startGame() }]
        });

        const startBtn = document.querySelector('.mathai-transition-btn[data-index="0"]');
        if (startBtn) startBtn.setAttribute('data-testid', 'btn-start');

      } catch (error) {
        console.error('Init error: ' + error.message);
        window.__initError = error.message;
        if (typeof Sentry !== 'undefined' && typeof SentryConfig !== 'undefined' && SentryConfig.enabled) {
          try { Sentry.captureException(error); } catch(se) {}
        }
      }
    });
  </script>

<script id="ralph-test-harness">
// ─── Ralph Test Harness (injected by pipeline) ───────────────────────────────
// Provides test shortcuts via window.__ralph. Does NOT change game behavior.
// Spec metadata: interactionType=drag
(function() {
  'use strict';

  // ── Audio permission popup auto-dismiss ──────────────────────────────────────
  // FeedbackManager (CDN) shows a "Permission to play audio" popup when AudioContext
  // is suspended in headless Playwright. The popup blocks ALL game interactions until
  // the user clicks "Okay!". Intercept PopupComponent.show and auto-trigger primaryClick
  // for audio popups so tests never see the blocking overlay.
  (function patchPopupComponentForAudio() {
    let _pc;
    function wrapShow(v) {
      if (v && typeof v.show === 'function' && !v.__audioPatchApplied) {
        const orig = v.show.bind(v);
        v.show = function(args) {
          const isAudioPopup = args && (
            (args.title && args.title.toLowerCase().includes('audio')) ||
            (args.description && args.description.toLowerCase().includes('sound'))
          );
          if (isAudioPopup && typeof args.primaryClick === 'function') {
            // Auto-dismiss: simulate user clicking "Okay!" after a short delay
            setTimeout(args.primaryClick, 30);
          }
          return orig(args);
        };
        v.__audioPatchApplied = true;
      }
    }
    Object.defineProperty(window, 'PopupComponent', {
      configurable: true,
      enumerable: true,
      set: function(v) { _pc = v; wrapShow(_pc); },
      get: function() { return _pc; },
    });
  })();

  // PostMessage capture — intercept to record last message for contract tests
  window.__lastPostMessage = null;
  try {
    const _orig = window.parent.postMessage.bind(window.parent);
    window.parent.postMessage = function(data, origin) {
      window.__lastPostMessage = typeof data === 'object' ? JSON.parse(JSON.stringify(data)) : data;
      _orig(data, origin);
    };
  } catch(e) { /* cross-origin parent — ignore */ }

  // syncDOMState — called after every game state change
  // Keeps data-phase/data-lives/data-round/data-score on #app up to date
  function syncDOMState() {
    const root = document.getElementById('app');
    if (!root) return;
    const gs = window.gameState;
    if (!gs) return;
    // If game tracks its own phase (CDN games use gameState.phase directly), trust it.
    // Normalize phase names to canonical set: start, playing, transition, gameover, results
    // Gemini-generated games tend to use: game_init → start, game_over → gameover,
    // game_complete → results, start_screen → start, game_playing → playing
    // Some games use bare 'init' as the initial phase (exact match only)
    const rawPhase = gs.phase
                   ? gs.phase
                       .replace('game_over', 'gameover')
                       .replace('game_complete', 'results')
                       .replace('start_screen', 'start')
                       .replace('game_init', 'start')
                       .replace('game_playing', 'playing')
                       .replace(/^init$/, 'start')
                   : null;
    root.dataset.phase = rawPhase
                       ? rawPhase
                       : gs.completed ? 'results'
                       : gs.isActive === false ? 'start'
                       : gs.isGameOver ? 'gameover'
                       : 'playing';
    if (gs.currentRound !== undefined) root.dataset.round = gs.currentRound;
    if (gs.lives !== undefined) root.dataset.lives = gs.lives;
    if (gs.score !== undefined) root.dataset.score = gs.score;
    if (gs.level !== undefined) root.dataset.level = gs.level;
    if (gs.stars !== undefined && gs.stars !== null) root.dataset.stars = gs.stars;
    // Sync data-lives on CDN progress display element too
    const livesEl = document.querySelector('[data-testid="display-lives"], [data-testid="lives-display"]');
    if (livesEl && gs.lives !== undefined) livesEl.dataset.lives = gs.lives;
  }

  // Patch the game's own roundComplete/endGame/loadRound to call syncDOMState
  // This ensures data-* attributes are always current after state changes
  function patchGameFunctions() {
    const toWrap = ['roundComplete', 'endGame', 'loadRound', 'initGame', 'checkAnswer', 'handleSubmit'];
    for (const fn of toWrap) {
      if (typeof window[fn] === 'function' && !window[fn].__ralphPatched) {
        const orig = window[fn];
        window[fn] = function(...args) {
          const result = orig.apply(this, args);
          if (result && typeof result.then === 'function') {
            result.then(syncDOMState).catch(() => {});
          } else {
            syncDOMState();
          }
          return result;
        };
        window[fn].__ralphPatched = true;
      }
    }
  }

  window.__ralph = {
    answer(correct = true) {
      // Drag games: simulate drop by calling the game's answer handler directly
      if (window.handleDrop) { window.handleDrop(correct); return true; }
      if (window.checkAnswer) { window.checkAnswer(correct); return true; }
      return false;
    },

    endGame(reason) {
      reason = reason || 'victory';
      if (window.endGame && !window.endGame.__ralphPatched) window.endGame(reason);
      else if (window.endGame) window.endGame(reason);
      syncDOMState();
    },

    restartGame() {
      if (typeof window.restartGame === 'function') window.restartGame();
      syncDOMState();
    },

    jumpToRound(n) {
      if (window.gameState) { window.gameState.currentRound = n; window.gameState.isActive = true; }
      // Try game-specific round-loading functions in priority order
      if (typeof window.loadRound === 'function') window.loadRound(n);
      else if (typeof window.jumpToRound === 'function') window.jumpToRound(n);
      else if (typeof window.loadQuestion === 'function') window.loadQuestion(n);
      else if (typeof window.goToRound === 'function') window.goToRound(n);
      syncDOMState();
    },

    setLives(n) {
      if (window.gameState) window.gameState.lives = n;
      if (window.progressBar) {
        try { window.progressBar.update(window.gameState.currentRound || 0, n); } catch(e) {}
      }
      syncDOMState();
    },

    setRoundTimes(timesMs) {
      if (window.gameState) {
        window.gameState.roundTimes = timesMs;
        window.gameState.roundStartTime = Date.now();
        const totalMs = timesMs.reduce((a, b) => a + b, 0);
        window.gameState.startTime = window.gameState.startTime || (Date.now() - totalMs);
      }
    },

    getState() {
      const root = document.getElementById('app');
      const gs = window.gameState || {};
      return {
        phase: root ? root.dataset.phase || 'unknown' : 'unknown',
        round: gs.currentRound ?? 0,
        totalRounds: gs.totalRounds ?? 0,
        lives: gs.lives ?? null,
        score: gs.score ?? 0,
        stars: gs.stars ?? null,
        isActive: gs.isActive ?? false,
        completed: gs.completed ?? false,
      };
    },

    getLastPostMessage() { return window.__lastPostMessage || null; },

    syncDOMState,
  };

  // Patch game functions and sync state continuously
  // CDN games initialize asynchronously (may take 5-60s), so we poll periodically
  function patchAndSync() {
    patchGameFunctions();
    syncDOMState(); // capture current state immediately after patching
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(patchAndSync, 200);
    });
  } else {
    setTimeout(patchAndSync, 200);
  }

  // Keep syncing every 500ms for the first 90s (covers CDN async init)
  // This ensures data-phase stays current even when patchGameFunctions
  // didn't fire before the game's initGame() ran
  const syncInterval = setInterval(function() {
    syncDOMState();
  }, 500);
  setTimeout(function() { clearInterval(syncInterval); }, 90000);

  // Also patch after CDN scripts load (they replace window functions)
  window.addEventListener('load', function() {
    setTimeout(patchAndSync, 500);
    setTimeout(patchAndSync, 2000);
    // Diagnostic: warn if required game functions are not exposed on window
    var required = ['endGame', 'restartGame'];
    required.forEach(function(fn) {
      if (typeof window[fn] !== 'function') {
        console.error('[ralph-test-harness] MISSING window.' + fn + ': this function is not exposed on window. Tests calling window.__ralph.' + fn + '() will fail silently. Fix: add window.' + fn + ' = ' + fn + '; in the game code (after the function definition, in global scope or at end of DOMContentLoaded).');
      }
    });
    // nextRound check: accept loadRound or jumpToRound as valid aliases (TE-F6)
    var hasRoundNav = (
      typeof window.nextRound === 'function' ||
      typeof window.loadRound === 'function' ||
      typeof window.jumpToRound === 'function'
    );
    if (!hasRoundNav) {
      console.error('[ralph-test-harness] MISSING window.nextRound / window.loadRound / window.jumpToRound — at least one must be defined for round navigation tests. Fix: expose one of these on window in the game code.');
    }
  });
})();
</script>
