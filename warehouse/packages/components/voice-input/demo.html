<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VoiceInput Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f6fa; color: #333;
    min-height: 100vh; padding: 24px 16px;
  }
  .page { max-width: 480px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }
  .card {
    background: #fff; border-radius: 16px; padding: 20px;
    margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .card-title {
    font-size: 15px; font-weight: 600; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title .badge {
    font-size: 11px; font-weight: 500; padding: 2px 8px;
    border-radius: 20px; background: #e8edfb; color: #667ee4;
  }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .ctrl-btn {
    padding: 8px 14px; font-size: 13px; font-weight: 500;
    border: 1px solid #ddd; border-radius: 8px;
    background: #fff; cursor: pointer; transition: all .15s;
  }
  .ctrl-btn:hover { background: #f0f0f0; }
  .ctrl-btn.success { background: #219653; color: #fff; border-color: #219653; }
  .ctrl-btn.danger { background: #e74c3c; color: #fff; border-color: #e74c3c; }
  .result {
    margin-top: 12px; padding: 12px; border-radius: 8px;
    background: #f8f9fa; font-size: 14px; min-height: 40px;
  }
  .result.correct { background: #e6f9ee; color: #219653; }
  .result.wrong { background: #fde8e8; color: #e74c3c; }
  .result-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .log {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px; background: #1e1e2e; color: #cdd6f4;
    border-radius: 10px; padding: 12px; max-height: 200px;
    overflow-y: auto; line-height: 1.6;
  }
  .log:empty::before { content: 'Events will appear here...'; color: #585b70; }
</style>
</head>
<body>

<div class="page">
  <h1>VoiceInput Demo</h1>
  <p class="subtitle">Serve this page from <code>http://localhost</code> or <code>https</code>, then tap the mic in the toolbar and speak.</p>

  <!-- Demo 1: Basic voice input -->
  <div class="card">
    <div class="card-title">
      Voice Input
      <span class="badge">Tap mic to record</span>
    </div>
    <div id="demo-basic"></div>
  </div>

  <!-- Demo 2: Math answer -->
  <div class="card">
    <div class="card-title">
      Math Answer
      <span class="badge">Voice or type</span>
    </div>
    <div style="font-size:28px; font-weight:700; text-align:center; padding:12px 0; color:#667ee4;">
      18 &times; 4 = ?
    </div>
    <div id="demo-math"></div>
    <div class="controls">
      <button class="ctrl-btn success" onclick="checkMath()">Check Answer</button>
      <button class="ctrl-btn" onclick="resetMath()">Reset</button>
    </div>
    <div class="result" id="result-math">
      <div class="result-label">Speak or type your answer, then click Check</div>
    </div>
  </div>

  <!-- Demo 3: API controls -->
  <div class="card">
    <div class="card-title">
      Programmatic Controls
      <span class="badge">API demo</span>
    </div>
    <div id="demo-api"></div>
    <div class="controls">
      <button class="ctrl-btn" onclick="apiVI.setValue('Hello from code!')">Set Text</button>
      <button class="ctrl-btn" onclick="apiVI.clear()">Clear</button>
      <button class="ctrl-btn success" onclick="apiVI.markCorrect()">Mark Correct</button>
      <button class="ctrl-btn danger" onclick="apiVI.markWrong()">Mark Wrong</button>
      <button class="ctrl-btn" onclick="apiVI.clearMark()">Clear Mark</button>
      <button class="ctrl-btn" onclick="apiVI.disable()">Disable</button>
      <button class="ctrl-btn" onclick="apiVI.enable()">Enable</button>
      <button class="ctrl-btn" onclick="apiVI.highlight()">Highlight</button>
      <button class="ctrl-btn" onclick="apiVI.unhighlight()">Unhighlight</button>
    </div>
  </div>

  <!-- Event log -->
  <div class="card">
    <div class="card-title">
      Event Log
      <button class="ctrl-btn" style="margin-left:auto; font-size:11px; padding:4px 10px;" onclick="document.getElementById('log').innerHTML=''">Clear</button>
    </div>
    <div class="log" id="log"></div>
  </div>
</div>

<script src="index.js"></script>
<script>
var logEl = document.getElementById('log');

function log(source, event, data) {
  var time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  var line = document.createElement('div');
  var dataStr = data ? ' ' + JSON.stringify(data) : '';
  line.innerHTML = '<span style="color:#585b70">' + time + '</span> <span style="color:#89b4fa">[' + source + '] ' + event + '</span><span style="color:#a6e3a1">' + dataStr + '</span>';
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function hookEvents(vi, name) {
  ['input_change', 'transcript', 'error', 'permission_change'].forEach(function(evt) {
    vi.on(evt, function(d) { log(name, evt, d); });
  });
}

// Demo 1: Basic
var basicVI = new VoiceInput('demo-basic', {
  placeholder: 'Tap mic or type here...',
  tools: ['mic', 'keyboard', 'reset'],
  defaultTool: 'mic',
});
hookEvents(basicVI, 'basic');

// Demo 2: Math
var mathVI = new VoiceInput('demo-math', {
  placeholder: 'Say or type your answer...',
  tools: ['mic', 'keyboard'],
  defaultTool: 'mic',
});
hookEvents(mathVI, 'math');

function checkMath() {
  var answer = mathVI.getValue().trim();
  var num = parseInt(answer.replace(/[^0-9-]/g, ''));
  var el = document.getElementById('result-math');
  if (isNaN(num)) {
    el.className = 'result wrong';
    el.innerHTML = '<div class="result-label">Could not parse a number</div>You said: "' + answer + '"';
    mathVI.markWrong();
    return;
  }
  if (num === 72) {
    el.className = 'result correct';
    el.innerHTML = '<div class="result-label">Correct!</div>18 &times; 4 = ' + num + ' &#10003;';
    mathVI.markCorrect();
    mathVI.disable();
  } else {
    el.className = 'result wrong';
    el.innerHTML = '<div class="result-label">Not quite</div>You answered ' + num + ', but 18 &times; 4 = 72';
    mathVI.markWrong();
  }
}

function resetMath() {
  mathVI.clear();
  mathVI.clearMark();
  mathVI.enable();
  var el = document.getElementById('result-math');
  el.className = 'result';
  el.innerHTML = '<div class="result-label">Speak or type your answer, then click Check</div>';
}

// Demo 3: API
var apiVI = new VoiceInput('demo-api', {
  placeholder: 'Controlled via buttons below...',
  tools: ['mic', 'keyboard', 'reset'],
});
hookEvents(apiVI, 'api');
</script>

</body>
</html>
