<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Audio Mental Addition</title>

  <!-- ====== 1. SentryConfig package (MUST be first script) ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

  <!-- ====== 2. initSentry() definition (inline) ====== -->
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({
        release: 'audio-mental-addition@1.0.0'
      }));
    }
  </script>

  <!-- ====== 3. Sentry SDK (3 scripts, NO integrity attribute) ====== -->
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

  <!-- ====== 4. Initialize Sentry on load ====== -->
  <script>window.addEventListener('load', initSentry);</script>

  <!-- ====== 5-7. Game CDN packages (exact order) ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    /* 1. :root variables */
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;
      --mathai-primary: #270f36;
      --mathai-level-text: #270F63;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;
      --mathai-padding-large: 56px 40px;
      --mathai-padding-medium: 16px 24px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;
    }

    /* 2. Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* 3. html, body */
    html, body {
      width: 100%;
      height: 100dvh;
      overflow-x: hidden;
      overflow-y: hidden;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }

    @supports not (height: 100dvh) {
      html, body { height: 100vh; }
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }

    /* 4. Hidden utility */
    .hidden { display: none !important; }

    /* 5. Results screen */
    #results-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      background: var(--mathai-white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* 6. #app layout */
    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    /* Re-enable select on inputs */
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }

    /* Game header */
    .game-header {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }

    .question-label {
      font-size: var(--mathai-font-size-subtitle);
      font-weight: 700;
      color: var(--mathai-primary);
    }

    .star-counter {
      font-size: var(--mathai-font-size-subtitle);
      font-weight: 600;
      color: var(--mathai-orange);
    }

    /* Instructions */
    .instructions-text {
      text-align: center;
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-gray);
      padding: 0 16px;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* Audio player area */
    .audio-player-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px;
      margin-bottom: 16px;
    }

    .audio-player-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      width: 100%;
      max-width: 320px;
      background: var(--mathai-light-gray);
      border-radius: var(--mathai-border-radius-card);
      padding: 12px 16px;
    }

    .play-btn {
      min-height: 48px;
      min-width: 48px;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: var(--mathai-purple);
      color: var(--mathai-white);
      font-size: 22px;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-right: 12px;
    }

    .play-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      cursor: not-allowed;
    }

    .play-btn.playing {
      background: var(--mathai-orange);
    }

    .audio-timeline {
      flex: 1;
      height: 6px;
      background: var(--mathai-border-gray);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .audio-timeline-fill {
      height: 100%;
      background: var(--mathai-purple);
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .play-count-label {
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      margin-left: 12px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* Tooltip for max plays */
    .play-tooltip {
      background: var(--mathai-cell-bg-yellow);
      color: var(--mathai-orange);
      font-size: var(--mathai-font-size-small);
      padding: 8px 12px;
      border-radius: var(--mathai-border-radius-small);
      margin-top: 8px;
      text-align: center;
      max-width: 320px;
      line-height: 1.4;
    }

    /* Caption area */
    .caption-area {
      min-height: 48px;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      margin-bottom: 12px;
    }

    .caption-item {
      font-size: var(--mathai-font-size-large);
      font-weight: 700;
      color: var(--mathai-primary);
      margin-right: 8px;
      margin-bottom: 4px;
      animation: fadeIn 0.35s ease;
    }

    /* Input area */
    .input-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px;
      margin-bottom: 16px;
    }

    .answer-input {
      width: 100%;
      max-width: 280px;
      min-height: 48px;
      border: 2px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-button);
      font-size: 20px;
      text-align: center;
      padding: 12px 16px;
      font-family: var(--mathai-font-family);
      color: var(--mathai-primary);
      background: var(--mathai-white);
      -webkit-appearance: none;
      appearance: none;
      outline: none;
      touch-action: manipulation;
    }

    .answer-input:focus {
      border-color: var(--mathai-purple);
    }

    .answer-input.input-correct {
      border-color: var(--mathai-success);
      background: var(--mathai-cell-bg-green);
    }

    .answer-input.input-wrong {
      border-color: var(--mathai-error);
      background: var(--mathai-cell-bg-red);
    }

    /* Button area */
    .button-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px;
      margin-bottom: 16px;
    }

    .submit-btn,
    .next-btn {
      min-height: 48px;
      min-width: 200px;
      border: none;
      border-radius: var(--mathai-border-radius-button);
      font-size: var(--mathai-font-size-button);
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      padding: 12px 32px;
    }

    .submit-btn {
      background: var(--mathai-purple);
      color: var(--mathai-white);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      cursor: not-allowed;
    }

    .next-btn {
      background: var(--mathai-blue);
      color: var(--mathai-white);
    }

    /* Feedback text area */
    .feedback-area {
      min-height: 48px;
      padding: 0 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    .feedback-text {
      font-size: var(--mathai-font-size-body);
      font-weight: 600;
      line-height: 1.5;
      animation: fadeIn 0.35s ease;
    }

    .feedback-text.correct {
      color: var(--mathai-success);
    }

    .feedback-text.wrong {
      color: var(--mathai-error);
    }

    /* Results screen inner */
    .results-inner {
      text-align: center;
      max-width: 340px;
      width: 100%;
    }

    .results-stars {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .results-star {
      display: inline-block;
      opacity: 0;
    }

    .results-title {
      font-size: var(--mathai-font-size-title);
      font-weight: 700;
      color: var(--mathai-primary);
      margin-bottom: 8px;
    }

    .results-score {
      font-size: var(--mathai-font-size-subtitle);
      color: var(--mathai-gray);
      margin-bottom: 8px;
    }

    .results-message {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-text-primary);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .results-rounds {
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      margin-bottom: 24px;
    }

    .restart-btn {
      min-height: 48px;
      min-width: 200px;
      border: none;
      border-radius: var(--mathai-border-radius-button);
      background: var(--mathai-purple);
      color: var(--mathai-white);
      font-size: var(--mathai-font-size-button);
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      padding: 12px 32px;
    }

    /* Touch targets */
    button,
    [role="button"],
    input[type="submit"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    /* Landscape overlay */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white, #ffffff);
        color: var(--mathai-primary, #270f36);
        font-family: var(--mathai-font-family, system-ui, -apple-system, sans-serif);
        font-size: var(--mathai-font-size-subtitle, 18px);
        text-align: center;
        padding: 24px;
      }
    }

    /* Micro-animations */
    @keyframes scoreBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes starPop {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    @keyframes heartBreak {
      0% { transform: scale(1); opacity: 1; }
      30% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.5); opacity: 0; color: var(--mathai-red); }
    }

    @keyframes streakGlow {
      0% { box-shadow: 0 0 0 rgba(255, 193, 7, 0); }
      50% { box-shadow: 0 0 16px rgba(255, 193, 7, 0.5); }
      100% { box-shadow: 0 0 0 rgba(255, 193, 7, 0); }
    }

    @keyframes confettiFall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .score-bounce { animation: scoreBounce 0.4s ease; }
    .shake-wrong { animation: shake 0.5s ease; }
    .heart-break { animation: heartBreak 0.6s ease forwards; }
    .star-earned { animation: starPop 0.4s ease forwards; }
    .streak-glow { animation: streakGlow 0.6s ease; }
    .fade-in { animation: fadeIn 0.35s ease; }

    /* Wrong/correct visual feedback */
    .selected-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-red);
      color: var(--mathai-red);
    }

    .selected-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-green);
      color: var(--mathai-green);
    }

    .correct-reveal {
      font-size: 15px;
      font-weight: 600;
      color: var(--mathai-green);
      text-align: center;
      margin-top: 8px;
      animation: fadeIn 0.35s ease;
    }

    .correct-reveal.hidden {
      display: none;
    }

    /* Drag-and-Drop */
    .drop-zone-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px;
      margin-bottom: 12px;
    }

    .drop-zone-label {
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      margin-bottom: 8px;
      text-align: center;
    }

    .answer-drop-zone {
      width: 100%;
      max-width: 280px;
      min-height: 60px;
      border: 2.5px dashed var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-button);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--mathai-light-gray);
      transition: border-color 0.2s, background 0.2s;
    }

    .answer-drop-zone.hover {
      border-color: var(--mathai-purple);
      background: #f3e8ff;
    }

    .answer-drop-zone.zone-correct {
      border-color: var(--mathai-success);
      background: var(--mathai-cell-bg-green);
    }

    .answer-drop-zone.zone-wrong {
      border-color: var(--mathai-error);
      background: var(--mathai-cell-bg-red);
    }

    .tag-bank {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 8px 16px;
      margin-bottom: 16px;
      min-height: 48px;
    }

    .drag-tag {
      min-height: 48px;
      min-width: 72px;
      padding: 10px 20px;
      border: 2px solid var(--mathai-purple);
      border-radius: var(--mathai-border-radius-button);
      background: var(--mathai-white);
      color: var(--mathai-primary);
      font-size: 20px;
      font-weight: 700;
      font-family: var(--mathai-font-family);
      text-align: center;
      cursor: grab;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .drag-tag:active, .drag-tag.dragging {
      cursor: grabbing;
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
      opacity: 0.92;
    }

    .drag-tag.in-zone {
      border-color: var(--mathai-purple);
      background: #f3e8ff;
    }

    .drag-tag.tag-correct {
      border-color: var(--mathai-success) !important;
      background: var(--mathai-cell-bg-green) !important;
      color: var(--mathai-success) !important;
    }

    .drag-tag.tag-wrong {
      border-color: var(--mathai-error) !important;
      background: var(--mathai-cell-bg-red) !important;
      color: var(--mathai-error) !important;
    }

    .drag-tag.tag-disabled {
      opacity: 0.5;
      pointer-events: none;
      cursor: not-allowed;
    }

    /* Disabled state */
    .option-btn:disabled,
    .option-btn.disabled {
      opacity: 0.6;
      pointer-events: none;
      cursor: not-allowed;
    }
  </style>
</head>

    /* ====== 4. Module-scope vars ====== */
    var timer = null;

    /* Sticker URLs */
    var CORRECT_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var INCORRECT_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var ROUND_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var VICTORY_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var COMPLETE_2_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var COMPLETE_1_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var GAMEOVER_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';

    /* DOM refs (cached after init) */
    var elApp = null;
    var elGameContent = null;
    /* elAudioModal removed — using FeedbackManager.canPlayAudio() + TransitionScreen */
    var elHeader = null;
    var elQuestionLabel = null;
    var elStarCounter = null;
    var elInstructions = null;
    var elPlayBtn = null;
    var elTimeline = null;
    var elTimelineFill = null;
    var elPlayCountLabel = null;
    var elPlayTooltip = null;
    var elCaptionArea = null;
    var elDropZone = null;
    var elTagBank = null;
    var elSubmitBtn = null;
    var elNextBtn = null;
    var elFeedbackArea = null;
    var elFeedbackText = null;
    var elResultsScreen = null;
    var elGameplayArea = null;

    /* ====== 5. syncDOM ====== */
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-round', gameState.currentRound);
    }

    /* ====== 6. trackEvent ====== */
    function trackEvent(type, data) {
      var evt = {
        type: type,
        timestamp: Date.now(),
        data: data || {}
      };
      gameState.events.push(evt);
      if (signalCollector && typeof signalCollector.recordCustomEvent === 'function') {
        try { signalCollector.recordCustomEvent(type, data || {}); } catch(e) {}
      }
    }

    /* ====== 7. recordAttempt ====== */
    function recordAttempt(roundIndex, userInput, correct, metadata) {
      var round = getRounds()[roundIndex];
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
        input_of_user: userInput,
        correct: correct,
        round_number: roundIndex + 1,
        question_id: round.id || ('r' + (roundIndex + 1)),
        correct_answer: round.correctAnswer,
        response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
        misconception_tag: correct ? null : (metadata.misconception_tag || null),
        difficulty_level: round.difficulty || round.stage || 1,
        is_retry: metadata.is_retry || false,
        metadata: metadata || {}
      };
      gameState.attempts.push(attempt);
      gameState.duration_data.attempts.push({
        round: roundIndex + 1,
        timestamp: Date.now()
      });
    }

    /* ====== 8. getStars ====== */
    function getStars(score) {
      var total = gameState.totalRounds;
      if (score >= Math.ceil(total * 0.9)) return 3;
      if (score >= Math.ceil(total * 0.6)) return 2;
      if (score >= 1) return 1;
      return 0;
    }
    window.calcStars = getStars;

    /* ====== 9. getRounds ====== */
    function getRounds() {
      if (gameState.content && gameState.content.rounds &&
          gameState.content.rounds.length >= gameState.totalRounds) {
        return gameState.content.rounds;
      }
      return fallbackContent.rounds;
    }

    /* ====== 10. waitForPackages ====== */
    function waitForPackages() {
      return new Promise(function(resolve, reject) {
        var timeout = 180000;
        var interval = 50;
        var elapsed = 0;
        var check = setInterval(function() {
          elapsed += interval;
          if (typeof FeedbackManager !== 'undefined' &&
              typeof TimerComponent !== 'undefined' &&
              typeof VisibilityTracker !== 'undefined' &&
              typeof SignalCollector !== 'undefined') {
            clearInterval(check);
            resolve();
          } else if (elapsed >= timeout) {
            clearInterval(check);
            document.body.innerHTML = '<div style="padding:40px;text-align:center;font-size:18px;">Failed to load game packages. Please refresh.</div>';
            reject(new Error('Package load timeout'));
          }
        }, interval);
      });
    }

    /* ====== 11. handlePostMessage ====== */
    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      if (event.data.type === 'game_init') {
        gameState.phase = 'playing';
        syncDOM();
        var data = event.data.data || event.data;
        if (data && data.content) {
          gameState.content = data.content;
        }
        var config = event.data.config || (data && data.config) || {};
        if (config.signalConfig && signalCollector) {
          try {
            signalCollector.playId = config.signalConfig.playId || '';
            signalCollector.gameId = config.signalConfig.gameId || gameState.gameId;
            signalCollector.sessionId = config.signalConfig.sessionId || '';
            signalCollector.contentSetId = config.signalConfig.contentSetId || '';
            signalCollector.studentId = config.signalConfig.studentId || '';
            signalCollector.flushUrl = config.signalConfig.flushUrl || '';
            if (typeof signalCollector.startFlushing === 'function') {
              signalCollector.startFlushing();
            }
          } catch(e) {}
        }
        setupGame();
      }
    }

    /* ====== 12. setupGame ====== */
    function setupGame() {
      gameState.phase = 'gameplay';
      syncDOM();
      startGame();
    }

    /* ====== 13. startGame ====== */
    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = Date.now();
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.streak = 0;
      gameState.consecutiveWrongs = 0;
      gameState.phase = 'gameplay';
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();

      if (progressBar) {
        try { progressBar.destroy(); } catch(e) {}
      }
      try {
        progressBar = new ProgressBarComponent({
          slotId: 'mathai-progress-slot',
          totalRounds: gameState.totalRounds,
          totalLives: 0
        });
        progressBar.update(0, 0);
      } catch(e) {
        console.error('[progressBar] ' + e.message);
      }

      showRoundTransition();
    }

    /* ====== Round transition screen ====== */
    async function showRoundTransition() {
      var roundNum = gameState.currentRound + 1;

      /* Wait for audio permission on first round */
      if (!gameState.audioPermissionGranted) {
        try {
          await new Promise(function(resolve) {
            if (FeedbackManager.canPlayAudio()) return resolve();
            var check = setInterval(function() {
              if (FeedbackManager.canPlayAudio()) { clearInterval(check); resolve(); }
            }, 200);
            setTimeout(function() { clearInterval(check); resolve(); }, 15000);
          });
        } catch(e) {}
        gameState.audioPermissionGranted = true;
      }

      /* Show transition screen */
      if (transitionScreen) {
        var audioStopped = false;

        transitionScreen.show({
          title: 'Round ' + roundNum,
          subtitle: roundNum <= 3 ? 'Add 2 numbers' : (roundNum <= 7 ? 'Add 3 numbers' : 'Add 4 numbers'),
          duration: 0,
          persist: true,
          buttons: [{
            text: 'Start',
            type: 'primary',
            action: function() {
              audioStopped = true;
              try {
                FeedbackManager.sound.pause();
                FeedbackManager._stopCurrentDynamic();
              } catch(e) {}
              transitionScreen.hide();
              loadRound();
            }
          }]
        });

        /* Play round transition audio: SFX then VO */
        try {
          await withTimeout(FeedbackManager.sound.play('rounds_sound_effect', { sticker: ROUND_STICKER }), 8000);
          if (audioStopped) return;
          await withTimeout(FeedbackManager.playDynamicFeedback({
            audio_content: 'Round ' + roundNum,
            subtitle: 'Round ' + roundNum,
            sticker: ROUND_STICKER
          }), 8000);
        } catch(e) {}

        /* If student hasn't tapped Start yet, auto-dismiss after audio */
        if (!audioStopped) {
          transitionScreen.hide();
          loadRound();
        }
      } else {
        /* Fallback if TransitionScreen not available */
        loadRound();
      }
    }

    /* ====== 14. loadRound ====== */
    function loadRound() {
      gameState.isProcessing = false;
      gameState.isActive = true;
      syncDOM();

      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      if (!round) return;

      gameState.correctAnswer = round.correctAnswer;
      gameState.playCount = 0;
      gameState.audioPlaying = false;
      gameState.roundStartTime = Date.now();
      syncDOM();

      renderRound(round);
    }

    /* ====== 15. renderRound ====== */
    function renderRound(round) {
      if (elQuestionLabel) elQuestionLabel.textContent = round.questionLabel || ('Q' + (gameState.currentRound + 1));
      if (elStarCounter) elStarCounter.textContent = gameState.score + '/10 \u2B50';

      if (elInstructions) elInstructions.innerHTML = 'Numbers are read one by one in the audio below.<br>Add them mentally and write the total.<br>You can play the audio ONLY 2 times.';

      if (elPlayBtn) {
        elPlayBtn.disabled = false;
        elPlayBtn.classList.remove('playing');
        elPlayBtn.innerHTML = '&#9654;';
      }
      if (elTimelineFill) elTimelineFill.style.width = '0%';
      if (elPlayCountLabel) elPlayCountLabel.textContent = '0/2 plays';
      if (elPlayTooltip) elPlayTooltip.classList.add('hidden');
      if (elCaptionArea) elCaptionArea.innerHTML = '';
      if (elAnswerInput) {
        elAnswerInput.value = '';
        elAnswerInput.disabled = false;
        elAnswerInput.classList.remove('input-correct', 'input-wrong');
      }
      if (elSubmitBtn) elSubmitBtn.classList.add('hidden');
      if (elNextBtn) elNextBtn.classList.add('hidden');
      if (elFeedbackText) {
        elFeedbackText.textContent = '';
        elFeedbackText.className = 'feedback-text';
      }
      if (elGameplayArea) {
        elGameplayArea.classList.remove('hidden');
        elGameplayArea.classList.add('fade-in');
      }
    }

    /* ====== 16. playAudio ====== */
    async function playAudio() {
      if (gameState.isProcessing) return;
      if (gameState.audioPlaying) return;
      if (gameState.playCount >= 2) {
        if (elPlayTooltip) {
          elPlayTooltip.textContent = 'You have already played the audio 2 times! Please write the total.';
          elPlayTooltip.classList.remove('hidden');
        }
        if (elPlayBtn) elPlayBtn.disabled = true;
        return;
      }

      gameState.audioPlaying = true;
      if (elPlayBtn) {
        elPlayBtn.classList.add('playing');
        elPlayBtn.innerHTML = '&#9724;';
      }
      if (elCaptionArea) elCaptionArea.innerHTML = '';

      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      if (!round) {
        gameState.audioPlaying = false;
        return;
      }

      var numbers = round.numbers;
      var captions = round.captions;
      var totalSteps = numbers.length;
      var useFallbackSpeech = false;

      for (var i = 0; i < numbers.length; i++) {
        if (elTimelineFill) {
          elTimelineFill.style.width = Math.round(((i + 1) / totalSteps) * 100) + '%';
        }

        /* Captions removed — audio-only, no visual numbers shown */

        var textToSpeak = String(numbers[i]);
        if (i > 0) textToSpeak = 'plus ' + String(numbers[i]);

        if (!useFallbackSpeech) {
          try {
            await withTimeout(FeedbackManager.playDynamicFeedback({
              audio_content: textToSpeak,
              subtitle: captions[i]
            }), 8000);
          } catch(e) {
            console.error('[audio] Dynamic feedback failed, using speechSynthesis fallback:', e.message);
            useFallbackSpeech = true;
            try {
              await speakWithSpeechSynthesis(textToSpeak);
            } catch(se) {}
          }
        } else {
          try {
            await speakWithSpeechSynthesis(textToSpeak);
          } catch(se) {}
        }
      }

      gameState.playCount++;
      gameState.audioPlaying = false;

      if (elPlayBtn) {
        elPlayBtn.classList.remove('playing');
        elPlayBtn.innerHTML = '&#9654;';
      }
      if (elPlayCountLabel) elPlayCountLabel.textContent = gameState.playCount + '/2 plays';

      if (gameState.playCount >= 2) {
        if (elPlayBtn) elPlayBtn.disabled = true;
        if (elPlayTooltip) {
          elPlayTooltip.textContent = 'You have already played the audio 2 times! Please write the total.';
          elPlayTooltip.classList.remove('hidden');
        }
      }
    }

    /* ====== timeout wrapper for FeedbackManager calls ====== */
    function withTimeout(promise, ms) {
      return Promise.race([
        promise,
        new Promise(function(resolve) { setTimeout(resolve, ms); })
      ]);
    }

    /* ====== speechSynthesis fallback ====== */
    function speakWithSpeechSynthesis(text) {
      return new Promise(function(resolve) {
        if (typeof speechSynthesis === 'undefined') {
          resolve();
          return;
        }
        var utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-IN';
        utterance.rate = 0.9;
        utterance.onend = function() { resolve(); };
        utterance.onerror = function() { resolve(); };
        speechSynthesis.speak(utterance);
        setTimeout(function() { resolve(); }, 5000);
      });
    }

    /* ====== 17. handleSubmit (answer handler) ====== */
    async function handleSubmit() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      if (!elAnswerInput) return;

      var userInput = elAnswerInput.value.trim();
      if (userInput === '') return;

      var userAnswer = parseInt(userInput, 10);
      if (isNaN(userAnswer)) return;

      gameState.isProcessing = true;

      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      var correct = (userAnswer === round.correctAnswer);

      var misconceptionTag = null;
      if (!correct && round.misconception_tags) {
        misconceptionTag = round.misconception_tags[String(userAnswer)] || null;
      }

      recordAttempt(gameState.currentRound, userAnswer, correct, {
        misconception_tag: misconceptionTag,
        is_retry: false,
        round: gameState.currentRound + 1,
        stage: round.stage,
        numbers: round.numbers,
        playCount: gameState.playCount
      });

      trackEvent('answer_submitted', {
        round: gameState.currentRound + 1,
        correct: correct,
        response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
        userAnswer: userAnswer,
        correctAnswer: round.correctAnswer
      });

      if (correct) {
        gameState.score++;
        gameState.streak++;
        gameState.consecutiveWrongs = 0;
        syncDOM();

        if (elStarCounter) {
          elStarCounter.textContent = gameState.score + '/10 \u2B50';
          elStarCounter.classList.remove('score-bounce');
          void elStarCounter.offsetWidth;
          elStarCounter.classList.add('score-bounce');
        }

        if (elAnswerInput) elAnswerInput.classList.add('input-correct');
        elAnswerInput.disabled = true;

        var correctMsg = 'Bingo! You got it!';
        if (elFeedbackText) {
          elFeedbackText.textContent = correctMsg;
          elFeedbackText.className = 'feedback-text correct';
        }

        if (elSubmitBtn) elSubmitBtn.classList.add('hidden');

        if (progressBar) {
          try { progressBar.update(gameState.currentRound + 1, 0); } catch(e) {}
        }

        var streakSubtitle = correctMsg;
        if (gameState.streak >= 5) {
          streakSubtitle = gameState.streak + ' in a row! Unstoppable!';
          if (elStarCounter) {
            elStarCounter.classList.remove('streak-glow');
            void elStarCounter.offsetWidth;
            elStarCounter.classList.add('streak-glow');
          }
        } else if (gameState.streak >= 4) {
          streakSubtitle = gameState.streak + ' in a row! On fire!';
        } else if (gameState.streak >= 3) {
          streakSubtitle = gameState.streak + ' in a row!';
        }

        try {
          await withTimeout(FeedbackManager.sound.play('correct_sound_effect', { sticker: CORRECT_STICKER }), 8000);
          await withTimeout(FeedbackManager.playDynamicFeedback({
            audio_content: streakSubtitle,
            subtitle: streakSubtitle.substring(0, 60),
            sticker: CORRECT_STICKER
          }), 8000);
        } catch(e) {
          console.error('[feedback] ' + e.message);
        }

      } else {
        gameState.streak = 0;
        gameState.consecutiveWrongs++;
        syncDOM();

        if (elAnswerInput) {
          elAnswerInput.classList.add('input-wrong');
          elAnswerInput.classList.add('shake-wrong');
          setTimeout(function() {
            if (elAnswerInput) elAnswerInput.classList.remove('shake-wrong');
          }, 500);
        }
        elAnswerInput.disabled = true;

        var nums = round.numbers;
        var explanation = '';
        if (nums.length === 2) {
          explanation = 'Not quite! ' + nums[0] + ' + ' + nums[1] + ' = ' + round.correctAnswer + '.';
        } else if (nums.length === 3) {
          var partial1 = nums[0] + nums[1];
          explanation = 'Not quite! ' + nums[0] + ' + ' + nums[1] + ' + ' + nums[2] + ' = ' + round.correctAnswer + '. Try: ' + nums[0] + ' + ' + nums[1] + ' = ' + partial1 + ', then ' + partial1 + ' + ' + nums[2] + ' = ' + round.correctAnswer + '.';
        } else {
          var partial2 = nums[0] + nums[1];
          var partial3 = partial2 + nums[2];
          explanation = 'Not quite! ' + nums.join(' + ') + ' = ' + round.correctAnswer + '. Break it down: ' + nums[0] + ' + ' + nums[1] + ' = ' + partial2 + ', then + ' + nums[2] + ' = ' + partial3 + ', then + ' + nums[3] + ' = ' + round.correctAnswer + '.';
        }

        if (gameState.consecutiveWrongs >= 3) {
          explanation = 'This is a tough one. ' + explanation.replace('Not quite! ', '');
        }

        if (elFeedbackText) {
          elFeedbackText.textContent = explanation;
          elFeedbackText.className = 'feedback-text wrong';
        }

        if (elSubmitBtn) elSubmitBtn.classList.add('hidden');

        if (progressBar) {
          try { progressBar.update(gameState.currentRound + 1, 0); } catch(e) {}
        }

        try {
          await withTimeout(FeedbackManager.sound.play('incorrect_sound_effect', { sticker: INCORRECT_STICKER }), 8000);
          var shortExplanation = explanation.length > 60 ? explanation.substring(0, 57) + '...' : explanation;
          await withTimeout(FeedbackManager.playDynamicFeedback({
            audio_content: explanation,
            subtitle: shortExplanation,
            sticker: INCORRECT_STICKER
          }), 8000);
        } catch(e) {
          console.error('[feedback] ' + e.message);
        }
      }

      trackEvent('round_complete', {
        round: gameState.currentRound + 1,
        correct: correct,
        score: gameState.score
      });

      gameState.isProcessing = false;

      /* Auto-advance to next round after feedback */
      nextRound();
    }

    /* ====== 18. nextRound ====== */
    function nextRound() {
      if (gameState.isProcessing) return;

      try {
        FeedbackManager.sound.pause();
        FeedbackManager._stopCurrentDynamic();
      } catch(e) {}

      gameState.currentRound++;
      syncDOM();

      if (gameState.currentRound >= gameState.totalRounds) {
        endGame();
      } else {
        showRoundTransition();
      }
    }

    /* ====== 19. endGame ====== */
    async function endGame() {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.phase = 'results';
      syncDOM();

      try {
        FeedbackManager.sound.pause();
        FeedbackManager._stopCurrentDynamic();
      } catch(e) {}

      var timeTaken = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;
      var stars = getStars(gameState.score);
      var accuracy = gameState.totalRounds > 0 ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0;

      var tries = [];
      for (var r = 1; r <= gameState.totalRounds; r++) {
        var count = 0;
        for (var a = 0; a < gameState.attempts.length; a++) {
          if (gameState.attempts[a].round_number === r) count++;
        }
        tries.push(count);
      }

      var sealResult = null;
      if (signalCollector && typeof signalCollector.seal === 'function') {
        try { sealResult = signalCollector.seal(); } catch(e) {}
      }

      trackEvent('game_end', {
        score: gameState.score,
        stars: stars,
        rounds_played: gameState.currentRound,
        accuracy: accuracy
      });

      gameState.duration_data.evaluations.push({ timestamp: Date.now() });

      showResults(stars, accuracy, timeTaken);

      var postData = {
        type: 'game_complete',
        data: {
          metrics: {
            accuracy: accuracy,
            time: timeTaken,
            stars: stars,
            attempts: gameState.attempts,
            duration_data: gameState.duration_data,
            totalLives: 0,
            tries: tries
          },
          completedAt: Date.now()
        }
      };
      if (sealResult) {
        postData.data.signal_event_count = sealResult.eventCount || 0;
        postData.data.signal_metadata = sealResult.metadata || {};
      }
      try { window.parent.postMessage(postData, '*'); } catch(e) {}

      var audioStopped = false;
      var restartBtnRef = document.getElementById('btn-restart');
      if (restartBtnRef) {
        restartBtnRef.onclick = function() {
          audioStopped = true;
          try {
            FeedbackManager.sound.pause();
            FeedbackManager._stopCurrentDynamic();
          } catch(e) {}
          resetGame();
        };
      }

      try {
        if (stars === 3) {
          await withTimeout(FeedbackManager.sound.play('victory_sound_effect', { sticker: VICTORY_STICKER }), 8000);
          if (audioStopped) return;
          await withTimeout(FeedbackManager.playDynamicFeedback({ audio_content: 'Amazing! You got ' + gameState.score + ' out of 10! 3 stars!', subtitle: 'Amazing! 3 stars!', sticker: VICTORY_STICKER }), 8000);
        } else if (stars === 2) {
          await withTimeout(FeedbackManager.sound.play('game_complete_sound_effect', { sticker: COMPLETE_2_STICKER }), 8000);
          if (audioStopped) return;
          await withTimeout(FeedbackManager.playDynamicFeedback({ audio_content: 'Well done! You got ' + gameState.score + ' out of 10! 2 stars!', subtitle: 'Well done! 2 stars!', sticker: COMPLETE_2_STICKER }), 8000);
        } else if (stars === 1) {
          await withTimeout(FeedbackManager.sound.play('game_complete_sound_effect', { sticker: COMPLETE_1_STICKER }), 8000);
          if (audioStopped) return;
          await withTimeout(FeedbackManager.playDynamicFeedback({ audio_content: 'Good try! You got ' + gameState.score + ' out of 10!', subtitle: 'Good try! 1 star!', sticker: COMPLETE_1_STICKER }), 8000);
        } else {
          await withTimeout(FeedbackManager.sound.play('game_over_sound_effect', { sticker: GAMEOVER_STICKER }), 8000);
          if (audioStopped) return;
          await withTimeout(FeedbackManager.playDynamicFeedback({ audio_content: 'Keep practicing! You completed ' + gameState.currentRound + ' rounds.', subtitle: 'Keep practicing!', sticker: GAMEOVER_STICKER }), 8000);
        }
      } catch(e) {
        console.error('[endgame audio] ' + e.message);
      }
    }

    /* ====== 20. showResults ====== */
    function showResults(stars, accuracy, timeTaken) {
      gameState.phase = 'results';
      syncDOM();

      if (elGameplayArea) elGameplayArea.classList.add('hidden');

      if (!elResultsScreen) {
        elResultsScreen = document.createElement('div');
        elResultsScreen.id = 'results-screen';
        document.body.appendChild(elResultsScreen);
      }

      var starIcons = '';
      for (var s = 0; s < 3; s++) {
        if (s < stars) {
          starIcons += '<span class="results-star star-earned" style="animation-delay: ' + (s * 0.2) + 's">\u2B50</span>';
        } else {
          starIcons += '<span class="results-star" style="opacity: 0.3; animation: none;">\u2606</span>';
        }
      }

      var message = '';
      if (stars === 3) message = 'Outstanding mental math skills!';
      else if (stars === 2) message = 'Great job! Keep practicing to get 3 stars!';
      else if (stars === 1) message = 'Good effort! Try again to improve your score.';
      else message = 'Keep practicing! You will get better.';

      elResultsScreen.className = '';
      elResultsScreen.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:' + 'var(--mathai-white)' + ';display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;';
      elResultsScreen.innerHTML = '<div class="results-inner">' +
        '<div class="results-stars">' + starIcons + '</div>' +
        '<div class="results-title">' + (stars >= 2 ? 'Well Done!' : 'Game Complete') + '</div>' +
        '<div class="results-score">Score: ' + gameState.score + '/' + gameState.totalRounds + ' (' + accuracy + '%)</div>' +
        '<div class="results-message">' + message + '</div>' +
        '<div class="results-rounds" id="rounds-completed">Rounds completed: ' + gameState.currentRound + '</div>' +
        '<button class="restart-btn" id="btn-restart" data-testid="btn-restart">Play Again</button>' +
        '</div>';

      var restartBtn = document.getElementById('btn-restart');
      if (restartBtn) {
        restartBtn.addEventListener('click', function() {
          try {
            FeedbackManager.sound.pause();
            FeedbackManager._stopCurrentDynamic();
          } catch(e) {}
          resetGame();
        });
      }
    }

    /* ====== 21. resetGame (restartGame) ====== */
    function resetGame() {
      try {
        FeedbackManager.sound.pause();
        FeedbackManager.stream.pauseAll();
        FeedbackManager._stopCurrentDynamic();
      } catch(e) {}

      gameState.phase = 'start_screen';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.correctAnswer = null;
      gameState.streak = 0;
      gameState.consecutiveWrongs = 0;
      gameState.playCount = 0;
      gameState.audioPlaying = false;
      gameState.roundStartTime = null;
      gameState.startTime = null;
      gameState.duration_data = {
        startTime: null,
        preview: null,
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      };

      if (signalCollector) {
        try {
          signalCollector = new SignalCollector({ gameId: gameState.gameId });
          window.signalCollector = signalCollector;
        } catch(e) {}
      }

      if (progressBar) {
        try { progressBar.destroy(); } catch(e) {}
        progressBar = null;
      }

      syncDOM();

      if (elResultsScreen) {
        elResultsScreen.classList.add('hidden');
        elResultsScreen.style.display = 'none';
      }
      if (elGameplayArea) elGameplayArea.classList.remove('hidden');

      gameState.audioPermissionGranted = true;
      setupGame();
    }

    /* ====== Debug Functions ====== */
    window.debugGame = function() {
      console.log(JSON.stringify(gameState, null, 2));
      return gameState;
    };

    window.debugAudio = function() {
      var info = {
        feedbackManagerAvailable: typeof FeedbackManager !== 'undefined',
        canPlayAudio: false,
        playCount: gameState.playCount,
        audioPlaying: gameState.audioPlaying,
        audioPermissionGranted: gameState.audioPermissionGranted
      };
      try { info.canPlayAudio = FeedbackManager.canPlayAudio(); } catch(e) {}
      console.log(JSON.stringify(info, null, 2));
      return info;
    };

    window.testAudio = function(id) {
      try { FeedbackManager.sound.play(id || 'correct_sound_effect', { sticker: CORRECT_STICKER }); } catch(e) {}
    };

    window.testPause = function() {
      if (visibilityTracker && typeof visibilityTracker.triggerInactive === 'function') {
        visibilityTracker.triggerInactive();
      }
    };

    window.testResume = function() {
      if (visibilityTracker && typeof visibilityTracker.triggerResume === 'function') {
        visibilityTracker.triggerResume();
      }
    };

    /* ====== DOMContentLoaded ====== */
    document.addEventListener('DOMContentLoaded', async function() {
      try {
        /* 1. waitForPackages */
        await waitForPackages();

        /* 2. FeedbackManager.init */
        try { await FeedbackManager.init(); } catch(e) { console.error('[FM init] ' + e.message); }

        /* 3. SignalCollector */
        try {
          signalCollector = new SignalCollector({ gameId: gameState.gameId });
          window.signalCollector = signalCollector;
        } catch(e) { console.error('[SignalCollector] ' + e.message); }

        /* 4. ScreenLayout.inject */
        try {
          ScreenLayout.inject('app', {
            sections: {
              header: true,
              questionText: false,
              progressBar: true,
              playArea: true,
              transitionScreen: true
            },
            styles: {}
          });
        } catch(e) { console.error('[ScreenLayout] ' + e.message); }

        /* 4b. TransitionScreen */
        try {
          transitionScreen = new TransitionScreenComponent({ autoInject: true });
        } catch(e) { console.error('[TransitionScreen] ' + e.message); }

        /* 5. Build play area HTML into #gameContent */
        elGameContent = document.getElementById('gameContent');
        if (elGameContent) {
          elGameContent.innerHTML =
            '<div id="gameplay-area">' +
              '<div class="game-header">' +
                '<span class="question-label" id="question-label">Q1</span>' +
                '<span class="star-counter" id="star-counter">0/10 \u2B50</span>' +
              '</div>' +
              '<p class="instructions-text" id="instructions-text">Numbers are read one by one in the audio below.<br>Add them mentally and write the total.<br>You can play the audio ONLY 2 times.</p>' +
              '<div class="audio-player-area">' +
                '<div class="audio-player-row">' +
                  '<button class="play-btn" id="play-btn" data-testid="btn-play">&#9654;</button>' +
                  '<div class="audio-timeline" id="audio-timeline"><div class="audio-timeline-fill" id="audio-timeline-fill"></div></div>' +
                  '<span class="play-count-label" id="play-count-label">0/2 plays</span>' +
                '</div>' +
                '<div class="play-tooltip hidden" id="play-tooltip"></div>' +
              '</div>' +
              '' +
              '<div class="input-area">' +
                '<input class="answer-input" id="answer-input" data-testid="answer-input" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Type here" autocomplete="off">' +
              '</div>' +
              '<div class="button-area">' +
                '<button class="submit-btn hidden" id="submit-btn" data-testid="btn-submit">Submit &amp; check</button>' +
                '<button class="next-btn hidden" id="next-btn" data-testid="btn-next" style="display:none">Next</button>' +
              '</div>' +
              '<div class="feedback-area" id="feedback-area" aria-live="polite" role="status">' +
                '<p class="feedback-text" id="feedback-text"></p>' +
              '</div>' +
            '</div>';
        }

        /* Cache DOM refs */
        elApp = document.getElementById('app');
        elQuestionLabel = document.getElementById('question-label');
        elStarCounter = document.getElementById('star-counter');
        elInstructions = document.getElementById('instructions-text');
        elPlayBtn = document.getElementById('play-btn');
        elTimeline = document.getElementById('audio-timeline');
        elTimelineFill = document.getElementById('audio-timeline-fill');
        elPlayCountLabel = document.getElementById('play-count-label');
        elPlayTooltip = document.getElementById('play-tooltip');
        elCaptionArea = document.getElementById('caption-area');
        elAnswerInput = document.getElementById('answer-input');
        elSubmitBtn = document.getElementById('submit-btn');
        elNextBtn = document.getElementById('next-btn');
        elFeedbackArea = document.getElementById('feedback-area');
        elFeedbackText = document.getElementById('feedback-text');
        elGameplayArea = document.getElementById('gameplay-area');

        /* 6. InteractionManager */
        try {
          interactionManager = new InteractionManager({
            selector: '#gameContent',
            disableOnAudioFeedback: true,
            disableOnEvaluation: true
          });
          window.interactionManager = interactionManager;
        } catch(e) { console.error('[InteractionManager] ' + e.message); }

        /* 7. VisibilityTracker */
        try {
          visibilityTracker = new VisibilityTracker({
            onInactive: function() {
              try { FeedbackManager.sound.pause(); } catch(e) {}
              try { FeedbackManager.stream.pauseAll(); } catch(e) {}
              var now = Date.now();
              gameState.duration_data.inActiveTime.push({ start: now });
            },
            onResume: function() {
              try { FeedbackManager.sound.resume(); } catch(e) {}
              try { FeedbackManager.stream.resumeAll(); } catch(e) {}
              var inactiveArr = gameState.duration_data.inActiveTime;
              if (inactiveArr.length > 0) {
                var last = inactiveArr[inactiveArr.length - 1];
                if (last && !last.end) {
                  last.end = Date.now();
                  gameState.duration_data.totalInactiveTime += (last.end - last.start);
                }
              }
            },
            popupProps: {
              title: 'Game Paused',
              body: 'Tap to resume',
              buttonText: 'Resume'
            }
          });
        } catch(e) { console.error('[VisibilityTracker] ' + e.message); }

        /* 8. Audio preloading */
        try {
          await FeedbackManager.sound.preload([
            { id: 'correct_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
            { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
            { id: 'rounds_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
            { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
            { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
            { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
            { id: 'tap_sound', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
          ]);
        } catch(e) { console.error('[preload] ' + e.message); }

        /* 9. Wire event listeners */
        if (elPlayBtn) {
          elPlayBtn.addEventListener('click', function() {
            playAudio();
          });
        }

        if (elAnswerInput) {
          elAnswerInput.addEventListener('input', function() {
            var val = elAnswerInput.value.replace(/[^0-9]/g, '');
            elAnswerInput.value = val;
            if (val.length > 0 && !gameState.isProcessing && !gameState.gameEnded) {
              if (elSubmitBtn) elSubmitBtn.classList.remove('hidden');
            } else {
              if (elSubmitBtn) elSubmitBtn.classList.add('hidden');
            }
          });

          elAnswerInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              if (!elSubmitBtn.classList.contains('hidden')) {
                handleSubmit();
              }
            }
          });
        }

        if (elSubmitBtn) {
          elSubmitBtn.addEventListener('click', function() {
            handleSubmit();
          });
        }

        if (elNextBtn) {
          elNextBtn.addEventListener('click', function() {
            nextRound();
          });
        }

        /* 10. visualViewport resize listener for keyboard */
        if (window.visualViewport) {
          var debounceTimer = null;
          window.visualViewport.addEventListener('resize', function() {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function() {
              if (elAnswerInput && document.activeElement === elAnswerInput) {
                elAnswerInput.scrollIntoView({ block: 'center', behavior: 'smooth' });
              }
            }, 100);
          });
        }

        /* 11. Register handlePostMessage listener BEFORE game_ready */
        window.addEventListener('message', handlePostMessage);

        /* 12. Send game_ready postMessage */
        try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch(e) {}

        /* 13. Standalone fallback */
        setTimeout(function() {
          if (gameState.phase === 'start_screen' && !gameState.isActive) {
            setupGame();
          }
        }, 1000);

      } catch (e) {
        console.error('[init] ' + e.message);
      }

      /* Window exposures */
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = resetGame;
      window.nextRound = nextRound;
      window.startGame = startGame;
      window.loadRound = loadRound;
      window.showRoundTransition = showRoundTransition;
    });
  </script>
</body>
</html>
