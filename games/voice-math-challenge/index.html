<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Math Voice Challenge</title>

<!-- STEP 1: SentryConfig package -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

<!-- STEP 2: initSentry() function definition -->
<script>
function initSentry() {
  try {
    if (typeof SentryConfig !== 'undefined' && SentryConfig.enabled && typeof Sentry !== 'undefined') {
      Sentry.init({
        dsn: SentryConfig.dsn,
        environment: SentryConfig.environment,
        release: "voice-math-challenge@1.0.0",
        tracesSampleRate: SentryConfig.tracesSampleRate,
        sampleRate: SentryConfig.sampleRate,
        maxBreadcrumbs: 50,
        ignoreErrors: [
          "ResizeObserver loop limit exceeded",
          "ResizeObserver loop completed with undelivered notifications",
          "Non-Error promise rejection captured",
          "Script error.",
          "Load failed",
          "Failed to fetch"
        ]
      });
    }
  } catch (e) { console.error('Sentry init failed:', e.message); }
}
</script>

<!-- STEP 3: Sentry SDK v10.23.0 -->
<script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

<!-- STEP 4: Initialize on load -->
<script>window.addEventListener('load', initSentry);</script>

<!-- STEP 5-7: Game packages -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100dvh; overflow: hidden; overscroll-behavior: none; }
@supports not (height: 100dvh) { html, body { height: 100vh; } }
body {
  font-family: var(--mathai-font-family);
  background: var(--mathai-white);
  color: var(--mathai-text-primary);
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

/* === LAYOUT ROOT === */
.mathai-layout-root { max-width: 480px; margin: 0 auto; }

/* === PLAY AREA LAYOUT === */
.mathai-layout-playarea {
  display: flex;
  flex-direction: column !important;
  align-items: center !important;
  padding: 0 20px 32px !important;
}

.mathai-ts-screen.active {
  flex: 1;
  align-items: center;
  justify-content: flex-start;
  padding-top: 16px;
}

.mathai-ts-card {
  min-height: 50dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* === GAME PLAY AREA === */
.game-play-area {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
}

/* === QUESTION DISPLAY === */
.question-display {
  text-align: center;
  padding: 20px 16px;
  margin-bottom: 12px;
}

.question-text {
  font-size: 36px;
  font-weight: 700;
  color: var(--mathai-primary);
  font-family: var(--mathai-font-family);
  line-height: 1.3;
}

.question-equals {
  font-size: 28px;
  font-weight: 600;
  color: var(--mathai-text-primary);
  margin-top: 4px;
}

/* === VOICE INPUT AREA === */
.voice-input-wrapper {
  width: 100%;
  max-width: 360px;
  margin: 0 auto 16px;
}

#voice-input-area {
  width: 100%;
}

/* Allow text selection inside voice input */
#voice-input-area * {
  -webkit-user-select: auto;
  user-select: auto;
}

/* === SUBMIT BUTTON === */
.submit-btn {
  width: 100%;
  max-width: 360px;
  padding: 14px 32px;
  font-size: var(--mathai-font-size-button, 16px);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  border: none;
  border-radius: var(--mathai-border-radius-button, 10px);
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--mathai-white, #ffffff);
  background: var(--mathai-green, #219653);
  touch-action: manipulation;
  min-height: 48px;
  margin-bottom: 12px;
}

.submit-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(33, 150, 83, 0.4);
}

.submit-btn:disabled {
  opacity: 0.5;
  pointer-events: none;
}

/* === INSTRUCTION TEXT === */
.instruction-text {
  font-size: var(--mathai-font-size-small, 14px);
  color: var(--mathai-gray, #666666);
  text-align: center;
  margin-bottom: 8px;
  line-height: 1.4;
}

/* === RESULTS METRICS === */
.results-metrics {
  display: flex;
  flex-direction: column;
  text-align: center;
  margin-bottom: 8px;
}

.metric-row { padding: 4px 0; }
.metric-label { color: var(--mathai-gray); font-size: var(--mathai-font-size-small); }
.metric-value-large { font-size: 32px; font-weight: 700; color: var(--mathai-primary); }
.metric-hint { font-size: var(--mathai-font-size-small); color: var(--mathai-blue); margin-top: 4px; }

/* === BUTTON OVERRIDES === */
.game-btn {
  padding: 14px 32px;
  font-size: var(--mathai-font-size-button);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  border: none;
  border-radius: var(--mathai-border-radius-button);
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--mathai-white);
  touch-action: manipulation;
  min-height: 44px;
}

.btn-primary { background: var(--mathai-green); }
.btn-secondary { background: var(--mathai-blue); }

.hidden { display: none !important; }

/* === MICRO-ANIMATIONS === */
@keyframes scoreBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.shake-wrong { animation: shake 0.5s ease-in-out; }
.score-bounce { animation: scoreBounce 0.4s ease; }
.fade-in { animation: fadeIn 0.35s ease; }

/* === LANDSCAPE LOCK === */
@media (orientation: landscape) and (max-height: 500px) {
  .landscape-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--mathai-white); z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--mathai-text-primary);
    text-align: center; padding: 20px;
  }
}
</style>
</head>
<body>
<div id="app" data-phase="start_screen" data-score="0" data-round="0"></div>

<script>
/* ============================================================
   GAME STATE (PART-007)
   ============================================================ */
window.gameState = {
  gameId: 'voice-math-challenge',
  phase: 'start_screen',
  currentRound: 0,
  totalRounds: 5,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  isProcessing: false,
  gameEnded: false,
  correctAnswer: null,
  roundStartTime: null
};

var gameState = window.gameState;
var timer = null;
var visibilityTracker = null;
var progressBar = null;
var transitionScreen = null;
var signalCollector = null;
var voiceInput = null;

/* ============================================================
   FALLBACK CONTENT — Multiplication & mixed arithmetic
   ============================================================ */
var fallbackContent = {
  rounds: [
    {
      question: "6 × 7",
      answer: 42,
      feedbackCorrect: "That's right! 6 × 7 = 42",
      feedbackWrong: "Not quite. 6 × 7 = 42",
      difficulty_level: 1
    },
    {
      question: "9 × 8",
      answer: 72,
      feedbackCorrect: "Correct! 9 × 8 = 72",
      feedbackWrong: "Not quite. 9 × 8 = 72",
      difficulty_level: 1
    },
    {
      question: "12 × 5",
      answer: 60,
      feedbackCorrect: "Yes! 12 × 5 = 60",
      feedbackWrong: "Not quite. 12 × 5 = 60",
      difficulty_level: 2
    },
    {
      question: "15 + 27",
      answer: 42,
      feedbackCorrect: "That's right! 15 + 27 = 42",
      feedbackWrong: "Not quite. 15 + 27 = 42",
      difficulty_level: 2
    },
    {
      question: "11 × 11",
      answer: 121,
      feedbackCorrect: "Excellent! 11 × 11 = 121",
      feedbackWrong: "Not quite. 11 × 11 = 121",
      difficulty_level: 3
    }
  ]
};

/* ============================================================
   UTILITY FUNCTIONS
   ============================================================ */
function getRounds() {
  return gameState.content ? gameState.content.rounds : fallbackContent.rounds;
}

function waitForPackages() {
  return new Promise(function(resolve, reject) {
    var timeout = 10000;
    var start = Date.now();
    var check = setInterval(function() {
      if (
        typeof FeedbackManager !== 'undefined' &&
        typeof TimerComponent !== 'undefined' &&
        typeof VisibilityTracker !== 'undefined' &&
        typeof SignalCollector !== 'undefined' &&
        typeof VoiceInput !== 'undefined'
      ) {
        clearInterval(check);
        resolve();
      } else if (Date.now() - start > timeout) {
        clearInterval(check);
        reject(new Error('Packages failed to load within ' + timeout + 'ms'));
      }
    }, 100);
  });
}

/* === syncDOM (PART-007 + test harness) === */
function syncDOM() {
  var app = document.getElementById('app');
  if (!app) return;
  app.setAttribute('data-phase', gameState.phase);
  app.setAttribute('data-score', gameState.score);
  app.setAttribute('data-round', gameState.currentRound);
}

/* === getStars === */
function getStars(score) {
  var total = gameState.totalRounds;
  if (total === 0) return 0;
  var pct = Math.round((score / total) * 100);
  if (pct >= 90) return 3;
  if (pct >= 60) return 2;
  if (score >= 1) return 1;
  return 0;
}
window.getStars = getStars;

/* ============================================================
   RECORD ATTEMPT (PART-009)
   ============================================================ */
function recordAttempt(roundIndex, userInput, correct, metadata) {
  var round = getRounds()[roundIndex];
  var attempt = {
    attempt_timestamp: Date.now(),
    time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
    input_of_user: userInput,
    correct: correct,
    round_number: roundIndex + 1,
    question_id: 'r' + (roundIndex + 1),
    correct_answer: round.answer,
    response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
    misconception_tag: correct ? null : (metadata && metadata.misconception_tag ? metadata.misconception_tag : 'arithmetic-error'),
    difficulty_level: round.difficulty_level || 1,
    is_retry: (metadata && metadata.is_retry) ? metadata.is_retry : false,
    metadata: metadata || {}
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({
    round: roundIndex + 1,
    timestamp: Date.now()
  });
}

/* === trackEvent (PART-010) === */
function trackEvent(eventName, data) {
  var evt = { type: eventName, timestamp: Date.now() };
  if (data) {
    var keys = Object.keys(data);
    for (var i = 0; i < keys.length; i++) { evt[keys[i]] = data[keys[i]]; }
  }
  gameState.events.push(evt);
}

/* === computeTriesPerRound === */
function computeTriesPerRound(attempts) {
  var rounds = {};
  for (var i = 0; i < attempts.length; i++) {
    var r = attempts[i].round_number;
    rounds[r] = (rounds[r] || 0) + 1;
  }
  var result = [];
  var keys = Object.keys(rounds);
  for (var j = 0; j < keys.length; j++) {
    result.push({ round: Number(keys[j]), triesCount: rounds[keys[j]] });
  }
  return result;
}

/* === createProgressBar (PART-023) === */
function createProgressBar() {
  if (progressBar) progressBar.destroy();
  progressBar = new ProgressBarComponent({
    slotId: 'mathai-progress-slot',
    totalRounds: gameState.totalRounds,
    totalLives: 0
  });
}

/* ============================================================
   CHECK ANSWER — normalize voice/typed input
   ============================================================ */
function checkAnswer(userAnswer, correctAnswer) {
  var cleaned = String(userAnswer).trim().toLowerCase();
  // Remove common voice artifacts
  cleaned = cleaned.replace(/[,.\s]/g, '');
  var num = Number(cleaned);
  if (!isNaN(num)) {
    return num === correctAnswer;
  }
  return String(cleaned) === String(correctAnswer);
}

/* ============================================================
   ANSWER HANDLER — P17 Voice Input (single-step)
   ============================================================ */
async function handleSubmit() {
  if (!voiceInput) return;
  var answer = voiceInput.getValue().trim();
  if (!answer) return;

  /* === Guards === */
  if (!gameState.isActive) return;
  if (gameState.isProcessing) return;
  if (gameState.gameEnded) return;

  gameState.isProcessing = true;
  voiceInput.disable();

  var submitBtn = document.getElementById('submit-btn');
  if (submitBtn) submitBtn.disabled = true;

  var roundData = getRounds()[gameState.currentRound];
  var isCorrect = checkAnswer(answer, roundData.answer);

  /* === Visual feedback on voice input === */
  if (isCorrect) {
    voiceInput.markCorrect();
  } else {
    voiceInput.markWrong();
  }

  /* === Record attempt === */
  recordAttempt(gameState.currentRound, answer, isCorrect, {
    input_method: 'voice_or_keyboard',
    question: roundData.question,
    correct_answer: roundData.answer
  });

  /* === Track event === */
  trackEvent('answer_submitted', {
    round: gameState.currentRound + 1,
    input: answer,
    correct: isCorrect,
    correct_answer: roundData.answer,
    question: roundData.question
  });

  /* === Update score === */
  if (isCorrect) {
    gameState.score = gameState.score + 1;
  }

  syncDOM();

  /* === Update progress bar === */
  if (progressBar) {
    progressBar.update(gameState.currentRound + 1, 0);
  }

  /* === Awaited SFX -> awaited TTS (single-step feedback) === */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      if (isCorrect) {
        await FeedbackManager.sound.play('correct_sound_effect', {
          sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif', duration: 2, type: 'IMAGE_GIF' }
        });
      } else {
        await FeedbackManager.sound.play('incorrect_sound_effect', {
          sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif', duration: 2, type: 'IMAGE_GIF' }
        });
      }
    }
  } catch (e) { console.error('SFX error:', e.message); }

  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.playDynamicFeedback({
        audio_content: isCorrect ? roundData.feedbackCorrect : roundData.feedbackWrong,
        subtitle: isCorrect ? roundData.feedbackCorrect : roundData.feedbackWrong
      });
    }
  } catch (e) { console.error('TTS error:', e.message); }

  /* === Advance === */
  gameState.isProcessing = false;
  voiceInput.clearMark();
  voiceInput.clear();
  voiceInput.enable();

  if (submitBtn) submitBtn.disabled = false;

  if (gameState.currentRound + 1 >= gameState.totalRounds) {
    showGameComplete();
  } else {
    gameState.currentRound = gameState.currentRound + 1;
    nextRound();
  }
}

/* ============================================================
   START ROUND / NEXT ROUND / RENDER
   ============================================================ */
function nextRound() {
  startRound();
}
window.nextRound = nextRound;

async function startRound() {
  var roundData = getRounds()[gameState.currentRound];
  if (!roundData) return;

  gameState.phase = 'playing';
  gameState.correctAnswer = roundData.answer;
  gameState.isProcessing = false;
  syncDOM();

  /* Render question */
  var questionDisplay = document.getElementById('question-display');
  if (questionDisplay) {
    questionDisplay.innerHTML =
      '<div class="question-text">' + roundData.question + '</div>' +
      '<div class="question-equals">= ?</div>';
  }

  /* Reset voice input */
  if (voiceInput) {
    voiceInput.clearMark();
    voiceInput.clear();
    voiceInput.enable();
  }

  var submitBtn = document.getElementById('submit-btn');
  if (submitBtn) submitBtn.disabled = false;

  /* Show game content, hide transition */
  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) gameContentEl.style.display = '';
  if (transitionScreen) transitionScreen.hide();

  /* Timer */
  if (timer) {
    timer.resume();
    timer.reset();
    timer.start();
  }
  gameState.roundStartTime = Date.now();

  if (signalCollector) signalCollector.recordViewEvent('content_render', {
    screen: 'gameplay',
    content_snapshot: {
      round: gameState.currentRound + 1,
      question: roundData.question,
      answer: roundData.answer
    },
    components: {
      timer: { value: 0, state: 'running' },
      progress: { current: gameState.currentRound, total: gameState.totalRounds }
    },
    metadata: { trigger: 'round_start' }
  });

  trackEvent('question_shown', {
    round: gameState.currentRound + 1,
    question: roundData.question
  });

  /* Dynamic TTS: read the question aloud -- does NOT block input */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      FeedbackManager.playDynamicFeedback({
        audio_content: roundData.question + ' equals what?',
        subtitle: roundData.question + ' = ?'
      });
    }
  } catch (e) { console.error('Question TTS error:', e.message); }
}

/* ============================================================
   END GAME (PART-011)
   ============================================================ */
function endGame(reason) {
  if (gameState.gameEnded) return;
  if (!gameState.isActive) return;
  gameState.isActive = false;
  gameState.gameEnded = true;
  gameState.duration_data.currentTime = new Date().toISOString();

  if (timer) { timer.pause(); }
  if (voiceInput) { voiceInput.disable(); }

  var stars = getStars(gameState.score);
  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var total = gameState.attempts.length;
  var accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
  var timeTaken = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;

  gameState.phase = 'results';
  syncDOM();

  var metrics = {
    accuracy: accuracy,
    time: timeTaken,
    stars: stars,
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    tries: computeTriesPerRound(gameState.attempts)
  };

  trackEvent('game_end', { metrics: metrics, reason: reason });

  var signalResult = signalCollector ? signalCollector.seal() : { event_count: 0, metadata: {} };

  window.parent.postMessage({
    type: 'game_complete',
    data: {
      metrics: metrics,
      completedAt: Date.now(),
      signal_event_count: signalResult.event_count,
      signal_metadata: signalResult.metadata
    }
  }, '*');

  if (timer) { timer.destroy(); timer = null; }
  if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.stopAll(); } catch(e) {}
}

/* === showGameComplete === */
async function showGameComplete() {
  endGame('victory');

  var stars = getStars(gameState.score);
  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var total = gameState.totalRounds;
  var accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) gameContentEl.style.display = 'none';

  var stickerUrls = {
    3: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif',
    2: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif',
    1: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif'
  };

  var metricsHTML =
    '<div class="results-metrics">' +
      '<div class="metric-row">' +
        '<span class="metric-label">Score</span>' +
      '</div>' +
      '<div class="metric-value-large">' + correct + ' / ' + total + '</div>' +
      '<p class="metric-hint">Accuracy: ' + accuracy + '%</p>' +
    '</div>';

  if (transitionScreen) {
    transitionScreen.show({
      stars: stars,
      title: stars === 3 ? 'Amazing!' : stars === 2 ? 'Great Job!' : stars >= 1 ? 'Well Done!' : 'Keep Practicing!',
      content: metricsHTML,
      buttons: [{
        text: stars >= 3 ? 'Play Again' : 'Retry for more stars',
        type: 'secondary',
        action: function() { restartGame(); }
      }],
      persist: true
    });
  }

  if (signalCollector) signalCollector.recordViewEvent('screen_transition', {
    screen: 'results',
    content_snapshot: { stars: stars, score: correct, total: total, accuracy: accuracy },
    components: { progress: { current: gameState.totalRounds, total: gameState.totalRounds } },
    metadata: { trigger: 'user_action', transition_from: 'gameplay' }
  });

  /* Victory audio: SFX -> VO sequential */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.sound.play('victory_sound_effect', {
        sticker: { image: stickerUrls[stars] || stickerUrls[1], duration: 5, type: 'IMAGE_GIF' }
      });
      await FeedbackManager.playDynamicFeedback({
        audio_content: stars === 3 ? 'Amazing! You got them all right!' : stars === 2 ? 'Great job!' : correct >= 1 ? 'Well done! Try again for a better score!' : 'Keep practicing! You will get better!',
        subtitle: stars === 3 ? 'Perfect score!' : stars === 2 ? 'Great job!' : 'Keep trying!',
        sticker: { image: stickerUrls[stars] || stickerUrls[1], duration: 3, type: 'IMAGE_GIF' }
      });
    }
  } catch (e) { console.error('Victory audio error:', e.message); }
}

/* ============================================================
   START GAME
   ============================================================ */
function startGame() {
  /* Build fallback DOM if ScreenLayout didn't load */
  if (!document.getElementById('gameContent')) {
    var app = document.getElementById('app');
    if (app) {
      app.innerHTML = '<div id="gameContent"><div class="game-play-area">' +
        '<div class="question-display" id="question-display"></div>' +
        '<div class="voice-input-wrapper"><div id="voice-input-area"></div></div>' +
        '<button id="submit-btn" class="submit-btn" onclick="handleSubmit()">Check Answer</button>' +
        '<p class="instruction-text">Speak or type your answer</p>' +
        '</div></div>';
      voiceInput = new VoiceInput('voice-input-area', {
        tools: ['mic', 'keyboard', 'reset'],
        defaultTool: 'mic',
        placeholder: 'Say or type the answer...'
      });
    }
  }
  if (!gameState.content) {
    gameState.content = fallbackContent;
    gameState.totalRounds = fallbackContent.rounds.length;
  }

  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  if (transitionScreen) transitionScreen.hide();

  gameState.phase = 'playing';
  gameState.currentRound = 0;
  gameState.isActive = true;
  gameState.startTime = Date.now();
  gameState.duration_data.startTime = new Date().toISOString();

  syncDOM();

  if (timer) {
    timer.resume();
    timer.reset();
    timer.start();
  }

  if (progressBar) {
    progressBar.update(0, 0);
  }

  trackEvent('game_start', { totalRounds: gameState.totalRounds });

  startRound();
}
window.startGame = startGame;

/* ============================================================
   RESTART GAME
   ============================================================ */
function restartGame() {
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.stopAll(); } catch(e) {}

  signalCollector = new SignalCollector({
    sessionId: (window.gameVariableState && window.gameVariableState.sessionId) ? window.gameVariableState.sessionId : 'session_' + Date.now(),
    studentId: (window.gameVariableState && window.gameVariableState.studentId) ? window.gameVariableState.studentId : null,
    gameId: gameState.gameId || null,
    contentSetId: gameState.contentSetId || null
  });
  window.signalCollector = signalCollector;

  if (gameState.signalConfig && gameState.signalConfig.flushUrl) {
    signalCollector.flushUrl = gameState.signalConfig.flushUrl;
    signalCollector.playId = gameState.signalConfig.playId || null;
    signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId;
    signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  window.gameState.phase = 'start_screen';
  window.gameState.currentRound = 0;
  window.gameState.score = 0;
  window.gameState.attempts = [];
  window.gameState.events = [];
  window.gameState.isActive = false;
  window.gameState.gameEnded = false;
  window.gameState.startTime = null;
  window.gameState.roundStartTime = null;
  window.gameState.isProcessing = false;
  window.gameState.correctAnswer = null;
  window.gameState.duration_data = {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  };

  syncDOM();

  /* Re-create timer */
  timer = new TimerComponent('timer-container', {
    timerType: 'increase',
    format: 'min',
    startTime: 0,
    endTime: 100000,
    autoStart: false,
    onEnd: function() {}
  });

  /* Re-create visibility tracker */
  visibilityTracker = new VisibilityTracker({
    onInactive: onInactiveHandler,
    onResume: onResumeHandler,
    popupProps: { title: 'Game Paused', description: 'Click Resume to continue.', primaryText: 'Resume' }
  });

  createProgressBar();
  if (progressBar) progressBar.update(0, 0);

  /* Reset voice input */
  if (voiceInput) {
    voiceInput.clearMark();
    voiceInput.clear();
    voiceInput.enable();
  }

  trackEvent('game_restart', { totalRounds: gameState.totalRounds });

  showWelcomeScreen();
}
window.restartGame = restartGame;

/* ============================================================
   SETUP GAME
   ============================================================ */
function setupGame() {
  if (!gameState.content) {
    gameState.content = fallbackContent;
  }

  gameState.totalRounds = gameState.content.rounds.length;
  gameState.startTime = Date.now();
  gameState.isActive = false;
  gameState.gameEnded = false;
  gameState.currentRound = 0;
  gameState.score = 0;
  gameState.attempts = [];
  gameState.events = [];
  gameState.roundStartTime = null;
  gameState.isProcessing = false;
  gameState.correctAnswer = null;
  gameState.duration_data.startTime = new Date().toISOString();

  syncDOM();

  createProgressBar();
  if (progressBar) progressBar.update(0, 0);

  trackEvent('game_setup', { totalRounds: gameState.totalRounds });

  showWelcomeScreen();
}

/* ============================================================
   WELCOME SCREEN
   ============================================================ */
async function showWelcomeScreen() {
  if (timer) { timer.pause(); timer.reset(); }

  gameState.phase = 'start_screen';
  syncDOM();

  var questionSlot = document.getElementById('mathai-question-slot');
  if (questionSlot) questionSlot.style.display = '';

  if (transitionScreen) {
    transitionScreen.show({
      title: 'Math Voice Challenge',
      subtitle: 'Speak or type the answer to each math problem!',
      buttons: [{
        text: 'Start Game',
        type: 'primary',
        action: function() { startGame(); }
      }],
      persist: true
    });
  }

  if (signalCollector) signalCollector.recordViewEvent('screen_transition', {
    screen: 'ready',
    content_snapshot: { title: 'Math Voice Challenge' },
    components: {},
    metadata: { trigger: 'user_action', transition_from: 'none' }
  });

  /* Audio readiness + welcome VO */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await new Promise(function(resolve) {
        if (FeedbackManager.canPlayAudio()) return resolve();
        var check = setInterval(function() {
          if (FeedbackManager.canPlayAudio()) { clearInterval(check); resolve(); }
        }, 200);
        setTimeout(function() { clearInterval(check); resolve(); }, 15000);
      });
      await FeedbackManager.sound.play('vo_game_start', {
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif',
          duration: 5,
          type: 'IMAGE_GIF'
        }
      });
    }
  } catch (e) { console.error('Welcome VO error:', e.message); }
}

/* === handlePostMessage (PART-008) === */
function handlePostMessage(event) {
  if (!event.data || event.data.type !== 'game_init') return;

  gameState.phase = 'playing';
  syncDOM();

  var d = event.data.data || event.data;
  if (d.content) gameState.content = d.content;

  var sc = gameState.signalConfig = d.signalConfig || {};
  if (signalCollector && sc.flushUrl) {
    signalCollector.flushUrl = sc.flushUrl;
    signalCollector.playId = sc.playId || null;
    signalCollector.gameId = sc.gameId || signalCollector.gameId;
    signalCollector.sessionId = sc.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = sc.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = sc.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  setupGame();
}

/* === Visibility handlers (PART-005) === */
function onInactiveHandler() {
  gameState.duration_data.inActiveTime.push({ start: Date.now() });
  if (signalCollector) {
    signalCollector.pause();
    signalCollector.recordCustomEvent('visibility_hidden', {});
  }
  if (timer) timer.pause({ fromVisibilityTracker: true });
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.pause(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.pauseAll(); } catch(e) {}
  trackEvent('game_paused', { source: 'system' });
}

function onResumeHandler() {
  var inactiveArr = gameState.duration_data.inActiveTime;
  var lastInactive = inactiveArr.length > 0 ? inactiveArr[inactiveArr.length - 1] : null;
  if (lastInactive && !lastInactive.end) {
    lastInactive.end = Date.now();
    gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
  }
  if (signalCollector) {
    signalCollector.resume();
    signalCollector.recordCustomEvent('visibility_visible', {});
  }
  if (timer && timer.isPaused) timer.resume({ fromVisibilityTracker: true });
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.resume(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.resumeAll(); } catch(e) {}
  trackEvent('game_resumed', { source: 'system' });
}

/* ============================================================
   DEBUG FUNCTIONS (PART-012)
   ============================================================ */
window.debugGame = function() {
  console.log('Game State:', JSON.stringify(gameState, null, 2));
};

window.debugAudio = function() {
  try {
    console.log('Audio State:', JSON.stringify({
      sound: FeedbackManager.sound.getState(),
      stream: FeedbackManager.stream.getState()
    }, null, 2));
  } catch(e) { console.log('Audio debug error:', e.message); }
};

window.testAudio = async function(id) {
  console.log('Testing audio:', id);
  try { await FeedbackManager.sound.play(id); }
  catch (e) { console.error('Audio test failed:', e.message); }
};

window.testPause = function() {
  if (visibilityTracker) {
    visibilityTracker.triggerInactive();
  } else {
    if (timer) timer.pause();
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.pause(); } catch(e) {}
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.pauseAll(); } catch(e) {}
  }
  console.log('testPause triggered');
};

window.testResume = function() {
  if (visibilityTracker) {
    visibilityTracker.triggerResume();
  } else {
    if (timer && timer.isPaused) timer.resume();
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.resume(); } catch(e) {}
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.resumeAll(); } catch(e) {}
  }
  console.log('testResume triggered');
};

window.verifySentry = function() {
  var checks = {
    sdkLoaded: typeof Sentry !== 'undefined',
    configLoaded: typeof SentryConfig !== 'undefined',
    initialized: typeof Sentry !== 'undefined' && Sentry.getClient() !== undefined
  };
  console.log('Sentry Status:', JSON.stringify(checks, null, 2));
  return checks;
};

window.testSentry = function() {
  try {
    throw new Error('Test error from testSentry()');
  } catch (error) {
    if (typeof Sentry !== 'undefined') Sentry.captureException(error, { tags: { test: true } });
    console.log('Test error sent to Sentry.');
  }
};

window.loadRound = function(n) {
  gameState.currentRound = n - 1;
  gameState.isActive = true;
  gameState.gameEnded = false;
  gameState.isProcessing = false;
  startRound();
};

window.endGame = endGame;

/* ============================================================
   DOMContentLoaded (PART-004)
   ============================================================ */
window.addEventListener('DOMContentLoaded', async function() {
  try {
    await waitForPackages();
    await FeedbackManager.init();

    signalCollector = new SignalCollector({
      sessionId: (window.gameVariableState && window.gameVariableState.sessionId) ? window.gameVariableState.sessionId : 'session_' + Date.now(),
      studentId: (window.gameVariableState && window.gameVariableState.studentId) ? window.gameVariableState.studentId : null,
      gameId: gameState.gameId || null,
      contentSetId: gameState.contentSetId || null
    });
    window.signalCollector = signalCollector;

    ScreenLayout.inject('app', {
      sections: {
        header: true,
        questionText: true,
        progressBar: true,
        playArea: true,
        transitionScreen: true
      },
      styles: {
        header: { background: 'var(--mathai-white, #ffffff)' },
        questionText: { padding: '16px 20px', maxWidth: '600px', marginLeft: 'auto', marginRight: 'auto', width: '100%' },
        progressBar: { padding: '0 20px', maxWidth: '600px', marginLeft: 'auto', marginRight: 'auto', marginTop: '8px', width: '100%' }
      }
    });

    var headerSlot = document.getElementById('mathai-header-slot');
    if (headerSlot) {
      headerSlot.innerHTML = '<div id="timer-container" style="display:flex;justify-content:center;align-items:center;padding:8px 0;"></div>';
    }

    var gameContentEl = document.getElementById('gameContent');
    if (gameContentEl) {
      gameContentEl.innerHTML =
        '<div class="game-play-area">' +
          '<div class="question-display" id="question-display" data-signal-id="question-display"></div>' +
          '<div class="voice-input-wrapper"><div id="voice-input-area" data-signal-id="voice-input-area"></div></div>' +
          '<button id="submit-btn" class="submit-btn" data-testid="submit-btn" onclick="handleSubmit()">Check Answer</button>' +
          '<p class="instruction-text">Speak or type your answer</p>' +
        '</div>';
    }

    /* Initialize VoiceInput component (P17) */
    voiceInput = new VoiceInput('voice-input-area', {
      tools: ['mic', 'keyboard', 'reset'],
      defaultTool: 'mic',
      placeholder: 'Say or type the answer...'
    });

    timer = new TimerComponent('timer-container', {
      timerType: 'increase',
      format: 'min',
      startTime: 0,
      endTime: 100000,
      autoStart: false,
      onEnd: function() {}
    });

    var interactionManager = new InteractionManager({
      selector: '.game-play-area',
      disableOnAudioFeedback: false,
      disableOnEvaluation: true
    });
    window.interactionManager = interactionManager;

    visibilityTracker = new VisibilityTracker({
      onInactive: onInactiveHandler,
      onResume: onResumeHandler,
      popupProps: {
        title: 'Game Paused',
        description: 'Click Resume to continue.',
        primaryText: 'Resume'
      }
    });

    createProgressBar();

    transitionScreen = new TransitionScreenComponent({ autoInject: true });

    try {
      await FeedbackManager.sound.preload([
        { id: 'correct_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
        { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
        { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
        { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
        { id: 'vo_game_start', url: 'https://cdn.mathai.ai/mathai-assets/dev/worksheet/audio/abfbe256-6b2a-4aa1-9cd7-bae00a464ca7.mp3' }
      ]);
    } catch (e) { console.error('Sound preload error:', e.message); }

    window.addEventListener('message', handlePostMessage);

    window.parent.postMessage({ type: 'game_ready' }, '*');

    setupGame();
  } catch (error) {
    console.error('Initialization failed:', error.message);
  }
});

/* === Standalone 2s fallback === */
setTimeout(function() {
  if (!gameState.isActive && !gameState.gameEnded) {
    console.warn('Fallback init triggered after 2s');
    if (!document.getElementById('gameContent')) {
      var app = document.getElementById('app');
      if (app) {
        app.innerHTML = '<div id="gameContent"><div class="game-play-area">' +
          '<div class="question-display" id="question-display"></div>' +
          '<div class="voice-input-wrapper"><div id="voice-input-area"></div></div>' +
          '<button id="submit-btn" class="submit-btn" onclick="handleSubmit()">Check Answer</button>' +
          '<p class="instruction-text">Speak or type your answer</p>' +
          '</div></div>';
      }
    }
    if (typeof VoiceInput !== 'undefined' && !voiceInput) {
      voiceInput = new VoiceInput('voice-input-area', {
        tools: ['mic', 'keyboard', 'reset'],
        defaultTool: 'mic',
        placeholder: 'Say or type the answer...'
      });
    }
    gameState.content = fallbackContent;
    gameState.totalRounds = fallbackContent.rounds.length;
    setupGame();
    startGame();
  }
}, 2000);
</script>
