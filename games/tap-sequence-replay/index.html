<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Color Memory</title>

<!-- STEP 1: SentryConfig package -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

<!-- STEP 2: initSentry() function definition -->
<script>
function initSentry() {
  try {
    if (typeof SentryConfig !== 'undefined' && SentryConfig.enabled && typeof Sentry !== 'undefined') {
      Sentry.init({
        dsn: SentryConfig.dsn,
        environment: SentryConfig.environment,
        release: "tap-sequence-replay@1.0.0",
        tracesSampleRate: SentryConfig.tracesSampleRate,
        sampleRate: SentryConfig.sampleRate,
        maxBreadcrumbs: 50,
        ignoreErrors: [
          "ResizeObserver loop limit exceeded",
          "ResizeObserver loop completed with undelivered notifications",
          "Non-Error promise rejection captured",
          "Script error.",
          "Load failed",
          "Failed to fetch"
        ]
      });
    }
  } catch (e) { console.error('Sentry init failed:', e.message); }
}
</script>

<!-- STEP 3: Sentry SDK v10.23.0 -->
<script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

<!-- STEP 4: Initialize on load -->
<script>window.addEventListener('load', initSentry);</script>

<!-- STEP 5-7: Game packages -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100dvh; overflow: hidden; overscroll-behavior: none; }
@supports not (height: 100dvh) { html, body { height: 100vh; } }
body {
  font-family: var(--mathai-font-family);
  background: var(--mathai-white);
  color: var(--mathai-text-primary);
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

/* === LAYOUT ROOT === */
.mathai-layout-root { max-width: 480px; margin: 0 auto; }

/* === PLAY AREA LAYOUT === */
.mathai-layout-playarea {
  display: flex;
  flex-direction: column !important;
  align-items: center !important;
  padding: 0 20px 32px !important;
}

.mathai-ts-screen.active {
  flex: 1;
  align-items: center;
  justify-content: flex-start;
  padding-top: 16px;
}

.mathai-ts-card {
  min-height: 50dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* === GAME PLAY AREA === */
.game-play-area {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
}

/* === PHASE INDICATOR === */
.phase-indicator {
  text-align: center;
  padding: 12px 16px;
  margin-bottom: 16px;
  min-height: 44px;
}

.phase-text {
  font-size: 22px;
  font-weight: 700;
  font-family: var(--mathai-font-family);
  transition: color 0.2s ease;
}

.phase-text.observing { color: var(--mathai-orange, #f59e0b); }
.phase-text.responding { color: var(--mathai-green, #219653); }
.phase-text.idle { color: var(--mathai-gray, #888888); }

/* === QUADRANT GRID === */
.quadrant-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 320px;
  width: 100%;
}

.quadrant {
  width: calc(50% - 12px);
  min-height: 100px;
  margin: 6px;
  border-radius: 12px;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.quadrant:active { transform: scale(0.95); }

/* Quadrant colors */
.quadrant.color-red { background: #e74c3c; }
.quadrant.color-blue { background: #3498db; }
.quadrant.color-green { background: #2ecc71; }
.quadrant.color-yellow { background: #f1c40f; }

/* Flash state */
.quadrant.flash {
  opacity: 1;
  box-shadow: 0 0 24px 8px rgba(255, 255, 255, 0.6);
}

/* Correct tap highlight */
.quadrant.correct-tap {
  opacity: 1;
  box-shadow: 0 0 16px 4px rgba(46, 204, 113, 0.7);
}

/* Wrong tap flash */
.quadrant.wrong-tap {
  opacity: 1;
  box-shadow: 0 0 16px 4px rgba(231, 76, 60, 0.7);
}

/* During observe phase: disable pointer events */
.quadrant-grid.observing .quadrant {
  pointer-events: none;
}

/* === INSTRUCTION AREA === */
.instruction-area { text-align: center; }

.instruction-text {
  font-size: var(--mathai-font-size-small);
  color: var(--mathai-text-primary, #000000);
  margin-bottom: 4px;
  line-height: 1.4;
}

.instruction-sub { font-size: 13px; color: var(--mathai-text-primary, #000000); }

/* === RESULTS METRICS === */
.results-metrics {
  display: flex;
  flex-direction: column;
  text-align: center;
  margin-bottom: 8px;
}

.metric-row { padding: 4px 0; }
.metric-label { color: var(--mathai-gray); font-size: var(--mathai-font-size-small); }
.metric-value-large { font-size: 32px; font-weight: 700; color: var(--mathai-primary); }
.metric-hint { font-size: var(--mathai-font-size-small); color: var(--mathai-blue); margin-top: 4px; }

/* === BUTTON OVERRIDES === */
.game-btn {
  padding: 14px 32px;
  font-size: var(--mathai-font-size-button);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  border: none;
  border-radius: var(--mathai-border-radius-button);
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--mathai-white);
}

.btn-primary { background: var(--mathai-green); }
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(33, 150, 83, 0.4);
}

.btn-secondary { background: var(--mathai-blue); }
.btn-secondary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}

.hidden { display: none !important; }

/* === MICRO-ANIMATIONS === */
@keyframes scoreBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes starPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes heartBreak {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.5; }
  100% { transform: scale(0.8); opacity: 0; }
}

.shake-wrong { animation: shake 0.5s ease-in-out; }
.score-bounce { animation: scoreBounce 0.4s ease; }
.fade-in { animation: fadeIn 0.35s ease; }

/* === LANDSCAPE LOCK === */
@media (orientation: landscape) and (max-height: 500px) {
  .landscape-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--mathai-white); z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--mathai-text-primary);
    text-align: center; padding: 20px;
  }
}
</style>
</head>
<body>
<div id="app" data-phase="start_screen" data-score="0" data-lives="3"></div>

<script>
/* ============================================================
   GAME STATE (PART-007)
   ============================================================ */
window.gameState = {
  gameId: 'tap-sequence-replay',
  phase: 'start_screen',
  currentRound: 0,
  totalRounds: 5,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  lives: 3,
  totalLives: 3,
  roundTimes: [],
  roundStartTime: null,
  isProcessing: false,
  gameEnded: false,
  correctAnswer: null,
  streak: 0,
  consecutiveWrongs: 0,
  contentSetId: null,
  /* P16-specific state */
  sequence: [],
  playerSequence: [],
  currentStep: 0,
  interactionPhase: 'idle' /* 'idle' | 'observing' | 'responding' */
};

var timer = null;
var visibilityTracker = null;
var progressBar = null;
var transitionScreen = null;
var previewScreen = null;
var signalCollector = null;

var QUADRANT_NAMES = ['Red', 'Blue', 'Green', 'Yellow'];
var QUADRANT_COLORS = ['color-red', 'color-blue', 'color-green', 'color-yellow'];

/* ============================================================
   FALLBACK CONTENT (5 rounds)
   ============================================================ */
var fallbackContent = {
  rounds: [
    { round: 1, sequence: [0, 2], difficulty_level: 1 },
    { round: 2, sequence: [0, 2, 1], difficulty_level: 1 },
    { round: 3, sequence: [3, 0, 2, 1], difficulty_level: 2 },
    { round: 4, sequence: [1, 3, 0, 2, 3], difficulty_level: 2 },
    { round: 5, sequence: [2, 0, 3, 1, 0, 2], difficulty_level: 3 }
  ]
};

/* ============================================================
   HELPERS
   ============================================================ */
function getRounds() {
  return gameState.content ? gameState.content.rounds : fallbackContent.rounds;
}

function waitForPackages() {
  return new Promise(function(resolve, reject) {
    var timeout = 10000;
    var start = Date.now();
    var check = setInterval(function() {
      if (
        typeof FeedbackManager !== 'undefined' &&
        typeof TimerComponent !== 'undefined' &&
        typeof VisibilityTracker !== 'undefined' &&
        typeof SignalCollector !== 'undefined'
      ) {
        clearInterval(check);
        resolve();
      } else if (Date.now() - start > timeout) {
        clearInterval(check);
        reject(new Error('Packages failed to load within ' + timeout + 'ms'));
      }
    }, 100);
  });
}

/* === delay helper === */
function delay(ms) {
  return new Promise(function(resolve) { setTimeout(resolve, ms); });
}

/* === syncDOMState (PART-007 + test harness) === */
function syncDOMState() {
  var app = document.getElementById('app');
  if (!app) return;
  app.setAttribute('data-phase', gameState.phase);
  app.setAttribute('data-score', gameState.score);
  app.setAttribute('data-lives', Math.max(0, gameState.lives));
  app.setAttribute('data-round', gameState.currentRound);
}

/* === calcStars (FM-11: must be on window) === */
function calcStars() {
  if (gameState.lives <= 0) return 0;
  var roundsCompleted = gameState.attempts.filter(function(a) { return a.correct; }).length;
  if (roundsCompleted === 0) return 0;
  if (gameState.lives === gameState.totalLives) return 3;
  if (gameState.lives >= 2) return 2;
  return 1;
}
window.calcStars = calcStars;

/* === startGame (exposed on window for external callers) === */
function startGame() {
  /* Fallback DOM building for test env where CDN packages don't load */
  if (!document.getElementById('gameContent')) {
    var app = document.getElementById('app');
    if (app) {
      /* Build minimal layout that ScreenLayout.inject would normally create */
      app.innerHTML =
        '<div id="mathai-header-slot"><div id="timer-container"></div></div>' +
        '<div id="mathai-question-slot"></div>' +
        '<div id="mathai-progress-slot"></div>' +
        '<div id="gameContent">' +
          '<div class="game-play-area">' +
            '<div class="phase-indicator" id="phase-indicator" data-signal-id="phase-indicator">' +
              '<span class="phase-text idle" id="phase-text">Get Ready</span>' +
            '</div>' +
            '<div class="quadrant-grid" id="quadrant-grid" data-signal-id="quadrant-grid">' +
              '<div class="quadrant color-red fade-in" data-index="0" data-quadrant="0" data-testid="quadrant-0" data-signal-id="quadrant-0"></div>' +
              '<div class="quadrant color-blue fade-in" data-index="1" data-quadrant="1" data-testid="quadrant-1" data-signal-id="quadrant-1"></div>' +
              '<div class="quadrant color-green fade-in" data-index="2" data-quadrant="2" data-testid="quadrant-2" data-signal-id="quadrant-2"></div>' +
              '<div class="quadrant color-yellow fade-in" data-index="3" data-quadrant="3" data-testid="quadrant-3" data-signal-id="quadrant-3"></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div id="mathai-transition-slot"></div>';

      /* Attach click handlers to quadrants */
      var quadrants = document.querySelectorAll('.quadrant');
      for (var qi = 0; qi < quadrants.length; qi++) {
        quadrants[qi].onclick = (function(idx) {
          return function() { handleElementTap(idx); };
        })(qi);
      }
    }
  }

  /* Ensure content is set */
  if (!gameState.content) {
    gameState.content = fallbackContent;
    gameState.totalRounds = fallbackContent.rounds.length;
  }

  /* Ensure transitionScreen stub exists for test env */
  if (!transitionScreen) {
    transitionScreen = { show: function() {}, hide: function() {}, destroy: function() {} };
  }

  setupGame();
  gameState.phase = 'playing';
  syncDOMState();
  startRound();
}
window.startGame = startGame;

/* === generateSequence === */
function generateSequence(roundIndex) {
  var length = roundIndex + 2; /* round 0 = 2 items, round 1 = 3, etc. */
  var seq = [];
  for (var i = 0; i < length; i++) {
    seq.push(Math.floor(Math.random() * 4));
  }
  return seq;
}

/* ============================================================
   RECORD ATTEMPT (PART-009 — 12 fields)
   ============================================================ */
function recordAttempt(roundIndex, userInput, correct, metadata) {
  var round = getRounds()[roundIndex];
  var attempt = {
    attempt_timestamp: Date.now(),
    time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
    input_of_user: userInput,
    correct: correct,
    round_number: roundIndex + 1,
    question_id: 'r' + (roundIndex + 1),
    correct_answer: gameState.sequence.map(function(idx) { return QUADRANT_NAMES[idx]; }),
    response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
    misconception_tag: correct ? null : (metadata.misconception_tag || 'sequence-order-error'),
    difficulty_level: round.difficulty_level || 1,
    is_retry: metadata.is_retry || false,
    metadata: metadata
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({
    round: roundIndex + 1,
    timestamp: Date.now()
  });
}

/* === trackEvent (PART-010) === */
function trackEvent(type, target, data) {
  var evt = { type: type, target: target, timestamp: Date.now() };
  if (data) {
    var keys = Object.keys(data);
    for (var i = 0; i < keys.length; i++) { evt[keys[i]] = data[keys[i]]; }
  }
  gameState.events.push(evt);
}

/* === computeTriesPerRound === */
function computeTriesPerRound(attempts) {
  var rounds = {};
  attempts.forEach(function(a) {
    var r = a.round_number;
    rounds[r] = (rounds[r] || 0) + 1;
  });
  return Object.keys(rounds).map(function(r) {
    return { round: Number(r), triesCount: rounds[r] };
  });
}

/* === createProgressBar (PART-023) === */
function createProgressBar() {
  if (typeof ProgressBarComponent === 'undefined') {
    progressBar = { update: function() {}, destroy: function() {} };
    return;
  }
  if (progressBar) progressBar.destroy();
  progressBar = new ProgressBarComponent({
    slotId: 'mathai-progress-slot',
    totalRounds: gameState.totalRounds,
    totalLives: gameState.totalLives
  });
}

/* ============================================================
   PLAY SEQUENCE (P16 Observe Phase)
   ============================================================ */
async function playSequence() {
  gameState.interactionPhase = 'observing';
  gameState.playerSequence = [];
  gameState.currentStep = 0;

  /* Update phase indicator */
  var phaseEl = document.getElementById('phase-text');
  if (phaseEl) {
    phaseEl.textContent = 'Watch...';
    phaseEl.className = 'phase-text observing';
  }

  /* Add observing class to grid to disable pointer events */
  var grid = document.getElementById('quadrant-grid');
  if (grid) grid.classList.add('observing');

  /* Brief pause before starting playback */
  await delay(500);

  /* Flash each element in sequence */
  for (var i = 0; i < gameState.sequence.length; i++) {
    var quadrantIndex = gameState.sequence[i];
    var quadrantEl = document.querySelectorAll('.quadrant')[quadrantIndex];
    if (quadrantEl) {
      quadrantEl.classList.add('flash');
    }

    await delay(600); /* highlight ~600ms */

    if (quadrantEl) {
      quadrantEl.classList.remove('flash');
    }

    /* pause ~300ms between flashes (but not after last) */
    if (i < gameState.sequence.length - 1) {
      await delay(300);
    }
  }

  /* Transition to respond phase */
  gameState.interactionPhase = 'responding';

  if (phaseEl) {
    phaseEl.textContent = 'Your turn!';
    phaseEl.className = 'phase-text responding';
  }

  if (grid) grid.classList.remove('observing');

  gameState.roundStartTime = Date.now();
}

/* ============================================================
   HANDLE ELEMENT TAP (P16 Respond Phase)
   ============================================================ */
async function handleElementTap(index) {
  /* Universal guards */
  if (!gameState.isActive) return;
  if (gameState.isProcessing) return;
  if (gameState.gameEnded) return;

  /* P16 additional guard: reject taps when observing */
  if (gameState.interactionPhase !== 'responding') return;

  gameState.isProcessing = true;

  var quadrantEl = document.querySelectorAll('.quadrant')[index];
  if (!quadrantEl) {
    gameState.isProcessing = false;
    return;
  }

  var expectedIndex = gameState.sequence[gameState.currentStep];

  if (index === expectedIndex) {
    /* === CORRECT TAP === */
    gameState.playerSequence.push(index);
    gameState.currentStep++;

    /* Brief highlight */
    quadrantEl.classList.add('correct-tap');

    /* Fire-and-forget SFX */
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_bubble_select'); } catch(e) {}

    trackEvent('correct_tap', 'quadrant-' + index, {
      round: gameState.currentRound + 1,
      step: gameState.currentStep,
      quadrant: QUADRANT_NAMES[index]
    });

    await delay(300);
    quadrantEl.classList.remove('correct-tap');

    /* Check if all taps are correct => sequence complete */
    if (gameState.currentStep >= gameState.sequence.length) {
      /* Sequence complete! */
      gameState.isProcessing = true; /* keep processing blocked */

      /* Timer + metrics */
      if (timer) timer.pause();
      var roundTimeMs = Date.now() - gameState.roundStartTime;
      var roundTimeSec = roundTimeMs / 1000;
      gameState.roundTimes.push(roundTimeSec);
      gameState.score++;
      gameState.streak++;
      gameState.consecutiveWrongs = 0;
      syncDOMState();

      /* Record attempt */
      var playerNames = gameState.playerSequence.map(function(idx) { return QUADRANT_NAMES[idx]; });
      recordAttempt(gameState.currentRound, playerNames, true, {
        round: gameState.currentRound + 1,
        timeTaken: roundTimeSec,
        sequenceLength: gameState.sequence.length,
        is_retry: false
      });

      if (signalCollector) signalCollector.recordViewEvent('feedback_display', {
        screen: 'gameplay',
        content_snapshot: { feedback_type: 'correct', round: gameState.currentRound + 1, sequence_length: gameState.sequence.length },
        components: { progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: gameState.lives },
        metadata: { trigger: 'user_action' }
      });

      if (signalCollector) signalCollector.recordCustomEvent('round_solved', {
        round: gameState.currentRound + 1,
        correct: true,
        answer: playerNames,
        correct_answer: gameState.sequence.map(function(idx) { return QUADRANT_NAMES[idx]; }),
        time_ms: roundTimeMs
      });

      trackEvent('correct_answer', 'game', {
        round: gameState.currentRound + 1,
        sequenceLength: gameState.sequence.length,
        timeTaken: Math.round(roundTimeSec)
      });

      /* Awaited SFX */
      try {
        if (typeof FeedbackManager !== 'undefined') await FeedbackManager.sound.play('sound_correct', {
          sticker: {
            image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif',
            duration: 2,
            type: 'IMAGE_GIF'
          }
        });
      } catch (e) { console.error('Correct SFX error:', e.message); }

      /* Awaited TTS */
      var ttsText = 'Great! You got the sequence!';
      try {
        if (typeof FeedbackManager !== 'undefined') await FeedbackManager.playDynamicFeedback({
          audio_content: ttsText,
          subtitle: ttsText,
          sticker: {
            image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif',
            duration: 2,
            type: 'IMAGE_GIF'
          }
        });
      } catch (e) { console.error('Correct TTS error:', e.message); }

      /* Advance round */
      gameState.currentRound++;
      if (progressBar) progressBar.update(gameState.currentRound, gameState.lives);
      gameState.interactionPhase = 'idle';
      gameState.isProcessing = false;

      if (gameState.currentRound >= gameState.totalRounds) {
        showGameComplete();
      } else {
        startRound();
      }
    } else {
      /* More steps to go */
      gameState.isProcessing = false;
    }
  } else {
    /* === WRONG TAP === */
    gameState.playerSequence.push(index);

    /* Flash wrong */
    quadrantEl.classList.add('wrong-tap', 'shake-wrong');

    /* Lose a life */
    gameState.lives--;
    gameState.streak = 0;
    gameState.consecutiveWrongs++;
    if (progressBar) progressBar.update(gameState.currentRound, Math.max(0, gameState.lives));
    syncDOMState();

    /* Record attempt */
    var wrongPlayerNames = gameState.playerSequence.map(function(idx) { return QUADRANT_NAMES[idx]; });
    recordAttempt(gameState.currentRound, wrongPlayerNames, false, {
      round: gameState.currentRound + 1,
      step: gameState.currentStep,
      expected: QUADRANT_NAMES[expectedIndex],
      tapped: QUADRANT_NAMES[index],
      sequenceLength: gameState.sequence.length,
      misconception_tag: 'sequence-order-error',
      is_retry: gameState.consecutiveWrongs > 1
    });

    if (signalCollector) signalCollector.recordViewEvent('feedback_display', {
      screen: 'gameplay',
      content_snapshot: { feedback_type: 'incorrect', round: gameState.currentRound + 1, step: gameState.currentStep, expected: QUADRANT_NAMES[expectedIndex], tapped: QUADRANT_NAMES[index] },
      components: { progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: gameState.lives },
      metadata: { trigger: 'user_action' }
    });

    if (signalCollector) signalCollector.recordCustomEvent('round_solved', {
      round: gameState.currentRound + 1,
      correct: false,
      answer: wrongPlayerNames,
      correct_answer: gameState.sequence.map(function(idx) { return QUADRANT_NAMES[idx]; })
    });

    trackEvent('incorrect_answer', 'game', {
      round: gameState.currentRound + 1,
      step: gameState.currentStep,
      expected: QUADRANT_NAMES[expectedIndex],
      tapped: QUADRANT_NAMES[index]
    });
    trackEvent('life_lost', 'game', { livesRemaining: gameState.lives });

    /* Case: last life -> skip wrong SFX, go straight to game over */
    if (gameState.lives <= 0) {
      showGameOver();
      return;
    }

    /* Wrong SFX (awaited) */
    try {
      if (typeof FeedbackManager !== 'undefined') await FeedbackManager.sound.play('sound_life_lost', {
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif',
          duration: 2,
          type: 'IMAGE_GIF'
        }
      });
    } catch (e) { console.error('Life lost SFX error:', e.message); }

    var wrongTtsText = 'Oops! Wrong color. Watch again!';
    try {
      if (typeof FeedbackManager !== 'undefined') await FeedbackManager.playDynamicFeedback({
        audio_content: wrongTtsText,
        subtitle: wrongTtsText,
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif',
          duration: 2,
          type: 'IMAGE_GIF'
        }
      });
    } catch (e) { console.error('Wrong TTS error:', e.message); }

    /* Remove wrong styling */
    quadrantEl.classList.remove('wrong-tap', 'shake-wrong');

    /* Reset and replay sequence */
    gameState.playerSequence = [];
    gameState.currentStep = 0;
    gameState.isProcessing = false;

    /* Replay the sequence */
    await playSequence();
  }
}

/* ============================================================
   START ROUND
   ============================================================ */
async function startRound() {
  var rounds = getRounds();
  var roundData = rounds[gameState.currentRound];
  if (!roundData) return;

  gameState.phase = 'playing';
  gameState.interactionPhase = 'idle';
  gameState.playerSequence = [];
  gameState.currentStep = 0;
  gameState.isProcessing = false;

  /* Generate or use pre-set sequence */
  if (roundData.sequence) {
    gameState.sequence = roundData.sequence.slice();
  } else {
    gameState.sequence = generateSequence(gameState.currentRound);
  }

  gameState.correctAnswer = gameState.sequence.map(function(idx) { return QUADRANT_NAMES[idx]; });
  syncDOMState();

  /* Show game content, hide transition */
  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) gameContentEl.style.display = '';
  if (transitionScreen) transitionScreen.hide();

  /* Update phase text to idle briefly */
  var phaseEl = document.getElementById('phase-text');
  if (phaseEl) {
    phaseEl.textContent = 'Round ' + (gameState.currentRound + 1);
    phaseEl.className = 'phase-text idle';
  }

  /* Timer */
  if (timer) {
    timer.resume();
    timer.reset();
    timer.start();
  }

  if (signalCollector) signalCollector.recordViewEvent('content_render', {
    screen: 'gameplay',
    content_snapshot: { round: gameState.currentRound + 1, sequence_length: gameState.sequence.length },
    components: { timer: { value: 0, state: 'running' }, progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: gameState.lives },
    metadata: { trigger: 'round_start' }
  });

  trackEvent('question_shown', 'game', {
    round: gameState.currentRound + 1,
    sequenceLength: gameState.sequence.length
  });

  /* New cards SFX */
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_new_cards'); } catch(e) {}

  /* Start the observe phase */
  await playSequence();
}

/* ============================================================
   END GAME (PART-011)
   ============================================================ */
function endGame(isGameOver) {
  if (gameState.gameEnded) return;
  if (!gameState.isActive) return;
  gameState.isActive = false;
  gameState.gameEnded = true;
  gameState.interactionPhase = 'idle';
  gameState.duration_data.currentTime = new Date().toISOString();

  if (timer) { timer.pause(); }

  var stars = isGameOver ? 0 : calcStars();
  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var total = gameState.attempts.length;
  var accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
  var timeTaken = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;
  var avgTime = gameState.roundTimes.length > 0
    ? gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length
    : 0;

  gameState.phase = isGameOver ? 'gameover' : 'results';
  syncDOMState();

  var metrics = {
    accuracy: accuracy,
    time: timeTaken,
    stars: stars,
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    totalLives: gameState.totalLives,
    tries: computeTriesPerRound(gameState.attempts),
    avgTimePerRound: Math.round(avgTime * 10) / 10,
    roundTimes: gameState.roundTimes
  };

  trackEvent('game_end', 'game', { metrics: metrics });

  var signalResult = signalCollector ? signalCollector.seal() : { event_count: 0, metadata: {} };

  window.parent.postMessage({
    type: 'game_complete',
    data: {
      metrics: metrics,
      attempts: gameState.attempts,
      completedAt: Date.now(),
      signal_event_count: signalResult.event_count,
      signal_metadata: signalResult.metadata
    }
  }, '*');

  if (timer) { timer.destroy(); timer = null; }
  if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.stopAll(); } catch(e) {}
}

/* ============================================================
   RESTART GAME
   ============================================================ */
function restartGame() {
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.stopAll(); } catch(e) {}

  signalCollector = new SignalCollector({
    sessionId: (window.gameVariableState && window.gameVariableState.sessionId) ? window.gameVariableState.sessionId : 'session_' + Date.now(),
    studentId: (window.gameVariableState && window.gameVariableState.studentId) ? window.gameVariableState.studentId : null,
    gameId: gameState.gameId || null,
    contentSetId: gameState.contentSetId || null
  });
  window.signalCollector = signalCollector;

  if (gameState.signalConfig && gameState.signalConfig.flushUrl) {
    signalCollector.flushUrl = gameState.signalConfig.flushUrl;
    signalCollector.playId = gameState.signalConfig.playId || null;
    signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId;
    signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  window.gameState.phase = 'start_screen';
  window.gameState.currentRound = 0;
  window.gameState.score = 0;
  window.gameState.attempts = [];
  window.gameState.events = [];
  window.gameState.isActive = true;
  window.gameState.gameEnded = false;
  window.gameState.startTime = Date.now();
  window.gameState.lives = 3;
  window.gameState.roundTimes = [];
  window.gameState.roundStartTime = null;
  window.gameState.isProcessing = false;
  window.gameState.streak = 0;
  window.gameState.consecutiveWrongs = 0;
  window.gameState.correctAnswer = null;
  window.gameState.sequence = [];
  window.gameState.playerSequence = [];
  window.gameState.currentStep = 0;
  window.gameState.interactionPhase = 'idle';
  window.gameState.duration_data = {
    startTime: new Date().toISOString(),
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  };

  syncDOMState();

  /* Re-create timer */
  if (typeof TimerComponent !== 'undefined') {
    timer = new TimerComponent('timer-container', {
      timerType: 'increase',
      format: 'min',
      startTime: 0,
      endTime: 100000,
      autoStart: false,
      onEnd: function() {}
    });
  } else {
    timer = null;
  }

  /* Re-create visibility tracker */
  if (typeof VisibilityTracker !== 'undefined') {
    visibilityTracker = new VisibilityTracker({
      onInactive: onInactiveHandler,
      onResume: onResumeHandler,
      popupProps: { title: 'Game Paused', description: 'Click Resume to continue.', primaryText: 'Resume' }
    });
  } else {
    visibilityTracker = null;
  }

  /* Ensure transitionScreen exists */
  if (!transitionScreen) {
    transitionScreen = { show: function() {}, hide: function() {}, destroy: function() {} };
  }

  createProgressBar();
  progressBar.update(0, gameState.lives);

  trackEvent('game_start', 'game', { totalRounds: gameState.totalRounds });

  showWelcomeScreen();
}

  gameState.startTime = Date.now();

/* === handlePostMessage (PART-008) === */
function handlePostMessage(event) {
  if (!event.data || event.data.type !== 'game_init') return;

  gameState.phase = 'playing';
  syncDOMState();

  var d = event.data.data || event.data;
  if (d.content) gameState.content = d.content;

  var sc = gameState.signalConfig = d.signalConfig || {};
  if (signalCollector && sc.flushUrl) {
    signalCollector.flushUrl = sc.flushUrl;
    signalCollector.playId = sc.playId || null;
    signalCollector.gameId = sc.gameId || signalCollector.gameId;
    signalCollector.sessionId = sc.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = sc.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = sc.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  setupGame();
}

/* === Visibility handlers (PART-005) === */
function onInactiveHandler() {
  gameState.duration_data.inActiveTime.push({ start: Date.now() });
  if (signalCollector) {
    signalCollector.pause();
    signalCollector.recordCustomEvent('visibility_hidden', {});
  }
  if (timer) timer.pause({ fromVisibilityTracker: true });
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.pause(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.pauseAll(); } catch(e) {}
  trackEvent('game_paused', 'system');
}

function onResumeHandler() {
  var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
  if (lastInactive && !lastInactive.end) {
    lastInactive.end = Date.now();
    gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
  }
  if (signalCollector) {
    signalCollector.resume();
    signalCollector.recordCustomEvent('visibility_visible', {});
  }
  if (timer && timer.isPaused) timer.resume({ fromVisibilityTracker: true });
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.resume(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.resumeAll(); } catch(e) {}
  trackEvent('game_resumed', 'system');
}

        header: { background: 'var(--mathai-white, #ffffff)' },
        questionText: { padding: '16px 20px', maxWidth: '600px', marginLeft: 'auto', marginRight: 'auto', width: '100%' },
        progressBar: { padding: '0 20px', maxWidth: '600px', marginLeft: 'auto', marginRight: 'auto', marginTop: '8px', width: '100%' }
      }
    });

    var headerSlot = document.getElementById('mathai-header-slot');
    if (headerSlot) {
      headerSlot.innerHTML = '<div id="timer-container" style="display:flex;justify-content:center;align-items:center;padding:8px 0;"></div>';
    }

    var gameContentEl = document.getElementById('gameContent');
    gameContentEl.innerHTML =
      '<div class="game-play-area">' +
        '<div class="phase-indicator" id="phase-indicator" data-signal-id="phase-indicator">' +
          '<span class="phase-text idle" id="phase-text">Get Ready</span>' +
        '</div>' +
        '<div class="quadrant-grid" id="quadrant-grid" data-signal-id="quadrant-grid">' +
          '<div class="quadrant color-red fade-in" data-index="0" data-quadrant="0" data-testid="quadrant-0" data-signal-id="quadrant-0"></div>' +
          '<div class="quadrant color-blue fade-in" data-index="1" data-quadrant="1" data-testid="quadrant-1" data-signal-id="quadrant-1"></div>' +
          '<div class="quadrant color-green fade-in" data-index="2" data-quadrant="2" data-testid="quadrant-2" data-signal-id="quadrant-2"></div>' +
          '<div class="quadrant color-yellow fade-in" data-index="3" data-quadrant="3" data-testid="quadrant-3" data-signal-id="quadrant-3"></div>' +
        '</div>' +
      '</div>';

    /* Attach click handlers to quadrants */
    var quadrants = document.querySelectorAll('.quadrant');
    for (var i = 0; i < quadrants.length; i++) {
      quadrants[i].onclick = (function(idx) {
        return function() { handleElementTap(idx); };
      })(i);
    }

    timer = new TimerComponent('timer-container', {
      timerType: 'increase',
      format: 'min',
      startTime: 0,
      endTime: 100000,
      autoStart: false,
      onEnd: function() {}
    });

    var interactionManager = new InteractionManager({
      selector: '.quadrant-grid',
      disableOnAudioFeedback: false,
      disableOnEvaluation: true
    });
    window.interactionManager = interactionManager;

    visibilityTracker = new VisibilityTracker({
      onInactive: onInactiveHandler,
      onResume: onResumeHandler,
      popupProps: {
        title: 'Game Paused',
        description: 'Click Resume to continue.',
        primaryText: 'Resume'
      }
    });

    createProgressBar();

    transitionScreen = new TransitionScreenComponent({ autoInject: true });

    try {
      if (typeof FeedbackManager !== 'undefined') await FeedbackManager.sound.preload([
        { id: 'sound_bubble_select', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3' },
        { id: 'sound_bubble_deselect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758712800721.mp3' },
        { id: 'sound_correct', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
        { id: 'sound_life_lost', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
        { id: 'sound_game_over', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
        { id: 'sound_game_victory', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
        { id: 'sound_new_cards', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432104595.mp3' },
        { id: 'vo_game_start', url: 'https://cdn.mathai.ai/mathai-assets/dev/worksheet/audio/abfbe256-6b2a-4aa1-9cd7-bae00a464ca7.mp3' }
      ]);
    } catch (e) { console.error('Sound preload error:', e.message); }

    window.addEventListener('message', handlePostMessage);

    window.parent.postMessage({ type: 'game_ready' }, '*');

    setupGame();
  } catch (error) {
    console.error('Initialization failed:', error.message);
  }
});
</script>
</body>
</html>
