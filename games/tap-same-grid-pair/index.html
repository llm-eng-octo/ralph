<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sum to Ten</title>

<!-- STEP 1: SentryConfig package -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

<!-- STEP 2: initSentry() function definition -->
<script>
function initSentry() {
  try {
    if (typeof SentryConfig !== 'undefined' && SentryConfig.enabled && typeof Sentry !== 'undefined') {
      Sentry.init({
        dsn: SentryConfig.dsn,
        environment: SentryConfig.environment,
        release: "tap-same-grid-pair@1.0.0",
        tracesSampleRate: SentryConfig.tracesSampleRate,
        sampleRate: SentryConfig.sampleRate,
        maxBreadcrumbs: 50,
        ignoreErrors: [
          "ResizeObserver loop limit exceeded",
          "ResizeObserver loop completed with undelivered notifications",
          "Non-Error promise rejection captured",
          "Script error.",
          "Load failed",
          "Failed to fetch"
        ]
      });
    }
  } catch (e) { console.error('Sentry init failed:', e.message); }
}
</script>

<!-- STEP 3: Sentry SDK v10.23.0 -->
<script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

<!-- STEP 4: Initialize on load -->
<script>window.addEventListener('load', initSentry);</script>

<!-- STEP 5-7: Game packages -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100dvh; overflow: hidden; overscroll-behavior: none; }
@supports not (height: 100dvh) { html, body { height: 100vh; } }
body {
  font-family: var(--mathai-font-family);
  background: var(--mathai-white);
  color: var(--mathai-text-primary);
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

/* === LAYOUT ROOT === */
.mathai-layout-root { max-width: 480px; margin: 0 auto; }

/* === PLAY AREA LAYOUT === */
.mathai-layout-playarea {
  display: flex;
  flex-direction: column !important;
  align-items: center !important;
  padding: 0 20px 32px !important;
}

.mathai-ts-screen.active {
  flex: 1;
  align-items: center;
  justify-content: flex-start;
  padding-top: 16px;
}

.mathai-ts-card {
  min-height: 50dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* === GAME PLAY AREA === */
.game-play-area {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
}

/* === TARGET DISPLAY === */
.target-display {
  text-align: center;
  padding: 16px;
  margin-bottom: 16px;
}

.target-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--mathai-primary);
  font-family: var(--mathai-font-family);
}

#target-value { color: var(--mathai-blue); }

/* === PAIRS FOUND === */
.pairs-found {
  text-align: center;
  margin-bottom: 16px;
  min-height: 32px;
}

.pairs-found-text {
  font-size: 20px;
  font-weight: 600;
  color: var(--mathai-gray);
  font-family: var(--mathai-font-family);
  transition: color 0.2s ease;
}

/* === TILE GRID === */
.tile-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 400px;
  width: 100%;
}

/* === INDIVIDUAL TILE === */
.tile {
  padding: 14px 20px;
  margin: 6px;
  border: 2px solid var(--mathai-border-gray);
  border-radius: 24px;
  cursor: pointer;
  font-size: 24px;
  font-weight: 700;
  font-family: var(--mathai-font-family);
  background: var(--mathai-white);
  color: var(--mathai-text-primary);
  transition: all 0.2s ease;
  min-width: 72px;
  min-height: 56px;
  text-align: center;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.tile:active { transform: scale(0.95); }

/* Tile states */
.tile.selected {
  background: var(--mathai-cell-bg-yellow, #fff9c4);
  border-color: #f0c800;
  transform: scale(1.05);
}

.tile.matched {
  background: var(--mathai-cell-bg-green, #c8e6c9);
  border-color: var(--mathai-cell-border-green, #4caf50);
  pointer-events: none;
  opacity: 0.6;
}

.tile.wrong {
  background: var(--mathai-cell-bg-red, #ffcdd2);
  border-color: var(--mathai-cell-border-red, #ef5350);
}

.tile.disabled { pointer-events: none; opacity: 0.6; }

.tile-grid.interaction-disabled .tile { pointer-events: none; }

/* === INSTRUCTION AREA === */
.instruction-area { text-align: center; }

.instruction-text {
  font-size: var(--mathai-font-size-small);
  color: var(--mathai-text-primary, #000000);
  margin-bottom: 4px;
  line-height: 1.4;
}

.instruction-sub { font-size: 13px; color: var(--mathai-text-primary, #000000); }

.instruction-highlight {
  font-size: var(--mathai-font-size-small);
  color: var(--mathai-text-primary, #000000);
  margin-top: 4px;
}

/* === RESULTS METRICS === */
.results-metrics {
  display: flex;
  flex-direction: column;
  text-align: center;
  margin-bottom: 8px;
}

.metric-row { padding: 4px 0; }
.metric-label { color: var(--mathai-gray); font-size: var(--mathai-font-size-small); }
.metric-value-large { font-size: 32px; font-weight: 700; color: var(--mathai-primary); }
.metric-hint { font-size: var(--mathai-font-size-small); color: var(--mathai-blue); margin-top: 4px; }

/* === BUTTON OVERRIDES === */
.game-btn {
  padding: 14px 32px;
  font-size: var(--mathai-font-size-button);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  border: none;
  border-radius: var(--mathai-border-radius-button);
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--mathai-white);
}

.btn-primary { background: var(--mathai-green); }
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(33, 150, 83, 0.4);
}

.btn-secondary { background: var(--mathai-blue); }
.btn-secondary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}

.hidden { display: none !important; }

/* === MICRO-ANIMATIONS === */
@keyframes scoreBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes starPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes heartBreak {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.5; }
  100% { transform: scale(0.8); opacity: 0; }
}

@keyframes wrongFlash {
  0% { background: var(--mathai-cell-bg-red, #ffcdd2); border-color: var(--mathai-cell-border-red, #ef5350); }
  100% { background: var(--mathai-white, #ffffff); border-color: var(--mathai-border-gray, #e0e0e0); }
}

.shake-wrong { animation: shake 0.5s ease-in-out; }
.score-bounce { animation: scoreBounce 0.4s ease; }
.fade-in { animation: fadeIn 0.35s ease; }

/* === LANDSCAPE LOCK === */
@media (orientation: landscape) and (max-height: 500px) {
  .landscape-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--mathai-white); z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--mathai-text-primary);
    text-align: center; padding: 20px;
  }
}
</style>
</head>
<body>
<div id="app" data-phase="start_screen" data-score="0" data-lives="3"></div>

<script>
/* ============================================================
   GAME STATE
   ============================================================ */
window.gameState = {
  gameId: 'tap-same-grid-pair',
  phase: 'start_screen',
  currentRound: 0,
  totalRounds: 3,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  lives: 3,
  totalLives: 3,
  selectedIndex: null,
  removedItems: [],
  roundTimes: [],
  roundStartTime: null,
  isProcessing: false,
  gameEnded: false,
  correctAnswer: null,
  streak: 0,
  consecutiveWrongs: 0,
  contentSetId: null
};

var timer = null;
var visibilityTracker = null;
var progressBar = null;
var transitionScreen = null;
var previewScreen = null;
var signalCollector = null;

/* ============================================================
   FALLBACK CONTENT (3 rounds, 8 numbers each, 4 pairs summing to 10)
   ============================================================ */
var fallbackContent = {
  rounds: [
    {
      round: 1,
      numbers: [1, 9, 2, 8, 3, 7, 4, 6],
      target: 10,
      difficulty_level: 1
    },
    {
      round: 2,
      numbers: [5, 5, 1, 9, 3, 7, 2, 8],
      target: 10,
      difficulty_level: 1
    },
    {
      round: 3,
      numbers: [4, 6, 1, 9, 5, 5, 2, 8],
      target: 10,
      difficulty_level: 2
    }
  ]
};

/* ============================================================
   HELPERS
   ============================================================ */
function getRounds() {
  if (gameState.content && gameState.content.rounds) {
    return gameState.content.rounds;
  }
  return fallbackContent.rounds;
}

function waitForPackages() {
  return new Promise(function(resolve, reject) {
    var timeout = 10000;
    var start = Date.now();
    var check = setInterval(function() {
      if (
        typeof FeedbackManager !== 'undefined' &&
        typeof TimerComponent !== 'undefined' &&
        typeof VisibilityTracker !== 'undefined' &&
        typeof SignalCollector !== 'undefined'
      ) {
        clearInterval(check);
        resolve();
      } else if (Date.now() - start > timeout) {
        clearInterval(check);
        reject(new Error('Packages failed to load within ' + timeout + 'ms'));
      }
    }, 100);
  });
}

/* === syncDOMState === */
function syncDOMState() {
  var app = document.getElementById('app');
  if (!app) return;
  app.setAttribute('data-phase', gameState.phase);
  app.setAttribute('data-score', gameState.score);
  app.setAttribute('data-lives', Math.max(0, gameState.lives));
  app.setAttribute('data-round', gameState.currentRound);
}

/* === calcStars (must be on window) === */
function calcStars() {
  if (gameState.lives <= 0) return 0;
  if (gameState.roundTimes.length === 0) return 1;
  var avgTime = gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length;
  return avgTime <= 5 ? 3 : avgTime <= 10 ? 2 : 1;
}
window.calcStars = calcStars;

/* === getPairsFoundCount === */
function getPairsFoundCount() {
  return Math.floor(gameState.removedItems.length / 2);
}

/* === getTotalPairs === */
function getTotalPairs() {
  var roundData = getRounds()[gameState.currentRound];
  if (!roundData) return 4;
  return Math.floor(roundData.numbers.length / 2);
}

/* ============================================================
   RECORD ATTEMPT (12 fields)
   ============================================================ */
function recordAttempt(roundIndex, userInput, correct, metadata) {
  var round = getRounds()[roundIndex];
  if (!round) return;
  var attempt = {
    attempt_timestamp: Date.now(),
    time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
    input_of_user: userInput,
    correct: correct,
    round_number: roundIndex + 1,
    question_id: 'r' + (roundIndex + 1),
    correct_answer: round.target,
    response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
    misconception_tag: correct ? null : (metadata.misconception_tag || 'wrong-pair'),
    difficulty_level: round.difficulty_level || 1,
    is_retry: metadata.is_retry || false,
    metadata: metadata
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({
    round: roundIndex + 1,
    timestamp: Date.now()
  });
}

/* === trackEvent === */
function trackEvent(type, target, data) {
  var evt = { type: type, target: target, timestamp: Date.now() };
  if (data) {
    var keys = Object.keys(data);
    for (var i = 0; i < keys.length; i++) { evt[keys[i]] = data[keys[i]]; }
  }
  gameState.events.push(evt);
}

/* === computeTriesPerRound === */
function computeTriesPerRound(attempts) {
  var rounds = {};
  attempts.forEach(function(a) {
    var r = a.round_number;
    rounds[r] = (rounds[r] || 0) + 1;
  });
  return Object.keys(rounds).map(function(r) {
    return { round: Number(r), triesCount: rounds[r] };
  });
}

/* === createProgressBar === */
function createProgressBar() {
  if (progressBar) progressBar.destroy();
  progressBar = new ProgressBarComponent({
    slotId: 'mathai-progress-slot',
    totalRounds: gameState.totalRounds,
    totalLives: gameState.totalLives
  });
}

/* ============================================================
   TILE TAP HANDLER — P11 Same-Grid Pair Selection
   ============================================================ */
async function handleTileTap(index) {
  /* Universal guards */
  if (!gameState.isActive) return;
  if (gameState.isProcessing) return;
  if (gameState.gameEnded) return;

  /* Additional guard: already matched/removed */
  if (gameState.removedItems.indexOf(index) !== -1) return;

  var roundData = getRounds()[gameState.currentRound];
  if (!roundData) return;

  var tileEls = document.querySelectorAll('.tile');
  var tileEl = tileEls[index];
  if (!tileEl) return;

  /* Case 1: No selection yet — select this tile */
  if (gameState.selectedIndex === null) {
    gameState.selectedIndex = index;
    tileEl.classList.add('selected');

    trackEvent('tile_select', 'tile-' + index, {
      tileValue: roundData.numbers[index]
    });
    return;
  }

  /* Case 2: Tap same tile again — deselect */
  if (gameState.selectedIndex === index) {
    gameState.selectedIndex = null;
    tileEl.classList.remove('selected');

    trackEvent('tile_deselect', 'tile-' + index, {
      tileValue: roundData.numbers[index]
    });
    return;
  }

  /* Case 3: Tap a different unmatched tile — evaluate pair */
  gameState.isProcessing = true;

  var firstIndex = gameState.selectedIndex;
  var firstTileEl = tileEls[firstIndex];
  var firstValue = roundData.numbers[firstIndex];
  var secondValue = roundData.numbers[index];
  var sum = firstValue + secondValue;
  var isCorrect = (sum === roundData.target);

  /* Clear selection state immediately */
  gameState.selectedIndex = null;

  if (isCorrect) {
    /* === VALID PAIR === */
    /* Mark both as matched */
    if (firstTileEl) {
      firstTileEl.classList.remove('selected');
      firstTileEl.classList.add('matched');
    }
    tileEl.classList.add('matched');

    gameState.removedItems.push(firstIndex);
    gameState.removedItems.push(index);

    gameState.score++;
    gameState.streak++;
    gameState.consecutiveWrongs = 0;
    syncDOMState();

    /* Update pairs found display */
    updatePairsFound();

    /* Record attempt */
    recordAttempt(gameState.currentRound, [firstValue, secondValue], true, {
      round: gameState.currentRound + 1,
      pair: [firstValue, secondValue],
      sum: sum,
      target: roundData.target,
      is_retry: false
    });

    trackEvent('correct_pair', 'game', {
      round: gameState.currentRound + 1,
      pair: [firstValue, secondValue],
      sum: sum
    });

    if (signalCollector) signalCollector.recordViewEvent('feedback_display', {
      screen: 'gameplay',
      content_snapshot: { feedback_type: 'correct', round: gameState.currentRound + 1, pair: [firstValue, secondValue] },
      components: { progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: gameState.lives },
      metadata: { trigger: 'user_action' }
    });

    /* Fire-and-forget SFX for multi-step correct */
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_correct'); } catch (e) { console.error('Correct SFX error:', e.message); }

    /* Check if all pairs found */
    var totalPairs = getTotalPairs();
    var foundPairs = getPairsFoundCount();

    if (foundPairs >= totalPairs) {
      /* Round complete */
      if (timer) timer.pause();
      var roundTimeMs = Date.now() - gameState.roundStartTime;
      var roundTimeSec = roundTimeMs / 1000;
      gameState.roundTimes.push(roundTimeSec);

      if (signalCollector) signalCollector.recordCustomEvent('round_solved', {
        round: gameState.currentRound + 1,
        correct: true,
        time_ms: roundTimeMs
      });

      trackEvent('round_complete', 'game', {
        round: gameState.currentRound + 1,
        timeTaken: Math.round(roundTimeSec)
      });

      /* Awaited SFX -> TTS for round complete */
      try {
        if (typeof FeedbackManager !== 'undefined') await FeedbackManager.sound.play('sound_round_complete', {
          sticker: {
            image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif',
            duration: 2,
            type: 'IMAGE_GIF'
          }
        });
      } catch (e) { console.error('Round complete SFX error:', e.message); }

      var ttsText = 'Great job! All pairs found!';
      try {
        if (typeof FeedbackManager !== 'undefined') await FeedbackManager.playDynamicFeedback({
          audio_content: ttsText,
          subtitle: ttsText,
          sticker: {
            image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif',
            duration: 2,
            type: 'IMAGE_GIF'
          }
        });
      } catch (e) { console.error('Round complete TTS error:', e.message); }

      /* Advance round */
      gameState.currentRound++;
      if (progressBar) progressBar.update(gameState.currentRound, gameState.lives);

      gameState.isProcessing = false;

      if (gameState.currentRound >= gameState.totalRounds) {
        showGameComplete();
      } else {
        startRound();
      }
    } else {
      gameState.isProcessing = false;
    }

  } else {
    /* === INVALID PAIR === */

    /* Lose a life */
    gameState.lives--;
    gameState.streak = 0;
    gameState.consecutiveWrongs++;
    if (progressBar) progressBar.update(gameState.currentRound, Math.max(0, gameState.lives));
    syncDOMState();

    /* Record attempt */
    recordAttempt(gameState.currentRound, [firstValue, secondValue], false, {
      round: gameState.currentRound + 1,
      pair: [firstValue, secondValue],
      sum: sum,
      target: roundData.target,
      misconception_tag: 'wrong-pair',
      is_retry: gameState.consecutiveWrongs > 1
    });

    trackEvent('incorrect_pair', 'game', {
      round: gameState.currentRound + 1,
      pair: [firstValue, secondValue],
      sum: sum
    });
    trackEvent('life_lost', 'game', { livesRemaining: gameState.lives });

    if (signalCollector) signalCollector.recordViewEvent('feedback_display', {
      screen: 'gameplay',
      content_snapshot: { feedback_type: 'incorrect', round: gameState.currentRound + 1, pair: [firstValue, secondValue], sum: sum },
      components: { progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: gameState.lives },
      metadata: { trigger: 'user_action' }
    });

    /* Last life: skip wrong SFX, go straight to game over */
    if (gameState.lives <= 0) {
      /* Clear first tile selection visual */
      if (firstTileEl) firstTileEl.classList.remove('selected');
      showGameOver();
      return;
    }

    /* Flash second item as wrong (300-600ms) */
    if (firstTileEl) firstTileEl.classList.remove('selected');
    tileEl.classList.add('wrong', 'shake-wrong');

    /* Fire-and-forget wrong SFX */
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_life_lost'); } catch (e) { console.error('Wrong SFX error:', e.message); }

    /* Remove wrong state after 500ms */
    setTimeout(function() {
      tileEl.classList.remove('wrong', 'shake-wrong');
      gameState.isProcessing = false;
    }, 500);
  }
}

/* === updatePairsFound display === */
function updatePairsFound() {
  var el = document.getElementById('pairs-found-value');
  if (!el) return;
  var found = getPairsFoundCount();
  var total = getTotalPairs();
  el.textContent = 'Pairs: ' + found + ' / ' + total;
}

/* ============================================================
   START ROUND
   ============================================================ */
async function startRound() {
  var roundData = getRounds()[gameState.currentRound];
  if (!roundData) return;

  gameState.phase = 'playing';
  gameState.selectedIndex = null;
  gameState.removedItems = [];
  gameState.correctAnswer = roundData.target;
  syncDOMState();

  /* Render target */
  var targetEl = document.getElementById('target-value');
  if (targetEl) targetEl.textContent = roundData.target;

  /* Render tiles */
  var tileGrid = document.getElementById('tile-grid');
  if (!tileGrid) return;
  tileGrid.innerHTML = '';
  for (var i = 0; i < roundData.numbers.length; i++) {
    var tile = document.createElement('div');
    tile.className = 'tile fade-in';
    tile.textContent = roundData.numbers[i];
    tile.setAttribute('data-signal-id', 'tile-' + i);
    tile.setAttribute('data-index', i);
    tile.setAttribute('data-testid', 'tile-' + i);
    tile.onclick = (function(idx) {
      return function() { handleTileTap(idx); };
    })(i);
    tileGrid.appendChild(tile);
  }

  /* Reset pairs found display */
  updatePairsFound();

  /* Show game content, hide transition */
  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) gameContentEl.style.display = '';
  if (transitionScreen) transitionScreen.hide();

  /* Timer */
  if (timer) {
    timer.resume();
    timer.reset();
    timer.start();
  }
  gameState.roundStartTime = Date.now();

  if (signalCollector) signalCollector.recordViewEvent('content_render', {
    screen: 'gameplay',
    content_snapshot: { round: gameState.currentRound + 1, target: roundData.target, numbers: roundData.numbers },
    components: { timer: { value: 0, state: 'running' }, progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: gameState.lives },
    metadata: { trigger: 'round_start' }
  });

  trackEvent('question_shown', 'game', {
    round: gameState.currentRound + 1,
    target: roundData.target
  });

  /* Dynamic TTS: does NOT block input */
  try {
    if (typeof FeedbackManager !== 'undefined') FeedbackManager.playDynamicFeedback({
      audio_content: 'Find pairs that sum to ' + roundData.target,
      subtitle: 'Find pairs that sum to ' + roundData.target
    });
  } catch (e) { console.error('Round start TTS error:', e.message); }

  /* New cards SFX */
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_new_cards'); } catch(e) {}
}

/* ============================================================
   SCREEN FUNCTIONS
   ============================================================ */

/* === Welcome Screen === */
async function showWelcomeScreen() {
  if (timer) { timer.pause(); timer.reset(); }

  gameState.phase = 'start_screen';
  syncDOMState();

  var questionSlot = document.getElementById('mathai-question-slot');
  if (questionSlot) questionSlot.style.display = '';

  if (transitionScreen) transitionScreen.show({
    title: 'Sum to Ten',
    subtitle: 'Find pairs of numbers that add up to 10!',
    buttons: [{
      text: 'Start Game',
      type: 'primary',
      action: function() { handleStartGame(); }
    }],
    persist: true
  });

  if (signalCollector) signalCollector.recordViewEvent('screen_transition', {
    screen: 'ready',
    content_snapshot: { title: 'Sum to Ten' },
    components: {},
    metadata: { trigger: 'user_action', transition_from: 'none' }
  });

  /* Audio readiness + welcome VO */
  try {
    await new Promise(function(resolve) {
      if (typeof FeedbackManager !== 'undefined' && FeedbackManager.canPlayAudio()) return resolve();
      var check = setInterval(function() {
        if (typeof FeedbackManager !== 'undefined' && FeedbackManager.canPlayAudio()) { clearInterval(check); resolve(); }
      }, 200);
      setTimeout(function() { clearInterval(check); resolve(); }, 15000);
    });
    if (typeof FeedbackManager !== 'undefined') await FeedbackManager.sound.play('vo_game_start', {
      sticker: {
        image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif',
        duration: 5,
        type: 'IMAGE_GIF'
      }
    });
  } catch (e) { console.error('Welcome VO error:', e.message); }
}

/* === handleStartGame === */
function handleStartGame() {
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  startRound();
}

/* ============================================================
   END GAME (game_complete on BOTH paths)
   ============================================================ */
function endGame(isGameOver) {
  if (gameState.gameEnded) return;
  if (!gameState.isActive) return;
  gameState.isActive = false;
  gameState.gameEnded = true;
  gameState.duration_data.currentTime = new Date().toISOString();

  if (timer) { timer.pause(); }

  var stars = isGameOver ? 0 : calcStars();
  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var total = gameState.attempts.length;
  var accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
  var timeTaken = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;
  var avgTime = gameState.roundTimes.length > 0
    ? gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length
    : 0;

  gameState.phase = isGameOver ? 'gameover' : 'results';
  syncDOMState();

  var metrics = {
    accuracy: accuracy,
    time: timeTaken,
    stars: stars,
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    totalLives: gameState.totalLives,
    tries: computeTriesPerRound(gameState.attempts),
    avgTimePerRound: Math.round(avgTime * 10) / 10,
    roundTimes: gameState.roundTimes
  };

  trackEvent('game_end', 'game', { metrics: metrics });

  var signalResult = signalCollector ? signalCollector.seal() : { event_count: 0, metadata: {} };

  window.parent.postMessage({
    type: 'game_complete',
    data: {
      metrics: metrics,
      attempts: gameState.attempts,
      completedAt: Date.now(),
      signal_event_count: signalResult.event_count,
      signal_metadata: signalResult.metadata
    }
  }, '*');

  if (timer) { timer.destroy(); timer = null; }
  if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.stopAll(); } catch(e) {}
}

/* === showGameComplete === */
async function showGameComplete() {
  var avgTime = gameState.roundTimes.length > 0
    ? gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length
    : 0;

  endGame(false);

  var stars = calcStars();
  var avgDisplay = avgTime.toFixed(1);

  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) gameContentEl.style.display = 'none';

  var stickerUrls = {
    3: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif',
    2: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif',
    1: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif'
  };

  var metricsHTML =
    '<div class="results-metrics">' +
      '<div class="metric-row">' +
        '<span class="metric-label">Average time per round</span>' +
      '</div>' +
      '<div class="metric-value-large">' + avgDisplay + 's</div>' +
      '<p class="metric-hint">5 seconds or less = 3 stars</p>' +
    '</div>';

  if (transitionScreen) transitionScreen.show({
    stars: stars,
    title: stars === 3 ? 'Amazing!' : stars === 2 ? 'Great Job!' : 'Well Done!',
    content: metricsHTML,
    buttons: [{
      text: stars >= 3 ? 'Play Again' : 'Retry for more stars',
      type: 'secondary',
      action: function() { restartGame(); }
    }],
    persist: true
  });

  if (signalCollector) signalCollector.recordViewEvent('screen_transition', {
    screen: 'results',
    content_snapshot: { stars: stars, avg_time: avgDisplay },
    components: { progress: { current: gameState.totalRounds, total: gameState.totalRounds }, lives: gameState.lives },
    metadata: { trigger: 'user_action', transition_from: 'gameplay' }
  });

  /* Victory audio: SFX -> VO sequential */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.sound.play('sound_game_victory', {
        sticker: { image: stickerUrls[stars] || stickerUrls[1], duration: 5, type: 'IMAGE_GIF' }
      });
      await FeedbackManager.playDynamicFeedback({
        audio_content: stars === 3 ? 'Amazing! Super fast!' : stars === 2 ? 'Great job! You found all the pairs!' : 'Well done! Try again for a faster time!',
        subtitle: stars === 3 ? 'Super fast!' : stars === 2 ? 'Great job!' : 'Well done!',
        sticker: { image: stickerUrls[stars] || stickerUrls[1], duration: 3, type: 'IMAGE_GIF' }
      });
    }
  } catch (e) { console.error('Victory audio error:', e.message); }
}

/* === showGameOver === */
async function showGameOver() {
  endGame(true);

  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) gameContentEl.style.display = 'none';

  var roundsCompleted = gameState.currentRound;

  if (transitionScreen) transitionScreen.show({
    title: 'Game Over',
    subtitle: 'You completed ' + roundsCompleted + ' of ' + gameState.totalRounds + ' rounds',
    buttons: [{
      text: 'Try Again',
      type: 'primary',
      action: function() { restartGame(); }
    }],
    persist: true
  });

  if (signalCollector) signalCollector.recordViewEvent('screen_transition', {
    screen: 'complete',
    content_snapshot: { outcome: 'game_over', rounds_completed: roundsCompleted },
    components: { progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: 0 },
    metadata: { trigger: 'user_action', transition_from: 'gameplay' }
  });

  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.sound.play('sound_game_over', {
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif',
          duration: 5,
          type: 'IMAGE_GIF'
        }
      });
      await FeedbackManager.playDynamicFeedback({
        audio_content: 'You completed ' + roundsCompleted + ' rounds. Try again!',
        subtitle: 'You completed ' + roundsCompleted + ' rounds',
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif',
          duration: 3,
          type: 'IMAGE_GIF'
        }
      });
    }
  } catch (e) { console.error('Game over audio error:', e.message); }
}

/* ============================================================
   RESTART GAME
   ============================================================ */
function restartGame() {
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.stopAll(); } catch(e) {}

  var sessionId = 'session_' + Date.now();
  var studentId = null;
  try {
    if (window.gameVariableState && window.gameVariableState.sessionId) sessionId = window.gameVariableState.sessionId;
    if (window.gameVariableState && window.gameVariableState.studentId) studentId = window.gameVariableState.studentId;
  } catch(e) {}

  signalCollector = new SignalCollector({
    sessionId: sessionId,
    studentId: studentId,
    gameId: gameState.gameId || null,
    contentSetId: gameState.contentSetId || null
  });
  window.signalCollector = signalCollector;

  if (gameState.signalConfig && gameState.signalConfig.flushUrl) {
    signalCollector.flushUrl = gameState.signalConfig.flushUrl;
    signalCollector.playId = gameState.signalConfig.playId || null;
    signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId;
    signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  window.gameState.phase = 'start_screen';
  window.gameState.currentRound = 0;
  window.gameState.score = 0;
  window.gameState.attempts = [];
  window.gameState.events = [];
  window.gameState.isActive = true;
  window.gameState.gameEnded = false;
  window.gameState.startTime = Date.now();
  window.gameState.lives = 3;
  window.gameState.selectedIndex = null;
  window.gameState.removedItems = [];
  window.gameState.roundTimes = [];
  window.gameState.roundStartTime = null;
  window.gameState.isProcessing = false;
  window.gameState.streak = 0;
  window.gameState.consecutiveWrongs = 0;
  window.gameState.correctAnswer = null;
  window.gameState.duration_data = {
    startTime: new Date().toISOString(),
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  };

  syncDOMState();

  /* Re-create timer */
  timer = new TimerComponent('timer-container', {
    timerType: 'increase',
    format: 'min',
    startTime: 0,
    endTime: 100000,
    autoStart: false,
    onEnd: function() {}
  });

  /* Re-create visibility tracker */
  visibilityTracker = new VisibilityTracker({
    onInactive: onInactiveHandler,
    onResume: onResumeHandler,
    popupProps: { title: 'Game Paused', description: 'Click Resume to continue.', primaryText: 'Resume' }
  });

  createProgressBar();
  progressBar.update(0, gameState.lives);

  trackEvent('game_start', 'game', { totalRounds: gameState.totalRounds });

  showWelcomeScreen();
}

/* ============================================================
   SETUP GAME
   ============================================================ */
function setupGame() {
  if (!gameState.content) {
    gameState.content = fallbackContent;
  }

  gameState.totalRounds = gameState.content.rounds.length;
  gameState.startTime = Date.now();
  gameState.isActive = true;
  gameState.gameEnded = false;
  gameState.currentRound = 0;
  gameState.score = 0;
  gameState.attempts = [];
  gameState.events = [];
  gameState.lives = 3;
  gameState.selectedIndex = null;
  gameState.removedItems = [];
  gameState.roundTimes = [];
  gameState.roundStartTime = null;
  gameState.isProcessing = false;
  gameState.streak = 0;
  gameState.consecutiveWrongs = 0;
  gameState.duration_data.startTime = new Date().toISOString();

  syncDOMState();

  createProgressBar();
  progressBar.update(0, gameState.lives);

  trackEvent('game_start', 'game', { totalRounds: gameState.totalRounds });

  updateInstructions();
  showWelcomeScreen();
}

/* === handlePostMessage === */
function handlePostMessage(event) {
  if (!event.data || event.data.type !== 'game_init') return;

  gameState.phase = 'playing';
  syncDOMState();

  var d = event.data.data || event.data;
  if (d.content) gameState.content = d.content;

  var sc = gameState.signalConfig = d.signalConfig || {};
  if (signalCollector && sc.flushUrl) {
    signalCollector.flushUrl = sc.flushUrl;
    signalCollector.playId = sc.playId || null;
    signalCollector.gameId = sc.gameId || signalCollector.gameId;
    signalCollector.sessionId = sc.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = sc.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = sc.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  setupGame();
}

/* === updateInstructions === */
function updateInstructions() {
  var slot = document.getElementById('mathai-question-slot');
  if (!slot) return;
  slot.innerHTML =
    '<div class="instruction-area">' +
      '<p class="instruction-text">Tap two numbers that add up to 10.</p>' +
      '<p class="instruction-text instruction-sub">Tap to select, tap again to deselect.</p>' +
      '<p class="instruction-text instruction-highlight">Find all <strong>4 pairs</strong> to complete a round!</p>' +
    '</div>';
}

/* === Visibility handlers === */
function onInactiveHandler() {
  gameState.duration_data.inActiveTime.push({ start: Date.now() });
  if (signalCollector) {
    signalCollector.pause();
    signalCollector.recordCustomEvent('visibility_hidden', {});
  }
  if (timer) timer.pause({ fromVisibilityTracker: true });
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.pause(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.pauseAll(); } catch(e) {}
  trackEvent('game_paused', 'system');
}

function onResumeHandler() {
  var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
  if (lastInactive && !lastInactive.end) {
    lastInactive.end = Date.now();
    gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
  }
  if (signalCollector) {
    signalCollector.resume();
    signalCollector.recordCustomEvent('visibility_visible', {});
  }
  if (timer && timer.isPaused) timer.resume({ fromVisibilityTracker: true });
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.resume(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.resumeAll(); } catch(e) {}
  trackEvent('game_resumed', 'system');
}

/* ============================================================
   DEBUG FUNCTIONS
   ============================================================ */
window.debugGame = function() {
  console.log('Game State:', JSON.stringify(gameState, null, 2));
};

window.debugAudio = function() {
  try {
    console.log('Audio State:', JSON.stringify({
      sound: typeof FeedbackManager !== 'undefined' ? FeedbackManager.sound.getState() : null,
      stream: typeof FeedbackManager !== 'undefined' ? FeedbackManager.stream.getState() : null
    }, null, 2));
  } catch(e) { console.log('Audio debug error:', e.message); }
};

window.testAudio = async function(id) {
  console.log('Testing audio:', id);
  try { if (typeof FeedbackManager !== 'undefined') await FeedbackManager.sound.play(id); }
  catch (e) { console.error('Audio test failed:', e.message); }
};

window.testPause = function() {
  if (visibilityTracker) {
    visibilityTracker.triggerInactive();
  } else {
    if (timer) timer.pause();
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.pause(); } catch(e) {}
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.pauseAll(); } catch(e) {}
  }
  console.log('testPause triggered');
};

window.testResume = function() {
  if (visibilityTracker) {
    visibilityTracker.triggerResume();
  } else {
    if (timer && timer.isPaused) timer.resume();
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.resume(); } catch(e) {}
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.resumeAll(); } catch(e) {}
  }
  console.log('testResume triggered');
};

window.verifySentry = function() {
  var checks = {
    sdkLoaded: typeof Sentry !== 'undefined',
    configLoaded: typeof SentryConfig !== 'undefined',
    initialized: typeof Sentry !== 'undefined' && Sentry.getClient() !== undefined
  };
  console.log('Sentry Status:', JSON.stringify(checks, null, 2));
  return checks;
};

window.testSentry = function() {
  try {
    throw new Error('Test error from testSentry()');
  } catch (error) {
    if (typeof Sentry !== 'undefined') Sentry.captureException(error, { tags: { test: true } });
    console.log('Test error sent to Sentry.');
  }
};

window.loadRound = function(n) {
  gameState.currentRound = n - 1;
  gameState.isActive = true;
  gameState.gameEnded = false;
  gameState.isProcessing = false;
  startRound();
};

function startGame() {
  /* Fallback DOM: in test env (no CDN), DOMContentLoaded may block
     on waitForPackages so ScreenLayout never injects DOM elements.
     Build the minimal DOM tree that startRound / tile handler need. */
  if (!document.getElementById('gameContent')) {
    var app = document.getElementById('app');
    if (app) {
      app.innerHTML =
        '<div id="gameContent">' +
          '<div class="game-play-area">' +
            '<div class="target-display" id="target-display" data-signal-id="target-display">' +
              '<h2 class="target-title" id="target-title">Find pairs that sum to <span id="target-value">10</span></h2>' +
            '</div>' +
            '<div class="pairs-found" id="pairs-found" data-signal-id="pairs-found">' +
              '<span class="pairs-found-text" id="pairs-found-value">Pairs: 0 / 4</span>' +
            '</div>' +
            '<div class="tile-grid" id="tile-grid" data-signal-id="tile-grid"></div>' +
          '</div>' +
        '</div>';
    }
  }

  /* Fallback content: ensure rounds are available even if game_init
     postMessage was never received (standalone / test mode). */
  if (!gameState.content) {
    gameState.content = fallbackContent;
    gameState.totalRounds = fallbackContent.rounds.length;
  }

  gameState.isActive = true;
  gameState.startTime = Date.now();
  gameState.duration_data.startTime = Date.now();
  gameState.currentRound = 0;
  gameState.score = 0;
  gameState.attempts = [];
  gameState.events = [];
  gameState.isProcessing = false;
  gameState.gameEnded = false;
  gameState.phase = 'playing';
  gameState.lives = gameState.totalLives || 3;
  gameState.selectedIndex = null;
  gameState.removedItems = [];
  gameState.roundTimes = [];
  gameState.roundStartTime = null;
  gameState.streak = 0;
  gameState.consecutiveWrongs = 0;
  trackEvent('game_start', { totalRounds: gameState.totalRounds });
  syncDOMState();
  startRound();
}
window.startGame = startGame;

/* ============================================================
   DOMContentLoaded — 2s fallback
   ============================================================ */
window.addEventListener('DOMContentLoaded', async function() {
  try {
    var packagesReady = false;
    try {
      await waitForPackages();
      packagesReady = true;
    } catch(e) {
      console.error('Package wait failed, using 2s fallback');
      await new Promise(function(resolve) { setTimeout(resolve, 2000); });
    }

    if (typeof FeedbackManager !== 'undefined') await FeedbackManager.init();

    var sessionId = 'session_' + Date.now();
    var studentId = null;
    try {
      if (window.gameVariableState && window.gameVariableState.sessionId) sessionId = window.gameVariableState.sessionId;
      if (window.gameVariableState && window.gameVariableState.studentId) studentId = window.gameVariableState.studentId;
    } catch(e) {}

    signalCollector = new SignalCollector({
      sessionId: sessionId,
      studentId: studentId,
      gameId: gameState.gameId || null,
      contentSetId: gameState.contentSetId || null
    });
    window.signalCollector = signalCollector;

    ScreenLayout.inject('app', {
      sections: {
        header: true,
        questionText: true,
        progressBar: true,
        playArea: true,
        transitionScreen: true
      },
      styles: {
        header: { background: 'var(--mathai-white, #ffffff)' },
        questionText: { padding: '16px 20px', maxWidth: '600px', marginLeft: 'auto', marginRight: 'auto', width: '100%' },
        progressBar: { padding: '0 20px', maxWidth: '600px', marginLeft: 'auto', marginRight: 'auto', marginTop: '8px', width: '100%' }
      }
    });

    var headerSlot = document.getElementById('mathai-header-slot');
    if (headerSlot) {
      headerSlot.innerHTML = '<div id="timer-container" style="display:flex;justify-content:center;align-items:center;padding:8px 0;"></div>';
    }

    var gameContentEl = document.getElementById('gameContent');
    if (gameContentEl) {
      gameContentEl.innerHTML =
        '<div class="game-play-area">' +
          '<div class="target-display" id="target-display" data-signal-id="target-display">' +
            '<h2 class="target-title" id="target-title">Find pairs that sum to <span id="target-value">10</span></h2>' +
          '</div>' +
          '<div class="pairs-found" id="pairs-found" data-signal-id="pairs-found">' +
            '<span class="pairs-found-text" id="pairs-found-value">Pairs: 0 / 4</span>' +
          '</div>' +
          '<div class="tile-grid" id="tile-grid" data-signal-id="tile-grid"></div>' +
        '</div>';
    }

    timer = new TimerComponent('timer-container', {
      timerType: 'increase',
      format: 'min',
      startTime: 0,
      endTime: 100000,
      autoStart: false,
      onEnd: function() {}
    });

    var interactionManager = new InteractionManager({
      selector: '.tile-grid',
      disableOnAudioFeedback: false,
      disableOnEvaluation: true
    });
    window.interactionManager = interactionManager;

    visibilityTracker = new VisibilityTracker({
      onInactive: onInactiveHandler,
      onResume: onResumeHandler,
      popupProps: {
        title: 'Game Paused',
        description: 'Click Resume to continue.',
        primaryText: 'Resume'
      }
    });

    createProgressBar();

    transitionScreen = new TransitionScreenComponent({ autoInject: true });

    try {
      if (typeof FeedbackManager !== 'undefined') await FeedbackManager.sound.preload([
        { id: 'sound_correct', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
        { id: 'sound_life_lost', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
        { id: 'sound_round_complete', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
        { id: 'sound_game_over', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
        { id: 'sound_game_victory', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
        { id: 'sound_new_cards', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432104595.mp3' },
        { id: 'vo_game_start', url: 'https://cdn.mathai.ai/mathai-assets/dev/worksheet/audio/abfbe256-6b2a-4aa1-9cd7-bae00a464ca7.mp3' }
      ]);
    } catch (e) { console.error('Sound preload error:', e.message); }

    window.addEventListener('message', handlePostMessage);

    window.parent.postMessage({ type: 'game_ready' }, '*');

    setupGame();
  } catch (error) {
    console.error('Initialization failed:', error.message);
  }
});
</script>
