<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>
  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --pack-blue: #4A6CF7;
      --pack-cyan: #3DB7E0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%; height:100dvh; overflow-x:hidden; overscroll-behavior:none; }
    @supports not (height: 100dvh) { html, body { height: 100vh; } }
    body { font-family: var(--mathai-font-family); background: var(--mathai-white); color: var(--mathai-text-primary); -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent; line-height:1.5; }
    #app { width:100%; max-width:var(--mathai-game-max-width); min-height:100dvh; margin:0 auto; display:flex; flex-direction:column; position:relative; overflow-x:clip; padding-top:env(safe-area-inset-top, 0px); padding-bottom:env(safe-area-inset-bottom, 0px); }
    @supports not (min-height: 100dvh) { #app { min-height: 100vh; } }
    #gameContent { display:flex; flex-direction:column; width:100%; padding:8px 16px 16px; }

    .scene-line {
      font-size: 18px; font-weight: 700; color: var(--mathai-primary);
      text-align: center; padding: 16px 8px 6px;
    }
    .pack-illustration {
      display: flex; justify-content: center; padding: 8px 0 12px;
    }
    .pack-illustration svg { max-width: 200px; height: auto; }

    .question-line {
      font-size: 17px; font-weight: 700; color: var(--mathai-primary);
      text-align: center; padding: 8px 12px 12px;
    }

    .yn-options {
      display: flex; flex-direction: column; align-items: stretch;
      max-width: 320px; margin: 4px auto 0; padding: 0 8px;
    }
    .yn-btn {
      min-height: 56px;
      padding: 14px 18px;
      margin-top: 10px;
      border: 2px solid var(--mathai-border-gray);
      background: var(--mathai-white);
      color: var(--mathai-primary);
      font-family: var(--mathai-font-family);
      font-size: 22px; font-weight: 700;
      border-radius: 999px;
      cursor: pointer; touch-action: manipulation;
      -webkit-appearance: none; appearance: none;
    }
    .yn-btn:first-child { margin-top: 0; }
    .yn-btn.selected { border-color: var(--mathai-purple); background: var(--mathai-cell-bg-yellow); }
    .yn-btn.solved-correct { background: var(--mathai-cell-bg-green); border-color: var(--mathai-cell-border-green); color: var(--mathai-green); }
    .yn-btn.solved-wrong { background: var(--mathai-cell-bg-red); border-color: var(--mathai-cell-border-red); color: var(--mathai-red); animation: shake 0.5s ease; }
    .yn-btn.disabled, .yn-btn:disabled { opacity: 0.55; pointer-events: none; cursor: not-allowed; }

    .justify-block {
      max-width: 360px; margin: 14px auto 0; padding: 0 8px;
    }
    .justify-label {
      font-size: 15px; color: var(--mathai-gray); margin-bottom: 6px;
    }
    .justify-input {
      width: 100%; min-height: 44px;
      padding: 10px 12px;
      border: 2px solid var(--mathai-border-gray);
      border-radius: 12px;
      font-family: var(--mathai-font-family);
      font-size: 16px;
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-appearance: none; appearance: none;
      -webkit-user-select: text; user-select: text;
      outline: none;
    }
    .justify-input:focus { border-color: var(--mathai-purple); }
    .justify-input.amber { border-color: var(--mathai-orange); background: #FFF6E6; }

    .nudge-box {
      max-width: 360px; margin: 8px auto 0; padding: 8px 12px;
      background: var(--mathai-cell-bg-yellow); border-radius: 10px;
      font-size: 14px; color: var(--mathai-primary);
      display: none;
    }
    .nudge-box.visible { display: block; }

    button, [role="button"] { min-height: 44px; min-width: 44px; touch-action: manipulation; }
    #app { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: var(--mathai-white); color: var(--mathai-primary);
        font-family: var(--mathai-font-family); font-size: 18px;
        text-align: center; padding: 24px;
      }
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shake { 0%,100% { transform:translateX(0); } 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }
    .fade-in { animation: fadeIn 0.35s ease; }

    .answer-card {
      width:100%; max-width:360px; margin:0 auto; padding:14px 12px 18px; text-align:left;
    }
    .answer-card .scenario { font-weight:600; color:var(--mathai-primary); margin-bottom:8px; }
    .answer-card .accepted {
      padding:10px 12px; background:var(--mathai-cell-bg-green);
      border:2px solid var(--mathai-cell-border-green); color:var(--mathai-green);
      border-radius:12px; font-weight:700; margin-bottom:8px;
    }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="3"></div>
  <script>
    var STICKER_CORRECT  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_WRONG    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_LEVEL    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';
    var STICKER_VICTORY  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_TWO      = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_ONE      = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_CELEBRATE = STICKER_VICTORY;
    var STICKER_SAD = STICKER_WRONG;
    var STICKER_MOTIVATE = STICKER_LEVEL;

    function buildRound(set, n, item, packSize, target, correctYesNo, correctTTS, correctSubtitle, wrongTTS, wrongSubtitle) {
      var prefix = set + '_r' + n;
      // bracket multiples around target
      var lower = Math.floor(target / packSize) * packSize;
      var upper = lower === target ? lower : lower + packSize;
      if (correctYesNo === 'yes') { lower = target; upper = target; }
      return {
        set: set, id: prefix + '_pack-' + packSize + '-target-' + target, round: n,
        stage: n <= 3 ? 1 : (n <= 7 ? 2 : 3),
        type: 'binary-mcq-just',
        item: item,
        packSize: packSize,
        target: target,
        correctYesNo: correctYesNo, // 'yes' or 'no'
        bracketLower: lower,
        bracketUpper: upper,
        correctTTS: correctTTS,
        correctSubtitle: correctSubtitle,
        wrongTTS: wrongTTS,
        wrongSubtitle: wrongSubtitle,
        misconception_tags: { 'wrong-yn':'misjudged-multiple', 'no-number':'no-multiple-cited' },
        answer: { item: item, packSize: packSize, target: target, correctYesNo: correctYesNo, lower: lower, upper: upper }
      };
    }

    var fallbackContent = {
      previewInstruction: '<p><b>Pack or No Pack</b> — pick Yes or No, then type a justification that names a multiple of the pack size.</p><p><b>10 rounds, 3 lives.</b> A vague justification asks for a do-over (no life lost). A wrong Yes/No costs a life.</p>',
      previewAudioText: 'Pack or no pack. Decide yes or no. Then type a justification with a multiple of the pack size. Three lives, ten rounds.',
      previewAudio: null,
      showGameOnPreview: false,
      totalRounds: 10,
      totalLives: 3,
      answerComponent: true,
      rounds: [
        // Set A
        buildRound('A', 1, 'water bottles', 6, 10, 'no',
          'Right — 10 sits between 6 and 12, both multiples of 6.', 'Bracketed by 6 and 12 — 10 is not a multiple.',
          'Brackets are 6 and 12. 10 is between them.', 'Brackets: 6 and 12. 10 is not a multiple.'),
        buildRound('A', 2, 'biscuits', 4, 7, 'no',
          'Right — 4 and 8 bracket 7.', 'Bracketed by 4 and 8.',
          'Brackets are 4 and 8. 7 is between them.', 'Brackets: 4 and 8. 7 is not a multiple.'),
        buildRound('A', 3, 'pencils', 5, 12, 'no',
          'Right — 10 and 15 bracket 12.', 'Bracketed by 10 and 15.',
          'Brackets are 10 and 15. 12 is between them.', 'Brackets: 10 and 15. 12 is not a multiple.'),
        buildRound('A', 4, 'mangoes', 4, 16, 'yes',
          'Yes — 4 × 4 = 16, exactly.', '4 × 4 = 16, exact.',
          '4 × 4 = 16, so yes.', '4 × 4 = 16. Yes.'),
        buildRound('A', 5, 'eggs', 6, 18, 'yes',
          'Yes — 6 × 3 = 18, exactly.', '6 × 3 = 18, exact.',
          '6 × 3 = 18, so yes.', '6 × 3 = 18. Yes.'),
        buildRound('A', 6, 'samosas', 5, 25, 'yes',
          'Yes — 5 × 5 = 25, exactly.', '5 × 5 = 25, exact.',
          '5 × 5 = 25, so yes.', '5 × 5 = 25. Yes.'),
        buildRound('A', 7, 'biscuits', 4, 22, 'no',
          'Right — 20 and 24 bracket 22.', 'Bracketed by 20 and 24.',
          'Brackets are 20 and 24. 22 is between them.', 'Brackets: 20 and 24. 22 is not a multiple.'),
        buildRound('A', 8, 'samosas', 7, 49, 'yes',
          'Yes — 7 × 7 = 49, exactly.', '7 × 7 = 49, exact.',
          '7 × 7 = 49, so yes.', '7 × 7 = 49. Yes.'),
        buildRound('A', 9, 'mangoes', 8, 50, 'no',
          'Right — 48 and 56 bracket 50.', 'Bracketed by 48 and 56.',
          'Brackets are 48 and 56. 50 is between them.', 'Brackets: 48 and 56. 50 is not a multiple.'),
        buildRound('A', 10, 'erasers', 12, 60, 'yes',
          'Yes — 12 × 5 = 60, exactly.', '12 × 5 = 60, exact.',
          '12 × 5 = 60, so yes.', '12 × 5 = 60. Yes.'),
        // Set B
        buildRound('B', 1, 'pens', 6, 14, 'no', 'Right — 12 and 18 bracket 14.', 'Bracketed by 12 and 18.', '12 and 18 bracket 14.', 'Brackets: 12 and 18.'),
        buildRound('B', 2, 'biscuits', 5, 13, 'no', 'Right — 10 and 15 bracket 13.', 'Bracketed by 10 and 15.', '10 and 15 bracket 13.', 'Brackets: 10 and 15.'),
        buildRound('B', 3, 'pencils', 4, 14, 'no', 'Right — 12 and 16 bracket 14.', 'Bracketed by 12 and 16.', '12 and 16 bracket 14.', 'Brackets: 12 and 16.'),
        buildRound('B', 4, 'mangoes', 5, 20, 'yes', 'Yes — 5 × 4 = 20, exactly.', '5 × 4 = 20.', '5 × 4 = 20.', '5 × 4 = 20.'),
        buildRound('B', 5, 'eggs', 6, 24, 'yes', 'Yes — 6 × 4 = 24, exactly.', '6 × 4 = 24.', '6 × 4 = 24.', '6 × 4 = 24.'),
        buildRound('B', 6, 'samosas', 4, 28, 'yes', 'Yes — 4 × 7 = 28, exactly.', '4 × 7 = 28.', '4 × 7 = 28.', '4 × 7 = 28.'),
        buildRound('B', 7, 'biscuits', 6, 33, 'no', 'Right — 30 and 36 bracket 33.', 'Bracketed by 30 and 36.', '30 and 36 bracket 33.', 'Brackets: 30 and 36.'),
        buildRound('B', 8, 'samosas', 7, 56, 'yes', 'Yes — 7 × 8 = 56, exactly.', '7 × 8 = 56.', '7 × 8 = 56.', '7 × 8 = 56.'),
        buildRound('B', 9, 'mangoes', 9, 80, 'no', 'Right — 72 and 81 bracket 80.', 'Bracketed by 72 and 81.', '72 and 81 bracket 80.', 'Brackets: 72 and 81.'),
        buildRound('B', 10, 'erasers', 11, 55, 'yes', 'Yes — 11 × 5 = 55, exactly.', '11 × 5 = 55.', '11 × 5 = 55.', '11 × 5 = 55.'),
        // Set C
        buildRound('C', 1, 'crayons', 4, 11, 'no', 'Right — 8 and 12 bracket 11.', 'Bracketed by 8 and 12.', '8 and 12 bracket 11.', 'Brackets: 8 and 12.'),
        buildRound('C', 2, 'pens', 5, 17, 'no', 'Right — 15 and 20 bracket 17.', 'Bracketed by 15 and 20.', '15 and 20 bracket 17.', 'Brackets: 15 and 20.'),
        buildRound('C', 3, 'pencils', 6, 21, 'no', 'Right — 18 and 24 bracket 21.', 'Bracketed by 18 and 24.', '18 and 24 bracket 21.', 'Brackets: 18 and 24.'),
        buildRound('C', 4, 'mangoes', 4, 32, 'yes', 'Yes — 4 × 8 = 32, exactly.', '4 × 8 = 32.', '4 × 8 = 32.', '4 × 8 = 32.'),
        buildRound('C', 5, 'eggs', 7, 21, 'yes', 'Yes — 7 × 3 = 21, exactly.', '7 × 3 = 21.', '7 × 3 = 21.', '7 × 3 = 21.'),
        buildRound('C', 6, 'samosas', 5, 35, 'yes', 'Yes — 5 × 7 = 35, exactly.', '5 × 7 = 35.', '5 × 7 = 35.', '5 × 7 = 35.'),
        buildRound('C', 7, 'biscuits', 8, 47, 'no', 'Right — 40 and 48 bracket 47.', 'Bracketed by 40 and 48.', '40 and 48 bracket 47.', 'Brackets: 40 and 48.'),
        buildRound('C', 8, 'samosas', 9, 63, 'yes', 'Yes — 9 × 7 = 63, exactly.', '9 × 7 = 63.', '9 × 7 = 63.', '9 × 7 = 63.'),
        buildRound('C', 9, 'mangoes', 7, 50, 'no', 'Right — 49 and 56 bracket 50.', 'Bracketed by 49 and 56.', '49 and 56 bracket 50.', 'Brackets: 49 and 56.'),
        buildRound('C', 10, 'erasers', 12, 72, 'yes', 'Yes — 12 × 6 = 72, exactly.', '12 × 6 = 72.', '12 × 6 = 72.', '12 × 6 = 72.')
      ]
    };

    var SETS = ['A','B','C'];
    var gameState = {
      gameId: 'binary-mcq-with-justification-input',
      gameTitle: 'Pack or No Pack',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 10,
      score: 0,
      lives: 3,
      totalLives: 3,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      duration_data: { startTime: null, endTime: null, preview: [] },
      correctAnswer: null,
      stars: 0,
      setIndex: 0,
      activeRounds: [],
      previewResult: null,
      progress: 0,
      currentYNPick: null,
      justifyText: ''
    };
    window.gameState = gameState;

    var timer = null, visibilityTracker = null, signalCollector = null, progressBar = null;
    var transitionScreen = null, previewScreen = null, floatingBtn = null, answerComponent = null;

    function getAvailableSets(rounds) {
      var seen = {}; var out = [];
      for (var i = 0; i < rounds.length; i++) { var s = rounds[i].set; if (s && !seen[s]) { seen[s] = true; out.push(s); } }
      return out.length ? out : ['A'];
    }
    function getRounds() {
      var src = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(src);
      var setKey = sets[gameState.setIndex % sets.length];
      var filtered = [];
      for (var i = 0; i < src.length; i++) if (src[i].set === setKey) filtered.push(src[i]);
      filtered.sort(function (a,b) { return a.round - b.round; });
      return filtered;
    }
    function getCorrectCount() {
      var c = 0;
      for (var i = 0; i < gameState.attempts.length; i++) if (gameState.attempts[i].correct === true) c++;
      return c;
    }
    function getStars() {
      var c = getCorrectCount();
      var t = gameState.totalRounds;
      if (c >= t && gameState.lives === gameState.totalLives) return 3;
      if (c >= Math.ceil(t * 0.7)) return 2;
      if (c >= 1) return 1;
      return 0;
    }
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound + 1);
    }
    function trackEvent(name, payload) {
      try { gameState.events.push({ event: name, ts: Date.now(), data: payload || {} }); } catch (e) {}
      try { if (signalCollector && signalCollector.recordEvent) signalCollector.recordEvent(name, payload || {}); } catch (e) {}
    }
    function recordAttempt(input, correct, miscTag, responseMs) {
      var round = gameState.activeRounds[gameState.currentRound];
      var qid = round ? round.id : ('r' + (gameState.currentRound + 1));
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) : 0,
        input_of_user: input,
        correct: correct === true,
        round_number: gameState.currentRound + 1,
        question_id: qid,
        correct_answer: round ? round.correctYesNo : null,
        response_time_ms: typeof responseMs === 'number' ? responseMs : 0,
        misconception_tag: miscTag || null,
        difficulty_level: round ? (round.stage || 1) : 1,
        is_retry: false,
        metadata: { set: round ? round.set : null }
      };
      gameState.attempts.push(attempt);
      try { if (signalCollector && signalCollector.recordAttempt) signalCollector.recordAttempt(attempt); } catch (e) {}
    }
    function postGameComplete() {
      if (gameState._gameCompletePosted) return;
      gameState._gameCompletePosted = true;
      var correctCount = getCorrectCount();
      var attempted = gameState.attempts.length;
      var accuracy = attempted === 0 ? 0 : Math.round((correctCount / attempted) * 100);
      var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
      var triesByRound = gameState.attempts.map(function (a) { return { round: a.round_number, correct: a.correct === true }; });
      var metrics = {
        accuracy: accuracy, time: Math.round(elapsedMs / 1000), stars: gameState.stars,
        attempts: gameState.attempts.slice(), duration_data: gameState.duration_data,
        totalLives: gameState.lives, tries: triesByRound, score: gameState.score, correctCount: correctCount
      };
      var signalSealed = { event_count: gameState.events.length, metadata: {} };
      try { if (signalCollector && typeof signalCollector.seal === 'function') { var sealed = signalCollector.seal(); if (sealed) { if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count; if (sealed.metadata) signalSealed.metadata = sealed.metadata; } } } catch (e0) {}
      try { window.parent.postMessage({ type:'game_complete', data:{ metrics:metrics, previewResult:gameState.previewResult, completedAt:Date.now(), signal_event_count:signalSealed.event_count, signal_metadata:signalSealed.metadata } }, '*'); } catch (e) {}
    }

    function safePlaySound(id, opts) { try { return FeedbackManager.sound.play(id, opts || {}); } catch (e) { return Promise.resolve(); } }
    function awaitedFeedbackSound(id, opts) {
      var p = safePlaySound(id, opts || {});
      var floor = new Promise(function (r) { setTimeout(r, 1500); });
      return Promise.all([p, floor]).then(function () {}, function () {});
    }
    function playDynamicFeedback(opts) { try { return FeedbackManager.playDynamicFeedback(opts || {}); } catch (e) { return Promise.resolve(); } }

    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok = typeof FeedbackManager !== 'undefined' &&
            typeof TimerComponent !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            try { throw new Error('waitForPackages timeout'); } catch (re) { reject(err); return; }
            return reject(err);
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    function escapeHTML(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function packSVG(packSize) {
      // simple cluster of rectangles to represent a pack
      var n = Math.min(packSize, 12);
      var cols = Math.min(n, 4);
      var rows = Math.ceil(n / cols);
      var bw = 22, bh = 36, gap = 4;
      var totalW = cols * bw + (cols - 1) * gap + 24;
      var totalH = rows * bh + (rows - 1) * gap + 24;
      var inner = '';
      for (var i = 0; i < n; i++) {
        var r = Math.floor(i / cols);
        var c = i % cols;
        var x = 12 + c * (bw + gap);
        var y = 12 + r * (bh + gap);
        inner += '<rect x="' + x + '" y="' + y + '" width="' + bw + '" height="' + bh + '" rx="4" fill="#4A6CF7" stroke="#3DB7E0" stroke-width="2"/>';
      }
      var w = Math.min(totalW, 200);
      var h = Math.min(totalH, 120);
      return '<svg viewBox="0 0 ' + totalW + ' ' + totalH + '" width="' + w + '" height="' + h + '">' + inner + '</svg>';
    }

    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="scene-line" id="sceneLine"></div>' +
        '<div class="pack-illustration" id="packIllustration"></div>' +
        '<div class="question-line" id="questionLine"></div>' +
        '<div class="yn-options" id="ynOptions">' +
          '<button type="button" class="yn-btn" id="ynYes" data-testid="yn-yes" data-value="yes">Yes</button>' +
          '<button type="button" class="yn-btn" id="ynNo" data-testid="yn-no" data-value="no">No</button>' +
        '</div>' +
        '<div class="justify-block">' +
          '<div class="justify-label">Explain your answer.</div>' +

    function onYNTap(ev) {
      if (gameState.isProcessing || gameState.gameEnded) return;

    function onSubmitTap() {

      if (!ynPick || text.length === 0) return;

    function justificationHasMultiple(text, packSize) {
      // "valid" = contains a number that is a multiple of packSize, OR mentions packSize times some integer
      var t = String(text || '');
      var nums = (t.match(/\d+/g) || []).map(function (s) { return parseInt(s, 10); });
      for (var i = 0; i < nums.length; i++) {
        if (nums[i] > 0 && nums[i] % packSize === 0) return true;
      }
      return false;
    }

    function handleAnswer(ynPick, justification) {
      gameState.isProcessing = true;
      var responseMs = Date.now() - (gameState.roundStartMs || Date.now());
      var round = gameState.activeRounds[gameState.currentRound];
      var ynCorrect = (ynPick === round.correctYesNo);

      var yes = document.getElementById('ynYes');
      var no = document.getElementById('ynNo');
      if (yes) yes.classList.add('disabled');
      if (no) no.classList.add('disabled');
      try { if (timer && timer.pause) timer.pause(); } catch (e) {}

      if (!ynCorrect) {
        // wrong YN — life loss, paint the wrong tile red and the correct one green
        var picked = ynPick === 'yes' ? yes : no;
        var corr = round.correctYesNo === 'yes' ? yes : no;
        if (picked) picked.classList.add('solved-wrong');
        if (corr) corr.classList.add('solved-correct');
        gameState.lives = Math.max(0, gameState.lives - 1);
        gameState.progress = gameState.currentRound + 1;
        try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
        syncDOM();
        recordAttempt(JSON.stringify({ ynPick: ynPick, justify: justification }), false, 'wrong-yn', responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: false, ynPick: ynPick });
        runWrongFeedbackAndAdvance(round);
        return;
      }

      // YN is correct — check justification for a relevant multiple
      var jOK = justificationHasMultiple(justification, round.packSize);
      var picked2 = ynPick === 'yes' ? yes : no;
      if (picked2) picked2.classList.add('solved-correct');

      if (!jOK) {
        // soft re-prompt — no life loss, allow edit and resubmit
        var ji2 = document.getElementById('justifyInput');
        if (ji2) ji2.classList.add('amber');
        var nb = document.getElementById('nudgeBox');
        if (nb) { nb.textContent = 'Tell me a multiple of ' + round.packSize + ' to back that up.'; nb.classList.add('visible'); }
        // re-enable buttons & input gate
        if (yes) yes.classList.remove('disabled');
        if (no) no.classList.remove('disabled');
        try { if (timer && timer.resume) timer.resume(); } catch (e) {}
        gameState.isProcessing = false;
        recordAttempt(JSON.stringify({ ynPick: ynPick, justify: justification }), false, 'no-multiple-cited', responseMs);
        trackEvent('soft_reprompt', { round: gameState.currentRound + 1 });
        return;
      }

      // Both correct
      gameState.score += 1;
      gameState.progress = gameState.currentRound + 1;
      try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
      syncDOM();
      recordAttempt(JSON.stringify({ ynPick: ynPick, justify: justification }), true, null, responseMs);
      trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: true, ynPick: ynPick });
      runCorrectFeedbackAndAdvance(round);
    }

    function runCorrectFeedbackAndAdvance(round) {

        try { await playDynamicFeedback({ audio_content: round.correctTTS, subtitle: round.correctSubtitle, sticker: STICKER_CORRECT }); } catch (e) {}
        advanceAfterFeedback();

        try { await playDynamicFeedback({ audio_content: round.wrongTTS, subtitle: round.wrongSubtitle, sticker: STICKER_SAD }); } catch (e) {}
        advanceAfterFeedback();
      })();

    function advanceAfterFeedback() {
      var roundJustPlayed = gameState.currentRound + 1;
      if (gameState.lives === 0) { gameState.stars = getStars(); postGameComplete(); endGame(false); return; }
      if (roundJustPlayed === gameState.totalRounds) { endGame(true); return; }
      showRoundIntro(roundJustPlayed + 1);

    async function showRoundIntro(n) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      var ttsText = 'Round ' + n;
      await transitionScreen.show({
        title: 'Round ' + n, icons: [], persist: true, buttons: [],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_ROUND }); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          })();
        }
      });

      // Safety timeout if audio stalls. Use `<` not `!==` so we only fire if the
      // game has not YET reached round n. Once it has advanced, do nothing —
      // a stale `!==` check would yank the game backwards across rounds.
      setTimeout(function () {
        try {
          if (gameState.gameEnded) return;
          if (gameState.currentRound + 1 < n) {
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          }
        } catch (e) {}
      }, 9000);
    }

    function renderAnswerSlide(container, round) {
      if (!container || !round || !round.answer) return;
      var a = round.answer;
      var html = '<div class="answer-card">';
      html += '<div class="scenario">Round ' + round.round + ' — packs of ' + a.packSize + ', target ' + a.target + '</div>';
      html += '<div class="accepted">Answer: ' + (a.correctYesNo === 'yes' ? 'Yes' : 'No') + '</div>';
      var why = '';
      if (a.correctYesNo === 'yes') why = a.packSize + ' × ' + (a.target / a.packSize) + ' = ' + a.target;
      else why = a.lower + ' and ' + a.upper + ' bracket ' + a.target;

              try {
                FeedbackManager.sound.preload([
                  { id: 'correct_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
                  { id: 'incorrect_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                  { id: 'rounds_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                  { id: 'sound_level_transition',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
                  { id: 'victory_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                  { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
                  { id: 'game_over_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                  { id: 'tap_sound',                url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
                ]);
              } catch (e) { console.error('[FeedbackManager.preload failed]', e && e.message); }

              window.addEventListener('message', handlePostMessage);
              try { window.parent.postMessage({ type:'game_ready' }, '*'); } catch (e) {}
              setupGame();
            } catch (e) { console.error('[init inner] ' + (e && e.message)); }
          }, function (e) { console.error('[FeedbackManager.init failed]', e && e.message); });
        } catch (e) { console.error('[init outer] ' + (e && e.message)); }
      }, function (err) { console.error('[waitForPackages rejected] ' + (err && err.message)); });

      setTimeout(function () {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;
      }, 2000);

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = setupGame;
      window.renderRound = renderRound;
      window.loadRound = function (n) { try { renderRound(n); } catch (e) {} };
    });
  </script>
</body>
</html>
