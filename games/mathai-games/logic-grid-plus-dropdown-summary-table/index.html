<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Four Friends, One Grid</title>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>
  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-amber: #FFE7B2;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --logic-purple-strip: #6B3FA0;
      --logic-clue-bg: #FFF7D6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%; height:100dvh; overflow-x:hidden; overscroll-behavior:none; }
    @supports not (height: 100dvh) { html, body { height: 100vh; } }
    body { font-family: var(--mathai-font-family); background: var(--mathai-white); color: var(--mathai-text-primary); -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent; line-height:1.5; }
    #app { width:100%; max-width:var(--mathai-game-max-width); min-height:100dvh; margin:0 auto; display:flex; flex-direction:column; position:relative; overflow-x:clip; padding-top:env(safe-area-inset-top, 0px); padding-bottom:env(safe-area-inset-bottom, 0px); }
    @supports not (min-height: 100dvh) { #app { min-height: 100vh; } }
    #gameContent { display:flex; flex-direction:column; width:100%; padding:8px 14px 16px; }

    .scenario-block {
      padding: 10px 4px 8px;
      font-size: 15px;
      color: var(--mathai-text-primary);
    }
    .scenario-block .friends-list { font-weight: 700; color: var(--mathai-primary); }

    .grid-card {
      background: var(--mathai-white);
      border-radius: 14px;
      border: 1px solid var(--mathai-border-gray);
      padding: 10px 6px;
      margin-top: 6px;
    }
    .grid-card-title {
      background: var(--logic-purple-strip);
      color: var(--mathai-white);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 8px;
    }
    .deduction-grid {
      display: grid;
      width: 100%;
      grid-template-columns: 80px repeat(4, 1fr);
      grid-gap: 2px;
      gap: 2px;
    }
    .dg-h, .dg-row-h {
      font-size: 12px; font-weight: 700; color: var(--mathai-primary);
      text-align:center; padding: 6px 2px;
      background: var(--mathai-light-gray);
      border-radius: 6px;
    }
    .dg-row-h { background: var(--mathai-cell-bg-yellow); }
    .dg-cell {
      min-height: 44px; min-width: 44px;
      border: 1px solid var(--mathai-border-gray);
      background: var(--mathai-white);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      cursor: pointer; touch-action: manipulation;
      border-radius: 6px;
      color: var(--mathai-text-primary);
    }
    .dg-cell.tick { color: var(--mathai-green); }
    .dg-cell.cross { color: var(--mathai-red); }

    .clue-card {
      background: var(--logic-clue-bg);
      border-radius: 12px;
      padding: 10px 12px;
      margin-top: 12px;
    }
    .clue-card-header {
      font-size: 13px; font-weight: 700; color: var(--mathai-primary);
      letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px;
    }
    .clue-line { font-size: 14px; color: var(--mathai-text-primary); padding: 4px 0; }

    .summary-table {
      margin-top: 14px;
      background: var(--mathai-white);
      border: 1px solid var(--mathai-border-gray);
      border-radius: 12px;
      padding: 8px;
    }
    .summary-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 6px;
      align-items: center;
      padding: 6px 4px;
      border-bottom: 1px solid var(--mathai-border-gray);
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row.header { font-weight: 700; font-size: 12px; color: var(--mathai-primary); text-transform: uppercase; letter-spacing: 0.04em; }
    .summary-name {
      font-weight: 700; font-size: 14px; color: var(--mathai-primary); text-align: center;
      padding: 6px 4px;
    }
    .summary-row select.summary-dd {
      width: 100%; min-height: 44px;
      border: 2px solid var(--mathai-border-gray);
      border-radius: 8px;
      background: var(--mathai-white);
      font-family: var(--mathai-font-family);
      font-size: 14px;
      padding: 0 6px;
      color: var(--mathai-text-primary);
      -webkit-appearance: none; appearance: none;
    }
    .summary-row.row-correct select.summary-dd {
      background: var(--mathai-cell-bg-green); border-color: var(--mathai-cell-border-green); color: var(--mathai-green);
    }
    .summary-row.row-wrong select.summary-dd {
      background: var(--mathai-cell-bg-red); border-color: var(--mathai-cell-border-red); color: var(--mathai-red);
      animation: shake 0.5s ease;
    }
    .summary-row.row-amber select.summary-dd {
      background: var(--mathai-cell-bg-amber); border-color: var(--mathai-orange);
    }

    button, [role="button"] { min-height: 44px; min-width: 44px; touch-action: manipulation; }
    #app { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    input, textarea, select { -webkit-user-select: text; user-select: text; }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: var(--mathai-white); color: var(--mathai-primary);
        font-family: var(--mathai-font-family); font-size: 18px;
        text-align: center; padding: 24px;
      }
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shake { 0%,100% { transform:translateX(0); } 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }
    .fade-in { animation: fadeIn 0.35s ease; }

    .answer-card {
      width:100%; max-width:380px; margin:0 auto; padding:14px 12px 18px; text-align:left;
    }
    .answer-card .scenario { font-weight:600; color:var(--mathai-primary); margin-bottom:8px; }
    .answer-card .accepted {
      padding:10px 12px; background:var(--mathai-cell-bg-green);
      border:2px solid var(--mathai-cell-border-green); color:var(--mathai-green);
      border-radius:12px; font-weight:700; margin-bottom:8px;
    }
    .answer-card .row-line { padding: 4px 0; font-size: 14px; }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="2"></div>
  <script>
    var STICKER_CORRECT  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_WRONG    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_LEVEL    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';
    var STICKER_VICTORY  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_TWO      = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_ONE      = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_CELEBRATE = STICKER_VICTORY;
    var STICKER_SAD = STICKER_WRONG;
    var STICKER_MOTIVATE = STICKER_LEVEL;

    /* Round structure:
       people: [4 names]
       starts: [4 ints]
       ops:    [4 strings like '+8','-6','x3','/3']
       results: [4 ints]
       solution: array of 4 objects { name, start, op, result }
       clues: array of human-readable strings (3-5)
    */
    function buildRound(set, n, scenario) {
      var prefix = set + '_r' + n;
      return {
        set: set, id: prefix + '_logic-' + n, round: n,
        stage: n <= 2 ? 1 : (n <= 4 ? 2 : 3),
        type: 'logic-grid',
        people: scenario.people,
        starts: scenario.starts,
        ops: scenario.ops,
        results: scenario.results,
        solution: scenario.solution,
        clues: scenario.clues,
        correctTTS: 'Sharp deduction! All four rows match.',
        correctSubtitle: 'All four rows match.',
        wrongTTS: 'Re-check the clues. Some rows do not match.',
        wrongSubtitle: 'Some rows do not match — re-check clues.',
        misconception_tags: { 'partial':'partial-deduction' },
        answer: { people: scenario.people, solution: scenario.solution }
      };
    }

    var fallbackContent = {
      previewInstruction: '<p><b>Four Friends, One Grid.</b> Use clues + the tap grid to deduce who did what, then lock answers via dropdowns.</p><p><b>One deep puzzle, 2 lives.</b> Tap a grid cell once for ✓, twice for ✘, again to clear. The grid is your scratchpad. Pick from dropdowns and the round resolves automatically when all 12 dropdowns match.</p>',
      previewAudioText: 'Four friends, one grid. Use the clues, deduce, and pick from the dropdowns to lock in your answers.',
      previewAudio: null,
      showGameOnPreview: false,
      totalRounds: 1,
      totalLives: 2,
      answerComponent: true,
      rounds: [
        // Set A — Largest-result + smallest-start + parity-of-result chain
        buildRound('A', 1, {
          people: ['Diya', 'Arjun', 'Meera', 'Kabir'],
          starts: [7, 16, 4, 18],
          ops: ['+8', '-6', 'x3', '/3'],
          results: [15, 10, 12, 6],
          solution: [
            { name:'Diya', start:7, op:'+8', result:15 },
            { name:'Arjun', start:16, op:'-6', result:10 },
            { name:'Meera', start:4, op:'x3', result:12 },
            { name:'Kabir', start:18, op:'/3', result:6 }
          ],
          clues: [
            "Diya's result is the largest odd number.",
            "Kabir's result is the smallest of the four.",
            "Meera's start is the smallest of the four."
          ]
        }),
        // Set B — Range-comparison (greater/less than) + ordinal-start logic
        buildRound('B', 1, {
          people: ['Riya', 'Vihaan', 'Sara', 'Aditya'],
          starts: [5, 24, 9, 8],
          ops: ['x4', '/4', '-2', '+7'],
          results: [20, 6, 7, 15],
          solution: [
            { name:'Riya', start:5, op:'x4', result:20 },
            { name:'Vihaan', start:24, op:'/4', result:6 },
            { name:'Sara', start:9, op:'-2', result:7 },
            { name:'Aditya', start:8, op:'+7', result:15 }
          ],
          clues: [
            "Riya's result is greater than 15 and even.",
            "Vihaan's start is the largest of the four.",
            "Sara's result is less than 10."
          ]
        }),
        // Set C — Parity + multiple-of constraints (no use of largest/smallest ranking)
        buildRound('C', 1, {
          people: ['Diya', 'Arjun', 'Meera', 'Kabir'],
          starts: [6, 11, 30, 2],
          ops: ['x2', '+9', '/5', '-1'],
          results: [12, 20, 6, 1],
          solution: [
            { name:'Diya', start:6, op:'x2', result:12 },
            { name:'Arjun', start:11, op:'+9', result:20 },
            { name:'Meera', start:30, op:'/5', result:6 },
            { name:'Kabir', start:2, op:'-1', result:1 }
          ],
          clues: [
            "Kabir's result is the only odd single-digit number.",
            "Meera's start is a multiple of 10.",
            "Diya's result is even and a multiple of 4."
          ]
        })
      ]
    };

    var SETS = ['A','B','C'];
    var gameState = {
      gameId: 'logic-grid-plus-dropdown-summary-table',
      gameTitle: 'Four Friends, One Grid',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 1,
      score: 0,
      lives: 2,
      totalLives: 2,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      duration_data: { startTime: null, endTime: null, preview: [] },
      correctAnswer: null,
      stars: 0,
      setIndex: 0,
      activeRounds: [],
      previewResult: null,
      progress: 0,
      // grid scratch state — array of arrays of 'tick'/'cross'/'empty'; not validated
      gridScratch: { startOp: [], opResult: [] },
      // dropdowns: { row: [start, op, result] } for each row 0..3
      dropdowns: [],
      submitsThisRound: 0
    };
    window.gameState = gameState;

    var timer = null, visibilityTracker = null, signalCollector = null, progressBar = null;
    var transitionScreen = null, previewScreen = null, floatingBtn = null, answerComponent = null;

    function getAvailableSets(rounds) {
      var seen = {}; var out = [];
      for (var i = 0; i < rounds.length; i++) { var s = rounds[i].set; if (s && !seen[s]) { seen[s] = true; out.push(s); } }
      return out.length ? out : ['A'];
    }
    function getRounds() {
      var src = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(src);
      var setKey = sets[gameState.setIndex % sets.length];
      var filtered = [];
      for (var i = 0; i < src.length; i++) if (src[i].set === setKey) filtered.push(src[i]);
      filtered.sort(function (a,b) { return a.round - b.round; });
      return filtered;
    }
    function getCorrectCount() {
      var c = 0;
      for (var i = 0; i < gameState.attempts.length; i++) if (gameState.attempts[i].correct === true) c++;
      return c;
    }
    function getStars() {
      var c = getCorrectCount();
      var t = gameState.totalRounds;
      if (c >= t && gameState.lives === gameState.totalLives) return 3;
      if (c >= Math.ceil(t * 0.7)) return 2;
      if (c >= 1) return 1;
      return 0;
    }
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound + 1);
    }
    function trackEvent(name, payload) {
      try { gameState.events.push({ event: name, ts: Date.now(), data: payload || {} }); } catch (e) {}
      try { if (signalCollector && signalCollector.recordEvent) signalCollector.recordEvent(name, payload || {}); } catch (e) {}
    }
    function recordAttempt(input, correct, miscTag, responseMs) {
      var round = gameState.activeRounds[gameState.currentRound];
      var qid = round ? round.id : ('r' + (gameState.currentRound + 1));
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) : 0,
        input_of_user: input,
        correct: correct === true,
        round_number: gameState.currentRound + 1,
        question_id: qid,
        correct_answer: round ? JSON.stringify(round.solution) : null,
        response_time_ms: typeof responseMs === 'number' ? responseMs : 0,
        misconception_tag: miscTag || null,
        difficulty_level: round ? (round.stage || 1) : 1,
        is_retry: false,
        metadata: { set: round ? round.set : null }
      };
      gameState.attempts.push(attempt);
      try { if (signalCollector && signalCollector.recordAttempt) signalCollector.recordAttempt(attempt); } catch (e) {}
    }
    function postGameComplete() {
      if (gameState._gameCompletePosted) return;
      gameState._gameCompletePosted = true;
      var correctCount = getCorrectCount();
      var attempted = gameState.attempts.length;
      var accuracy = attempted === 0 ? 0 : Math.round((correctCount / attempted) * 100);
      var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
      var triesByRound = gameState.attempts.map(function (a) { return { round: a.round_number, correct: a.correct === true }; });
      var metrics = {
        accuracy: accuracy, time: Math.round(elapsedMs / 1000), stars: gameState.stars,
        attempts: gameState.attempts.slice(), duration_data: gameState.duration_data,
        totalLives: gameState.lives, tries: triesByRound, score: gameState.score, correctCount: correctCount
      };
      var signalSealed = { event_count: gameState.events.length, metadata: {} };
      try { if (signalCollector && typeof signalCollector.seal === 'function') { var sealed = signalCollector.seal(); if (sealed) { if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count; if (sealed.metadata) signalSealed.metadata = sealed.metadata; } } } catch (e0) {}
      try { window.parent.postMessage({ type:'game_complete', data:{ metrics:metrics, previewResult:gameState.previewResult, completedAt:Date.now(), signal_event_count:signalSealed.event_count, signal_metadata:signalSealed.metadata } }, '*'); } catch (e) {}
    }

    function safePlaySound(id, opts) { try { return FeedbackManager.sound.play(id, opts || {}); } catch (e) { return Promise.resolve(); } }
    function awaitedFeedbackSound(id, opts) {
      var p = safePlaySound(id, opts || {});
      var floor = new Promise(function (r) { setTimeout(r, 1500); });
      return Promise.all([p, floor]).then(function () {}, function () {});
    }
    function playDynamicFeedback(opts) { try { return FeedbackManager.playDynamicFeedback(opts || {}); } catch (e) { return Promise.resolve(); } }

    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok = typeof FeedbackManager !== 'undefined' &&
            typeof TimerComponent !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            try { throw new Error('waitForPackages timeout'); } catch (re) { reject(err); return; }
            return reject(err);
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    function escapeHTML(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="scenario-block" id="scenarioBlock"></div>' +
        '<div class="grid-card">' +
          '<div class="grid-card-title">Operation × Start</div>' +
          '<div class="deduction-grid" id="gridStartOp" data-testid="grid-start-op"></div>' +
        '</div>' +
        '<div class="grid-card">' +
          '<div class="grid-card-title">Operation × Result</div>' +
          '<div class="deduction-grid" id="gridOpResult" data-testid="grid-op-result"></div>' +
        '</div>' +
        '<div class="clue-card" id="clueCard" data-testid="clue-card">' +
          '<div class="clue-card-header">Clues</div>' +
          '<div id="clueLines"></div>' +
        '</div>' +
        '<div class="summary-table" id="summaryTable" data-testid="summary-table"></div>';
    }
    function renderInitialState() {
      var sb = document.getElementById('scenarioBlock');
      var g1 = document.getElementById('gridStartOp');
      var g2 = document.getElementById('gridOpResult');
      var cl = document.getElementById('clueLines');
      var st = document.getElementById('summaryTable');
      if (sb) sb.innerHTML = '';
      if (g1) g1.innerHTML = '';
      if (g2) g2.innerHTML = '';
      if (cl) cl.innerHTML = '';
      if (st) st.innerHTML = '';
    }

    function renderRound(roundIdxOneBased) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      gameState.currentRound = roundIdxOneBased - 1;
      gameState.isActive = true;
      gameState.phase = 'gameplay';
      syncDOM();

      var round = gameState.activeRounds[gameState.currentRound];
      if (!round) return;
      gameState.correctAnswer = round.solution;
      gameState.gridScratch = {
        startOp: makeEmptyGrid(4, 4),
        opResult: makeEmptyGrid(4, 4)
      };
      gameState.dropdowns = [
        ['', '', ''], ['', '', ''], ['', '', ''], ['', '', '']
      ];
      gameState.submitsThisRound = 0;

      // scenario block
      var sb = document.getElementById('scenarioBlock');
      if (sb) {
        var nameList = round.people.join(', ');
        sb.innerHTML =
          '<div><span class="friends-list">' + escapeHTML(nameList) + '</span> each took 1 number and operated on it. ' +
          'Different starting numbers, one operation each, different results.</div>' +
          '<div style="margin-top:6px;font-size:13px;color:#666;">' +
          'Cells cycle: tap once for ✓, again for ✘, again to clear. Grid is your scratchpad.</div>';
      }

      // grid 1: rows = starts, cols = ops
      renderGrid('gridStartOp', round.starts, round.ops, 'startOp');
      renderGrid('gridOpResult', round.results, round.ops, 'opResult');

      // clues
      var cl = document.getElementById('clueLines');
      if (cl) {
        var html = '';
        for (var i = 0; i < round.clues.length; i++) {
          html += '<div class="clue-line">• ' + escapeHTML(round.clues[i]) + '</div>';
        }
        cl.innerHTML = html;
      }

      // summary table
      renderSummaryTable(round);

      gameState.isProcessing = false;
      gameState.roundStartMs = Date.now();
      try { if (timer && timer.resume) timer.resume(); } catch (e) {}
      setSubmittableState();
      try { var p = safePlaySound('tap_sound', {}); if (p && p.catch) p.catch(function () {}); } catch (e) {}
      trackEvent('round_start', { round: roundIdxOneBased });
    }

    function makeEmptyGrid(rows, cols) {
      var g = [];
      for (var r = 0; r < rows; r++) {
        var row = [];
        for (var c = 0; c < cols; c++) row.push('empty');
        g.push(row);
      }
      return g;
    }

    function renderGrid(id, rowLabels, colLabels, scratchKey) {
      var el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = '';
      // header row: empty corner + 4 col labels
      var corner = document.createElement('div'); corner.className = 'dg-h'; corner.textContent = '';
      el.appendChild(corner);
      for (var c = 0; c < colLabels.length; c++) {
        var ch = document.createElement('div');
        ch.className = 'dg-h';
        ch.textContent = String(colLabels[c]);
        el.appendChild(ch);
      }
      // body rows
      for (var r = 0; r < rowLabels.length; r++) {
        var rh = document.createElement('div');
        rh.className = 'dg-row-h';
        rh.textContent = String(rowLabels[r]);
        el.appendChild(rh);
        for (var c2 = 0; c2 < colLabels.length; c2++) {
          var cell = document.createElement('div');
          cell.className = 'dg-cell';
          var v = gameState.gridScratch[scratchKey][r][c2];
          if (v === 'tick') { cell.classList.add('tick'); cell.textContent = '✓'; }
          else if (v === 'cross') { cell.classList.add('cross'); cell.textContent = '✖'; }
          else { cell.textContent = ''; }
          cell.setAttribute('data-grid', scratchKey);
          cell.setAttribute('data-row', String(r));
          cell.setAttribute('data-col', String(c2));
          cell.setAttribute('data-testid', scratchKey + '-' + r + '-' + c2);
          cell.addEventListener('click', onGridCellTap);
          el.appendChild(cell);
        }
      }
    }

    function onGridCellTap(ev) {
      if (gameState.isProcessing || gameState.gameEnded) return;
      var btn = ev.currentTarget;
      var grid = btn.getAttribute('data-grid');
      var r = parseInt(btn.getAttribute('data-row'), 10);
      var c = parseInt(btn.getAttribute('data-col'), 10);
      var cur = gameState.gridScratch[grid][r][c];
      var next = cur === 'empty' ? 'tick' : (cur === 'tick' ? 'cross' : 'empty');
      gameState.gridScratch[grid][r][c] = next;
      btn.classList.remove('tick'); btn.classList.remove('cross');
      if (next === 'tick') { btn.classList.add('tick'); btn.textContent = '✓'; }
      else if (next === 'cross') { btn.classList.add('cross'); btn.textContent = '✖'; }
      else { btn.textContent = ''; }
      var p = safePlaySound('tap_sound', {});
      if (p && p.catch) p.catch(function () {});
    }

      var html = '';
      html += '<div class="summary-row header"><div>Name</div><div>Start</div><div>Op</div><div>Result</div></div>';

        html += '<div class="summary-row" id="sr-' + i + '">';

        html += '<select class="summary-dd" data-testid="dd-start-' + i + '" data-row="' + i + '" data-key="start"><option value="">—</option>';

        html += '</select>';

        for (var o = 0; o < round.ops.length; o++) html += '<option value="' + round.ops[o] + '">' + round.ops[o] + '</option>';
        html += '</select>';

    function onDropdownChange(ev) {
      if (gameState.isProcessing || gameState.gameEnded) return;
      var sel = ev.currentTarget;
      var row = parseInt(sel.getAttribute('data-row'), 10);
      var key = sel.getAttribute('data-key');
      var v = sel.value;
      var idx = key === 'start' ? 0 : (key === 'op' ? 1 : 2);
      gameState.dropdowns[row][idx] = v;

      var sr = document.getElementById('sr-' + row);
      if (sr) sr.classList.remove('row-amber');
      setSubmittableState();

    function setSubmittableState() {
      // submittable when all 12 dropdowns have non-empty value
      var ok = true;
      for (var i = 0; i < 4; i++) {
        for (var j = 0; j < 3; j++) {
          if (!gameState.dropdowns[i] || gameState.dropdowns[i][j] === '' || gameState.dropdowns[i][j] === undefined) ok = false;
        }
      }
      try { if (floatingBtn) floatingBtn.setSubmittable(ok); } catch (e) {}
    }

    function onSubmitTap() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      // check all dropdowns filled
      var ok = true;
      for (var i = 0; i < 4; i++) for (var j = 0; j < 3; j++) if (gameState.dropdowns[i][j] === '') ok = false;
      if (!ok) return;
      handleAnswer();
    }

    function handleAnswer() {
      gameState.isProcessing = true;
      var responseMs = Date.now() - (gameState.roundStartMs || Date.now());
      var round = gameState.activeRounds[gameState.currentRound];
      var solution = round.solution;
      var wrongRows = [];
      for (var i = 0; i < 4; i++) {
        var picked = gameState.dropdowns[i];
        var sol = solution[i];
        var startOK = String(picked[0]) === String(sol.start);
        var opOK = String(picked[1]) === String(sol.op);
        var resOK = String(picked[2]) === String(sol.result);
        if (!(startOK && opOK && resOK)) wrongRows.push(i);
      }

      gameState.submitsThisRound += 1;
      try { if (timer && timer.pause) timer.pause(); } catch (e) {}

      if (wrongRows.length === 0) {
        // all correct
        for (var i2 = 0; i2 < 4; i2++) {
          var sr = document.getElementById('sr-' + i2);
          if (sr) sr.classList.add('row-correct');
        }
        gameState.score += 1;
        gameState.progress = gameState.currentRound + 1;
        try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
        syncDOM();
        recordAttempt(JSON.stringify(gameState.dropdowns), true, null, responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: true, submits: gameState.submitsThisRound });
        runCorrectFeedbackAndAdvance(round);
        return;
      }

      // some wrong
      if (gameState.submitsThisRound === 1) {
        // First wrong submit — flag wrong rows amber, no life, allow re-edit
        for (var w = 0; w < wrongRows.length; w++) {
          var srw = document.getElementById('sr-' + wrongRows[w]);
          if (srw) srw.classList.add('row-amber');
        }
        // also play partial-wrong fire-and-forget
        var p = safePlaySound('incorrect_sound_effect', { sticker: STICKER_SAD });
        if (p && p.catch) p.catch(function () {});
        // re-enable for edit
        gameState.isProcessing = false;
        try { if (timer && timer.resume) timer.resume(); } catch (e) {}
        recordAttempt(JSON.stringify(gameState.dropdowns), false, 'first-submit-some-wrong', responseMs);
        trackEvent('soft_reprompt', { round: gameState.currentRound + 1, wrongRows: wrongRows.length });
        return;
      }

      // second wrong submit — life lost, paint wrong rows red, advance
      for (var w2 = 0; w2 < wrongRows.length; w2++) {
        var srw2 = document.getElementById('sr-' + wrongRows[w2]);
        if (srw2) { srw2.classList.remove('row-amber'); srw2.classList.add('row-wrong'); }
      }
      gameState.lives = Math.max(0, gameState.lives - 1);
      gameState.progress = gameState.currentRound + 1;
      try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
      syncDOM();
      recordAttempt(JSON.stringify(gameState.dropdowns), false, 'second-submit-life-lost', responseMs);
      trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: false, wrongRows: wrongRows.length });
      runWrongFeedbackAndAdvance(round);
    }

    function runCorrectFeedbackAndAdvance(round) {
      (async function () {
        try { await awaitedFeedbackSound('correct_sound_effect', { sticker: STICKER_CORRECT }); } catch (e) {}
        try { await playDynamicFeedback({ audio_content: round.correctTTS, subtitle: round.correctSubtitle, sticker: STICKER_CORRECT }); } catch (e) {}
        advanceAfterFeedback();
      })();
    }
    function runWrongFeedbackAndAdvance(round) {
      (async function () {
        try { await awaitedFeedbackSound('incorrect_sound_effect', { sticker: STICKER_SAD }); } catch (e) {}
        try { await playDynamicFeedback({ audio_content: round.wrongTTS, subtitle: round.wrongSubtitle, sticker: STICKER_SAD }); } catch (e) {}
        advanceAfterFeedback();
      })();
    }
    function advanceAfterFeedback() {
      var roundJustPlayed = gameState.currentRound + 1;
      if (gameState.lives === 0) { gameState.stars = getStars(); postGameComplete(); endGame(false); return; }
      if (roundJustPlayed === gameState.totalRounds) { endGame(true); return; }
      showRoundIntro(roundJustPlayed + 1);
    }

    async function showRoundIntro(n) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      var ttsText = 'Round ' + n;
      await transitionScreen.show({
        title: 'Round ' + n, icons: [], persist: true, buttons: [],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_ROUND }); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          })();
        }
      });

      // Safety timeout if audio stalls. Use `<` not `!==` so we only fire if the
      // game has not YET reached round n. Once it has advanced, do nothing —
      // a stale `!==` check would yank the game backwards across rounds.
      setTimeout(function () {
        try {
          if (gameState.gameEnded) return;
          if (gameState.currentRound + 1 < n) {
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          }
        } catch (e) {}
      }, 9000);
    }

    function endGame(victory) {

      gameState.stars = getStars();
      if (victory) { gameState.phase = 'results'; syncDOM(); postGameComplete(); showVictory(); }
      else { gameState.phase = 'game_over'; syncDOM(); postGameComplete(); showGameOver(); }
      trackEvent('game_end', { victory: victory, stars: gameState.stars, score: gameState.score });
    }

    function renderAnswerSlide(container, round) {

    function restartGame() {

    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      var t = event.data.type;
      var data = event.data.data || {};
      if (t === 'game_init') {
        gameState.phase = 'playing';
        if (data.content) gameState.content = data.content;
        gameState.signalConfig = data.signalConfig || {};
        if (data.signalConfig && signalCollector && signalCollector.applyConfig) { try { signalCollector.applyConfig(data.signalConfig); } catch (e) {} }
        try {
          if (signalCollector) {
            signalCollector.gameId = 'logic-grid-plus-dropdown-summary-table';
            if (data.sessionId) signalCollector.sessionId = data.sessionId;
            if (data.studentId) signalCollector.studentId = data.studentId;
            if (data.contentSetId) signalCollector.contentSetId = data.contentSetId;
            if (data.signalConfig && data.signalConfig.flushUrl) signalCollector.flushUrl = data.signalConfig.flushUrl;
            if (data.signalConfig && data.signalConfig.playId) signalCollector.playId = data.signalConfig.playId;
            if (signalCollector.startFlushing) { try { signalCollector.startFlushing(); } catch (e) {} }
          }
        } catch (e) {}
        syncDOM();
        setupGame();
      }
    }

    document.addEventListener('DOMContentLoaded', function () {

          doInit.then(function () {
            try {
              try { signalCollector = new SignalCollector({ sessionId:'logic-grid-plus-dropdown-summary-table-' + Date.now(), studentId:'standalone', gameId:'logic-grid-plus-dropdown-summary-table', contentSetId:'fallback' }); window.signalCollector = signalCollector; } catch (e) { console.error('[SignalCollector ctor failed]', e && e.message); }

              try { ScreenLayout.inject('app', { slots: { previewScreen:true, progressBar:true, transitionScreen:true, floatingButton:true, answerComponent:true } }); } catch (e) { console.error('[ScreenLayout.inject failed]', e && e.message); }

              injectGameHTML();

              try { timer = new TimerComponent('timer-container', { timerType:'increase', format:'min', startTime:0, autoStart:false }); } catch (e) { console.error('[TimerComponent ctor failed]', e && e.message); }

              try {
                visibilityTracker = new VisibilityTracker({
                  popupProps:{ title:'Paused', description:'Tap Resume to continue.', primaryText:'Resume' },
                  onInactive: function () {
                    try { FeedbackManager.sound.pause(); } catch (e) {}
                    try { FeedbackManager.stream.pauseAll(); } catch (e) {}
                    try { if (timer && timer.pause) timer.pause(); } catch (e) {}
                    try { if (previewScreen) previewScreen.pause(); } catch (e) {}
                  },
                  onResume: function () {
                    try { FeedbackManager.sound.resume(); } catch (e) {}
                    try { FeedbackManager.stream.resumeAll(); } catch (e) {}
                    try { if (timer && timer.resume) timer.resume(); } catch (e) {}
                    try { if (previewScreen) previewScreen.resume(); } catch (e) {}
                  }
                });
              } catch (e) { console.error('[VisibilityTracker ctor failed]', e && e.message); }

              try { progressBar = new ProgressBarComponent({ slotId:'mathai-progress-slot', totalRounds:1, totalLives:2 }); } catch (e) { console.error('[ProgressBarComponent ctor failed]', e && e.message); }
              try { transitionScreen = new TransitionScreenComponent({ slotId:'mathai-transition-slot' }); } catch (e) { console.error('[TransitionScreenComponent ctor failed]', e && e.message); }
              try { previewScreen = new PreviewScreenComponent({ slotId:'mathai-preview-slot' }); } catch (e) { console.error('[PreviewScreenComponent ctor failed]', e && e.message); }
              try { floatingBtn = new FloatingButtonComponent({ slotId:'mathai-floating-button-slot' }); } catch (e) { console.error('[FloatingButtonComponent ctor failed]', e && e.message); }
              try { answerComponent = new AnswerComponentComponent({ slotId:'mathai-answer-slot' }); } catch (e) { console.error('[AnswerComponentComponent ctor failed]', e && e.message); }

              try {
                if (floatingBtn && floatingBtn.on) {
                  floatingBtn.on('submit', function () { onSubmitTap(); });
                  floatingBtn.on('next', function () {
                    try { window.parent.postMessage({ type:'next_ended' }, '*'); } catch (e) {}
                    try { if (answerComponent) answerComponent.destroy(); } catch (e) {}
                    try { if (previewScreen) previewScreen.destroy(); } catch (e) {}
                    try { if (floatingBtn) floatingBtn.destroy(); } catch (e) {}
                  });
                }
              } catch (e) {}

              try {
                FeedbackManager.sound.preload([
                  { id: 'correct_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
                  { id: 'incorrect_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                  { id: 'rounds_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                  { id: 'sound_level_transition',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
                  { id: 'victory_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                  { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
                  { id: 'game_over_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                  { id: 'tap_sound',                url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
                ]);
              } catch (e) { console.error('[FeedbackManager.preload failed]', e && e.message); }

              window.addEventListener('message', handlePostMessage);
              try { window.parent.postMessage({ type:'game_ready' }, '*'); } catch (e) {}
              setupGame();
            } catch (e) { console.error('[init inner] ' + (e && e.message)); }
          }, function (e) { console.error('[FeedbackManager.init failed]', e && e.message); });
        } catch (e) { console.error('[init outer] ' + (e && e.message)); }
      }, function (err) { console.error('[waitForPackages rejected] ' + (err && err.message)); });

      setTimeout(function () {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;
      }, 2000);

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = setupGame;
      window.renderRound = renderRound;
      window.loadRound = function (n) { try { renderRound(n); } catch (e) {} };
    });
  </script>
</body>
</html>
