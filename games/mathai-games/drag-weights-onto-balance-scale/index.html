    :root {

      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-text-primary: #4a4a4a;

      --mathai-cell-bg-red: #FFD9D9;

      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; margin: 0; padding: 0; overscroll-behavior: none; }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
      min-height: 100dvh;
    }
    @supports not (min-height: 100dvh) { body { min-height: 100vh; } }
    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex; flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    @supports not (min-height: 100dvh) { #app { min-height: 100vh; } }
    button, [role="button"] { min-height: 44px; min-width: 44px; touch-action: manipulation; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: var(--mathai-white); color: var(--mathai-primary);
        font-size: 18px; text-align: center; padding: 24px;
      }
    }

    #gameContent {
      width: 100%;
      padding: 8px 12px 110px 12px;
      display: flex; flex-direction: column; align-items: center;
      box-sizing: border-box;
    }

    .bs-wrapper { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; }
    .bs-wrapper.locked { pointer-events: none; }

    .bs-scale {
      width: 100%;
      max-width: 340px;
      margin: 8px auto;
      display: flex; flex-direction: column; align-items: center;
      padding: 8px;
    }
    .bs-beam {
      width: 90%;
      height: 8px;
      background: var(--mathai-navy);
      border-radius: 4px;
      margin-bottom: 6px;
    }
    .bs-pans { display: flex; flex-direction: row; justify-content: space-between; width: 100%; }
    .bs-pan {
      width: 46%;
      min-height: 110px;
      border: 2px solid var(--mathai-navy);
      border-radius: 12px;
      background: var(--mathai-pan-bg);
      padding: 6px;
      display: flex; flex-direction: column; align-items: center;
    }
    .bs-pan-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--mathai-text-primary);
      margin-bottom: 4px;
    }
    .bs-pan-area {
      width: 100%;
      flex: 1;
      display: flex; flex-wrap: wrap;
      align-items: center; justify-content: center;
      min-height: 60px;
    }
    .bs-pan-area > * { margin: 2px; }
    .bs-pan.match { background: var(--mathai-cell-bg-green); border-color: #22c55e; }
    .bs-pan.over { background: var(--mathai-cell-bg-red); border-color: var(--mathai-red); }

    .bs-fruit {
      width: 60px; height: 60px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--mathai-white);
      border: 2px solid var(--mathai-navy);
      border-radius: 10px;
      font-size: 22px;
    }
    .bs-fruit-label { font-size: 10px; font-weight: 700; color: var(--mathai-text-primary); margin-top: -2px; }

    .bs-fulcrum {
      width: 0; height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 24px solid var(--mathai-navy);
      margin-top: 4px;
    }

    .bs-pool {
      width: 100%; max-width: 360px;
      display: grid;
      grid-template-columns: repeat(auto-fill, 70px);
      gap: 6px;
      justify-content: center;
      padding: 10px;
      background: #F1F5F9;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      margin-top: 10px;
    }
    .bs-timer {
      width: 100%; max-width: 320px;
      display: flex; align-items: center; justify-content: center;
      margin: 4px 0 8px 0;
      min-height: 32px;
    }
    .bs-timer .bs-timer-text {
      font-size: 18px; font-weight: 800;
      color: var(--mathai-blue);
      font-variant-numeric: tabular-nums;
    }
    .bs-timer.warn .bs-timer-text { color: var(--mathai-orange); }
    .bs-timer.danger .bs-timer-text { color: var(--mathai-red); }
    .bs-pool-slot {
      width: 70px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .bs-pool-slot.empty { display: none; }
    .pool-slot.empty { display: none; }

    .bs-weight {
      width: 70px; height: 50px;
      border-radius: 8px;
      background: #94A3B8;
      border: 2px solid var(--mathai-navy);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: var(--mathai-white);
      cursor: grab;
      touch-action: none;
      user-select: none;
      box-sizing: border-box;
    }
    .bs-weight:active { cursor: grabbing; }
    .bs-pan-area .bs-weight { width: 56px; height: 40px; font-size: 12px; }

    .bs-running {
      font-size: 13px;
      font-weight: 700;
      margin: 4px 0;
      color: var(--mathai-text-primary);
      min-height: 18px;
    }
    .bs-running.match { color: #22c55e; }
    .bs-running.over { color: var(--mathai-red); }

    .answer-slide { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 8px 4px 12px 4px; }
    .answer-caption { font-size: 13px; font-weight: 600; color: var(--mathai-text-primary); margin-bottom: 6px; text-align: center; }

</head>

      var elapsedMs = gameState.roundStartTime ? (Date.now() - gameState.roundStartTime) : 0;
      var misTags = [];
      if (!isCorrect) {
        if (total > round.target) misTags.push('overshoot');

        // wrong-anchor: did the student grab a "555g"-style decoy?

        if (bigDecoy && gameState.placedWeights.length > 0 && gameState.placedWeights[0] >= round.target * 1.1) misTags.push('wrong-anchor');
      }
      recordAttempt(round, total, isCorrect, misTags);
      trackEvent('answer_submitted', { round: gameState.currentRound, set: round.set, is_correct: isCorrect, total: total, target: round.target });

      var lostHeart = false;
      if (isCorrect) gameState.score += 1;
      else { gameState.lives = Math.max(0, gameState.lives - 1); gameState.heartsLost = (gameState.heartsLost || 0) + 1; lostHeart = true; }

      var roundStarTier = getRoundStarTier(round, isCorrect, elapsedMs, lostHeart, gameState.currentRound);
      gameState.starsAccumulated = (gameState.starsAccumulated || 0) + roundStarTier;
      trackEvent('round_stars', { round: gameState.currentRound, stars: roundStarTier, elapsedMs: elapsedMs });

      gameState.progress = (gameState.progress || 0) + 1;
      if (progressBar) {
        try { progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}

        try { await Promise.all([safePlaySound('correct_sound_effect', { sticker: STICKER_CELEBRATE }), new Promise(function (r) { setTimeout(r, 1500); })]); } catch (e) {}

      }

      if (!isCorrect && gameState.lives <= 0) {
        try { await Promise.all([FeedbackManager.sound.play('incorrect_sound_effect', { sticker: STICKER_SAD }), new Promise(function (r) { setTimeout(r, 200); })]); } catch (e) {}
      }

      trackEvent('round_complete', { round: gameState.currentRound, is_correct: isCorrect, score: gameState.score, lives: gameState.lives });

      if (gameState.lives <= 0) {
        endGame(false);
      } else if (gameState.currentRound < gameState.totalRounds) {
        gameState.currentRound += 1;
        await showRoundIntro(gameState.currentRound);

      }

    }

    function getCurrentRound() {
      var rounds = gameState.activeRounds && gameState.activeRounds.length > 0 ? gameState.activeRounds : getRounds();
      var idx = Math.max(0, Math.min(rounds.length - 1, gameState.currentRound - 1));
      return rounds[idx];
    }

    function renderRound() {
      gameState.isProcessing = false;
      gameState.isActive = true;
      gameState.placedWeights = [];
      gameState.roundStartTime = Date.now();
      gameState.phase = 'playing';
      syncDOM();
      var round = getCurrentRound();
      if (!round) return;
      gameState.correctAnswer = JSON.stringify(round.correctOptions ? round.correctOptions[0] : []);
      renderFruits(round);
      buildPool(round);
      var rightArea = document.getElementById('bs-right-area');
      if (rightArea) Array.prototype.slice.call(rightArea.querySelectorAll('.bs-weight')).forEach(function (t) { try { t.parentNode.removeChild(t); } catch (e) {} });
      refreshRunning(round);
      try { var w = document.getElementById('bs-wrapper'); if (w) w.classList.remove('locked'); } catch (e) {}
      buildDndForRound();
      if (progressBar) { try { progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {} }
      refreshSubmittable();
      startRoundTimer(round);
    }

    function destroyDndRound() {
      try { for (var i = 0; i < dndDraggables.length; i++) { try { dndDraggables[i] && dndDraggables[i].destroy && dndDraggables[i].destroy(); } catch (e) {} } } catch (e) {}
      try { for (var j = 0; j < dndDroppables.length; j++) { try { dndDroppables[j] && dndDroppables[j].destroy && dndDroppables[j].destroy(); } catch (e) {} } } catch (e) {}
      dndDraggables = [];
      dndDroppables = [];
    }

    function buildDndForRound() {
      destroyDndRound();
      if (!dndManager) return;
      Object.keys(weightEls).forEach(function (k) {
        var el = weightEls[k];
        if (!el) return;
        try {
          var draggable = new window.DnDKit.Draggable({ id: 'weight-' + k, element: el, data: { weightKey: k } }, dndManager);
          dndDraggables.push(draggable);
        } catch (e) { console.error('[Draggable]', e && e.message); }
      });
      var rightPan = document.getElementById('bs-right-pan');
      if (rightPan) {
        try {
          var droppable = new window.DnDKit.Droppable({ id: 'rightpan', element: rightPan, data: { zoneId: 'rightpan' } }, dndManager);
          dndDroppables.push(droppable);
        } catch (e) {}
      }
      var pool = document.getElementById('bs-pool');
      if (pool) {
        try {
          var droppablePool = new window.DnDKit.Droppable({ id: 'pool', element: pool, data: { zoneId: 'pool' } }, dndManager);
          dndDroppables.push(droppablePool);
        } catch (e) {}
      }
    }

    function findSlotIdForWeight(weightKey) {
      if (gameState.placement && gameState.placement[weightKey] === 'rightpan') return 'rightpan';
      return 'pool';
    }

    function handleDragEnd(event) {
      try {
        var op = event && event.operation;
        if (!op) return;
        var src = op.source;
        var tgt = op.target;
        var canceled = op.canceled;
        if (!src || !src.data) return;
        var weightKey = src.data.weightKey;
        if (!weightKey) return;
        // P6 §R2 — game-controlled source from gameState.placement.
        var sourceZone = findSlotIdForWeight(weightKey);
        if (gameState.placement && gameState.placement[weightKey]) sourceZone = gameState.placement[weightKey];
        if (canceled || !tgt || !tgt.data) { safePlaySound('tap_sound', {}); return; }
        var tgtZone = tgt.data.zoneId;
        var round = getCurrentRound();
        if (sourceZone === 'pool' && tgtZone === 'rightpan') {
          placeWeightInPan(weightKey);
          safePlaySound('sound_bubble_select', {});
        } else if (sourceZone === 'rightpan' && tgtZone === 'pool') {
          returnWeightToPool(weightKey);
          safePlaySound('sound_bubble_deselect', {});
        }
        if (round) refreshRunning(round);
        refreshSubmittable();
      } catch (e) { console.error('[handleDragEnd]', e && e.message); if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} } }
    }

    function handleDragStart(event) {
      if (!gameState.isActive || gameState.isProcessing || gameState.gameEnded) {
        try { if (event && typeof event.preventDefault === 'function') event.preventDefault(); } catch (e) {}
      }
    }

    async function showVictory(success) {
      if (!transitionScreen) return;
      var stars = gameState.stars;
      var subtitle = stars === 3 ? 'Perfect balance!' : (stars === 2 ? 'Great work!' : (stars === 1 ? 'Nice try.' : "Let's try again!"));
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var playAgainAct = function () { try { transitionScreen.hide(); } catch (e) {} showMotivation(); };
      var claimStarsAct = function () { try { transitionScreen.hide(); } catch (e) {} showStarsCollected(); };
      await transitionScreen.show({
        title: 'Victory 🎉',
        subtitle: subtitle,
        stars: stars,
        buttons: stars < 3
          ? [{ text: 'Play Again', type: 'secondary', action: playAgainAct }, { text: 'Claim Stars', type: 'primary', action: claimStarsAct }]
          : [{ text: 'Claim Stars', type: 'primary', action: claimStarsAct }],
        persist: true,
        onMounted: function () {
          (async function () {
            try { await safePlaySound('victory_sound_effect', { sticker: STICKER_VICTORY }); } catch (e) {}
            try { await safeDynamic({ audio_content: subtitle, subtitle: subtitle, sticker: STICKER_VICTORY }); } catch (e) {}
          })();
        }
      });
    }

    async function showGameOver() {
      if (!transitionScreen) return;
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var subtitle = "You completed " + gameState.score + " of " + gameState.totalRounds + " rounds.";
      await transitionScreen.show({
        title: 'Game Over',
        subtitle: subtitle,
        buttons: [{ text: 'Try Again', type: 'primary', action: function () { try { transitionScreen.hide(); } catch (e) {} restartGame(); } }],
        persist: true,
        onMounted: function () {
          (async function () {
            try { await safePlaySound('game_over_sound_effect', { sticker: STICKER_SAD }); } catch (e) {}
            try { await safeDynamic({ audio_content: subtitle, subtitle: subtitle, sticker: STICKER_SAD }); } catch (e) {}
          })();
        }
      });
    }

    async function showMotivation() {
      if (!transitionScreen) return;
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      await transitionScreen.show({
        title: 'Ready to improve your score? ⚡',
        buttons: [{ text: "I'm ready! 🙌", type: 'primary', action: function () { try { transitionScreen.hide(); } catch (e) {} restartGame(); } }],
        persist: true,
        onMounted: function () {
          (async function () {
            try { if (progressBar) progressBar.update(0, gameState.totalLives); } catch (e) {}
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_RESTART }); } catch (e) {}
            try { await safeDynamic({ audio_content: 'Ready for another puzzle?', subtitle: 'Ready for another puzzle?', sticker: STICKER_RESTART }); } catch (e) {}
          })();
        }
      });
    }

    async function showStarsCollected() {
      if (!transitionScreen) return;
      var count = Math.max(1, Math.min(3, gameState.stars || 1));
      await transitionScreen.show({
        title: 'Yay! 🎉\nStars collected!',
        buttons: [],
        persist: true,
        styles: { title: { whiteSpace: 'pre-line', lineHeight: '1.3' } },
        onMounted: function () {
          (async function () {
            try { await safePlaySound('victory_sound_effect', { sticker: STICKER_CELEBRATE }); } catch (e) {}
            try { window.postMessage({ type: 'show_star', data: { count: count, variant: 'yellow', score: gameState.score + '/' + gameState.totalRounds } }, '*'); } catch (e) {}
            setTimeout(function () { showAnswerCarousel(); }, 1500);
          })();
        }
      });
    }

    function buildAnswerSlidesForAllRounds() {
      var rounds = gameState.activeRounds && gameState.activeRounds.length > 0 ? gameState.activeRounds : getRounds();
      var roundsCopy = rounds.slice(0, gameState.totalRounds);
      return roundsCopy.map(function (round, idx) {
        return { render: function (container) { renderAnswerForRound(round, container, idx + 1); } };
      });
    }

    function renderAnswerForRound(round, container, roundNum) {
      if (!container || !round) return;
      container.innerHTML = '';
      var slide = document.createElement('div');
      slide.className = 'answer-slide';
      var caption = document.createElement('div');
      caption.className = 'answer-caption';
      caption.textContent = 'Round ' + roundNum + ' • Target ' + round.target + 'g';
      slide.appendChild(caption);
      var pool = document.createElement('div');
      pool.className = 'bs-pool pool-area';
      pool.style.maxWidth = '320px';
      var soln = round.correctOptions[0];
      soln.forEach(function (val) {
        var slotN = document.createElement('div');
        slotN.className = 'bs-pool-slot pool-slot';
        var w = document.createElement('div');
        w.className = 'bs-weight';
        w.textContent = val + 'g';
        slotN.appendChild(w);
        pool.appendChild(slotN);
      });
      slide.appendChild(pool);
      container.appendChild(slide);
    }

    function showAnswerCarousel() {
      if (!answerComponent) return;
      try { answerComponent.show({ slides: buildAnswerSlidesForAllRounds() }); } catch (e) { console.error('[answerComponent.show]', e && e.message); }
      try { if (floatingBtn) floatingBtn.setMode('next'); } catch (e) {}
    }

    function resetGameState() {
      clearRoundTimer();
      gameState.starsAccumulated = 0;
      gameState.heartsLost = 0;
      gameState.phase = 'playing';
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.stars = 0;
      gameState.progress = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.placedWeights = [];
      gameState.duration_data = { startTime: null, preview: gameState.duration_data ? gameState.duration_data.preview : [] };
      gameState.activeRounds = getRounds();
    }

    function restartGame() {
      try { FeedbackManager.sound['stopAll'](); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
      gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      resetGameState();
      if (signalCollector && typeof signalCollector.reset === 'function') {
        try { signalCollector.reset(); } catch (e) {}
      }
      try { if (answerComponent) answerComponent.hide(); } catch (e) {}
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      if (progressBar) { try { progressBar.update(0, gameState.totalLives); } catch (e) {} }
      trackEvent('game_start', { totalRounds: gameState.totalRounds, restart: true, setIndex: gameState.setIndex });
      buildGameDOM();
      (async function () { await showRoundIntro(1); renderRound(); })();
    }
    window.restartGame = restartGame;

    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.phase = 'playing';
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.progress = 0;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.activeRounds = getRounds();
      gameState.startTime = Date.now();
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();
      (async function () { await showRoundIntro(1); renderRound(); })();
    }
    window.startGame = startGame;

    function nextRound() {
      try { FeedbackManager.sound['stopAll'](); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      if (gameState.currentRound < gameState.totalRounds) {
        gameState.currentRound += 1;
        renderRound();
      } else {
        endGame(true);
      }
    }
    window.nextRound = nextRound;

    function setupGame() {
      var content = gameState.content || fallbackContent;
      gameState.totalRounds = (content.totalRounds && typeof content.totalRounds === 'number') ? content.totalRounds : 10;
      gameState.totalLives = (typeof content.totalLives === 'number') ? content.totalLives : 2;
      gameState.lives = gameState.totalLives;
      gameState.activeRounds = getRounds();
      buildGameDOM();
      (function () { var r = getCurrentRound(); if (r) { renderFruits(r); buildPool(r); } })();
      if (previewScreen) {
        try {
          previewScreen.show({
            instruction: content.previewInstruction || fallbackContent.previewInstruction,
            audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
            showGameOnPreview: content.showGameOnPreview === true,
            onComplete: function (previewData) { startGameAfterPreview(previewData); }
          });
        } catch (e) { console.error('[previewScreen.show]', e && e.message); startGameAfterPreview({ duration: 0 }); }
      } else { startGameAfterPreview({ duration: 0 }); }
    }

    function startGameAfterPreview(previewData) {
      try {
        gameState.previewResult = previewData || { duration: 0 };
        gameState.duration_data.preview = gameState.duration_data.preview || [];
        gameState.duration_data.preview.push({ duration: previewData ? previewData.duration : 0 });
        gameState.startTime = Date.now();
        gameState.isActive = true;
        gameState.duration_data.startTime = new Date().toISOString();
        trackEvent('game_start', { totalRounds: gameState.totalRounds });
        if (signalCollector && typeof signalCollector.recordViewEvent === 'function') {
          try { signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}
        }
        if (progressBar) { try { progressBar.update(0, gameState.totalLives); } catch (e) {} }
        (async function () { await showRoundIntro(1); renderRound(); })();
      } catch (e) { console.error('[startGameAfterPreview]', e && e.message); }
    }

    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      if (document.getElementById('gameContent')) return;
      var stack = document.createElement('div');
      stack.className = 'game-stack';
      var gc = document.createElement('div');
      gc.id = 'gameContent';
      stack.appendChild(gc);
      app.appendChild(stack);
    }
  </script>

  <script type="module">
    import { DragDropManager, Draggable, Droppable, Feedback, PointerSensor, PointerActivationConstraints } from 'https://esm.sh/@dnd-kit/dom@beta';
    window.DnDKit = { DragDropManager: DragDropManager, Draggable: Draggable, Droppable: Droppable, Feedback: Feedback, PointerSensor: PointerSensor, PointerActivationConstraints: PointerActivationConstraints };
    window.dispatchEvent(new Event('dndkit-ready'));
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      try {
        await waitForPackages();
        await new Promise(function (resolve) {
          if (window.DnDKit && window.DnDKit.DragDropManager) return resolve();
          window.addEventListener('dndkit-ready', function () { resolve(); }, { once: true });
          setTimeout(resolve, 5000);
        });
        try { await FeedbackManager.init(); } catch (e) {}

        try {
          signalCollector = new SignalCollector({ playId: 'fruit-iron-' + Date.now(), game: 'fruit-iron' });
          window.signalCollector = signalCollector;
        } catch (e) { console.error('[SignalCollector ctor]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try {
          ScreenLayout.inject('app', {
            slots: { previewScreen: true, transitionScreen: true, progressBar: true, floatingButton: true, answerComponent: true }
          });
        } catch (e) {
          console.error('[ScreenLayout.inject]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          buildFallbackLayout();
        }

        try {
          visibilityTracker = new VisibilityTracker({
            popupProps: {},
            onInactive: function () { try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {} try { if (previewScreen) previewScreen.pause(); } catch (e) {} },
            onResume: function () { try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {} try { if (previewScreen) previewScreen.resume(); } catch (e) {} }
          });
        } catch (e) { console.error('[VisibilityTracker]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try {
          progressBar = new ProgressBarComponent({ slotId: 'mathai-progress-slot', totalRounds: 10, totalLives: 2 });
        } catch (e) { console.error('[ProgressBar]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try { transitionScreen = new TransitionScreenComponent({ slotId: 'mathai-transition-slot' }); } catch (e) { console.error('[TransitionScreen]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
        try { previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' }); } catch (e) { console.error('[PreviewScreen]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try {
          floatingBtn = new FloatingButtonComponent({ slotId: 'mathai-floating-button-slot' });
          if (floatingBtn && typeof floatingBtn.setLabels === 'function') {
            try { floatingBtn.setLabels({ submit: 'CHECK', next: 'Next' }); } catch (e) {}
          }
          floatingBtn.on('submit', async function () {
            if (gameState.isProcessing || gameState.gameEnded) return;
            try { await handleCheck(); } catch (e) { console.error('[handleCheck]', e && e.message); }
          });
          floatingBtn.on('next', function () {
            try { if (answerComponent && typeof answerComponent.destroy === 'function') answerComponent.destroy(); } catch (e) {}
            try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
            try { if (previewScreen && typeof previewScreen.destroy === 'function') previewScreen.destroy(); } catch (e) {}
            try { if (floatingBtn && typeof floatingBtn.destroy === 'function') floatingBtn.destroy(); } catch (e) {}
          });
        } catch (e) { console.error('[FloatingButton]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try { answerComponent = new AnswerComponentComponent({ slotId: 'mathai-answer-slot' }); } catch (e) { console.error('[AnswerComponent]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try {
          var PointerSensor = window.DnDKit.PointerSensor;
          var PointerActivationConstraints = window.DnDKit.PointerActivationConstraints;
          dndManager = new window.DnDKit.DragDropManager({
            sensors: [ PointerSensor.configure({ activationConstraints: [ new PointerActivationConstraints.Distance({ value: 3 }) ] }) ]
          });
          dndManager.monitor.addEventListener('dragend', handleDragEnd);
          dndManager.monitor.addEventListener('dragstart', handleDragStart);
        } catch (e) {
          console.error('[DragDropManager]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          try {
            dndManager = new window.DnDKit.DragDropManager();
            dndManager.monitor.addEventListener('dragend', handleDragEnd);
            dndManager.monitor.addEventListener('dragstart', handleDragStart);
          } catch (er) {}
        }

        preloadAudio();
        window.addEventListener('message', handlePostMessage);
        try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
        setupGame();
      } catch (e) {
        console.error('[init]', e && e.message);
        if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
      }

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = startGame;
      window.nextRound = nextRound;
      window.loadRound = function (n) {
        if (typeof n === 'number' && n >= 1 && n <= gameState.totalRounds) {
          gameState.currentRound = n;
          renderRound();
        }
      };
    });

    setTimeout(function () {
      if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
      if (gameState.isActive || gameState.gameEnded) return;
      var missing = [];
      if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
      if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
      if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
      if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
      if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
      if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
      if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
      if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
      if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
      if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
      if (missing.length > 0) {
        var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
        console.error('[' + msg + ']');
        if (typeof Sentry !== 'undefined') { try { Sentry.captureMessage(msg); } catch (e) {} }
        var gc = document.getElementById('gameContent') || document.body;
        if (gc) { gc.innerHTML = '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">Game failed to load — please refresh.</div>'; }
        return;
      }
      if (!document.getElementById('gameContent')) buildFallbackLayout();
      gameState.content = fallbackContent;
      gameState.totalRounds = fallbackContent.rounds.length / 3;
      setupGame();
      startGame();
    }, 2000);
  </script>
</body>
</html>
