<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Estimate the Field — The Picture-to-Number Estimation Game</title>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({ release: 'visual-stimulus-typed-answer@1.0.0' }));
    }
  </script>
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script>window.addEventListener('load', initSentry);</script>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-blue: #3478F6;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
      --crop-wheat: #E8C26A;
      --crop-carrot: #F2994A;
      --crop-corn: #FFE066;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      overflow-x: hidden;
      overscroll-behavior: none;
    }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }
    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }
    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    /* Timer absolute-centered on top of the persistent header area
       (mounted as a child of #mathai-preview-slot per PART-006). */
    #timer-container {
      position: absolute;
      top: 0.75rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      pointer-events: none;
    }
    #timer-container > * { pointer-events: auto; }
    #timer-container .timer-wrapper { padding: 0 !important; margin: 0 !important; background: transparent !important; }
    #timer-container .timer-display {
      width: auto !important;
      height: auto !important;
      min-width: 0 !important;
      padding: 2px 10px !important;
      font-size: 16px !important;
      font-weight: 700 !important;
      color: var(--mathai-primary) !important;
      font-family: var(--mathai-font-family) !important;
      background: var(--mathai-cell-bg-yellow) !important;
      border-radius: 999px !important;
      box-shadow: none !important;
    }

    /* Gameplay area */
    #gameContent {
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 8px 16px 24px;
    }

    .est-stage {
      text-align: center;
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 6px 0 4px;
    }
    .est-prelude {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-text-primary);
      line-height: 1.45;
      margin: 6px 0 12px;
    }
    .est-pictures {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-column-gap: 12px;
      margin: 4px 0 12px;
    }
    .est-picture {
      background: var(--mathai-light-gray);
      border-radius: var(--mathai-border-radius-card);
      padding: 8px;
      text-align: center;
    }
    .est-year-tag {
      display: inline-block;
      background: var(--mathai-purple);
      color: var(--mathai-white);
      padding: 2px 10px;
      border-radius: 999px;
      font-size: var(--mathai-font-size-small);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .est-field {
      width: 100%;
      height: 160px;
      border-radius: var(--mathai-border-radius-small);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 2px solid var(--mathai-border-gray);
    }
    .est-region {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--mathai-primary);
      font-weight: 700;
      font-size: var(--mathai-font-size-small);
      text-shadow: 0 1px 2px rgba(255,255,255,0.6);
    }
    .est-region.wheat { background: var(--crop-wheat); }
    .est-region.carrot { background: var(--crop-carrot); }
    .est-region.corn { background: var(--crop-corn); }
    .est-region.unknown { background: var(--crop-carrot); position: relative; }
    .est-region.unknown::after {
      content: '?';
      position: absolute;
      font-size: 32px;
      font-weight: 800;
      color: var(--mathai-white);
    }

    .est-context {
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-text-primary);
      margin: 4px 0;
      line-height: 1.4;
    }
    .est-question {
      font-size: var(--mathai-font-size-body);
      font-weight: 700;
      color: var(--mathai-primary);
      margin: 10px 0 6px;
    }
    .est-yellowcard {
      background: var(--mathai-cell-bg-yellow);
      border-radius: var(--mathai-border-radius-small);
      padding: 8px 12px;
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-text-primary);
      margin: 4px 0 12px;
    }

    .est-answer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin: 12px 0 8px;
    }
    .est-answer-label {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-primary);
      font-weight: 600;
      margin-right: 6px;
      margin-left: 6px;
    }
    .est-input {
      width: 90px;
      min-height: 44px;
      padding: 8px 12px;
      border: 2px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-small);
      font-size: 18px;
      font-weight: 700;
      color: var(--mathai-primary);
      background: var(--mathai-white);
      text-align: center;
      font-family: var(--mathai-font-family);
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }
    .est-input:focus {
      outline: none;
      border-color: var(--mathai-purple);
    }
    .est-input.is-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
      color: var(--mathai-success);
    }
    .est-input.is-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-error);
      animation: shake 0.4s ease;
    }

    /* Touch targets */
    button,
    [role="button"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    /* Gesture suppression */
    #app {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }

    /* Landscape lock */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white);
        color: var(--mathai-primary);
        font-family: var(--mathai-font-family);
        font-size: var(--mathai-font-size-subtitle);
        text-align: center;
        padding: 24px;
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease; }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="3"></div>

  <script>
    /* ====================================================================== */
    /* Stickers (canonical from feedbackmanager-api.md)                       */
    /* ====================================================================== */
    var STICKER_CORRECT  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_WRONG    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_LEVEL    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';
    var STICKER_VICTORY  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_CELEBRATE = STICKER_VICTORY;
    var STICKER_SAD = STICKER_WRONG;
    var STICKER_MOTIVATE = STICKER_LEVEL;

    /* ====================================================================== */
    /* fallbackContent — 3 sets x 10 rounds = 30 entries                        */
    /* Each round: a "scene" with 2 pictures (anchor + question), tolerance.   */
    /* ====================================================================== */
    // Per-round countdown duration (concept §"What the player sees and does":
    // bright-blue countdown timer e.g. 00:21 — early rounds get more time;
    // later, multi-region / cross-domain rounds tighten the budget).
    function durationForStage(stage) {
      if (stage <= 1) return 25;
      if (stage === 2) return 22;
      return 20;
    }

    function makeRound(set, n, scene) {
      var id = set + '_r' + n + '_' + scene.key;
      var stage = scene.stage || 1;
      return {
        set: set,
        id: id,
        round: n,
        stage: stage,
        durationSec: scene.durationSec || durationForStage(stage),
        intro: scene.intro,
        anchorYear: scene.anchorYear,
        questionYear: scene.questionYear,
        anchorRegions: scene.anchorRegions,
        questionRegions: scene.questionRegions,
        contextLines: scene.contextLines,
        questionText: scene.questionText,
        unit: scene.unit,
        answer: scene.answer,
        toleranceClose: scene.toleranceClose || 0.10,
        toleranceFar: scene.toleranceFar || 0.25,
        hint: scene.hint,
        correctTTS: 'Nice — about ' + scene.answer + ' ' + scene.unit + '.',
        correctSubtitle: 'About ' + scene.answer + ' ' + scene.unit + '.',
        wrongTTS: 'The right answer was ' + scene.answer + ' ' + scene.unit + '.',
        wrongSubtitle: 'Right answer: ' + scene.answer + ' ' + scene.unit + '.',
        timeoutTTS: 'Time! The answer was ' + scene.answer + ' ' + scene.unit + '.',
        timeoutSubtitle: 'Time up. Right answer: ' + scene.answer + ' ' + scene.unit + '.'
      };
    }

    var SCENES = {
      farm12: {
        key: 'farm12', stage: 1,
        intro: "The pictures below show how a farmer used his land in 2024 and 2025.",
        anchorYear: '2024', questionYear: '2025',
        anchorRegions: [
          { kind: 'wheat', label: 'Wheat', flex: 5 },
          { kind: 'carrot', label: 'Carrot 12 acres', flex: 1 }
        ],
        questionRegions: [
          { kind: 'wheat', label: 'Wheat', flex: 1 },
          { kind: 'unknown', label: '', flex: 4 },
          { kind: 'corn', label: 'Corn', flex: 1 }
        ],
        contextLines: [
          'In 2024, the farmer used about 12 acres for carrot.',
          'In 2025, the carrot region is about 4 times the 2024 carrot.'
        ],
        questionText: 'About how much land will be used for carrot in 2025?',
        unit: 'acres', answer: 48,
        hint: 'Divide the field into equal parts and count the carrot parts.'
      },
      farm6: {
        key: 'farm6', stage: 1,
        intro: 'A small kitchen-garden plot, last year and this year.',
        anchorYear: '2024', questionYear: '2025',
        anchorRegions: [
          { kind: 'wheat', label: 'Spinach', flex: 2 },
          { kind: 'carrot', label: 'Carrot 6 acres', flex: 1 }
        ],
        questionRegions: [
          { kind: 'wheat', label: 'Spinach', flex: 1 },
          { kind: 'unknown', label: '', flex: 2 }
        ],
        contextLines: [
          'In 2024, carrot took about 6 acres.',
          'In 2025, the carrot region is about 2 times the 2024 carrot.'
        ],
        questionText: 'About how many acres for carrot in 2025?',
        unit: 'acres', answer: 12,
        hint: 'Anchor: carrot 6. Count how many carrot-rectangles fit in the new region.'
      },
      farm10: {
        key: 'farm10', stage: 1,
        intro: 'A wheat-and-rice farm with a known wheat block.',
        anchorYear: '2024', questionYear: '2025',
        anchorRegions: [
          { kind: 'wheat', label: 'Wheat 10 acres', flex: 1 },
          { kind: 'corn', label: 'Rice', flex: 3 }
        ],
        questionRegions: [
          { kind: 'wheat', label: 'Wheat 10', flex: 1 },
          { kind: 'unknown', label: '', flex: 3 }
        ],
        contextLines: [
          'Wheat block (10 acres) is the same as last year.',
          'The rice region is now about 3 wheat-blocks wide.'
        ],
        questionText: 'About how many acres for rice this year?',
        unit: 'acres', answer: 30,
        hint: 'Use 10 acres of wheat as the anchor unit.'
      },
      class20: {
        key: 'class20', stage: 2,
        intro: 'A classroom seating chart from two years.',
        anchorYear: '2024', questionYear: '2025',
        anchorRegions: [
          { kind: 'wheat', label: 'Empty', flex: 1 },
          { kind: 'carrot', label: 'Class A 20 seats', flex: 2 }
        ],
        questionRegions: [
          { kind: 'wheat', label: 'Empty', flex: 1 },
          { kind: 'unknown', label: '', flex: 4 }
        ],
        contextLines: [
          'Class A had about 20 seats last year.',
          'This year the seating block is about twice as wide.'
        ],
        questionText: 'About how many seats this year?',
        unit: 'seats', answer: 40,
        hint: 'Twice as wide means about twice the seats.'
      },
      park5: {
        key: 'park5', stage: 2,
        intro: 'A car park with a known row.',
        anchorYear: '2024', questionYear: '2025',
        anchorRegions: [
          { kind: 'wheat', label: 'Pavement', flex: 2 },
          { kind: 'carrot', label: 'Cars 5 spaces', flex: 1 }
        ],
        questionRegions: [
          { kind: 'wheat', label: 'Pavement', flex: 1 },
          { kind: 'unknown', label: '', flex: 3 },
          { kind: 'corn', label: 'Bikes', flex: 1 }
        ],
        contextLines: [
          'In 2024 the cars block was about 5 spaces.',
          'In 2025 the cars block is about 3 times as big.'
        ],
        questionText: 'About how many car spaces in 2025?',
        unit: 'spaces', answer: 15,
        hint: 'Three carrot-rectangles wide, each 5 spaces.'
      },
      jug8: {
        key: 'jug8', stage: 2,
        intro: 'A water-jug with a marked fill line.',
        anchorYear: 'Last week', questionYear: 'This week',
        anchorRegions: [
          { kind: 'wheat', label: 'Empty', flex: 1 },
          { kind: 'carrot', label: 'Water 8 cups', flex: 1 }
        ],
        questionRegions: [
          { kind: 'wheat', label: 'Empty', flex: 1 },
          { kind: 'unknown', label: '', flex: 3 }
        ],
        contextLines: [
          'Last week the jug held about 8 cups.',
          'This week the water mark is about 3 times higher.'
        ],
        questionText: 'About how many cups this week?',
        unit: 'cups', answer: 24,
        hint: 'Three jug-segments, each 8 cups.'
      },
      books15: {
        key: 'books15', stage: 3,
        intro: 'Two stacks of books on a shelf.',
        anchorYear: 'Stack A', questionYear: 'Stack B',
        anchorRegions: [
          { kind: 'wheat', label: 'Top air', flex: 2 },
          { kind: 'carrot', label: 'Books 15 books', flex: 1 }
        ],
        questionRegions: [
          { kind: 'wheat', label: 'Top air', flex: 1 },
          { kind: 'unknown', label: '', flex: 2 }
        ],
        contextLines: [
          'Stack A is about 15 books tall.',
          'Stack B is about 2 times the height of Stack A.'
        ],
        questionText: 'About how many books in Stack B?',
        unit: 'books', answer: 30,
        hint: 'Two stacks, each 15 books.'
      },
      shop25: {
        key: 'shop25', stage: 3,
        intro: 'Two shelves of similar items in a shop.',
        anchorYear: 'Shelf 1', questionYear: 'Shelf 2',
        anchorRegions: [
          { kind: 'wheat', label: 'Empty', flex: 1 },
          { kind: 'carrot', label: 'Items 25', flex: 1 }
        ],
        questionRegions: [
          { kind: 'wheat', label: 'Empty', flex: 1 },
          { kind: 'unknown', label: '', flex: 3 }
        ],
        contextLines: [
          'Shelf 1 has about 25 items.',
          'Shelf 2 has about 3 times as many.'
        ],
        questionText: 'About how many items on Shelf 2?',
        unit: 'items', answer: 75,
        hint: 'Three shelves of 25 each.'
      },
      pond40: {
        key: 'pond40', stage: 3,
        intro: 'Two ponds, one with a known fish count.',
        anchorYear: 'Pond A', questionYear: 'Pond B',
        anchorRegions: [
          { kind: 'wheat', label: 'Sand', flex: 1 },
          { kind: 'carrot', label: 'Fish 40', flex: 1 }
        ],
        questionRegions: [
          { kind: 'wheat', label: 'Sand', flex: 1 },
          { kind: 'unknown', label: '', flex: 4 }
        ],
        contextLines: [
          'Pond A has about 40 fish.',
          'Pond B is about 4 times the size.'
        ],
        questionText: 'About how many fish in Pond B?',
        unit: 'fish', answer: 160,
        hint: 'Four pond-rectangles of 40 each.'
      },
      inverse: {
        key: 'inverse', stage: 3,
        intro: 'Now you must estimate the anchor.',
        anchorYear: 'Old', questionYear: 'New',
        anchorRegions: [
          { kind: 'wheat', label: 'Wheat', flex: 1 },
          { kind: 'unknown', label: '', flex: 1 }
        ],
        questionRegions: [
          { kind: 'wheat', label: 'Wheat', flex: 1 },
          { kind: 'carrot', label: 'New carrot 18', flex: 3 }
        ],
        contextLines: [
          'New carrot region is about 18 acres.',
          'New carrot is about 3 times the size of the old carrot.'
        ],
        questionText: 'About how many acres was the old carrot?',
        unit: 'acres', answer: 6,
        hint: 'If new is 3 times old, divide.'
      }
    };

    var SCENE_KEYS_A = ['farm12','farm6','farm10','class20','park5','jug8','books15','shop25','pond40','inverse'];
    var SCENE_KEYS_B = ['farm6','farm10','class20','park5','jug8','books15','shop25','pond40','inverse','farm12'];
    var SCENE_KEYS_C = ['farm10','class20','park5','jug8','books15','shop25','pond40','inverse','farm12','farm6'];

    function buildRoundsForSet(setKey, keys) {
      var out = [];
      for (var i = 0; i < keys.length; i++) {
        var scene = SCENES[keys[i]];
        var round = makeRound(setKey, i + 1, scene);
        out.push(round);
      }
      return out;
    }

    var fallbackContent = {
      previewInstruction: '<p><b>Estimate the field!</b> Use the labelled picture to guess the size of the unknown region. Type your best estimate.</p><p>Three lives, ten rounds. Within 10% counts as correct.</p>',
      previewAudioText: 'Look at the two pictures, use the known number as an anchor, and type a number you think is close.',
      previewAudio: null,
      showGameOnPreview: false,
      totalRounds: 10,
      totalLives: 3,
      answerComponent: true,
      rounds: buildRoundsForSet('A', SCENE_KEYS_A)
        .concat(buildRoundsForSet('B', SCENE_KEYS_B))
        .concat(buildRoundsForSet('C', SCENE_KEYS_C))
    };

    /* ====================================================================== */
    /* gameState                                                                */
    /* ====================================================================== */
    var SETS = ['A', 'B', 'C'];

    var gameState = {
      gameId: 'visual-stimulus-typed-answer',
      gameTitle: 'Estimate the Field',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 10,
      score: 0,
      lives: 3,
      totalLives: 3,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      duration_data: { startTime: null, endTime: null, preview: [] },
      correctAnswer: null,
      stars: 0,
      setIndex: 0,
      activeRounds: [],
      roundStartMs: 0,
      previewResult: null,
      progress: 0,
      roundToken: 0,
      timerIntentionallyPaused: false
    };
    window.gameState = gameState;

    var timer = null;
    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var floatingBtn = null;
    var answerComponent = null;

    /* ====================================================================== */
    /* Helpers                                                                  */
    /* ====================================================================== */
    function getAvailableSets(rounds) {
      var seen = {}; var out = [];
      for (var i = 0; i < rounds.length; i++) {
        var s = rounds[i].set;
        if (s && !seen[s]) { seen[s] = true; out.push(s); }
      }
      return out.length ? out : ['A'];
    }

    function getRounds() {
      var src = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(src);
      var setKey = sets[gameState.setIndex % sets.length];
      var filtered = [];
      for (var i = 0; i < src.length; i++) {
        if (src[i].set === setKey) filtered.push(src[i]);
      }
      filtered.sort(function (a, b) { return a.round - b.round; });
      return filtered;
    }

    function getCorrectCount() {
      var c = 0;
      for (var i = 0; i < gameState.attempts.length; i++) {
        if (gameState.attempts[i].correct === true) c++;
      }
      return c;
    }

    function getStars() {
      var c = getCorrectCount();
      var t = gameState.totalRounds;
      if (c === 0) return 0;
      if (c >= Math.ceil(t * 0.9)) return 3;
      if (c >= Math.ceil(t * 0.6)) return 2;
      return 1;
    }

    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound + 1);
    }

    function trackEvent(name, payload) {
      try {
        gameState.events.push({ event: name, ts: Date.now(), data: payload || {} });
      } catch (e) {}
      try {
        if (signalCollector && signalCollector.recordEvent) {
          signalCollector.recordEvent(name, payload || {});
        }
      } catch (e) {}
    }

    function recordAttempt(input, correct, misconceptionTag, responseMs) {
      var round = gameState.activeRounds[gameState.currentRound];
      var qid = round ? round.id : ('r' + (gameState.currentRound + 1));
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) : 0,
        input_of_user: input,
        correct: correct === true,
        round_number: gameState.currentRound + 1,
        question_id: qid,
        correct_answer: round ? round.answer : null,
        response_time_ms: typeof responseMs === 'number' ? responseMs : 0,
        misconception_tag: misconceptionTag || null,
        difficulty_level: round ? (round.stage || 1) : 1,
        is_retry: false,
        metadata: { set: round ? round.set : null }
      };
      gameState.attempts.push(attempt);
      try {
        if (signalCollector && signalCollector.recordAttempt) {
          signalCollector.recordAttempt(attempt);
        }
      } catch (e) {}
    }

    function postGameComplete() {
      if (gameState._gameCompletePosted) return;
      gameState._gameCompletePosted = true;
      var attempted = gameState.attempts.length;
      var correctCount = getCorrectCount();
      var accuracy = attempted === 0 ? 0 : Math.round((correctCount / attempted) * 100);
      var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
      var triesByRound = gameState.attempts.map(function (a) {
        return { round: a.round_number, correct: a.correct === true };
      });
      var metrics = {
        accuracy: accuracy,
        time: Math.round(elapsedMs / 1000),
        stars: gameState.stars,
        attempts: gameState.attempts.slice(),
        duration_data: gameState.duration_data,
        totalLives: gameState.lives,
        tries: triesByRound,
        score: gameState.score,
        correctCount: correctCount,
        previewResult: gameState.previewResult || null
      };
      var signalSealed = { event_count: gameState.events.length, metadata: {} };
      try {
        if (signalCollector && typeof signalCollector.seal === 'function') {
          var sealed = signalCollector.seal();
          if (sealed) {
            if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count;
            if (sealed.metadata) signalSealed.metadata = sealed.metadata;
          }
        }
      } catch (e0) {}
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: metrics,
            completedAt: Date.now(),
            signal_event_count: signalSealed.event_count,
            signal_metadata: signalSealed.metadata
          }
        }, '*');
      } catch (e) {}
    }

    /* ====================================================================== */
    /* Audio helpers                                                            */
    /* ====================================================================== */
    function safePlaySound(id, opts) {
      try {
        return FeedbackManager.sound.play(id, opts || {});
      } catch (e) {
        return Promise.resolve();
      }
    }

    function awaitedFeedbackSound(id, opts) {
      var p = safePlaySound(id, opts || {});
      var floor = new Promise(function (r) { setTimeout(r, 1500); });
      return Promise.all([p, floor]).then(function () {}, function () {});
    }

    function playDynamicFeedback(opts) {
      try {
        return FeedbackManager.playDynamicFeedback(opts || {});
      } catch (e) {
        return Promise.resolve();
      }
    }

    /* ====================================================================== */
    /* waitForPackages                                                          */
    /* ====================================================================== */
    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof TimerComponent !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            try { reject(new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms')); } catch (e) {}
            throw new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    /* ====================================================================== */
    /* HTML escaping                                                            */
    /* ====================================================================== */
    function escapeHTML(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function regionsHTML(regions) {
      var html = '';
      for (var i = 0; i < regions.length; i++) {
        var r = regions[i];
        var label = r.kind === 'unknown' ? '' : escapeHTML(r.label || '');
        html += '<div class="est-region ' + r.kind + '" style="flex:' + (r.flex || 1) + '">' + label + '</div>';
      }
      return html;
    }

    /* ====================================================================== */
    /* Round rendering                                                          */
    /* ====================================================================== */
    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="est-stage" id="estStageLabel"></div>' +
        '<div class="est-prelude" id="estPrelude"></div>' +
        '<div class="est-pictures" id="estPictures"></div>' +
        '<div id="estContext"></div>' +
        '<div class="est-question" id="estQuestion"></div>' +
        '<div class="est-yellowcard" id="estYellowcard"></div>' +
        '<div class="est-answer-row">' +
          '<span class="est-answer-label">Around</span>' +
          '<input id="answer-input" data-testid="answer-input" class="est-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="?" autocomplete="off">' +
          '<span class="est-answer-label" id="estUnitLabel">acres</span>' +
        '</div>';
    }

    function renderInitialState() {
      var stageEl = document.getElementById('estStageLabel');
      var introEl = document.getElementById('estPrelude');
      var picsEl = document.getElementById('estPictures');
      var ctxEl = document.getElementById('estContext');
      var qEl = document.getElementById('estQuestion');
      var hintEl = document.getElementById('estYellowcard');
      var input = document.getElementById('answer-input');
      var unitEl = document.getElementById('estUnitLabel');
      if (stageEl) stageEl.textContent = '';
      if (introEl) introEl.textContent = '';
      if (picsEl) picsEl.innerHTML = '';
      if (ctxEl) ctxEl.innerHTML = '';
      if (qEl) qEl.textContent = '';
      if (hintEl) hintEl.textContent = '';
      if (input) {
        input.value = '';
        input.classList.remove('is-correct', 'is-wrong');
      }
      if (unitEl) unitEl.textContent = '';
    }

    function renderRound(roundIdxOneBased) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      gameState.currentRound = roundIdxOneBased - 1;
      gameState.isActive = true;
      gameState.phase = 'gameplay';
      gameState.roundToken = (gameState.roundToken || 0) + 1;
      syncDOM();

      var round = gameState.activeRounds[gameState.currentRound];
      if (!round) return;
      gameState.correctAnswer = round.answer;

      var stageEl = document.getElementById('estStageLabel');
      var introEl = document.getElementById('estPrelude');
      var picsEl = document.getElementById('estPictures');
      var ctxEl = document.getElementById('estContext');
      var qEl = document.getElementById('estQuestion');
      var hintEl = document.getElementById('estYellowcard');
      var input = document.getElementById('answer-input');
      var unitEl = document.getElementById('estUnitLabel');

      if (stageEl) stageEl.textContent = 'Round ' + roundIdxOneBased + ' of ' + gameState.totalRounds;
      if (introEl) {
        introEl.textContent = round.intro;
        introEl.classList.remove('fade-in');
        void introEl.offsetWidth;
        introEl.classList.add('fade-in');
      }
      if (picsEl) {
        var html = '';
        html += '<div class="est-picture"><div class="est-year-tag">' + escapeHTML(round.anchorYear) + '</div>';
        html += '<div class="est-field">' + regionsHTML(round.anchorRegions) + '</div></div>';
        html += '<div class="est-picture"><div class="est-year-tag">' + escapeHTML(round.questionYear) + '</div>';
        html += '<div class="est-field">' + regionsHTML(round.questionRegions) + '</div></div>';
        picsEl.innerHTML = html;
      }
      if (ctxEl) {
        var c = '';
        for (var i = 0; i < round.contextLines.length; i++) {
          c += '<div class="est-context">- ' + escapeHTML(round.contextLines[i]) + '</div>';
        }
        ctxEl.innerHTML = c;
      }
      if (qEl) qEl.textContent = round.questionText;
      if (hintEl) hintEl.textContent = 'Tip: ' + round.hint;
      if (input) {
        input.value = '';
        input.classList.remove('is-correct', 'is-wrong');
        input.disabled = false;
      }
      if (unitEl) unitEl.textContent = round.unit;

      gameState.roundStartMs = Date.now();
      gameState.isProcessing = false;

      try {
        if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode('submit');
        if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(false);
      } catch (e) {}

      try {
        gameState.timerIntentionallyPaused = false;
        if (timer) {
          // Reconfigure per-round countdown budget (concept: 21s for early
          // rounds, tighter for multi-region / cross-domain). reset() pulls
          // currentSeconds back to config.startTime, so we mutate the config
          // before reset, then start.
          try { timer.config.startTime = round.durationSec || 21; } catch (e) {}
          try { if (timer.reset) timer.reset(); } catch (e) {}
          try { if (timer.start) timer.start(); } catch (e) {}
          gameState._timerStarted = true;
        }
      } catch (e) {}

      try {
        var p = safePlaySound('tap_sound', { sticker: null });
        if (p && p.catch) p.catch(function () {});
      } catch (e) {}

      trackEvent('round_start', { round: roundIdxOneBased, set: round.set });
    }

    function onInputChange(ev) {
      if (gameState.isProcessing || gameState.gameEnded) return;
      var input = ev.currentTarget;
      // Strip non-numeric
      var v = input.value.replace(/[^0-9]/g, '');
      if (v !== input.value) input.value = v;
      try {
        if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(v.length > 0);
      } catch (e) {}
    }

    function onInputKey(ev) {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        handleSubmit();
      }
    }

    function classifyAnswer(value, target, closeTol, farTol) {
      if (target === 0) return value === 0 ? 'close' : 'far';
      var diff = Math.abs(value - target) / target;
      if (diff <= closeTol) return 'close';
      if (diff <= farTol) return 'mid';
      return 'far';
    }

    function handleSubmit() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      var input = document.getElementById('answer-input');
      if (!input) return;
      var raw = (input.value || '').trim();
      if (raw.length === 0) return;
      var value = parseInt(raw, 10);
      if (isNaN(value)) return;

      gameState.isProcessing = true;
      input.disabled = true;
      try {
        gameState.timerIntentionallyPaused = true;
        if (timer && timer.pause) timer.pause();
      } catch (e) {}
      try {
        if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(false);
      } catch (e) {}

      var round = gameState.activeRounds[gameState.currentRound];
      var responseMs = Date.now() - gameState.roundStartMs;
      var verdict = classifyAnswer(value, round.answer, round.toleranceClose, round.toleranceFar);
      var isCorrect = verdict === 'close';

      if (isCorrect) {
        input.classList.add('is-correct');
        gameState.score += 1;
        gameState.progress = gameState.currentRound + 1;
        try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
        syncDOM();
        recordAttempt(raw, true, null, responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: true, value: value });
        runCorrectFeedbackAndAdvance(round);
      } else {
        input.classList.add('is-wrong');
        gameState.lives = Math.max(0, gameState.lives - 1);
        gameState.progress = gameState.currentRound + 1;
        try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
        syncDOM();
        var miscTag = verdict === 'mid' ? 'close-but-not-within-tolerance' : 'wildly-off';
        recordAttempt(raw, false, miscTag, responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: false, value: value, verdict: verdict });
        runWrongFeedbackAndAdvance(round);
      }
    }

    // Concept §"What the player sees and does": "Timer expires → auto-submit
    // blank as wrong; heart breaks if no answer; correct value reveals."
    function handleTimeout() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      if (!gameState.isActive) return;
      var input = document.getElementById('answer-input');
      var round = gameState.activeRounds[gameState.currentRound];
      if (!round) return;

      gameState.isProcessing = true;
      gameState.timerIntentionallyPaused = true;
      try { if (timer && timer.pause) timer.pause(); } catch (e) {}
      try { if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(false); } catch (e) {}

      if (input) {
        input.disabled = true;
        input.classList.add('is-wrong');
      }

      var responseMs = Date.now() - gameState.roundStartMs;
      gameState.lives = Math.max(0, gameState.lives - 1);
      gameState.progress = gameState.currentRound + 1;
      try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
      syncDOM();
      recordAttempt('', false, 'timer-expired', responseMs);
      trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: false, value: null, verdict: 'timeout' });

      // Heart-shatter visual + advance through wrong-feedback flow.
      (async function () {
        try {
          await awaitedFeedbackSound('incorrect_sound_effect', { sticker: STICKER_SAD });
        } catch (e) {}
        try {
          await playDynamicFeedback({
            audio_content: round.timeoutTTS,
            subtitle: round.timeoutSubtitle,
            sticker: STICKER_SAD
          });
        } catch (e) {}
        advanceAfterFeedback();
      })();
    }

    function runCorrectFeedbackAndAdvance(round) {
      (async function () {
        try {
          await awaitedFeedbackSound('correct_sound_effect', { sticker: STICKER_CORRECT });
        } catch (e) {}
        try {
          await playDynamicFeedback({
            audio_content: round.correctTTS,
            subtitle: round.correctSubtitle,
            sticker: STICKER_CORRECT
          });
        } catch (e) {}
        advanceAfterFeedback();
      })();
    }

    function runWrongFeedbackAndAdvance(round) {
      (async function () {
        try {
          await awaitedFeedbackSound('incorrect_sound_effect', { sticker: STICKER_SAD });
        } catch (e) {}
        try {
          await playDynamicFeedback({
            audio_content: round.wrongTTS,
            subtitle: round.wrongSubtitle,
            sticker: STICKER_SAD
          });
        } catch (e) {}
        advanceAfterFeedback();
      })();
    }

    function advanceAfterFeedback() {
      var roundJustPlayed = gameState.currentRound + 1;
      if (gameState.lives === 0) {
        gameState.stars = getStars();
        endGame(false);
        return;
      }
      if (roundJustPlayed === gameState.totalRounds) {
        endGame(true);
        return;
      }
      showRoundIntro(roundJustPlayed + 1);
    }

    /* ====================================================================== */
    /* Round intro                                                              */
    /* ====================================================================== */
    async function showRoundIntro(n) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      var ttsText = 'Round ' + n;
      await transitionScreen.show({
        title: 'Round ' + n,
        icons: [],
        persist: true,
        buttons: [],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND }); } catch (e) {}
            try {
              await playDynamicFeedback({
                audio_content: ttsText,
                subtitle: ttsText,
                sticker: STICKER_ROUND
              });
            } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          })();
        }
      });

      setTimeout(function () {
        try {
          if (gameState.gameEnded) return;
          if (gameState.currentRound + 1 < n) {
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          }
        } catch (e) {}
      }, 9000);
    }

    /* ====================================================================== */
    /* End-of-game                                                              */
    /* ====================================================================== */
    function endGame(victory) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;

      try {
        gameState.timerIntentionallyPaused = true;
        if (timer && timer.pause) timer.pause();
      } catch (e) {}

      gameState.stars = getStars();

      if (victory) {
        gameState.phase = 'results';
        syncDOM();
        postGameComplete();
        showVictory();
      } else {
        gameState.phase = 'game_over';
        syncDOM();
        postGameComplete();
        showGameOver();
      }
      trackEvent('game_end', { victory: victory, stars: gameState.stars, score: gameState.score });
    }

    function _victoryClaimAction() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try { transitionScreen.hide(); } catch (e) {}
      showStarsCollected();
    }
    function _victoryPlayAgainAction() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try { transitionScreen.hide(); } catch (e) {}
      showMotivation();
    }

    async function showVictory() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var stars = gameState.stars;
      var subtitle = 'You got ' + gameState.score + ' out of ' + gameState.totalRounds + '!';
      var ttsText = stars === 3 ? 'Brilliant! Three stars!' : 'Great job — try again for more stars!';
      var sfxId = stars === 3 ? 'victory_sound_effect' : 'game_complete_sound_effect';
      await transitionScreen.show({
        title: 'Victory',
        subtitle: subtitle,
        stars: stars,
        buttons: stars === 3
          ? [{ text: 'Claim Stars', type: 'primary', action: _victoryClaimAction }]
          : [
              { text: 'Play Again', type: 'secondary', action: _victoryPlayAgainAction },
              { text: 'Claim Stars', type: 'primary', action: _victoryClaimAction }
            ],
        persist: true,
        onMounted: function () {
          (async function () {
            try { await safePlaySound(sfxId, { sticker: STICKER_VICTORY }); } catch (e) {}
            try {
              await playDynamicFeedback({
                audio_content: ttsText,
                subtitle: ttsText,
                sticker: STICKER_CELEBRATE
              });
            } catch (e) {}
          })();
        }
      });
    }

    async function showGameOver() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var subtitle = 'You got ' + gameState.score + '/' + gameState.totalRounds + ' — try again.';
      await transitionScreen.show({
        title: 'Game Over',
        subtitle: subtitle,
        icons: ['😔'],
        stars: 0,
        persist: true,
        buttons: [{
          text: 'Try Again',
          type: 'primary',
          action: function () {
            try { FeedbackManager.sound.pause(); } catch (e) {}
            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}

          }
        }],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('game_over_sound_effect', { sticker: STICKER_GAMEOVER }); } catch (e) {}
            try {
              await playDynamicFeedback({
                audio_content: subtitle,
                subtitle: subtitle,
                sticker: STICKER_GAMEOVER
              });
            } catch (e) {}
          })();
        }
      });
    }

    async function showMotivation() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = 'Ready to improve your score?';
      await transitionScreen.show({
        title: 'Ready to improve your score?',
        icons: ['⚡'],
        persist: true,
        buttons: [{
          text: "I'm ready",
          type: 'primary',
          action: function () {
            try { FeedbackManager.sound.pause(); } catch (e) {}
            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            restartGame();
          }
        }],
        onMounted: function () {
          (async function () {
            try { if (progressBar) progressBar.update(0, gameState.totalLives); } catch (e) {}
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_MOTIVATE }); } catch (e) {}
            try {
              await playDynamicFeedback({
                audio_content: ttsText,
                subtitle: ttsText,
                sticker: STICKER_MOTIVATE
              });
            } catch (e) {}
          })();
        }
      });

    async function showStarsCollected() {
      gameState.phase = 'stars_collected';
      syncDOM();
      await transitionScreen.show({
        title: "Yay!\nStars collected!",
        buttons: [],
        persist: true,
        styles: { title: { whiteSpace: 'pre-line', lineHeight: '1.3' } },
        onMounted: function () {
          (async function () {
            try { await safePlaySound('victory_sound_effect', { sticker: STICKER_VICTORY }); } catch (e) {}
            try {
              window.postMessage({
                type: 'show_star',
                data: {
                  count: gameState.stars,
                  variant: 'yellow',
                  score: gameState.score + '/' + gameState.totalRounds
                }
              }, '*');
            } catch (e) {}
            setTimeout(showAnswerCarousel, 1500);
          })();
        }
      });
    }

    /* ====================================================================== */
    /* Answer carousel                                                          */
    /* ====================================================================== */
    function renderAnswerSlide(container, round) {
      if (!container || !round) return;
      var html = '';
      html += '<div style="padding:14px 12px;text-align:center;">';
      html += '<div style="font-size:18px;font-weight:800;color:var(--mathai-primary);margin-bottom:6px;">' + escapeHTML(round.questionText) + '</div>';
      html += '<div class="est-pictures">';
      html += '<div class="est-picture"><div class="est-year-tag">' + escapeHTML(round.anchorYear) + '</div>';
      html += '<div class="est-field">' + regionsHTML(round.anchorRegions) + '</div></div>';
      html += '<div class="est-picture"><div class="est-year-tag">' + escapeHTML(round.questionYear) + '</div>';
      html += '<div class="est-field">' + regionsHTML(round.questionRegions) + '</div></div>';
      html += '</div>';
      html += '<div style="margin-top:8px;font-size:18px;font-weight:700;color:var(--mathai-success);">Around ' + escapeHTML(String(round.answer)) + ' ' + escapeHTML(round.unit) + '</div>';
      html += '</div>';
      container.innerHTML = html;
    }

    function buildAnswerSlidesForAllRounds() {
      var rounds = gameState.activeRounds;
      var slides = [];
      for (var i = 0; i < rounds.length; i++) {
        (function (r) {
          slides.push({ render: function (container) { renderAnswerSlide(container, r); } });
        })(rounds[i]);
      }
      return slides;
    }

    function showAnswerCarousel() {
      try { answerComponent.show({ slides: buildAnswerSlidesForAllRounds() }); } catch (e) {}
      try { if (floatingBtn) floatingBtn.setMode('next'); } catch (e) {}
      try {
        setTimeout(function () {
          var slot = document.getElementById('mathai-answer-slot');
          if (slot && slot.scrollIntoView) slot.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 200);
      } catch (e) {}
    }

    /* ====================================================================== */
    /* setupGame                                                                */
    /* ====================================================================== */
    function setupGame() {
      var content = gameState.content || fallbackContent;
      gameState.content = content;
      gameState.totalRounds = content.totalRounds || 10;
      gameState.totalLives = content.totalLives || 3;
      gameState.lives = gameState.totalLives;
      gameState.activeRounds = getRounds();

      injectGameHTML();
      renderInitialState();

      var input = document.getElementById('answer-input');
      if (input) {
        input.addEventListener('input', onInputChange);
        input.addEventListener('keydown', onInputKey);
      }

      try {
        previewScreen.show({
          instruction: content.previewInstruction || fallbackContent.previewInstruction,
          audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
          showGameOnPreview: content.showGameOnPreview === true,
          onComplete: function (previewData) { startGameAfterPreview(previewData); }
        });
      } catch (e) {
        console.error('[previewScreen.show failed]', e && e.message, e);
        if (typeof Sentry !== 'undefined') Sentry.captureException(e);
      }
    }

    function startGameAfterPreview(previewData) {
      gameState.previewResult = previewData || {};
      gameState.duration_data.preview = gameState.duration_data.preview || [];
      gameState.duration_data.preview.push({ duration: (previewData && previewData.duration) || 0 });

      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();

      try {
        if (progressBar) {
          progressBar.show();
          progressBar.update(0, gameState.totalLives);
        }
      } catch (e) {}

      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex] });
      try {
        if (signalCollector && signalCollector.recordViewEvent) {
          signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' });
        }
      } catch (e) {}

      showWelcome();
    }

    async function showWelcome() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = "Let's play! Look at the picture, use the anchor, and type your best estimate.";
      await transitionScreen.show({
        title: 'Welcome!',
        icons: ['👋'],
        persist: true,
        buttons: [{
          text: "Let's go!",
          type: 'primary',
          action: function () {
            try { FeedbackManager.sound.pause(); } catch (e) {}
            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            showRoundIntro(1);
          }
        }],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('sound_level_transition', { sticker: STICKER_LEVEL }); } catch (e) {}
            try {
              await playDynamicFeedback({
                audio_content: ttsText,
                subtitle: ttsText,
                sticker: STICKER_LEVEL
              });
            } catch (e) {}
          })();
        }
      });
    }

    /* ====================================================================== */
    /* Restart                                                                  */
    /* ====================================================================== */
    function resetGameState() {
      gameState.phase = 'gameplay';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState._gameCompletePosted = false;
      gameState.stars = 0;
      gameState.correctAnswer = null;
      gameState.progress = 0;
      gameState.duration_data = { startTime: null, endTime: null, preview: gameState.duration_data.preview || [] };
      gameState.activeRounds = getRounds();
      gameState._timerStarted = false;
      gameState.timerIntentionallyPaused = false;
      try {
        if (timer) {
          if (timer.reset) timer.reset();
          if (timer.pause) timer.pause();
        }
      } catch (e) {}
      try {
        if (answerComponent && answerComponent.update) answerComponent.update({ slides: [] });
        if (answerComponent && answerComponent.hide) answerComponent.hide();
      } catch (e) {}
    }

    function restartGame() {
      var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
      gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      resetGameState();

      try { if (signalCollector && signalCollector.reset) signalCollector.reset(); } catch (e) {}

      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();

      try { if (progressBar) progressBar.update(0, gameState.totalLives); } catch (e) {}

      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex], restart: true });
      showRoundIntro(1);
    }

    /* ====================================================================== */
    /* Postmessage handling                                                     */
    /* ====================================================================== */
    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      var t = event.data.type;
      var data = event.data.data || {};
      if (t === 'game_init') {
        gameState.phase = 'playing';
        if (data.content) gameState.content = data.content;
        gameState.signalConfig = data.signalConfig || {};
        if (data.signalConfig && signalCollector && signalCollector.applyConfig) {
          try { signalCollector.applyConfig(data.signalConfig); } catch (e) {}
        }
        try {
          if (signalCollector) {
            signalCollector.gameId = 'visual-stimulus-typed-answer';
            if (data.sessionId) signalCollector.sessionId = data.sessionId;
            if (data.studentId) signalCollector.studentId = data.studentId;
            if (data.contentSetId) signalCollector.contentSetId = data.contentSetId;
            if (data.signalConfig && data.signalConfig.flushUrl) signalCollector.flushUrl = data.signalConfig.flushUrl;
            if (data.signalConfig && data.signalConfig.playId) signalCollector.playId = data.signalConfig.playId;
            if (signalCollector.startFlushing) {
              try { signalCollector.startFlushing(); } catch (e) {}
            }
          }
        } catch (e) {}
        syncDOM();
        setupGame();
      }
    }

    /* ====================================================================== */
    /* Mount the timer DIV inside #mathai-preview-slot                           */
    /* ====================================================================== */
    function mountTimerInsideHeader() {
      var slot = document.getElementById('mathai-preview-slot');
      if (!slot) return;
      var existing = document.getElementById('timer-container');
      if (existing) {
        if (existing.parentNode !== slot) slot.appendChild(existing);
        return;
      }
      var div = document.createElement('div');
      div.id = 'timer-container';
      slot.appendChild(div);
    }

    /* ====================================================================== */
    /* DOMContentLoaded                                                         */
    /* ====================================================================== */
    document.addEventListener('DOMContentLoaded', function () {
      waitForPackages().then(function () {
        try {
          var initP = FeedbackManager.init && FeedbackManager.init();
          var doInit = initP && initP.then ? initP : Promise.resolve();
          doInit.then(function () {
            try {
              try {
                signalCollector = new SignalCollector({
                  sessionId: 'visual-stimulus-typed-answer-' + Date.now(),
                  studentId: 'standalone',
                  gameId: 'visual-stimulus-typed-answer',
                  contentSetId: 'fallback'
                });
                window.signalCollector = signalCollector;
              } catch (e) {
                console.error('[SignalCollector ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              try {
                ScreenLayout.inject('app', {
                  slots: {
                    previewScreen: true,
                    progressBar: true,
                    transitionScreen: true,
                    floatingButton: true,
                    answerComponent: true
                  }
                });
              } catch (e) {
                console.error('[ScreenLayout.inject failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              mountTimerInsideHeader();

              injectGameHTML();
              renderInitialState();

              try {
                // Countdown timer per concept (§"What the player sees and does":
                // bright-blue countdown e.g. 00:21). startTime is reconfigured
                // per-round in renderRound() so each scene gets its own budget.
                timer = new TimerComponent('timer-container', {
                  timerType: 'decrease',
                  format: 'min',
                  startTime: 25,
                  endTime: 0,
                  autoStart: false,
                  onEnd: function () { handleTimeout(); }
                });
              } catch (e) {
                console.error('[TimerComponent ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              try {
                visibilityTracker = new VisibilityTracker({
                  popupProps: {
                    title: 'Paused',
                    description: 'Tap Resume to continue.',
                    primaryText: 'Resume'
                  },
                  onInactive: function () {
                    try { FeedbackManager.sound.pause(); } catch (e) {}
                    try { FeedbackManager.stream.pauseAll(); } catch (e) {}
                    try { if (timer && !gameState.timerIntentionallyPaused) timer.pause(); } catch (e) {}
                    try { if (previewScreen) previewScreen.pause(); } catch (e) {}
                  },
                  onResume: function () {
                    try { FeedbackManager.sound.resume(); } catch (e) {}
                    try { FeedbackManager.stream.resumeAll(); } catch (e) {}
                    try { if (timer && !gameState.timerIntentionallyPaused) timer.resume(); } catch (e) {}
                    try { if (previewScreen) previewScreen.resume(); } catch (e) {}
                  }
                });
              } catch (e) {
                console.error('[VisibilityTracker ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              try {
                progressBar = new ProgressBarComponent({
                  slotId: 'mathai-progress-slot',
                  totalRounds: 10,
                  totalLives: 3
                });
              } catch (e) {
                console.error('[ProgressBarComponent ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              try {
                transitionScreen = new TransitionScreenComponent({
                  slotId: 'mathai-transition-slot'
                });
              } catch (e) {
                console.error('[TransitionScreenComponent ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              try {
                previewScreen = new PreviewScreenComponent({
                  slotId: 'mathai-preview-slot'
                });
              } catch (e) {
                console.error('[PreviewScreenComponent ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              try {
                floatingBtn = new FloatingButtonComponent({
                  slotId: 'mathai-floating-button-slot'
                });
              } catch (e) {
                console.error('[FloatingButtonComponent ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              try {
                answerComponent = new AnswerComponentComponent({
                  slotId: 'mathai-answer-slot'
                });
              } catch (e) {
                console.error('[AnswerComponentComponent ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              try {
                if (floatingBtn && floatingBtn.on) {
                  floatingBtn.on('submit', function () {
                    handleSubmit();
                  });
                  floatingBtn.on('next', function () {
                    try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
                    try { if (answerComponent) answerComponent.destroy(); } catch (e) {}
                    try { if (previewScreen) previewScreen.destroy(); } catch (e) {}
                    try { if (floatingBtn) floatingBtn.destroy(); } catch (e) {}
                  });
                }
              } catch (e) {}

              try {
                FeedbackManager.sound.preload([
                  { id: 'correct_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
                  { id: 'incorrect_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                  { id: 'rounds_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                  { id: 'sound_level_transition',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
                  { id: 'victory_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                  { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
                  { id: 'game_over_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                  { id: 'tap_sound',                url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
                ]);
              } catch (e) {
                console.error('[FeedbackManager.preload failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              window.addEventListener('message', handlePostMessage);
              try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

              setupGame();
            } catch (e) {
              console.error('[init inner] ' + (e && e.message), e);
              if (typeof Sentry !== 'undefined') Sentry.captureException(e);
            }
          }, function (e) {
            console.error('[FeedbackManager.init failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          });
        } catch (e) {
          console.error('[init outer] ' + (e && e.message), e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }
      }, function (err) {
        console.error('[waitForPackages rejected] ' + (err && err.message));
        if (typeof Sentry !== 'undefined') Sentry.captureException(err);
      });

      setTimeout(function () {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;
        var missing = [];
        if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
        if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
        if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
        if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
        if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
        if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
        if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
        if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
        if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
        if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
        if (missing.length > 0) {
          var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
          console.error('[' + msg + ']');
          if (typeof Sentry !== 'undefined') Sentry.captureMessage(msg);
          var gc = document.getElementById('gameContent') || document.getElementById('app') || document.body;
          if (gc) {
            gc.innerHTML =
              '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">' +
              'Game failed to load — please refresh.' +
              '</div>';
          }
          return;
        }
      }, 2000);

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = setupGame;
      window.renderRound = renderRound;
      window.loadRound = function (n) { try { renderRound(n); } catch (e) {} };
    });
  </script>
</body>
</html>
