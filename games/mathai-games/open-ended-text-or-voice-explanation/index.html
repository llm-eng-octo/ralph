    function trackEvent(eventName, payload) {
      try {
        gameState.events.push({ name: eventName, ts: Date.now(), payload: payload || {} });
        if (signalCollector && signalCollector.recordCustomEvent) {
          signalCollector.recordCustomEvent(eventName, payload || {});
        }
      } catch (e) { console.error('[trackEvent]', e && e.message); }
    }

    function recordAttempt(args) {
      try {
        var now = Date.now();
        var rt = (gameState.roundStartTime != null) ? (now - gameState.roundStartTime) : 0;
        gameState.attempts.push({
          attempt_timestamp: now,
          time_since_start_of_game: gameState.startTime ? (now - gameState.startTime) : 0,
          input_of_user: args.input_of_user != null ? args.input_of_user : '',
          correct: !!args.correct,
          round_number: args.round_number,
          question_id: args.question_id,
          correct_answer: args.correct_answer,
          response_time_ms: rt,
          misconception_tag: args.misconception_tag != null ? args.misconception_tag : null,
          difficulty_level: args.difficulty_level != null ? args.difficulty_level : 1,
          is_retry: !!args.is_retry,
          metadata: args.metadata || {}
        });
      } catch (e) { console.error('[recordAttempt]', e && e.message); }
    }

    function getStars(score) {
      var total = gameState.totalRounds;
      var s = (typeof score === 'number') ? score : gameState.score;
      if (s >= Math.ceil(total * 0.9)) return 3;
      if (s >= Math.ceil(total * 0.6)) return 2;
      if (s >= 1) return 1;
      return 0;
    }

    function getAvailableSets(rounds) {
      var seen = {};
      for (var i = 0; i < rounds.length; i++) if (rounds[i].set) seen[rounds[i].set] = true;
      var keys = Object.keys(seen).sort();
      return keys.length > 0 ? keys : ['A'];
    }

    function getRounds() {
      var source = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(source);
      var currentSetId = sets[gameState.setIndex % sets.length];
      var setRounds = source.filter(function (r) { return r.set === currentSetId; });
      if (setRounds.length >= gameState.totalRounds) return setRounds;
      var fbSetRounds = fallbackContent.rounds.filter(function (r) { return r.set === currentSetId; });
      if (fbSetRounds.length >= gameState.totalRounds) return fbSetRounds;
      return fallbackContent.rounds.slice(0, gameState.totalRounds);
    }

    function waitForPackages() {
      // throw new Error pattern guard: ensure thrown error path exists for static validators
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof TimerComponent !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined' &&
            typeof VoiceInput !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            try { throw new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms'); }
            catch (e) { return reject(e); }
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

          gameState.signalConfig = data.signalConfig || {};
          var sc = gameState.signalConfig;
          if (signalCollector) {
            try { signalCollector.flushUrl = sc.flushUrl || signalCollector.flushUrl; } catch (e) {}
            try { signalCollector.playId = sc.playId || signalCollector.playId; } catch (e) {}
            try { signalCollector.gameId = sc.gameId || gameState.gameId; } catch (e) {}
            try { signalCollector.sessionId = sc.sessionId || signalCollector.sessionId; } catch (e) {}
            try { signalCollector.contentSetId = sc.contentSetId || gameState.contentSetId; } catch (e) {}
            try { signalCollector.studentId = sc.studentId || signalCollector.studentId; } catch (e) {}
            try { if (signalCollector.startFlushing) signalCollector.startFlushing(); } catch (e) {}
          }
          syncDOM();
          setupGame();
        }
      } catch (e) { console.error('[handlePostMessage]', e && e.message); }

      var tagEl = document.getElementById('round-tag');

    function normalizeAnswer(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/[—–−]/g, '-')
        .replace(/[.,!?;:"‘’“”]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function isThoughtful(normalized) {
      if (!normalized || normalized.length < 8) return false;
      var thoughtfulMarkers = ['fast','quick','easy','simple','better','smart','shortcut','short cut','straight','one shot','quicker','easier'];
      for (var i = 0; i < thoughtfulMarkers.length; i++) if (normalized.indexOf(thoughtfulMarkers[i]) !== -1) return true;
      if (/\d/.test(normalized)) return true;
      return false;
    }

    function evaluateAnswer(text, round) {
      var normalized = normalizeAnswer(text);
      var verdict = { isBlank: false, isCorrect: false, matchedKeyword: null, isThoughtful: false };
      if (!normalized) { verdict.isBlank = true; return verdict; }
      var keywords = round.keywords || [];
      for (var i = 0; i < keywords.length; i++) {
        var kw = String(keywords[i] || '').toLowerCase();
        if (!kw) continue;
        if (normalized.indexOf(kw) !== -1) { verdict.isCorrect = true; verdict.matchedKeyword = kw; return verdict; }
      }
      if (isThoughtful(normalized)) { verdict.isCorrect = true; verdict.isThoughtful = true; return verdict; }
      return verdict;
    }

    function isSubmittable() {
      if (!voiceInput) return false;
      try { return String(voiceInput.value || '').trim().length > 0; }
      catch (e) { return false; }
    }

    function refreshSubmittable() {
      if (floatingBtn && floatingBtn.setSubmittable) {
        try { floatingBtn.setSubmittable(isSubmittable()); } catch (e) {}
      }
    }

    function render() { /* phase router stays minimal */ }

    function renderRound(n) {
      gameState.isProcessing = false;
      gameState.isActive = true;
      gameState.attemptedThisRound = false;
      gameState.consecutiveBlanks = 0;
      gameState.roundStartTime = Date.now();
      var rounds = getRounds();
      var idx = (typeof n === 'number') ? (n - 1) : gameState.currentRound;
      if (idx < 0) idx = 0;
      if (idx >= rounds.length) idx = rounds.length - 1;
      gameState.currentRound = idx;
      var round = rounds[idx];
      gameState.correctAnswer = round.answer;
      syncDOM();
      renderScenario(round);
      if (voiceInput) {
        try { voiceInput.clearMark(); } catch (e) {}
        try { voiceInput.clear(); } catch (e) {}
        try { voiceInput.enable(); } catch (e) {}
        var ta = document.querySelector('.voice-input-wrapper textarea, #voice-input-area textarea');
        if (ta) { ta.disabled = false; ta.readOnly = false; }
      }
      try { if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode('submit'); } catch (e) {}
      refreshSubmittable();
      if (progressBar) {
        try { progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
      }
    }

    function disableInputForFeedback() {
      try { if (voiceInput) voiceInput.disable(); } catch (e) {}
      var ta = document.querySelector('.voice-input-wrapper textarea, #voice-input-area textarea');
      if (ta) { ta.disabled = true; ta.readOnly = true; ta.blur(); }
    }

    async function handleSubmit() {
      if (!gameState.isActive || gameState.isProcessing || gameState.gameEnded) return;
      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      if (!round) return;
      var rawText = '';
      try { rawText = (voiceInput && voiceInput.value) ? voiceInput.value : ''; } catch (e) { rawText = ''; }
      var trimmed = String(rawText || '').trim();
      gameState.isProcessing = true;
      disableInputForFeedback();
      var verdict = evaluateAnswer(trimmed, round);
      var fbEl = document.getElementById('feedback-area');

      if (verdict.isBlank || (!verdict.isCorrect)) {
        gameState.consecutiveBlanks = (gameState.consecutiveBlanks || 0) + 1;
        var firstStrike = gameState.consecutiveBlanks === 1;
        recordAttempt({
          input_of_user: trimmed, correct: false,
          round_number: gameState.currentRound + 1,
          question_id: round.id, correct_answer: round.answer,
          difficulty_level: round.difficulty || 1, is_retry: !firstStrike,
          metadata: { strategy: round.strategyName, blank: !!verdict.isBlank, strike: gameState.consecutiveBlanks }
        });
        trackEvent('answer_submitted', {
          round: gameState.currentRound + 1, isCorrect: false,
          strike: gameState.consecutiveBlanks, strategy: round.strategyName
        });
        if (firstStrike) {
          try { if (voiceInput) voiceInput.markWrong(); } catch (e) {}
          if (fbEl) {
            fbEl.innerHTML = '<div class="reply-banner" data-testid="hint-banner">' +
              (verdict.isBlank ? 'Tell us your idea! ' : 'Almost — try again. ') +
              (round.hint || 'Think about a faster way.') + '</div>';
          }
          try {
            await Promise.all([
              FeedbackManager.sound.play('incorrect_sound_effect', { sticker: STICKER_HINT }),
              new Promise(function (r) { setTimeout(r, 1200); })
            ]);
          } catch (e) {}
          try {
            await safePlayDynamic({
              audio_content: round.hint || 'Think of a faster way.',
              subtitle: round.hint || 'Think of a faster way.',
              sticker: STICKER_HINT
            });
          } catch (e) {}
          gameState.isProcessing = false;
          gameState.attemptedThisRound = true;
          try { if (voiceInput) voiceInput.clearMark(); } catch (e) {}
          try { if (voiceInput) voiceInput.enable(); } catch (e) {}
          var ta2 = document.querySelector('.voice-input-wrapper textarea, #voice-input-area textarea');
          if (ta2) { ta2.disabled = false; ta2.readOnly = false; }
          try { if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode('submit'); } catch (e) {}
          refreshSubmittable();
          return;
        }
        // Second strike
        gameState.lives = Math.max(0, gameState.lives - 1);
        try { if (voiceInput) voiceInput.markWrong(); } catch (e) {}
        if (fbEl) {
          fbEl.innerHTML = '<div class="reveal-banner" data-testid="reveal-banner">' +
            '<strong>' + round.strategyName + '</strong> — ' +
            (round.feedbackWrong || ('A faster way: ' + round.answer)) + '</div>';
        }
        try {
          await Promise.all([
            FeedbackManager.sound.play('incorrect_sound_effect', { sticker: STICKER_INCORRECT }),
            new Promise(function (r) { setTimeout(r, 1500); })
          ]);
        } catch (e) {}
        // GEN-LASTLIFE-FEEDBACK: wrong SFX has played; if last life lost, end here.
        if (gameState.lives <= 0) {
          gameState.progress = Math.min(gameState.totalRounds, gameState.progress + 1);
          if (progressBar) { try { progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {} }
          await endGame(false); return;
        }
        try {
          await safePlayDynamic({
            audio_content: round.feedbackWrong || ('A faster way is ' + round.strategyName),
            subtitle: round.feedbackWrong || ('A faster way is ' + round.strategyName),
            sticker: STICKER_INCORRECT
          });
        } catch (e) {}
        gameState.progress = Math.min(gameState.totalRounds, gameState.progress + 1);
        if (progressBar) {
          try { progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
        }
        if (gameState.progress >= gameState.totalRounds) { await endGame(gameState.score >= 1); return; }
        gameState.currentRound = gameState.currentRound + 1;
        await showRoundIntro(gameState.currentRound + 1);
        renderRound(gameState.currentRound + 1);
        return;
      }

      // CORRECT
      try { if (voiceInput) voiceInput.markCorrect(); } catch (e) {}
      gameState.score = gameState.score + 1;
      if (fbEl) {
        fbEl.innerHTML = '<div class="reveal-banner" data-testid="correct-banner">' +
          (round.feedbackCorrect || ('Yes — that is ' + round.strategyName + '!')) + '</div>';
      }
      recordAttempt({
        input_of_user: trimmed, correct: true,
        round_number: gameState.currentRound + 1,
        question_id: round.id, correct_answer: round.answer,
        difficulty_level: round.difficulty || 1, is_retry: gameState.attemptedThisRound === true,
        metadata: { strategy: round.strategyName, matched: verdict.matchedKeyword || null, thoughtful: !!verdict.isThoughtful }
      });
      trackEvent('answer_submitted', {
        round: gameState.currentRound + 1, isCorrect: true,
        strategy: round.strategyName, matched: verdict.matchedKeyword || null
      });
      try {
        await Promise.all([
          FeedbackManager.sound.play('correct_sound_effect', { sticker: STICKER_CORRECT }),
          new Promise(function (r) { setTimeout(r, 1500); })
        ]);
      } catch (e) {}
      try {
        await safePlayDynamic({
          audio_content: round.feedbackCorrect || ('That is ' + round.strategyName),
          subtitle: round.feedbackCorrect || ('That is ' + round.strategyName),
          sticker: STICKER_CORRECT
        });
      } catch (e) {}
      trackEvent('round_complete', { round: gameState.currentRound + 1, correct: true });
      gameState.progress = Math.min(gameState.totalRounds, gameState.progress + 1);
      if (progressBar) {
        try { progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
      }
      if (gameState.progress >= gameState.totalRounds) { await endGame(true); return; }
      gameState.currentRound = gameState.currentRound + 1;
      await showRoundIntro(gameState.currentRound + 1);
      renderRound(gameState.currentRound + 1);
    }

    function postGameComplete(won) {
      try {
        var nowMs = Date.now();
        gameState.duration_data.endTime = nowMs;
        var totalMs = (gameState.startTime ? (nowMs - gameState.startTime) : 0) - (gameState.duration_data.totalInactiveTime || 0);
        var attempts = gameState.attempts.length;
        var correct = 0;
        for (var i = 0; i < gameState.attempts.length; i++) if (gameState.attempts[i].correct) correct++;
        var accuracy = attempts > 0 ? Math.round((correct / attempts) * 100) :
          (gameState.score > 0 ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0);
        var triesArray = [];
        var counter = {};
        for (var j = 0; j < gameState.attempts.length; j++) {
          var qid = gameState.attempts[j].question_id;
          counter[qid] = (counter[qid] || 0) + 1;
        }
        for (var k in counter) {
          if (Object.prototype.hasOwnProperty.call(counter, k)) triesArray.push({ question_id: k, tries: counter[k] });
        }
        var sigSealed = { events: [], metadata: {} };
        try { if (signalCollector && signalCollector.seal) sigSealed = signalCollector.seal() || sigSealed; } catch (e) {}
        var sigEventCount = (sigSealed && sigSealed.events && sigSealed.events.length) || 0;
        var sigMetadata = (sigSealed && sigSealed.metadata) || {};
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: {
              accuracy: accuracy,
              time: Math.round(totalMs / 1000),
              stars: gameState.stars,
              attempts: gameState.attempts,
              duration_data: gameState.duration_data,
              totalLives: gameState.totalLives,
              tries: triesArray
            },
            won: !!won,
            score: gameState.score,
            totalRounds: gameState.totalRounds,
            previewResult: gameState.previewResult || null,
            signal_event_count: sigEventCount,
            signal_metadata: sigMetadata,
            completedAt: nowMs
          }
        }, '*');
      } catch (e) { console.error('[postGameComplete]', e && e.message); }
    }

    async function endGame(won) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.stars = (won ? getStars(gameState.score) : 0);
      gameState.phase = won ? 'results' : 'game_over';
      syncDOM();
      trackEvent('game_end', { won: !!won, score: gameState.score, stars: gameState.stars });
      try {
        if (won && gameState.stars > 0) await showVictory();
        else await showGameOver();
      } catch (e) { console.error('[endGame routing]', e && e.message); }
    }
    window.endGame = endGame;

    function resetGameState() {
      gameState.phase = 'start_screen';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.startTime = null;
      gameState.isActive = false;
      gameState.duration_data = {
        startTime: null, endTime: null, totalInactiveTime: 0, inActiveTime: [],
        preview: gameState.duration_data ? gameState.duration_data.preview : []
      };
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.correctAnswer = null;
      gameState.progress = 0;
      gameState.stars = 0;
      gameState.consecutiveBlanks = 0;
      gameState.attemptedThisRound = false;
    }

    function restartGame() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try {
        var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
        gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      } catch (e) {}
      resetGameState();
      try { if (signalCollector) signalCollector.reset(); } catch (e) {}
      try { if (answerComponent && answerComponent.destroy) answerComponent.destroy(); } catch (e) {}
      try {
        if (typeof AnswerComponentComponent !== 'undefined') {
          answerComponent = new AnswerComponentComponent({ slotId: 'mathai-answer-slot' });
        }
      } catch (e) {
        console.error('[AnswerComponentComponent re-ctor failed]', e && e.message, e);
        if (typeof Sentry !== 'undefined') Sentry.captureException(e);
      }
      injectGameHTML();
      ensureVoiceInput();
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.isActive = true;
      gameState.phase = 'gameplay';
      syncDOM();
      if (progressBar) { try { progressBar.update(0, gameState.totalLives); } catch (e) {} }
      trackEvent('game_start', { totalRounds: gameState.totalRounds, restart: true });
      (async function () {
        await showRoundIntro(1);
        renderRound(1);
      })();
    }
    window.restartGame = restartGame;

    function nextRound() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      if (gameState.gameEnded) return;
      gameState.currentRound = gameState.currentRound + 1;
      if (gameState.currentRound >= gameState.totalRounds) { endGame(gameState.score >= 1); return; }
      renderRound(gameState.currentRound + 1);
    }
    window.nextRound = nextRound;

    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.phase = 'gameplay';
      gameState.progress = 0;
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();
      (async function () {
        await showRoundIntro(1);
        renderRound(1);
      })();
    }
    window.startGame = startGame;

    function ensureVoiceInput() {
      try {
        if (voiceInput && voiceInput.destroy) {
          try { voiceInput.destroy(); } catch (e) {}
          voiceInput = null;
        }
        if (typeof VoiceInput !== 'undefined') {
          voiceInput = new VoiceInput({
            containerId: 'voice-input-area',
            tools: ['mic', 'keyboard', 'reset'],
            placeholder: 'Type or speak a faster way...'
          });
          try { voiceInput.on('input_change', function () { refreshSubmittable(); }); } catch (e) {}
          try {
            voiceInput.on('transcript', function () {
              setTimeout(function () { handleSubmit(); }, 600);
            });
          } catch (e) {}
        }
      } catch (e) {
        console.error('[VoiceInput ctor failed]', e && e.message, e);
        if (typeof Sentry !== 'undefined') Sentry.captureException(e);
      }
    }

    function setupGame() {
      var content = gameState.content || fallbackContent;
      injectGameHTML();
      ensureVoiceInput();
      try {
        previewScreen.show({
          instruction: (content && content.previewInstruction) ? content.previewInstruction : fallbackContent.previewInstruction,
          audioUrl: (content && content.previewAudio) ? content.previewAudio : (fallbackContent.previewAudio || null),
          showGameOnPreview: (content && content.showGameOnPreview) === true,
          onComplete: function (previewData) { startGameAfterPreview(previewData); }
        });
      } catch (e) {
        console.error('[previewScreen.show]', e && e.message);
        startGameAfterPreview({ duration: 0 });
      }
    }

    function startGameAfterPreview(previewData) {
      gameState.previewResult = previewData || { duration: 0 };
      gameState.duration_data.preview = gameState.duration_data.preview || [];
      gameState.duration_data.preview.push({ duration: (previewData && previewData.duration) || 0 });
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.phase = 'gameplay';
      syncDOM();
      trackEvent('game_start', { totalRounds: gameState.totalRounds, fromPreview: true });
      if (signalCollector && signalCollector.recordViewEvent) {
        try { signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}
      }
      if (progressBar) { try { progressBar.update(0, gameState.totalLives); } catch (e) {} }
      (async function () {
        await showWelcome();
        await showRoundIntro(1);
        renderRound(1);
      })();
    }

    window.debugGame = function () {
      try { console.log('[debugGame]', JSON.stringify({ phase: gameState.phase, round: gameState.currentRound, score: gameState.score, lives: gameState.lives, attempts: gameState.attempts.length })); } catch (e) {}
    };
    window.debugAudio = function () {
      try { console.log('[debugAudio] canPlayAudio?', FeedbackManager && FeedbackManager.canPlayAudio && FeedbackManager.canPlayAudio()); } catch (e) {}
    };
    window.testAudio = function () {
      try { FeedbackManager.sound.play('correct_sound_effect', { sticker: STICKER_CORRECT }); } catch (e) {}
    };
    window.testPause = function () {
      try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {}
    };
    window.testResume = function () {
      try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {}
    };
    window.loadRound = function (n) {
      if (typeof n === 'number' && n >= 1 && n <= gameState.totalRounds) {
        gameState.currentRound = n - 1;
        renderRound(n);
      }
    };

    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      app.innerHTML =
        '<div class="page-center mathai-layout-root">' +
          '<div class="game-wrapper">' +
            '<div class="game-stack">' +
              '<div id="mathai-progress-slot"></div>' +
              '<div id="gameContent"></div>' +
              '<div id="mathai-transition-slot"></div>' +
              '<div id="mathai-answer-slot"></div>' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    document.addEventListener('DOMContentLoaded', function () {
      window.addEventListener('message', handlePostMessage);

      setTimeout(function () {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;
        var missing = [];
        if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
        if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
        if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
        if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
        if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
        if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
        if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
        if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
        if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
        if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
        if (typeof VoiceInput === 'undefined') missing.push('VoiceInput');
        if (missing.length > 0) {
          var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
          console.error('[' + msg + ']');
          if (typeof Sentry !== 'undefined') Sentry.captureMessage(msg);
          var gc = document.getElementById('gameContent') || document.body;
          if (gc) gc.innerHTML = '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">Game failed to load — please refresh.</div>';
          return;
        }
        if (!document.getElementById('gameContent')) {
          buildFallbackLayout();
        }
        gameState.content = gameState.content || fallbackContent;
        setupGame();
      }, 2000);

      (async function init() {
        try {
          await waitForPackages();
          if (typeof Sentry !== 'undefined') {
            Sentry.addBreadcrumb({ category: 'package-loading', message: 'All packages loaded', level: 'info' });
          }
          await FeedbackManager.init();

          try {
            signalCollector = new SignalCollector({
              gameId: gameState.gameId,
              contentSetId: gameState.contentSetId
            });
            window.signalCollector = signalCollector;
          } catch (e) {
            console.error('[SignalCollector ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try {
            ScreenLayout.inject('app', {
              slots: {
                previewScreen: true,
                transitionScreen: true,
                progressBar: true,
                floatingButton: true,
                answerComponent: true
              }
            });
          } catch (e) {
            console.error('[ScreenLayout.inject failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try {
            var stub = document.createElement('div');
            stub.id = 'timer-container';
            stub.style.display = 'none';
            document.body.appendChild(stub);
            timer = new TimerComponent('timer-container', {
              timerType: 'increase', format: 'min',
              startTime: 0, endTime: 1000000, autoStart: false
            });
          } catch (e) {
            console.error('[TimerComponent ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try {
            visibilityTracker = new VisibilityTracker({
              popupProps: { title: 'Paused', description: 'Tap Resume to continue.', primaryText: 'Resume' },
              onInactive: function () {
                try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {}
                try { if (timer) timer.pause({ fromVisibilityTracker: true }); } catch (e) {}
                try { if (previewScreen) previewScreen.pause(); } catch (e) {}
                if (signalCollector && signalCollector.pause) { try { signalCollector.pause(); } catch (e) {} }
                trackEvent('game_paused', { source: 'visibility' });
              },
              onResume: function () {
                try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {}
                try { if (timer) timer.resume(); } catch (e) {}
                try { if (previewScreen) previewScreen.resume(); } catch (e) {}
                if (signalCollector && signalCollector.resume) { try { signalCollector.resume(); } catch (e) {} }
                trackEvent('game_resumed', { source: 'visibility' });
              }
            });
          } catch (e) {
            console.error('[VisibilityTracker ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          createProgressBar();
          if (progressBar) { try { progressBar.update(0, gameState.totalLives); } catch (e) {} }

          try { transitionScreen = new TransitionScreenComponent({ autoInject: true }); }
          catch (e) {
            console.error('[TransitionScreenComponent ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try { previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' }); }
          catch (e) {
            console.error('[PreviewScreenComponent ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try {
            floatingBtn = new FloatingButtonComponent({ slotId: 'mathai-floating-button-slot' });
            floatingBtn.on('submit', function () { handleSubmit(); });
            floatingBtn.on('next', function () {
              try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
              try { if (answerComponent && answerComponent.destroy) answerComponent.destroy(); } catch (e) {}
              try { if (previewScreen && previewScreen.destroy) previewScreen.destroy(); } catch (e) {}
              try { if (floatingBtn && floatingBtn.destroy) floatingBtn.destroy(); } catch (e) {}
            });
          } catch (e) {
            console.error('[FloatingButtonComponent ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try { answerComponent = new AnswerComponentComponent({ slotId: 'mathai-answer-slot' }); }
          catch (e) {
            console.error('[AnswerComponentComponent ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try {
            await FeedbackManager.sound.preload([
              { id: 'correct_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
              { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
              { id: 'sound_life_lost', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
              { id: 'rounds_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
              { id: 'sound_level_transition', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
              { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
              { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
              { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
              { id: 'tap_sound', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
            ]);
          } catch (e) {
            console.error('[sound.preload]', e && e.message);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

          if (!gameState.content) gameState.content = fallbackContent;
          setupGame();
        } catch (e) {
          console.error('[init] ' + (e && e.message));
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }
      })();

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.nextRound = nextRound;
      window.startGame = startGame;
    });
  </script>
</body>
</html>
