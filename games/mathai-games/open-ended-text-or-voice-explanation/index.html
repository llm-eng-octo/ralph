  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;

      --mathai-primary: #270f36;
      --mathai-level-text: #270F63;
      --mathai-purple: #9B51E0;

      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;

      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;

      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;

      --mathai-success: #2f9e44;
      --mathai-error: #c92a2a;
      --mathai-warning: #f08c00;

      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;

      --mathai-padding-large: 56px 40px;
      --mathai-padding-medium: 16px 24px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      overscroll-behavior: none;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    input, textarea, select {
      -webkit-user-select: text;
      user-select: text;
    }

    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }
    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    button,
    [role="button"] {
      min-height: 44px;
      touch-action: manipulation;
    }

    /* GAME CONTENT */
    #gameContent {
      width: 100%;
      padding: 14px 18px 120px 18px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    /* Scenario paragraphs */
    .fw-scenario {
      width: 100%;
      max-width: 420px;
      margin: 4px auto 0 auto;
      font-size: 16px;
      color: var(--mathai-text-primary);
      line-height: 1.55;
    }
    .fw-scenario p {
      margin: 0 0 14px 0;
    }
    .fw-scenario strong {
      color: var(--mathai-primary);
      font-weight: 700;
    }

    /* Voice input container — gives the CDN component a generous panel area */
    .fw-voice-wrap {
      width: 100%;
      max-width: 420px;
      margin: 18px auto 0 auto;
    }

    #voice-input-area {
      width: 100%;
      min-height: 150px;
    }

    /* Light yellow tint for the wrap area to evoke the screenshot's grey-tinted box; the
       VoiceInput component renders its own textarea + toolbar inside, we just give it
       breathing room. We do not style .vi-* classes directly (per p17 anti-pattern). */
    .fw-voice-wrap .vi-textarea,
    .fw-voice-wrap textarea {
      min-height: 120px !important;
    }

    /* Subtle hint chip above the input */
    .fw-hint {
      width: 100%;
      max-width: 420px;
      margin: 12px auto 0 auto;
      padding: 10px 12px;
      background: var(--mathai-cell-bg-yellow);
      border-left: 3px solid var(--mathai-warning);
      border-radius: var(--mathai-border-radius-card);
      font-size: 14px;
      color: var(--mathai-primary);
      line-height: 1.45;
      animation: fwFadeIn 0.35s ease;
    }
    .fw-hint.hidden { display: none; }

    /* Evaluating spinner */
    .fw-evaluating {
      width: 100%;
      max-width: 420px;
      margin: 12px auto 0 auto;
      padding: 10px 12px;
      background: var(--mathai-light-gray);
      border-radius: var(--mathai-border-radius-card);
      font-size: 14px;
      color: var(--mathai-gray);
      text-align: center;
      animation: fwFadeIn 0.25s ease;
    }
    .fw-evaluating.hidden { display: none; }

    /* Required micro-animations */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes fwFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .shake-wrong { animation: shake 0.5s ease; }
    .fade-in { animation: fwFadeIn 0.35s ease; }

    .selected-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-red);
      color: var(--mathai-red);
    }
    .selected-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-green);
      color: var(--mathai-green);
    }
    .correct-reveal {
      font-size: 15px;
      font-weight: 600;
      color: var(--mathai-green);
      text-align: center;
      margin-top: 8px;
      animation: fwFadeIn 0.35s ease;
    }
    .correct-reveal.hidden { display: none; }

    .mathai-ts-screen.active { z-index: 50; }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white, #ffffff);
        color: var(--mathai-primary, #270f36);
        font-family: var(--mathai-font-family, system-ui, -apple-system, sans-serif);
        font-size: var(--mathai-font-size-subtitle, 18px);
        text-align: center;
        padding: 24px;
      }
    }

    /* ==================== MODULE-SCOPE COMPONENT VARS ==================== */
    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var floatingBtn = null;
    var answerComponent = null;
    var voiceInput = null;

    /* ==================== syncDOM ==================== */
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', String(gameState.score));
      app.setAttribute('data-lives', String(Math.max(0, gameState.lives)));
      app.setAttribute('data-round', String(gameState.currentRound));
    }

    /* ==================== trackEvent ==================== */
    function trackEvent(name, data) {
      var ev = { name: name, ts: Date.now(), data: data || {} };
      gameState.events.push(ev);
      if (signalCollector && signalCollector.recordViewEvent) {
        try { signalCollector.recordViewEvent(name, data || {}); } catch (e) {}
      }
    }

    /* ==================== recordAttempt ==================== */
    function recordAttempt(payload) {
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) : 0,
        input_of_user: payload.input_of_user,
        correct: !!payload.correct,
        round_number: payload.round_number || (gameState.currentRound + 1),
        question_id: payload.question_id,
        correct_answer: payload.correct_answer,
        response_time_ms: payload.response_time_ms || (gameState.roundStartTime ? (Date.now() - gameState.roundStartTime) : 0),
        misconception_tag: payload.misconception_tag || null,
        difficulty_level: payload.difficulty_level || 1,
        is_retry: !!payload.is_retry,
        metadata: payload.metadata || {}
      };
      gameState.attempts.push(attempt);
      if (signalCollector && signalCollector.recordAttempt) {
        try { signalCollector.recordAttempt(attempt); } catch (e) {}
      }
    }

    /* ==================== getStars ====================
       Per concept:
         3★ — answer all rounds with a clearly named strategy on the first attempt
         2★ — answer all rounds, with at least one needing a hint nudge
         1★ — answer all rounds eventually
         0★ — abandon before round 5 (i.e., game-over via lives)
    */
    function getStars() {
      if (gameState.lives <= 0) return 0;
      if (gameState.score < gameState.totalRounds) {
        // Did not complete every round
        return gameState.score >= 1 ? 1 : 0;
      }
      // Completed all rounds:
      if (gameState.firstTryCorrect >= gameState.totalRounds) return 3;
      if (gameState.firstTryCorrect >= Math.ceil(gameState.totalRounds * 0.6)) return 2;
      return 1;
    }

    /* ==================== getRounds + sets ==================== */
    function getAvailableSets(rounds) {
      var seen = {};
      for (var i = 0; i < rounds.length; i++) if (rounds[i].set) seen[rounds[i].set] = true;
      var keys = Object.keys(seen).sort();
      return keys.length > 0 ? keys : ['A'];
    }

    function getRounds() {
      var source = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(source);
      var currentSetId = sets[gameState.setIndex % sets.length];
      var setRounds = source.filter(function (r) { return r.set === currentSetId; });
      if (setRounds.length >= gameState.totalRounds) return setRounds;
      var fbSetRounds = fallbackContent.rounds.filter(function (r) { return r.set === currentSetId; });
      if (fbSetRounds.length >= gameState.totalRounds) return fbSetRounds;
      return fallbackContent.rounds.slice(0, gameState.totalRounds);
    }

    /* ==================== waitForPackages ==================== */
    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof TimerComponent !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined' &&
            typeof VoiceInput !== 'undefined' &&
            typeof MathAIHelpers !== 'undefined' &&
            !!MathAIHelpers.SubjectiveEvaluation;
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var timeoutErr = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            reject(timeoutErr);
            throw new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    /* ==================== safe audio helpers ==================== */
    function safePlaySound(id, options) {
      try {
        return Promise.all([
          FeedbackManager.sound.play(id, options || {}),
          new Promise(function (r) { setTimeout(r, 1500); })
        ]).then(function () {});
      } catch (e) {
        return Promise.resolve();
      }
    }

    function safeDynamic(opts) {
      try {
        return FeedbackManager.playDynamicFeedback(opts);
      } catch (e) {
        return Promise.resolve();
      }
    }

    /* ==================== handlePostMessage ==================== */
    function handlePostMessage(event) {
      var msg = event && event.data;
      if (!msg || typeof msg !== 'object' || !msg.type) return;
      if (msg.type === 'game_init') {
        gameState.phase = 'playing';
        if (msg.data) {
          if (msg.data.content) gameState.content = msg.data.content;
          if (msg.data.signalConfig && signalCollector) {
            try {
              signalCollector.flushUrl = msg.data.signalConfig.flushUrl;
              signalCollector.playId = msg.data.signalConfig.playId;
              signalCollector.gameId = msg.data.signalConfig.gameId;
              signalCollector.sessionId = msg.data.signalConfig.sessionId;
              signalCollector.contentSetId = msg.data.signalConfig.contentSetId;
              signalCollector.studentId = msg.data.signalConfig.studentId;
              if (signalCollector.startFlushing) signalCollector.startFlushing();
            } catch (e) {}
          }
        }
        if (gameState.content) {
          gameState.totalRounds = gameState.content.totalRounds || gameState.totalRounds;
          gameState.totalLives = gameState.content.totalLives || gameState.totalLives;
          gameState.lives = gameState.totalLives;
        }
        syncDOM();
        try { setupGame(); } catch (e) { console.error('[setupGame from game_init]', e && e.message); }
      }
    }

    /* ==================== postGameComplete ==================== */
    function postGameComplete(won) {
      var totalAttempts = gameState.attempts.length;
      var correctAttempts = 0;
      for (var i = 0; i < gameState.attempts.length; i++) if (gameState.attempts[i].correct) correctAttempts++;
      var accuracy = totalAttempts > 0 ? Math.round((correctAttempts / totalAttempts) * 100) : 0;
      var stars = getStars();
      gameState.stars = stars;
      var endTime = Date.now();
      var durationMs = gameState.startTime ? (endTime - gameState.startTime) : 0;
      var payload = {
        type: 'game_complete',
        data: {
          won: !!won,
          metrics: {
            score: gameState.score,
            totalRounds: gameState.totalRounds,
            stars: stars,
            accuracy: accuracy,
            attempts: gameState.attempts.length,
            duration_ms: durationMs,
            duration_data: gameState.duration_data,
            totalLives: gameState.totalLives,
            time: Math.round(durationMs / 1000),
            livesRemaining: Math.max(0, gameState.lives),
            tries: gameState.attempts.length
          },
          completedAt: endTime,
          attempts: gameState.attempts,
          events: gameState.events,
          previewResult: gameState.previewResult || null,
          contentSetId: (gameState.content && gameState.content.contentSetId) || null
        }
      };
      try { window.parent.postMessage(payload, '*'); } catch (e) {}
      try { window.postMessage(payload, '*'); } catch (e) {}
    }

    /* ==================== Round HTML ==================== */
    function buildRoundHTML(roundData) {
      var html = '';
      html += '<div class="fw-scenario fade-in" id="fw-scenario">' + roundData.scenario + '</div>';
      html += '<div class="fw-voice-wrap" id="fw-voice-wrap">';
      html +=   '<div id="voice-input-area"></div>';
      html += '</div>';
      html += '<div class="fw-hint hidden" id="fw-hint"></div>';
      html += '<div class="fw-evaluating hidden" id="fw-evaluating">Thinking…</div>';
      return html;
    }

    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      var roundData = gameState.currentRoundData;
      if (!roundData) {
        gc.innerHTML = '';
        return;
      }
      gc.innerHTML = buildRoundHTML(roundData);
      mountVoiceInput();
    }

    /* ==================== VoiceInput mount / teardown ==================== */
    function destroyVoiceInput() {
      if (voiceInput && voiceInput.destroy) {
        try { voiceInput.destroy(); } catch (e) {}
      }
      voiceInput = null;
    }

    function mountVoiceInput() {
      destroyVoiceInput();
      var container = document.getElementById('voice-input-area');
      if (!container) return;
      try {
        voiceInput = new VoiceInput('voice-input-area', {
          tools: ['mic', 'keyboard', 'reset'],
          defaultTool: 'mic',
          placeholder: 'Type or speak a faster way…'
        });
        voiceInput.on('input_change', function (data) {
          // Mark interaction the moment the textarea has any non-empty content
          var v = (data && data.value) || '';
          if (v && v.trim().length > 0) {
            gameState.hasInteracted = true;
          }
          updateSubmittable();
        });
        voiceInput.on('transcript', function () {
          gameState.hasInteracted = true;
          updateSubmittable();
        });
      } catch (e) {
        console.error('[VoiceInput ctor failed]', e && e.message, e);
        if (typeof Sentry !== 'undefined') Sentry.captureException(e);
      }
    }

    /* ==================== Submittable predicate ==================== */
    function isSubmittable() {
      // Hide while feedback is in flight or game is over
      if (gameState.gameEnded || gameState.isProcessing) return false;
      // Predicate gates on real input + interaction signal:
      //   value-valid (non-empty trimmed text) AND user has interacted this round.
      var v = '';
      if (voiceInput && typeof voiceInput.getValue === 'function') {
        try { v = voiceInput.getValue(); } catch (e) { v = ''; }
      }
      if (typeof v !== 'string') v = '';
      return gameState.hasInteracted && v.trim().length >= 1;
    }

    function updateSubmittable() {
      try { if (floatingBtn) floatingBtn.setSubmittable(isSubmittable()); } catch (e) {}
    }

    /* ==================== Strategy evaluation (LLM-first, keyword fallback) ==================== */
    function keywordEvaluate(userText, roundData) {
      // Generous keyword match — matches the concept's "any phrasing that names the strategy"
      // criterion. Used as a fallback when the LLM helper is unavailable.
      var lc = (userText || '').toLowerCase();
      if (lc.trim().length < 2) return { correct: false, reason: 'empty' };
      var kws = roundData.strategyKeywords || [];
      for (var i = 0; i < kws.length; i++) {
        var k = String(kws[i]).toLowerCase();
        if (k && lc.indexOf(k) !== -1) return { correct: true, reason: 'keyword:' + k };
      }
      return { correct: false, reason: 'no-keyword' };
    }

    function llmAvailable() {
      return typeof MathAIHelpers !== 'undefined'
        && MathAIHelpers
        && MathAIHelpers.SubjectiveEvaluation
        && typeof MathAIHelpers.SubjectiveEvaluation.evaluate === 'function';
    }

    async function validateAnswerLLM(userText, roundData) {
      // Subjective evaluation per PART-015. We avoid optional chaining (mobile rule 25).
      // Case 8: refuse the API round-trip on empty input — keyword fallback handles
      // the "no answer" case more cheaply.
      var trimmed = (userText || '').toString().trim();
      if (trimmed.length < 2) return null;
      try {
        var prompt = 'Question: ' + (roundData.scenario || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim() +
                     '\nStudent answer (typed or spoken): "' + (userText || '') + '"' +
                     '\nRubric: ' + (roundData.rubric || 'Any phrasing that names a faster operation (division, grouping, repeated subtraction, multiplication, subtraction-as-difference) is CORRECT.') +
                     '\nReply with the single word CORRECT or INCORRECT, optionally followed by a brief reason.';
        var result = await MathAIHelpers.SubjectiveEvaluation.evaluate({
          components: [{
            component_id: 'fw_' + (roundData.id || ('r' + (gameState.currentRound + 1))),
            evaluation_prompt: prompt,
            feedback_prompt: 'Based on {{evaluation}}, in ONE short sentence, give an encouraging next step for a Class 5 student.'
          }],
          timeout: 20000
        });
        if (result && result.data && result.data[0]) {
          var c = result.data[0];
          var evalStr = c && c.evaluation ? String(c.evaluation) : '';
          var lc = evalStr.toLowerCase();
          var isCorrect = lc.indexOf('correct') !== -1 && lc.indexOf('incorrect') === -1;
          return {
            correct: isCorrect,
            evaluation: evalStr,
            feedback: (c && c.feedback) ? String(c.feedback) : ''
          };
        }
      } catch (e) {
        console.error('LLM validation error:', e && e.message);
      }
      return null; // signal "fall back"
    }

    /* ==================== Submit handler ==================== */
    async function handleSubmit() {
      if (gameState.gameEnded) return;
      if (gameState.isProcessing) return;
      if (!isSubmittable()) {
        updateSubmittable();
        return;
      }

      gameState.isProcessing = true;

      // Disable VoiceInput defensively per p17-voice-input rule 3.
      try { if (voiceInput) voiceInput.disable(); } catch (e) {}
      var viTa = document.querySelector('.voice-input-wrapper textarea, #voice-input-area textarea');
      if (viTa) { try { viTa.disabled = true; viTa.readOnly = true; viTa.blur(); } catch (e) {} }

      var roundData = gameState.currentRoundData;
      var userText = '';
      if (voiceInput && typeof voiceInput.getValue === 'function') {
        try { userText = voiceInput.getValue() || ''; } catch (e) { userText = ''; }
      }
      userText = String(userText || '').trim();

      // Show "Thinking..." indicator while the LLM evaluates
      var thinking = document.getElementById('fw-evaluating');
      if (thinking) thinking.classList.remove('hidden');

      var evalResult = null;
      if (llmAvailable()) {
        evalResult = await validateAnswerLLM(userText, roundData);
      }
      if (!evalResult) {
        // Fallback — keyword match + rule "two consecutive empty/off-topic count as a heart."
        var kw = keywordEvaluate(userText, roundData);
        evalResult = {
          correct: kw.correct,
          evaluation: kw.correct ? 'Keyword match: ' + kw.reason : 'No strategy keyword detected.',
          feedback: kw.correct
            ? ('Yes — and there is a name for that. It is called ' + roundData.strategy + '.')
            : (roundData.wrongSubtitle || 'Try thinking about a faster operation.')
        };
      }
      if (thinking) thinking.classList.add('hidden');

      var correct = !!evalResult.correct;
      gameState.lastEvalResult = evalResult;
      gameState.correctAnswer = roundData.canonicalAnswer || roundData.strategy || '';

      // Lives mechanic — gentle: a heart ONLY drops after two consecutive non-answers
      // in the SAME round. Correct answers reset the counter.
      var lifeLost = false;
      if (correct) {
        gameState.consecutiveNonAnswersThisRound = 0;
        if (!gameState.attemptedThisRound) {
          gameState.firstTryCorrect += 1;
        }
      } else {
        gameState.consecutiveNonAnswersThisRound += 1;
        if (gameState.consecutiveNonAnswersThisRound >= 2) {
          gameState.lives -= 1;
          lifeLost = true;
          gameState.consecutiveNonAnswersThisRound = 0; // reset so we don't drop two in a row from one more
        }
      }
      gameState.attemptedThisRound = true;

      // Visual feedback on the input
      try {
        if (voiceInput && voiceInput.markCorrect && voiceInput.markWrong) {
          if (correct) voiceInput.markCorrect(); else voiceInput.markWrong();
        }
      } catch (e) {}

      if (correct) gameState.score += 1;
      syncDOM();

      // recordAttempt — all 12 fields per data-contract.
      // validationType: 'llm' is REQUIRED so gauge / analytics can filter LLM-graded
      // rounds (PART-015 + subjective-evaluation eval Case 5).
      recordAttempt({
        round_number: gameState.currentRound + 1,
        question_id: roundData.id,
        input_of_user: userText,
        correct: correct,
        correct_answer: roundData.canonicalAnswer || roundData.strategy || '',
        difficulty_level: roundData.difficulty_level || 1,
        is_retry: false,
        misconception_tag: correct ? null : 'strategy-not-named',
        validationType: evalResult.evaluation && evalResult.evaluation.indexOf('Keyword match') === -1 ? 'llm' : 'heuristic',
        evaluation: evalResult.evaluation || '',
        feedback: evalResult.feedback || '',
        metadata: {
          evaluation: evalResult.evaluation || '',
          aiFeedback: evalResult.feedback || '',
          set: roundData.set,
          stage: roundData.stage || 1,
          lifeLost: lifeLost,
          consecutiveNonAnswers: gameState.consecutiveNonAnswersThisRound,
          inputModeHint: voiceInput && voiceInput.isRecording === false ? 'text-or-voice' : 'voice'
        }
      });

      trackEvent('answer_submitted', { correct: correct, round: gameState.currentRound + 1, lifeLost: lifeLost });

      // Show / hide hint
      var hintHost = document.getElementById('fw-hint');
      if (hintHost) {
        if (correct) {
          hintHost.classList.add('hidden');
        } else {
          hintHost.textContent = (evalResult.feedback || roundData.wrongSubtitle || 'Try a faster operation.');
          hintHost.classList.remove('hidden');
        }
      }

      var isLastRound = (gameState.currentRound + 1 >= gameState.totalRounds);
      var isGameOver = (gameState.lives <= 0);

      // ── Step 1: SFX awaited (~1.5s floor). Even on last life — never skip wrong SFX. ──
      var sfxId = correct ? 'correct_sound_effect' : 'incorrect_sound_effect';
      var sfxSticker = correct ? STICKER_CORRECT : STICKER_INCORRECT;
      try {
        await Promise.all([
          FeedbackManager.sound.play(sfxId, { sticker: sfxSticker }),
          new Promise(function (r) { setTimeout(r, 1500); })
        ]);
      } catch (e) {}

      // ── Step 3: TTS awaited — prefer the LLM-generated feedback when present,
      //   else fall back to the canned per-round TTS. Per PART-015 + subjective-
      //   evaluation Case 7, the AI feedback IS the student-facing audio. The
      //   call is awaited so the round doesn't advance mid-sentence (single-step
      //   submit pattern).
      var llmFeedback = (evalResult.feedback || '').trim();
      var ttsAudio = llmFeedback || (correct
        ? (roundData.successTTS || ('Yes! That is a faster way: ' + roundData.strategy + '.'))
        : (roundData.wrongTTS || ('Think about a faster operation. ' + (roundData.canonicalAnswer || '').replace(/\*\*/g,''))));
      var ttsSubtitle = llmFeedback || (correct
        ? (roundData.successSubtitle || ('Faster way: ' + roundData.strategy + '.'))
        : (roundData.wrongSubtitle || 'Try a faster operation.'));
      try {
        await safeDynamic({
          audio_content: ttsAudio,
          subtitle: ttsSubtitle,
          sticker: sfxSticker
        });
      } catch (e) {}

      // ── Step 4: branch — Game Over / Victory / next round / stay-on-round (off-topic, no life lost) ──
      if (isGameOver) {
        // Out of lives — no progress bump (round NOT passed).
        try { progressBar.update(gameState.progress, 0); } catch (e) {}
        return endGame(false);
      }

      if (!correct) {
        // Stay on the SAME round so the student can rephrase / retry. Re-enable the input.
        gameState.isProcessing = false;
        try { if (voiceInput) voiceInput.enable(); } catch (e) {}
        var ta2 = document.querySelector('.voice-input-wrapper textarea, #voice-input-area textarea');
        if (ta2) { try { ta2.disabled = false; ta2.readOnly = false; } catch (e) {} }
        try { if (voiceInput && voiceInput.clearMark) voiceInput.clearMark(); } catch (e) {}
        // Predicate will need a fresh value-change to re-show Submit.
        gameState.hasInteracted = false;
        updateSubmittable();
        return;
      }

      // Correct — student moved past this round. Bump progress + update bar.
      gameState.progress += 1;
      try { progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}

      if (isLastRound) {
        return endGame(true);
      }

      // Advance to next round
      gameState.currentRound += 1;
      showRoundIntro(gameState.currentRound + 1).then(function () { renderRound(); });
    }

    /* ==================== Round flow ==================== */
    function renderRound() {
      var rounds = getRounds();
      var roundData = rounds[gameState.currentRound % rounds.length];
      gameState.currentRoundData = roundData;
      gameState.hasInteracted = false;
      gameState.attemptedThisRound = false;
      gameState.consecutiveNonAnswersThisRound = 0;
      gameState.roundStartTime = Date.now();
      gameState.correctAnswer = roundData.canonicalAnswer || roundData.strategy || '';

      injectGameHTML();

      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}

      gameState.isProcessing = false;
      gameState.isActive = true;
      gameState.gameEnded = false;
      syncDOM();

      // Defensive — ensure the textarea is enabled and clean for the new round.
      try { if (voiceInput) { voiceInput.clearMark(); voiceInput.clear(); voiceInput.enable(); } } catch (e) {}
      var ta = document.querySelector('.voice-input-wrapper textarea, #voice-input-area textarea');
      if (ta) { try { ta.disabled = false; ta.readOnly = false; } catch (e) {} }

      updateSubmittable();
    }

    async function showRoundIntro(n) {
      // GEN-ROUND-BOUNDARY-STOP — defensive cleanup.
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = 'Round ' + n + ' of ' + gameState.totalRounds;
      var resolved = false;
      var resolveDone = null;
      var safetyTimer = null;
      var done = function () {
        if (!resolved) {
          resolved = true;
          try { transitionScreen.hide(); } catch (e) {}
          if (typeof resolveDone === 'function') resolveDone();
        }
      };
      var promise = new Promise(function (resolve) { resolveDone = resolve; });
      safetyTimer = setTimeout(done, 8000);
      try {
        await transitionScreen.show({
          title: 'Round ' + n + ' of ' + gameState.totalRounds,
          icons: ['🧩'],
          persist: true,
          onMounted: function () {
            (async function () {
              try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND }); } catch (e) {}
              try {
                await safeDynamic({
                  audio_content: ttsText,
                  subtitle: ttsText,
                  sticker: STICKER_ROUND
                });
              } catch (e) {}
              clearTimeout(safetyTimer);
              done();
            })();
          }
        });
      } catch (e) {
        console.error('[showRoundIntro]', e && e.message);
        clearTimeout(safetyTimer);
        done();
      }
      return promise;
    }

    async function presentWelcome() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = "Let's play Faster Way!";
      var resolveDone = null;
      var promise = new Promise(function (resolve) { resolveDone = resolve; });
      try {
        await transitionScreen.show({
          title: 'Welcome!',
          icons: ['👋'],
          persist: true,
          buttons: [{
            text: "Let's go!",
            type: 'primary',
            'data-testid': 'btn-start',
            action: function () {
              try { FeedbackManager.sound.stopAll(); } catch (e) {}
              try { FeedbackManager.stream.stopAll(); } catch (e) {}
              try { transitionScreen.hide(); } catch (e) {}
              if (typeof resolveDone === 'function') resolveDone();
            }
          }],
          onMounted: function () {
            (async function () {
              try { await safePlaySound('sound_level_transition', { sticker: STICKER_LEVEL }); } catch (e) {}
              try {
                await safeDynamic({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_LEVEL });
              } catch (e) {}
            })();
          }
        });
      } catch (e) {
        console.error('[presentWelcome]', e && e.message);
        if (typeof resolveDone === 'function') resolveDone();
      }
      return promise;
    }

    async function showVictory() {
      gameState.phase = 'results';
      gameState.isActive = false;
      syncDOM();
      try { progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var stars = gameState.stars;
      var ttsText = stars === 3
        ? 'Victory! You named a faster way for every round!'
        : 'Great work! You finished all ' + gameState.totalRounds + ' rounds.';
      try {
        await transitionScreen.show({
          title: 'Victory 🎉',
          subtitle: 'You named a faster strategy for ' + gameState.score + ' of ' + gameState.totalRounds + ' rounds.',
          stars: stars,
          buttons: (stars === 3)
            ? [{ text: 'Claim Stars', type: 'primary', action: function () { try { transitionScreen.hide(); } catch (e) {} showStarsCollected(); } }]
            : [
                { text: 'Play Again', type: 'secondary', action: function () { try { transitionScreen.hide(); } catch (e) {} presentMotivation(); } },
                { text: 'Claim Stars', type: 'primary', action: function () { try { transitionScreen.hide(); } catch (e) {} showStarsCollected(); } }
              ],
          persist: true,
          onMounted: function () {
            (async function () {
              try { await safePlaySound('victory_sound_effect', { sticker: STICKER_VICTORY }); } catch (e) {}
              try {
                await safeDynamic({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_VICTORY });
              } catch (e) {}
            })();
          }
        });
      } catch (e) { console.error('[showVictory]', e && e.message); }
    }

    async function showGameOver() {
      gameState.phase = 'game_over';
      gameState.isActive = false;
      syncDOM();
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = 'You named a faster way for ' + gameState.score + ' of ' + gameState.totalRounds + '. Let\'s try again!';
      try {
        await transitionScreen.show({
          title: 'Game Over',
          icons: ['😔'],
          subtitle: 'You ran out of lives!',
          persist: true,
          buttons: [{
            text: 'Try Again', type: 'primary',
            action: function () { try { transitionScreen.hide(); } catch (e) {} presentMotivation(); }
          }],
          onMounted: function () {
            (async function () {
              try { await safePlaySound('game_over_sound_effect', { sticker: STICKER_SAD }); } catch (e) {}
              try {
                await safeDynamic({ audio_content: ttsText, subtitle: 'Try again — take your time.', sticker: STICKER_SAD });
              } catch (e) {}
            })();
          }
        });
      } catch (e) { console.error('[showGameOver]', e && e.message); }
    }

    async function presentMotivation() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = 'Ready to improve your score?';
      try { progressBar.update(0, gameState.totalLives); } catch (e) {}
      try {
        await transitionScreen.show({
          title: 'Ready to improve your score? ⚡',
          persist: true,
          buttons: [{
            text: "I'm ready! 🙌", type: 'primary',
            action: function () {
              try { FeedbackManager.sound.stopAll(); } catch (e) {}
              try { FeedbackManager.stream.stopAll(); } catch (e) {}
              try { transitionScreen.hide(); } catch (e) {}
              restartGame();
            }
          }],
          onMounted: function () {
            (async function () {
              try { await safePlaySound('sound_level_transition', { sticker: STICKER_LEVEL }); } catch (e) {}
              try {
                await safeDynamic({ audio_content: ttsText, subtitle: 'Ready to improve?', sticker: STICKER_LEVEL });
              } catch (e) {}
            })();
          }
        });
      } catch (e) { console.error('[presentMotivation]', e && e.message); }
    }

    async function showStarsCollected() {
      gameState.phase = 'stars_collected';
      syncDOM();
      try {
        await transitionScreen.show({
          title: "Yay!\nStars collected!",
          buttons: [],
          persist: true,
          styles: { title: { whiteSpace: 'pre-line', lineHeight: '1.3' } },
          onMounted: function () {
            (async function () {
              try { await safePlaySound('victory_sound_effect', { sticker: STICKER_VICTORY }); } catch (e) {}
              try {
                window.postMessage({
                  type: 'show_star',
                  data: {
                    count: gameState.stars,
                    variant: 'yellow',
                    score: gameState.stars + '/3'
                  }
                }, '*');
              } catch (e) {}
              setTimeout(showAnswerCarousel, 1500);
            })();
          }
        });
      } catch (e) { console.error('[showStarsCollected]', e && e.message); }
    }

    function renderAnswerSlide(round, container) {
      container.innerHTML = '';
      var label = document.createElement('div');
      label.style.fontSize = '13px';
      label.style.color = 'var(--mathai-gray)';
      label.style.textAlign = 'center';
      label.style.marginBottom = '8px';
      label.textContent = 'Round ' + round.round + ' · ' + (round.strategy || '');
      container.appendChild(label);

      var canonical = document.createElement('div');
      canonical.style.fontSize = '15px';
      canonical.style.color = 'var(--mathai-green)';
      canonical.style.fontWeight = '600';
      canonical.style.textAlign = 'center';
      canonical.style.padding = '10px 12px';
      canonical.style.background = 'var(--mathai-cell-bg-green)';
      canonical.style.borderRadius = '8px';
      canonical.style.marginBottom = '10px';
      canonical.style.lineHeight = '1.45';
      // Render the canonical answer with **bold** markers stripped to plain text
      var raw = (round.canonicalAnswer || '').replace(/\*\*/g, '');
      canonical.textContent = raw;
      container.appendChild(canonical);

      var help = document.createElement('div');
      help.style.fontSize = '12px';
      help.style.color = 'var(--mathai-gray)';
      help.style.textAlign = 'center';
      help.style.lineHeight = '1.4';
      help.textContent = 'Faster way: ' + (round.strategy || '');
      container.appendChild(help);
    }

    function showAnswerCarousel() {
      var rounds = getRounds();
      var slides = rounds.map(function (round) {
        return { render: function (container) { renderAnswerSlide(round, container); } };
      });
      try { answerComponent.show({ slides: slides }); } catch (e) { console.error('[answerComponent.show]', e && e.message); }
      try { floatingBtn.setMode('next'); } catch (e) {}
    }

    function endGame(won) {
      if (gameState.gameEnded) return;
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.phase = won ? 'victory' : 'game_over';
      syncDOM();
      gameState.stars = getStars();
      trackEvent('game_end', { won: !!won, score: gameState.score, stars: gameState.stars });
      try { postGameComplete(won); } catch (e) { console.error('[postGameComplete]', e && e.message); }
      if (won) showVictory(); else showGameOver();
    }
    window.endGame = endGame;

    function restartGame() {
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
      gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      try { if (answerComponent && answerComponent.destroy) answerComponent.destroy(); } catch (e) {}
      // Inline reset of all mutable fields (GEN-RESTART-RESET).
      gameState.phase = 'gameplay';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.gameEnded = false;
      gameState.isProcessing = false;
      gameState.hasInteracted = false;
      gameState.attemptedThisRound = false;
      gameState.consecutiveNonAnswersThisRound = 0;
      gameState.firstTryCorrect = 0;
      gameState.progress = 0;
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.currentRoundData = null;
      gameState.stars = 0;
      gameState.lastEvalResult = null;
      gameState.duration_data = { startTime: new Date().toISOString(), preview: gameState.duration_data.preview || [] };
      try { if (signalCollector && signalCollector.reset) signalCollector.reset(); } catch (e) {}
      try { progressBar.update(0, gameState.totalLives); } catch (e) {}
      // re-instantiate answerComponent for the next session
      try { answerComponent = new AnswerComponentComponent({ slotId: 'mathai-answer-slot' }); } catch (e) {}
      trackEvent('game_start', { totalRounds: gameState.totalRounds, restart: true });
      syncDOM();
      showRoundIntro(1).then(function () { renderRound(); });
    }
    window.restartGame = restartGame;

    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = Date.now();
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.lives = gameState.totalLives;
      gameState.progress = 0;
      gameState.firstTryCorrect = 0;
      gameState.consecutiveNonAnswersThisRound = 0;
      gameState.attemptedThisRound = false;
      gameState.phase = 'gameplay';
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();
      try { progressBar.update(0, gameState.totalLives); } catch (e) {}
      showRoundIntro(1).then(function () { renderRound(); });
    }
    window.startGame = startGame;

    function nextRound() {
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      if (gameState.currentRound + 1 < gameState.totalRounds) {
        gameState.currentRound++;
        showRoundIntro(gameState.currentRound + 1).then(function () { renderRound(); });
      }
    }
    window.nextRound = nextRound;

    window.loadRound = function (n) {
      if (typeof n === 'number' && n >= 1 && n <= gameState.totalRounds) {
        gameState.currentRound = n - 1;
        gameState.gameEnded = false;
        gameState.isProcessing = false;
        renderRound();
      }
    };

    function setupGame() {
      var content = gameState.content || fallbackContent;
      injectGameHTML();
      try {
        previewScreen.show({
          instruction: content.previewInstruction || fallbackContent.previewInstruction,
          audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
          showGameOnPreview: content.showGameOnPreview === true,
          onComplete: function (previewData) { startGameAfterPreview(previewData); }
        });
      } catch (e) { console.error('[previewScreen.show]', e && e.message); }
    }

    function startGameAfterPreview(previewData) {
      gameState.previewResult = previewData || null;
      gameState.duration_data.preview = gameState.duration_data.preview || [];
      if (previewData && typeof previewData.duration === 'number') {
        gameState.duration_data.preview.push({ duration: previewData.duration });
      }
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      if (signalCollector && signalCollector.recordViewEvent) {
        try { signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}
      }
      gameState.phase = 'gameplay';
      syncDOM();
      try { progressBar.update(0, gameState.totalLives); } catch (e) {}
      presentWelcome().then(function () {
        return showRoundIntro(1);
      }).then(function () { renderRound(); });
    }

    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      app.innerHTML =
        '<div id="mathai-preview-slot">' +
          '<div class="mathai-preview-body">' +
            '<div id="mathai-progress-slot"></div>' +
            '<div class="game-stack">' +
              '<div id="mathai-transition-slot"></div>' +
              '<div id="gameContent"></div>' +
              '<div id="mathai-answer-slot"></div>' +
            '</div>' +
            '<div id="mathai-floating-button-slot"></div>' +
          '</div>' +
        '</div>';
    }

    document.addEventListener('DOMContentLoaded', function () {
      (async function () {
        try {
          await waitForPackages();

          try { await FeedbackManager.init(); } catch (e) { console.error('[FeedbackManager.init]', e && e.message); }

          try {
            signalCollector = new SignalCollector({ gameId: 'open-ended-text-or-voice-explanation' });
            window.signalCollector = signalCollector;
          } catch (e) {
            console.error('[SignalCollector ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try {
            ScreenLayout.inject('app', {
              slots: {
                previewScreen: true,
                progressBar: true,
                transitionScreen: true,
                floatingButton: true,
                answerComponent: true
              }
            });
          } catch (e) { console.error('[ScreenLayout.inject]', e && e.message, e); }

          try {
            visibilityTracker = new VisibilityTracker({
              popupProps: {},
              onInactive: function () {
                try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {}
                try { if (previewScreen) previewScreen.pause(); } catch (e) {}
                try { if (voiceInput) voiceInput.disable(); } catch (e) {}
              },
              onResume: function () {
                try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {}
                try { if (previewScreen) previewScreen.resume(); } catch (e) {}
                try { if (voiceInput) voiceInput.enable(); } catch (e) {}
              }
            });
          } catch (e) {
            console.error('[VisibilityTracker ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try {
            progressBar = new ProgressBarComponent({
              slotId: 'mathai-progress-slot',
              totalRounds: gameState.totalRounds,
              totalLives: gameState.totalLives
            });
          } catch (e) {
            console.error('[ProgressBarComponent ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try {
            transitionScreen = new TransitionScreenComponent({ slotId: 'mathai-transition-slot' });
          } catch (e) {
            console.error('[TransitionScreenComponent ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try {
            previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' });
          } catch (e) {
            console.error('[PreviewScreenComponent ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try {
            floatingBtn = new FloatingButtonComponent({ slotId: 'mathai-floating-button-slot' });
            floatingBtn.setMode('hidden');
            floatingBtn.setSubmittable(false);
            floatingBtn.on('submit', function () { handleSubmit(); });
            floatingBtn.on('next', function () {
              try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
              try { window.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
              try { if (answerComponent) answerComponent.destroy(); } catch (e) {}
              try { if (previewScreen) previewScreen.destroy(); } catch (e) {}
              try { destroyVoiceInput(); } catch (e) {}
              try { if (floatingBtn) floatingBtn.destroy(); } catch (e) {}
            });
          } catch (e) {
            console.error('[FloatingButtonComponent ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try {
            answerComponent = new AnswerComponentComponent({ slotId: 'mathai-answer-slot' });
          } catch (e) {
            console.error('[AnswerComponentComponent ctor failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          }

          try {
            await FeedbackManager.sound.preload([
              { id: 'correct_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
              { id: 'incorrect_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
              { id: 'rounds_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
              { id: 'victory_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
              { id: 'game_over_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
              { id: 'sound_level_transition',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' }
            ]);
          } catch (e) { console.error('[FeedbackManager.sound.preload]', e && e.message); }

          window.addEventListener('message', handlePostMessage);
          try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
        } catch (e) {
          console.error('[init] ' + (e && e.message), e);
        }

        window.gameState = gameState;
        window.endGame = endGame;
        window.restartGame = restartGame;
        window.nextRound = nextRound;
        window.startGame = startGame;
      })();

      // Standalone fallback — runs independently of waitForPackages.
      setTimeout(function () {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;

        var missing = [];
        if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
        if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
        if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
        if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
        if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
        if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
        if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
        if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
        if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
        if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
        if (typeof VoiceInput === 'undefined') missing.push('VoiceInput');

        if (missing.length > 0) {
          var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
          console.error('[' + msg + ']');
          if (typeof Sentry !== 'undefined') Sentry.captureMessage(msg);
          var gc0 = document.getElementById('gameContent') || document.body;
          gc0.innerHTML =
            '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">Game failed to load — please refresh.</div>';
          return;
        }

        if (!document.getElementById('gameContent')) buildFallbackLayout();
        gameState.content = fallbackContent;
        gameState.totalRounds = fallbackContent.rounds.filter(function (r) { return r.set === 'A'; }).length || fallbackContent.totalRounds;
        try { setupGame(); } catch (e) { console.error('[setupGame fallback]', e && e.message); }
      }, 2000);
    });
  </script>
</body>
</html>
