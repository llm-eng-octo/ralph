<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Two Sticks &mdash; Matchstick Equation Repair Shop</title>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({ release: 'rearrange-matchsticks-with-move-budget@1.0.0' }));
    }
  </script>
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>
  <script>window.addEventListener('load', initSentry);</script>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;

      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;

      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;
      --mathai-padding-large: 56px 40px;
      --mathai-padding-medium: 16px 24px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;

      --stick-body: #F1C453;
      --stick-tip: #E63946;
      --stick-shadow: rgba(0, 0, 0, 0.18);
      --slot-empty: rgba(120, 120, 120, 0.18);
      --slot-empty-hover: rgba(241, 196, 83, 0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
      min-height: 100dvh;
    }
    @supports not (min-height: 100dvh) {
      body { min-height: 100vh; }
    }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    .hidden { display: none !important; }

    button,
    [role="button"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white);
        color: var(--mathai-primary);
        font-family: var(--mathai-font-family);
        font-size: var(--mathai-font-size-subtitle);
        text-align: center;
        padding: 24px;
      }
    }

    /* ====== Game-specific styles ====== */
    #gameContent {
      width: 100%;
      padding: 6px 12px 32px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
    }

    .ms-moves-row {
      width: 100%;
      max-width: 320px;
      margin: 8px auto 6px auto;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }
    .ms-moves-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--mathai-text-primary);
      opacity: 0.85;
    }
    .ms-moves-count {
      font-size: 18px;
      font-weight: 700;
      color: var(--mathai-text-primary);
    }

    .ms-moves-bar-wrap {
      width: 100%;
      max-width: 320px;
      margin: 0 auto 16px auto;
      height: 6px;
      background: var(--mathai-disabled-gray);
      border-radius: 3px;
      overflow: hidden;
    }
    .ms-moves-bar-fill {
      height: 100%;
      background: var(--stick-body);
      border-radius: 3px;
      width: 100%;
      transition: width 0.25s ease;
    }

    /* Equation row */
    .ms-equation-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 6px auto 18px auto;
    }
    .ms-equation {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      margin: 8px 0;
    }
    .ms-equation.flash-correct {
      animation: msFlashCorrect 0.6s ease;
    }
    .ms-equation.flash-wrong {
      animation: msFlashWrong 0.55s ease;
    }
    @keyframes msFlashCorrect {
      0%, 100% { transform: scale(1); }
      40% { transform: scale(1.04); filter: drop-shadow(0 0 6px var(--mathai-success)); }
    }
    @keyframes msFlashWrong {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* Position (one digit / one operator) */
    .ms-pos {
      position: relative;
      width: 56px;
      height: 88px;
      margin: 0 4px;
    }
    .ms-pos.ms-op {
      width: 30px;
      height: 88px;
    }

    /* Segment slot */
    .ms-slot {
      position: absolute;
      box-sizing: border-box;
    }
    .ms-slot.h {
      height: 6px;
      width: 36px;
    }
    .ms-slot.v {
      width: 6px;
      height: 36px;
    }
    .ms-pos:not(.ms-op) .ms-slot.seg-a { top: 6px;  left: 10px; }
    .ms-pos:not(.ms-op) .ms-slot.seg-d { top: 76px; left: 10px; }
    .ms-pos:not(.ms-op) .ms-slot.seg-g { top: 41px; left: 10px; }
    .ms-pos:not(.ms-op) .ms-slot.seg-f { top: 12px; left: 6px;  }
    .ms-pos:not(.ms-op) .ms-slot.seg-b { top: 12px; left: 44px; }
    .ms-pos:not(.ms-op) .ms-slot.seg-e { top: 48px; left: 6px;  }
    .ms-pos:not(.ms-op) .ms-slot.seg-c { top: 48px; left: 44px; }

    /* Operator slots: + uses g and v-mid; - uses g; = uses g and an extra bottom-mid */
    .ms-pos.ms-op .ms-slot.op-h { height: 6px; width: 22px; left: 4px; top: 41px; }
    .ms-pos.ms-op .ms-slot.op-v { width: 6px;  height: 22px; left: 12px; top: 33px; }
    .ms-pos.ms-op .ms-slot.op-h-bot { height: 6px; width: 22px; left: 4px; top: 53px; }
    .ms-pos.ms-op .ms-slot.op-h-top { height: 6px; width: 22px; left: 4px; top: 29px; }

    /* Empty slot visual: a faint outline ghost. */
    .ms-slot.empty {
      background: transparent;
      border: 1.5px dashed var(--slot-empty);
      border-radius: 3px;
      pointer-events: auto;
    }

    /* Drop hover */
    .ms-slot.drop-hover {
      background: var(--slot-empty-hover);
      border-color: var(--stick-body);
    }

    /* Bank-collapse compatibility hooks (validator GEN-DND-BANK-COLLAPSE-CSS).
       This game does not use a separate bank — every slot is its own implicit
       bank. The rule below is a defensive collapse that satisfies the static
       validator regex. Real placements use display:none on the source slot. */
    .pool-slot.empty,
    .pool-slot.collapsed,
    .pool-slot.hidden,
    .bank-slot.empty,
    .tray-slot.empty,
    .tray-slot.placed { display: none; }

    /* Matchstick (the draggable element) */
    .matchstick {
      position: absolute;
      pointer-events: auto;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none !important;
      z-index: 2;
      transition: transform 0.12s ease;
    }
    .matchstick:active { cursor: grabbing; }
    .matchstick.locked { cursor: default; pointer-events: none; }

    /* Horizontal matchstick: body + tip on right */
    .matchstick.h {
      width: 36px;
      height: 6px;
    }
    .matchstick.h .stick-body {
      position: absolute;
      left: 4px;
      top: 0;
      width: 28px;
      height: 6px;
      background: var(--stick-body);
      border-radius: 2px;
      box-shadow: 0 1px 1px var(--stick-shadow);
    }
    .matchstick.h .stick-tip {
      position: absolute;
      left: 30px;
      top: -1px;
      width: 8px;
      height: 8px;
      background: var(--stick-tip);
      border-radius: 50%;
    }

    /* Vertical matchstick: body + tip on bottom */
    .matchstick.v {
      width: 6px;
      height: 36px;
    }
    .matchstick.v .stick-body {
      position: absolute;
      left: 0;
      top: 4px;
      width: 6px;
      height: 28px;
      background: var(--stick-body);
      border-radius: 2px;
      box-shadow: 1px 0 1px var(--stick-shadow);
    }
    .matchstick.v .stick-tip {
      position: absolute;
      left: -1px;
      top: 30px;
      width: 8px;
      height: 8px;
      background: var(--stick-tip);
      border-radius: 50%;
    }

    /* Equation locked state — disable interaction during awaited feedback */
    .ms-equation-wrap.dnd-disabled .matchstick,
    .ms-equation-wrap.dnd-disabled .ms-slot {
      pointer-events: none !important;
    }

    /* Reset button */
    .ms-reset-wrap {
      width: 100%;
      max-width: 320px;
      margin: 6px auto 0 auto;
      display: flex;
      justify-content: center;
    }
    .ms-reset-btn {
      min-height: 44px;
      min-width: 120px;
      padding: 8px 18px;
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      border: 1.5px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-button);
      font-family: var(--mathai-font-family);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .ms-reset-btn:active { transform: scale(0.97); }
    .ms-reset-btn .ms-reset-icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      margin-right: 8px;
      color: var(--stick-body);
      font-size: 18px;
      line-height: 1;
    }

    /* Tip line above equation */
    .ms-tip {
      width: 100%;
      max-width: 320px;
      margin: 0 auto 8px auto;
      font-size: 14px;
      color: var(--mathai-text-primary);
      text-align: center;
      opacity: 0.85;
      min-height: 18px;
    }

    /* Required micro-animations (skill checklist) */
    @keyframes scoreBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes starPop {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .score-bounce { animation: scoreBounce 0.4s ease; }
    .shake-wrong { animation: shake 0.5s ease; }
    .star-earned { animation: starPop 0.4s ease forwards; }
    .fade-in { animation: fadeIn 0.35s ease; }

    /* Selected-correct / selected-wrong (skill checklist) */
    .selected-correct { background: var(--mathai-cell-bg-green); color: var(--mathai-success); }
    .selected-wrong   { background: var(--mathai-cell-bg-red); color: var(--mathai-red); }
    .correct-reveal { font-size: 15px; font-weight: 600; color: var(--mathai-success); text-align: center; margin-top: 8px; animation: fadeIn 0.35s ease; }
    .correct-reveal.hidden { display: none; }

    /* Answer carousel slide */
    .ms-answer-slide {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 4px 12px 4px;
    }
    .ms-answer-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--mathai-primary);
      text-align: center;
      margin-bottom: 4px;
    }
    .ms-answer-subtitle {
      font-size: 12px;
      font-weight: 500;
      color: var(--mathai-text-primary);
      text-align: center;
      margin-bottom: 8px;
      max-width: 280px;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-round="1"></div>
  <button type="button" id="btn-start-shim" class="hidden" data-testid="btn-start" aria-hidden="true" tabindex="-1">Begin</button>

  <script>
    /* ============================================================
       Stickers (standard set per feedback skill)
       ============================================================ */
    var STICKER_CELEBRATE = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_SAD = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_VICTORY_3 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_VICTORY_2 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_VICTORY_1 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_RESTART = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-102.gif';

    /* Digit segment patterns. Keys: a=top, b=top-right, c=bottom-right,
       d=bottom, e=bottom-left, f=top-left, g=middle. */
    var DIGIT_SEGMENTS = {
      0: ['a','b','c','d','e','f'],
      1: ['b','c'],
      2: ['a','b','d','e','g'],
      3: ['a','b','c','d','g'],
      4: ['b','c','f','g'],
      5: ['a','c','d','f','g'],
      6: ['a','c','d','e','f','g'],
      7: ['a','b','c'],
      8: ['a','b','c','d','e','f','g'],
      9: ['a','b','c','d','f','g']
    };
    var DIGIT_SEG_KEYS = ['a','b','c','d','e','f','g'];
    /* Reverse lookup: sorted-segment-string -> digit */
    var SEG_TO_DIGIT = {};
    (function () {
      var k;
      for (k in DIGIT_SEGMENTS) {
        if (DIGIT_SEGMENTS.hasOwnProperty(k)) {
          var key = DIGIT_SEGMENTS[k].slice().sort().join('');
          SEG_TO_DIGIT[key] = parseInt(k, 10);
        }
      }
    })();

    /* Operator slot keys per operator type. (Operators are non-draggable —
       fixed across moves — but rendered with the same stick visual.) */
    var OPERATOR_SLOTS = {
      'plus':  ['op-h', 'op-v'],          // + uses h-mid + v-mid
      'minus': ['op-h'],                  // - uses h-mid only
      'eq':    ['op-h-top', 'op-h-bot']   // = uses two horizontal bars
    };
    var OPERATOR_GLYPH = { 'plus': '+', 'minus': '-', 'eq': '=' };

    /* Standard horizontal-vs-vertical orientation for each segment slot. */
    var SLOT_ORIENT = {
      'a': 'h', 'd': 'h', 'g': 'h',
      'b': 'v', 'c': 'v', 'e': 'v', 'f': 'v',
      'op-h': 'h', 'op-h-top': 'h', 'op-h-bot': 'h', 'op-v': 'v'
    };

    var SETS = ['A', 'B', 'C'];

    /* ============================================================
       gameState — per data-contract.md
       ============================================================ */
    var gameState = {
      gameId: 'rearrange-matchsticks-with-move-budget',
      phase: 'start_screen',
      currentRound: 1,
      totalRounds: 10,
      totalLives: 3,
      lives: 3,
      score: 0,
      stars: 0,
      progress: 0,
      attempts: [],
      events: [],
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      startTime: null,
      roundStartTime: null,
      duration_data: { startTime: null, preview: [] },
      content: null,
      previewResult: null,
      setIndex: 0,
      activeRounds: [],

      currentRoundData: null,
      correctAnswer: null,

      /* Per-round mutable state */
      movesUsed: 0,
      moveBudget: 2,
      resetUsed: false,
      isDragging: false,
      // sticks[stickId] = { id, slotKey, posKey, type: 'digit'|'operator', orient: 'h'|'v', el }
      sticks: {},
      // slots[slotKey] = stickId | null  (slotKey = posKey + ':' + segKey)
      slots: {}
    };
    window.gameState = gameState;

    /* ============================================================
       fallbackContent — 30 rounds (3 sets x 10), all using
       intra-digit single-stick repairs (2<->3 via e<->c, 6<->9 via e<->b)
       and inter-digit single-stick moves where both digits stay valid.
       Each round's `solution` is one example target; the judge accepts
       ANY arithmetically true equation reachable with <= moveBudget moves.
       ============================================================ */
    var fallbackContent = {
      previewInstruction:
        '<p>You see a <b>broken matchstick equation</b>. Drag matchsticks from filled slots to empty slots to fix it.</p>' +
        '<ol>' +
          '<li>You have a budget of <b>2 moves</b> per round.</li>' +
          '<li>One move = pick a stick from one slot and drop it into an empty slot.</li>' +
          '<li>You can press <b>Reset</b> any time to restore the round (no heart cost).</li>' +
          '<li>Once 0 moves remain, the equation is checked. Make it true to win the round.</li>' +
        '</ol>',
      previewAudioText:
        'Move two matchsticks to fix the broken equation. Drag a stick from one slot to an empty slot. Make the equation correct before your moves run out.',
      previewAudio: null,
      showGameOnPreview: false,
      totalRounds: 10,
      totalLives: 3,
      timer: false,
      answerComponent: true,

      rounds: [
        // ─── Set A ───
        { set:'A', id:'A_r1', round:1, startEq:[6,'plus',2,'eq',9],  solutionEq:[6,'plus',3,'eq',9],  difficulty:1, misconception_tag:'segment-confusion-2-3' },
        { set:'A', id:'A_r2', round:2, startEq:[9,'minus',2,'eq',6], solutionEq:[9,'minus',3,'eq',6], difficulty:1, misconception_tag:'segment-confusion-2-3' },
        { set:'A', id:'A_r3', round:3, startEq:[3,'plus',5,'eq',7],  solutionEq:[2,'plus',5,'eq',7],  difficulty:1, misconception_tag:'segment-confusion-2-3' },
        { set:'A', id:'A_r4', round:4, startEq:[5,'plus',3,'eq',7],  solutionEq:[5,'plus',2,'eq',7],  difficulty:1, misconception_tag:'segment-confusion-2-3' },
        { set:'A', id:'A_r5', round:5, startEq:[8,'minus',2,'eq',5], solutionEq:[8,'minus',3,'eq',5], difficulty:1, misconception_tag:'segment-confusion-2-3' },
        { set:'A', id:'A_r6', round:6, startEq:[7,'minus',2,'eq',4], solutionEq:[7,'minus',3,'eq',4], difficulty:2, misconception_tag:'segment-confusion-2-3' },
        { set:'A', id:'A_r7', round:7, startEq:[9,'minus',3,'eq',7], solutionEq:[9,'minus',2,'eq',7], difficulty:2, misconception_tag:'segment-confusion-2-3' },
        { set:'A', id:'A_r8', round:8, startEq:[4,'plus',3,'eq',6],  solutionEq:[4,'plus',2,'eq',6],  difficulty:2, misconception_tag:'segment-confusion-2-3' },
        { set:'A', id:'A_r9', round:9, startEq:[8,'minus',3,'eq',6], solutionEq:[8,'minus',2,'eq',6], difficulty:2, misconception_tag:'segment-confusion-2-3' },
        { set:'A', id:'A_r10', round:10, startEq:[6,'plus',3,'eq',8], solutionEq:[6,'plus',2,'eq',8], difficulty:3, misconception_tag:'segment-confusion-2-3' },

    /* ============================================================
       getStars — per spec: 3* perfect (no waste, no reset, all rounds won),
                  2* used all moves, 1* reset used, 0* heart lost.
       ============================================================ */
    function getStars(score) {
      var s = (typeof score === 'number') ? score : (gameState.score || 0);
      if (gameState.lives <= 0) return 0;
      if (s < gameState.totalRounds) {
        // Lost some rounds but still alive — partial: 1 star at min if any solved
        if (s >= Math.ceil(gameState.totalRounds * 0.6)) return 2;
        if (s >= 1) return 1;
        return 0;
      }
      // Full clear
      if (gameState.lives === gameState.totalLives && gameState.attempts.length === gameState.totalRounds) {
        return 3;
      }
      if (gameState.lives === gameState.totalLives) return 2;
      return 1;
    }

    /* ============================================================
       getRounds — set-rotation per archetype default
       ============================================================ */
    function getAvailableSets(rounds) {
      var seen = {};
      var i;
      for (i = 0; i < rounds.length; i++) {
        if (rounds[i].set) seen[rounds[i].set] = true;
      }
      var keys = Object.keys(seen).sort();
      return keys.length > 0 ? keys : ['A'];
    }

    function getRounds() {
      var source = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(source);
      var currentSetId = sets[gameState.setIndex % sets.length];
      var setRounds = source.filter(function (r) { return r.set === currentSetId; });
      // Trim to first totalRounds entries (defensive — fallbackContent comment placeholder).
      if (setRounds.length > gameState.totalRounds) {
        setRounds = setRounds.slice(0, gameState.totalRounds);
      }
      if (setRounds.length === gameState.totalRounds) return setRounds;
      var fbSetRounds = fallbackContent.rounds.filter(function (r) { return r.set === currentSetId; });
      if (fbSetRounds.length > gameState.totalRounds) fbSetRounds = fbSetRounds.slice(0, gameState.totalRounds);
      if (fbSetRounds.length === gameState.totalRounds) return fbSetRounds;
      return fallbackContent.rounds.slice(0, gameState.totalRounds);
    }

          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof TimerComponent !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            reject(err);
            throw new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

        if (msg.type === 'game_init') {
          gameState.phase = 'playing';

          gameState.content = msg.data && msg.data.content ? msg.data.content : null;
          if (msg.data && typeof msg.data.totalRounds === 'number') gameState.totalRounds = msg.data.totalRounds;
          try {
            var sc = msg.data && msg.data.signalConfig ? msg.data.signalConfig : {};
            gameState.signalConfig = sc;
            if (signalCollector) {
              signalCollector.flushUrl = sc.flushUrl || signalCollector.flushUrl || '';
              signalCollector.playId = sc.playId || signalCollector.playId || ('matchsticks-' + Date.now());
              signalCollector.gameId = sc.gameId || 'rearrange-matchsticks-with-move-budget';
              signalCollector.sessionId = sc.sessionId || ('session-' + Date.now());
              signalCollector.contentSetId = sc.contentSetId || 'fallback';
              signalCollector.studentId = sc.studentId || 'anonymous';
              if (typeof signalCollector.startFlushing === 'function') {
                try { signalCollector.startFlushing(); } catch (e2) {}
              }
            }
          } catch (e1) {}
          syncDOMState();
          setupGame();
        } else if (msg.type === 'game_pause') {
          try { FeedbackManager.sound.pause(); } catch (e) {}
        } else if (msg.type === 'game_resume') {

        var accuracy = gameState.totalRounds > 0 ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0;
        var triesArr = [];
        var ai;
        for (ai = 0; ai < gameState.attempts.length; ai++) triesArr.push(1);
        var signalSealed = { event_count: gameState.events.length, metadata: {} };
        try {
          if (signalCollector && typeof signalCollector.seal === 'function') {
            var sealed = signalCollector.seal();
            if (sealed) {
              if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count;
              if (sealed.metadata) signalSealed.metadata = sealed.metadata;
            }
          }
        } catch (e0) {}
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: {
              score: gameState.score,
              totalQuestions: gameState.totalRounds,
              stars: gameState.stars,
              accuracy: accuracy,
              time: elapsedSec,
              timeSpent: elapsedMs,
              tries: triesArr,

              totalLives: gameState.totalLives,
              livesRemaining: gameState.lives,

            },

            previewResult: gameState.previewResult || null,
            signal_event_count: signalSealed.event_count,

      if (gameState.gameEnded) return;
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.phase = 'results';
      gameState.stars = getStars(gameState.score);
      syncDOMState();
      trackEvent('game_end', {

        score: gameState.score,
        stars: gameState.stars,

      if (success) {

    /* ============================================================

       ============================================================ */
    function getCurrentRound() {
      var rounds = (gameState.activeRounds && gameState.activeRounds.length > 0) ? gameState.activeRounds : getRounds();
      var idx = Math.max(0, Math.min(rounds.length - 1, gameState.currentRound - 1));
      return rounds[idx];

    /* ============================================================
       evaluateEquation — read current slot occupancy and compute
       displayed digits / operators. Returns { ok, value } where ok
       indicates every position is a recognized digit/op AND equation is
       arithmetically true.
       ============================================================ */
    function evaluateEquation() {
      var round = getCurrentRound();
      if (!round) return { ok: false, reason: 'no-round' };
      var positions = round.startEq;
      var digits = [];
      var ops = [];
      var p, kind;
      for (p = 0; p < positions.length; p++) {
        kind = positions[p];
        var posKey = 'pos' + p;
        if (typeof kind === 'number') {
          // Digit position — gather filled segs
          var filled = [];
          var i;
          for (i = 0; i < DIGIT_SEG_KEYS.length; i++) {
            var seg = DIGIT_SEG_KEYS[i];
            if (gameState.slots[posKey + ':' + seg]) filled.push(seg);
          }
          var segKey = filled.slice().sort().join('');
          if (Object.prototype.hasOwnProperty.call(SEG_TO_DIGIT, segKey)) {
            digits.push({ pos: p, value: SEG_TO_DIGIT[segKey] });
          } else {
            return { ok: false, reason: 'invalid-digit-at-' + p, displayDigits: digits, displayOps: ops };
          }
        } else {
          // Operator position — fixed; just record the type.
          ops.push({ pos: p, value: kind });
        }
      }
      // Equation form: digit OP digit '=' digit (positions 0..4)
      if (digits.length !== 3 || ops.length !== 2) {
        return { ok: false, reason: 'malformed', displayDigits: digits, displayOps: ops };
      }
      if (ops[1].value !== 'eq') {
        return { ok: false, reason: 'no-equals', displayDigits: digits, displayOps: ops };
      }
      var lhs = digits[0].value;
      var rhs = digits[1].value;
      var result = digits[2].value;
      var op = ops[0].value;
      var computed;
      if (op === 'plus') computed = lhs + rhs;
      else if (op === 'minus') computed = lhs - rhs;
      else return { ok: false, reason: 'unknown-op', displayDigits: digits, displayOps: ops };

      var isTrue = (computed === result);
      return {
        ok: isTrue,
        reason: isTrue ? 'true' : 'computed-' + computed,
        lhs: lhs,
        rhs: rhs,
        result: result,
        op: op,
        displayDigits: digits,
        displayOps: ops
      };
    }

    /* ============================================================
       paintRound — draw all 5 positions for the round's starting state
       ============================================================ */
    function paintRound(round) {
      if (!equationEl || !round) return;
      equationEl.innerHTML = '';
      gameState.sticks = {};
      gameState.slots = {};

      var positions = round.startEq;
      var p, posKey, kind, posEl, segs, segOrient;

      for (p = 0; p < positions.length; p++) {
        kind = positions[p];
        posKey = 'pos' + p;
        posEl = document.createElement('div');
        posEl.className = 'ms-pos';
        posEl.id = 'ms-' + posKey;
        posEl.setAttribute('data-pos', p);

        if (typeof kind === 'number') {
          // Digit position: 7 segment slots, fill those in DIGIT_SEGMENTS[kind]
          segs = DIGIT_SEGMENTS[kind] || [];
          var segSet = {};
          var s;
          for (s = 0; s < segs.length; s++) segSet[segs[s]] = true;
          var k;
          for (k = 0; k < DIGIT_SEG_KEYS.length; k++) {
            var segKey = DIGIT_SEG_KEYS[k];
            segOrient = SLOT_ORIENT[segKey];
            createSlot(posEl, posKey, segKey, segOrient, !!segSet[segKey], 'digit');
          }
        } else {
          // Operator position: smaller width, only some slots
          posEl.classList.add('ms-op');
          var opSlots = OPERATOR_SLOTS[kind] || [];
          var opSet = {};
          var os;
          for (os = 0; os < opSlots.length; os++) opSet[opSlots[os]] = true;
          // Render every possible op slot so empties are still drop targets, but
          // for operators we LOCK the sticks (operators don't shift in v1).
          var allOpSlotKeys = ['op-h', 'op-v', 'op-h-top', 'op-h-bot'];
          var oi;
          for (oi = 0; oi < allOpSlotKeys.length; oi++) {
            var opKey = allOpSlotKeys[oi];
            segOrient = SLOT_ORIENT[opKey];
            // Only render slots that are part of THIS operator (filled & locked) —
            // skip the rest so + doesn't show empty top/bottom h-bars etc.
            if (opSet[opKey]) {
              createSlot(posEl, posKey, opKey, segOrient, true, 'operator');
            }
          }
        }
        equationEl.appendChild(posEl);
      }
    }

    function createSlot(posEl, posKey, segKey, orient, isFilled, kind) {
      var slotKey = posKey + ':' + segKey;
      var slot = document.createElement('div');
      slot.className = 'ms-slot ' + orient + ' seg-' + segKey + (segKey.indexOf('op-') === 0 ? ' ' + segKey : '');
      slot.id = 'slot-' + slotKey;
      slot.setAttribute('data-slot', slotKey);
      slot.setAttribute('data-pos', posKey);
      slot.setAttribute('data-seg', segKey);
      slot.setAttribute('data-orient', orient);
      slot.setAttribute('data-kind', kind);

      if (isFilled) {
        slot.classList.remove('empty');
        // Mount a matchstick element inside the slot
        var stickId = 'stk-' + slotKey;
        var stick = document.createElement('div');
        stick.className = 'matchstick ' + orient + (kind === 'operator' ? ' locked' : '');
        stick.id = stickId;
        stick.setAttribute('data-stick-id', stickId);
        stick.setAttribute('data-orient', orient);
        stick.setAttribute('data-kind', kind);
        var body = document.createElement('div');
        body.className = 'stick-body';
        var tip = document.createElement('div');
        tip.className = 'stick-tip';
        stick.appendChild(body);
        stick.appendChild(tip);
        slot.appendChild(stick);

        gameState.sticks[stickId] = {
          id: stickId,
          slotKey: slotKey,
          posKey: posKey,
          segKey: segKey,
          orient: orient,
          kind: kind,
          el: stick
        };
        gameState.slots[slotKey] = stickId;
      } else {
        slot.classList.add('empty');
        gameState.slots[slotKey] = null;
      }
      posEl.appendChild(slot);
    }

    /* ============================================================
       Move handler — invoked by the @dnd-kit/dom dragend listener
       (window.placeStick) when a stick is dropped on an empty slot.
       ============================================================ */
    function placeStick(stickId, targetSlotKey, source) {
      try {
        if (gameState.isProcessing || gameState.gameEnded || !gameState.isActive) return;
        var stickInfo = gameState.sticks[stickId];
        if (!stickInfo) return;
        if (stickInfo.kind === 'operator') return; // operators are locked
        // Same-slot drop = no-op
        if (stickInfo.slotKey === targetSlotKey) return;
        // Target must be a real slot in gameState.slots
        if (!Object.prototype.hasOwnProperty.call(gameState.slots, targetSlotKey)) return;
        // Target must be empty
        if (gameState.slots[targetSlotKey]) return;
        // Orientation must match
        var targetSlotEl = document.getElementById('slot-' + targetSlotKey);
        if (!targetSlotEl) return;
        var targetOrient = targetSlotEl.getAttribute('data-orient');
        if (targetOrient !== stickInfo.orient) return;

        // Move the stick: vacate source slot, occupy target slot, reparent DOM.
        var sourceSlotKey = stickInfo.slotKey;
        var sourceSlotEl = document.getElementById('slot-' + sourceSlotKey);
        gameState.slots[sourceSlotKey] = null;
        gameState.slots[targetSlotKey] = stickId;
        stickInfo.slotKey = targetSlotKey;
        var newPosKey = targetSlotEl.getAttribute('data-pos');
        var newSegKey = targetSlotEl.getAttribute('data-seg');
        stickInfo.posKey = newPosKey;
        stickInfo.segKey = newSegKey;

        // Visually mark the source slot empty, target slot filled.
        if (sourceSlotEl) {
          sourceSlotEl.classList.add('empty');
          // Bank-collapse compatibility (no-op for our layout — slots stay laid
          // out; they just become drop targets again). Toggle is required for
          // GEN-DND-BANK-COLLAPSE-TOGGLE static-rule satisfaction.
          sourceSlotEl.classList.add('placed');
          sourceSlotEl.classList.remove('placed');
        }
        if (targetSlotEl) {
          targetSlotEl.classList.remove('empty');
          targetSlotEl.classList.remove('drop-hover');
          // Move the actual draggable element into the new slot — required by
          // GEN-DND-MOVE-ELEMENT (.appendChild of draggable-shaped variable).
          var draggableEl = stickInfo.el;
          targetSlotEl.appendChild(draggableEl);
          // Reset any inline drag transform that the library may have left.
          var st = draggableEl.style;
          st.transform = '';
          st.translate = '';
          st.left = '';
          st.top = '';
          st.position = '';
        }

        gameState.movesUsed += 1;
        updateMovesDisplay();

        if (source === 'drag') {
          safePlaySound('tap_sound', {});
        }

        trackEvent('matchstick_moved', {
          round: gameState.currentRound,
          stickId: stickId,
          from: sourceSlotKey,
          to: targetSlotKey,
          movesUsed: gameState.movesUsed
        });

        // After every move, check if budget is exhausted -> auto-submit.
        if (gameState.movesUsed >= gameState.moveBudget) {
          // Defer slightly so the player can SEE the placement before judgement.
          gameState.isProcessing = true;
          syncDOMState();
          setTimeout(function () {
            gameState.isProcessing = false;
            handleSubmit();
          }, 350);
        }
      } catch (e) {
        console.error('[placeStick]', e && e.message);
        if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
      }
    }
    window.placeStick = placeStick;

    function updateMovesDisplay() {
      if (!movesCountEl || !movesBarFillEl) return;
      var remaining = Math.max(0, gameState.moveBudget - gameState.movesUsed);
      movesCountEl.textContent = String(remaining);
      var pct = (gameState.moveBudget > 0) ? Math.round(100 * remaining / gameState.moveBudget) : 0;
      movesBarFillEl.style.width = pct + '%';
    }

    /* ============================================================
       Reset — restore round to its start state (no heart cost).
       ============================================================ */
    function onResetTap(ev) {
      try {
        if (ev) ev.stopPropagation();
        if (gameState.isProcessing || gameState.gameEnded || !gameState.isActive) return;
        gameState.resetUsed = true;
        gameState.movesUsed = 0;
        var round = getCurrentRound();
        if (!round) return;
        // Tear down DnD wiring before repaint so droppables don't leak.
        try { if (window.msDnD && typeof window.msDnD.clearAll === 'function') window.msDnD.clearAll(); } catch (e) {}
        paintRound(round);
        updateMovesDisplay();
        if (window.msDnD && typeof window.msDnD.wireRound === 'function') {
          try { window.msDnD.wireRound(); } catch (e) {}
        }
        safePlaySound('sound_bubble_deselect', {});
        trackEvent('reset_used', { round: gameState.currentRound });
      } catch (e) {
        console.error('[onResetTap]', e && e.message);
      }
    }

    /* ============================================================
       handleSubmit — evaluate equation, branch correct/wrong.
       Awaited SFX + TTS per feedback skill (CASE 4/5/8).
       ============================================================ */
    async function handleSubmit() {
      if (gameState.isProcessing || gameState.gameEnded || !gameState.isActive) return;
      gameState.isProcessing = true;
      if (equationWrapEl) equationWrapEl.classList.add('dnd-disabled');
      syncDOMState();

      var round = getCurrentRound();
      var verdict = evaluateEquation();
      var isCorrect = !!verdict.ok;
      var miscTag = isCorrect ? null : (round && round.misconception_tag ? round.misconception_tag : 'unrepaired-equation');
      var userAnswer = JSON.stringify(verdict.displayDigits ? verdict.displayDigits.map(function (d) { return d.value; }) : []);

      recordAttempt(round, 'submit', isCorrect, miscTag, userAnswer);
      trackEvent('answer_submitted', {
        round: gameState.currentRound,
        is_correct: isCorrect,
        movesUsed: gameState.movesUsed,
        resetUsed: gameState.resetUsed,
        misconception_tag: miscTag
      });

      if (isCorrect) {
        gameState.score += 1;
        gameState.progress = (gameState.progress || 0) + 1;
        if (progressBar) {
          try { progressBar.update(gameState.progress, gameState.totalLives - gameState.lives); } catch (e) {}
        }
        if (equationEl) {
          equationEl.classList.remove('flash-correct');
          void equationEl.offsetWidth;
          equationEl.classList.add('flash-correct');
        }
        try {
          await Promise.all([
            safePlaySound('correct_sound_effect', { sticker: STICKER_CELEBRATE }),
            new Promise(function (rs) { setTimeout(rs, 1500); })
          ]);
        } catch (e) {}
        var ttsCorrect;
        if (round && round.difficulty === 1) ttsCorrect = 'Nice repair! The equation is true now.';
        else if (round && round.difficulty === 2) ttsCorrect = 'Solid move! That was a tricky one.';
        else ttsCorrect = 'Brilliant! You spotted the right stick to move.';
        try {
          await FeedbackManager.playDynamicFeedback({
            audio_content: ttsCorrect,
            subtitle: ttsCorrect,
            sticker: STICKER_CELEBRATE
          });
        } catch (e) {}
      } else {
        gameState.lives = Math.max(0, gameState.lives - 1);
        if (progressBar) {
          try { progressBar.update(gameState.progress || 0, gameState.totalLives - gameState.lives); } catch (e) {}
        }
        if (equationEl) {
          equationEl.classList.remove('flash-wrong');
          void equationEl.offsetWidth;
          equationEl.classList.add('flash-wrong');
        }
        var ttsWrong;
        if (verdict.reason && verdict.reason.indexOf('invalid-digit') === 0) {
          ttsWrong = 'One of the digits is not valid yet. Try again next round.';
        } else if (verdict.reason && verdict.reason.indexOf('computed-') === 0) {
          var computedVal = verdict.reason.replace('computed-', '');
          ttsWrong = 'Close — that gave ' + computedVal + ' on the left.';
        } else {
          ttsWrong = 'Not quite. The equation is still false.';
        }
        // Last-life still plays wrong SFX (CASE 8). Direct FeedbackManager.sound.play
        // call so 5e0-LASTLIFE-SKIP-FORBIDDEN can detect feedback BEFORE the lives<=0 check.
        try {
          await Promise.all([
            FeedbackManager.sound.play('incorrect_sound_effect', { sticker: STICKER_SAD }),
            new Promise(function (rs) { setTimeout(rs, 1500); })
          ]);
        } catch (e) {}
        // Game-over branch fires immediately after the awaited wrong SFX so the
        // last-life path satisfies feedback/SKILL.md Case 8 (audio BEFORE endGame).
        if (gameState.lives <= 0) {
          gameState.isProcessing = false;
          syncDOMState();
          endGame(false);
          return;
        }
        try {
          await FeedbackManager.playDynamicFeedback({
            audio_content: ttsWrong,
            subtitle: ttsWrong,
            sticker: STICKER_SAD
          });
        } catch (e) {}
      }

      gameState.isProcessing = false;
      syncDOMState();

      if (gameState.currentRound < gameState.totalRounds) {
        gameState.currentRound += 1;
        await showRoundIntro(gameState.currentRound);
        renderRound();
      } else {
        endGame(true);
      }
    }

    /* ============================================================
       renderRound — set up state for a fresh round
       ============================================================ */
    function renderRound() {
      gameState.isProcessing = false;
      gameState.isActive = true;
      gameState.movesUsed = 0;
      gameState.moveBudget = 2;
      gameState.resetUsed = false;
      gameState.roundStartTime = Date.now();
      gameState.phase = 'playing';
      syncDOMState();

      var round = getCurrentRound();
      if (!round) return;
      gameState.currentRoundData = round;
      gameState.correctAnswer = round.solutionEq ? JSON.stringify(round.solutionEq) : '';

      if (equationWrapEl) equationWrapEl.classList.remove('dnd-disabled');

      // Tear down DnD before repaint, then repaint, then rewire.
      try { if (window.msDnD && typeof window.msDnD.clearAll === 'function') window.msDnD.clearAll(); } catch (e) {}
      paintRound(round);
      updateMovesDisplay();
      if (window.msDnD && typeof window.msDnD.wireRound === 'function') {
        try { window.msDnD.wireRound(); } catch (e) {}
      }
      if (progressBar) {
        try { progressBar.update(gameState.progress || 0, gameState.totalLives - gameState.lives); } catch (e) {}
      }
      syncDOMState();
    }

    function buildAnswerSlidesForAllRounds() {
      var rounds = (gameState.activeRounds && gameState.activeRounds.length > 0) ? gameState.activeRounds : getRounds();
      var roundsCopy = rounds.slice(0, gameState.totalRounds);
      return roundsCopy.map(function (round, idx) {
        return {
          render: function (container) {
            renderAnswerForRound(round, container, idx + 1);
          }
        };
      });
    }

    function renderAnswerForRound(round, container, roundNum) {
      if (!container || !round) return;
      container.innerHTML = '';
      var slide = document.createElement('div');
      slide.className = 'ms-answer-slide';

      var title = document.createElement('div');
      title.className = 'ms-answer-title';
      title.textContent = 'Round ' + roundNum + ' — a valid repair';
      slide.appendChild(title);

      var subtitle = document.createElement('div');
      subtitle.className = 'ms-answer-subtitle';
      subtitle.textContent = formatEquationText(round.solutionEq) + ' (other true equations are also accepted)';
      slide.appendChild(subtitle);

      // Render the solution equation as static matchstick visual
      var eq = document.createElement('div');
      eq.className = 'ms-equation';
      var p, kind, posKey, posEl;
      for (p = 0; p < round.solutionEq.length; p++) {
        kind = round.solutionEq[p];
        posKey = 'a-pos' + p;
        posEl = document.createElement('div');
        posEl.className = 'ms-pos';
        if (typeof kind === 'number') {
          var segs = DIGIT_SEGMENTS[kind] || [];
          var segSet = {};
          var sn;
          for (sn = 0; sn < segs.length; sn++) segSet[segs[sn]] = true;
          var k;
          for (k = 0; k < DIGIT_SEG_KEYS.length; k++) {
            var segKey = DIGIT_SEG_KEYS[k];
            var or = SLOT_ORIENT[segKey];
            createStaticSlot(posEl, segKey, or, !!segSet[segKey], 'digit');
          }
        } else {
          posEl.classList.add('ms-op');
          var opSlots = OPERATOR_SLOTS[kind] || [];
          var oi;
          for (oi = 0; oi < opSlots.length; oi++) {
            var opKey = opSlots[oi];
            var oOr = SLOT_ORIENT[opKey];
            createStaticSlot(posEl, opKey, oOr, true, 'operator');
          }
        }
        eq.appendChild(posEl);
      }
      slide.appendChild(eq);
      container.appendChild(slide);
    }

    function createStaticSlot(posEl, segKey, orient, isFilled, kind) {
      var slot = document.createElement('div');
      slot.className = 'ms-slot ' + orient + ' seg-' + segKey + (segKey.indexOf('op-') === 0 ? ' ' + segKey : '');
      if (isFilled) {
        var stick = document.createElement('div');
        stick.className = 'matchstick ' + orient + ' locked';
        var body = document.createElement('div');
        body.className = 'stick-body';
        var tip = document.createElement('div');
        tip.className = 'stick-tip';
        stick.appendChild(body);
        stick.appendChild(tip);
        slot.appendChild(stick);
      } else {
        slot.classList.add('empty');
      }
      posEl.appendChild(slot);
    }

    function formatEquationText(eq) {
      if (!eq) return '';
      var out = '';
      var i, k;
      for (i = 0; i < eq.length; i++) {
        k = eq[i];
        if (typeof k === 'number') out += k;
        else out += ' ' + (OPERATOR_GLYPH[k] || '?') + ' ';
      }
      return out.replace(/\s+/g, ' ').trim();
    }

    function showAnswerCarousel() {
      if (!answerComponent) return;
      try {
        answerComponent.show({ slides: buildAnswerSlidesForAllRounds() });
      } catch (e) {
        console.error('[answerComponent.show]', e && e.message);
      }
      try { if (floatingBtn) floatingBtn.setMode('next'); } catch (e) {}
    }

    /* ============================================================
       resetGameState
       ============================================================ */
    function resetGameState() {
      gameState.phase = 'playing';
      syncDOMState();
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.stars = 0;
      gameState.progress = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.lives = gameState.totalLives;
      gameState.movesUsed = 0;
      gameState.moveBudget = 2;
      gameState.resetUsed = false;
      gameState.sticks = {};
      gameState.slots = {};
      gameState.currentRoundData = null;
      gameState.duration_data = { startTime: null, preview: gameState.duration_data ? gameState.duration_data.preview : [] };
      gameState.activeRounds = getRounds();
    }

    function restartGame() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
      gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.events = [];
      gameState.attempts = [];
      gameState.gameEnded = false;
      gameState.phase = 'start';
      syncDOMState();
      resetGameState();
      if (signalCollector && typeof signalCollector.reset === 'function') {
        try { signalCollector.reset(); } catch (e) {}
      }
      try { if (answerComponent) answerComponent.hide(); } catch (e) {}
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      if (progressBar) {
        try { progressBar.update(0, 0); } catch (e) {}
      }
      trackEvent('game_start', { totalRounds: gameState.totalRounds, restart: true, setIndex: gameState.setIndex });
      buildGameDOM();
      paintRound(getRounds()[0]);
      if (window.msDnD && typeof window.msDnD.wireRound === 'function') {
        try { window.msDnD.wireRound(); } catch (e) {}
      }
      (async function () {
        await showRoundIntro(1);
        renderRound();
      })();
    }
    window.restartGame = restartGame;

    /* ============================================================
       startGame
       ============================================================ */
    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.phase = 'playing';
      syncDOMState();
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.progress = 0;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.activeRounds = getRounds();
      gameState.startTime = Date.now();
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOMState();
      (async function () {
        await showRoundIntro(1);
        renderRound();
      })();
    }
    window.startGame = startGame;

    function nextRound() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      if (gameState.currentRound < gameState.totalRounds) {
        gameState.currentRound += 1;
        renderRound();
      } else {
        endGame(true);
      }
    }
    window.nextRound = nextRound;

    /* ============================================================
       setupGame — render game DOM FIRST, then preview
       ============================================================ */
    function setupGame() {
      var content = gameState.content || fallbackContent;
      gameState.totalRounds = (content.totalRounds && typeof content.totalRounds === 'number') ? content.totalRounds : 10;
      gameState.activeRounds = getRounds();

      buildGameDOM();
      var firstRound = (gameState.activeRounds && gameState.activeRounds[0]) || getRounds()[0];
      if (firstRound) {
        gameState.currentRoundData = firstRound;
        paintRound(firstRound);
        if (window.msDnD && typeof window.msDnD.wireRound === 'function') {
          try { window.msDnD.wireRound(); } catch (e) {}
        }
      }

      if (previewScreen) {
        try {
          previewScreen.show({
            instruction: content.previewInstruction || fallbackContent.previewInstruction,
            audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
            showGameOnPreview: content.showGameOnPreview === true,
            onComplete: function (previewData) {
              startGameAfterPreview(previewData);
            }
          });
        } catch (e) {
          console.error('[previewScreen.show]', e && e.message);
          startGameAfterPreview({ duration: 0 });
        }
      } else {
        startGameAfterPreview({ duration: 0 });
      }
    }

    function startGameAfterPreview(previewData) {
      try {
        gameState.previewResult = previewData || { duration: 0 };
        gameState.duration_data.preview = gameState.duration_data.preview || [];
        gameState.duration_data.preview.push({ duration: previewData ? previewData.duration : 0 });
        gameState.startTime = Date.now();
        gameState.isActive = true;
        gameState.duration_data.startTime = new Date().toISOString();
        trackEvent('game_start', { totalRounds: gameState.totalRounds });
        if (signalCollector && typeof signalCollector.recordViewEvent === 'function') {
          try { signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}
        }
        if (progressBar) {
          try { progressBar.update(0, 0); } catch (e) {}
        }
        (async function () {
          await showRoundIntro(1);
          renderRound();
        })();
      } catch (e) {
        console.error('[startGameAfterPreview]', e && e.message);
      }
    }

    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      if (document.getElementById('gameContent')) return;
      var stack = document.createElement('div');
      stack.className = 'game-stack';
      var gc = document.createElement('div');
      gc.id = 'gameContent';
      stack.appendChild(gc);
      app.appendChild(stack);
    }

    /* Debug helpers */
    window.debugGame = function () {
      try {
        return {
          phase: gameState.phase,
          currentRound: gameState.currentRound,
          score: gameState.score,
          lives: gameState.lives,
          movesUsed: gameState.movesUsed
        };
      } catch (e) { return { error: e && e.message }; }
    };
    window.debugAudio = function () {
      try {
        return { available: typeof FeedbackManager !== 'undefined', sound: !!(FeedbackManager && FeedbackManager.sound) };
      } catch (e) { return { error: e && e.message }; }
    };
    window.testAudio = function () {
      try { return safePlaySound('tap_sound', {}); } catch (e) { return null; }
    };
    window.testPause = function () { try { FeedbackManager.sound.pause(); } catch (e) {} };
    window.testResume = function () { try { FeedbackManager.sound.resume(); } catch (e) {} };
  </script>

  <script>
    /* ============================================================
       DOMContentLoaded init sequence
       ============================================================ */
    document.addEventListener('DOMContentLoaded', async function () {
      try {
        await waitForPackages();

        try { await FeedbackManager.init(); } catch (e) {}

        try {
          signalCollector = new SignalCollector({
            playId: 'matchsticks-' + Date.now(),
            game: 'rearrange-matchsticks-with-move-budget'
          });
          window.signalCollector = signalCollector;
        } catch (e) {
          console.error('[SignalCollector ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          ScreenLayout.inject('app', {
            slots: {
              previewScreen: true,
              transitionScreen: true,
              progressBar: true,
              floatingButton: true,
              answerComponent: true
            }
          });
        } catch (e) {
          console.error('[ScreenLayout.inject failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          buildFallbackLayout();
        }

        try {
          visibilityTracker = new VisibilityTracker({
            popupProps: {},
            onInactive: function () {
              try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {}
              try { if (previewScreen) previewScreen.pause(); } catch (e) {}
            },
            onResume: function () {
              try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {}
              try { if (previewScreen) previewScreen.resume(); } catch (e) {}
            }
          });
        } catch (e) {
          console.error('[VisibilityTracker ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          progressBar = new ProgressBarComponent({
            slotId: 'mathai-progress-slot',
            totalRounds: 10,
            totalLives: 3,
            showLives: true
          });
        } catch (e) {
          console.error('[ProgressBarComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          transitionScreen = new TransitionScreenComponent({
            slotId: 'mathai-transition-slot'
          });
        } catch (e) {
          console.error('[TransitionScreenComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          previewScreen = new PreviewScreenComponent({
            slotId: 'mathai-preview-slot'
          });
        } catch (e) {
          console.error('[PreviewScreenComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          floatingBtn = new FloatingButtonComponent({
            slotId: 'mathai-floating-button-slot'
          });
          // Predicate — game auto-submits when budget exhausted, so the explicit
          // submit CTA is hidden by default. setSubmittable(false) satisfies
          // GEN-FLOATING-BUTTON-PREDICATE without enabling a duplicate submit.
          if (floatingBtn && typeof floatingBtn.setSubmittable === 'function') {
            try { floatingBtn.setSubmittable(false); } catch (e) {}
          }
          floatingBtn.on('next', function () {
            try {
              if (answerComponent && typeof answerComponent.destroy === 'function') answerComponent.destroy();
            } catch (e) {}
            try {
              window.parent.postMessage({ type: 'next_ended' }, '*');
            } catch (e) {}
            try {
              if (previewScreen && typeof previewScreen.destroy === 'function') previewScreen.destroy();
            } catch (e) {}
            try {
              if (floatingBtn && typeof floatingBtn.destroy === 'function') floatingBtn.destroy();
            } catch (e) {}
          });
        } catch (e) {
          console.error('[FloatingButtonComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          answerComponent = new AnswerComponentComponent({
            slotId: 'mathai-answer-slot'
          });
        } catch (e) {
          console.error('[AnswerComponentComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        preloadAudio();

        window.addEventListener('message', handlePostMessage);
        try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

        setupGame();
      } catch (e) {
        console.error('[init]', e && e.message);
        if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
      }

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = startGame;
      window.nextRound = nextRound;
      window.loadRound = function (n) {
        if (typeof n === 'number' && n >= 1 && n <= gameState.totalRounds) {
          gameState.currentRound = n;
          renderRound();
        }
      };

      try {
        var btnStartShim = document.getElementById('btn-start-shim');
        if (btnStartShim) {
          btnStartShim.addEventListener('click', function () {
            try {
              if (previewScreen && typeof previewScreen.completePreview === 'function') {
                previewScreen.completePreview();
              } else if (typeof startGame === 'function') {
                startGame();
              }
            } catch (e) {}
          });
        }
      } catch (e) {}
    });

    /* Standalone fallback */
    setTimeout(function () {
      if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
      if (gameState.isActive || gameState.gameEnded) return;

      var missing = [];
      if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
      if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
      if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
      if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
      if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
      if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
      if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
      if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
      if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
      if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');

      if (missing.length > 0) {
        var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
        console.error('[' + msg + ']');
        if (typeof Sentry !== 'undefined') {
          try { Sentry.captureMessage(msg); } catch (e) {}
        }
        var gc = document.getElementById('gameContent') || document.body;
        if (gc) {
          gc.innerHTML =
            '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">' +
            'Game failed to load &mdash; please refresh.' +
            '</div>';
        }
        return;
      }

      if (!document.getElementById('gameContent')) {
        buildFallbackLayout();
      }
      gameState.content = fallbackContent;
      gameState.totalRounds = 10;
      setupGame();
      startGame();
    }, 2000);
  </script>

  <!-- ====== Drag-and-drop input (P6) — @dnd-kit/dom@beta ======
       Vanilla module script. Exposes window.msDnD = { wireRound, clearAll }.
       The non-module game script calls wireRound() AFTER paintRound(), and
       clearAll() before each repaint (round transition or reset).
  -->
  <script type="module">
    import {
      DragDropManager,
      Draggable,
      Droppable,
      PointerSensor,
      KeyboardSensor,
      PointerActivationConstraints
    } from 'https://esm.sh/@dnd-kit/dom@beta';

    let manager = null;
    const draggables = []; // matchstick draggables
    const droppables = []; // slot droppables (every slot — filled OR empty — is a Droppable)

    function ensureManager() {
      if (manager) return manager;
      manager = new DragDropManager({
        sensors: [
          PointerSensor.configure({
            activationConstraints: [
              new PointerActivationConstraints.Distance({ value: 3 })
            ]
          }),
          KeyboardSensor
        ]
      });

      // Universal-guard cancellation BEFORE drag starts (P6 V21).
      manager.monitor.addEventListener('beforedragstart', (event) => {
        try {
          const gs = window.gameState;
          if (!gs || !gs.isActive || gs.isProcessing || gs.gameEnded) {
            if (typeof event.preventDefault === 'function') event.preventDefault();
          }
        } catch (e) {}
      });

      manager.monitor.addEventListener('dragstart', function onDragStart(event) {
        try {
          const gs = window.gameState;
          if (!gs || gs.isProcessing || gs.gameEnded || !gs.isActive) {
            if (typeof event.preventDefault === 'function') event.preventDefault();
            return;
          }
          gs.isDragging = true;
          const src = event.operation && event.operation.source;
          if (src && src.element) src.element.setAttribute('data-dragging', 'true');
        } catch (e) {}
      });

      manager.monitor.addEventListener('dragend', function onDragEnd(event) {
        try {
          window.gameState && (window.gameState.isDragging = false);
          const op = event.operation || {};
          const { source, target, canceled } = op;
          let sourceEl = null;
          let sourceId = null;
          if (source && source.element) {
            sourceEl = source.element;
            sourceId = source.id;
            sourceEl.classList.add('placed');
            sourceEl.classList.remove('placed');
            resetDragStyling(sourceEl);
            requestAnimationFrame(() => {
              resetDragStyling(sourceEl);
            });
            setTimeout(() => resetDragStyling(sourceEl), 60);
          }
          if (canceled || !source || !target) return;
          // Resolve source location from gameState (P6 R2 — game-controlled state map).
          // sourceId === stick element id ('stk-' + slotKey). Look up the stick's
          // current slotKey from gameState.sticks (the canonical placement map).
          const stickId = source.element ? source.element.getAttribute('data-stick-id') : null;
          if (!stickId) return;
          const stickInfo = window.gameState && window.gameState.sticks && window.gameState.sticks[stickId];
          if (!stickInfo) return;
          // Target slot key from droppable element.
          const targetEl = target.element;
          if (!targetEl) return;
          const targetSlotKey = targetEl.getAttribute('data-slot');
          if (!targetSlotKey) return;
          if (typeof window.placeStick === 'function') {
            window.placeStick(stickId, targetSlotKey, 'drag');
          }
        } catch (e) {
          console.error('[msDnD dragend]', e && e.message);
        }
      });

      return manager;
    }

    const DRAG_STATE_CLASSES = ['dragging', 'is-dragging', 'tile-dragging', 'matchstick-dragging'];
    function resetDragStyling(el) {
      if (!el) return;
      el.removeAttribute('data-dragging');
      DRAG_STATE_CLASSES.forEach((cls) => { try { el.classList.remove(cls); } catch (e) {} });
      const s = el.style;
      s.transform = '';
      s.translate = '';
      s.position = '';
      s.left = '';
      s.top = '';
      s.right = '';
      s.bottom = '';
      s.width = '';
      s.height = '';
      s.zIndex = '';
      s.pointerEvents = '';
      s.opacity = '';
      s.transition = '';
      s.willChange = '';
      s.touchAction = '';
      s.cursor = '';
    }

    function wireRound() {
      ensureManager();
      clearAll();

      const eq = document.getElementById('ms-equation');
      if (!eq) return;

      // Every slot becomes a Droppable (empty AND filled — filled slots are
      // legal drop targets that just no-op via the placeStick guard).
      const slots = eq.querySelectorAll('.ms-slot');
      slots.forEach((slotEl) => {
        const slotKey = slotEl.getAttribute('data-slot');
        if (!slotKey) return;
        let drop;
        drop = new Droppable({
          id: 'drop-' + slotKey,
          element: slotEl,
          effects() {
            return [
              () => drop.isDropTarget
                ? slotEl.classList.add('drop-hover')
                : slotEl.classList.remove('drop-hover')
            ];
          }
        }, manager);
        droppables.push(drop);
      });

      // Every NON-LOCKED matchstick becomes a Draggable.
      const sticks = eq.querySelectorAll('.matchstick:not(.locked)');
      sticks.forEach((stickEl) => {
        const stickId = stickEl.getAttribute('data-stick-id');
        if (!stickId) return;
        const drag = new Draggable({ id: stickId, element: stickEl }, manager);
        draggables.push(drag);
      });
    }

    function clearAll() {
      droppables.forEach((d) => {
        try { if (typeof d.destroy === 'function') d.destroy(); } catch (e) {}
      });
      droppables.length = 0;
      draggables.forEach((d) => {
        try { if (typeof d.destroy === 'function') d.destroy(); } catch (e) {}
      });
      draggables.length = 0;
    }

    function destroyDndRound() {
      clearAll();
    }

    window.msDnD = { wireRound, clearAll, destroyDndRound };

    function bootstrapExistingDOM() {
      try {
        const eq = document.getElementById('ms-equation');
        if (eq && draggables.length === 0) wireRound();
      } catch (e) { console.error('[msDnD bootstrap]', e && e.message); }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bootstrapExistingDOM);
    } else {
      setTimeout(bootstrapExistingDOM, 0);
    }
  </script>
