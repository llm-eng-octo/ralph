<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tanya's Wallet — Multi-Step Word Problem Solver</title>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({ release: 'word-problem-typed-numeric-answer@1.0.0' }));
    }
  </script>
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script>window.addEventListener('load', initSentry);</script>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-blue: #3478F6;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      overflow-x: hidden;
      overscroll-behavior: none;
    }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }
    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }
    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    /* Concept §"Shape of the experience": "There is no per-question timer; the
       focus is reading carefully, not racing." No timer in the header. */

    /* Concept §"What the player sees and does":
       "Idle for too long (~20 seconds without any keystroke) → a faint pulse
        on the part of the question that holds the recurrence cue." */
    .wp-recurrence-cue { background: var(--mathai-cell-bg-yellow); padding: 0 4px; border-radius: 4px; }
    @keyframes wpRecurrencePulse {
      0%, 100% { background-color: var(--mathai-cell-bg-yellow); box-shadow: 0 0 0 0 rgba(244, 196, 48, 0); }
      50%      { background-color: #ffe48b;                       box-shadow: 0 0 0 4px rgba(244, 196, 48, 0.25); }
    }
    .wp-recurrence-cue.is-pulsing { animation: wpRecurrencePulse 1.4s ease-in-out 3; }

    #gameContent {
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 8px 16px 24px;
    }
    .ww-stage {
      text-align: center;
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      margin: 6px 0 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .ww-story {
      font-size: 18px;
      line-height: 1.45;
      color: var(--mathai-text-primary);
      margin: 14px 0 18px;
      padding: 14px 16px;
      background: var(--mathai-light-gray);
      border-radius: var(--mathai-border-radius-card);
    }
    .ww-prompt {
      text-align: center;
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-primary);
      font-weight: 700;
      margin-bottom: 12px;
    }
    .ww-input-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin: 8px 0 8px;
    }
    .ww-input-prefix,
    .ww-input-suffix {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-primary);
      font-weight: 600;
      margin: 0 6px;
    }
    .ww-input {
      width: 110px;
      min-height: 48px;
      padding: 8px 12px;
      border: 2px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-small);
      font-size: 20px;
      font-weight: 700;
      color: var(--mathai-primary);
      background: var(--mathai-white);
      text-align: center;
      font-family: var(--mathai-font-family);
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }
    .ww-input:focus {
      outline: none;
      border-color: var(--mathai-purple);
    }
    .ww-input.is-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
      color: var(--mathai-success);
    }
    .ww-input.is-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-error);
      animation: shake 0.4s ease;
    }
    .ww-explain {
      margin: 14px auto 0;
      max-width: 380px;
      padding: 10px 14px;
      background: var(--mathai-cell-bg-yellow);
      border-radius: var(--mathai-border-radius-small);
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-text-primary);
    }
    .ww-explain.hidden-init { display: none; }

    button, [role="button"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }
    #app {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white);
        color: var(--mathai-primary);
        font-family: var(--mathai-font-family);
        font-size: var(--mathai-font-size-subtitle);
        text-align: center;
        padding: 24px;
      }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="3"></div>

  <script>
    var STICKER_CORRECT  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_WRONG    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_LEVEL    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';
    var STICKER_VICTORY  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_CELEBRATE = STICKER_VICTORY;
    var STICKER_SAD = STICKER_WRONG;
    var STICKER_MOTIVATE = STICKER_LEVEL;

    function makeRound(set, n, p) {
      var id = set + '_r' + n + '_' + p.key;
      return {
        set: set, id: id, round: n, stage: p.stage || 1,
        story: p.story,
        prompt: p.prompt || 'What is the answer?',
        unit: p.unit || '',
        prefix: p.prefix || 'Answer:',
        answer: p.answer,
        explanation: p.explanation,
        misconception_tags: p.misconception_tags || {},
        correctTTS: 'Yes — answer is ' + p.answer + (p.unit ? (' ' + p.unit) : '') + '.',
        correctSubtitle: 'Answer: ' + p.answer + (p.unit ? (' ' + p.unit) : '') + '.',
        wrongTTS: p.explanation,
        wrongSubtitle: 'Right answer: ' + p.answer + (p.unit ? (' ' + p.unit) : '') + '.'
      };
    }

    var QUESTIONS = [
      { key: 'tanya-icecream', stage: 1,
        story: "Tanya has Rs 100. Every day she buys an ice-cream for Rs 15. How much does she have left after 3 days?",
        prompt: 'Money left:', prefix: 'Rs', unit: '',
        answer: 55,
        recurrenceCue: 'Every day',
        explanation: '3 × Rs 15 = Rs 45. Then Rs 100 - Rs 45 = Rs 55.',
        misconception_tags: { '15': 'one-day-only', '45': 'forgot-to-subtract', '85': 'subtracted-once' },
        // Misconception-specific TTS lines (concept §"Feel and motivation": "Typing
        // 15 means 'you computed the cost of one day'; typing 45 means 'you
        // computed the total spent, not the remainder'; typing 85 means 'you
        // only counted one day'.")
        pattern_hints: {
          '15': "That's just one day's cost. Multiply Rs 15 by 3 days first.",
          '45': "That's the total spent — Rs 100 doesn't keep the money you spent. Subtract.",
          '85': "You subtracted only one day. Multiply Rs 15 by 3, then subtract."
        } },
      { key: 'aman-savings', stage: 1,
        story: "Aman saves Rs 20 a week from his Rs 200 allowance. How much does he have saved after 4 weeks?",
        prompt: 'Saved amount:', prefix: 'Rs',
        answer: 80,
        explanation: '4 × Rs 20 = Rs 80 saved.',
        misconception_tags: { '20': 'one-week-only', '120': 'mistook-savings' } },
      { key: 'riya-notebooks', stage: 1,
        story: "Riya pays Rs 25 each for 4 notebooks from her Rs 150. How much does she have left?",
        prompt: 'Money left:', prefix: 'Rs',
        answer: 50,
        explanation: '4 × Rs 25 = Rs 100. Then Rs 150 - Rs 100 = Rs 50.',
        misconception_tags: { '25': 'one-notebook-only', '100': 'forgot-to-subtract' } },
      { key: 'bobby-pencils', stage: 2,
        story: "Bobby buys 7 pencils at Rs 8 each, paying with a Rs 100 note. How much change does he get back?",
        prompt: 'Change:', prefix: 'Rs',
        answer: 44,
        explanation: '7 × Rs 8 = Rs 56. Then Rs 100 - Rs 56 = Rs 44.',
        misconception_tags: { '8': 'one-pencil-only', '56': 'forgot-to-subtract' } },
      { key: 'mira-juice', stage: 2,
        story: "Mira earns Rs 12 a day for 5 days. After buying a book for Rs 35, how much does she have?",
        prompt: 'Money left:', prefix: 'Rs',
        answer: 25,
        explanation: '5 × Rs 12 = Rs 60. Then Rs 60 - Rs 35 = Rs 25.',
        misconception_tags: { '60': 'forgot-to-subtract', '12': 'one-day-only' } },
      { key: 'tanya-eggs', stage: 2,
        story: "Tanya buys 6 eggs at Rs 9 each. She has Rs 100. How many rupees more than Rs 50 does she have left?",
        prompt: 'Extra over Rs 50:', prefix: 'Rs',
        answer: 0,
        explanation: '6 × Rs 9 = Rs 54. Rs 100 - Rs 54 = Rs 46. 46 < 50, so 0 extra.',
        misconception_tags: { '46': 'gave-money-left' } },
      { key: 'aman-papers', stage: 2,
        story: "Aman walks 4 km a day for 5 days, with a target of 25 km. How many km is he short by?",
        prompt: 'Short by (km):', prefix: '',
        answer: 5, unit: 'km',
        explanation: '5 × 4 = 20 km. 25 - 20 = 5 km short.',
        misconception_tags: { '20': 'gave-distance-walked' } },
      { key: 'riya-pages', stage: 3,
        story: "Riya reads 12 pages a day for a week. The book has 100 pages. How many pages are left?",
        prompt: 'Pages left:', prefix: '',
        answer: 16, unit: 'pages',
        explanation: '7 × 12 = 84 pages read. 100 - 84 = 16 pages left.',
        misconception_tags: { '84': 'gave-pages-read', '12': 'one-day-only' } },
      { key: 'bobby-pets', stage: 3,
        story: "Bobby has 3 dogs. Each dog eats 2 cups of food per day. How many cups in a week?",
        prompt: 'Total cups:', prefix: '',
        answer: 42, unit: 'cups',
        explanation: '3 × 2 = 6 cups per day. 6 × 7 = 42 cups per week.',
        misconception_tags: { '6': 'one-day-only', '14': 'one-dog-only' } },
      { key: 'mira-stickers', stage: 3,
        story: "Mira has 50 stickers. She gives 4 to each of 8 friends. How many does she have left?",
        prompt: 'Stickers left:', prefix: '',
        answer: 18, unit: 'stickers',
        explanation: '8 × 4 = 32 given. 50 - 32 = 18 left.',
        misconception_tags: { '32': 'gave-stickers-given', '4': 'one-friend-only' } }
    ];

    function buildSet(setKey, offset) {
      var out = [];
      for (var i = 0; i < QUESTIONS.length; i++) {
        var q = QUESTIONS[(i + offset) % QUESTIONS.length];
        out.push(makeRound(setKey, i + 1, q));
      }
      return out;
    }

    var fallbackContent = {
      previewInstruction: '<p><b>Read the story, type the number.</b> Each round is a short word problem. Type your answer in the box and submit.</p><p>Three lives, ten rounds.</p>',
      previewAudioText: 'Read each story carefully and type the number that answers it.',
      previewAudio: null,
      showGameOnPreview: false,
      totalRounds: 10,
      totalLives: 3,
      answerComponent: true,
      rounds: buildSet('A', 0).concat(buildSet('B', 3)).concat(buildSet('C', 7))
    };

    var SETS = ['A', 'B', 'C'];
    var gameState = {
      gameId: 'word-problem-typed-numeric-answer',
      gameTitle: "Tanya's Wallet",
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 10,
      score: 0,
      lives: 3,
      totalLives: 3,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      duration_data: { startTime: null, endTime: null, preview: [] },
      correctAnswer: null,
      stars: 0,
      setIndex: 0,
      activeRounds: [],
      roundStartMs: 0,
      previewResult: null,
      progress: 0,
      roundToken: 0,
      idleTimeoutId: null
    };
    window.gameState = gameState;

    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var floatingBtn = null;
    var answerComponent = null;

    function getAvailableSets(rounds) {
      var seen = {}; var out = [];
      for (var i = 0; i < rounds.length; i++) {
        var s = rounds[i].set;
        if (s && !seen[s]) { seen[s] = true; out.push(s); }
      }
      return out.length ? out : ['A'];
    }
    function getRounds() {
      var src = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(src);
      var setKey = sets[gameState.setIndex % sets.length];
      var filtered = [];
      for (var i = 0; i < src.length; i++) if (src[i].set === setKey) filtered.push(src[i]);
      filtered.sort(function (a, b) { return a.round - b.round; });
      return filtered;
    }
    function getCorrectCount() { var c = 0; for (var i = 0; i < gameState.attempts.length; i++) if (gameState.attempts[i].correct === true) c++; return c; }
    function getStars() {
      var c = getCorrectCount();
      var t = gameState.totalRounds;
      if (c === 0) return 0;
      if (c >= Math.ceil(t * 0.9)) return 3;
      if (c >= Math.ceil(t * 0.6)) return 2;
      return 1;
    }
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound + 1);
    }
    function trackEvent(name, payload) {
      try { gameState.events.push({ event: name, ts: Date.now(), data: payload || {} }); } catch (e) {}
      try { if (signalCollector && signalCollector.recordEvent) signalCollector.recordEvent(name, payload || {}); } catch (e) {}
    }
    function recordAttempt(input, correct, misconceptionTag, responseMs) {
      var round = gameState.activeRounds[gameState.currentRound];
      var qid = round ? round.id : ('r' + (gameState.currentRound + 1));
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) : 0,
        input_of_user: input,
        correct: correct === true,
        round_number: gameState.currentRound + 1,
        question_id: qid,
        correct_answer: round ? round.answer : null,
        response_time_ms: typeof responseMs === 'number' ? responseMs : 0,
        misconception_tag: misconceptionTag || null,
        difficulty_level: round ? (round.stage || 1) : 1,
        is_retry: false,
        metadata: { set: round ? round.set : null }
      };
      gameState.attempts.push(attempt);
      try { if (signalCollector && signalCollector.recordAttempt) signalCollector.recordAttempt(attempt); } catch (e) {}
    }
    function postGameComplete() {
      if (gameState._gameCompletePosted) return;
      gameState._gameCompletePosted = true;
      var attempted = gameState.attempts.length;
      var correctCount = getCorrectCount();
      var accuracy = attempted === 0 ? 0 : Math.round((correctCount / attempted) * 100);
      var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
      var triesByRound = gameState.attempts.map(function (a) { return { round: a.round_number, correct: a.correct === true }; });
      var metrics = {
        accuracy: accuracy, time: Math.round(elapsedMs / 1000), stars: gameState.stars,
        attempts: gameState.attempts.slice(), duration_data: gameState.duration_data,
        totalLives: gameState.lives, tries: triesByRound, score: gameState.score,
        correctCount: correctCount, previewResult: gameState.previewResult || null
      };
      var signalSealed = { event_count: gameState.events.length, metadata: {} };
      try {
        if (signalCollector && typeof signalCollector.seal === 'function') {
          var sealed = signalCollector.seal();
          if (sealed) {
            if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count;
            if (sealed.metadata) signalSealed.metadata = sealed.metadata;
          }
        }
      } catch (e0) {}
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: { metrics: metrics, completedAt: Date.now(), signal_event_count: signalSealed.event_count, signal_metadata: signalSealed.metadata }
        }, '*');
      } catch (e) {}
    }

    function safePlaySound(id, opts) { try { return FeedbackManager.sound.play(id, opts || {}); } catch (e) { return Promise.resolve(); } }
    function awaitedFeedbackSound(id, opts) {
      var p = safePlaySound(id, opts || {});
      var floor = new Promise(function (r) { setTimeout(r, 1500); });
      return Promise.all([p, floor]).then(function () {}, function () {});
    }
    function playDynamicFeedback(opts) { try { return FeedbackManager.playDynamicFeedback(opts || {}); } catch (e) { return Promise.resolve(); } }

    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            try { reject(new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms')); } catch (e) {}
            throw new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    function escapeHTML(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="ww-stage" id="wwStage"></div>' +
        '<div class="ww-story" id="wwStory"></div>' +
        '<div class="ww-prompt" id="wwPrompt"></div>' +
        '<div class="ww-input-row">' +
          '<span class="ww-input-prefix" id="wwPrefix"></span>' +
          '<input id="answer-input" data-testid="answer-input" class="ww-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="?" autocomplete="off">' +
          '<span class="ww-input-suffix" id="wwSuffix"></span>' +
        '</div>' +
        '<div class="ww-explain hidden-init" id="wwExplain"></div>';
    }

    function renderInitialState() {
      var stageEl = document.getElementById('wwStage');
      var storyEl = document.getElementById('wwStory');
      var promptEl = document.getElementById('wwPrompt');
      var input = document.getElementById('answer-input');
      var prefix = document.getElementById('wwPrefix');
      var suffix = document.getElementById('wwSuffix');
      var expEl = document.getElementById('wwExplain');
      if (stageEl) stageEl.textContent = '';
      if (storyEl) storyEl.textContent = '';
      if (promptEl) promptEl.textContent = '';
      if (input) { input.value = ''; input.classList.remove('is-correct', 'is-wrong'); }
      if (prefix) prefix.textContent = '';
      if (suffix) suffix.textContent = '';
      if (expEl) { expEl.textContent = ''; expEl.classList.add('hidden-init'); }
    }

    function renderRound(roundIdxOneBased) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      gameState.currentRound = roundIdxOneBased - 1;
      gameState.isActive = true;
      gameState.phase = 'gameplay';
      gameState.roundToken = (gameState.roundToken || 0) + 1;
      syncDOM();

      var round = gameState.activeRounds[gameState.currentRound];
      if (!round) return;
      gameState.correctAnswer = round.answer;

      var stageEl = document.getElementById('wwStage');
      var storyEl = document.getElementById('wwStory');
      var promptEl = document.getElementById('wwPrompt');
      var input = document.getElementById('answer-input');
      var prefix = document.getElementById('wwPrefix');
      var suffix = document.getElementById('wwSuffix');
      var expEl = document.getElementById('wwExplain');

      if (stageEl) stageEl.textContent = 'Round ' + roundIdxOneBased + ' of ' + gameState.totalRounds;
      if (storyEl) {
        storyEl.textContent = round.story;
        storyEl.classList.remove('fade-in');
        void storyEl.offsetWidth;
        storyEl.classList.add('fade-in');
      }
      if (promptEl) promptEl.textContent = round.prompt;
      if (prefix) prefix.textContent = round.prefix || '';
      if (suffix) suffix.textContent = round.unit || '';
      if (input) {
        input.value = '';
        input.classList.remove('is-correct', 'is-wrong');
        input.disabled = false;
      }
      if (expEl) { expEl.textContent = ''; expEl.classList.add('hidden-init'); }

      gameState.roundStartMs = Date.now();
      gameState.isProcessing = false;

      try { if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode('submit'); } catch (e) {}
      try { if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(false); } catch (e) {}

      try {
        var p = safePlaySound('tap_sound', { sticker: null });
        if (p && p.catch) p.catch(function () {});
      } catch (e) {}

      // Concept §"What the player sees and does":
      // "Idle for too long (~20 seconds without any keystroke) → a faint pulse
      //  on the part of the question that holds the recurrence cue ("every
      //  day"), nudging the student to reread."
      armIdleHint();

      trackEvent('round_start', { round: roundIdxOneBased, set: round.set });
    }

    /* ====================================================================== */
    /* Idle-hint pulse + recurrence cue                                        */
    /* ====================================================================== */
    function clearIdleHint() {
      if (gameState.idleTimeoutId) {
        try { clearTimeout(gameState.idleTimeoutId); } catch (e) {}
        gameState.idleTimeoutId = null;
      }
    }

    function armIdleHint() {
      clearIdleHint();
      gameState.idleTimeoutId = setTimeout(function () {
        if (gameState.isProcessing || gameState.gameEnded) return;
        var input = document.getElementById('answer-input');
        if (input && (input.value || '').length > 0) return;
        pulseRecurrenceCue();
      }, 20000);
    }

    function pulseRecurrenceCue() {
      var storyEl = document.getElementById('wwStory');
      if (!storyEl) return;
      var round = gameState.activeRounds[gameState.currentRound];
      if (!round || !round.story) return;

      // Pick the recurrence cue phrase: prefer round.recurrenceCue, otherwise
      // the first match from a small canonical list.
      var cue = round.recurrenceCue;
      if (!cue) {
        var candidates = [
          'every day', 'each day', 'a day', 'per day',
          'a week', 'every week', 'each week', 'per week',
          'each', 'per'
        ];
        for (var i = 0; i < candidates.length; i++) {
          if (round.story.toLowerCase().indexOf(candidates[i]) !== -1) { cue = candidates[i]; break; }
        }
      }
      if (!cue) return;

      // Wrap the cue (case-insensitive, first occurrence) in a pulsing span.
      var raw = round.story;
      var idx = raw.toLowerCase().indexOf(cue.toLowerCase());
      if (idx < 0) return;
      var match = raw.substring(idx, idx + cue.length);
      var before = raw.substring(0, idx);
      var after = raw.substring(idx + cue.length);
      storyEl.innerHTML =
        escapeHTML(before) +
        '<span class="wp-recurrence-cue is-pulsing">' + escapeHTML(match) + '</span>' +
        escapeHTML(after);
      // Speak a short reread nudge (best-effort; failures are non-blocking).
      try {
        playDynamicFeedback({
          audio_content: "Notice '" + match + "' — that's a multiple-of pattern. Read once more.",
          subtitle: "Notice '" + match + "' — count the days, then subtract.",
          sticker: null
        });
      } catch (e) {}
    }

    function onInputChange(ev) {
      if (gameState.isProcessing || gameState.gameEnded) return;
      var input = ev.currentTarget;
      var v = input.value.replace(/[^0-9]/g, '');
      if (v !== input.value) input.value = v;
      try { if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(v.length > 0); } catch (e) {}
      // Any keystroke resets the idle hint timer.
      armIdleHint();
    }
    function onInputKey(ev) {
      if (ev.key === 'Enter') { ev.preventDefault(); handleSubmit(); }
    }

    function handleSubmit() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      var input = document.getElementById('answer-input');
      if (!input) return;
      var raw = (input.value || '').trim();
      if (raw.length === 0) return;
      var value = parseInt(raw, 10);
      if (isNaN(value)) return;

      gameState.isProcessing = true;
      input.disabled = true;
      clearIdleHint();
      try { if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(false); } catch (e) {}

      var round = gameState.activeRounds[gameState.currentRound];
      var responseMs = Date.now() - gameState.roundStartMs;
      var isCorrect = value === round.answer;

      var expEl = document.getElementById('wwExplain');
      if (expEl) { expEl.textContent = round.explanation; expEl.classList.remove('hidden-init'); }

      if (isCorrect) {
        input.classList.add('is-correct');
        gameState.score += 1;
        gameState.progress = gameState.currentRound + 1;
        try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
        syncDOM();
        recordAttempt(raw, true, null, responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: true, value: value });
        runCorrectFeedbackAndAdvance(round);
      } else {
        input.classList.add('is-wrong');
        gameState.lives = Math.max(0, gameState.lives - 1);
        gameState.progress = gameState.currentRound + 1;
        try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
        syncDOM();
        var miscTag = (round.misconception_tags && round.misconception_tags[String(value)]) || null;
        recordAttempt(raw, false, miscTag, responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: false, value: value, misconception: miscTag });
        runWrongFeedbackAndAdvance(round, value, miscTag);
      }
    }

    /* Concept §"Feel and motivation": "Hints are diagnostic, not preachy. The
       wrong-answer hint depends on which canonical mistake the student made.
       Typing 15 means 'you computed the cost of one day'; typing 45 means
       'you computed the total spent, not the remainder'; typing 85 means 'you
       only counted one day'. The hint names the slip and points at the next
       move — never lectures." */
    function diagnosticHintFor(round, value, miscTag) {
      if (round && round.pattern_hints && round.pattern_hints[String(value)]) {
        return round.pattern_hints[String(value)];
      }
      switch (miscTag) {
        case 'one-day-only':
        case 'one-week-only':
        case 'one-notebook-only':
        case 'one-pencil-only':
        case 'one-friend-only':
        case 'one-dog-only':
          return "You added the leftover " + value + " — but that's only one step of the pattern. Multiply by how many.";
        case 'forgot-to-subtract':
          return "That's the total spent. Now subtract it from the starting amount.";
        case 'subtracted-once':
          return "You subtracted only one day's cost. Multiply by the number of days first.";
        case 'gave-money-left':
        case 'gave-distance-walked':
        case 'gave-pages-read':
        case 'gave-stickers-given':
          return "Close — but the question asks for what's left or short, not what was used.";
        case 'mistook-savings':
          return "Savings grow, they don't add to the allowance. Just multiply rate × time.";
        default:
          return null;
      }
    }

    function runCorrectFeedbackAndAdvance(round) {
      (async function () {
        try { await awaitedFeedbackSound('correct_sound_effect', { sticker: STICKER_CORRECT }); } catch (e) {}
        try { await playDynamicFeedback({ audio_content: round.correctTTS, subtitle: round.correctSubtitle, sticker: STICKER_CORRECT }); } catch (e) {}
        advanceAfterFeedback();
      })();
    }
    function runWrongFeedbackAndAdvance(round, value, miscTag) {
      (async function () {
        try { await awaitedFeedbackSound('incorrect_sound_effect', { sticker: STICKER_SAD }); } catch (e) {}
        var diag = diagnosticHintFor(round, value, miscTag);
        var ttsText = diag || round.wrongTTS;
        var subtitleText = diag || round.wrongSubtitle;
        try { await playDynamicFeedback({ audio_content: ttsText, subtitle: subtitleText, sticker: STICKER_SAD }); } catch (e) {}
        advanceAfterFeedback();
      })();
    }
    function advanceAfterFeedback() {
      var roundJustPlayed = gameState.currentRound + 1;
      if (gameState.lives === 0) { gameState.stars = getStars(); endGame(false); return; }
      if (roundJustPlayed === gameState.totalRounds) { endGame(true); return; }
      showRoundIntro(roundJustPlayed + 1);
    }

    async function showRoundIntro(n) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      var ttsText = 'Round ' + n;
      await transitionScreen.show({
        title: 'Round ' + n,
        icons: [],
        persist: true,
        buttons: [],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_ROUND }); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          })();
        }
      });

      // Safety timeout if audio stalls
      setTimeout(function () {
        try {
          if (gameState.gameEnded) return;
          if (gameState.currentRound + 1 < n) {
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          }
        } catch (e) {}
      }, 9000);
    }

    function endGame(victory) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;
      clearIdleHint();
      gameState.stars = getStars();
      if (victory) { gameState.phase = 'results'; syncDOM(); postGameComplete(); showVictory(); }
      else { gameState.phase = 'game_over'; syncDOM(); postGameComplete(); showGameOver(); }
      trackEvent('game_end', { victory: victory, stars: gameState.stars, score: gameState.score });
    }

    function _victoryClaimAction() { try { FeedbackManager.sound.pause(); } catch (e) {} try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {} try { transitionScreen.hide(); } catch (e) {} showStarsCollected(); }
    function _victoryPlayAgainAction() { try { FeedbackManager.sound.pause(); } catch (e) {} try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {} try { transitionScreen.hide(); } catch (e) {} showMotivation(); }

      var stars = gameState.stars;

      var ttsText = stars === 3 ? 'Brilliant! Three stars!' : 'Great job — try again for more stars!';

      await transitionScreen.show({
        title: 'Victory', subtitle: subtitle, stars: stars,

          ? [{ text: 'Claim Stars', type: 'primary', action: _victoryClaimAction }]
          : [

            ],
        persist: true,
        onMounted: function () {
          (async function () {
            try { await safePlaySound(sfxId, { sticker: STICKER_VICTORY }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_CELEBRATE }); } catch (e) {}
          })();

    async function showGameOver() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}

      await transitionScreen.show({
        title: 'Game Over', subtitle: subtitle, icons: ['😔'], stars: 0, persist: true,
        buttons: [{
          text: 'Try Again', type: 'primary',
          action: function () {

          }
        }],

          (async function () {
            try { await safePlaySound('game_over_sound_effect', { sticker: STICKER_GAMEOVER }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: subtitle, subtitle: subtitle, sticker: STICKER_GAMEOVER }); } catch (e) {}

    async function showMotivation() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = 'Ready to improve your score?';
      await transitionScreen.show({
        title: 'Ready to improve your score?', icons: ['⚡'], persist: true,
        buttons: [{
          text: "I'm ready", type: 'primary',
          action: function () {

            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_MOTIVATE }); } catch (e) {}

    async function showStarsCollected() {
      gameState.phase = 'stars_collected';
      syncDOM();
      await transitionScreen.show({
        title: "Yay!\nStars collected!", buttons: [], persist: true,
        styles: { title: { whiteSpace: 'pre-line', lineHeight: '1.3' } },
        onMounted: function () {
          (async function () {
            try { await safePlaySound('victory_sound_effect', { sticker: STICKER_VICTORY }); } catch (e) {}
            try {
              window.postMessage({
                type: 'show_star',
                data: { count: gameState.stars, variant: 'yellow', score: gameState.score + '/' + gameState.totalRounds }
              }, '*');
            } catch (e) {}
            setTimeout(showAnswerCarousel, 1500);
          })();
        }
      });
    }

    function renderAnswerSlide(container, round) {
      if (!container || !round) return;
      var html = '<div style="padding:14px 12px;text-align:center;">';
      html += '<div class="ww-story" style="text-align:left;">' + escapeHTML(round.story) + '</div>';
      html += '<div style="font-size:18px;font-weight:800;color:var(--mathai-success);margin:8px 0;">Answer: ' + (round.prefix ? escapeHTML(round.prefix) + ' ' : '') + escapeHTML(String(round.answer)) + (round.unit ? ' ' + escapeHTML(round.unit) : '') + '</div>';
      html += '<div class="ww-explain" style="display:block;">' + escapeHTML(round.explanation) + '</div>';
      html += '</div>';
      container.innerHTML = html;
    }
    function buildAnswerSlidesForAllRounds() {
      var rounds = gameState.activeRounds;
      var slides = [];
      for (var i = 0; i < rounds.length; i++) {
        (function (r) { slides.push({ render: function (container) { renderAnswerSlide(container, r); } }); })(rounds[i]);
      }
      return slides;
    }
    function showAnswerCarousel() {
      try { answerComponent.show({ slides: buildAnswerSlidesForAllRounds() }); } catch (e) {}
      try { if (floatingBtn) floatingBtn.setMode('next'); } catch (e) {}
      try {
        setTimeout(function () {
          var slot = document.getElementById('mathai-answer-slot');
          if (slot && slot.scrollIntoView) slot.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 200);
      } catch (e) {}
    }

    function setupGame() {
      var content = gameState.content || fallbackContent;
      gameState.content = content;
      gameState.totalRounds = content.totalRounds || 10;
      gameState.totalLives = content.totalLives || 3;
      gameState.lives = gameState.totalLives;
      gameState.activeRounds = getRounds();
      injectGameHTML();
      renderInitialState();
      var input = document.getElementById('answer-input');
      if (input) { input.addEventListener('input', onInputChange); input.addEventListener('keydown', onInputKey); }
      try {
        previewScreen.show({
          instruction: content.previewInstruction || fallbackContent.previewInstruction,
          audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
          showGameOnPreview: content.showGameOnPreview === true,
          onComplete: function (previewData) { startGameAfterPreview(previewData); }
        });
      } catch (e) { console.error('[previewScreen.show failed]', e && e.message, e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
    }
    function startGameAfterPreview(previewData) {
      gameState.previewResult = previewData || {};
      gameState.duration_data.preview = gameState.duration_data.preview || [];
      gameState.duration_data.preview.push({ duration: (previewData && previewData.duration) || 0 });
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      try { if (progressBar) { progressBar.show(); progressBar.update(0, gameState.totalLives); } } catch (e) {}
      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex] });
      try { if (signalCollector && signalCollector.recordViewEvent) signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}
      showWelcome();
    }
    async function showWelcome() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = "Let's play! Read each story and type the number.";
      await transitionScreen.show({
        title: 'Welcome!', icons: ['👋'], persist: true,
        buttons: [{
          text: "Let's go!", type: 'primary',
          action: function () {
            try { FeedbackManager.sound.pause(); } catch (e) {}
            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            showRoundIntro(1);
          }
        }],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('sound_level_transition', { sticker: STICKER_LEVEL }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_LEVEL }); } catch (e) {}
          })();
        }
      });
    }

    function resetGameState() {
      gameState.phase = 'gameplay';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState._gameCompletePosted = false;
      gameState.stars = 0;
      gameState.correctAnswer = null;
      gameState.progress = 0;
      gameState.duration_data = { startTime: null, endTime: null, preview: gameState.duration_data.preview || [] };
      gameState.activeRounds = getRounds();
      clearIdleHint();
      try { if (answerComponent && answerComponent.update) answerComponent.update({ slides: [] }); if (answerComponent && answerComponent.hide) answerComponent.hide(); } catch (e) {}
    }

    function restartGame() {
      var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
      gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      resetGameState();
      try { if (signalCollector && signalCollector.reset) signalCollector.reset(); } catch (e) {}
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      try { if (progressBar) progressBar.update(0, gameState.totalLives); } catch (e) {}
      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex], restart: true });
      showRoundIntro(1);
    }

    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      var t = event.data.type;
      var data = event.data.data || {};
      if (t === 'game_init') {
        gameState.phase = 'playing';
        if (data.content) gameState.content = data.content;
        gameState.signalConfig = data.signalConfig || {};
        if (data.signalConfig && signalCollector && signalCollector.applyConfig) {
          try { signalCollector.applyConfig(data.signalConfig); } catch (e) {}
        }
        try {
          if (signalCollector) {
            signalCollector.gameId = 'word-problem-typed-numeric-answer';
            if (data.sessionId) signalCollector.sessionId = data.sessionId;
            if (data.studentId) signalCollector.studentId = data.studentId;
            if (data.contentSetId) signalCollector.contentSetId = data.contentSetId;
            if (data.signalConfig && data.signalConfig.flushUrl) signalCollector.flushUrl = data.signalConfig.flushUrl;
            if (data.signalConfig && data.signalConfig.playId) signalCollector.playId = data.signalConfig.playId;
            if (signalCollector.startFlushing) { try { signalCollector.startFlushing(); } catch (e) {} }
          }
        } catch (e) {}
        syncDOM();
        setupGame();
      }
    }

          var doInit = initP && initP.then ? initP : Promise.resolve();
          doInit.then(function () {
            try {
              try {
                signalCollector = new SignalCollector({
                  sessionId: 'word-problem-typed-numeric-answer-' + Date.now(),
                  studentId: 'standalone',
                  gameId: 'word-problem-typed-numeric-answer',

                });
                window.signalCollector = signalCollector;
              } catch (e) { console.error('[SignalCollector ctor failed]', e && e.message, e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
              try { ScreenLayout.inject('app', { slots: { previewScreen: true, progressBar: true, transitionScreen: true, floatingButton: true, answerComponent: true } }); } catch (e) { console.error('[ScreenLayout.inject failed]', e && e.message, e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
              injectGameHTML();
              renderInitialState();
              try {
                visibilityTracker = new VisibilityTracker({
                  popupProps: { title: 'Paused', description: 'Tap Resume to continue.', primaryText: 'Resume' },

                    if (gameState.isActive && !gameState.isProcessing && !gameState.gameEnded) armIdleHint();

                });
              } catch (e) { console.error('[VisibilityTracker ctor failed]', e && e.message, e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
              try { progressBar = new ProgressBarComponent({ slotId: 'mathai-progress-slot', totalRounds: 10, totalLives: 3 }); } catch (e) { console.error('[ProgressBarComponent ctor failed]', e && e.message, e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
              try { transitionScreen = new TransitionScreenComponent({ slotId: 'mathai-transition-slot' }); } catch (e) { console.error('[TransitionScreenComponent ctor failed]', e && e.message, e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
              try { previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' }); } catch (e) { console.error('[PreviewScreenComponent ctor failed]', e && e.message, e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
              try { floatingBtn = new FloatingButtonComponent({ slotId: 'mathai-floating-button-slot' }); } catch (e) { console.error('[FloatingButtonComponent ctor failed]', e && e.message, e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
              try { answerComponent = new AnswerComponentComponent({ slotId: 'mathai-answer-slot' }); } catch (e) { console.error('[AnswerComponentComponent ctor failed]', e && e.message, e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
              try {
                if (floatingBtn && floatingBtn.on) {
                  floatingBtn.on('submit', function () { handleSubmit(); });
                  floatingBtn.on('next', function () {
                    try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
                    try { if (answerComponent) answerComponent.destroy(); } catch (e) {}
                    try { if (previewScreen) previewScreen.destroy(); } catch (e) {}
                    try { if (floatingBtn) floatingBtn.destroy(); } catch (e) {}
                  });
                }
              } catch (e) {}
              try {
                FeedbackManager.sound.preload([
                  { id: 'correct_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
                  { id: 'incorrect_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                  { id: 'rounds_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                  { id: 'sound_level_transition',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
                  { id: 'victory_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                  { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
                  { id: 'game_over_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                  { id: 'tap_sound',                url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
                ]);
              } catch (e) { console.error('[FeedbackManager.preload failed]', e && e.message, e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
              window.addEventListener('message', handlePostMessage);
              try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
              setupGame();
            } catch (e) { console.error('[init inner] ' + (e && e.message), e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
          }, function (e) { console.error('[FeedbackManager.init failed]', e && e.message, e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); });
        } catch (e) { console.error('[init outer] ' + (e && e.message), e); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }
      }, function (err) { console.error('[waitForPackages rejected] ' + (err && err.message)); if (typeof Sentry !== 'undefined') Sentry.captureException(err); });

      setTimeout(function () {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;
        var missing = [];
        if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
        if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
        if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
        if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
        if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
        if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
        if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
        if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
        if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
        if (missing.length > 0) {
          var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
          console.error('[' + msg + ']');
          if (typeof Sentry !== 'undefined') Sentry.captureMessage(msg);
          var gc = document.getElementById('gameContent') || document.getElementById('app') || document.body;
          if (gc) gc.innerHTML = '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">Game failed to load — please refresh.</div>';
          return;
        }
      }, 2000);

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = setupGame;
      window.renderRound = renderRound;
      window.loadRound = function (n) { try { renderRound(n); } catch (e) {} };
    });
  </script>
</body>
</html>
