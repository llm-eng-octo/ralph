<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Operator's Maze</title>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({ release: 'operators-maze@1.0.0' }));
    }
  </script>
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script>window.addEventListener('load', initSentry);</script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-primary: #270f36;
      --mathai-blue: #3B82F6;
      --mathai-success: #22c55e;
      --mathai-amber: #F59E0B;
      --mathai-cell-bg-amber: #FEF3C7;
      --mathai-red: #DC2626;
      --mathai-amber: #F59E0B;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-text-primary: #4a4a4a;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-amber: #FFF3CD;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; margin: 0; padding: 0; overscroll-behavior: none; }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
      min-height: 100dvh;
    }
    @supports not (min-height: 100dvh) { body { min-height: 100vh; } }
    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex; flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    @supports not (min-height: 100dvh) { #app { min-height: 100vh; } }
    button, [role="button"] { min-height: 44px; min-width: 44px; touch-action: manipulation; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: var(--mathai-white); color: var(--mathai-primary);
        font-size: 18px; text-align: center; padding: 24px;
      }
    }

    #gameContent {
      width: 100%;
      padding: 8px 12px 110px 12px;
      display: flex; flex-direction: column; align-items: center;
      box-sizing: border-box;
    }

    .om-wrapper { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; }
    .om-wrapper.locked { pointer-events: none; }

    .om-grid {
      display: grid;
      grid-template-columns: repeat(5, 56px);
      grid-template-rows: repeat(5, 56px);
      grid-gap: 4px;
      margin: 8px auto;
    }
    .om-cell {
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800;
      border-radius: 8px;
      box-sizing: border-box;
    }
    .om-cell.empty { background: transparent; }
    .om-cell.fixed { background: var(--mathai-light-gray); border: 2px solid var(--mathai-gray); color: var(--mathai-primary); }
    .om-cell.op { background: transparent; color: var(--mathai-blue); font-size: 20px; font-weight: 700; }
    .om-cell.slot { background: #FAFAFA; border: 2px dashed var(--mathai-gray); color: var(--mathai-text-primary); }
    .om-cell.slot.match { background: var(--mathai-cell-bg-green); border-color: #22c55e; border-style: solid; }
    .om-cell.slot.mismatch { background: var(--mathai-cell-bg-red); border-color: var(--mathai-red); border-style: solid; }
    .om-cell.slot.warn { background: var(--mathai-cell-bg-amber); border-color: var(--mathai-amber); border-style: solid; }

    .om-pool {
      width: 100%; max-width: 360px;
      display: grid;
      grid-template-columns: repeat(auto-fill, 50px);
      gap: 6px;
      justify-content: center;
      padding: 10px;
      background: #F1F5F9;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      margin-top: 8px;
    }
    .om-pool-slot {
      width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .om-pool-slot.empty { display: none; }
    .pool-slot.empty { display: none; }

    .om-tile {
      width: 50px; height: 50px;
      border-radius: 8px;
      background: var(--mathai-white);
      border: 2px solid var(--mathai-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: var(--mathai-primary);
      cursor: grab;
      touch-action: none;
      user-select: none;
      box-sizing: border-box;
    }
    .om-tile:active { cursor: grabbing; }
    .om-cell.slot .om-tile { width: 44px; height: 44px; font-size: 18px; }

    .answer-slide { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 8px 4px 12px 4px; }
    .answer-caption { font-size: 13px; font-weight: 600; color: var(--mathai-text-primary); margin-bottom: 6px; text-align: center; }
  </style>
</head>

  <script>

      previewAudio: null,

    function recordAttempt(round, isCorrect, misconceptionTags) {
      try {
        var now = Date.now();
        var userAns = {};
        Object.keys(gameState.placement).forEach(function (sid) {
          var tk = gameState.placement[sid];
          var tEl = tileEls[tk];
          userAns[sid] = tEl ? tEl.getAttribute('data-value') : '';
        });
        var correctAns = {};
        round.grid.forEach(function (cell) { if (cell.type === 'slot') correctAns[cell.id] = cell.correct; });
        var attempt = {
          attempt_number: gameState.attempts.length + 1,
          round_number: gameState.currentRound,
          question_id: round && round.id ? round.id : ('r' + gameState.currentRound),
          question_text: 'Operator\'s Maze — set ' + (round && round.set ? round.set : '?') + ' round ' + gameState.currentRound,
          user_answer: JSON.stringify(userAns),
          correct_answer: JSON.stringify(correctAns),
          is_correct: !!isCorrect,
          response_time_ms: gameState.roundStartTime ? (now - gameState.roundStartTime) : 0,
          misconception_tag: (misconceptionTags && misconceptionTags.length > 0) ? misconceptionTags[0] : null,
          difficulty_level: round && round.stage ? round.stage : 1,
          hint_used: false,
          attempt_timestamp: now,
          set: round && round.set,
          misconception_tags_all: misconceptionTags || []
        };
        gameState.attempts.push(attempt);
      } catch (e) { console.error('[recordAttempt]', e && e.message); }

      if (lost === 1) return 2;
      if (lost === 2) return 1;
      return 0;

    function getAvailableSets(rounds) {
      var seen = {};
      for (var i = 0; i < rounds.length; i++) if (rounds[i].set) seen[rounds[i].set] = true;
      var keys = Object.keys(seen).sort();
      return keys.length > 0 ? keys : ['A'];
    }
    function getRounds() {
      var source = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(source);
      var startIdx = gameState.setIndex % sets.length;
      var setId = sets[startIdx];
      var setRounds = source.filter(function (r) { return r.set === setId; });
      if (setRounds.length >= gameState.totalRounds) return setRounds.slice(0, gameState.totalRounds);
      return source.slice(0, gameState.totalRounds);
    }

            typeof TimerComponent !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            reject(err);
            throw new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    function handlePostMessage(event) {
      try {
        var msg = event && event.data;
        if (!msg || typeof msg !== 'object') return;
        if (msg.type === 'game_init') {
          gameState.phase = 'playing';
          gameState.content = msg.data && msg.data.content ? msg.data.content : null;
          if (msg.data && typeof msg.data.totalRounds === 'number') gameState.totalRounds = msg.data.totalRounds;
          try {
            var sc = msg.data && msg.data.signalConfig ? msg.data.signalConfig : {};
            gameState.signalConfig = sc;
            if (signalCollector) {
              signalCollector.flushUrl = sc.flushUrl || signalCollector.flushUrl || '';
              signalCollector.playId = sc.playId || signalCollector.playId || ('operators-maze-' + Date.now());
              signalCollector.gameId = sc.gameId || 'operators-maze';
              signalCollector.sessionId = sc.sessionId || ('session-' + Date.now());
              signalCollector.contentSetId = sc.contentSetId || 'fallback';
              signalCollector.studentId = sc.studentId || 'anonymous';
              if (typeof signalCollector.startFlushing === 'function') {
                try { signalCollector.startFlushing(); } catch (e2) {}
              }
            }
          } catch (e1) {}
          syncDOM();
          setupGame();
        } else if (msg.type === 'game_pause') {
          try { FeedbackManager.sound.pause(); } catch (e) {}
        } else if (msg.type === 'game_resume') {
          try { FeedbackManager.sound.resume(); } catch (e) {}
        }
      } catch (e) { console.error('[handlePostMessage]', e && e.message); }
    }

    async function endGame(success) {
      if (gameState.gameEnded) return;
      try { FeedbackManager.sound['stopAll'](); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.phase = 'results';
      gameState.stars = getStars(gameState.score);
      syncDOM();
      trackEvent('game_end', { won: !!success, score: gameState.score, stars: gameState.stars });
      try {
        var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
        var elapsedSec = Math.round(elapsedMs / 1000);
        var accuracy = gameState.totalRounds > 0 ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0;
        var triesArr = [];
        for (var ai = 0; ai < gameState.attempts.length; ai++) triesArr.push(1);
        var signalSealed = { event_count: gameState.events.length, metadata: {} };
        try {
          if (signalCollector && typeof signalCollector.seal === 'function') {
            var sealed = signalCollector.seal();
            if (sealed) {
              if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count;
              if (sealed.metadata) signalSealed.metadata = sealed.metadata;
            }
          }
        } catch (e0) {}
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: {
              score: gameState.score,
              totalQuestions: gameState.totalRounds,
              stars: gameState.stars,
              accuracy: accuracy,
              time: elapsedSec,
              timeSpent: elapsedMs,
              tries: triesArr,
              attempts: gameState.attempts
            },
            completedAt: Date.now(),
            previewResult: gameState.previewResult || null,
            signal_event_count: signalSealed.event_count,
            signal_metadata: signalSealed.metadata
          }
        }, '*');
      } catch (e) { console.error('[endGame postMessage]', e && e.message); }
      if (gameState.lives <= 0 && !success) { try { showGameOver(); } catch (e) {} }
      else { try { showVictory(success); } catch (e) {} }
    }

    function renderGrid(round) {
      slotEls = {};
      var grid = document.getElementById('om-grid');
      if (!grid) return;
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = 'repeat(' + round.cols + ', 56px)';
      grid.style.gridTemplateRows = 'repeat(' + round.rows + ', 56px)';
      for (var i = 0; i < round.grid.length; i++) {
        var cell = round.grid[i];
        var c = document.createElement('div');
        c.className = 'om-cell ' + cell.type;
        if (cell.type === 'fixed') {
          c.textContent = String(cell.val);
        } else if (cell.type === 'op') {
          c.textContent = String(cell.val);
        } else if (cell.type === 'slot') {
          c.id = 'om-slot-' + cell.id;
          c.setAttribute('data-zone-id', cell.id);
          c.setAttribute('data-slot-id', cell.id);
          slotEls[cell.id] = c;
        }
        grid.appendChild(c);
      }
    }

    function buildPool(round) {
      tileEls = {};
      poolSlotEls = {};
      var pool = document.getElementById('om-pool');
      if (!pool) return;
      pool.innerHTML = '';
      var pool2 = round.pool.slice();
      pool2.forEach(function (val, idx) {
        var key = 't-' + idx;
        var slot = document.createElement('div');
        slot.className = 'om-pool-slot pool-slot';
        slot.id = 'om-pool-slot-' + key;
        slot.setAttribute('data-pool-key', key);
        var tile = makeTile(val, idx);
        slot.appendChild(tile);
        pool.appendChild(slot);
        tileEls[key] = tile;
        poolSlotEls[key] = slot;
        gameState.tileLocations[key] = 'pool';
      });
    }

    function makeTile(val, idx) {
      var tile = document.createElement('div');
      tile.className = 'om-tile';
      tile.id = 'tile-' + idx;
      tile.setAttribute('data-tile-id', 't-' + idx);
      tile.setAttribute('data-value', String(val));
      tile.textContent = String(val);
      return tile;
    }

    function refreshSubmittable() {
      if (!floatingBtn) return;
      var round = getCurrentRound();
      if (!round) { try { floatingBtn.setSubmittable(false); } catch (e) {} return; }
      var allFilled = true;
      for (var i = 0; i < round.grid.length; i++) {
        var cell = round.grid[i];
        if (cell.type === 'slot') {
          if (!gameState.placement[cell.id]) { allFilled = false; break; }
        }
      }
      try { floatingBtn.setSubmittable(allFilled && !gameState.isProcessing); } catch (e) {}
    }

    function placeTileInSlot(tileKey, slotId) {
      // If slot already has a tile, return that tile to pool first.
      var prevTileKey = gameState.placement[slotId];
      if (prevTileKey && prevTileKey !== tileKey) returnTileToPool(prevTileKey);
      // If this tile was in another slot, vacate that one.
      var prevSlot = gameState.tileLocations[tileKey];
      if (prevSlot && prevSlot !== 'pool' && prevSlot !== slotId) {
        gameState.placement[prevSlot] = null;
        var psEl = slotEls[prevSlot];
        if (psEl) psEl.classList.remove('match','mismatch','warn');
      }
      var tile = tileEls[tileKey];
      var slot = slotEls[slotId];
      if (!tile || !slot) return;
      slot.appendChild(tile);
      tile.classList.add('in-slot');
      if (poolSlotEls[tileKey]) poolSlotEls[tileKey].classList.add('empty');
      gameState.placement[slotId] = tileKey;
      gameState.tileLocations[tileKey] = slotId;
    }

    function returnTileToPool(tileKey) {
      var tile = tileEls[tileKey];
      var slot = poolSlotEls[tileKey];
      if (!tile || !slot) return;
      slot.appendChild(tile);
      tile.classList.remove('in-slot');
      slot.classList.remove('empty');
      tile.style.position = '';
      tile.style.left = '';

            sensors: [ PointerSensor.configure({ activationConstraints: [ new PointerActivationConstraints.Distance({ value: 3 }) ] }) ]
          });
          dndManager.monitor.addEventListener('dragend', handleDragEnd);
          dndManager.monitor.addEventListener('dragstart', handleDragStart);
        } catch (e) {
          console.error('[DragDropManager]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          try {
            dndManager = new window.DnDKit.DragDropManager();
            dndManager.monitor.addEventListener('dragend', handleDragEnd);
            dndManager.monitor.addEventListener('dragstart', handleDragStart);
          } catch (er) {}
        }

        preloadAudio();
        window.addEventListener('message', handlePostMessage);
        try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
        setupGame();
      } catch (e) {
        console.error('[init]', e && e.message);
        if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
      }

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = startGame;
      window.nextRound = nextRound;
      window.loadRound = function (n) {
        if (typeof n === 'number' && n >= 1 && n <= gameState.totalRounds) {
          gameState.currentRound = n;
          renderRound();
        }
      };
    });

    setTimeout(function () {
      if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
      if (gameState.isActive || gameState.gameEnded) return;
      var missing = [];
      if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
      if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
      if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
      if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
      if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
      if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
      if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
      if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
      if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
      if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
      if (missing.length > 0) {
        var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
        console.error('[' + msg + ']');
        if (typeof Sentry !== 'undefined') { try { Sentry.captureMessage(msg); } catch (e) {} }
        var gc = document.getElementById('gameContent') || document.body;
        if (gc) { gc.innerHTML = '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">Game failed to load — please refresh.</div>'; }
        return;
      }
      if (!document.getElementById('gameContent')) buildFallbackLayout();
      gameState.content = fallbackContent;
      gameState.totalRounds = fallbackContent.rounds.length / 3;
      setupGame();
      startGame();
    }, 2000);
  </script>
</body>
</html>
