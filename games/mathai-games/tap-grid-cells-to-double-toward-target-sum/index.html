<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Double Trouble — Doubling Toward Target</title>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-cell-border-gold: #d4a017;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100dvh;
      overflow-x: hidden;
      overscroll-behavior: none;
    }
    @supports not (height: 100dvh) {
      html, body { height: 100vh; }
    }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }
    .hidden { display: none !important; }
    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }
    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }
    #gameContent {
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 8px 16px 24px;
    }
    .dt-rounds-progress {
      max-width: 320px;
      margin: 6px auto 12px;
    }
    .dt-rounds-progress-label {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--mathai-primary);
      margin-bottom: 6px;
    }
    .dt-rounds-progress-track {
      height: 10px;
      background: var(--mathai-light-gray);
      border: 1.5px solid var(--mathai-border-gray);
      border-radius: 999px;
      overflow: hidden;
    }
    .dt-rounds-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--mathai-purple);
      transition: width 280ms ease;
    }
    .dt-progress-line {
      text-align: center;
      font-size: 14px;
      color: var(--mathai-gray);
      margin: 6px 0 8px;
    }
    .dt-target-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--mathai-light-gray);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 14px;
    }
    .dt-target-label {
      font-size: 12px;
      color: var(--mathai-gray);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .dt-target-value {
      font-size: 26px;
      font-weight: 800;
      color: var(--mathai-purple);
    }
    .dt-current-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--mathai-primary);
    }
    .dt-target-side, .dt-current-side {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .dt-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-gap: 8px;
      max-width: 360px;
      margin: 0 auto 14px;
    }
    .dt-cell {
      aspect-ratio: 1 / 1;
      min-height: 60px;
      min-width: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--mathai-white);
      border: 2px solid var(--mathai-border-gray);
      border-radius: 10px;
      font-size: 22px;
      font-weight: 800;
      color: var(--mathai-primary);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }
    .dt-cell:active { transform: scale(0.96); }
    .dt-cell.doubled {
      background: var(--mathai-cell-bg-yellow);
      border-color: var(--mathai-cell-border-gold);
      color: var(--mathai-orange);
    }
    .dt-cell.correct-flash {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
      color: #219653;
    }
    .dt-cell.wrong-flash {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-red);
      animation: shake 0.5s ease;
    }
    .dt-cell.disabled { opacity: 0.6; pointer-events: none; }

    .dt-actions {
      display: flex;
      justify-content: center;
      margin-top: 6px;
    }
    .dt-reset-link {
      font-size: 14px;
      color: var(--mathai-blue);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 6px 12px;
      text-decoration: underline;
      font-family: var(--mathai-font-family);
      min-height: 44px;
      min-width: 44px;
    }

    .dt-answer-card {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      padding: 12px;
      text-align: center;
    }
    .dt-answer-target {
      font-size: 22px;
      font-weight: 800;
      color: var(--mathai-purple);
      margin-bottom: 8px;
    }
    .dt-answer-line {
      font-size: 16px;
      color: var(--mathai-text-primary);
      margin: 6px 0;
    }
    .dt-answer-explanation {
      font-size: 14px;
      color: var(--mathai-gray);
      margin-top: 6px;
    }

    button, [role="button"], .dt-cell {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }
    #app {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white);
        color: var(--mathai-primary);
        font-family: var(--mathai-font-family);
        font-size: 18px;
        text-align: center;
        padding: 24px;
      }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease; }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="3"></div>

  <script>
    var STICKER_CORRECT  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_WRONG    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_LEVEL    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';
    var STICKER_VICTORY  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_TWO      = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_ONE      = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_CELEBRATE = STICKER_VICTORY;
    var STICKER_SAD      = STICKER_WRONG;
    var STICKER_MOTIVATE = STICKER_LEVEL;

    /* Tightened 3-round arc:
         round 1 = single-tap (one cell to double hits target)
         round 2 = two-tap-pair (two cells together hit target)
         round 3 = three-tap-planning (three cells together hit target) */
    var fallbackContent = {
      previewInstruction: '<p><b>Double Trouble!</b> Tap cells to double them and reach the target sum exactly. Tap a doubled cell again to undo.</p><p>3 lives, 3 rounds.</p>',
      previewAudioText: 'Tap cells to double them. Reach the target sum exactly, then submit. Tap again to undouble. Three lives, three rounds.',
      previewAudio: null,
      showGameOnPreview: false,
      totalRounds: 3,
      totalLives: 3,
      answerComponent: true,
      rounds: [
        // Set A — 3 rounds (single → pair → triple)
        { set:'A', id:'A_r1_dt1', round:1, stage:1,
          grid:[1,2,3,1, 2,4,1,3, 1,2,3,1, 2,1,3,2], target:35,
          solutionIndices:[5],
          correctTTS:'Right! Doubling the 4 added 4 to the sum.',
          correctSubtitle:'Doubled 4 → +4 = target.',
          wrongTTS:'Doubling one cell adds its value. Find the cell that fills the gap.',
          wrongSubtitle:'Try again — close the gap.' },
        { set:'A', id:'A_r2_dt2', round:2, stage:2,
          grid:[1,2,3,1, 4,1,2,3, 1,2,5,1, 3,1,2,1], target:40,
          solutionIndices:[4,10],
          correctTTS:'Right! Doubling the 4 and the 5 added 9.',
          correctSubtitle:'Doubled 4 + 5 → +9 = target.',
          wrongTTS:'Find the two cells whose sum closes the gap.',
          wrongSubtitle:'Two cells double the gap.' },
        { set:'A', id:'A_r3_dt3', round:3, stage:3,
          grid:[1,2,1,3, 2,1,4,1, 5,2,1,3, 1,2,1,6], target:48,
          solutionIndices:[6,8,15],
          correctTTS:'Right! Doubling 4, 5, and 6 added 15.',
          correctSubtitle:'Doubled 4 + 5 + 6 → +15 = target.',
          wrongTTS:'Three cells must double to add 15.',
          wrongSubtitle:'Three cells double the gap.' },

        // Set B — 3 rounds parallel difficulty
        { set:'B', id:'B_r1_dt1', round:1, stage:1,
          grid:[2,1,3,2, 1,3,2,1, 2,4,1,2, 3,1,2,1], target:34,
          solutionIndices:[9],
          correctTTS:'Right! Doubling the 4 added 4.',
          correctSubtitle:'Doubled 4 → +4 = target.',
          wrongTTS:'One cell doubles to fill the gap.',
          wrongSubtitle:'Try again — close the gap.' },
        { set:'B', id:'B_r2_dt2', round:2, stage:2,
          grid:[1,2,3,1, 2,1,4,2, 1,3,5,1, 2,1,3,2], target:43,
          solutionIndices:[6,10],
          correctTTS:'Right! Doubling 4 and 5 added 9.',
          correctSubtitle:'Doubled 4 + 5 → +9 = target.',
          wrongTTS:'Two cells together double the gap.',
          wrongSubtitle:'Two cells fill the gap.' },
        { set:'B', id:'B_r3_dt3', round:3, stage:3,
          grid:[1,2,1,3, 2,1,4,1, 5,2,6,3, 1,2,1,2], target:50,
          solutionIndices:[6,8,10],
          correctTTS:'Right! Doubling 4, 5, and 6 added 15.',
          correctSubtitle:'Doubled 4 + 5 + 6 → +15 = target.',
          wrongTTS:'Three cells double the gap.',
          wrongSubtitle:'Three cells fill the gap.' },

        // Set C — 3 rounds parallel
        { set:'C', id:'C_r1_dt1', round:1, stage:1,
          grid:[1,3,2,1, 2,1,3,2, 1,4,1,2, 3,1,2,1], target:33,
          solutionIndices:[9],
          correctTTS:'Right! Doubling the 4 added 4.',
          correctSubtitle:'Doubled 4 → +4 = target.',
          wrongTTS:'One cell doubles to fill the gap.',
          wrongSubtitle:'Try again — close the gap.' },
        { set:'C', id:'C_r2_dt2', round:2, stage:2,
          grid:[2,1,3,2, 4,1,2,1, 3,1,5,2, 1,3,2,1], target:43,
          solutionIndices:[4,10],
          correctTTS:'Right! Doubling 4 and 5 added 9.',
          correctSubtitle:'Doubled 4 + 5 → +9 = target.',
          wrongTTS:'Two cells double the gap.',
          wrongSubtitle:'Two cells fill the gap.' },
        { set:'C', id:'C_r3_dt3', round:3, stage:3,
          grid:[1,2,1,3, 2,4,1,5, 1,3,6,2, 1,2,3,1], target:53,
          solutionIndices:[5,7,10],
          correctTTS:'Right! Doubling 4, 5, and 6 added 15.',
          correctSubtitle:'Doubled 4 + 5 + 6 → +15 = target.',
          wrongTTS:'Three cells double the gap.',
          wrongSubtitle:'Three cells fill the gap.' }
      ]
    };

    var SETS = ['A', 'B', 'C'];
    var gameState = {
      gameId: 'tap-grid-cells-to-double-toward-target-sum',
      gameTitle: 'Double Trouble',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 3,
      score: 0,
      lives: 3,
      totalLives: 3,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      duration_data: { startTime: null, endTime: null, preview: [] },
      correctAnswer: null,
      stars: 0,
      setIndex: 0,
      activeRounds: [],
      roundStartMs: 0,
      previewResult: null,
      progress: 0,
      roundToken: 0,
      doubledIndices: {},  // { idx: true }
      currentSum: 0
    };
    window.gameState = gameState;

    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var floatingBtn = null;
    var answerComponent = null;

    function getAvailableSets(rounds) {
      var seen = {}; var out = [];
      for (var i = 0; i < rounds.length; i++) {
        var s = rounds[i].set;
        if (s && !seen[s]) { seen[s] = true; out.push(s); }
      }
      return out.length ? out : ['A'];
    }
    function getRounds() {
      var src = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(src);
      var setKey = sets[gameState.setIndex % sets.length];
      var filtered = [];
      for (var i = 0; i < src.length; i++) {
        if (src[i].set === setKey) filtered.push(src[i]);
      }
      filtered.sort(function (a, b) { return a.round - b.round; });
      return filtered;
    }
    function getCorrectCount() {
      var c = 0;
      for (var i = 0; i < gameState.attempts.length; i++) {
        if (gameState.attempts[i].correct === true) c++;
      }
      return c;
    }
    function getStars() {
      var n = getCorrectCount();
      var t = gameState.totalRounds || 3;
      if (n >= Math.ceil(t * 0.9)) return 3;
      if (n >= Math.ceil(t * 0.6)) return 2;
      if (n >= 1) return 1;
      return 0;
    }
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound + 1);
    }
    function trackEvent(name, payload) {
      try { gameState.events.push({ event: name, ts: Date.now(), data: payload || {} }); } catch (e) {}
      try { if (signalCollector && signalCollector.recordEvent) signalCollector.recordEvent(name, payload || {}); } catch (e) {}
    }
    function recordAttempt(input, correct, misconceptionTag, responseMs) {
      var round = gameState.activeRounds[gameState.currentRound];
      var qid = round ? round.id : ('r' + (gameState.currentRound + 1));
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) : 0,
        input_of_user: input,
        correct: correct === true,
        round_number: gameState.currentRound + 1,
        question_id: qid,
        correct_answer: round ? round.target : null,
        response_time_ms: typeof responseMs === 'number' ? responseMs : 0,
        misconception_tag: misconceptionTag || null,
        difficulty_level: round ? (round.stage || 1) : 1,
        is_retry: false,
        metadata: { set: round ? round.set : null }
      };
      gameState.attempts.push(attempt);
      try { if (signalCollector && signalCollector.recordAttempt) signalCollector.recordAttempt(attempt); } catch (e) {}
    }
    function postGameComplete() {
      if (gameState._gameCompletePosted) return;
      gameState._gameCompletePosted = true;
      var correctCount = getCorrectCount();
      var attempted = gameState.attempts.length;
      var accuracy = attempted === 0 ? 0 : Math.round((correctCount / attempted) * 100);
      var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
      var triesByRound = gameState.attempts.map(function (a) {
        return { round: a.round_number, correct: a.correct === true };
      });
      var metrics = {
        accuracy: accuracy,
        time: Math.round(elapsedMs / 1000),
        stars: gameState.stars,
        attempts: gameState.attempts.slice(),
        duration_data: gameState.duration_data,
        totalLives: gameState.lives,
        tries: triesByRound,
        score: gameState.score,
        correctCount: correctCount,
        previewResult: gameState.previewResult
      };
      var signalSealed = { event_count: gameState.events.length, metadata: {} };
      try {
        if (signalCollector && typeof signalCollector.seal === 'function') {
          var sealed = signalCollector.seal();
          if (sealed) {
            if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count;
            if (sealed.metadata) signalSealed.metadata = sealed.metadata;
          }
        }
      } catch (e0) {}
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: metrics,
            completedAt: Date.now(),
            signal_event_count: signalSealed.event_count,
            signal_metadata: signalSealed.metadata
          }
        }, '*');
      } catch (e) {}
    }
    function safePlaySound(id, opts) {
      try { return FeedbackManager.sound.play(id, opts || {}); }
      catch (e) { return Promise.resolve(); }
    }
    function awaitedFeedbackSound(id, opts) {
      var p = safePlaySound(id, opts || {});
      var floor = new Promise(function (r) { setTimeout(r, 1500); });
      return Promise.all([p, floor]).then(function () {}, function () {});
    }
    function playDynamicFeedback(opts) {
      try { return FeedbackManager.playDynamicFeedback(opts || {}); }
      catch (e) { return Promise.resolve(); }
    }

    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            try { throw new Error('waitForPackages timeout'); } catch (rethrown) { reject(err); return; }
            return reject(err);
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="dt-progress-line" id="dtProgress"></div>' +
        '<div class="dt-rounds-progress" id="dtRoundsProgress">' +
          '<div class="dt-rounds-progress-label" id="dtRoundsProgressLabel">Rounds Completed 0/' + (gameState.totalRounds || 3) + '</div>' +
          '<div class="dt-rounds-progress-track">' +
            '<div class="dt-rounds-progress-fill" id="dtRoundsProgressFill"></div>' +
          '</div>' +
        '</div>' +
        '<div class="dt-target-row">' +
          '<div class="dt-target-side">' +
            '<div class="dt-target-label">Target</div>' +
            '<div class="dt-target-value" id="dtTarget">—</div>' +
          '</div>' +
          '<div class="dt-current-side">' +
            '<div class="dt-target-label">Current</div>' +
            '<div class="dt-current-value" id="dtCurrent">—</div>' +
          '</div>' +
        '</div>' +
        '<div class="dt-grid" id="dtGrid"></div>' +
        '<div class="dt-actions">' +
          '<button type="button" class="dt-reset-link" id="dtResetLink" data-testid="reset-link">Reset</button>' +
        '</div>';
      var resetBtn = document.getElementById('dtResetLink');
      if (resetBtn) resetBtn.addEventListener('click', onResetTap);
    }
    function updateRoundsCompletedBar() {
      var label = document.getElementById('dtRoundsProgressLabel');
      var fill = document.getElementById('dtRoundsProgressFill');
      var done = gameState.score || 0;
      var total = gameState.totalRounds || 3;
      if (label) label.textContent = 'Rounds Completed ' + done + '/' + total;
      if (fill) {
        var pct = total > 0 ? Math.min(100, Math.max(0, (done / total) * 100)) : 0;
        fill.style.width = pct + '%';
      }
    }
    function renderInitialState() {
      var grid = document.getElementById('dtGrid');
      if (grid) grid.innerHTML = '';
      var t = document.getElementById('dtTarget');
      if (t) t.textContent = '—';
      var c = document.getElementById('dtCurrent');
      if (c) c.textContent = '—';
      var pg = document.getElementById('dtProgress');
      if (pg) pg.textContent = '';
    }

    function computeBaseSum(grid) {
      var s = 0;
      for (var i = 0; i < grid.length; i++) s += grid[i];
      return s;
    }

    function renderRound(roundIdxOneBased) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      gameState.currentRound = roundIdxOneBased - 1;
      gameState.isActive = true;
      gameState.phase = 'gameplay';
      gameState.roundToken = (gameState.roundToken || 0) + 1;
      gameState.doubledIndices = {};
      syncDOM();

      var round = gameState.activeRounds[gameState.currentRound];
      if (!round) return;
      var baseSum = computeBaseSum(round.grid);
      gameState._baseSum = baseSum;
      gameState.currentSum = baseSum;
      gameState.correctAnswer = round.target;

      var pg = document.getElementById('dtProgress');
      if (pg) pg.textContent = 'Round ' + roundIdxOneBased + ' of ' + gameState.totalRounds;
      var t = document.getElementById('dtTarget');
      if (t) t.textContent = String(round.target);
      var c = document.getElementById('dtCurrent');
      if (c) c.textContent = String(baseSum);

      var grid = document.getElementById('dtGrid');
      if (grid) {
        grid.innerHTML = '';
        for (var i = 0; i < round.grid.length; i++) {
          var cell = document.createElement('button');
          cell.type = 'button';
          cell.className = 'dt-cell';
          cell.setAttribute('data-idx', String(i));
          cell.setAttribute('data-val', String(round.grid[i]));
          cell.setAttribute('data-round-token', String(gameState.roundToken));
          cell.setAttribute('data-testid', 'cell-' + i);
          cell.id = 'dt-cell-' + i;
          cell.textContent = String(round.grid[i]);
          cell.addEventListener('click', onCellTap);
          grid.appendChild(cell);
        }
      }

      try {
        if (floatingBtn) {
          floatingBtn.setMode('submit');
          floatingBtn.setSubmittable(false);
        }
      } catch (e) {}

      gameState.roundStartMs = Date.now();
      gameState.isProcessing = false;
      try { updateRoundsCompletedBar(); } catch (e) {}
      try {
        var p = safePlaySound('tap_sound', { sticker: null });
        if (p && p.catch) p.catch(function () {});
      } catch (e) {}
      trackEvent('round_start', { round: roundIdxOneBased, set: round.set, baseSum: baseSum, target: round.target });
    }

    function onCellTap(ev) {
      if (gameState.isProcessing || gameState.gameEnded) return;
      var btn = ev.currentTarget;
      var btnRoundToken = btn.getAttribute('data-round-token');
      if (btnRoundToken !== String(gameState.roundToken || '')) return;
      if (btn.classList.contains('disabled')) return;

      var idx = parseInt(btn.getAttribute('data-idx'), 10);
      var val = parseInt(btn.getAttribute('data-val'), 10);

      if (gameState.doubledIndices[idx]) {
        delete gameState.doubledIndices[idx];
        gameState.currentSum -= val;
        btn.classList.remove('doubled');
        btn.textContent = String(val);
      } else {
        gameState.doubledIndices[idx] = true;
        gameState.currentSum += val;
        btn.classList.add('doubled');
        btn.textContent = String(val * 2);
      }
      var c = document.getElementById('dtCurrent');
      if (c) c.textContent = String(gameState.currentSum);
      try {
        var p = safePlaySound('sound_bubble_select', { sticker: null });
        if (p && p.catch) p.catch(function () {});
      } catch (e) {}
      // Submittable when at least one cell doubled
      var anyDoubled = false;
      for (var k in gameState.doubledIndices) {
        if (gameState.doubledIndices.hasOwnProperty(k)) { anyDoubled = true; break; }
      }
      try {
        if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(anyDoubled);
      } catch (e) {}
    }

    function onResetTap() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      var round = gameState.activeRounds[gameState.currentRound];
      if (!round) return;
      gameState.doubledIndices = {};
      gameState.currentSum = gameState._baseSum;
      for (var i = 0; i < round.grid.length; i++) {
        var el = document.getElementById('dt-cell-' + i);
        if (el) {
          el.classList.remove('doubled');
          el.textContent = String(round.grid[i]);
        }
      }
      var c = document.getElementById('dtCurrent');
      if (c) c.textContent = String(gameState.currentSum);
      try { if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(false); } catch (e) {}
    }

    function onSubmitTap() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      handleAnswer(gameState.currentSum);
    }
    function handleAnswer(currentSum) {
      gameState.isProcessing = true;
      var responseMs = Date.now() - gameState.roundStartMs;
      var round = gameState.activeRounds[gameState.currentRound];
      var isCorrect = currentSum === round.target;
      var cells = document.querySelectorAll('#dtGrid .dt-cell');
      for (var i = 0; i < cells.length; i++) cells[i].classList.add('disabled');
      try { if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(false); } catch (e) {}

      if (isCorrect) {
        for (var k in gameState.doubledIndices) {
          if (gameState.doubledIndices.hasOwnProperty(k)) {
            var el = document.getElementById('dt-cell-' + k);
            if (el) el.classList.add('correct-flash');
          }
        }
        gameState.score += 1;
        gameState.progress = gameState.currentRound + 1;
        try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
        try { updateRoundsCompletedBar(); } catch (e) {}
        syncDOM();
        recordAttempt(String(currentSum), true, null, responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: true, sum: currentSum });
        runCorrectFeedbackAndAdvance(round);
      } else {
        for (var m in gameState.doubledIndices) {
          if (gameState.doubledIndices.hasOwnProperty(m)) {
            var el2 = document.getElementById('dt-cell-' + m);
            if (el2) el2.classList.add('wrong-flash');
          }
        }
        gameState.lives = Math.max(0, gameState.lives - 1);
        gameState.progress = gameState.currentRound + 1;
        try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
        syncDOM();
        recordAttempt(String(currentSum), false, null, responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: false, sum: currentSum });
        runWrongFeedbackAndAdvance(round);
      }
    }

    function runCorrectFeedbackAndAdvance(round) {
      (async function () {
        try { await awaitedFeedbackSound('correct_sound_effect', { sticker: STICKER_CORRECT }); } catch (e) {}
        try {
          await playDynamicFeedback({
            audio_content: round.correctTTS,
            subtitle: round.correctSubtitle,
            sticker: STICKER_CORRECT
          });
        } catch (e) {}
        advanceAfterFeedback();
      })();
    }
    function runWrongFeedbackAndAdvance(round) {
      (async function () {
        try { await awaitedFeedbackSound('incorrect_sound_effect', { sticker: STICKER_SAD }); } catch (e) {}
        try {
          await playDynamicFeedback({
            audio_content: round.wrongTTS,
            subtitle: round.wrongSubtitle,
            sticker: STICKER_SAD
          });
        } catch (e) {}
        advanceAfterFeedback();
      })();
    }
    function advanceAfterFeedback() {
      var roundJustPlayed = gameState.currentRound + 1;
      if (gameState.lives === 0) {
        gameState.stars = getStars();
        postGameComplete();
        endGame(false);
        return;
      }
      if (roundJustPlayed === gameState.totalRounds) {
        endGame(true);
        return;
      }
      showRoundIntro(roundJustPlayed + 1);
    }

      try { FeedbackManager.sound.pause(); } catch (e) {}

        icons: [],
        persist: true,
        buttons: [],

          (async function () {

          })();

    function escapeHTML(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function renderAnswerSlide(container, round) {
      if (!container || !round) return;
      var solCells = [];
      for (var i = 0; i < round.solutionIndices.length; i++) {
        solCells.push(round.grid[round.solutionIndices[i]]);
      }
      var html = '';
      html += '<div class="dt-answer-card">';
      html += '<div class="dt-answer-target">Target: ' + escapeHTML(String(round.target)) + '</div>';
      html += '<div class="dt-answer-line">Double these: ' + escapeHTML(solCells.join(', ')) + '</div>';
      html += '<div class="dt-answer-explanation">' + escapeHTML(round.correctSubtitle || '') + '</div>';
      html += '</div>';
      container.innerHTML = html;
    }
    function buildAnswerSlidesForAllRounds() {
      var rounds = gameState.activeRounds;
      var slides = [];
      for (var i = 0; i < rounds.length; i++) {
        (function (r) {
          slides.push({ render: function (container) { renderAnswerSlide(container, r); } });
        })(rounds[i]);
      }
      return slides;
    }
    function showAnswerCarousel() {
      try { answerComponent.show({ slides: buildAnswerSlidesForAllRounds() }); } catch (e) {}
      try { if (floatingBtn) floatingBtn.setMode('next'); } catch (e) {}
      try {
        setTimeout(function () {
          var slot = document.getElementById('mathai-answer-slot');
          if (slot && slot.scrollIntoView) slot.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 200);
      } catch (e) {}
    }

    function setupGame() {

      gameState.content = content;

      gameState.totalLives = content.totalLives || 3;
      gameState.lives = gameState.totalLives;
      gameState.activeRounds = getRounds();
      injectGameHTML();
      renderInitialState();
      try {
        previewScreen.show({
          instruction: content.previewInstruction || fallbackContent.previewInstruction,

          onComplete: function (previewData) { startGameAfterPreview(previewData); }

    function startGameAfterPreview(previewData) {

      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      try {
        if (progressBar) {
          progressBar.show();
          progressBar.update(0, gameState.totalLives);
        }
      } catch (e) {}
      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex] });
      try {
        if (signalCollector && signalCollector.recordViewEvent) {
          signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' });

    function resetGameState() {

      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState._gameCompletePosted = false;

    function restartGame() {

      gameState.startTime = Date.now();

      gameState.duration_data.startTime = new Date().toISOString();

    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      var t = event.data.type;
      var data = event.data.data || {};
      if (t === 'game_init') {
        gameState.phase = 'playing';
        if (data.content) gameState.content = data.content;
        gameState.signalConfig = data.signalConfig || {};
        if (data.signalConfig && signalCollector && signalCollector.applyConfig) {
          try { signalCollector.applyConfig(data.signalConfig); } catch (e) {}
        }
        try {
          if (signalCollector) {
            signalCollector.gameId = gameState.gameId;
            if (data.sessionId) signalCollector.sessionId = data.sessionId;
            if (data.studentId) signalCollector.studentId = data.studentId;
            if (data.contentSetId) signalCollector.contentSetId = data.contentSetId;
            if (data.signalConfig && data.signalConfig.flushUrl) signalCollector.flushUrl = data.signalConfig.flushUrl;
            if (data.signalConfig && data.signalConfig.playId) signalCollector.playId = data.signalConfig.playId;
            if (signalCollector.startFlushing) {
              try { signalCollector.startFlushing(); } catch (e) {}
            }
          }
        } catch (e) {}
        syncDOM();
        setupGame();
      }
    }

                  { id: 'incorrect_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                  { id: 'rounds_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                  { id: 'sound_level_transition',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
                  { id: 'victory_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                  { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
                  { id: 'game_over_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                  { id: 'tap_sound',                url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' },
                  { id: 'sound_bubble_select',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3' }
                ]);
              } catch (e) {
                console.error('[FeedbackManager.preload failed]', e && e.message, e);
              }
              window.addEventListener('message', handlePostMessage);
              try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
              setupGame();
            } catch (e) {
              console.error('[init inner] ' + (e && e.message), e);
            }
          }, function (e) {
            console.error('[FeedbackManager.init failed]', e && e.message, e);
          });
        } catch (e) {
          console.error('[init outer] ' + (e && e.message), e);
        }
      }, function (err) {
        console.error('[waitForPackages rejected] ' + (err && err.message));
      });

      setTimeout(function () {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;
        var missing = [];
        if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
        if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
        if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
        if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
        if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
        if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
        if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
        if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
        if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
        if (missing.length > 0) {
          var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
          console.error('[' + msg + ']');
          var gc = document.getElementById('gameContent') || document.getElementById('app') || document.body;
          if (gc) {
            gc.innerHTML =
              '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">' +
              'Game failed to load — please refresh.' +
              '</div>';
          }
        }
      }, 2000);

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = setupGame;
      window.renderRound = renderRound;
      window.loadRound = function (n) { try { renderRound(n); } catch (e) {} };
      window.debugGame = function () { return gameState; };
    });
  </script>
</body>
</html>
