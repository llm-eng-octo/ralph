<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tag Transform</title>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({ release: 'tag-transform@1.0.0' }));
    }
  </script>
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script>window.addEventListener('load', initSentry);</script>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-primary: #270f36;
      --mathai-blue: #3B82F6;
      --mathai-success: #22c55e;
      --mathai-orange: #F2994A;
      --mathai-red: #DC2626;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-text-primary: #4a4a4a;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cream: #FCF6D7;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; margin: 0; padding: 0; overscroll-behavior: none; }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
      min-height: 100dvh;
    }
    @supports not (min-height: 100dvh) { body { min-height: 100vh; } }
    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    @supports not (min-height: 100dvh) { #app { min-height: 100vh; } }
    button, [role="button"] { min-height: 44px; min-width: 44px; touch-action: manipulation; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: var(--mathai-white); color: var(--mathai-primary);
        font-size: 18px; text-align: center; padding: 24px;
      }
    }

    #gameContent {
      width: 100%;
      padding: 8px 12px 110px 12px;
      display: flex; flex-direction: column; align-items: center;
      box-sizing: border-box;
    }

    .tt-wrapper { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; }
    .tt-wrapper.locked { pointer-events: none; }

    .tt-num-row { display: flex; flex-direction: column; align-items: center; margin-bottom: 8px; }
    .tt-num-label { font-size: 13px; font-weight: 600; color: var(--mathai-text-primary); margin-bottom: 4px; }
    .tt-num-box { display: flex; flex-direction: row; justify-content: center; }
    .tt-digit {
      width: 44px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: var(--mathai-blue);
      background: var(--mathai-cream);
      border: 2px solid var(--mathai-yellow);
      border-radius: 8px;
      margin: 0 3px;
    }

    .tt-drop {
      width: 80px; height: 60px;
      border: 2px dashed var(--mathai-gray);
      border-radius: 12px;
      background: var(--mathai-light-gray);
      display: flex; align-items: center; justify-content: center;
      margin: 8px 0;
      transition: background 0.18s ease, border-color 0.18s ease;
    }
    .tt-drop.match { background: var(--mathai-cell-bg-green); border-color: #22c55e; }
    .tt-drop.over { background: var(--mathai-cell-bg-red); border-color: var(--mathai-red); }
    .tt-drop-label { font-size: 11px; color: var(--mathai-gray); }

    .tt-pool {
      width: 100%; max-width: 360px;
      display: grid;
      grid-template-columns: repeat(auto-fill, 90px);
      gap: 8px;
      justify-content: center;
      padding: 12px;
      background: #F1F5F9;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      margin-top: 8px;
    }
    .tt-timer {
      width: 100%; max-width: 320px;
      display: flex; align-items: center; justify-content: center;
      margin: 4px 0 8px 0;
      min-height: 32px;
    }
    .tt-timer .tt-timer-text {
      font-size: 18px; font-weight: 800;
      color: var(--mathai-blue);
      font-variant-numeric: tabular-nums;
    }
    .tt-timer.warn .tt-timer-text { color: var(--mathai-orange); }
    .tt-timer.danger .tt-timer-text { color: var(--mathai-red); }
    .tt-pool-slot {
      width: 90px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .tt-pool-slot.empty { display: none; }
    .pool-slot.empty { display: none; }

    .tt-tag {
      width: 90px; height: 50px;
      border-radius: 10px;
      background: var(--mathai-white);
      border: 2px solid var(--mathai-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800;
      color: var(--mathai-primary);
      cursor: grab;
      touch-action: none;
      user-select: none;
      box-sizing: border-box;
    }
    .tt-tag.positive { color: #22c55e; border-color: #22c55e; }
    .tt-tag.negative { color: var(--mathai-red); border-color: var(--mathai-red); }
    .tt-tag:active { cursor: grabbing; }

    .answer-slide { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 8px 4px 12px 4px; }
    .answer-caption { font-size: 13px; font-weight: 600; color: var(--mathai-text-primary); margin-bottom: 6px; text-align: center; }
  </style>
</head>

        { set: 'A', id: 'A_r5_tt', round: 5, stage: 3, given: 5670, target: 5970, correctTag: '+300', pool: ['+300','-300','+30'], misconception_tags: ['wrong-magnitude'] },
        { set: 'A', id: 'A_r6_tt', round: 6, stage: 3, given: 6543, target: 6243, correctTag: '-300', pool: ['+300','-300','-30'], misconception_tags: ['wrong-direction'] },

        { set: 'B', id: 'B_r7_tt', round: 7, stage: 4, given: 1234, target: 7234, correctTag: '+6000', pool: ['+6000','-6000','+600'], misconception_tags: ['wrong-magnitude'] },

        { set: 'C', id: 'C_r2_tt', round: 2, stage: 2, given: 2901, target: 2701, correctTag: '-200', pool: ['+200','-200','-20'], misconception_tags: ['wrong-direction'] },
        { set: 'C', id: 'C_r3_tt', round: 3, stage: 3, given: 5432, target: 5732, correctTag: '+300', pool: ['+300','-300','+30'], misconception_tags: ['wrong-magnitude'] },
        { set: 'C', id: 'C_r4_tt', round: 4, stage: 4, given: 7891, target: 7851, correctTag: '-40', pool: ['+40','-40','-400'], misconception_tags: ['wrong-direction'] },
        { set: 'C', id: 'C_r5_tt', round: 5, stage: 3, given: 6810, target: 7110, correctTag: '+300', pool: ['+300','-300','+30'], misconception_tags: ['wrong-magnitude'] },
        { set: 'C', id: 'C_r6_tt', round: 6, stage: 3, given: 4310, target: 4010, correctTag: '-300', pool: ['+300','-300','-30'], misconception_tags: ['wrong-direction'] },

        { set: 'C', id: 'C_r8_tt', round: 8, stage: 4, given: 9234, target: 4234, correctTag: '-5000', pool: ['+5000','-5000','-500'], misconception_tags: ['wrong-direction','wrong-magnitude'] },
        { set: 'C', id: 'C_r9_tt', round: 9, stage: 5, given: 3456, target: 3506, correctTag: '+50', pool: ['+50','+500','+5000'], misconception_tags: ['wrong-magnitude'] },
        { set: 'C', id: 'C_r10_tt', round: 10, stage: 5, given: 5678, target: 5178, correctTag: '-500', pool: ['-50','-500','-5000'], misconception_tags: ['wrong-magnitude'] }
      ]
    };

    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var floatingBtn = null;
    var answerComponent = null;
    var dndManager = null;
    var dndDraggables = [];
    var dndDroppables = [];
    var tagEls = {};
    var poolSlotEls = {};
    var roundTimerHandle = null;
    var roundTimerRemaining = 30;
    var ROUND_DURATION_SEC = 30;

    function setRoundTimerDisplay(sec) {
      var el = document.getElementById('tt-timer-text');
      var wrap = document.getElementById('tt-timer');
      if (!el) return;
      var clamped = Math.max(0, sec);
      var mm = Math.floor(clamped / 60);
      var ss = clamped % 60;
      el.textContent = (mm < 10 ? '0' + mm : mm) + ':' + (ss < 10 ? '0' + ss : ss);
      if (wrap) {
        wrap.classList.remove('warn','danger');
        if (clamped <= 5) wrap.classList.add('danger');
        else if (clamped <= 15) wrap.classList.add('warn');
      }
    }
    function clearRoundTimer() {
      if (roundTimerHandle) { clearInterval(roundTimerHandle); roundTimerHandle = null; }
    }
    function startRoundTimer() {
      clearRoundTimer();
      roundTimerRemaining = ROUND_DURATION_SEC;
      setRoundTimerDisplay(roundTimerRemaining);
      roundTimerHandle = setInterval(function () {
        roundTimerRemaining -= 1;
        if (roundTimerRemaining < 0) roundTimerRemaining = 0;
        setRoundTimerDisplay(roundTimerRemaining);
        if (roundTimerRemaining <= 0) {
          clearRoundTimer();
          handleTimeout();
        }
      }, 1000);
    }
    async function handleTimeout() {
      if (gameState.isProcessing || gameState.gameEnded || !gameState.isActive) return;
      gameState.isProcessing = true;
      try {
        var w = document.getElementById('tt-wrapper');
        if (w) w.classList.add('locked');
      } catch (e) {}
      var round = getCurrentRound();
      recordAttempt(round, gameState.placedTag || '', false, ['timeout']);
      trackEvent('round_timeout', { round: gameState.currentRound, set: round && round.set });
      // 0 stars for timeout (no lives lost — concept is timer-only NO-LIVES)
      gameState.progress = (gameState.progress || 0) + 1;
      if (progressBar) { try { progressBar.update(gameState.progress, 0); } catch (e) {} }
      try { await Promise.all([FeedbackManager.sound.play('incorrect_sound_effect', { sticker: STICKER_SAD }), new Promise(function (r) { setTimeout(r, 1500); })]); } catch (e) {}
      try { await FeedbackManager.playDynamicFeedback({ audio_content: 'Time up! The right tag was ' + (round && round.correctTag) + '.', subtitle: 'Time up!', sticker: STICKER_SAD }); } catch (e) {}
      if (gameState.currentRound < gameState.totalRounds) {
        gameState.currentRound += 1;
        await showRoundIntro(gameState.currentRound);
        renderRound();
      } else {
        endGame(gameState.score > 0);
      }
    }

    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-round', gameState.currentRound);
    }

    function trackEvent(eventName, payload) {
      try {
        var ev = { name: eventName, ts: Date.now(), payload: payload || {} };
        gameState.events.push(ev);
        if (signalCollector && typeof signalCollector.recordEvent === 'function') {
          try { signalCollector.recordEvent(eventName, payload || {}); } catch (e) {}
        }
      } catch (e) { console.error('[trackEvent]', e && e.message); }
    }

    function recordAttempt(round, placedTag, isCorrect, misconceptionTags) {
      try {
        var now = Date.now();
        var attempt = {
          attempt_number: gameState.attempts.length + 1,
          round_number: gameState.currentRound,
          question_id: round && round.id ? round.id : ('r' + gameState.currentRound),
          question_text: 'Tag Transform — set ' + (round && round.set ? round.set : '?') + ' round ' + gameState.currentRound,
          user_answer: placedTag || '',
          correct_answer: round && round.correctTag ? round.correctTag : '',
          is_correct: !!isCorrect,
          response_time_ms: gameState.roundStartTime ? (now - gameState.roundStartTime) : 0,
          misconception_tag: (misconceptionTags && misconceptionTags.length > 0) ? misconceptionTags[0] : null,
          difficulty_level: round && round.stage ? round.stage : 1,
          hint_used: false,
          attempt_timestamp: now,
          given: round && round.given,
          target: round && round.target,
          set: round && round.set,
          misconception_tags_all: misconceptionTags || []
        };
        gameState.attempts.push(attempt);
      } catch (e) { console.error('[recordAttempt]', e && e.message); }
    }

    function getStars(score) {
      var t = gameState.totalRounds || 10;
      var maxTotal = t * 3;
      var earned = gameState.starsAccumulated || 0;
      if (maxTotal <= 0) return 0;
      var ratio = earned / maxTotal;
      if (ratio >= 0.9) return 3;
      if (ratio >= 0.6) return 2;
      if (earned >= 1) return 1;
      return 0;
    }
    function getRoundStarTier(isCorrect, elapsedMs) {
      // 3★ ≤15s, 2★ ≤30s, 1★ over 30s; 0★ if not solved (timeout)
      if (!isCorrect) return 0;
      var sec = elapsedMs / 1000;
      if (sec <= 15) return 3;
      if (sec <= 30) return 2;
      return 1;
    }

    function getAvailableSets(rounds) {
      var seen = {};
      for (var i = 0; i < rounds.length; i++) if (rounds[i].set) seen[rounds[i].set] = true;
      var keys = Object.keys(seen).sort();
      return keys.length > 0 ? keys : ['A'];
    }
    function getRounds() {
      var source = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(source);
      var startIdx = gameState.setIndex % sets.length;
      var setId = sets[startIdx];
      var setRounds = source.filter(function (r) { return r.set === setId; });
      if (setRounds.length >= gameState.totalRounds) return setRounds.slice(0, gameState.totalRounds);
      return source.slice(0, gameState.totalRounds);
    }

    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof TimerComponent !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            reject(err);
            throw new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    function preloadAudio() {
      if (typeof FeedbackManager === 'undefined' || !FeedbackManager.sound || !FeedbackManager.sound.preload) return;
      var assets = [
        { id: 'correct_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
        { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
        { id: 'rounds_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
        { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
        { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
        { id: 'sound_bubble_select', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3' },
        { id: 'sound_bubble_deselect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758712800721.mp3' },
        { id: 'tap_sound', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
      ];
      try { FeedbackManager.sound.preload(assets); } catch (e) {}
    }
    function safePlaySound(id, options) {
      try { return FeedbackManager.sound.play(id, options || {}); } catch (e) { return Promise.resolve(); }
    }
    function safeDynamic(opts) {
      try { return FeedbackManager.playDynamicFeedback(opts || {}); } catch (e) { return Promise.resolve(); }

    function handlePostMessage(event) {

    function buildPool(round) {
      tagEls = {};
      poolSlotEls = {};
      var pool = document.getElementById('tt-pool');
      if (!pool) return;
      pool.innerHTML = '';
      var tags = round.pool.slice();
      tags.forEach(function (label, idx) {
        var key = 't-' + idx;
        var slot = document.createElement('div');
        slot.className = 'tt-pool-slot pool-slot';
        slot.id = 'tt-slot-' + key;
        slot.setAttribute('data-pool-key', key);
        var tag = makeTag(label, idx);
        slot.appendChild(tag);
        pool.appendChild(slot);
        tagEls[key] = tag;
        poolSlotEls[key] = slot;
      });
    }

    function makeTag(label, idx) {
      var tag = document.createElement('div');
      var positive = label.charAt(0) === '+';
      tag.className = 'tt-tag ' + (positive ? 'positive' : 'negative');
      tag.id = 'tag-' + idx;
      tag.setAttribute('data-tag-id', 't-' + idx);
      tag.setAttribute('data-value', label);
      tag.textContent = label;
      return tag;
    }

    function refreshSubmittable() {
      if (!floatingBtn) return;
      try { floatingBtn.setSubmittable(!!gameState.placedTag && !gameState.isProcessing); } catch (e) {}
    }

    function placeTagInDrop(tagKey) {
      // If a tag is already in drop, return it to its bank slot first.
      if (gameState.placedTag) {
        var prevKey = gameState.placedTag;
        if (prevKey !== tagKey) returnTagToPool(prevKey);
      }
      var tag = tagEls[tagKey];
      var drop = document.getElementById('tt-drop');
      if (!tag || !drop) return;
      drop.appendChild(tag);
      tag.classList.add('in-drop');
      if (poolSlotEls[tagKey]) poolSlotEls[tagKey].classList.add('empty');
      gameState.placedTag = tagKey;
      gameState.placement[tagKey] = 'drop';
      // Hide drop label
      var lbl = drop.querySelector('.tt-drop-label');
      if (lbl) lbl.style.display = 'none';
    }

    function returnTagToPool(tagKey) {
      var tag = tagEls[tagKey];
      var slot = poolSlotEls[tagKey];
      if (!tag || !slot) return;
      slot.appendChild(tag);
      tag.classList.remove('in-drop');
      slot.classList.remove('empty');
      tag.style.position = '';
      tag.style.left = '';
      tag.style.top = '';
      tag.style.transform = '';
      tag.style.zIndex = '';
      if (gameState.placedTag === tagKey) gameState.placedTag = null;
      gameState.placement[tagKey] = 'pool';
      var drop = document.getElementById('tt-drop');
      if (drop) {
        var lbl = drop.querySelector('.tt-drop-label');
        if (lbl) lbl.style.display = '';
      }
    }

    async function handleCheck() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      if (!gameState.placedTag) return;
      clearRoundTimer();
      gameState.isProcessing = true;
      refreshSubmittable();
      try {
        var w = document.getElementById('tt-wrapper');
        if (w) w.classList.add('locked');
      } catch (e) {}

      var round = getCurrentRound();
      var placedKey = gameState.placedTag;
      var tagEl = tagEls[placedKey];
      var placedLabel = tagEl ? tagEl.getAttribute('data-value') : '';
      var isCorrect = placedLabel === round.correctTag;
      var elapsedMs = gameState.roundStartTime ? (Date.now() - gameState.roundStartTime) : 0;

      var dEl = document.getElementById('tt-drop');
      if (dEl) {
        dEl.classList.remove('match','over');
        dEl.classList.add(isCorrect ? 'match' : 'over');
      }

      var misTags = [];
      if (!isCorrect) {
        var pVal = parseInt(placedLabel, 10);
        var cVal = parseInt(round.correctTag, 10);
        if (Math.abs(pVal) === Math.abs(cVal) && pVal !== cVal) misTags.push('wrong-direction');
        else if (Math.sign(pVal) === Math.sign(cVal) && Math.abs(pVal) !== Math.abs(cVal)) misTags.push('wrong-magnitude');
        else misTags.push('wrong-direction');
      }
      recordAttempt(round, placedLabel, isCorrect, misTags);
      trackEvent('answer_submitted', { round: gameState.currentRound, set: round.set, is_correct: isCorrect, placed: placedLabel, correct: round.correctTag });

      if (isCorrect) {
        gameState.score += 1;
        var roundStarTier = getRoundStarTier(true, elapsedMs);
        // 1★ if completed after at least one wrong drop
        if (gameState.roundWrongDrops > 0 && roundStarTier > 1) roundStarTier = 1;
        gameState.starsAccumulated = (gameState.starsAccumulated || 0) + roundStarTier;
        trackEvent('round_stars', { round: gameState.currentRound, stars: roundStarTier, elapsedMs: elapsedMs });
        gameState.progress = (gameState.progress || 0) + 1;
        if (progressBar) { try { progressBar.update(gameState.progress, 0); } catch (e) {} }
        try { await Promise.all([safePlaySound('correct_sound_effect', { sticker: STICKER_CELEBRATE }), new Promise(function (r) { setTimeout(r, 1500); })]); } catch (e) {}
        try { await safeDynamic({ audio_content: 'Yes! ' + round.given + ' ' + (placedLabel.charAt(0) === '+' ? 'plus' : 'minus') + ' ' + Math.abs(parseInt(placedLabel, 10)) + ' is ' + round.target + '.', subtitle: 'Yes! Tag ' + placedLabel + ' fits.', sticker: STICKER_CELEBRATE }); } catch (e) {}
        trackEvent('round_complete', { round: gameState.currentRound, is_correct: true, score: gameState.score });
        if (gameState.currentRound < gameState.totalRounds) {
          gameState.currentRound += 1;
          await showRoundIntro(gameState.currentRound);
          renderRound();
        } else {
          endGame(gameState.score > 0);
        }
        return;
      }

      // Wrong drop: bounce back, do NOT decrement lives, allow retry within timer
      gameState.roundWrongDrops = (gameState.roundWrongDrops || 0) + 1;
      try { await Promise.all([FeedbackManager.sound.play('incorrect_sound_effect', { sticker: STICKER_SAD }), new Promise(function (r) { setTimeout(r, 1200); })]); } catch (e) {}
      var hint = misTags.indexOf('wrong-direction') !== -1 ? "That's the right amount, but the wrong direction." : "You're off by a place — check the column.";
      try { await safeDynamic({ audio_content: hint, subtitle: hint, sticker: STICKER_SAD }); } catch (e) {}
      // Bounce back: return tag to pool, unlock, restart timer with remaining time
      try {
        if (gameState.placedTag) returnTagToPool(gameState.placedTag);
        gameState.placedTag = null;
      } catch (e) {}
      try {
        var w2 = document.getElementById('tt-wrapper');
        if (w2) w2.classList.remove('locked');
      } catch (e) {}
      var dEl2 = document.getElementById('tt-drop');
      if (dEl2) dEl2.classList.remove('match','over');
      gameState.isProcessing = false;
      refreshSubmittable();
      // Resume timer (with remaining time)
      if (roundTimerRemaining > 0 && gameState.isActive && !gameState.gameEnded) {
        clearRoundTimer();
        roundTimerHandle = setInterval(function () {
          roundTimerRemaining -= 1;
          if (roundTimerRemaining < 0) roundTimerRemaining = 0;
          setRoundTimerDisplay(roundTimerRemaining);
          if (roundTimerRemaining <= 0) {
            clearRoundTimer();
            handleTimeout();
          }
        }, 1000);
      } else {
        handleTimeout();
      }
    }

    function getCurrentRound() {

    function handleDragEnd(event) {
      try {
        var op = event && event.operation;
        if (!op) return;
        var src = op.source;
        var tgt = op.target;
        var canceled = op.canceled;
        if (!src || !src.data) return;
        var tagKey = src.data.tagKey;
        if (!tagKey) return;
        // P6 §R2 — game-controlled source from gameState.placement.
        var sourceZone = findSlotIdForTag(tagKey);
        if (gameState.placement && gameState.placement[tagKey]) sourceZone = gameState.placement[tagKey];
        if (canceled || !tgt || !tgt.data) { safePlaySound('tap_sound', {}); return; }
        var tgtZone = tgt.data.zoneId;
        if (tgtZone === 'drop') {
          placeTagInDrop(tagKey);
          safePlaySound('sound_bubble_select', {});
        } else if (tgtZone === 'pool') {
          if (sourceZone === 'drop') {
            returnTagToPool(tagKey);
            safePlaySound('sound_bubble_deselect', {});
          } else {
            returnTagToPool(tagKey);
          }
        }
        refreshSubmittable();
      } catch (e) { console.error('[handleDragEnd]', e && e.message); if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} } }
    }

        try { signalCollector.reset(); } catch (e) {}
      }
      try { if (answerComponent) answerComponent.hide(); } catch (e) {}
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      if (progressBar) {
        try { progressBar.update(0, 0); } catch (e) {}
      }
      trackEvent('game_start', { totalRounds: gameState.totalRounds, restart: true, setIndex: gameState.setIndex });
      buildGameDOM();
      (async function () { await showRoundIntro(1); renderRound(); })();
    }
    window.restartGame = restartGame;

    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.phase = 'playing';
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.progress = 0;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.activeRounds = getRounds();
      gameState.startTime = Date.now();
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();
      (async function () { await showRoundIntro(1); renderRound(); })();
    }
    window.startGame = startGame;

    function nextRound() {
      try { FeedbackManager.sound['stopAll'](); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      if (gameState.currentRound < gameState.totalRounds) {
        gameState.currentRound += 1;
        renderRound();
      } else {
        endGame(true);
      }
    }
    window.nextRound = nextRound;

    function setupGame() {
      var content = gameState.content || fallbackContent;
      gameState.totalRounds = (content.totalRounds && typeof content.totalRounds === 'number') ? content.totalRounds : 10;
      gameState.activeRounds = getRounds();
      buildGameDOM();
      (function () { var r = getCurrentRound(); if (r) { renderNumbers(r); buildPool(r); } })();
      if (previewScreen) {
        try {
          previewScreen.show({
            instruction: content.previewInstruction || fallbackContent.previewInstruction,
            audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
            showGameOnPreview: content.showGameOnPreview === true,
            onComplete: function (previewData) { startGameAfterPreview(previewData); }
          });
        } catch (e) { console.error('[previewScreen.show]', e && e.message); startGameAfterPreview({ duration: 0 }); }
      } else { startGameAfterPreview({ duration: 0 }); }
    }

    function startGameAfterPreview(previewData) {
      try {
        gameState.previewResult = previewData || { duration: 0 };
        gameState.duration_data.preview = gameState.duration_data.preview || [];
        gameState.duration_data.preview.push({ duration: previewData ? previewData.duration : 0 });
        gameState.startTime = Date.now();
        gameState.isActive = true;
        gameState.duration_data.startTime = new Date().toISOString();
        trackEvent('game_start', { totalRounds: gameState.totalRounds });
        if (signalCollector && typeof signalCollector.recordViewEvent === 'function') {
          try { signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}
        }
        if (progressBar) { try { progressBar.update(0, 0); } catch (e) {} }
        (async function () { await showRoundIntro(1); renderRound(); })();
      } catch (e) { console.error('[startGameAfterPreview]', e && e.message); }
    }

    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      if (document.getElementById('gameContent')) return;
      var stack = document.createElement('div');
      stack.className = 'game-stack';
      var gc = document.createElement('div');
      gc.id = 'gameContent';
      stack.appendChild(gc);
      app.appendChild(stack);
    }
  </script>

  <script type="module">
    import { DragDropManager, Draggable, Droppable, Feedback, PointerSensor, PointerActivationConstraints } from 'https://esm.sh/@dnd-kit/dom@beta';
    window.DnDKit = { DragDropManager: DragDropManager, Draggable: Draggable, Droppable: Droppable, Feedback: Feedback, PointerSensor: PointerSensor, PointerActivationConstraints: PointerActivationConstraints };
    window.dispatchEvent(new Event('dndkit-ready'));
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      try {
        await waitForPackages();
        await new Promise(function (resolve) {
          if (window.DnDKit && window.DnDKit.DragDropManager) return resolve();
          window.addEventListener('dndkit-ready', function () { resolve(); }, { once: true });
          setTimeout(resolve, 5000);
        });
        try { await FeedbackManager.init(); } catch (e) {}

        try {
          signalCollector = new SignalCollector({ playId: 'tag-transform-' + Date.now(), game: 'tag-transform' });
          window.signalCollector = signalCollector;
        } catch (e) { console.error('[SignalCollector ctor]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try {
          ScreenLayout.inject('app', {
            slots: { previewScreen: true, transitionScreen: true, progressBar: true, floatingButton: true, answerComponent: true }
          });
        } catch (e) {
          console.error('[ScreenLayout.inject]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          buildFallbackLayout();
        }

        try {
          visibilityTracker = new VisibilityTracker({
            popupProps: {},
            onInactive: function () { try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {} try { if (previewScreen) previewScreen.pause(); } catch (e) {} },
            onResume: function () { try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {} try { if (previewScreen) previewScreen.resume(); } catch (e) {} }
          });
        } catch (e) { console.error('[VisibilityTracker]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try {
          progressBar = new ProgressBarComponent({ slotId: 'mathai-progress-slot', totalRounds: 10, totalLives: 1, showLives: false });
        } catch (e) { console.error('[ProgressBar]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try { transitionScreen = new TransitionScreenComponent({ slotId: 'mathai-transition-slot' }); } catch (e) { console.error('[TransitionScreen]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try { previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' }); } catch (e) { console.error('[PreviewScreen]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try {
          floatingBtn = new FloatingButtonComponent({ slotId: 'mathai-floating-button-slot' });
          if (floatingBtn && typeof floatingBtn.setLabels === 'function') {
            try { floatingBtn.setLabels({ submit: 'CHECK', next: 'Next' }); } catch (e) {}
          }
          floatingBtn.on('submit', async function () {
            if (gameState.isProcessing || gameState.gameEnded) return;
            try { await handleCheck(); } catch (e) { console.error('[handleCheck]', e && e.message); }
          });
          floatingBtn.on('next', function () {
            try { if (answerComponent && typeof answerComponent.destroy === 'function') answerComponent.destroy(); } catch (e) {}
            try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
            try { if (previewScreen && typeof previewScreen.destroy === 'function') previewScreen.destroy(); } catch (e) {}
            try { if (floatingBtn && typeof floatingBtn.destroy === 'function') floatingBtn.destroy(); } catch (e) {}
          });
        } catch (e) { console.error('[FloatingButton]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try {
          answerComponent = new AnswerComponentComponent({ slotId: 'mathai-answer-slot' });
        } catch (e) { console.error('[AnswerComponent ctor]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e); }

        try {
          var PointerSensor = window.DnDKit.PointerSensor;
          var PointerActivationConstraints = window.DnDKit.PointerActivationConstraints;
          dndManager = new window.DnDKit.DragDropManager({
            sensors: [
              PointerSensor.configure({ activationConstraints: [ new PointerActivationConstraints.Distance({ value: 3 }) ] })
            ]
          });
          dndManager.monitor.addEventListener('dragend', handleDragEnd);
          dndManager.monitor.addEventListener('dragstart', handleDragStart);
        } catch (e) {
          console.error('[DragDropManager]', e && e.message); if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          try {
            dndManager = new window.DnDKit.DragDropManager();
            dndManager.monitor.addEventListener('dragend', handleDragEnd);
            dndManager.monitor.addEventListener('dragstart', handleDragStart);
          } catch (er) { console.error('[DragDropManager fallback]', er && er.message); }
        }

        preloadAudio();
        window.addEventListener('message', handlePostMessage);
        try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
        setupGame();
      } catch (e) {
        console.error('[init]', e && e.message);
        if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
      }

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = startGame;
      window.nextRound = nextRound;
      window.loadRound = function (n) {
        if (typeof n === 'number' && n >= 1 && n <= gameState.totalRounds) {
          gameState.currentRound = n;
          renderRound();
        }
      };
    });

    setTimeout(function () {
      if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
      if (gameState.isActive || gameState.gameEnded) return;
      var missing = [];
      if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
      if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
      if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
      if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
      if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
      if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
      if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
      if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
      if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
      if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
      if (missing.length > 0) {
        var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
        console.error('[' + msg + ']');
        if (typeof Sentry !== 'undefined') { try { Sentry.captureMessage(msg); } catch (e) {} }
        var gc = document.getElementById('gameContent') || document.body;
        if (gc) { gc.innerHTML = '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">Game failed to load — please refresh.</div>'; }
        return;
      }
      if (!document.getElementById('gameContent')) buildFallbackLayout();
      gameState.content = fallbackContent;
      gameState.totalRounds = fallbackContent.rounds.length / 3;
      setupGame();
      startGame();
    }, 2000);
  </script>
</body>
</html>
