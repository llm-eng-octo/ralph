<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hexa Numbers — Honeycomb Place-Value</title>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --hex-petal: #B8E5E0;
      --hex-petal-bg: #D9F2EE;
      --hex-center: #2D7A5F;
      --hex-center-bg: #C8EAD9;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100dvh; overflow-x: hidden; overscroll-behavior: none; }
    @supports not (height: 100dvh) { html, body { height: 100vh; } }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }
    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex; flex-direction: column;
      position: relative; overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }
    @supports not (min-height: 100dvh) { #app { min-height: 100vh; } }

    #timer-container {
      position: absolute; top: 0.75rem; left: 50%;
      transform: translateX(-50%); z-index: 50;
      pointer-events: none;
    }
    #timer-container > * { pointer-events: auto; }
    #timer-container .timer-wrapper { padding: 0 !important; margin: 0 !important; background: transparent !important; }
    #timer-container .timer-display {
      width: auto !important; height: auto !important; min-width: 0 !important;
      padding: 2px 10px !important;
      font-size: 16px !important; font-weight: 700 !important;
      color: var(--mathai-primary) !important;
      font-family: var(--mathai-font-family) !important;
      background: var(--mathai-cell-bg-yellow) !important;
      border-radius: 999px !important;
      box-shadow: none !important;
    }

    #gameContent {
      display: flex; flex-direction: column;
      width: 100%; padding: 8px 16px 16px;
    }

    .hex-stage {
      text-align: center;
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 6px 0 4px;
    }

    .hex-pair {
      position: relative;
      width: 100%;
      max-width: 440px;
      height: 340px;
      margin: 12px auto 8px;
    }
    .hex-flower {
      position: absolute;
      width: 230px;
      height: 320px;
      top: 8px;
    }
    .hex-flower.flower-left  { left: 0; }
    .hex-flower.flower-right { right: 0; }
    .hex {
      position: absolute;
      width: 70px; height: 80px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: var(--mathai-primary);
      background: var(--hex-petal-bg);
      border: 2px solid var(--hex-petal);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    .hex.is-shared {
      background: var(--mathai-cell-bg-yellow);
      border-color: var(--mathai-warning, var(--mathai-orange));
    }
    .hex.is-center {
      background: var(--hex-center-bg);
      border-color: var(--hex-center);
      color: var(--hex-center);
      cursor: pointer;
      touch-action: manipulation;
    }
    .hex.is-center.is-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
      color: var(--mathai-green);
    }
    .hex.is-center.is-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-red);
      animation: shake 0.5s ease;
    }
    .hex.is-center.is-active {
      box-shadow: 0 0 0 3px var(--mathai-yellow);
    }
    /* Six positions around the centre — sized for 70x80 hexagons */
    .hex.p-top    { top: 0;    left: 80px; }
    .hex.p-tr     { top: 60px; left: 152px; }
    .hex.p-br     { top: 180px;left: 152px; }
    .hex.p-bot    { top: 240px;left: 80px; }
    .hex.p-bl     { top: 180px;left: 8px;  }
    .hex.p-tl     { top: 60px; left: 8px;  }
    .hex.p-center { top: 120px;left: 80px; }

    .hex-input-row {
      display: flex; flex-direction: column; gap: 8px;
      align-items: center; margin: 10px 0 8px;
    }
    .hex-input-pair {
      display: flex; flex-direction: row; justify-content: center;
      gap: 12px;
      width: 100%;
    }
    .hex-input-block {
      display: flex; flex-direction: column; align-items: center;
      flex: 1 1 0;
      max-width: 200px;
      margin: 0 4px;
    }
    .hex-input-label {
      font-size: 13px; color: var(--mathai-gray); margin-bottom: 4px;
    }
    .hex-input-label.is-active {
      color: var(--mathai-primary); font-weight: 700;
    }
    .hex-input-label.is-correct {
      color: var(--mathai-green); font-weight: 700;
    }

    .hex-input-area {
      display: flex; flex-direction: column;
      align-items: center; margin: 8px 0;
    }
    .hex-input {
      width: 200px;
      max-width: 80%;
      min-height: 48px;
      padding: 10px 14px;
      border: 2px solid var(--mathai-border-gray);
      border-radius: 10px;
      background: var(--mathai-white);
      color: var(--mathai-primary);
      font-family: var(--mathai-font-family);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      -webkit-appearance: none; appearance: none;
      touch-action: manipulation;
    }
    .hex-input:focus { outline: none; border-color: var(--mathai-purple); }
    .hex-input.is-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
      color: var(--mathai-green);
    }
    .hex-input.is-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-red);
      animation: shake 0.5s ease;
    }

    .hex-reveal {
      margin-top: 14px;
      padding: 10px 12px;
      background: var(--mathai-cell-bg-yellow);
      border-radius: 10px;
      color: var(--mathai-text-primary);
      font-size: 14px;
      text-align: center;
      max-width: 360px;
      align-self: center;
    }

    .hex-answer-card {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      padding: 14px 12px 18px;
      text-align: center;
    }
    .hex-answer-flower {
      position: relative;
      width: 240px;
      height: 280px;
      margin: 0 auto 8px;
    }
    .hex-answer-flower .hex {
      width: 70px; height: 80px;
      font-size: 14px;
    }
    .hex-answer-flower .p-top    { top: 0;    left: 85px; }
    .hex-answer-flower .p-tr     { top: 50px; left: 154px; }
    .hex-answer-flower .p-br     { top: 144px;left: 154px; }
    .hex-answer-flower .p-bot    { top: 196px;left: 85px; }
    .hex-answer-flower .p-bl     { top: 144px;left: 16px;  }
    .hex-answer-flower .p-tl     { top: 50px; left: 16px;  }
    .hex-answer-flower .p-center { top: 100px;left: 85px;  background: var(--mathai-cell-bg-green); color: var(--mathai-green); border-color: var(--mathai-cell-border-green); }

    button, [role="button"] { min-height: 44px; min-width: 44px; touch-action: manipulation; }
    #app { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: var(--mathai-white); color: var(--mathai-primary);
        font-family: var(--mathai-font-family); font-size: var(--mathai-font-size-subtitle);
        text-align: center; padding: 24px;
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
    }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="2"></div>

  <script>
    var STICKER_CORRECT  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_WRONG    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_LEVEL    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';
    var STICKER_VICTORY  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_CELEBRATE = STICKER_VICTORY;
    var STICKER_SAD      = STICKER_WRONG;
    var STICKER_MOTIVATE = STICKER_LEVEL;

    /* Two flowers, each with 6 petals. They share `sharedCount` (1 or 2) hexagons along the seam.
       petalsLeft positions: [top, tr, br, bot, bl, tl]
       petalsRight positions: [top, tr, br, bot, bl, tl]
       Shared semantics: petalsLeft[1] (p-tr) is the same hexagon as petalsRight[5] (p-tl).
       When sharedCount===2, also petalsLeft[2] (p-br) is the same hexagon as petalsRight[4] (p-bl).
       Each centre = sum of its own 6 petals (shared hexagons contribute to both sums). */
    function _mkRound(set, round, stage, petalsLeft, petalsRight, sharedCount) {
      var totalLeft = petalsLeft.reduce(function (a, b) { return a + b; }, 0);
      var totalRight = petalsRight.reduce(function (a, b) { return a + b; }, 0);
      var id = set + '_r' + round + '_l' + totalLeft + 'r' + totalRight;
      var hint = 'Left centre = ' + petalsLeft.join(' + ') + ' = ' + totalLeft + '. Right centre = ' + petalsRight.join(' + ') + ' = ' + totalRight + '.';
      return {
        set: set, id: id, round: round, stage: stage,
        petalsLeft: petalsLeft, petalsRight: petalsRight,
        sharedCount: sharedCount || 0,
        totalLeft: totalLeft, totalRight: totalRight,
        hint: hint,
        correctTTS: 'Yes! Left centre is ' + totalLeft + ' and right centre is ' + totalRight + '.',
        correctSubtitle: 'Both centres correct!',
        wrongTTS: 'Almost. ' + hint,
        wrongSubtitle: 'Left ' + totalLeft + ', right ' + totalRight + '.',
        answer: { petalsLeft: petalsLeft, petalsRight: petalsRight, totalLeft: totalLeft, totalRight: totalRight, sharedCount: sharedCount || 0, hint: hint }
      };
    }

    var fallbackContent = {
      previewInstruction: '<p>Two honeycomb flowers sit side by side, sharing one or two petals along the seam. The number in <b>each centre</b> is the sum of the six petals around <b>that</b> flower.</p><p>Type both centre values to clear the round. Two lives, ten rounds.</p>',
      previewAudioText: 'Two flowers sit side by side, sharing some petals. Each centre is the sum of its own six petals. Fill both centres correctly.',
      previewAudio: null,
      showGameOnPreview: false,
      totalRounds: 10,
      totalLives: 2,
      answerComponent: true,
      rounds: [
        // Set A — Stage 1 (no shared, 3-digit sums)
        _mkRound('A', 1, 1, [100, 200, 30, 40, 5, 2], [200, 100, 50, 20, 6, 3], 0),
        _mkRound('A', 2, 1, [300, 100, 50, 20, 6, 3], [400, 200, 30, 50, 4, 1], 0),
        _mkRound('A', 3, 1, [200, 400, 60, 10, 4, 1], [300, 500, 40, 20, 7, 2], 0),
        // Stage 2 (1 shared, 4-digit sums) — petalsLeft[1] === petalsRight[5]
        _mkRound('A', 4, 2, [1000, 5000, 30, 500, 20, 100], [2000, 300, 40, 4000, 200, 5000], 1),
        _mkRound('A', 5, 2, [2000, 4000, 40, 300, 50, 200], [3000, 100, 60, 5000, 200, 4000], 1),
        _mkRound('A', 6, 2, [3000, 6000, 60, 100, 30, 400], [4000, 200, 50, 1000, 300, 6000], 1),
        _mkRound('A', 7, 2, [5000, 2000, 80, 200, 40, 300], [3000, 100, 60, 4000, 200, 2000], 1),
        // Stage 3 (2 shared) — petalsLeft[1]===petalsRight[5], petalsLeft[2]===petalsRight[4]
        _mkRound('A', 8, 3, [4000, 1000, 300, 200, 30, 400], [2000, 100, 50, 3000, 300, 1000], 2),
        _mkRound('A', 9, 3, [6000, 2000, 300, 100, 70, 300], [4000, 200, 60, 5000, 300, 2000], 2),
        _mkRound('A',10, 3, [3000, 5000, 200, 400, 20, 500], [6000, 100, 70, 2000, 200, 5000], 2),

        // Set B
        _mkRound('B', 1, 1, [200, 300, 40, 10, 7, 2], [100, 500, 20, 30, 8, 4], 0),
        _mkRound('B', 2, 1, [100, 500, 20, 30, 8, 4], [400, 200, 30, 50, 6, 1], 0),
        _mkRound('B', 3, 1, [400, 200, 30, 50, 6, 1], [200, 300, 40, 10, 7, 2], 0),
        _mkRound('B', 4, 2, [3000, 1000, 50, 200, 30, 100], [4000, 300, 60, 2000, 100, 1000], 1),
        _mkRound('B', 5, 2, [4000, 2000, 60, 300, 40, 100], [5000, 400, 70, 1000, 200, 2000], 1),
        _mkRound('B', 6, 2, [5000, 1000, 70, 400, 30, 200], [2000, 100, 50, 6000, 300, 1000], 1),
        _mkRound('B', 7, 2, [2000, 6000, 50, 100, 20, 300], [3000, 200, 80, 4000, 100, 6000], 1),
        _mkRound('B', 8, 3, [3000, 4000, 80, 200, 70, 100], [5000, 300, 60, 1000, 400, 4000], 2),
        _mkRound('B', 9, 3, [5000, 1000, 80, 300, 60, 400], [2000, 100, 90, 6000, 200, 1000], 2),
        _mkRound('B',10, 3, [2000, 6000, 50, 100, 90, 200], [3000, 200, 80, 4000, 100, 6000], 2),

        // Set C
        _mkRound('C', 1, 1, [100, 400, 50, 20, 3, 2], [300, 200, 30, 60, 4, 5], 0),
        _mkRound('C', 2, 1, [300, 200, 30, 60, 4, 5], [500, 100, 40, 30, 7, 3], 0),
        _mkRound('C', 3, 1, [500, 100, 40, 30, 7, 3], [100, 400, 50, 20, 3, 2], 0),
        _mkRound('C', 4, 2, [4000, 2000, 30, 100, 50, 200], [3000, 200, 40, 5000, 100, 2000], 1),
        _mkRound('C', 5, 2, [3000, 5000, 40, 200, 30, 100], [2000, 300, 60, 4000, 200, 5000], 1),
        _mkRound('C', 6, 2, [2000, 4000, 60, 300, 70, 200], [6000, 100, 80, 1000, 200, 4000], 1),
        _mkRound('C', 7, 2, [6000, 1000, 80, 100, 90, 200], [4000, 200, 50, 3000, 100, 1000], 1),
        _mkRound('C', 8, 3, [4000, 3000, 200, 100, 50, 300], [5000, 300, 80, 2000, 100, 3000], 2),
        _mkRound('C', 9, 3, [5000, 2000, 300, 100, 80, 400], [6000, 200, 70, 1000, 300, 2000], 2),
        _mkRound('C',10, 3, [6000, 1000, 200, 300, 70, 400], [3000, 200, 60, 5000, 100, 1000], 2)
      ]
    };

    var SETS = ['A','B','C'];
    var POSITIONS = ['p-top','p-tr','p-br','p-bot','p-bl','p-tl'];

    var gameState = {
      gameId: 'type-into-central-hex-input',
      gameTitle: 'Hexa Numbers',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 10,
      score: 0,
      lives: 2,
      totalLives: 2,
      leftCorrect: false,
      rightCorrect: false,
      activeSide: 'left',
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      duration_data: { startTime: null, endTime: null, preview: [] },
      correctAnswer: null,
      stars: 0,
      setIndex: 0,
      activeRounds: [],
      roundStartMs: 0,
      timerIntentionallyPaused: false,
      previewResult: null,
      progress: 0,
      roundToken: 0
    };
    window.gameState = gameState;

    var timer = null, visibilityTracker = null, signalCollector = null;
    var progressBar = null, transitionScreen = null, previewScreen = null;
    var floatingBtn = null, answerComponent = null;

    var elGameContent = null, elInput = null, elStageLabel = null, elFlower = null, elReveal = null;

    function getAvailableSets(rounds) {
      var seen = {}, out = [];
      for (var i = 0; i < rounds.length; i++) {
        var s = rounds[i].set;
        if (s && !seen[s]) { seen[s] = true; out.push(s); }
      }
      return out.length ? out : ['A'];
    }
    function getRounds() {
      var src = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(src);
      var setKey = sets[gameState.setIndex % sets.length];
      var filtered = [];
      for (var i = 0; i < src.length; i++) if (src[i].set === setKey) filtered.push(src[i]);
      filtered.sort(function (a, b) { return a.round - b.round; });
      return filtered;
    }
    function getCorrectCount() {
      var c = 0;
      for (var i = 0; i < gameState.attempts.length; i++) if (gameState.attempts[i].correct === true) c++;
      return c;
    }
    function getStars() {
      var c = getCorrectCount();
      if (c === 0) return 0;
      var ratio = c / gameState.totalRounds;
      if (ratio >= 0.9) return 3;
      if (ratio >= 0.6) return 2;
      return 1;
    }
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound + 1);
    }
    function trackEvent(name, payload) {
      try { gameState.events.push({ event: name, ts: Date.now(), data: payload || {} }); } catch (e) {}
      try { if (signalCollector && signalCollector.recordEvent) signalCollector.recordEvent(name, payload || {}); } catch (e) {}
    }
    function recordAttempt(input, correct, miscTag, responseMs) {
      var round = gameState.activeRounds[gameState.currentRound];
      var qid = round ? round.id : ('r' + (gameState.currentRound + 1));
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) : 0,
        input_of_user: input,
        correct: correct === true,
        round_number: gameState.currentRound + 1,
        question_id: qid,
        correct_answer: round ? round.total : null,
        response_time_ms: typeof responseMs === 'number' ? responseMs : 0,
        misconception_tag: miscTag || null,
        difficulty_level: round ? (round.stage || 1) : 1,
        is_retry: false,
        metadata: { set: round ? round.set : null }
      };
      gameState.attempts.push(attempt);
      try { if (signalCollector && signalCollector.recordAttempt) signalCollector.recordAttempt(attempt); } catch (e) {}
    }
    function postGameComplete() {
      if (gameState._gameCompletePosted) return;
      gameState._gameCompletePosted = true;
      var correctCount = getCorrectCount();
      var attempted = gameState.attempts.length;
      var accuracy = attempted === 0 ? 0 : Math.round((correctCount / attempted) * 100);
      var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
      var triesByRound = gameState.attempts.map(function (a) { return { round: a.round_number, correct: a.correct === true }; });
      var metrics = {
        accuracy: accuracy, time: Math.round(elapsedMs / 1000), stars: gameState.stars,
        attempts: gameState.attempts.slice(), duration_data: gameState.duration_data,
        totalLives: gameState.lives, tries: triesByRound, score: gameState.score,
        correctCount: correctCount, previewResult: gameState.previewResult
      };
      var signalSealed = { event_count: gameState.events.length, metadata: {} };
      try {
        if (signalCollector && typeof signalCollector.seal === 'function') {
          var sealed = signalCollector.seal();
          if (sealed) {
            if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count;
            if (sealed.metadata) signalSealed.metadata = sealed.metadata;
          }
        }
      } catch (e0) {}
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: { metrics: metrics, completedAt: Date.now(), signal_event_count: signalSealed.event_count, signal_metadata: signalSealed.metadata }
        }, '*');
      } catch (e) {}
    }

    function safePlaySound(id, opts) { try { return FeedbackManager.sound.play(id, opts || {}); } catch (e) { return Promise.resolve(); } }
    function awaitedFeedbackSound(id, opts) {
      var p = safePlaySound(id, opts || {});
      var floor = new Promise(function (r) { setTimeout(r, 1500); });
      return Promise.all([p, floor]).then(function () {}, function () {});
    }
    function playDynamicFeedback(opts) { try { return FeedbackManager.playDynamicFeedback(opts || {}); } catch (e) { return Promise.resolve(); } }

    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof TimerComponent !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            try { throw new Error('waitForPackages timeout'); } catch (rethrown) { reject(err); return; }
            return reject(err);
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    var elInputLeft = null, elInputRight = null, elPair = null;
    var elInputLabelLeft = null, elInputLabelRight = null;

    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="hex-stage" id="hexStageLabel"></div>' +
        '<div class="hex-pair" id="hexPair"></div>' +
        '<div class="hex-input-row">' +
          '<div class="hex-input-pair">' +
            '<div class="hex-input-block">' +
              '<div class="hex-input-label" id="hexInputLabelLeft">Left centre</div>' +
              '<input class="hex-input" id="hexInputLeft" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="off" data-testid="hex-input-left" placeholder="?" />' +
            '</div>' +
            '<div class="hex-input-block">' +
              '<div class="hex-input-label" id="hexInputLabelRight">Right centre</div>' +
              '<input class="hex-input" id="hexInputRight" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="off" data-testid="hex-input-right" placeholder="?" />' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="hex-reveal" id="hexReveal"></div>';
      elGameContent = gc;
      elPair = document.getElementById('hexPair');
      elStageLabel = document.getElementById('hexStageLabel');
      elReveal = document.getElementById('hexReveal');
      elInputLeft = document.getElementById('hexInputLeft');
      elInputRight = document.getElementById('hexInputRight');
      elInputLabelLeft = document.getElementById('hexInputLabelLeft');
      elInputLabelRight = document.getElementById('hexInputLabelRight');
      if (elInputLeft) {
        elInputLeft.addEventListener('input', onAnyInputChange);
        elInputLeft.addEventListener('keydown', onInputKey);
        elInputLeft.addEventListener('focus', function () { gameState.activeSide = 'left'; updateLabels(); });
      }
      if (elInputRight) {
        elInputRight.addEventListener('input', onAnyInputChange);
        elInputRight.addEventListener('keydown', onInputKey);
        elInputRight.addEventListener('focus', function () { gameState.activeSide = 'right'; updateLabels(); });
      }
    }

    function renderInitialState() {
      if (elStageLabel) elStageLabel.textContent = '';
      if (elPair) elPair.innerHTML = '';
      if (elReveal) { elReveal.textContent = ''; }
      if (elInputLeft) {
        elInputLeft.value = '';
        elInputLeft.classList.remove('is-correct','is-wrong');
        elInputLeft.disabled = false;
      }
      if (elInputRight) {
        elInputRight.value = '';
        elInputRight.classList.remove('is-correct','is-wrong');
        elInputRight.disabled = false;
      }
    }

    function updateLabels() {
      if (elInputLabelLeft) {
        elInputLabelLeft.classList.remove('is-active','is-correct');
        if (gameState.leftCorrect) elInputLabelLeft.classList.add('is-correct');
        else if (gameState.activeSide === 'left') elInputLabelLeft.classList.add('is-active');
      }
      if (elInputLabelRight) {
        elInputLabelRight.classList.remove('is-active','is-correct');
        if (gameState.rightCorrect) elInputLabelRight.classList.add('is-correct');
        else if (gameState.activeSide === 'right') elInputLabelRight.classList.add('is-active');
      }
    }

    function onAnyInputChange() {
      try {
        if (floatingBtn && floatingBtn.setSubmittable) {
          var lv = elInputLeft && elInputLeft.value ? elInputLeft.value.trim() : '';
          var rv = elInputRight && elInputRight.value ? elInputRight.value.trim() : '';
          var leftOk = gameState.leftCorrect || (/^[0-9]+$/.test(lv) && lv.length > 0);
          var rightOk = gameState.rightCorrect || (/^[0-9]+$/.test(rv) && rv.length > 0);
          floatingBtn.setSubmittable(leftOk && rightOk);
        }
      } catch (e) {}
    }
    function onInputKey(e) { if (e.key === 'Enter') { e.preventDefault(); attemptSubmit(); } }

    function renderRound(roundIdxOneBased) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      gameState.currentRound = roundIdxOneBased - 1;
      gameState.isActive = true;
      gameState.phase = 'gameplay';
      gameState.roundToken = (gameState.roundToken || 0) + 1;
      syncDOM();

      var round = gameState.activeRounds[gameState.currentRound];
      if (!round) return;
      // correctAnswer mirrors the pair (left then right) for telemetry
      gameState.correctAnswer = round.totalLeft + ',' + round.totalRight;
      gameState.leftCorrect = false;
      gameState.rightCorrect = false;
      gameState.activeSide = 'left';

      if (elStageLabel) elStageLabel.textContent = 'Round ' + roundIdxOneBased + ' of ' + gameState.totalRounds + ' · Stage ' + (round.stage || 1);

      if (elPair) {
        elPair.innerHTML = '';
        elPair.appendChild(buildFlower('left', round));
        elPair.appendChild(buildFlower('right', round));
      }

      if (elInputLeft) { elInputLeft.value = ''; elInputLeft.classList.remove('is-correct','is-wrong'); elInputLeft.disabled = false; }
      if (elInputRight) { elInputRight.value = ''; elInputRight.classList.remove('is-correct','is-wrong'); elInputRight.disabled = false; }
      if (elReveal) { elReveal.textContent = ''; }
      updateLabels();

      try { if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode('submit'); } catch (e) {}
      try { if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(false); } catch (e) {}

      gameState.roundStartMs = Date.now();
      gameState.isProcessing = false;

      try {
        gameState.timerIntentionallyPaused = false;
        if (timer) {
          if (roundIdxOneBased === 1 && !gameState._timerStarted) {
            try { timer.start(); } catch (e) {}
            gameState._timerStarted = true;
          } else {
            try { timer.resume(); } catch (e) {}
          }
        }
      } catch (e) {}

      try { var p = safePlaySound('tap_sound'); if (p && p.catch) p.catch(function(){}); } catch (e) {}
      trackEvent('round_start', { round: roundIdxOneBased, set: round.set });
    }

    function buildFlower(side, round) {
      var wrap = document.createElement('div');
      wrap.className = 'hex-flower flower-' + side;
      wrap.setAttribute('data-side', side);
      var petals = (side === 'left') ? round.petalsLeft : round.petalsRight;
      // Determine which positions are shared (visually highlight both flowers' shared hexagons).
      // Convention: petalsLeft[1]===petalsRight[5] (shared #1), petalsLeft[2]===petalsRight[4] (shared #2).
      var sharedPositionsLeft = [];
      var sharedPositionsRight = [];
      if (round.sharedCount >= 1) { sharedPositionsLeft.push(1); sharedPositionsRight.push(5); }
      if (round.sharedCount >= 2) { sharedPositionsLeft.push(2); sharedPositionsRight.push(4); }
      var sharedSet = (side === 'left') ? sharedPositionsLeft : sharedPositionsRight;
      for (var i = 0; i < 6; i++) {
        var hx = document.createElement('div');
        hx.className = 'hex ' + POSITIONS[i];
        if (sharedSet.indexOf(i) !== -1) hx.classList.add('is-shared');
        hx.textContent = String(petals[i]);
        wrap.appendChild(hx);
      }
      var centre = document.createElement('div');
      centre.className = 'hex is-center p-center';
      centre.id = (side === 'left') ? 'hexCentreLeft' : 'hexCentreRight';
      centre.setAttribute('data-side', side);
      centre.textContent = '?';
      wrap.appendChild(centre);
      return wrap;
    }

    function attemptSubmit() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      var lv = elInputLeft && elInputLeft.value ? elInputLeft.value.trim() : '';
      var rv = elInputRight && elInputRight.value ? elInputRight.value.trim() : '';
      // Each side may already be locked correct. Validate the still-open ones.
      var needLeft = !gameState.leftCorrect;
      var needRight = !gameState.rightCorrect;
      if (needLeft && !/^[0-9]+$/.test(lv)) return;
      if (needRight && !/^[0-9]+$/.test(rv)) return;
      handleAnswer(needLeft ? parseInt(lv, 10) : null, needRight ? parseInt(rv, 10) : null, lv, rv);
    }

    function handleAnswer(typedLeft, typedRight, typedLeftStr, typedRightStr) {
      gameState.isProcessing = true;
      var responseMs = Date.now() - gameState.roundStartMs;
      try { gameState.timerIntentionallyPaused = true; if (timer && timer.pause) timer.pause(); } catch (e) {}

      var round = gameState.activeRounds[gameState.currentRound];
      var leftJustCorrect = false, rightJustCorrect = false;
      var leftWrong = false, rightWrong = false;

      if (!gameState.leftCorrect) {
        if (typedLeft === round.totalLeft) { gameState.leftCorrect = true; leftJustCorrect = true; }
        else { leftWrong = true; }
      }
      if (!gameState.rightCorrect) {
        if (typedRight === round.totalRight) { gameState.rightCorrect = true; rightJustCorrect = true; }
        else { rightWrong = true; }
      }

      var bothCorrect = gameState.leftCorrect && gameState.rightCorrect;
      var anyWrong = leftWrong || rightWrong;

      // Visual lock for centres + inputs
      var centreLeft = document.getElementById('hexCentreLeft');
      var centreRight = document.getElementById('hexCentreRight');
      if (centreLeft) {
        if (gameState.leftCorrect) {
          centreLeft.textContent = String(round.totalLeft);
          centreLeft.classList.remove('is-wrong');
          centreLeft.classList.add('is-correct');
        } else if (leftWrong) {
          centreLeft.textContent = String(typedLeft);
          centreLeft.classList.add('is-wrong');
          setTimeout(function () { if (centreLeft) { centreLeft.classList.remove('is-wrong'); centreLeft.textContent = '?'; } }, 700);
        }
      }
      if (centreRight) {
        if (gameState.rightCorrect) {
          centreRight.textContent = String(round.totalRight);
          centreRight.classList.remove('is-wrong');
          centreRight.classList.add('is-correct');
        } else if (rightWrong) {
          centreRight.textContent = String(typedRight);
          centreRight.classList.add('is-wrong');
          setTimeout(function () { if (centreRight) { centreRight.classList.remove('is-wrong'); centreRight.textContent = '?'; } }, 700);
        }
      }
      if (elInputLeft) {
        elInputLeft.classList.remove('is-correct','is-wrong');
        if (gameState.leftCorrect) { elInputLeft.value = String(round.totalLeft); elInputLeft.disabled = true; elInputLeft.classList.add('is-correct'); }
        else if (leftWrong) { elInputLeft.classList.add('is-wrong'); }
      }
      if (elInputRight) {
        elInputRight.classList.remove('is-correct','is-wrong');
        if (gameState.rightCorrect) { elInputRight.value = String(round.totalRight); elInputRight.disabled = true; elInputRight.classList.add('is-correct'); }
        else if (rightWrong) { elInputRight.classList.add('is-wrong'); }
      }
      updateLabels();

      try { if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(false); } catch (e) {}

      if (bothCorrect) {
        gameState.score += 1;
      } else if (anyWrong) {
        gameState.lives = Math.max(0, gameState.lives - 1);
        if (elReveal) elReveal.textContent = round.hint;
      }
      gameState.progress = gameState.currentRound + 1;
      try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
      syncDOM();

      var miscTag = bothCorrect ? null : 'place-value-sum-error';
      var inputStr = (typedLeftStr || '') + '|' + (typedRightStr || '');
      recordAttempt(inputStr, bothCorrect, miscTag, responseMs);
      trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: bothCorrect, leftCorrect: gameState.leftCorrect, rightCorrect: gameState.rightCorrect });

      (async function () {
        try { await awaitedFeedbackSound(bothCorrect ? 'correct_sound_effect' : 'incorrect_sound_effect', { sticker: bothCorrect ? STICKER_CORRECT : STICKER_SAD }); } catch (e) {}
        try {
          await playDynamicFeedback({
            audio_content: bothCorrect ? round.correctTTS : round.wrongTTS,
            subtitle: bothCorrect ? round.correctSubtitle : round.wrongSubtitle,
            sticker: bothCorrect ? STICKER_CORRECT : STICKER_SAD
          });
        } catch (e) {}
        if (bothCorrect || gameState.lives === 0) {
          advanceAfterFeedback();
        } else {
          // Stay on same round so player can retry the unfilled side.
          gameState.isProcessing = false;
          try { gameState.timerIntentionallyPaused = false; if (timer && timer.resume) timer.resume(); } catch (e) {}
          // Re-enable still-open inputs
          if (elInputLeft && !gameState.leftCorrect) { elInputLeft.disabled = false; elInputLeft.value = ''; elInputLeft.classList.remove('is-wrong'); }
          if (elInputRight && !gameState.rightCorrect) { elInputRight.disabled = false; elInputRight.value = ''; elInputRight.classList.remove('is-wrong'); }
          onAnyInputChange();
        }
      })();
    }

    function advanceAfterFeedback() {
      var roundJustPlayed = gameState.currentRound + 1;
      if (gameState.lives === 0) { gameState.stars = getStars(); endGame(false); return; }
      if (roundJustPlayed === gameState.totalRounds) { endGame(true); return; }
      showRoundIntro(roundJustPlayed + 1);
    }

    async function showRoundIntro(n) {
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      var ttsText = 'Round ' + n;
      await transitionScreen.show({
        title: 'Round ' + n, icons: [], persist: true, buttons: [],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_ROUND }); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          })();
        }
      });
      setTimeout(function () {
        try {
          if (gameState.gameEnded) return;
          if (gameState.currentRound + 1 < n) {
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          }
        } catch (e) {}
      }, 9000);
    }

    function endGame(victory) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;
      try { gameState.timerIntentionallyPaused = true; if (timer && timer.pause) timer.pause(); } catch (e) {}
      gameState.stars = getStars();
      if (victory) { gameState.phase = 'results'; syncDOM(); postGameComplete(); showVictory(); }
      else { gameState.phase = 'game_over'; syncDOM(); postGameComplete(); showGameOver(); }
      trackEvent('game_end', { victory: victory, stars: gameState.stars, score: gameState.score });
    }

    function _victoryClaimAction() {
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try { transitionScreen.hide(); } catch (e) {}
      showStarsCollected();
    }
    function _victoryPlayAgainAction() {
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try { transitionScreen.hide(); } catch (e) {}
      showMotivation();
    }

    async function showVictory() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var stars = gameState.stars;
      var subtitle = 'You scored ' + gameState.score + '/' + gameState.totalRounds + '.';
      var ttsText = 'Victory! You filled ' + gameState.score + ' centres correctly!';
      var sfxId = stars === 3 ? 'victory_sound_effect' : 'game_complete_sound_effect';
      await transitionScreen.show({
        title: 'Victory', subtitle: subtitle, stars: stars,
        buttons: stars === 3
          ? [{ text: 'Claim Stars', type: 'primary', action: _victoryClaimAction }]
          : [
              { text: 'Play Again', type: 'secondary', action: _victoryPlayAgainAction },
              { text: 'Claim Stars', type: 'primary', action: _victoryClaimAction }
            ],
        persist: true,
        onMounted: function () {
          (async function () {
            try { await safePlaySound(sfxId, { sticker: STICKER_VICTORY }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_CELEBRATE }); } catch (e) {}
          })();
        }
      });
    }

    async function showGameOver() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var subtitle = 'You got ' + gameState.score + '/' + gameState.totalRounds + '. Stars: ' + '★'.repeat(gameState.stars) + '☆'.repeat(Math.max(0, 3 - gameState.stars));
      await transitionScreen.show({
        title: 'Game Over', subtitle: subtitle, icons: [], persist: true,
        buttons: [{
          text: 'Try Again', type: 'primary', data_testid: 'btn-restart',
          action: function () {
            try { FeedbackManager.sound.stopAll(); } catch (e) {}
            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            showMotivation();
          }
        }],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('game_over_sound_effect', { sticker: STICKER_GAMEOVER }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: subtitle, subtitle: subtitle, sticker: STICKER_GAMEOVER }); } catch (e) {}
          })();
        }
      });
    }

    async function showMotivation() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = 'Ready to improve your score?';
      await transitionScreen.show({
        title: 'Ready to improve your score?', icons: [], persist: true,
        buttons: [{
          text: "I'm ready", type: 'primary',
          action: function () {
            try { FeedbackManager.sound.stopAll(); } catch (e) {}
            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            restartGame();
          }
        }],
        onMounted: function () {
          (async function () {
            try { if (progressBar) progressBar.update(0, gameState.totalLives); } catch (e) {}
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_MOTIVATE }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_MOTIVATE }); } catch (e) {}
          })();
        }
      });

    async function showStarsCollected() {
      gameState.phase = 'stars_collected';
      syncDOM();
      await transitionScreen.show({
        title: "Yay!\nStars collected!", buttons: [], persist: true,
        styles: { title: { whiteSpace: 'pre-line', lineHeight: '1.3' } },
        onMounted: function () {
          (async function () {
            try { await safePlaySound('victory_sound_effect', { sticker: STICKER_VICTORY }); } catch (e) {}
            try {
              window.postMessage({
                type: 'show_star',
                data: { count: gameState.stars, variant: 'yellow', score: gameState.score + '/' + gameState.totalRounds }
              }, '*');

      });

    function escapeHTML(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function renderAnswerSlide(container, round) {
      if (!container || !round) return;
      var html = '<div class="hex-answer-card">';
      html += '<div style="font-size:18px;font-weight:700;color:#270f36;margin-bottom:10px;">Round ' + round.round + '</div>';
      html += '<div style="display:flex;gap:8px;justify-content:center;align-items:flex-start;flex-wrap:wrap;">';
      // Left flower
      html += '<div class="hex-answer-flower">';
      for (var i = 0; i < 6; i++) {
        html += '<div class="hex ' + POSITIONS[i] + '">' + escapeHTML(String(round.petalsLeft[i])) + '</div>';
      }
      html += '<div class="hex p-center">' + escapeHTML(String(round.totalLeft)) + '</div>';
      html += '</div>';
      // Right flower
      html += '<div class="hex-answer-flower">';
      for (var j = 0; j < 6; j++) {
        html += '<div class="hex ' + POSITIONS[j] + '">' + escapeHTML(String(round.petalsRight[j])) + '</div>';
      }
      html += '<div class="hex p-center">' + escapeHTML(String(round.totalRight)) + '</div>';
      html += '</div>';
      html += '</div>';
      html += '<div style="margin-top:10px;font-size:14px;color:#666;">' + escapeHTML(round.hint) + '</div>';
      html += '</div>';
      container.innerHTML = html;
    }

    function buildAnswerSlidesForAllRounds() {
      var rounds = gameState.activeRounds;
      var slides = [];
      for (var i = 0; i < rounds.length; i++) {
        (function (r) { slides.push({ render: function (container) { renderAnswerSlide(container, r); } }); })(rounds[i]);
      }
      return slides;
    }

    function showAnswerCarousel() {
      try { answerComponent.show({ slides: buildAnswerSlidesForAllRounds() }); } catch (e) {}
      try { if (floatingBtn) floatingBtn.setMode('next'); } catch (e) {}
      try {
        setTimeout(function () {
          var slot = document.getElementById('mathai-answer-slot');
          if (slot && slot.scrollIntoView) slot.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 200);
      } catch (e) {}
    }

    function setupGame() {
      var content = gameState.content || fallbackContent;
      gameState.content = content;
      gameState.totalRounds = content.totalRounds || 10;
      gameState.totalLives = content.totalLives || 3;
      gameState.lives = gameState.totalLives;
      gameState.activeRounds = getRounds();
      injectGameHTML();
      renderInitialState();
      try {
        previewScreen.show({
          instruction: content.previewInstruction || fallbackContent.previewInstruction,
          audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
          showGameOnPreview: content.showGameOnPreview === true,
          onComplete: function (previewData) { startGameAfterPreview(previewData); }
        });
      } catch (e) { console.error('[previewScreen.show failed]', e && e.message, e); }
    }

    function startGameAfterPreview(previewData) {
      gameState.previewResult = previewData || {};
      gameState.duration_data.preview = gameState.duration_data.preview || [];
      gameState.duration_data.preview.push({ duration: (previewData && previewData.duration) || 0 });
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      try { if (progressBar) { progressBar.show(); progressBar.update(0, gameState.totalLives); } } catch (e) {}
      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex] });
      try { if (signalCollector && signalCollector.recordViewEvent) signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}
      showWelcome();
    }

    async function showWelcome() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = "Let's play Hexa Numbers! Add the petals and type the centre.";
      await transitionScreen.show({
        title: 'Welcome!', icons: [], persist: true,
        buttons: [{
          text: "Let's go!", type: 'primary', data_testid: 'btn-start',
          action: function () {
            try { FeedbackManager.sound.stopAll(); } catch (e) {}
            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            showRoundIntro(1);
          }
        }],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('sound_level_transition', { sticker: STICKER_LEVEL }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_LEVEL }); } catch (e) {}
          })();
        }
      });
    }

    function resetGameState() {
      gameState.phase = 'gameplay';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState._gameCompletePosted = false;
      gameState.stars = 0;
      gameState.correctAnswer = null;
      gameState.progress = 0;
      gameState.duration_data = { startTime: null, endTime: null, preview: gameState.duration_data.preview || [] };
      gameState.activeRounds = getRounds();
      gameState._timerStarted = false;
      gameState.timerIntentionallyPaused = false;
      gameState.leftCorrect = false;
      gameState.rightCorrect = false;
      gameState.activeSide = 'left';
      try { if (timer) { if (timer.reset) timer.reset(); if (timer.pause) timer.pause(); } } catch (e) {}
      try {
        if (answerComponent && answerComponent.update) answerComponent.update({ slides: [] });
        if (answerComponent && answerComponent.hide) answerComponent.hide();
      } catch (e) {}
    }

    function restartGame() {
      var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
      gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      resetGameState();
      try { if (signalCollector && signalCollector.reset) signalCollector.reset(); } catch (e) {}
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      try { if (progressBar) progressBar.update(0, gameState.totalLives); } catch (e) {}
      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex], restart: true });
      showRoundIntro(1);
    }

    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      var t = event.data.type;
      var data = event.data.data || {};
      if (t === 'game_init') {
        gameState.phase = 'playing';
        if (data.content) gameState.content = data.content;
        gameState.signalConfig = data.signalConfig || {};
        if (data.signalConfig && signalCollector && signalCollector.applyConfig) {
          try { signalCollector.applyConfig(data.signalConfig); } catch (e) {}
        }
        try {
          if (signalCollector) {
            signalCollector.gameId = 'type-into-central-hex-input';
            if (data.sessionId) signalCollector.sessionId = data.sessionId;
            if (data.studentId) signalCollector.studentId = data.studentId;
            if (data.contentSetId) signalCollector.contentSetId = data.contentSetId;
            if (data.signalConfig && data.signalConfig.flushUrl) signalCollector.flushUrl = data.signalConfig.flushUrl;
            if (data.signalConfig && data.signalConfig.playId) signalCollector.playId = data.signalConfig.playId;
            if (signalCollector.startFlushing) { try { signalCollector.startFlushing(); } catch (e) {} }
          }
        } catch (e) {}
        syncDOM();
        setupGame();
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      waitForPackages().then(function () {
        try {
          var initP = FeedbackManager.init && FeedbackManager.init();
          var doInit = initP && initP.then ? initP : Promise.resolve();
          doInit.then(function () {
            try {
              try {
                signalCollector = new SignalCollector({
                  sessionId: 'hex-' + Date.now(),
                  studentId: 'standalone',
                  gameId: 'type-into-central-hex-input',
                  contentSetId: 'fallback'
                });
                window.signalCollector = signalCollector;
              } catch (e) { console.error('[SignalCollector ctor failed]', e && e.message, e); }
              try {
                ScreenLayout.inject('app', {
                  slots: { previewScreen: true, progressBar: true, transitionScreen: true, floatingButton: true, answerComponent: true }
                });
              } catch (e) { console.error('[ScreenLayout.inject failed]', e && e.message, e); }
              mountTimerInsideHeader();
              injectGameHTML();
              renderInitialState();
              try { timer = new TimerComponent('timer-container', { timerType: 'increase', format: 'min', startTime: 0, autoStart: false }); }
              catch (e) { console.error('[TimerComponent ctor failed]', e && e.message, e); }
              try {
                visibilityTracker = new VisibilityTracker({
                  popupProps: { title: 'Paused', description: 'Tap Resume to continue.', primaryText: 'Resume' },
                  onInactive: function () {
                    try { FeedbackManager.sound.pause(); } catch (e) {}
                    try { FeedbackManager.stream.pauseAll(); } catch (e) {}
                    try { if (timer && !gameState.timerIntentionallyPaused) timer.pause(); } catch (e) {}
                    try { if (previewScreen) previewScreen.pause(); } catch (e) {}
                  },
                  onResume: function () {
                    try { FeedbackManager.sound.resume(); } catch (e) {}
                    try { FeedbackManager.stream.resumeAll(); } catch (e) {}
                    try { if (timer && !gameState.timerIntentionallyPaused) timer.resume(); } catch (e) {}
                    try { if (previewScreen) previewScreen.resume(); } catch (e) {}
                  }
                });
              } catch (e) { console.error('[VisibilityTracker ctor failed]', e && e.message, e); }
              try { progressBar = new ProgressBarComponent({ slotId: 'mathai-progress-slot', totalRounds: 10, totalLives: 2 }); }
              catch (e) { console.error('[ProgressBarComponent ctor failed]', e && e.message, e); }
              try { transitionScreen = new TransitionScreenComponent({ slotId: 'mathai-transition-slot' }); }
              catch (e) { console.error('[TransitionScreenComponent ctor failed]', e && e.message, e); }
              try { previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' }); }
              catch (e) { console.error('[PreviewScreenComponent ctor failed]', e && e.message, e); }
              try { floatingBtn = new FloatingButtonComponent({ slotId: 'mathai-floating-button-slot' }); }
              catch (e) { console.error('[FloatingButtonComponent ctor failed]', e && e.message, e); }
              try { answerComponent = new AnswerComponentComponent({ slotId: 'mathai-answer-slot' }); }
              catch (e) { console.error('[AnswerComponentComponent ctor failed]', e && e.message, e); }
              try {
                if (floatingBtn && floatingBtn.on) {
                  floatingBtn.on('submit', function () { attemptSubmit(); });
                  floatingBtn.on('next', function () {
                    try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
                    try { if (answerComponent) answerComponent.destroy(); } catch (e) {}
                    try { if (previewScreen) previewScreen.destroy(); } catch (e) {}
                    try { if (floatingBtn) floatingBtn.destroy(); } catch (e) {}
                  });
                }
              } catch (e) {}
              try {
                FeedbackManager.sound.preload([
                  { id: 'correct_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
                  { id: 'incorrect_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                  { id: 'rounds_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                  { id: 'sound_level_transition',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
                  { id: 'victory_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                  { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
                  { id: 'game_over_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                  { id: 'tap_sound',                url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
                ]);
              } catch (e) { console.error('[FeedbackManager.preload failed]', e && e.message, e); }
              window.addEventListener('message', handlePostMessage);
              try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
              setupGame();
            } catch (e) { console.error('[init inner] ' + (e && e.message), e); }
          }, function (e) { console.error('[FeedbackManager.init failed]', e && e.message, e); });
        } catch (e) { console.error('[init outer] ' + (e && e.message), e); }
      }, function (err) { console.error('[waitForPackages rejected] ' + (err && err.message)); });

      setTimeout(function () {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;
        var missing = [];
        if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
        if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
        if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
        if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
        if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
        if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
        if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
        if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
        if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
        if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
        if (missing.length > 0) {
          var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
          console.error('[' + msg + ']');
          var gc = document.getElementById('gameContent') || document.getElementById('app') || document.body;
          if (gc) gc.innerHTML = '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">Game failed to load — please refresh.</div>';
        }
      }, 2000);

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = setupGame;
      window.renderRound = renderRound;
      window.loadRound = function (n) { try { renderRound(n); } catch (e) {} };
      window.debugGame = function () { return gameState; };
    });

    function mountTimerInsideHeader() {
      var slot = document.getElementById('mathai-preview-slot');
      if (!slot) return;
      var existing = document.getElementById('timer-container');
      if (existing) {
        if (existing.parentNode !== slot) slot.appendChild(existing);
        return;
      }
      var div = document.createElement('div');
      div.id = 'timer-container';
      slot.appendChild(div);
    }
  </script>
</body>
</html>
