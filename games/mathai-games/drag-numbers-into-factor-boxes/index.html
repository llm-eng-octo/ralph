<html lang="en">
<head>

  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({ release: 'two-boxes-factors@1.0.0' }));
    }
  </script>

  <script>window.addEventListener('load', initSentry);</script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;
      --mathai-padding-large: 56px 40px;
      --mathai-padding-medium: 16px 24px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; overflow-x: hidden; margin: 0; padding: 0;
      overscroll-behavior: none;
    }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
      min-height: 100dvh;
    }
    @supports not (min-height: 100dvh) { body { min-height: 100vh; } }
    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    @supports not (min-height: 100dvh) { #app { min-height: 100vh; } }
    .hidden { display: none !important; }
    button, [role="button"] { min-height: 44px; min-width: 44px; touch-action: manipulation; }
    input, textarea { -webkit-user-select: text; user-select: text; }
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: var(--mathai-white); color: var(--mathai-primary);
        font-family: var(--mathai-font-family);
        font-size: var(--mathai-font-size-subtitle);
        text-align: center; padding: 24px;
      }
    }
    #gameContent {
      width: 100%;
      padding: 8px 12px 110px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
    }

    .factor-wrapper {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 auto;
    }

    .boxes-row {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 8px;
      background: var(--mathai-light-gray);
      border-radius: 12px;
      box-sizing: border-box;
    }
    .boxes-row.single-box {
      grid-template-columns: 1fr;
    }

    .factor-box {
      flex: 1;
      min-height: 130px;
      padding: 8px;
      background: var(--mathai-white);
      border: 2px solid var(--mathai-border-gray);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .factor-box-title {
      font-size: var(--mathai-font-size-small);
      font-weight: 700;
      color: var(--mathai-primary);
      margin-bottom: 6px;
      text-align: center;
    }

    .factor-box-content {
      width: 100%;
      min-height: 90px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-content: flex-start;
      padding: 6px;
    }
    .factor-box-content > * {
      margin: 3px;
    }

    .factor-box.flash-red {
      border-color: var(--mathai-cell-border-red);
      background: var(--mathai-cell-bg-red);
      animation: redPulse 0.6s ease;
    }

    .pool-tray {
      width: 100%;
      max-width: 360px;
      margin: 14px auto 0 auto;
      padding: 10px 8px;
      background: #F1F5F9;
      border: 1px solid #E2E8F0;
      border-radius: 14px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pool-tray > .pool-slot {
      margin: 3px;
    }

    .pool-slot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 50px;
      flex-shrink: 0;
    }
    .pool-slot.empty { display: none; }

    .factor-tile {
      width: 50px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--mathai-white);
      border: 2px solid var(--mathai-text-primary);
      border-radius: 10px;
      font-weight: 800;
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-text-primary);
      cursor: grab;
      touch-action: none;
      flex-shrink: 0;
      box-sizing: border-box;
    }
    .factor-tile:active { cursor: grabbing; }
    .factor-tile.in-box {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
    }

    .factor-wrapper.locked .factor-tile,
    .factor-wrapper.locked .factor-box { pointer-events: none; }

    @keyframes redPulse {
      0%, 100% { background: var(--mathai-cell-bg-red); }
      50% { background: #FFB3B3; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .shake-wrong { animation: shake 0.5s ease; }

    .answer-slide {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 4px 12px 4px;
    }
    .answer-caption {
      font-size: 13px;
      font-weight: 600;
      color: var(--mathai-text-primary);
      text-align: center;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0"></div>

  <script>
    var STICKER_CELEBRATE = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_SAD = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_VICTORY = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_VICTORY_2 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_VICTORY_1 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_VICTORY_GENERIC = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-107.gif';
    var STICKER_RESTART = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-102.gif';

    var gameState = {
      gameId: 'two-boxes-factors',
      phase: 'start_screen',
      currentRound: 1,
      totalRounds: 10,
      totalLives: 3,
      lives: 3,
      score: 0,
      stars: 0,
      starsByRound: [],
      progress: 0,
      attempts: [],
      events: [],
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      startTime: null,
      roundStartTime: null,
      duration_data: { startTime: null, preview: [] },
      content: null,
      previewResult: null,
      setIndex: 0,
      activeRounds: [],
      placement: {}, // tileKey -> 'box1' | 'box2' | 'pool'
      wrongDrops: 0,
      lostHeartThisRound: false,
      correctAnswer: null
    };
    window.gameState = gameState;

    /* For each round: target1, target2 (numbers whose factors), pool of candidate digits.
       Each tile represents a candidate; placing a tile in a box means "I claim this is a factor of that target".
       Some tiles are factors of one only, some of both, some of neither.
       For common factors (e.g. 1, 2, 5, 10 for 20+30), we provide TWO copies with distinct keys. */
    function _factorsOf(n) {
      var arr = [];
      for (var i = 1; i <= n; i++) if (n % i === 0) arr.push(i);
      return arr;
    }

    function makeSingleBoxRound(setKey, roundN, target) {
      // Stage 1 — single box (factors of target), no decoys
      var factors = _factorsOf(target);
      var tiles = factors.map(function (v, i) {
        return { key: setKey + roundN + '_t' + i, value: v, belongsTo: ['box1'] };
      });
      return {
        set: setKey, id: setKey + '_r' + roundN + '_factors', round: roundN, stage: 1, type: 'factors',
        target1: target, target2: null,
        tiles: tiles,
        misconception_tags: ['put-non-factor', 'missed-factor']
      };
    }

    function makeTwoBoxRound(setKey, roundN, t1, t2, withDecoys) {
      // Stage 2 (no decoys) or Stage 3 (with non-factor decoys)
      var f1 = _factorsOf(t1);
      var f2 = _factorsOf(t2);
      var tiles = [];
      var idx = 0;
      // Tiles for f1 (factors of t1). For common factors with t2, we'll add a duplicate tile.
      f1.forEach(function (v) {
        tiles.push({ key: setKey + roundN + '_t' + (idx++) + '_a', value: v, belongsTo: ['box1'] });
      });
      // Tiles for f2 — but if v is also factor of t1, we already have an "a" tile in box1; add a "b" tile for box2.
      f2.forEach(function (v) {
        tiles.push({ key: setKey + roundN + '_t' + (idx++) + '_b', value: v, belongsTo: ['box2'] });
      });
      if (withDecoys) {
        // Add a couple of non-factors (decoys) — pool tiles that belong nowhere.
        var decoys = [];
        var maxT = Math.max(t1, t2);
        for (var k = 2; k <= Math.min(maxT, 30) && decoys.length < 2; k++) {
          if (t1 % k !== 0 && t2 % k !== 0) decoys.push(k);
        }
        if (decoys.length === 0) decoys = [maxT + 1, maxT + 3];
        decoys.forEach(function (v) {
          tiles.push({ key: setKey + roundN + '_d' + (idx++), value: v, belongsTo: [] });
        });
      }
      return {
        set: setKey, id: setKey + '_r' + roundN + '_factors', round: roundN,
        stage: withDecoys ? 3 : 2, type: 'factors',
        target1: t1, target2: t2,
        tiles: tiles,
        hasDecoys: !!withDecoys,
        misconception_tags: ['put-non-factor', 'missed-factor', 'wrong-box']
      };
    }

    var fallbackContent = {
      previewInstruction: '<p><strong>Two Boxes — Factors</strong></p><p>Drag each number into the box where it belongs. A factor goes in the box where it divides evenly. Some numbers are factors of <strong>both</strong> targets — use the duplicate tile.</p>',
      previewAudioText: "Drag each number into the right factor box.",
      previewAudio: null,
      showGameOnPreview: false,
      totalRounds: 10,
      totalLives: 3,
      timer: false,
      rounds: [
        // Set A — Stage 1 (1-3) single box; Stage 2 (4-7) two boxes no decoys; Stage 3 (8-10) two boxes WITH decoys
        makeSingleBoxRound('A', 1, 12),
        makeSingleBoxRound('A', 2, 16),
        makeSingleBoxRound('A', 3, 18),
        makeTwoBoxRound('A', 4, 20, 30, false),
        makeTwoBoxRound('A', 5, 15, 25, false),
        makeTwoBoxRound('A', 6, 14, 21, false),
        makeTwoBoxRound('A', 7, 8, 12, false),
        makeTwoBoxRound('A', 8, 18, 24, true),
        makeTwoBoxRound('A', 9, 16, 28, true),
        makeTwoBoxRound('A', 10, 24, 36, true),
        // Set B — parallel difficulty
        makeSingleBoxRound('B', 1, 16),
        makeSingleBoxRound('B', 2, 20),
        makeSingleBoxRound('B', 3, 24),
        makeTwoBoxRound('B', 4, 12, 18, false),
        makeTwoBoxRound('B', 5, 10, 15, false),
        makeTwoBoxRound('B', 6, 9, 27, false),
        makeTwoBoxRound('B', 7, 6, 9, false),
        makeTwoBoxRound('B', 8, 20, 30, true),
        makeTwoBoxRound('B', 9, 18, 30, true),
        makeTwoBoxRound('B', 10, 24, 32, true),
        // Set C — parallel difficulty
        makeSingleBoxRound('C', 1, 10),
        makeSingleBoxRound('C', 2, 14),
        makeSingleBoxRound('C', 3, 15),
        makeTwoBoxRound('C', 4, 8, 12, false),
        makeTwoBoxRound('C', 5, 9, 12, false),
        makeTwoBoxRound('C', 6, 6, 8, false),
        makeTwoBoxRound('C', 7, 10, 12, false),
        makeTwoBoxRound('C', 8, 12, 18, true),
        makeTwoBoxRound('C', 9, 14, 21, true),
        makeTwoBoxRound('C', 10, 20, 28, true)
      ]
    };

    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var floatingBtn = null;
    var answerComponent = null;
    var dndManager = null;
    var dndDraggables = [];
    var dndDroppables = [];
    var tileEls = {};       // key -> tile element
    var poolSlotEls = {};   // key -> bank slot
    var boxEls = {};        // 'box1' | 'box2' -> element
    var boxContentEls = {}; // 'box1' | 'box2' -> content (children) element

    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-round', gameState.currentRound);
      app.setAttribute('data-lives', gameState.lives);
    }

    function trackEvent(eventName, payload) {
      try {
        gameState.events.push({ name: eventName, ts: Date.now(), payload: payload || {} });
        if (signalCollector && typeof signalCollector.recordEvent === 'function') {
          try { signalCollector.recordEvent(eventName, payload || {}); } catch (e) {}
        }
      } catch (e) { console.error('[trackEvent]', e && e.message); }
    }

    function recordAttempt(round, isCorrect, misTags) {
      try {
        var now = Date.now();
        gameState.attempts.push({
          attempt_timestamp: now,
          time_since_start_of_game: gameState.startTime ? (now - gameState.startTime) : 0,
          input_of_user: JSON.parse(JSON.stringify(gameState.placement)),
          correct: !!isCorrect,
          round_number: gameState.currentRound,
          question_id: round && round.id ? round.id : ('r' + gameState.currentRound),
          correct_answer: gameState.correctAnswer || '',
          response_time_ms: gameState.roundStartTime ? (now - gameState.roundStartTime) : 0,
          misconception_tag: (!isCorrect && misTags && misTags.length > 0) ? misTags[0] : null,
          difficulty_level: round && round.stage ? round.stage : 1,
          is_retry: false,
          metadata: {
            question_text: 'Sort factors of ' + (round ? round.target1 : '?') + (round && round.target2 ? ' and ' + round.target2 : ''),
            set: round && round.set ? round.set : null,
            wrong_drops: gameState.wrongDrops || 0,
            misconception_tags_all: misTags || [],
            hint_used: false,
            has_decoys: round && round.hasDecoys ? true : false
          }
        });
      } catch (e) { console.error('[recordAttempt]', e && e.message); }
    }

    function starsForFactorRound(wrongDropsInRound, lostHeart) {
      // 3★ zero wrong drops, 2★ 1-2 wrong, 1★ 3+ (still alive), 0★ heart lost
      if (lostHeart) return 0;
      if (wrongDropsInRound <= 0) return 3;
      if (wrongDropsInRound <= 2) return 2;
      return 1;
    }

    function getStars(score) {
      var arr = gameState.starsByRound || [];
      if (arr.length === 0) {
        if (typeof score !== 'number') score = gameState.score || 0;
        if (score >= 3) return 3;
        if (score >= 2) return 2;
        if (score >= 1) return 1;
        return 0;
      }
      var sum = 0;
      for (var i = 0; i < arr.length; i++) sum += arr[i];
      var maxPossible = arr.length * 3;
      if (maxPossible <= 0) return 0;
      var pct = sum / maxPossible;
      if (pct >= 0.85) return 3;
      if (pct >= 0.55) return 2;
      if (pct >= 0.20) return 1;
      return 0;
    }

    function getAvailableSets(rounds) {
      var seen = {};
      for (var i = 0; i < rounds.length; i++) if (rounds[i].set) seen[rounds[i].set] = true;
      var keys = Object.keys(seen).sort();
      return keys.length > 0 ? keys : ['A'];
    }

    function getRounds() {
      var source = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(source);
      var startIdx = gameState.setIndex % sets.length;
      var setId = sets[startIdx];
      var setRounds = source.filter(function (r) { return r.set === setId; });
      if (setRounds.length >= gameState.totalRounds) return setRounds.slice(0, gameState.totalRounds);
      return source.slice(0, gameState.totalRounds);
    }

    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            reject(err);
            throw new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    function preloadAudio() {
      if (typeof FeedbackManager === 'undefined' || !FeedbackManager.sound || !FeedbackManager.sound.preload) return;
      var assets = [
        { id: 'correct_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
        { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
        { id: 'sound_life_lost', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
        { id: 'rounds_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
        { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
        { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
        { id: 'sound_bubble_select', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3' },
        { id: 'sound_bubble_deselect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758712800721.mp3' },
        { id: 'tap_sound', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
      ];
      try { FeedbackManager.sound.preload(assets); } catch (e) {}
    }

    function safePlaySound(id, options) {
      try { return FeedbackManager.sound.play(id, options || {}); }
      catch (e) { return Promise.resolve(); }
    }
    function safePlayDynamic(opts) {
      try { return FeedbackManager.playDynamicFeedback(opts || {}); }
      catch (e) { return Promise.resolve(); }
    }

    function handlePostMessage(event) {
      try {
        var msg = event && event.data;
        if (!msg || typeof msg !== 'object') return;
        if (msg.type === 'game_init') {
          gameState.phase = 'playing';
          gameState.content = msg.data && msg.data.content ? msg.data.content : null;
          if (msg.data && typeof msg.data.totalRounds === 'number') gameState.totalRounds = msg.data.totalRounds;
          try {
            var sc = msg.data && msg.data.signalConfig ? msg.data.signalConfig : {};
            gameState.signalConfig = sc;
            if (signalCollector) {
              signalCollector.flushUrl = sc.flushUrl || signalCollector.flushUrl || '';
              signalCollector.playId = sc.playId || signalCollector.playId || ('two-boxes-factors-' + Date.now());
              signalCollector.gameId = sc.gameId || 'two-boxes-factors';
              signalCollector.sessionId = sc.sessionId || ('session-' + Date.now());
              signalCollector.contentSetId = sc.contentSetId || 'fallback';
              signalCollector.studentId = sc.studentId || 'anonymous';
              if (typeof signalCollector.startFlushing === 'function') {
                try { signalCollector.startFlushing(); } catch (e2) {}
              }
            }
          } catch (e1) {}
          syncDOM();
          setupGame();
        } else if (msg.type === 'game_pause') {
          try { FeedbackManager.sound.pause(); } catch (e) {}
        } else if (msg.type === 'game_resume') {
          try { FeedbackManager.sound.resume(); } catch (e) {}
        }
      } catch (e) { console.error('[handlePostMessage]', e && e.message); }
    }

    function endGame(success) {
      if (gameState.gameEnded) return;
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.phase = 'results';
      gameState.stars = getStars(gameState.score);
      syncDOM();
      trackEvent('game_end', { won: !!success, score: gameState.score, stars: gameState.stars });
      try {
        var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
        var elapsedSec = Math.round(elapsedMs / 1000);
        var accuracy = gameState.totalRounds > 0 ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0;
        var triesArr = [];
        for (var ai = 0; ai < gameState.attempts.length; ai++) triesArr.push(1);
        var signalSealed = { event_count: gameState.events.length, metadata: {} };
        try {
          if (signalCollector && typeof signalCollector.seal === 'function') {
            var sealed = signalCollector.seal();
            if (sealed) {
              if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count;
              if (sealed.metadata) signalSealed.metadata = sealed.metadata;
            }
          }
        } catch (e0) {}
        var totalStarsEarned = 0;
        if (gameState.starsByRound && gameState.starsByRound.length) {
          for (var si = 0; si < gameState.starsByRound.length; si++) totalStarsEarned += gameState.starsByRound[si];
        }
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: {
              score: gameState.score,
              totalQuestions: gameState.totalRounds,
              stars: gameState.stars,
              starsEarned: totalStarsEarned,
              starsMaxPossible: gameState.totalRounds * 3,
              starsByRound: gameState.starsByRound.slice(),
              accuracy: accuracy,
              time: elapsedSec,
              timeSpent: elapsedMs,
              tries: triesArr,
              attempts: gameState.attempts
            },
            completedAt: Date.now(),
            previewResult: gameState.previewResult || null,
            signal_event_count: signalSealed.event_count,
            signal_metadata: signalSealed.metadata
          }
        }, '*');
      } catch (e) { console.error('[endGame postMessage]', e && e.message); }
      try { showVictory(success); } catch (e) { console.error('[showVictory]', e && e.message); }
    }
    window.endGame = endGame;

    function getCurrentRound() {
      var rounds = gameState.activeRounds && gameState.activeRounds.length > 0 ? gameState.activeRounds : getRounds();
      var idx = Math.max(0, Math.min(rounds.length - 1, gameState.currentRound - 1));
      return rounds[idx];
    }

    function buildBoardDOM() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML = '';

      var wrapper = document.createElement('div');
      wrapper.className = 'factor-wrapper';
      wrapper.id = 'factor-wrapper';

      var boxesRow = document.createElement('div');
      boxesRow.className = 'boxes-row';
      boxesRow.id = 'boxesRow';

      var box1 = document.createElement('div');
      box1.className = 'factor-box';
      box1.id = 'box1';
      box1.setAttribute('data-box-id', 'box1');
      var box1Title = document.createElement('div');
      box1Title.className = 'factor-box-title';
      box1Title.id = 'box1Title';
      box1.appendChild(box1Title);
      var box1Content = document.createElement('div');
      box1Content.className = 'factor-box-content';
      box1Content.id = 'box1Content';
      box1.appendChild(box1Content);
      boxesRow.appendChild(box1);
      boxEls.box1 = box1;
      boxContentEls.box1 = box1Content;

      var box2 = document.createElement('div');
      box2.className = 'factor-box';
      box2.id = 'box2';
      box2.setAttribute('data-box-id', 'box2');
      var box2Title = document.createElement('div');
      box2Title.className = 'factor-box-title';
      box2Title.id = 'box2Title';
      box2.appendChild(box2Title);
      var box2Content = document.createElement('div');
      box2Content.className = 'factor-box-content';
      box2Content.id = 'box2Content';
      box2.appendChild(box2Content);
      boxesRow.appendChild(box2);
      boxEls.box2 = box2;
      boxContentEls.box2 = box2Content;

      wrapper.appendChild(boxesRow);

      var pool = document.createElement('div');
      pool.className = 'pool-tray';
      pool.id = 'poolTray';
      wrapper.appendChild(pool);

      gc.appendChild(wrapper);
    }

    function paintBoxTitles(round) {
      var t1 = document.getElementById('box1Title');
      var t2 = document.getElementById('box2Title');
      var box2El = document.getElementById('box2');
      var rowEl = document.getElementById('boxesRow');
      if (t1) t1.textContent = 'Factors of ' + round.target1;
      if (round.target2) {
        if (t2) t2.textContent = 'Factors of ' + round.target2;
        if (box2El) box2El.style.display = '';
        if (rowEl) rowEl.classList.remove('single-box');
      } else {
        if (t2) t2.textContent = '';
        if (box2El) box2El.style.display = 'none';
        if (rowEl) rowEl.classList.add('single-box');
      }
    }

    function buildPool(round) {
      tileEls = {};
      poolSlotEls = {};
      var pool = document.getElementById('poolTray');
      if (!pool) return;
      pool.innerHTML = '';
      // Clear box content too
      if (boxContentEls.box1) boxContentEls.box1.innerHTML = '';
      if (boxContentEls.box2) boxContentEls.box2.innerHTML = '';

      for (var i = 0; i < round.tiles.length; i++) {
        var t = round.tiles[i];
        var slot = document.createElement('div');
        slot.className = 'pool-slot';
        slot.id = 'pool-slot-' + t.key;
        slot.setAttribute('data-pool-key', t.key);

        var tile = document.createElement('div');
        tile.className = 'factor-tile';
        tile.id = 'tile-' + t.key;
        tile.setAttribute('data-tile-key', t.key);
        tile.setAttribute('data-value', String(t.value));
        tile.setAttribute('data-belongs', JSON.stringify(t.belongsTo));
        tile.textContent = String(t.value);

        slot.appendChild(tile);
        pool.appendChild(slot);
        tileEls[t.key] = tile;
        poolSlotEls[t.key] = slot;
        gameState.placement[t.key] = 'pool';
      }
    }

    function isAllTilesPlaced() {
      var tk = Object.keys(gameState.placement);
      for (var i = 0; i < tk.length; i++) {
        var key = tk[i];
        if (gameState.placement[key] === 'pool') {
          // Decoys (belongsTo: []) MUST stay in the pool to count as "placed"
          var tile = tileEls[key];
          var belongs = tile ? JSON.parse(tile.getAttribute('data-belongs') || '[]') : [];
          if (belongs.length === 0) continue;
          return false;
        }
      }
      return tk.length > 0;
    }

    function refreshSubmittable() {
      if (!floatingBtn) return;
      try { floatingBtn.setSubmittable(isAllTilesPlaced() && !gameState.isProcessing); } catch (e) {}
    }

    function evaluatePlacement(round) {
      var tk = Object.keys(gameState.placement);
      for (var i = 0; i < tk.length; i++) {
        var key = tk[i];
        var here = gameState.placement[key];
        var tile = tileEls[key];
        if (!tile) return false;
        var belongs = JSON.parse(tile.getAttribute('data-belongs') || '[]');
        if (here === 'pool') {
          // Decoys with no belongsTo are correctly left in the pool
          if (belongs.length === 0) continue;
          return false;
        }
        if (belongs.indexOf(here) === -1) return false;
      }
      return true;
    }

    async function handleCheck() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      if (!isAllTilesPlaced()) return;
      gameState.isProcessing = true;
      refreshSubmittable();
      try {
        var wrap = document.getElementById('factor-wrapper');
        if (wrap) wrap.classList.add('locked');
      } catch (e) {}

      var round = getCurrentRound();
      var correct = evaluatePlacement(round);
      var misTags = correct ? [] : ['wrong-box'];

      if (correct) gameState.score += 1;

      // Per-round star accumulation (concept §"Win condition and stars")
      var roundStars = correct
        ? starsForFactorRound(gameState.wrongDrops || 0, !!gameState.lostHeartThisRound)
        : 0;
      gameState.starsByRound.push(roundStars);

      recordAttempt(round, correct, misTags);
      trackEvent('answer_submitted', { round: gameState.currentRound, set: round && round.set, is_correct: correct, stars: roundStars });

      gameState.progress = (gameState.progress || 0) + 1;
      if (progressBar) {
        try { progressBar.update(gameState.progress, gameState.lives); } catch (e) {}
      }

      if (correct) {
        try {
          await Promise.all([
            FeedbackManager.sound.play('correct_sound_effect', { sticker: STICKER_CELEBRATE }),
            new Promise(function (r) { setTimeout(r, 1500); })
          ]);
        } catch (e) {}
        try {
          await safePlayDynamic({
            audio_content: 'Excellent! Every number is in its right factor box.',
            subtitle: 'All factors sorted!',
            sticker: STICKER_CELEBRATE
          });
        } catch (e) {}
      } else {
        try {
          await Promise.all([
            FeedbackManager.sound.play('incorrect_sound_effect', { sticker: STICKER_SAD }),
            new Promise(function (r) { setTimeout(r, 1500); })
          ]);
        } catch (e) {}
        try {
          await safePlayDynamic({
            audio_content: 'Some numbers are in the wrong box. A factor must divide its target evenly.',
            subtitle: 'Check the boxes again.',
            sticker: STICKER_SAD
          });
        } catch (e) {}
      }

      trackEvent('round_complete', { round: gameState.currentRound, is_correct: correct, score: gameState.score });

      if (gameState.currentRound < gameState.totalRounds) {
        gameState.currentRound += 1;
        await showRoundIntro(gameState.currentRound);
        renderRound();
      } else {
        endGame(correct);
      }
    }

    async function showRoundIntro(n) {
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { FeedbackManager._stopCurrentDynamic && FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      if (!transitionScreen) return;
      var title = 'Round ' + n;
      await transitionScreen.show({ title: title, icons: ['🎯'], buttons: [], persist: true });
      try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND }); } catch (e) {}
      try { await safePlayDynamic({ audio_content: title, subtitle: title, sticker: STICKER_ROUND }); } catch (e) {}
      try { transitionScreen.hide(); } catch (e) {}
    }

    function renderRound() {
      gameState.isProcessing = false;
      gameState.isActive = true;
      gameState.wrongDrops = 0;
      gameState.lostHeartThisRound = false;
      gameState.roundStartTime = Date.now();
      gameState.phase = 'playing';
      syncDOM();

      var round = getCurrentRound();
      if (!round) return;

      gameState.placement = {};
      gameState.correctAnswer = JSON.stringify(round.tiles.map(function (t) { return { v: t.value, b: t.belongsTo }; }));

      paintBoxTitles(round);
      buildPool(round);

      try {
        var wrap = document.getElementById('factor-wrapper');
        if (wrap) wrap.classList.remove('locked');
      } catch (e) {}

      buildDndForRound();
      refreshSubmittable();

      if (progressBar) {
        try { progressBar.update(gameState.progress, gameState.lives); } catch (e) {}
      }
    }

    function destroyDndRound() {
      try {
        for (var i = 0; i < dndDraggables.length; i++) {
          if (dndDraggables[i] && typeof dndDraggables[i].destroy === 'function') {
            try { dndDraggables[i].destroy(); } catch (e) {}
          }
        }
      } catch (e) {}
      try {
        for (var j = 0; j < dndDroppables.length; j++) {
          if (dndDroppables[j] && typeof dndDroppables[j].destroy === 'function') {
            try { dndDroppables[j].destroy(); } catch (e) {}
          }
        }
      } catch (e) {}
      dndDraggables = [];
      dndDroppables = [];
    }

    function buildDndForRound() {
      destroyDndRound();
      if (!dndManager || !window.DnDKit) return;
      Object.keys(tileEls).forEach(function (k) {
        var tile = tileEls[k];
        if (!tile) return;
        try {
          var draggable = new window.DnDKit.Draggable({
            id: 'tile-' + k,
            element: tile,
            data: { tileKey: k }
          }, dndManager);
          dndDraggables.push(draggable);
        } catch (e) { console.error('[Draggable]', e && e.message); }
      });
      ['box1','box2'].forEach(function (boxId) {
        var el = boxEls[boxId];
        if (!el) return;
        try {
          var droppable = new window.DnDKit.Droppable({
            id: 'box-' + boxId,
            element: el,
            data: { boxId: boxId }
          }, dndManager);
          dndDroppables.push(droppable);
        } catch (e) { console.error('[Droppable box]', e && e.message); }
      });
      // Pool as droppable
      var pool = document.getElementById('poolTray');
      if (pool) {
        try {
          var trayDroppable = new window.DnDKit.Droppable({
            id: 'pool-tray',
            element: pool,
            data: { boxId: 'pool' }
          }, dndManager);
          dndDroppables.push(trayDroppable);
        } catch (e) { console.error('[Droppable pool]', e && e.message); }
      }
    }

    function placeTileInBox(tileKey, boxId) {
      var tile = tileEls[tileKey];
      if (!tile) return;
      var content = boxContentEls[boxId];
      if (!content) return;
      content.appendChild(tile);
      tile.classList.add('in-box');
      tile.classList.remove('placed','empty');
      if (poolSlotEls[tileKey]) poolSlotEls[tileKey].classList.add('empty');
      gameState.placement[tileKey] = boxId;
      tile.style.position = '';
      tile.style.left = '';
      tile.style.top = '';
      tile.style.transform = '';
      tile.style.zIndex = '';
    }

    function returnTileToBank(tileKey) {
      var tile = tileEls[tileKey];
      var bank = poolSlotEls[tileKey];
      if (!tile || !bank) return;
      bank.appendChild(tile);
      tile.classList.remove('in-box','placed','empty');
      bank.classList.remove('empty');
      gameState.placement[tileKey] = 'pool';
      tile.style.position = '';
      tile.style.left = '';
      tile.style.top = '';
      tile.style.transform = '';
      tile.style.zIndex = '';
    }

    function findSlotForTag(tileKey) {
      var p = gameState.placement[tileKey];
      if (p === 'pool') return null;
      return p;
    }

    function tileBelongsTo(srcKey) {
      var tile = tileEls[srcKey];
      if (!tile) return [];
      try { return JSON.parse(tile.getAttribute('data-belongs') || '[]'); }
      catch (e) { return []; }
    }

    function handleDragEnd(event) {
      try {
        var op = event && event.operation;
        if (!op) return;
        var src = op.source;
        var tgt = op.target;
        var canceled = op.canceled;
        if (!src || !src.data) return;
        var srcKey = src.data.tileKey;
        if (!srcKey) return;

        var sourceBox = findSlotForTag(srcKey);

        if (canceled || !tgt || !tgt.data) {
          safePlaySound('tap_sound', {});
          if (sourceBox) placeTileInBox(srcKey, sourceBox);
          else returnTileToBank(srcKey);
          refreshSubmittable();
          return;
        }

        var tgtBox = tgt.data.boxId;

        if (tgtBox === 'pool') {
          returnTileToBank(srcKey);
          safePlaySound('sound_bubble_deselect', {});
          refreshSubmittable();
          return;
        }

        // Wrong-drop detection: target box not in tile's belongsTo list
        var belongs = tileBelongsTo(srcKey);
        if (belongs.indexOf(tgtBox) === -1) {
          gameState.wrongDrops = (gameState.wrongDrops || 0) + 1;
          safePlaySound('incorrect_sound_effect', {});
          // Bounce-back: keep at source (or pool)
          if (sourceBox) placeTileInBox(srcKey, sourceBox);
          else returnTileToBank(srcKey);
          // Flash the wrong box
          var be = boxEls[tgtBox];
          if (be) {
            be.classList.add('flash-red');
            setTimeout(function () { try { be.classList.remove('flash-red'); } catch (e) {} }, 500);
          }
          // 3 wrong drops → heart shatters (concept §"What the player sees and does")
          if (gameState.wrongDrops >= 3) {
            handleHeartShatter();
          }
          refreshSubmittable();
          return;
        }

        // Correct drop: place tile in target box
        placeTileInBox(srcKey, tgtBox);
        safePlaySound('sound_bubble_select', {});
        refreshSubmittable();
      } catch (e) {
        console.error('[handleDragEnd]', e && e.message);
        if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
      }
    }

    async function handleHeartShatter() {
      if (gameState.lostHeartThisRound) return;
      gameState.lostHeartThisRound = true;
      gameState.lives = Math.max(0, (gameState.lives || 0) - 1);
      try { if (progressBar) progressBar.update(gameState.progress || 0, gameState.lives); } catch (e) {}
      syncDOM();
      var wasLastLife = gameState.lives <= 0;
      if (wasLastLife) {
        gameState.isProcessing = true;
        // Last-life wrong: play wrong SFX (awaited 1500ms) BEFORE endGame (CASE 8)
        try {
          await Promise.all([
            FeedbackManager.sound.play('incorrect_sound_effect', { sticker: STICKER_SAD }),
            new Promise(function (r) { setTimeout(r, 1500); })
          ]);
        } catch (e) {}
      }
      if (gameState.lives <= 0) {
        gameState.starsByRound.push(0);
        endGame(false);
      }
    }

    function handleDragStart(event) {
      if (!gameState.isActive || gameState.isProcessing || gameState.gameEnded) {
        try { if (event && typeof event.preventDefault === 'function') event.preventDefault(); } catch (e) {}
      }
    }

    async function showVictory(success) {
      if (!transitionScreen) return;
      var stars = gameState.stars;
      var subtitle;
      if (!success) subtitle = "All hearts gone — let's try again!";
      else if (stars === 3) subtitle = 'Perfect! Every factor sorted.';
      else if (stars === 2) subtitle = 'Great work — most factors right.';
      else if (stars === 1) subtitle = 'Good try!';
      else subtitle = "Let's try a new puzzle!";

      var stickerForVictory;
      if (!success) stickerForVictory = STICKER_VICTORY_GENERIC;
      else if (stars === 3) stickerForVictory = STICKER_VICTORY;
      else if (stars === 2) stickerForVictory = STICKER_VICTORY_2;
      else if (stars === 1) stickerForVictory = STICKER_VICTORY_1;
      else stickerForVictory = STICKER_VICTORY_GENERIC;

      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}

      var playAgainAct = function () { try { transitionScreen.hide(); } catch (e) {} showMotivation(); };
      var claimStarsAct = function () { try { transitionScreen.hide(); } catch (e) {} showStarsCollected(); };

      await transitionScreen.show({
        title: success ? 'Victory 🎉' : 'Game Over',
        subtitle: subtitle,
        stars: stars,
        buttons: (!success || stars < 3)
          ? [
              { text: 'Play Again', type: 'secondary', action: playAgainAct },
              { text: 'Claim Stars', type: 'primary', action: claimStarsAct }
            ]
          : [
              { text: 'Play Again', type: 'secondary', action: claimStarsAct, hidden: true },
              { text: 'Claim Stars', type: 'primary', action: claimStarsAct }
            ],
        persist: true,
        onMounted: function () {
          (async function () {
            try {
              await safePlaySound(success ? 'victory_sound_effect' : 'game_over_sound_effect', { sticker: stickerForVictory });
            } catch (e) {}
            try { await safePlayDynamic({ audio_content: subtitle, subtitle: subtitle, sticker: stickerForVictory }); } catch (e) {}
          })();
        }
      });
    }

    async function showMotivation() {
      if (!transitionScreen) return;
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      await transitionScreen.show({
        title: 'Ready to improve your score? ⚡',
        buttons: [{ text: "I'm ready! 🙌", type: 'primary', action: function () {
          try { transitionScreen.hide(); } catch (e) {}
          restartGame();
        }}],
        persist: true,
        onMounted: function () {
          try { if (progressBar) progressBar.update(0, gameState.lives || gameState.totalLives || 3); } catch (e) {}
          (async function () {
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_RESTART }); } catch (e) {}
            try { await safePlayDynamic({ audio_content: 'Ready for another puzzle?', subtitle: 'Ready for another puzzle?', sticker: STICKER_RESTART }); } catch (e) {}
          })();
        }
      });
    }

    async function showStarsCollected() {
      if (!transitionScreen) return;
      var count = Math.max(1, Math.min(3, gameState.stars || 1));
      await transitionScreen.show({
        title: 'Yay! 🎉\nStars collected!',
        buttons: [],
        persist: true,
        styles: { title: { whiteSpace: 'pre-line', lineHeight: '1.3' } },
        onMounted: function () {
          (async function () {
            try { await safePlaySound('victory_sound_effect', { sticker: STICKER_CELEBRATE }); } catch (e) {}
            try {
              window.postMessage({
                type: 'show_star',
                data: { count: count, variant: 'yellow', score: gameState.score + '/' + gameState.totalRounds }
              }, '*');
            } catch (e) {}
            setTimeout(function () { showAnswerCarousel(); }, 1500);
          })();
        }
      });
    }

    function buildAnswerSlidesForAllRounds() {
      var rounds = gameState.activeRounds && gameState.activeRounds.length > 0 ? gameState.activeRounds : getRounds();
      var roundsCopy = rounds.slice(0, gameState.totalRounds);
      return roundsCopy.map(function (round, idx) {
        return {
          render: function (container) { renderAnswerForRound(round, container, idx + 1); }
        };
      });
    }

    function renderAnswerForRound(round, container, roundNum) {
      if (!container || !round) return;
      container.innerHTML = '';
      var slide = document.createElement('div');
      slide.className = 'answer-slide';

      var caption = document.createElement('div');
      caption.className = 'answer-caption';
      var capStr = 'Round ' + roundNum + ' • Factors of ' + round.target1;
      if (round.target2) capStr += ' & ' + round.target2;
      caption.textContent = capStr;
      slide.appendChild(caption);

      // Show the correct sorting
      var b1 = []; var b2 = [];
      for (var i = 0; i < round.tiles.length; i++) {
        var t = round.tiles[i];
        if (t.belongsTo.indexOf('box1') !== -1) b1.push(t.value);
        if (t.belongsTo.indexOf('box2') !== -1) b2.push(t.value);
      }
      var line1 = document.createElement('div');
      line1.style.fontSize = '14px';
      line1.style.color = '#219653';
      line1.style.marginTop = '6px';
      line1.textContent = 'Factors of ' + round.target1 + ': ' + b1.join(', ');
      slide.appendChild(line1);

      if (round.target2) {
        var line2 = document.createElement('div');
        line2.style.fontSize = '14px';
        line2.style.color = '#219653';
        line2.style.marginTop = '6px';
        line2.textContent = 'Factors of ' + round.target2 + ': ' + b2.join(', ');
        slide.appendChild(line2);
      }
      container.appendChild(slide);
    }

    function showAnswerCarousel() {
      if (!answerComponent) return;
      try { answerComponent.show({ slides: buildAnswerSlidesForAllRounds() }); }
      catch (e) { console.error('[answerComponent.show]', e && e.message); }
      try { if (floatingBtn) floatingBtn.setMode('next'); } catch (e) {}
    }

    function resetGameState() {
      gameState.phase = 'playing';
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.stars = 0;
      gameState.starsByRound = [];
      gameState.lives = gameState.totalLives || 3;
      gameState.progress = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.placement = {};
      gameState.wrongDrops = 0;
      gameState.lostHeartThisRound = false;
      gameState.duration_data = { startTime: null, preview: gameState.duration_data ? gameState.duration_data.preview : [] };
      gameState.activeRounds = getRounds();
    }

    function restartGame() {
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
      gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      resetGameState();
      if (signalCollector && typeof signalCollector.reset === 'function') {
        try { signalCollector.reset(); } catch (e) {}
      }
      try { if (answerComponent) answerComponent.destroy(); } catch (e) {}
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      if (progressBar) {
        try { progressBar.update(0, gameState.lives || gameState.totalLives || 3); } catch (e) {}
      }
      trackEvent('game_start', { totalRounds: gameState.totalRounds, restart: true, setIndex: gameState.setIndex });
      (async function () {
        await showRoundIntro(1);
        renderRound();
      })();
    }
    window.restartGame = restartGame;

    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.phase = 'playing';
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.starsByRound = [];
      gameState.lives = gameState.totalLives || 3;
      gameState.attempts = [];
      gameState.events = [];
      gameState.progress = 0;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.activeRounds = getRounds();
      gameState.startTime = Date.now();
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();
      (async function () {
        await showRoundIntro(1);
        renderRound();
      })();
    }
    window.startGame = startGame;

    function nextRound() {
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      if (gameState.currentRound < gameState.totalRounds) {
        gameState.currentRound += 1;
        renderRound();
      } else {
        endGame(true);
      }
    }
    window.nextRound = nextRound;

    function setupGame() {
      var content = gameState.content || fallbackContent;
      gameState.totalRounds = (content.totalRounds && typeof content.totalRounds === 'number') ? content.totalRounds : 10;
      gameState.activeRounds = getRounds();

      buildBoardDOM();
      (function () {
        var r = getCurrentRound();
        if (r) {
          paintBoxTitles(r);
          buildPool(r);
        }
      })();

      if (previewScreen) {
        try {
          previewScreen.show({
            instruction: content.previewInstruction || fallbackContent.previewInstruction,
            audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
            showGameOnPreview: content.showGameOnPreview === true,
            onComplete: function (previewData) { startGameAfterPreview(previewData); }
          });
        } catch (e) {
          console.error('[previewScreen.show]', e && e.message);
          startGameAfterPreview({ duration: 0 });
        }
      } else {
        startGameAfterPreview({ duration: 0 });
      }
    }

    function startGameAfterPreview(previewData) {
      try {
        gameState.previewResult = previewData || { duration: 0 };
        gameState.duration_data.preview = gameState.duration_data.preview || [];
        gameState.duration_data.preview.push({ duration: previewData ? previewData.duration : 0 });
        gameState.startTime = Date.now();
        gameState.isActive = true;
        gameState.duration_data.startTime = new Date().toISOString();
        trackEvent('game_start', { totalRounds: gameState.totalRounds });
        if (signalCollector && typeof signalCollector.recordViewEvent === 'function') {
          try { signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}
        }
        if (progressBar) {
          try { progressBar.update(0, gameState.lives || gameState.totalLives || 3); } catch (e) {}
        }
        (async function () {
          await showRoundIntro(1);
          renderRound();
        })();
      } catch (e) { console.error('[startGameAfterPreview]', e && e.message); }
    }

    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      if (document.getElementById('gameContent')) return;
      var stack = document.createElement('div');
      stack.className = 'game-stack';
      var gc = document.createElement('div');
      gc.id = 'gameContent';
      stack.appendChild(gc);
      app.appendChild(stack);
    }
  </script>

  <script type="module">
    import { DragDropManager, Draggable, Droppable, Feedback, PointerSensor, PointerActivationConstraints } from 'https://esm.sh/@dnd-kit/dom@beta';
    window.DnDKit = {
      DragDropManager: DragDropManager,
      Draggable: Draggable,
      Droppable: Droppable,
      Feedback: Feedback,
      PointerSensor: PointerSensor,
      PointerActivationConstraints: PointerActivationConstraints
    };
    window.dispatchEvent(new Event('dndkit-ready'));
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      try {
        await waitForPackages();

        await new Promise(function (resolve) {
          if (window.DnDKit && window.DnDKit.DragDropManager) return resolve();
          window.addEventListener('dndkit-ready', function () { resolve(); }, { once: true });
          setTimeout(resolve, 5000);
        });

        try { await FeedbackManager.init(); } catch (e) {}

        try {
          signalCollector = new SignalCollector({
            playId: 'two-boxes-factors-' + Date.now(),
            game: 'two-boxes-factors'
          });
          window.signalCollector = signalCollector;
        } catch (e) {
          console.error('[SignalCollector]', e && e.message);
          if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
        }

        try {
          ScreenLayout.inject('app', {
            slots: {
              previewScreen: true,
              transitionScreen: true,
              progressBar: true,
              floatingButton: true,
              answerComponent: true
            }
          });
        } catch (e) {
          console.error('[ScreenLayout]', e && e.message);
          if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
          buildFallbackLayout();
        }

        try {
          visibilityTracker = new VisibilityTracker({
            popupProps: {},
            onInactive: function () {
              try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {}
              try { if (previewScreen) previewScreen.pause(); } catch (e) {}
            },
            onResume: function () {
              try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {}
              try { if (previewScreen) previewScreen.resume(); } catch (e) {}
            }
          });
        } catch (e) {
          console.error('[VisibilityTracker]', e && e.message);
          if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
        }

        try {
          progressBar = new ProgressBarComponent({
            slotId: 'mathai-progress-slot',
            totalRounds: 10,
            totalLives: 3,
            showLives: true
          });
        } catch (e) {
          console.error('[ProgressBar]', e && e.message);
          if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
        }

        try {
          transitionScreen = new TransitionScreenComponent({ slotId: 'mathai-transition-slot' });
        } catch (e) {
          console.error('[TransitionScreen]', e && e.message);
          if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
        }

        try {
          previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' });
        } catch (e) {
          console.error('[PreviewScreen]', e && e.message);
          if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
        }

        try {
          floatingBtn = new FloatingButtonComponent({ slotId: 'mathai-floating-button-slot' });
          if (floatingBtn && typeof floatingBtn.setLabels === 'function') {
            try { floatingBtn.setLabels({ submit: 'CHECK', next: 'Next' }); } catch (e) {}
          }
          floatingBtn.on('submit', async function () {
            if (gameState.isProcessing || gameState.gameEnded) return;
            try { await handleCheck(); } catch (e) { console.error('[handleCheck]', e && e.message); }
          });
          floatingBtn.on('next', function () {
            try { if (answerComponent && typeof answerComponent.destroy === 'function') answerComponent.destroy(); } catch (e) {}
            try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
            try { if (previewScreen && typeof previewScreen.destroy === 'function') previewScreen.destroy(); } catch (e) {}
            try { if (floatingBtn && typeof floatingBtn.destroy === 'function') floatingBtn.destroy(); } catch (e) {}
          });
        } catch (e) {
          console.error('[FloatingButton]', e && e.message);
          if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
        }

        try {
          answerComponent = new AnswerComponentComponent({ slotId: 'mathai-answer-slot' });
        } catch (e) {
          console.error('[AnswerComponent]', e && e.message);
          if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
        }

        try {
          var PointerSensor = window.DnDKit.PointerSensor;
          var PointerActivationConstraints = window.DnDKit.PointerActivationConstraints;
          dndManager = new window.DnDKit.DragDropManager({
            sensors: [
              PointerSensor.configure({
                activationConstraints: [
                  new PointerActivationConstraints.Distance({ value: 3 })
                ]
              })
            ]
          });
          dndManager.monitor.addEventListener('dragend', handleDragEnd);
          dndManager.monitor.addEventListener('dragstart', handleDragStart);
        } catch (e) {
          console.error('[DragDropManager]', e && e.message);
          if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
          try {
            dndManager = new window.DnDKit.DragDropManager();
            dndManager.monitor.addEventListener('dragend', handleDragEnd);
            dndManager.monitor.addEventListener('dragstart', handleDragStart);
          } catch (er) {}
        }

        preloadAudio();

        window.addEventListener('message', handlePostMessage);
        try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

        setupGame();
      } catch (e) {
        console.error('[init]', e && e.message);
        if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
      }

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = startGame;
    });
  </script>
</body>
</html>
