<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>One-Watch Sum</title>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 28px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; overscroll-behavior: none; }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }
    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    @supports not (min-height: 100dvh) { #app { min-height: 100vh; } }
    input { -webkit-user-select: text; user-select: text; }

    #gameContent {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 8px 16px 24px;
    }

    .ows-stage {
      text-align: center;
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 6px 0 4px;
    }
    .ows-helperline {
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      text-align: center;
      margin: 6px 12px 8px;
      line-height: 1.4;
    }
    .ows-player-wrap {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 16 / 9;
      background: var(--mathai-light-gray);
      border-radius: var(--mathai-border-radius-card);
      position: relative;
      overflow: hidden;
      margin: 6px auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @supports not (aspect-ratio: 16 / 9) { .ows-player-wrap { height: 200px; } }
    .ows-card {
      font-size: 72px;
      font-weight: 800;
      color: var(--mathai-primary);
      transition: opacity 200ms ease, transform 200ms ease;
    }
    .ows-card.hidden-card { opacity: 0; transform: scale(0.85); }
    .ows-card.color-1 { color: var(--mathai-orange); }
    .ows-card.color-2 { color: var(--mathai-purple); }
    .ows-card.color-3 { color: var(--mathai-blue); }
    .ows-card.color-4 { color: var(--mathai-green); }
    .ows-card.color-5 { color: var(--mathai-red); }
    .ows-card.color-6 { color: var(--mathai-orange); }
    .ows-card.color-7 { color: var(--mathai-purple); }
    .ows-card.color-8 { color: var(--mathai-blue); }
    .ows-card.color-9 { color: var(--mathai-green); }
    .ows-card.color-10 { color: var(--mathai-red); }

    .ows-play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(39, 15, 54, 0.55);
      cursor: pointer;
      touch-action: manipulation;
    }
    .ows-play-overlay.hidden-overlay { display: none; }
    .ows-play-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--mathai-yellow);
      color: var(--mathai-primary);
      font-size: 28px;
      border: none;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
    }
    .ows-watched-note {
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      text-align: center;
      margin-bottom: 8px;
      min-height: 18px;
    }

    /* Per-round 30s countdown timer mounted in #gameContent */
    #timer-container {
      width: 100%;
      max-width: 360px;
      margin: 4px auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
    }
    #timer-container.hidden { display: none; }
    .ows-timer-fallback {
      font-size: var(--mathai-font-size-body);
      font-weight: 700;
      color: var(--mathai-blue);
      letter-spacing: 0.04em;
    }
    .ows-timer-fallback.urgent { color: var(--mathai-red); }

    .ows-input-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
      margin: 4px auto 12px;
    }
    .ows-prompt {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-primary);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .ows-input {
      width: 200px;
      min-height: 52px;
      padding: 12px 14px;
      border: 2px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-card);
      background: var(--mathai-white);
      color: var(--mathai-primary);
      font-family: var(--mathai-font-family);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
      transition: border-color 120ms ease, background 120ms ease;
    }
    .ows-input:focus { border-color: var(--mathai-purple); }
    .ows-input.solved-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
      color: var(--mathai-green);
    }
    .ows-input.solved-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-red);
      animation: shake 0.5s ease;
    }
    .ows-input:disabled, .ows-input.disabled { opacity: 0.85; pointer-events: none; }

    .ows-feedback-panel {
      width: 100%;
      max-width: 420px;
      margin: 4px auto 0;
      padding: 12px 14px;
      border-radius: var(--mathai-border-radius-card);
      font-size: var(--mathai-font-size-body);
      text-align: center;
      display: none;
      line-height: 1.4;
    }
    .ows-feedback-panel.visible { display: block; }
    .ows-feedback-panel.show-correct {
      background: var(--mathai-cell-bg-green);
      border: 1px solid var(--mathai-cell-border-green);
      color: var(--mathai-green);
    }
    .ows-feedback-panel.show-wrong {
      background: var(--mathai-cell-bg-red);
      border: 1px solid var(--mathai-cell-border-red);
      color: var(--mathai-red);
    }

    .ows-answer-card {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      padding: 14px 12px 18px;
      text-align: center;
    }
    .ows-answer-numbers {
      font-size: 18px;
      font-weight: 700;
      color: var(--mathai-primary);
      margin-bottom: 8px;
    }
    .ows-answer-total {
      font-size: 24px;
      color: var(--mathai-green);
      font-weight: 800;
      margin: 8px 0;
    }
    .ows-answer-explanation {
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-text-primary);
      line-height: 1.4;
      margin-top: 6px;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

    @media (max-height: 500px) {
      #landscape-overlay {
        display: flex; position: fixed; inset: 0; background: var(--mathai-white);
        align-items: center; justify-content: center; z-index: 99999; font-size: 18px; text-align: center; padding: 24px;
      }
    }
    #landscape-overlay { display: none; }
  </style>
</head>
<body>

  <div id="landscape-overlay">Please rotate your device to portrait mode.</div>

  <script>

          if (ok) return resolve(true);

    function renderFallbackCountdown(remainingMs) {
      var c = document.getElementById('timer-container');

      var secs = Math.max(0, Math.ceil(remainingMs / 1000));
      var mm = Math.floor(secs / 60);

      var text = (mm < 10 ? '0' : '') + mm + ':' + (ss < 10 ? '0' : '') + ss;
      var span = c.querySelector('.ows-timer-fallback');

    function startCountdown(seconds) {

      c.classList.remove('hidden');

      gameState.countdownDeadlineMs = Date.now() + totalMs;

      // Try TimerComponent first
      var usedComponent = false;
      try {
        if (typeof TimerComponent !== 'undefined') {
          c.innerHTML = '';

            duration: seconds,

          }

      }

      if (!usedComponent) {

        renderFallbackCountdown(totalMs);
        gameState.countdownInterval = setInterval(function () {

      var responseMs = Date.now() - gameState.roundStartMs;

        syncDOM();

        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: true, value: v });

        try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
        syncDOM();
        recordAttempt(raw, false, null, responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: false, value: v });

        try { await playDynamicFeedback({ audio_content: round.correctTTS, subtitle: round.correctSubtitle, sticker: STICKER_CORRECT }); } catch (e) {}
        advanceAfterFeedback();
      })();

    function runWrongFeedbackAndAdvance(round) {
      (async function () {
        var f = document.getElementById('owsFeedback');
        if (f) { f.classList.add('visible', 'show-wrong'); f.textContent = (round.wrongSubtitle || 'The actual sum was ') + ' ' + round.total + '.'; }
        try { await awaitedFeedbackSound('incorrect_sound_effect', { sticker: STICKER_SAD }); } catch (e) {}
        try { await playDynamicFeedback({ audio_content: round.wrongTTS, subtitle: round.wrongSubtitle, sticker: STICKER_SAD }); } catch (e) {}
        advanceAfterFeedback();
      })();
    }

    function advanceAfterFeedback() {
      var roundJustPlayed = gameState.currentRound + 1;
      // No-lives game: never short-circuit on lives==0
      if (roundJustPlayed === gameState.totalRounds) { endGame(true); return; }
      showRoundIntro(roundJustPlayed + 1);
    }

    async function showRoundIntro(n) {
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}

      var ttsText = 'Round ' + n;
      await transitionScreen.show({
        title: 'Round ' + n,
        icons: [],
        persist: true,
        buttons: [],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_ROUND }); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          })();
        }
      });
      setTimeout(function () {
        try {
          if (gameState.gameEnded) return;
          if (gameState.currentRound + 1 < n) {
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          }
        } catch (e) {}
      }, 9000);
    }

    function endGame(victory) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;
      clearVideoTimer();
      destroyCountdown();
      gameState.stars = getStars();
      if (victory) { gameState.phase = 'results'; syncDOM(); postGameComplete(); showVictory(); }
      else { gameState.phase = 'game_over'; syncDOM(); postGameComplete(); showGameOver(); }
      trackEvent('game_end', { victory: victory, stars: gameState.stars, score: gameState.score });
    }

    function _victoryClaimAction() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try { transitionScreen.hide(); } catch (e) {}
      showStarsCollected();
    }
    function _victoryPlayAgainAction() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try { transitionScreen.hide(); } catch (e) {}
      showMotivation();
    }

    async function showVictory() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var stars = gameState.stars;
      var subtitle = 'You got ' + gameState.score + '/' + gameState.totalRounds + ' totals right.';
      var ttsText = stars === 3 ? 'Brilliant — every total landed.' : 'Great work — ' + gameState.score + ' out of ' + gameState.totalRounds + ' correct.';
      var sfxId = stars === 3 ? 'victory_sound_effect' : 'game_complete_sound_effect';
      var sfxSticker = stars === 3 ? STICKER_VICTORY : (stars === 2 ? STICKER_TWO : STICKER_ONE);
      await transitionScreen.show({
        title: 'Victory 🎉',
        subtitle: subtitle,
        stars: stars,
        buttons: stars === 3
          ? [{ text: 'Claim Stars', type: 'primary', action: _victoryClaimAction }]
          : [
              { text: 'Play Again', type: 'secondary', action: _victoryPlayAgainAction },
              { text: 'Claim Stars', type: 'primary', action: _victoryClaimAction }
            ],
        persist: true,
        onMounted: function () {
          (async function () {
            try { await safePlaySound(sfxId, { sticker: sfxSticker }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_CELEBRATE }); } catch (e) {}
          })();
        }
      });
    }

    async function showGameOver() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var subtitle = 'You got ' + gameState.score + '/' + gameState.totalRounds + ' — try again.';
      await transitionScreen.show({
        title: 'Game Over',
        subtitle: subtitle,
        icons: ['😔'],
        persist: true,
        buttons: [{
          text: 'Try Again', type: 'primary',
          action: function () {
            try { FeedbackManager.sound.pause(); } catch (e) {}
            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            showMotivation();
          }
        }],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('game_over_sound_effect', { sticker: STICKER_GAMEOVER }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: subtitle, subtitle: subtitle, sticker: STICKER_GAMEOVER }); } catch (e) {}
          })();
        }
      });
    }

    async function showMotivation() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = 'Ready to improve your score?';
      await transitionScreen.show({
        title: 'Ready to improve your score?',
        icons: ['⚡'],
        persist: true,
        buttons: [{
          text: "I'm ready", type: 'primary',
          action: function () {
            try { FeedbackManager.sound.pause(); } catch (e) {}
            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            restartGame();
          }
        }],
        onMounted: function () {
          (async function () {
            try { if (progressBar) progressBar.update(0, gameState.totalLives); } catch (e) {}
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_MOTIVATE }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_MOTIVATE }); } catch (e) {}
          })();
        }
      });
    }

    async function showStarsCollected() {
      gameState.phase = 'stars_collected';
      syncDOM();
      await transitionScreen.show({
        title: "Yay!\nStars collected!",
        buttons: [],
        persist: true,
        styles: { title: { whiteSpace: 'pre-line', lineHeight: '1.3' } },
        onMounted: function () {
          (async function () {
            try { await safePlaySound('victory_sound_effect', { sticker: STICKER_VICTORY }); } catch (e) {}
            try {
              window.postMessage({
                type: 'show_star',
                data: { count: gameState.stars, variant: 'yellow', score: gameState.score + '/' + gameState.totalRounds }
              }, '*');
            } catch (e) {}
            setTimeout(showAnswerCarousel, 1500);
          })();
        }
      });
    }

    function renderAnswerSlide(container, round) {
      if (!container || !round || !round.answer) return;
      var a = round.answer;
      var html = '';
      html += '<div class="ows-answer-card">';
      html += '<div class="ows-answer-numbers">' + escapeHTML(a.numbers.join(' + ')) + '</div>';
      html += '<div class="ows-answer-total">= ' + escapeHTML(String(a.total)) + '</div>';
      html += '<div class="ows-answer-explanation">' + escapeHTML(a.explanation) + '</div>';
      html += '</div>';
      container.innerHTML = html;
    }
    function buildAnswerSlidesForAllRounds() {
      var rounds = gameState.activeRounds;
      var slides = [];
      for (var i = 0; i < rounds.length; i++) {
        (function (r) { slides.push({ render: function (container) { renderAnswerSlide(container, r); } }); })(rounds[i]);
      }
      return slides;
    }
    function showAnswerCarousel() {
      try { answerComponent.show({ slides: buildAnswerSlidesForAllRounds() }); } catch (e) {}
      try { if (floatingBtn) floatingBtn.setMode('next'); } catch (e) {}
      try {
        setTimeout(function () {
          var slot = document.getElementById('mathai-answer-slot');
          if (slot && slot.scrollIntoView) slot.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 200);
      } catch (e) {}
    }

    function setupGame() {
      var content = gameState.content || fallbackContent;
      gameState.content = content;
      gameState.totalRounds = content.totalRounds || 10;
      gameState.totalLives = content.totalLives || 1;
      gameState.lives = gameState.totalLives;
      gameState.activeRounds = getRounds();

      injectGameHTML();
      renderInitialState();
      try {
        previewScreen.show({
          instruction: content.previewInstruction || fallbackContent.previewInstruction,
          audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
          showGameOnPreview: content.showGameOnPreview === true,
          onComplete: function (previewData) { startGameAfterPreview(previewData); }
        });
      } catch (e) { console.error('[previewScreen.show failed]', e && e.message, e); }
    }
    function startGameAfterPreview(previewData) {
      gameState.previewResult = previewData || {};
      gameState.duration_data.preview = gameState.duration_data.preview || [];
      gameState.duration_data.preview.push({ duration: (previewData && previewData.duration) || 0 });
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      try {
        if (progressBar) {
          progressBar.show && progressBar.show();
          progressBar.update(0, gameState.totalLives);
        }
      } catch (e) {}
      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex] });
      try { if (signalCollector && signalCollector.recordViewEvent) signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}
      showWelcome();
    }
    async function showWelcome() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = "Let's play One-Watch Sum! Watch each sequence once, then total it.";
      await transitionScreen.show({
        title: 'Welcome!',
        icons: ['👋'],
        persist: true,
        buttons: [{
          text: "Let's go!", type: 'primary',
          action: function () {
            try { FeedbackManager.sound.pause(); } catch (e) {}
            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            showRoundIntro(1);
          }
        }],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('sound_level_transition', { sticker: STICKER_LEVEL }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_LEVEL }); } catch (e) {}
          })();
        }
      });
    }
    function resetGameState() {
      gameState.phase = 'gameplay';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState._gameCompletePosted = false;
      gameState.stars = 0;
      gameState.correctAnswer = null;
      gameState.progress = 0;
      gameState.videoPlayed = false;
      clearVideoTimer();
      gameState.duration_data = { startTime: null, endTime: null, preview: gameState.duration_data.preview || [] };
      gameState.activeRounds = getRounds();
      try {
        if (answerComponent && answerComponent.update) answerComponent.update({ slides: [] });
        if (answerComponent && answerComponent.hide) answerComponent.hide();
      } catch (e) {}
    }
    function restartGame() {
      var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
      gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      resetGameState();
      try { if (signalCollector && signalCollector.reset) signalCollector.reset(); } catch (e) {}
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      try { if (progressBar) progressBar.update(0, gameState.totalLives); } catch (e) {}
      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex], restart: true });
      injectGameHTML();
      renderInitialState();
      showRoundIntro(1);
    }

    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      var t = event.data.type;
      var data = event.data.data || {};
      if (t === 'game_init') {
        gameState.phase = 'playing';
        if (data.content) gameState.content = data.content;
        gameState.signalConfig = data.signalConfig || {};
        if (data.signalConfig && signalCollector && signalCollector.applyConfig) {
          try { signalCollector.applyConfig(data.signalConfig); } catch (e) {}
        }
        try {
          if (signalCollector) {
            signalCollector.gameId = 'watch-video-then-type-sum';
            if (data.sessionId) signalCollector.sessionId = data.sessionId;
            if (data.studentId) signalCollector.studentId = data.studentId;
            if (data.contentSetId) signalCollector.contentSetId = data.contentSetId;
            if (data.signalConfig && data.signalConfig.flushUrl) signalCollector.flushUrl = data.signalConfig.flushUrl;
            if (data.signalConfig && data.signalConfig.playId) signalCollector.playId = data.signalConfig.playId;
            if (signalCollector.startFlushing) { try { signalCollector.startFlushing(); } catch (e) {} }
          }
        } catch (e) {}
        syncDOM();
        setupGame();
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      waitForPackages().then(function () {
        try {
          var initP = FeedbackManager.init && FeedbackManager.init();
          var doInit = initP && initP.then ? initP : Promise.resolve();
          doInit.then(function () {
            try {
              try {
                signalCollector = new SignalCollector({
                  sessionId: 'ows-' + Date.now(),
                  studentId: 'standalone',
                  gameId: 'watch-video-then-type-sum',
                  contentSetId: 'fallback'
                });
                window.signalCollector = signalCollector;
              } catch (e) { console.error('[SignalCollector ctor failed]', e && e.message, e); }
              try {
                ScreenLayout.inject('app', {
                  slots: { previewScreen: true, progressBar: true, transitionScreen: true, floatingButton: true, answerComponent: true }
                });
              } catch (e) { console.error('[ScreenLayout.inject failed]', e && e.message, e); }
              injectGameHTML();
              renderInitialState();
              try {
                visibilityTracker = new VisibilityTracker({
                  popupProps: { title: 'Paused', description: 'Tap Resume to continue.', primaryText: 'Resume' },
                  onInactive: function () {
                    try { FeedbackManager.sound.pause(); } catch (e) {}
                    try { FeedbackManager.stream.pauseAll(); } catch (e) {}
                    try { if (previewScreen) previewScreen.pause(); } catch (e) {}
                    try { pauseCountdown(); } catch (e) {}
                  },
                  onResume: function () {
                    try { FeedbackManager.sound.resume(); } catch (e) {}
                    try { FeedbackManager.stream.resumeAll(); } catch (e) {}
                    try { if (previewScreen) previewScreen.resume(); } catch (e) {}
                    try { resumeCountdown(); } catch (e) {}
                  }
                });
              } catch (e) { console.error('[VisibilityTracker ctor failed]', e && e.message, e); }
              try { progressBar = new ProgressBarComponent({ slotId: 'mathai-progress-slot', totalRounds: 10, totalLives: 1, showLives: false }); } catch (e) { console.error('[ProgressBarComponent ctor failed]', e && e.message, e); }
              try { transitionScreen = new TransitionScreenComponent({ slotId: 'mathai-transition-slot' }); } catch (e) { console.error('[TransitionScreenComponent ctor failed]', e && e.message, e); }
              try { previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' }); } catch (e) { console.error('[PreviewScreenComponent ctor failed]', e && e.message, e); }
              try { floatingBtn = new FloatingButtonComponent({ slotId: 'mathai-floating-button-slot' }); } catch (e) { console.error('[FloatingButtonComponent ctor failed]', e && e.message, e); }
              try { answerComponent = new AnswerComponentComponent({ slotId: 'mathai-answer-slot' }); } catch (e) { console.error('[AnswerComponentComponent ctor failed]', e && e.message, e); }
              try {
                if (floatingBtn && floatingBtn.on) {
                  floatingBtn.on('submit', function () { handleSubmit(); });
                  floatingBtn.on('next', function () {
                    try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
                    try { if (answerComponent) answerComponent.destroy(); } catch (e) {}
                    try { if (previewScreen) previewScreen.destroy(); } catch (e) {}
                    try { if (floatingBtn) floatingBtn.destroy(); } catch (e) {}
                  });
                }
              } catch (e) {}
              try {
                FeedbackManager.sound.preload([
                  { id: 'correct_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
                  { id: 'incorrect_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                  { id: 'rounds_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                  { id: 'sound_level_transition',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
                  { id: 'victory_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                  { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
                  { id: 'game_over_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                  { id: 'tap_sound',                url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
                ]);
              } catch (e) { console.error('[FeedbackManager.preload failed]', e && e.message, e); }
              window.addEventListener('message', handlePostMessage);
              try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
              setupGame();
            } catch (e) { console.error('[init inner] ' + (e && e.message), e); }
          }, function (e) { console.error('[FeedbackManager.init failed]', e && e.message, e); });
        } catch (e) { console.error('[init outer] ' + (e && e.message), e); }
      }, function (err) { console.error('[waitForPackages rejected] ' + (err && err.message)); });
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = setupGame;
      window.renderRound = renderRound;
      window.loadRound = function (n) { try { renderRound(n); } catch (e) {} };
    });
  </script>
</body>
</html>
