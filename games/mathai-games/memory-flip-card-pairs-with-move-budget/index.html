<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosmic Pairs — Logic Memory</title>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --cp-moon: #B8DCEA;
      --cp-sun: #FFE489;
      --cp-saturn: #FFC9D6;
      --cp-comet: #DDC4EC;
      --cp-card-back: #6B4F8C;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100dvh; overflow-x: hidden; overscroll-behavior: none; }
    @supports not (height: 100dvh) { html, body { height: 100vh; } }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }
    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex; flex-direction: column;
      position: relative; overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }
    @supports not (min-height: 100dvh) { #app { min-height: 100vh; } }

    #timer-container {
      position: absolute; top: 0.75rem; left: 50%;
      transform: translateX(-50%); z-index: 50; pointer-events: none;
    }
    #timer-container > * { pointer-events: auto; }
    #timer-container .timer-wrapper { padding: 0 !important; margin: 0 !important; background: transparent !important; }
    #timer-container .timer-display {
      width: auto !important; height: auto !important; min-width: 0 !important;
      padding: 2px 10px !important;
      font-size: 16px !important; font-weight: 700 !important;
      color: var(--mathai-primary) !important;
      font-family: var(--mathai-font-family) !important;
      background: var(--mathai-cell-bg-yellow) !important;
      border-radius: 999px !important; box-shadow: none !important;
    }

    #gameContent {
      display: flex; flex-direction: column;
      width: 100%; padding: 8px 16px 16px;
    }

    .cp-stage {
      text-align: center;
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 6px 0 4px;
    }

    .cp-clues {
      background: var(--mathai-cell-bg-yellow);
      border-radius: 12px;
      padding: 10px 14px;
      margin: 6px 0 10px;
    }
    .cp-clues ol {
      padding-left: 22px;
      margin: 0;
    }
    .cp-clues li {
      font-size: 14px;
      line-height: 1.5;
      margin: 2px 0;
      color: var(--mathai-text-primary);
    }

    .cp-status {
      display: flex; flex-direction: row;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0 10px;
      font-size: 14px;
      color: var(--mathai-text-primary);
    }
    .cp-status .cp-pairs {
      background: var(--mathai-cell-bg-green);
      color: var(--mathai-green);
      border-radius: 999px;
      padding: 4px 10px;
      font-weight: 700;
    }
    .cp-status .cp-moves {
      background: var(--cp-sun);
      color: var(--mathai-primary);
      border-radius: 999px;
      padding: 4px 10px;
      font-weight: 700;
    }

    .cp-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-gap: 8px;
      gap: 8px;
      max-width: 360px;
      margin: 4px auto 12px;
    }
    .cp-card {
      aspect-ratio: 1 / 1;
      min-height: 56px;
      min-width: 56px;
      border-radius: 12px;
      cursor: pointer;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
      -webkit-appearance: none; appearance: none;
      background: var(--cp-card-back);
      color: var(--mathai-white);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      font-weight: 800;
    }
    .cp-card.cat-moon   { background: var(--cp-moon); color: var(--mathai-primary); }
    .cp-card.cat-sun    { background: var(--cp-sun); color: var(--mathai-primary); }
    .cp-card.cat-saturn { background: var(--cp-saturn); color: var(--mathai-primary); }
    .cp-card.cat-comet  { background: var(--cp-comet); color: var(--mathai-primary); }
    .cp-card.is-down {
      background: var(--cp-card-back);
      color: var(--mathai-white);
    }
    .cp-card.is-down::after {
      content: '?';
      font-size: 26px;
      color: var(--mathai-white);
      font-weight: 800;
    }
    .cp-card.is-down .cp-card-num { display: none; }
    .cp-card.is-matched {
      background: var(--mathai-cell-bg-green) !important;
      color: var(--mathai-green) !important;
      border-color: var(--mathai-cell-border-green);
      pointer-events: none;
    }
    .cp-card.is-disabled { opacity: 0.6; pointer-events: none; }
    .cp-card.cp-flash-bad {
      background: var(--mathai-cell-bg-red) !important;
      color: var(--mathai-red) !important;
      border-color: var(--mathai-cell-border-red);
    }
    .cp-card-cat-emoji {
      position: absolute;
      top: 4px; right: 4px;
      font-size: 12px;
      opacity: 0.7;
    }

    .cp-reveal {
      margin-top: 12px;
      padding: 10px 12px;
      background: var(--mathai-cell-bg-yellow);
      border-radius: 10px;
      color: var(--mathai-text-primary);
      font-size: 14px;
      text-align: center;
    }

    .cp-answer-card {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      padding: 14px 12px 18px;
      text-align: center;
    }
    .cp-answer-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      grid-gap: 4px; gap: 4px;
      max-width: 240px;
      margin: 0 auto 8px;
    }
    .cp-answer-cell {
      aspect-ratio: 1 / 1;
      min-height: 36px; min-width: 36px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }

    button, [role="button"] { min-height: 44px; min-width: 44px; touch-action: manipulation; }
    #app { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: var(--mathai-white); color: var(--mathai-primary);
        font-family: var(--mathai-font-family); font-size: var(--mathai-font-size-subtitle);
        text-align: center; padding: 24px;
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); } 40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); } 80% { transform: translateX(3px); }
    }
    .cp-flash-bad { animation: shake 0.5s ease; }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="1"></div>

  <script>
    var STICKER_CORRECT  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_WRONG    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_LEVEL    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';
    var STICKER_VICTORY  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_CELEBRATE = STICKER_VICTORY;
    var STICKER_SAD      = STICKER_WRONG;
    var STICKER_MOTIVATE = STICKER_LEVEL;

    /* Each round: 4x4 (16 cells) memory grid.
       cards: array of 16 entries { value: number, category: 'moon'|'sun'|'saturn'|'comet' }.
       Pairs share value. moveBudget: max number of card flips allowed. */

    function _mkRound(set, round, stage, clues, cards, moveBudget) {
      var id = set + '_r' + round + '_mb' + moveBudget;
      var totalPairs = 8;
      return {
        set: set, id: id, round: round, stage: stage,
        clues: clues, cards: cards, moveBudget: moveBudget, totalPairs: totalPairs,
        correctTTS: 'Brilliant! All ' + totalPairs + ' pairs found.',
        correctSubtitle: 'All ' + totalPairs + ' pairs found.',
        wrongTTS: 'You ran out of moves. Use the clues earlier next time.',
        wrongSubtitle: 'Out of moves — use the clues to plan flips.',
        answer: { cards: cards, totalPairs: totalPairs }
      };
    }

    /* Helper builds a 4x4 layout from 8 pair-values + per-cell category. */
    function _layout(values, categories) {
      var cards = [];
      for (var i = 0; i < 16; i++) {
        cards.push({ value: values[i], category: categories[i] });
      }
      return cards;
    }

    var fallbackContent = {
      previewInstruction: '<p>Read the four clues, then flip cards to find all matching pairs <b>within the move budget</b>. Tap a card to reveal its number; match same-number pairs.</p><p>One round — use clues to plan flips.</p>',
      previewAudioText: 'Read the clues. Find all pairs of matching numbers within the move budget. Each tap counts as a move.',
      previewAudio: null,
      showGameOnPreview: false,
      totalRounds: 1,
      totalLives: 1,
      showLives: false,
      answerComponent: true,
      rounds: [
        // Single-round game: one full puzzle per set; round number is always 1.
        _mkRound('A', 1, 1, [
          'Moon and Saturn cards only hide even numbers.',
          'Two corners hide numbers more than 15.',
          '3 and 6 are next to each other.',
          'Pairs are: 1, 3, 6, 8, 10, 12, 16, 18.'
        ],
        _layout(
          [16,1,3,18, 6,10,12,8, 8,12,10,6, 18,3,1,16],
          ['moon','sun','sun','saturn',
           'moon','saturn','saturn','sun',
           'sun','saturn','saturn','moon',
           'saturn','comet','sun','moon']
        ), 30),

        _mkRound('B', 1, 1, [
          'Saturns hide even numbers only.',
          'Two corners hide 17 or 19.',
          '4 and 8 are in the same row.',
          'Pairs are: 2, 4, 5, 8, 10, 17, 19, 20.'
        ],
        _layout(
          [17,2,5,19, 4,10,20,8, 8,20,10,4, 19,5,2,17],
          ['comet','saturn','sun','comet',
           'saturn','saturn','saturn','saturn',
           'saturn','saturn','saturn','saturn',
           'comet','sun','saturn','comet']
        ), 30),

        _mkRound('C', 1, 1, [
          'Moons hide even numbers only.',
          '5 is in a corner.',
          '6 and 12 are adjacent.',
          'Pairs are: 2, 4, 5, 6, 10, 12, 14, 16.'
        ],
        _layout(
          [5,2,4,16, 6,12,10,14, 14,10,12,6, 16,4,2,5],
          ['sun','moon','moon','moon',
           'moon','moon','moon','moon',
           'moon','moon','moon','moon',
           'moon','moon','moon','sun']
        ), 30)
      ]
    };

    var SETS = ['A','B','C'];

    var gameState = {
      gameId: 'memory-flip-card-pairs-with-move-budget',
      gameTitle: 'Cosmic Pairs',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 1,
      score: 0,
      lives: 1,
      totalLives: 1,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      duration_data: { startTime: null, endTime: null, preview: [] },
      correctAnswer: null,
      stars: 0,
      setIndex: 0,
      activeRounds: [],
      roundStartMs: 0,
      timerIntentionallyPaused: false,
      previewResult: null,
      progress: 0,
      roundToken: 0,
      // round runtime
      flippedIdx: null,    // first flipped card index (waiting for second)
      matchedSet: {},
      pairsFound: 0,
      movesUsed: 0,
      lockBoard: false
    };
    window.gameState = gameState;

    var timer = null, visibilityTracker = null, signalCollector = null;
    var progressBar = null, transitionScreen = null, previewScreen = null;
    var floatingBtn = null, answerComponent = null;

    var elGameContent = null, elStageLabel = null, elClues = null, elGrid = null;
    var elPairs = null, elMoves = null, elReveal = null;

    function getAvailableSets(rounds) {
      var seen = {}, out = [];
      for (var i = 0; i < rounds.length; i++) {
        var s = rounds[i].set;
        if (s && !seen[s]) { seen[s] = true; out.push(s); }
      }
      return out.length ? out : ['A'];
    }
    function getRounds() {
      var src = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(src);
      var setKey = sets[gameState.setIndex % sets.length];
      var filtered = [];
      for (var i = 0; i < src.length; i++) if (src[i].set === setKey) filtered.push(src[i]);
      filtered.sort(function (a, b) { return a.round - b.round; });
      return filtered;
    }
    function getCorrectCount() {
      var c = 0;
      for (var i = 0; i < gameState.attempts.length; i++) if (gameState.attempts[i].correct === true) c++;
      return c;
    }
    function getStars() {
      // Single-round game: stars by remaining moves (concept: 8 pairs total).
      var round = gameState.activeRounds[0];
      if (!round) return 0;
      var allFound = gameState.pairsFound >= round.totalPairs;
      var spare = Math.max(0, round.moveBudget - gameState.movesUsed);
      if (allFound && spare >= 8) return 3;
      if (allFound && spare >= 1) return 2;
      if (allFound) return 1;
      return 0;
    }
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound + 1);
    }
    function trackEvent(name, payload) {
      try { gameState.events.push({ event: name, ts: Date.now(), data: payload || {} }); } catch (e) {}
      try { if (signalCollector && signalCollector.recordEvent) signalCollector.recordEvent(name, payload || {}); } catch (e) {}
    }
    function recordAttempt(input, correct, miscTag, responseMs) {
      var round = gameState.activeRounds[gameState.currentRound];
      var qid = round ? round.id : ('r' + (gameState.currentRound + 1));
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) : 0,
        input_of_user: input,
        correct: correct === true,
        round_number: gameState.currentRound + 1,
        question_id: qid,
        correct_answer: round ? round.totalPairs : null,
        response_time_ms: typeof responseMs === 'number' ? responseMs : 0,
        misconception_tag: miscTag || null,
        difficulty_level: round ? (round.stage || 1) : 1,
        is_retry: false,
        metadata: { set: round ? round.set : null, moves: gameState.movesUsed, pairs: gameState.pairsFound }
      };
      gameState.attempts.push(attempt);
      try { if (signalCollector && signalCollector.recordAttempt) signalCollector.recordAttempt(attempt); } catch (e) {}
    }
    function postGameComplete() {
      if (gameState._gameCompletePosted) return;
      gameState._gameCompletePosted = true;
      var correctCount = getCorrectCount();
      var attempted = gameState.attempts.length;
      var accuracy = attempted === 0 ? 0 : Math.round((correctCount / attempted) * 100);
      var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
      var triesByRound = gameState.attempts.map(function (a) { return { round: a.round_number, correct: a.correct === true }; });
      var metrics = {
        accuracy: accuracy, time: Math.round(elapsedMs / 1000), stars: gameState.stars,
        attempts: gameState.attempts.slice(), duration_data: gameState.duration_data,
        totalLives: gameState.lives, tries: triesByRound, score: gameState.score,
        correctCount: correctCount, previewResult: gameState.previewResult
      };
      var signalSealed = { event_count: gameState.events.length, metadata: {} };
      try {
        if (signalCollector && typeof signalCollector.seal === 'function') {
          var sealed = signalCollector.seal();
          if (sealed) {
            if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count;
            if (sealed.metadata) signalSealed.metadata = sealed.metadata;
          }
        }
      } catch (e0) {}
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: { metrics: metrics, completedAt: Date.now(), signal_event_count: signalSealed.event_count, signal_metadata: signalSealed.metadata }
        }, '*');
      } catch (e) {}
    }

    function safePlaySound(id, opts) { try { return FeedbackManager.sound.play(id, opts || {}); } catch (e) { return Promise.resolve(); } }
    function awaitedFeedbackSound(id, opts) {
      var p = safePlaySound(id, opts || {});
      var floor = new Promise(function (r) { setTimeout(r, 1500); });
      return Promise.all([p, floor]).then(function () {}, function () {});
    }
    function playDynamicFeedback(opts) { try { return FeedbackManager.playDynamicFeedback(opts || {}); } catch (e) { return Promise.resolve(); } }

    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof TimerComponent !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            try { throw new Error('waitForPackages timeout'); } catch (rethrown) { reject(err); return; }
            return reject(err);
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="cp-stage" id="cpStageLabel"></div>' +
        '<div class="cp-clues" id="cpClues"></div>' +
        '<div class="cp-status">' +
          '<span>Pairs: <span class="cp-pairs" id="cpPairs">0/8</span></span>' +
          '<span>Moves: <span class="cp-moves" id="cpMoves">30</span></span>' +
        '</div>' +
        '<div class="cp-grid" id="cpGrid"></div>' +
        '<div class="cp-reveal" id="cpReveal"></div>';
      elGameContent = gc;
      elStageLabel = document.getElementById('cpStageLabel');
      elClues = document.getElementById('cpClues');
      elGrid = document.getElementById('cpGrid');
      elPairs = document.getElementById('cpPairs');
      elMoves = document.getElementById('cpMoves');
      elReveal = document.getElementById('cpReveal');
    }

    function renderInitialState() {
      if (elStageLabel) elStageLabel.textContent = '';
      if (elClues) elClues.innerHTML = '';
      if (elGrid) elGrid.innerHTML = '';
      if (elPairs) elPairs.textContent = '0/8';
      if (elMoves) elMoves.textContent = '—';
      if (elReveal) elReveal.textContent = '';
    }

    function emojiFor(cat) {
      if (cat === 'moon') return '🌙';
      if (cat === 'sun') return '☀️';
      if (cat === 'saturn') return '🪐';
      if (cat === 'comet') return '☄️';
      return '';
    }

    function paintGrid() {
      var round = gameState.activeRounds[gameState.currentRound];
      if (!round || !elGrid) return;
      elGrid.innerHTML = '';
      for (var i = 0; i < round.cards.length; i++) {
        var card = round.cards[i];
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cp-card cat-' + card.category;
        btn.setAttribute('data-idx', String(i));
        btn.setAttribute('data-round-token', String(gameState.roundToken));
        var isMatched = !!gameState.matchedSet[i];
        var isFlipped = (gameState.flippedIdx === i);
        if (isMatched) {
          btn.classList.add('is-matched');
          btn.innerHTML = '<span class="cp-card-cat-emoji">' + emojiFor(card.category) + '</span>' + String(card.value);
        } else if (isFlipped) {
          btn.innerHTML = '<span class="cp-card-cat-emoji">' + emojiFor(card.category) + '</span>' + String(card.value);
        } else {
          btn.classList.add('is-down');
          btn.innerHTML = '<span class="cp-card-cat-emoji">' + emojiFor(card.category) + '</span><span class="cp-card-num">' + String(card.value) + '</span>';
        }
        if (gameState.lockBoard || isMatched) {
          btn.classList.add('is-disabled');
        } else {
          btn.addEventListener('click', onCardClick);
        }
        elGrid.appendChild(btn);
      }
      if (elPairs) elPairs.textContent = gameState.pairsFound + '/' + round.totalPairs;
      if (elMoves) elMoves.textContent = String(Math.max(0, round.moveBudget - gameState.movesUsed));
    }

    function onCardClick(ev) {
      if (gameState.gameEnded) return;
      if (gameState.lockBoard) return;
      var btn = ev.currentTarget;
      var btnRoundToken = btn.getAttribute('data-round-token');
      if (btnRoundToken !== String(gameState.roundToken || '')) return;
      var idx = parseInt(btn.getAttribute('data-idx'), 10);
      if (gameState.matchedSet[idx]) return;
      var round = gameState.activeRounds[gameState.currentRound];
      if (!round) return;

      if (gameState.flippedIdx === null) {
        // First flip
        gameState.flippedIdx = idx;
        gameState.movesUsed += 1;
        paintGrid();
        try { var p = safePlaySound('tap_sound'); if (p && p.catch) p.catch(function(){}); } catch (e) {}
        checkBudget(round);
      } else if (gameState.flippedIdx === idx) {
        return;
      } else {
        // Second flip
        var firstIdx = gameState.flippedIdx;
        var secondIdx = idx;
        var firstCard = round.cards[firstIdx];
        var secondCard = round.cards[secondIdx];
        gameState.movesUsed += 1;
        gameState.lockBoard = true;
        // Show second face
        var allCards = elGrid.querySelectorAll('.cp-card');
        var secondBtn = null;
        for (var i = 0; i < allCards.length; i++) {
          if (parseInt(allCards[i].getAttribute('data-idx'), 10) === secondIdx) { secondBtn = allCards[i]; break; }
        }
        if (secondBtn) {
          secondBtn.classList.remove('is-down');
          secondBtn.innerHTML = '<span class="cp-card-cat-emoji">' + emojiFor(secondCard.category) + '</span>' + String(secondCard.value);
        }
        if (elMoves) elMoves.textContent = String(Math.max(0, round.moveBudget - gameState.movesUsed));

        if (firstCard.value === secondCard.value) {
          // Match — fire-and-forget SFX (CASE 5 multi-step)
          gameState.matchedSet[firstIdx] = true;
          gameState.matchedSet[secondIdx] = true;
          gameState.pairsFound += 1;
          gameState.flippedIdx = null;
          gameState.lockBoard = false;
          try { var p = safePlaySound('correct_sound_effect', { sticker: STICKER_CORRECT }); if (p && p.catch) p.catch(function(){}); } catch (e) {}
          paintGrid();
          if (gameState.pairsFound >= round.totalPairs) {
            // Round complete
            handleRoundComplete(true);
            return;
          }
          checkBudget(round);
        } else {
          // No match — flash, flip back
          if (secondBtn) secondBtn.classList.add('cp-flash-bad');
          var firstBtn = null;
          for (var k = 0; k < allCards.length; k++) {
            if (parseInt(allCards[k].getAttribute('data-idx'), 10) === firstIdx) { firstBtn = allCards[k]; break; }
          }
          if (firstBtn) firstBtn.classList.add('cp-flash-bad');
          try { var pi = safePlaySound('incorrect_sound_effect', { sticker: STICKER_SAD }); if (pi && pi.catch) pi.catch(function(){}); } catch (e) {}
          setTimeout(function () {
            gameState.flippedIdx = null;
            gameState.lockBoard = false;
            paintGrid();
            checkBudget(round);
          }, 900);
        }
      }
    }

    function checkBudget(round) {
      if (gameState.movesUsed >= round.moveBudget && gameState.pairsFound < round.totalPairs) {
        // Out of moves
        gameState.lockBoard = true;
        handleRoundComplete(false);
      }
    }

    function handleRoundComplete(success) {
      if (gameState.isProcessing || gameState.gameEnded) return;
      gameState.isProcessing = true;
      var responseMs = Date.now() - gameState.roundStartMs;
      try { gameState.timerIntentionallyPaused = true; if (timer && timer.pause) timer.pause(); } catch (e) {}

      var round = gameState.activeRounds[gameState.currentRound];
      var allFound = gameState.pairsFound >= round.totalPairs;
      // No-lives game: do NOT decrement gameState.lives. Score = pairs found.
      gameState.score = gameState.pairsFound;

      if (!allFound) {
        // Out of moves before completing — reveal remaining cards.
        for (var i = 0; i < round.cards.length; i++) gameState.matchedSet[i] = true;
        if (elReveal) elReveal.textContent = 'You found ' + gameState.pairsFound + ' of ' + round.totalPairs + ' pairs.';
      }
      gameState.progress = gameState.currentRound + 1;
      try { if (progressBar) progressBar.update(gameState.progress, 0); } catch (e) {}
      syncDOM();
      paintGrid();

      var miscTag = allFound ? null : 'budget-exhausted';
      recordAttempt(String(gameState.pairsFound) + '/' + round.totalPairs, allFound, miscTag, responseMs);
      trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: allFound, pairs: gameState.pairsFound, movesUsed: gameState.movesUsed });

      (async function () {
        try { await awaitedFeedbackSound(allFound ? 'correct_sound_effect' : 'incorrect_sound_effect', { sticker: allFound ? STICKER_CORRECT : STICKER_SAD }); } catch (e) {}
        try {
          await playDynamicFeedback({
            audio_content: allFound ? round.correctTTS : round.wrongTTS,
            subtitle: allFound ? round.correctSubtitle : round.wrongSubtitle,
            sticker: allFound ? STICKER_CORRECT : STICKER_SAD
          });
        } catch (e) {}
        advanceAfterFeedback();
      })();
    }

    function advanceAfterFeedback() {
      // Single-round game: any completion path goes to endGame.
      var round = gameState.activeRounds[gameState.currentRound];
      var allFound = round && gameState.pairsFound >= round.totalPairs;
      gameState.stars = getStars();
      endGame(allFound === true);
    }

    function renderRound(roundIdxOneBased) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      gameState.currentRound = roundIdxOneBased - 1;
      gameState.isActive = true;
      gameState.phase = 'gameplay';
      gameState.roundToken = (gameState.roundToken || 0) + 1;
      gameState.flippedIdx = null;
      gameState.matchedSet = {};
      gameState.pairsFound = 0;
      gameState.movesUsed = 0;
      gameState.lockBoard = false;
      syncDOM();

      var round = gameState.activeRounds[gameState.currentRound];
      if (!round) return;
      gameState.correctAnswer = round.totalPairs;

      if (elStageLabel) elStageLabel.textContent = 'Round ' + roundIdxOneBased + ' of ' + gameState.totalRounds + ' · Stage ' + (round.stage || 1);
      if (elClues) {
        var html = '<ol>';
        for (var i = 0; i < round.clues.length; i++) html += '<li>' + escapeHTML(round.clues[i]) + '</li>';
        html += '</ol>';
        elClues.innerHTML = html;
      }
      if (elReveal) elReveal.textContent = '';
      paintGrid();

      try { if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode('hidden'); } catch (e) {}
      try { if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(false); } catch (e) {}

      gameState.roundStartMs = Date.now();
      gameState.isProcessing = false;

      try {
        gameState.timerIntentionallyPaused = false;
        if (timer) {
          if (roundIdxOneBased === 1 && !gameState._timerStarted) {
            try { timer.start(); } catch (e) {}
            gameState._timerStarted = true;
          } else {
            try { timer.resume(); } catch (e) {}
          }
        }
      } catch (e) {}

      try { var p = safePlaySound('tap_sound'); if (p && p.catch) p.catch(function(){}); } catch (e) {}
      trackEvent('round_start', { round: roundIdxOneBased, set: round.set });
    }

    function escapeHTML(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function renderAnswerSlide(container, round) {
      if (!container || !round) return;
      var html = '<div class="cp-answer-card">';
      html += '<div style="font-size:18px;font-weight:700;color:#270f36;margin-bottom:10px;">Round ' + round.round + ' — Solved Layout</div>';
      html += '<div class="cp-answer-grid">';
      for (var i = 0; i < round.cards.length; i++) {
        var card = round.cards[i];
        var bg = card.category === 'moon' ? '#B8DCEA' :
                 card.category === 'sun' ? '#FFE489' :
                 card.category === 'saturn' ? '#FFC9D6' : '#DDC4EC';
        html += '<div class="cp-answer-cell" style="background:' + bg + ';color:#270f36;">' + String(card.value) + '</div>';
      }
      html += '</div>';
      html += '<div style="margin-top:10px;font-size:14px;color:#666;">All 8 pairs revealed.</div>';
      html += '</div>';
      container.innerHTML = html;
    }

    function buildAnswerSlidesForAllRounds() {
      var rounds = gameState.activeRounds;

      for (var i = 0; i < rounds.length; i++) {

      }
      return slides;

                  });
                }
              } catch (e) {}
              try {
                FeedbackManager.sound.preload([
                  { id: 'correct_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
                  { id: 'incorrect_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                  { id: 'rounds_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                  { id: 'sound_level_transition',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
                  { id: 'victory_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                  { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
                  { id: 'game_over_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                  { id: 'tap_sound',                url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
                ]);
              } catch (e) { console.error('[FeedbackManager.preload failed]', e && e.message, e); }
              window.addEventListener('message', handlePostMessage);
              try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
              setupGame();
            } catch (e) { console.error('[init inner] ' + (e && e.message), e); }
          }, function (e) { console.error('[FeedbackManager.init failed]', e && e.message, e); });
        } catch (e) { console.error('[init outer] ' + (e && e.message), e); }
      }, function (err) { console.error('[waitForPackages rejected] ' + (err && err.message)); });

      setTimeout(function () {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;
        var missing = [];
        if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
        if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
        if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
        if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
        if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
        if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
        if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
        if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
        if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
        if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
        if (missing.length > 0) {
          var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
          console.error('[' + msg + ']');
          var gc = document.getElementById('gameContent') || document.getElementById('app') || document.body;
          if (gc) gc.innerHTML = '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">Game failed to load — please refresh.</div>';
        }
      }, 2000);

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = setupGame;
      window.renderRound = renderRound;
      window.loadRound = function (n) { try { renderRound(n); } catch (e) {} };
      window.debugGame = function () { return gameState; };
    });

    function mountTimerInsideHeader() {
      var slot = document.getElementById('mathai-preview-slot');
      if (!slot) return;
      var existing = document.getElementById('timer-container');
      if (existing) {
        if (existing.parentNode !== slot) slot.appendChild(existing);
        return;
      }
      var div = document.createElement('div');
      div.id = 'timer-container';
      slot.appendChild(div);
    }
  </script>
</body>
</html>
