<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mood Check</title>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 28px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      overflow-x: hidden;
      overscroll-behavior: none;
    }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }
    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }
    input, textarea { -webkit-user-select: text; user-select: text; }

    #gameContent {
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 8px 16px 24px;
    }

    .mood-prompt-block {
      text-align: center;
      padding: 12px 4px 8px;
    }
    .mood-warm-line {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-text-primary);
      margin-bottom: 14px;
      line-height: 1.45;
    }
    .mood-prompt {
      font-size: 22px;
      font-weight: 700;
      color: var(--mathai-primary);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .mood-sub-prompt {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-gray);
      margin-bottom: 10px;
    }

    .mood-emoji-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-gap: 8px;
      gap: 8px;
      width: 100%;
      max-width: 420px;
      margin: 8px auto 18px;
    }
    .mood-emoji-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      min-height: 96px;
      padding: 10px 4px 8px;
      border: 2px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-card);
      background: var(--mathai-white);
      color: var(--mathai-primary);
      font-family: var(--mathai-font-family);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }
    .mood-emoji-tile .mood-emoji-glyph {
      font-size: 34px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .mood-emoji-tile .mood-emoji-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--mathai-gray);
      text-align: center;
      line-height: 1.2;
    }
    .mood-emoji-tile.selected {
      background: var(--mathai-cell-bg-yellow);
      border-color: var(--mathai-yellow);
      transform: scale(1.04);
    }
    .mood-emoji-tile.selected .mood-emoji-label {
      color: var(--mathai-primary);
    }
    .mood-emoji-tile.faded {
      opacity: 0.45;
    }
    .mood-emoji-tile:active:not(.disabled):not(:disabled) { transform: scale(0.97); }
    .mood-emoji-tile.disabled, .mood-emoji-tile:disabled {
      opacity: 0.55;
      pointer-events: none;
      cursor: not-allowed;
    }

    .mood-input-block {
      width: 100%;
      max-width: 420px;
      margin: 4px auto 14px;
    }
    .mood-input-label {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-primary);
      margin-bottom: 4px;
      font-weight: 600;
    }
    .mood-input-helper {
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      margin-bottom: 10px;
    }
    .mood-textarea-wrap {
      position: relative;
      border: 2px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-card);
      background: var(--mathai-white);
      padding: 10px 12px 38px;
      transition: border-color 120ms ease;
    }
    .mood-textarea-wrap.focused { border-color: var(--mathai-purple); }
    .mood-textarea {
      width: 100%;
      min-height: 86px;
      resize: vertical;
      border: none;
      outline: none;
      font-family: var(--mathai-font-family);
      font-size: 16px;
      color: var(--mathai-primary);
      line-height: 1.4;
      background: transparent;
      -webkit-appearance: none;
      appearance: none;
    }
    .mood-input-icons {
      position: absolute;
      left: 10px;
      bottom: 8px;
      display: flex;
      flex-direction: row;
      align-items: center;
    }
    .mood-icon-btn {
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      font-size: 18px;
      cursor: pointer;
      touch-action: manipulation;
      color: var(--mathai-gray);
      margin-right: 6px;
    }
    .mood-icon-btn.active { color: var(--mathai-purple); }

    .mood-feedback-panel {
      width: 100%;
      max-width: 420px;
      margin: 6px auto 0;
      padding: 12px 14px;
      border-radius: var(--mathai-border-radius-card);
      background: var(--mathai-cell-bg-green);
      border: 1px solid var(--mathai-cell-border-green);
      color: var(--mathai-green);
      font-size: var(--mathai-font-size-body);
      text-align: center;
      display: none;
    }
    .mood-feedback-panel.visible { display: block; }
    .mood-feedback-panel.show-warn {
      background: var(--mathai-cell-bg-yellow);
      border-color: var(--mathai-yellow);
      color: var(--mathai-primary);
    }

    /* Answer carousel slide */
    .mood-answer-card {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      padding: 14px 12px 18px;
      text-align: center;
    }
    .mood-answer-prompt { font-size: var(--mathai-font-size-body); color: var(--mathai-gray); margin-bottom: 10px; }
    .mood-answer-emoji-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-gap: 6px;
      gap: 6px;
      margin-bottom: 10px;
    }
    .mood-answer-emoji {
      padding: 8px 4px;
      border-radius: 8px;
      border: 1.5px solid var(--mathai-border-gray);
      background: var(--mathai-white);
      font-size: 24px;
    }
    .mood-answer-emoji.solved-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
    }
    .mood-answer-explanation {
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-text-primary);
      margin-top: 6px;
      line-height: 1.4;
    }
    .mood-answer-quote {
      font-style: italic;
      color: var(--mathai-gray);
      margin-top: 6px;
      font-size: var(--mathai-font-size-small);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    @media (max-height: 500px) {
      #landscape-overlay {
        display: flex;
        position: fixed;
        inset: 0;
        background: var(--mathai-white);
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-size: 18px;
        text-align: center;
        padding: 24px;
      }
    }
    #landscape-overlay { display: none; }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="0" data-round="1"></div>
  <div id="landscape-overlay">Please rotate your device to portrait mode.</div>

  <script>
    /* ====================================================================== */
    /* Stickers (canonical)                                                      */
    /* ====================================================================== */
    var STICKER_CORRECT  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_WRONG    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_LEVEL    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';
    var STICKER_VICTORY  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_TWO      = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_ONE      = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_RESTART  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-102.gif';
    var STICKER_CELEBRATE = STICKER_VICTORY;
    var STICKER_SAD      = STICKER_WRONG;
    var STICKER_MOTIVATE = STICKER_LEVEL;

    /* ====================================================================== */
    /* fallbackContent — 1 deliberate prompt × 3 sets = 3 rounds                 */
    /* "1 round, deliberately" per concept — a single mood-check + reflection.   */
    /* ====================================================================== */
    var fallbackContent = {
      previewInstruction: '<p><b>Mood Check.</b> Tap the emoji that matches how the activity felt and write or speak a sentence about it. There are no right or wrong answers — just be honest.</p>',
      previewAudioText: 'Tap the emoji that matches how the activity felt for you. Then write or speak a short sentence about why. There are no right or wrong answers here.',
      previewAudio: null,
      showGameOnPreview: false,
      totalRounds: 1,
      totalLives: 1,
      answerComponent: true,
      rounds: [
        { set:'A', id:'A_r1_mood', round:1, stage:1, activityLabel:'this activity',
          prompt:'How did this activity feel for you?',
          correctTTS:'Thanks for sharing how that felt.',
          correctSubtitle:'Thanks for sharing!',
          answer:{ activityLabel:'this activity', prompt:'How did this activity feel for you?', explanation:'Reflection saved.' } },

        { set:'B', id:'B_r1_mood', round:1, stage:1, activityLabel:'this activity',
          prompt:'How did this activity feel for you today?',
          correctTTS:'Thanks for telling me how that felt today.',
          correctSubtitle:'Reflection captured.',
          answer:{ activityLabel:'this activity', prompt:'How did this activity feel for you today?', explanation:'Reflection saved.' } },

        { set:'C', id:'C_r1_mood', round:1, stage:1, activityLabel:'this activity',
          prompt:'How did this activity land for you?',
          correctTTS:'Thanks for the reflection.',
          correctSubtitle:'Reflection captured.',
          answer:{ activityLabel:'this activity', prompt:'How did this activity land for you?', explanation:'Reflection saved.' } }
      ]
    };

    /* ====================================================================== */
    /* gameState                                                                 */
    /* ====================================================================== */
    var SETS = ['A', 'B', 'C'];
    var EMOJI_OPTIONS = [
      { id: 'bored',   glyph: '😴', caption: 'I got bored' },
      { id: 'lost',    glyph: '😥', caption: 'I needed more help' },
      { id: 'tough',   glyph: '😅', caption: 'Tough, but I liked it' },
      { id: 'fun',     glyph: '😍', caption: 'I had a lot of fun!' }
    ];

    var gameState = {
      gameId: 'emoji-feedback-with-text-or-voice',
      gameTitle: 'Mood Check',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 1,
      score: 0,
      lives: 1,
      totalLives: 1,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      duration_data: { startTime: null, endTime: null, preview: [] },
      correctAnswer: null,
      stars: 0,
      setIndex: 0,
      activeRounds: [],
      previewResult: null,
      progress: 0,
      roundToken: 0,
      roundStartMs: 0,
      // per-round capture
      pickedEmojiId: null,
      pickedReflectionText: '',
      reflectionsByRound: {}
    };
    window.gameState = gameState;

    /* ====================================================================== */
    /* Module-scope vars                                                         */
    /* ====================================================================== */
    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var floatingBtn = null;
    var answerComponent = null;

    /* ====================================================================== */
    /* Helpers                                                                   */
    /* ====================================================================== */
    function getAvailableSets(rounds) {
      var seen = {}; var out = [];
      for (var i = 0; i < rounds.length; i++) {
        var s = rounds[i].set;
        if (s && !seen[s]) { seen[s] = true; out.push(s); }
      }
      return out.length ? out : ['A'];
    }
    function getRounds() {
      var src = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(src);
      var setKey = sets[gameState.setIndex % sets.length];
      var filtered = [];
      for (var i = 0; i < src.length; i++) { if (src[i].set === setKey) filtered.push(src[i]); }
      filtered.sort(function (a, b) { return a.round - b.round; });
      return filtered;
    }
    function escapeHTML(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function getCorrectCount() {
      var c = 0;
      for (var i = 0; i < gameState.attempts.length; i++) { if (gameState.attempts[i].correct === true) c++; }
      return c;
    }
    function getStars() {
      // No right or wrong answers — completion-based stars.
      // 3 stars: completed thoughtfully (reflection >= 10 chars on the round)
      // 2 stars: completed (any reflection length)
      // 1 star:  default — anything past load
      var completed = getCorrectCount();
      if (completed < 1) return 1;
      var thoughtful = false;
      try {
        var keys = Object.keys(gameState.reflectionsByRound || {});
        for (var i = 0; i < keys.length; i++) {
          var entry = gameState.reflectionsByRound[keys[i]];
          if (entry && typeof entry.text === 'string' && entry.text.trim().length >= 10) {
            thoughtful = true; break;
          }
        }
      } catch (e) {}
      if (completed >= gameState.totalRounds && thoughtful) return 3;
      if (completed >= gameState.totalRounds) return 2;
      return 1;
    }
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound + 1);
    }
    function trackEvent(name, payload) {
      try { gameState.events.push({ event: name, ts: Date.now(), data: payload || {} }); } catch (e) {}
      try { if (signalCollector && signalCollector.recordEvent) signalCollector.recordEvent(name, payload || {}); } catch (e) {}
    }
    function recordAttempt(input, correct, misconceptionTag, responseMs) {
      var round = gameState.activeRounds[gameState.currentRound];
      var qid = round ? round.id : ('r' + (gameState.currentRound + 1));
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) : 0,
        input_of_user: input,
        correct: correct === true,
        round_number: gameState.currentRound + 1,
        question_id: qid,
        correct_answer: round ? round.activityLabel : null,
        response_time_ms: typeof responseMs === 'number' ? responseMs : 0,
        misconception_tag: misconceptionTag || null,
        difficulty_level: round ? (round.stage || 1) : 1,
        is_retry: false,
        metadata: { set: round ? round.set : null }
      };
      gameState.attempts.push(attempt);
      try { if (signalCollector && signalCollector.recordAttempt) signalCollector.recordAttempt(attempt); } catch (e) {}
    }
    function postGameComplete() {
      if (gameState._gameCompletePosted) return;
      gameState._gameCompletePosted = true;
      var correctCount = getCorrectCount();
      var attempted = gameState.attempts.length;
      var accuracy = attempted === 0 ? 0 : Math.round((correctCount / attempted) * 100);
      var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
      var triesByRound = gameState.attempts.map(function (a) { return { round: a.round_number, correct: a.correct === true }; });
      var metrics = {
        accuracy: accuracy,
        time: Math.round(elapsedMs / 1000),
        stars: gameState.stars,
        attempts: gameState.attempts.slice(),
        duration_data: gameState.duration_data,
        totalLives: gameState.lives,
        tries: triesByRound,
        score: gameState.score,
        correctCount: correctCount,
        previewResult: gameState.previewResult || null
      };
      var signalSealed = { event_count: gameState.events.length, metadata: {} };
      try {
        if (signalCollector && typeof signalCollector.seal === 'function') {
          var sealed = signalCollector.seal();
          if (sealed) {
            if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count;
            if (sealed.metadata) signalSealed.metadata = sealed.metadata;
          }
        }
      } catch (e0) {}
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: metrics,
            completedAt: Date.now(),
            signal_event_count: signalSealed.event_count,
            signal_metadata: signalSealed.metadata
          }
        }, '*');
      } catch (e) {}
    }

    /* ====================================================================== */
    /* Audio helpers                                                             */
    /* ====================================================================== */
    function safePlaySound(id, opts) {
      try { return FeedbackManager.sound.play(id, opts || {}); } catch (e) { return Promise.resolve(); }
    }
    function awaitedFeedbackSound(id, opts) {
      var p = safePlaySound(id, opts || {});
      var floor = new Promise(function (r) { setTimeout(r, 1500); });
      return Promise.all([p, floor]).then(function () {}, function () {});
    }
    function playDynamicFeedback(opts) {
      try { return FeedbackManager.playDynamicFeedback(opts || {}); } catch (e) { return Promise.resolve(); }
    }

    /* ====================================================================== */
    /* waitForPackages                                                           */
    /* ====================================================================== */
    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            try { throw new Error('waitForPackages timeout'); } catch (rethrown) { reject(err); return; }
            return reject(err);
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    /* ====================================================================== */
    /* Round rendering                                                           */
    /* ====================================================================== */
    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="mood-prompt-block">' +
          '<div class="mood-warm-line">A short reflection moment.</div>' +
          '<div class="mood-prompt" id="moodPrompt">How did it feel?</div>' +
          '<div class="mood-sub-prompt">Your honest mood, four faces below.</div>' +
        '</div>' +
        '<div class="mood-emoji-row" id="moodEmojiRow"></div>' +
        '<div class="mood-input-block">' +
          '<div class="mood-input-label">Can you tell me why?</div>' +
          '<div class="mood-input-helper">Please share more details here.</div>' +
          '<div class="mood-textarea-wrap" id="moodInputWrap">' +
            '<textarea id="moodReflection" class="mood-textarea" data-testid="reflection-input" placeholder="Type here..." aria-label="Reflection"></textarea>' +
            '<div class="mood-input-icons">' +
              '<button type="button" class="mood-icon-btn" id="moodMicBtn" data-testid="btn-mic" aria-label="Use voice">🎤</button>' +
              '<button type="button" class="mood-icon-btn active" id="moodKeyboardBtn" data-testid="btn-keyboard" aria-label="Use keyboard">⌨️</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="mood-feedback-panel" id="moodFeedback" role="status" aria-live="polite"></div>';
    }
    function renderInitialState() {
      var promptEl = document.getElementById('moodPrompt');
      var rowEl = document.getElementById('moodEmojiRow');
      var ta = document.getElementById('moodReflection');
      var fb = document.getElementById('moodFeedback');
      if (promptEl) promptEl.textContent = 'How did it feel?';
      if (rowEl) rowEl.innerHTML = '';
      if (ta) ta.value = '';
      if (fb) { fb.classList.remove('visible'); fb.textContent = ''; }
    }

    function renderRound(roundIdxOneBased) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      gameState.currentRound = roundIdxOneBased - 1;
      gameState.isActive = true;
      gameState.phase = 'gameplay';
      gameState.roundToken = (gameState.roundToken || 0) + 1;
      gameState.pickedEmojiId = null;
      gameState.pickedReflectionText = '';
      syncDOM();

      var round = gameState.activeRounds[gameState.currentRound];
      if (!round) return;

      gameState.correctAnswer = round.activityLabel;
      gameState.roundStartMs = Date.now();
      gameState.isProcessing = false;

      var promptEl = document.getElementById('moodPrompt');
      if (promptEl) {
        promptEl.textContent = round.prompt;
        promptEl.classList.remove('fade-in');
        void promptEl.offsetWidth;
        promptEl.classList.add('fade-in');
      }

      var rowEl = document.getElementById('moodEmojiRow');
      if (rowEl) {
        rowEl.innerHTML = '';
        for (var i = 0; i < EMOJI_OPTIONS.length; i++) {
          var opt = EMOJI_OPTIONS[i];
          var tile = document.createElement('button');
          tile.type = 'button';
          tile.className = 'mood-emoji-tile';
          tile.setAttribute('data-emoji-id', opt.id);
          tile.setAttribute('data-testid', 'btn-emoji-' + opt.id);
          tile.setAttribute('data-round-token', String(gameState.roundToken));
          tile.innerHTML =
            '<span class="mood-emoji-glyph" aria-hidden="true">' + opt.glyph + '</span>' +
            '<span class="mood-emoji-label">' + escapeHTML(opt.caption) + '</span>';
          tile.addEventListener('click', onEmojiTap);
          rowEl.appendChild(tile);
        }
      }

      var ta = document.getElementById('moodReflection');
      if (ta) ta.value = '';
      var fb = document.getElementById('moodFeedback');
      if (fb) { fb.classList.remove('visible'); fb.textContent = ''; }

      // Show floating button (submit) — predicate gates active state
      try {
        if (floatingBtn) {
          floatingBtn.setMode('submit');
          floatingBtn.setSubmittable(false);
        }
      } catch (e) {}

      // Round-prompt ambient SFX
      try { var p = safePlaySound('tap_sound', { sticker: null }); if (p && p.catch) p.catch(function () {}); } catch (e) {}
      trackEvent('round_start', { round: roundIdxOneBased, set: round.set });
    }

    function isSubmittable() {
      var ta = document.getElementById('moodReflection');
      var hasText = ta && ta.value && ta.value.trim().length > 0;
      return !!(gameState.pickedEmojiId && hasText);
    }
    function refreshSubmittable() {
      try { if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(isSubmittable()); } catch (e) {}
    }

    function onEmojiTap(ev) {
      if (gameState.isProcessing || gameState.gameEnded) return;
      var btn = ev.currentTarget;
      var rt = btn.getAttribute('data-round-token');
      if (rt !== String(gameState.roundToken || '')) return;
      var id = btn.getAttribute('data-emoji-id');
      gameState.pickedEmojiId = id;
      var tiles = document.querySelectorAll('.mood-emoji-tile');
      for (var i = 0; i < tiles.length; i++) {
        if (tiles[i].getAttribute('data-emoji-id') === id) {
          tiles[i].classList.add('selected');
          tiles[i].classList.remove('faded');
        } else {
          tiles[i].classList.remove('selected');
          tiles[i].classList.add('faded');
        }
      }
      try { var p = safePlaySound('sound_bubble_select', {}); if (p && p.catch) p.catch(function () {}); } catch (e) {}
      refreshSubmittable();
    }

    function onReflectionInput() {
      gameState.pickedReflectionText = (document.getElementById('moodReflection') || { value: '' }).value || '';
      refreshSubmittable();
    }

    function handleSubmit() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      if (!isSubmittable()) {
        showInlineNudge('Please tap an emoji and write a sentence.');
        return;
      }
      gameState.isProcessing = true;

      var responseMs = Date.now() - gameState.roundStartMs;
      var round = gameState.activeRounds[gameState.currentRound];
      var emoji = gameState.pickedEmojiId;
      var reflection = (document.getElementById('moodReflection') || { value: '' }).value.trim();

      gameState.reflectionsByRound[gameState.currentRound + 1] = { emoji: emoji, text: reflection };

      // No right/wrong — every submission is "correct" (completion).
      gameState.score += 1;
      gameState.progress = gameState.currentRound + 1;
      try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
      syncDOM();

      var input = JSON.stringify({ emoji: emoji, reflection_chars: reflection.length });
      recordAttempt(input, true, null, responseMs);
      trackEvent('answer_submitted', { round: gameState.currentRound + 1, emoji: emoji, reflection_chars: reflection.length });

      // Disable tiles + textarea
      var tiles = document.querySelectorAll('.mood-emoji-tile');
      for (var i = 0; i < tiles.length; i++) tiles[i].classList.add('disabled');
      var ta = document.getElementById('moodReflection'); if (ta) ta.disabled = true;

      try { if (floatingBtn) floatingBtn.setSubmittable(false); } catch (e) {}

      runCorrectFeedbackAndAdvance(round);
    }

    function showInlineNudge(msg) {
      var fb = document.getElementById('moodFeedback');
      if (!fb) return;
      fb.classList.add('show-warn');
      fb.classList.add('visible');
      fb.textContent = msg;
      setTimeout(function () { try { fb.classList.remove('visible'); fb.classList.remove('show-warn'); } catch (e) {} }, 2200);
    }

    function runCorrectFeedbackAndAdvance(round) {
      (async function () {
        var fb = document.getElementById('moodFeedback');
        if (fb) { fb.classList.remove('show-warn'); fb.classList.add('visible'); fb.textContent = round.correctSubtitle || 'Reflection saved.'; }
        try { await awaitedFeedbackSound('correct_sound_effect', { sticker: STICKER_CORRECT }); } catch (e) {}
        try { await playDynamicFeedback({ audio_content: round.correctTTS, subtitle: round.correctSubtitle, sticker: STICKER_CORRECT }); } catch (e) {}
        advanceAfterFeedback();
      })();
    }

    function advanceAfterFeedback() {
      var roundJustPlayed = gameState.currentRound + 1;
      if (roundJustPlayed === gameState.totalRounds) { endGame(true); return; }
      showRoundIntro(roundJustPlayed + 1);
    }

    /* ====================================================================== */
    /* Round intro                                                               */
    /* ====================================================================== */
    async function showRoundIntro(n) {
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}

      var ttsText = 'Round ' + n;
      await transitionScreen.show({
        title: 'Round ' + n,
        icons: [],
        persist: true,
        buttons: [],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_ROUND }); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          })();
        }
      });

      setTimeout(function () {
        try {
          if (gameState.gameEnded) return;
          if (gameState.currentRound + 1 < n) {
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          }
        } catch (e) {}
      }, 9000);
    }

    /* ====================================================================== */
    /* End-of-game                                                               */
    /* ====================================================================== */
    function endGame(victory) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.stars = getStars();
      if (victory) {
        gameState.phase = 'results';
        syncDOM();
        postGameComplete();
        showVictory();
      } else {
        gameState.phase = 'game_over';
        syncDOM();
        postGameComplete();
        showGameOver();
      }
      trackEvent('game_end', { victory: victory, stars: gameState.stars, score: gameState.score });
    }

      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try { transitionScreen.hide(); } catch (e) {}
      showStarsCollected();
    }

    }

            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_MOTIVATE }); } catch (e) {}

    async function showStarsCollected() {
      gameState.phase = 'stars_collected';
      syncDOM();
      await transitionScreen.show({
        title: "Yay!\nStars collected!",
        buttons: [],
        persist: true,

            try {
              window.postMessage({
                type: 'show_star',
                data: { count: gameState.stars, variant: 'yellow', score: gameState.score + '/' + gameState.totalRounds }

      });

    /* ====================================================================== */
    /* Answer carousel                                                           */
    /* ====================================================================== */
    function renderAnswerSlide(container, round) {
      if (!container || !round) return;
      var idx = round.round;
      var captured = gameState.reflectionsByRound[idx];
      var emojiId = captured ? captured.emoji : null;
      var html = '';
      html += '<div class="mood-answer-card">';
      html += '<div class="mood-answer-prompt">' + escapeHTML(round.prompt) + '</div>';
      html += '<div class="mood-answer-emoji-row">';
      for (var i = 0; i < EMOJI_OPTIONS.length; i++) {
        var opt = EMOJI_OPTIONS[i];
        var cls = (opt.id === emojiId) ? 'mood-answer-emoji solved-correct' : 'mood-answer-emoji';
        html += '<div class="' + cls + '">' + opt.glyph + '</div>';
      }
      html += '</div>';
      html += '<div class="mood-answer-explanation">' + escapeHTML(round.answer.explanation) + '</div>';
      if (captured && captured.text) {
        html += '<div class="mood-answer-quote">“' + escapeHTML(captured.text) + '”</div>';
      }
      html += '</div>';
      container.innerHTML = html;
    }
    function buildAnswerSlidesForAllRounds() {
      var rounds = gameState.activeRounds;
      var slides = [];
      for (var i = 0; i < rounds.length; i++) {
        (function (r) { slides.push({ render: function (container) { renderAnswerSlide(container, r); } }); })(rounds[i]);
      }
      return slides;
    }
    function showAnswerCarousel() {
      try { answerComponent.show({ slides: buildAnswerSlidesForAllRounds() }); } catch (e) {}
      try { if (floatingBtn) floatingBtn.setMode('next'); } catch (e) {}
      try {
        setTimeout(function () {
          var slot = document.getElementById('mathai-answer-slot');
          if (slot && slot.scrollIntoView) slot.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 200);
      } catch (e) {}
    }

    /* ====================================================================== */
    /* setupGame / startGameAfterPreview                                          */
    /* ====================================================================== */
    function setupGame() {
      var content = gameState.content || fallbackContent;
      gameState.content = content;
      gameState.totalRounds = content.totalRounds || 1;
      gameState.totalLives = content.totalLives || 1;
      gameState.lives = gameState.totalLives;
      gameState.activeRounds = getRounds();

      injectGameHTML();
      renderInitialState();

      // Wire textarea live input listener once after DOM injection
      var ta = document.getElementById('moodReflection');
      if (ta) {
        ta.addEventListener('input', onReflectionInput);
        ta.addEventListener('focus', function () {
          var w = document.getElementById('moodInputWrap'); if (w) w.classList.add('focused');
        });
        ta.addEventListener('blur', function () {
          var w = document.getElementById('moodInputWrap'); if (w) w.classList.remove('focused');
        });
      }
      var mic = document.getElementById('moodMicBtn');
      var kb = document.getElementById('moodKeyboardBtn');
      if (mic) mic.addEventListener('click', function () {
        try { mic.classList.add('active'); if (kb) kb.classList.remove('active'); } catch (e) {}
        showInlineNudge('Voice capture is illustrative — please type your reflection.');
      });
      if (kb) kb.addEventListener('click', function () {
        try { kb.classList.add('active'); if (mic) mic.classList.remove('active'); } catch (e) {}
        if (ta) try { ta.focus(); } catch (e) {}
      });

      try {
        previewScreen.show({
          instruction: content.previewInstruction || fallbackContent.previewInstruction,
          audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
          showGameOnPreview: content.showGameOnPreview === true,
          onComplete: function (previewData) { startGameAfterPreview(previewData); }
        });
      } catch (e) {
        console.error('[previewScreen.show failed]', e && e.message, e);
      }
    }

    function startGameAfterPreview(previewData) {
      gameState.previewResult = previewData || {};
      gameState.duration_data.preview = gameState.duration_data.preview || [];
      gameState.duration_data.preview.push({ duration: (previewData && previewData.duration) || 0 });
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      try {
        if (progressBar) {
          progressBar.show && progressBar.show();
          progressBar.update(0, gameState.totalLives);
        }
      } catch (e) {}
      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex] });
      try {
        if (signalCollector && signalCollector.recordViewEvent) {
          signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' });
        }
      } catch (e) {}
      showWelcome();
    }

    async function showWelcome() {
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      var ttsText = "Let's reflect together. Tap an emoji and tell me why.";
      await transitionScreen.show({
        title: 'Welcome!',
        icons: ['👋'],
        persist: true,
        buttons: [{
          text: "Let's go!",
          type: 'primary',
          action: function () {
            try { FeedbackManager.sound.pause(); } catch (e) {}
            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            showRoundIntro(1);
          }
        }],
        onMounted: function () {
          (async function () {
            try { await safePlaySound('sound_level_transition', { sticker: STICKER_LEVEL }); } catch (e) {}
            try { await playDynamicFeedback({ audio_content: ttsText, subtitle: ttsText, sticker: STICKER_LEVEL }); } catch (e) {}
          })();
        }
      });
    }

    /* ====================================================================== */
    /* Restart                                                                   */
    /* ====================================================================== */
    function resetGameState() {
      gameState.phase = 'gameplay';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.reflectionsByRound = {};
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState._gameCompletePosted = false;
      gameState.stars = 0;
      gameState.correctAnswer = null;
      gameState.progress = 0;
      gameState.duration_data = { startTime: null, endTime: null, preview: gameState.duration_data.preview || [] };
      gameState.activeRounds = getRounds();
      try {
        if (answerComponent && answerComponent.update) answerComponent.update({ slides: [] });
        if (answerComponent && answerComponent.hide) answerComponent.hide();
      } catch (e) {}
    }
    function restartGame() {
      var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
      gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      resetGameState();
      try { if (signalCollector && signalCollector.reset) signalCollector.reset(); } catch (e) {}
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      try { if (progressBar) progressBar.update(0, gameState.totalLives); } catch (e) {}
      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex], restart: true });
      // Re-inject game DOM (textarea state was disabled at end of last attempt)
      injectGameHTML();
      renderInitialState();
      var ta = document.getElementById('moodReflection');
      if (ta) { ta.addEventListener('input', onReflectionInput); }
      showRoundIntro(1);
    }

    /* ====================================================================== */
    /* Postmessage handling                                                      */
    /* ====================================================================== */
    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      var t = event.data.type;
      var data = event.data.data || {};
      if (t === 'game_init') {
        gameState.phase = 'playing';
        if (data.content) gameState.content = data.content;
        gameState.signalConfig = data.signalConfig || {};
        if (data.signalConfig && signalCollector && signalCollector.applyConfig) {
          try { signalCollector.applyConfig(data.signalConfig); } catch (e) {}
        }
        try {
          if (signalCollector) {
            signalCollector.gameId = 'emoji-feedback-with-text-or-voice';
            if (data.sessionId) signalCollector.sessionId = data.sessionId;
            if (data.studentId) signalCollector.studentId = data.studentId;
            if (data.contentSetId) signalCollector.contentSetId = data.contentSetId;
            if (data.signalConfig && data.signalConfig.flushUrl) signalCollector.flushUrl = data.signalConfig.flushUrl;
            if (data.signalConfig && data.signalConfig.playId) signalCollector.playId = data.signalConfig.playId;
            if (signalCollector.startFlushing) { try { signalCollector.startFlushing(); } catch (e) {} }
          }
        } catch (e) {}
        syncDOM();
        setupGame();
      }
    }

    /* ====================================================================== */
    /* DOMContentLoaded                                                          */
    /* ====================================================================== */
    document.addEventListener('DOMContentLoaded', function () {
      waitForPackages().then(function () {
        try {
          var initP = FeedbackManager.init && FeedbackManager.init();
          var doInit = initP && initP.then ? initP : Promise.resolve();
          doInit.then(function () {
            try {
              try {
                signalCollector = new SignalCollector({
                  sessionId: 'mood-' + Date.now(),
                  studentId: 'standalone',
                  gameId: 'emoji-feedback-with-text-or-voice',
                  contentSetId: 'fallback'
                });
                window.signalCollector = signalCollector;
              } catch (e) { console.error('[SignalCollector ctor failed]', e && e.message, e); }

              try {
                ScreenLayout.inject('app', {
                  slots: {
                    previewScreen: true,
                    progressBar: true,
                    transitionScreen: true,
                    floatingButton: true,
                    answerComponent: true
                  }
                });
              } catch (e) { console.error('[ScreenLayout.inject failed]', e && e.message, e); }

              injectGameHTML();
              renderInitialState();

              try {
                visibilityTracker = new VisibilityTracker({
                  popupProps: { title: 'Paused', description: 'Tap Resume to continue.', primaryText: 'Resume' },
                  onInactive: function () {
                    try { FeedbackManager.sound.pause(); } catch (e) {}
                    try { FeedbackManager.stream.pauseAll(); } catch (e) {}
                    try { if (previewScreen) previewScreen.pause(); } catch (e) {}
                  },
                  onResume: function () {
                    try { FeedbackManager.sound.resume(); } catch (e) {}
                    try { FeedbackManager.stream.resumeAll(); } catch (e) {}
                    try { if (previewScreen) previewScreen.resume(); } catch (e) {}
                  }
                });
              } catch (e) { console.error('[VisibilityTracker ctor failed]', e && e.message, e); }

              try {
                progressBar = new ProgressBarComponent({
                  slotId: 'mathai-progress-slot',
                  totalRounds: 1,
                  totalLives: 1,
                  showLives: false
                });
              } catch (e) { console.error('[ProgressBarComponent ctor failed]', e && e.message, e); }

              try {
                transitionScreen = new TransitionScreenComponent({ slotId: 'mathai-transition-slot' });
              } catch (e) { console.error('[TransitionScreenComponent ctor failed]', e && e.message, e); }

              try {
                previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' });
              } catch (e) { console.error('[PreviewScreenComponent ctor failed]', e && e.message, e); }

              try {
                floatingBtn = new FloatingButtonComponent({ slotId: 'mathai-floating-button-slot' });
              } catch (e) { console.error('[FloatingButtonComponent ctor failed]', e && e.message, e); }

              try {
                answerComponent = new AnswerComponentComponent({ slotId: 'mathai-answer-slot' });
              } catch (e) { console.error('[AnswerComponentComponent ctor failed]', e && e.message, e); }

              // Wire FloatingButton submit + next handlers
              try {
                if (floatingBtn && floatingBtn.on) {
                  floatingBtn.on('submit', function () { handleSubmit(); });
                  floatingBtn.on('next', function () {
                    try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
                    try { if (answerComponent) answerComponent.destroy(); } catch (e) {}
                    try { if (previewScreen) previewScreen.destroy(); } catch (e) {}
                    try { if (floatingBtn) floatingBtn.destroy(); } catch (e) {}
                  });
                }
              } catch (e) {}

              try {
                FeedbackManager.sound.preload([
                  { id: 'correct_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
                  { id: 'incorrect_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                  { id: 'rounds_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                  { id: 'sound_level_transition',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
                  { id: 'victory_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                  { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
                  { id: 'game_over_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                  { id: 'sound_bubble_select',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3' },
                  { id: 'tap_sound',                url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
                ]);
              } catch (e) { console.error('[FeedbackManager.preload failed]', e && e.message, e); }

              window.addEventListener('message', handlePostMessage);
              try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
              setupGame();
            } catch (e) { console.error('[init inner] ' + (e && e.message), e); }
          }, function (e) { console.error('[FeedbackManager.init failed]', e && e.message, e); });
        } catch (e) { console.error('[init outer] ' + (e && e.message), e); }
      }, function (err) { console.error('[waitForPackages rejected] ' + (err && err.message)); });

      setTimeout(function () {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;
        var missing = [];
        if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
        if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
        if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
        if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
        if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
        if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
        if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
        if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
        if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
        if (missing.length > 0) {
          var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
          console.error('[' + msg + ']');
          var gc = document.getElementById('gameContent') || document.getElementById('app') || document.body;
          if (gc) {
            gc.innerHTML = '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">Game failed to load — please refresh.</div>';
          }
        }
      }, 2000);

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = setupGame;
      window.renderRound = renderRound;
      window.loadRound = function (n) { try { renderRound(n); } catch (e) {} };
    });
  </script>
</body>
</html>
