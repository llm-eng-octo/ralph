<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Speed Sum — Mental Addition Sprint</title>

  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100dvh;
      overflow-x: hidden;
      overscroll-behavior: none;
    }
    @supports not (height: 100dvh) {
      html, body { height: 100vh; }
    }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }
    .hidden { display: none !important; }
    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }
    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }
    #gameContent {
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 8px 16px 24px;
    }
    .ss-progress-line {
      text-align: center;
      font-size: 14px;
      color: var(--mathai-gray);
      margin: 6px 0 8px;
    }
    .ss-timer-wrap {
      display: flex;
      justify-content: center;
      margin: 4px auto 12px;
      min-height: 41px;
      transition: filter 200ms ease;
    }
    .ss-timer-wrap .mathai-timer-component {
      width: 320px !important;
      max-width: 100% !important;
      height: 41px !important;
    }
    .ss-timer-wrap.ss-timer-normal .mathai-timer-component { filter: none; }
    .ss-timer-wrap.ss-timer-amber .mathai-timer-component {
      filter: hue-rotate(-30deg) saturate(1.3) brightness(1.05);
    }
    .ss-timer-wrap.ss-timer-red .mathai-timer-component {
      filter: hue-rotate(-90deg) saturate(1.5) brightness(1.05);
      animation: ssTimerPulse 0.6s ease-in-out infinite;
    }
    @keyframes ssTimerPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    .ss-list-card {
      background: var(--mathai-white);
      border: 2px solid var(--mathai-border-gray);
      border-radius: 14px;
      padding: 18px 14px;
      margin-bottom: 16px;
      text-align: center;
      animation: fadeIn 0.35s ease;
    }
    .ss-list-numbers {
      font-size: 22px;
      font-weight: 800;
      color: var(--mathai-purple);
      letter-spacing: 0.04em;
      line-height: 1.6;
      word-break: break-word;
    }
    .ss-list-numbers .plus {
      color: var(--mathai-border-gray);
      font-weight: 600;
      margin: 0 4px;
    }
    .ss-options-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-gap: 10px;
      margin-bottom: 10px;
    }
    .ss-option-tile {
      min-height: 64px;
      padding: 12px 8px;
      background: var(--mathai-white);
      border: 2px solid var(--mathai-border-gray);
      border-radius: 12px;
      font-family: var(--mathai-font-family);
      font-size: 22px;
      font-weight: 800;
      color: var(--mathai-primary);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }
    .ss-option-tile:active { transform: scale(0.97); }
    .ss-option-tile.selected-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
      color: #219653;
    }
    .ss-option-tile.selected-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-red);
      animation: shake 0.5s ease;
    }
    .ss-option-tile.disabled { opacity: 0.5; pointer-events: none; }

    .ss-answer-card {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      padding: 12px;
      text-align: center;
    }
    .ss-answer-list {
      font-size: 14px;
      color: var(--mathai-gray);
      margin-bottom: 8px;
      word-break: break-word;
    }
    .ss-answer-sum {
      font-size: 32px;
      font-weight: 800;
      color: #219653;
      margin-bottom: 6px;
    }
    .ss-answer-explanation {
      font-size: 16px;
      color: var(--mathai-text-primary);
    }

    button, [role="button"], .ss-option-tile {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }
    #app {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white);
        color: var(--mathai-primary);
        font-family: var(--mathai-font-family);
        font-size: 18px;
        text-align: center;
        padding: 24px;
      }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease; }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="3"></div>

  <script>
    var STICKER_CORRECT  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';

    var STICKER_LEVEL    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';

    var STICKER_TWO      = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_ONE      = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_CELEBRATE = STICKER_VICTORY;
    var STICKER_SAD      = STICKER_WRONG;

    /* Each round: list of numbers (8-14), 3 sum options with optionTypes
       (correct / missedOne / doubleCounted) for diagnostic hints.
       totalRounds = 5 → 5 × 3 sets = 15 fallback rounds. 15s countdown. */
    var fallbackContent = {
      previewInstruction: '<p><b>Speed Sum!</b> Add the list of numbers in your head, then tap the right sum from three options.</p><p>3 lives, 5 rounds. 15-second timer per round!</p>',
      previewAudioText: 'Add the list in your head, then pick the correct sum from three options. Three lives, five rounds, fifteen seconds each.',
      previewAudio: null,
      showGameOnPreview: false,
      totalRounds: 5,
      totalLives: 3,
      answerComponent: true,
      rounds: [
        // Set A — 5 rounds. options paired with optionTypes.
        { set:'A', id:'A_r1_ss1', round:1, stage:1,
          list:[5,3,4,2,6,5,3,2], options:[30,28,32], correctIndex:0,
          optionTypes:['correct','missedOne','doubleCounted'],
          correctTTS:'Right! Five plus three plus four plus two plus six plus five plus three plus two is 30.',
          correctSubtitle:'Sum is 30.',
          wrongTTS:'The sum is 30.',
          wrongSubtitle:'Sum is 30.' },
        { set:'A', id:'A_r2_ss2', round:2, stage:1,
          list:[7,3,8,2,5,5,4,6], options:[40,42,38], correctIndex:0,
          optionTypes:['correct','doubleCounted','missedOne'],
          correctTTS:'Right! Pair 7+3, 8+2, 5+5, 4+6 — that is 40.',
          correctSubtitle:'Sum is 40.',
          wrongTTS:'Pair 7+3, 8+2, 5+5, 4+6 — that is 40.',
          wrongSubtitle:'Sum is 40.' },
        { set:'A', id:'A_r3_ss3', round:3, stage:2,
          list:[12,8,11,9,7,3,5,5,6,4], options:[70,68,72], correctIndex:0,
          optionTypes:['correct','missedOne','doubleCounted'],
          correctTTS:'Right! 12+8, 11+9, 7+3, 5+5, 6+4 — five tens — 70.',
          correctSubtitle:'Sum is 70.',
          wrongTTS:'Pair to tens: 12+8, 11+9, 7+3, 5+5, 6+4 — that is 70.',
          wrongSubtitle:'Sum is 70.' },
        { set:'A', id:'A_r4_ss4', round:4, stage:2,
          list:[15,5,12,8,11,9,4,6,7,3], options:[80,78,82], correctIndex:0,
          optionTypes:['correct','missedOne','doubleCounted'],
          correctTTS:'Right! Eight pairs of ten — 80.',
          correctSubtitle:'Sum is 80.',
          wrongTTS:'Pair to tens: 15+5, 12+8, 11+9, 4+6, 7+3 — 80.',
          wrongSubtitle:'Sum is 80.' },
        { set:'A', id:'A_r5_ss5', round:5, stage:3,
          list:[13,7,14,6,12,8,11,9,5,15,4,16], options:[120,118,122], correctIndex:0,
          optionTypes:['correct','missedOne','doubleCounted'],
          correctTTS:'Right! Six pairs of twenty — 120.',
          correctSubtitle:'Sum is 120.',
          wrongTTS:'Pair to twenties: 13+7, 14+6, 12+8, 11+9, 5+15, 4+16 — 120.',
          wrongSubtitle:'Sum is 120.' },

        // Set B — 5 rounds parallel difficulty
        { set:'B', id:'B_r1_ss1', round:1, stage:1,
          list:[6,4,7,3,5,5,2,8], options:[40,38,42], correctIndex:0,
          optionTypes:['correct','missedOne','doubleCounted'],
          correctTTS:'Right! Four pairs of ten — 40.',
          correctSubtitle:'Sum is 40.',
          wrongTTS:'Pair to tens: 6+4, 7+3, 5+5, 2+8 — 40.',
          wrongSubtitle:'Sum is 40.' },
        { set:'B', id:'B_r2_ss2', round:2, stage:1,
          list:[9,1,7,3,8,2,6,4], options:[40,42,38], correctIndex:0,
          optionTypes:['correct','doubleCounted','missedOne'],
          correctTTS:'Right! Four pairs of ten — 40.',
          correctSubtitle:'Sum is 40.',
          wrongTTS:'Pair to tens: 9+1, 7+3, 8+2, 6+4 — 40.',
          wrongSubtitle:'Sum is 40.' },
        { set:'B', id:'B_r3_ss3', round:3, stage:2,
          list:[11,9,12,8,13,7,14,6,15,5], options:[100,98,102], correctIndex:0,
          optionTypes:['correct','missedOne','doubleCounted'],
          correctTTS:'Right! Five pairs of twenty — 100.',
          correctSubtitle:'Sum is 100.',
          wrongTTS:'Five pairs to twenty — 100.',
          wrongSubtitle:'Sum is 100.' },
        { set:'B', id:'B_r4_ss4', round:4, stage:2,
          list:[16,4,17,3,18,2,19,1,15,5], options:[100,98,102], correctIndex:0,
          optionTypes:['correct','missedOne','doubleCounted'],
          correctTTS:'Right! Five pairs of twenty — 100.',
          correctSubtitle:'Sum is 100.',
          wrongTTS:'Five pairs of twenty — 100.',
          wrongSubtitle:'Sum is 100.' },
        { set:'B', id:'B_r5_ss5', round:5, stage:3,
          list:[12,8,14,6,11,9,13,7,15,5,16,4], options:[120,118,122], correctIndex:0,
          optionTypes:['correct','missedOne','doubleCounted'],
          correctTTS:'Right! Six pairs of twenty — 120.',
          correctSubtitle:'Sum is 120.',
          wrongTTS:'Six pairs to twenty — 120.',
          wrongSubtitle:'Sum is 120.' },

        // Set C — 5 rounds parallel
        { set:'C', id:'C_r1_ss1', round:1, stage:1,
          list:[8,2,7,3,9,1,6,4], options:[40,42,38], correctIndex:0,
          optionTypes:['correct','doubleCounted','missedOne'],
          correctTTS:'Right! Four pairs of ten — 40.',
          correctSubtitle:'Sum is 40.',
          wrongTTS:'Pair to tens: 8+2, 7+3, 9+1, 6+4 — 40.',
          wrongSubtitle:'Sum is 40.' },
        { set:'C', id:'C_r2_ss2', round:2, stage:1,
          list:[5,5,4,6,3,7,2,8], options:[40,38,42], correctIndex:0,
          optionTypes:['correct','missedOne','doubleCounted'],
          correctTTS:'Right! Four pairs of ten — 40.',
          correctSubtitle:'Sum is 40.',
          wrongTTS:'Pair to tens — 40.',
          wrongSubtitle:'Sum is 40.' },
        { set:'C', id:'C_r3_ss3', round:3, stage:2,
          list:[10,11,9,12,8,13,7,14,6], options:[90,88,92], correctIndex:0,
          optionTypes:['correct','missedOne','doubleCounted'],
          correctTTS:'Right! 11+9, 12+8, 13+7, 14+6, plus 10 — that is 90.',
          correctSubtitle:'Sum is 90.',
          wrongTTS:'Pair to twenty plus the ten — 90.',
          wrongSubtitle:'Sum is 90.' },
        { set:'C', id:'C_r4_ss4', round:4, stage:2,
          list:[16,4,15,5,17,3,18,2,14,6], options:[100,98,102], correctIndex:0,
          optionTypes:['correct','missedOne','doubleCounted'],
          correctTTS:'Right! Five pairs of twenty — 100.',
          correctSubtitle:'Sum is 100.',
          wrongTTS:'Five pairs of twenty — 100.',
          wrongSubtitle:'Sum is 100.' },
        { set:'C', id:'C_r5_ss5', round:5, stage:3,
          list:[13,7,12,8,11,9,14,6,15,5,16,4], options:[120,118,122], correctIndex:0,
          optionTypes:['correct','missedOne','doubleCounted'],
          correctTTS:'Right! Six pairs of twenty — 120.',
          correctSubtitle:'Sum is 120.',
          wrongTTS:'Six pairs of twenty — 120.',
          wrongSubtitle:'Sum is 120.' }
      ]
    };

    var SETS = ['A', 'B', 'C'];
    var gameState = {
      gameId: 'sum-list-mcq-three-options',
      gameTitle: 'Speed Sum',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 5,
      score: 0,
      lives: 3,
      totalLives: 3,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      duration_data: { startTime: null, endTime: null, preview: [] },
      correctAnswer: null,
      stars: 0,
      setIndex: 0,
      activeRounds: [],
      roundStartMs: 0,
      previewResult: null,
      progress: 0,
      roundToken: 0
    };
    window.gameState = gameState;

    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var floatingBtn = null;
    var answerComponent = null;
    var timer = null;

    function getAvailableSets(rounds) {
      var seen = {}; var out = [];
      for (var i = 0; i < rounds.length; i++) {
        var s = rounds[i].set;
        if (s && !seen[s]) { seen[s] = true; out.push(s); }
      }
      return out.length ? out : ['A'];
    }
    function getRounds() {
      var src = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(src);
      var setKey = sets[gameState.setIndex % sets.length];
      var filtered = [];
      for (var i = 0; i < src.length; i++) {
        if (src[i].set === setKey) filtered.push(src[i]);
      }
      filtered.sort(function (a, b) { return a.round - b.round; });
      return filtered;
    }
    function getCorrectCount() {
      var c = 0;
      for (var i = 0; i < gameState.attempts.length; i++) {
        if (gameState.attempts[i].correct === true) c++;
      }
      return c;
    }
    function getStars() {
      var n = getCorrectCount();
      var t = gameState.totalRounds || 5;
      if (n >= Math.ceil(t * 0.9)) return 3;
      if (n >= Math.ceil(t * 0.6)) return 2;
      if (n >= 1) return 1;
      return 0;
    }
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound + 1);
    }
    function trackEvent(name, payload) {
      try { gameState.events.push({ event: name, ts: Date.now(), data: payload || {} }); } catch (e) {}
      try { if (signalCollector && signalCollector.recordEvent) signalCollector.recordEvent(name, payload || {}); } catch (e) {}
    }
    function recordAttempt(input, correct, misconceptionTag, responseMs) {
      var round = gameState.activeRounds[gameState.currentRound];
      var qid = round ? round.id : ('r' + (gameState.currentRound + 1));
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) : 0,
        input_of_user: input,
        correct: correct === true,
        round_number: gameState.currentRound + 1,
        question_id: qid,
        correct_answer: round ? round.options[round.correctIndex] : null,
        response_time_ms: typeof responseMs === 'number' ? responseMs : 0,
        misconception_tag: misconceptionTag || null,
        difficulty_level: round ? (round.stage || 1) : 1,
        is_retry: false,
        metadata: { set: round ? round.set : null }
      };
      gameState.attempts.push(attempt);
      try { if (signalCollector && signalCollector.recordAttempt) signalCollector.recordAttempt(attempt); } catch (e) {}
    }
    function postGameComplete() {
      if (gameState._gameCompletePosted) return;
      gameState._gameCompletePosted = true;
      var correctCount = getCorrectCount();
      var attempted = gameState.attempts.length;
      var accuracy = attempted === 0 ? 0 : Math.round((correctCount / attempted) * 100);
      var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
      var triesByRound = gameState.attempts.map(function (a) {
        return { round: a.round_number, correct: a.correct === true };
      });
      var metrics = {
        accuracy: accuracy,
        time: Math.round(elapsedMs / 1000),
        stars: gameState.stars,
        attempts: gameState.attempts.slice(),
        duration_data: gameState.duration_data,
        totalLives: gameState.lives,
        tries: triesByRound,
        score: gameState.score,
        correctCount: correctCount,
        previewResult: gameState.previewResult
      };
      var signalSealed = { event_count: gameState.events.length, metadata: {} };
      try {
        if (signalCollector && typeof signalCollector.seal === 'function') {
          var sealed = signalCollector.seal();
          if (sealed) {
            if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count;
            if (sealed.metadata) signalSealed.metadata = sealed.metadata;
          }
        }
      } catch (e0) {}
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: metrics,
            completedAt: Date.now(),
            signal_event_count: signalSealed.event_count,
            signal_metadata: signalSealed.metadata
          }
        }, '*');
      } catch (e) {}
    }
    function safePlaySound(id, opts) {
      try { return FeedbackManager.sound.play(id, opts || {}); }
      catch (e) { return Promise.resolve(); }
    }
    function awaitedFeedbackSound(id, opts) {
      var p = safePlaySound(id, opts || {});
      var floor = new Promise(function (r) { setTimeout(r, 1500); });
      return Promise.all([p, floor]).then(function () {}, function () {});
    }
    function playDynamicFeedback(opts) {
      try { return FeedbackManager.playDynamicFeedback(opts || {}); }
      catch (e) { return Promise.resolve(); }
    }

    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined' &&
            typeof TimerComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            try { throw new Error('waitForPackages timeout'); } catch (rethrown) { reject(err); return; }
            return reject(err);
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="ss-progress-line" id="ssProgress"></div>' +
        '<div id="timer-container" class="ss-timer-wrap"></div>' +
        '<div class="ss-list-card">' +
          '<div class="ss-list-numbers" id="ssListNumbers">—</div>' +
        '</div>' +
        '<div class="ss-options-row" id="ssOptions"></div>';
    }
    function renderInitialState() {
      var pg = document.getElementById('ssProgress');
      if (pg) pg.textContent = '';
      var n = document.getElementById('ssListNumbers');
      if (n) n.innerHTML = '—';
      var o = document.getElementById('ssOptions');
      if (o) o.innerHTML = '';
    }

    function shuffleArray(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    function applyTimerColor(remaining) {
      var wrap = document.getElementById('timer-container');
      if (!wrap) return;
      var parent = wrap.parentElement && wrap.parentElement.classList ? wrap.parentElement : wrap;
      // Apply class on the wrap itself
      wrap.classList.remove('ss-timer-normal', 'ss-timer-amber', 'ss-timer-red');
      if (typeof remaining !== 'number') {
        wrap.classList.add('ss-timer-normal');
        return;
      }
      if (remaining <= 2) wrap.classList.add('ss-timer-red');
      else if (remaining <= 5) wrap.classList.add('ss-timer-amber');
      else wrap.classList.add('ss-timer-normal');
    }

    function onTimerTimeout() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      gameState.isProcessing = true;
      try { if (timer && timer.pause) timer.pause(); } catch (e) {}
      var round = gameState.activeRounds[gameState.currentRound];
      var responseMs = Date.now() - gameState.roundStartMs;
      var allBtns = document.querySelectorAll('#ssOptions .ss-option-tile');
      for (var i = 0; i < allBtns.length; i++) allBtns[i].classList.add('disabled');
      // Reveal correct
      for (var j = 0; j < allBtns.length; j++) {
        if (parseInt(allBtns[j].getAttribute('data-value'), 10) === round.options[round.correctIndex]) {
          allBtns[j].classList.add('selected-correct');
        }
      }
      gameState.lives = Math.max(0, gameState.lives - 1);
      gameState.progress = gameState.currentRound + 1;
      try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
      syncDOM();
      recordAttempt('(timeout)', false, 'timeout', responseMs);
      trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: false, timeout: true });
      runWrongFeedbackAndAdvance(round);
    }

    function renderRound(roundIdxOneBased) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      gameState.currentRound = roundIdxOneBased - 1;
      gameState.isActive = true;
      gameState.phase = 'gameplay';
      gameState.roundToken = (gameState.roundToken || 0) + 1;
      syncDOM();

      var round = gameState.activeRounds[gameState.currentRound];
      if (!round) return;
      gameState.correctAnswer = round.options[round.correctIndex];

      var pg = document.getElementById('ssProgress');
      if (pg) pg.textContent = 'Round ' + roundIdxOneBased + ' of ' + gameState.totalRounds;

      var listEl = document.getElementById('ssListNumbers');
      if (listEl) {
        var parts = [];
        for (var i = 0; i < round.list.length; i++) {
          parts.push('<span>' + round.list[i] + '</span>');
        }
        listEl.innerHTML = parts.join('<span class="plus"> + </span>');
        listEl.classList.remove('fade-in');
        void listEl.offsetWidth;
        listEl.classList.add('fade-in');
      }

      // Shuffle options to vary correct position
      var indexed = [];
      for (var k = 0; k < round.options.length; k++) {
        indexed.push({ value: round.options[k], origIndex: k });
      }
      var shuffled = shuffleArray(indexed);
      var displayed = [];
      var correctDisplayIdx = 0;
      for (var s = 0; s < shuffled.length; s++) {
        displayed.push(shuffled[s].value);
        if (shuffled[s].origIndex === round.correctIndex) correctDisplayIdx = s;
      }
      gameState._currentDisplayed = displayed;
      gameState._currentCorrectIdx = correctDisplayIdx;

      var optsEl = document.getElementById('ssOptions');
      if (optsEl) {
        optsEl.innerHTML = '';
        for (var b = 0; b < displayed.length; b++) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'ss-option-tile';
          btn.textContent = String(displayed[b]);
          btn.setAttribute('data-value', String(displayed[b]));
          btn.setAttribute('data-display-index', String(b));
          btn.setAttribute('data-round-token', String(gameState.roundToken));
          btn.setAttribute('data-testid', 'option-' + b);
          btn.addEventListener('click', onOptionTap);
          optsEl.appendChild(btn);
        }
      }

      gameState.roundStartMs = Date.now();
      gameState.isProcessing = false;
      try {
        var p = safePlaySound('tap_sound', { sticker: null });
        if (p && p.catch) p.catch(function () {});
      } catch (e) {}
      trackEvent('round_start', { round: roundIdxOneBased, set: round.set });
      // Start 15s countdown timer
      try { applyTimerColor(15); } catch (e) {}
      try {
        if (timer && timer.reset) timer.reset();
        if (timer && timer.start) timer.start();
      } catch (e) {}
    }

    function onOptionTap(ev) {
      if (gameState.isProcessing || gameState.gameEnded) return;
      var btn = ev.currentTarget;
      var btnRoundToken = btn.getAttribute('data-round-token');
      if (btnRoundToken !== String(gameState.roundToken || '')) return;
      if (btn.classList.contains('disabled')) return;
      var v = parseInt(btn.getAttribute('data-value'), 10);
      handleAnswer(v, btn);
    }
    function handleAnswer(picked, btnEl) {
      gameState.isProcessing = true;
      try { if (timer && timer.pause) timer.pause(); } catch (e) {}
      var responseMs = Date.now() - gameState.roundStartMs;
      var round = gameState.activeRounds[gameState.currentRound];
      var correct = round.options[round.correctIndex];
      var isCorrect = picked === correct;
      var allBtns = document.querySelectorAll('#ssOptions .ss-option-tile');
      for (var i = 0; i < allBtns.length; i++) allBtns[i].classList.add('disabled');

      if (isCorrect) {
        if (btnEl) btnEl.classList.add('selected-correct');
        gameState.score += 1;
        gameState.progress = gameState.currentRound + 1;
        try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
        syncDOM();
        recordAttempt(String(picked), true, null, responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: true, picked: picked });
        runCorrectFeedbackAndAdvance(round);
      } else {
        if (btnEl) btnEl.classList.add('selected-wrong');
        for (var j = 0; j < allBtns.length; j++) {
          if (parseInt(allBtns[j].getAttribute('data-value'), 10) === correct) {
            allBtns[j].classList.add('selected-correct');
          }
        }
        gameState.lives = Math.max(0, gameState.lives - 1);
        gameState.progress = gameState.currentRound + 1;
        try { if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives)); } catch (e) {}
        syncDOM();
        // Diagnostic distractor — identify which decoy was picked
        var pickedType = null;
        if (round.optionTypes && round.options) {
          for (var z = 0; z < round.options.length; z++) {
            if (round.options[z] === picked) { pickedType = round.optionTypes[z]; break; }
          }
        }
        var diagTTS = null, diagSubtitle = null;
        if (pickedType === 'missedOne') {
          diagTTS = 'You missed one — recount the list slowly.';
          diagSubtitle = 'Recount slowly: did you skip a number?';
        } else if (pickedType === 'doubleCounted') {
          diagTTS = 'Looks like you counted one number twice.';
          diagSubtitle = 'Did you count one number twice?';
        }
        var misconception = pickedType || null;
        recordAttempt(String(picked), false, misconception, responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: false, picked: picked, decoy: pickedType });
        runWrongFeedbackAndAdvanceWithDiagnostic(round, diagTTS, diagSubtitle);
      }
    }

    function runCorrectFeedbackAndAdvance(round) {
      (async function () {
        try { await awaitedFeedbackSound('correct_sound_effect', { sticker: STICKER_CORRECT }); } catch (e) {}
        try {
          await playDynamicFeedback({
            audio_content: round.correctTTS,
            subtitle: round.correctSubtitle,
            sticker: STICKER_CORRECT
          });
        } catch (e) {}
        advanceAfterFeedback();
      })();
    }
    function runWrongFeedbackAndAdvance(round) {
      runWrongFeedbackAndAdvanceWithDiagnostic(round, null, null);
    }
    function runWrongFeedbackAndAdvanceWithDiagnostic(round, diagTTS, diagSubtitle) {
      (async function () {
        try { await awaitedFeedbackSound('incorrect_sound_effect', { sticker: STICKER_SAD }); } catch (e) {}
        var ttsText = diagTTS || round.wrongTTS;
        var subtitle = diagSubtitle || round.wrongSubtitle;
        try {
          await playDynamicFeedback({
            audio_content: ttsText,
            subtitle: subtitle,
            sticker: STICKER_SAD
          });
        } catch (e) {}
        advanceAfterFeedback();
      })();
    }
    function advanceAfterFeedback() {
      var roundJustPlayed = gameState.currentRound + 1;
      if (gameState.lives === 0) {
        gameState.stars = getStars();
        postGameComplete();
        endGame(false);
        return;
      }
      if (roundJustPlayed === gameState.totalRounds) {
        endGame(true);
        return;
      }
      showRoundIntro(roundJustPlayed + 1);
    }

    function escapeHTML(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

    function renderAnswerSlide(container, round) {

      html += '<div class="ss-answer-sum">= ' + escapeHTML(String(round.options[round.correctIndex])) + '</div>';
      html += '<div class="ss-answer-explanation">' + escapeHTML(round.correctSubtitle || '') + '</div>';
      html += '</div>';

    function buildAnswerSlidesForAllRounds() {

    function handlePostMessage(event) {

      if (t === 'game_init') {
        gameState.phase = 'playing';

        gameState.signalConfig = data.signalConfig || {};
        if (data.signalConfig && signalCollector && signalCollector.applyConfig) {

        try {
          if (signalCollector) {
            signalCollector.gameId = gameState.gameId;
            if (data.sessionId) signalCollector.sessionId = data.sessionId;
            if (data.studentId) signalCollector.studentId = data.studentId;
            if (data.contentSetId) signalCollector.contentSetId = data.contentSetId;
            if (data.signalConfig && data.signalConfig.flushUrl) signalCollector.flushUrl = data.signalConfig.flushUrl;
            if (data.signalConfig && data.signalConfig.playId) signalCollector.playId = data.signalConfig.playId;
            if (signalCollector.startFlushing) {
              try { signalCollector.startFlushing(); } catch (e) {}
            }
          }
        } catch (e) {}
        syncDOM();
        setupGame();
      }

              }
              try {
                previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' });
              } catch (e) {
                console.error('[PreviewScreenComponent ctor failed]', e && e.message, e);
              }
              try {
                floatingBtn = new FloatingButtonComponent({ slotId: 'mathai-floating-button-slot' });
              } catch (e) {
                console.error('[FloatingButtonComponent ctor failed]', e && e.message, e);
              }
              try {
                answerComponent = new AnswerComponentComponent({ slotId: 'mathai-answer-slot' });
              } catch (e) {
                console.error('[AnswerComponentComponent ctor failed]', e && e.message, e);
              }
              try {
                timer = new TimerComponent('timer-container', {
                  initialTime: 15,
                  countdown: true,
                  autoStart: false,
                  onTick: function (remaining) {
                    try { applyTimerColor(remaining); } catch (e) {}
                  },
                  onTimeout: function () {
                    try { onTimerTimeout(); } catch (e) {}
                  }
                });
              } catch (e) {
                console.error('[TimerComponent ctor failed]', e && e.message, e);
              }
              try {
                if (floatingBtn && floatingBtn.on) {
                  floatingBtn.on('next', function () {
                    try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
                    try { if (answerComponent) answerComponent.destroy(); } catch (e) {}
                    try { if (previewScreen) previewScreen.destroy(); } catch (e) {}
                    try { if (floatingBtn) floatingBtn.destroy(); } catch (e) {}
                  });
                }
                if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(false);
                if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode('hidden');
              } catch (e) {}
              try {
                FeedbackManager.sound.preload([
                  { id: 'correct_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
                  { id: 'incorrect_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                  { id: 'rounds_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                  { id: 'sound_level_transition',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
                  { id: 'victory_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                  { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
                  { id: 'game_over_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                  { id: 'tap_sound',                url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
                ]);
              } catch (e) {
                console.error('[FeedbackManager.preload failed]', e && e.message, e);
              }
              window.addEventListener('message', handlePostMessage);
              try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
              setupGame();
            } catch (e) {
              console.error('[init inner] ' + (e && e.message), e);
            }
          }, function (e) {
            console.error('[FeedbackManager.init failed]', e && e.message, e);
          });
        } catch (e) {
          console.error('[init outer] ' + (e && e.message), e);
        }
      }, function (err) {
        console.error('[waitForPackages rejected] ' + (err && err.message));
      });

      setTimeout(function () {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;
        var missing = [];
        if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
        if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
        if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
        if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
        if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
        if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
        if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
        if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
        if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
        if (missing.length > 0) {
          var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
          console.error('[' + msg + ']');
          var gc = document.getElementById('gameContent') || document.getElementById('app') || document.body;
          if (gc) {
            gc.innerHTML =
              '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">' +
              'Game failed to load — please refresh.' +
              '</div>';
          }
        }
      }, 2000);

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = setupGame;
      window.renderRound = renderRound;
      window.loadRound = function (n) { try { renderRound(n); } catch (e) {} };
      window.debugGame = function () { return gameState; };
    });
  </script>
</body>
</html>
