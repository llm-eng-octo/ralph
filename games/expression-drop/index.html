<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Expression Drop</title>

  <!-- Sentry -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({ release: 'expression-drop@1.0.0' }));
    }
  </script>
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>
  <script>window.addEventListener('load', initSentry);</script>

  <!-- Game CDN packages -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <!-- dnd-kit/dom via ESM -->
  <script type="module">
    import {DragDropManager, Draggable, Droppable} from 'https://esm.sh/@dnd-kit/dom@beta';
    window.__dndKit = { DragDropManager: DragDropManager, Draggable: Draggable, Droppable: Droppable };
    window.dispatchEvent(new Event('dndkit-loaded'));
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800&display=swap');

    :root {
      --mathai-game-max-width: 480px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-red: #E35757;
      --mathai-blue: #667eea;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
      --mathai-padding-small: 10px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      font-family: var(--mathai-font-family);
      color: var(--mathai-text-primary);
      background: var(--mathai-white);
    }

    @supports (height: 100dvh) {
      body { min-height: 100dvh; }
    }
    @supports not (height: 100dvh) {
      body { min-height: 100vh; }
    }

    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      margin: 0 auto;
      padding-top: var(--mathai-game-padding-top);
      position: relative;
    }

    /* Header / Timer area */
    #header-slot {
      width: 100%;
      padding: 0 16px;
      margin-bottom: 8px;
    }

    #timer-container {
      width: 100%;
    }

    /* Question text */
    #questionText-slot {
      text-align: center;
      padding: 0 16px;
      margin-bottom: 8px;
    }

    .question-label {
      font-size: var(--mathai-font-size-subtitle);
      font-weight: 600;
      color: var(--mathai-primary);
    }

    /* Progress bar */
    #progressBar-slot {
      padding: 0 16px;
      margin-bottom: 16px;
    }

    /* Play area */
    #playArea-slot {
      padding: 0 16px;
    }

    #gameContent {
      width: 100%;
    }

    /* Expression container */
    .expression-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      font-size: var(--mathai-font-size-title);
      font-weight: 700;
      color: var(--mathai-primary);
      margin: 24px 0;
    }

    .expression-part {
      margin: 0 6px;
      display: flex;
      align-items: center;
    }

    /* Drop zones */
    .drop-zone {
      min-width: 64px;
      min-height: 56px;
      border: 3px dashed var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-small);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--mathai-light-gray);
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone.has-tag {
      border-style: solid;
      border-color: var(--mathai-purple);
      background: var(--mathai-white);
    }

    .drop-zone.drop-target {
      border-color: var(--mathai-green);
      background: var(--mathai-cell-bg-green);
    }

    .drop-zone.correct-zone {
      border-color: var(--mathai-cell-border-green);
      background: var(--mathai-cell-bg-green);
    }

    .drop-zone.wrong-zone {
      border-color: var(--mathai-cell-border-red);
      background: var(--mathai-cell-bg-red);
    }

    /* Number tags */
    .number-tag {
      touch-action: none;
      cursor: grab;
      min-width: 56px;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--mathai-blue);
      color: var(--mathai-white);
      font-size: var(--mathai-font-size-large);
      font-weight: 700;
      border-radius: var(--mathai-border-radius-card);
      padding: 8px 16px;
      user-select: none;
      -webkit-user-select: none;
    }

    .number-tag.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    /* Tag bank */
    .tag-bank {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 24px;
    }

    .tag-slot {
      margin: 6px;
    }

    .tag-slot.empty {
      display: none;
    }

    /* Check button */
    .check-btn-container {
      display: flex;
      justify-content: center;
      margin-top: 24px;
      margin-bottom: 16px;
    }

    .check-btn {
      min-width: 160px;
      min-height: 44px;
      padding: 12px 32px;
      font-size: var(--mathai-font-size-button);
      font-weight: 700;
      font-family: var(--mathai-font-family);
      color: var(--mathai-white);
      background: var(--mathai-purple);
      border: none;
      border-radius: var(--mathai-border-radius-button);
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.2s, opacity 0.2s;
    }

    .check-btn:disabled {
      background: var(--mathai-disabled-gray);
      color: var(--mathai-gray);
      cursor: not-allowed;
    }

    .check-btn:not(:disabled):active {
      opacity: 0.8;
    }

    /* Shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .shake {
      animation: shake 0.4s ease-in-out;
    }

    /* Results screen */
    #results-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      background: var(--mathai-white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .results-sticker {
      width: 160px;
      height: 160px;
      margin-bottom: 24px;
    }

    .results-stars {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .results-title {
      font-size: var(--mathai-font-size-title);
      font-weight: 800;
      color: var(--mathai-primary);
      margin-bottom: 8px;
      text-align: center;
    }

    .results-score {
      font-size: var(--mathai-font-size-subtitle);
      font-weight: 600;
      color: var(--mathai-gray);
      margin-bottom: 8px;
    }

    .results-rounds {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-gray);
      margin-bottom: 24px;
    }

    .play-again-btn {
      min-width: 180px;
      min-height: 44px;
      padding: 14px 36px;
      font-size: var(--mathai-font-size-button);
      font-weight: 700;
      font-family: var(--mathai-font-family);
      color: var(--mathai-white);
      background: var(--mathai-purple);
      border: none;
      border-radius: var(--mathai-border-radius-button);
      cursor: pointer;
      touch-action: manipulation;
    }

    .play-again-btn:active {
      opacity: 0.8;
    }

    /* Transition screen */
    #transitionScreen-slot {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 90;
    }

    /* Landscape overlay */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      #landscape-overlay {
        display: flex !important;
      }
    }

    #landscape-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
      background: var(--mathai-primary);
      color: var(--mathai-white);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: var(--mathai-font-family);
      font-size: var(--mathai-font-size-subtitle);
      text-align: center;
      padding: 24px;
    }

    #landscape-overlay span {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="3"></div>
  <div id="results-screen" class="hidden"></div>
  <div id="landscape-overlay">
    <span>&#128244;</span>
    <p>Please rotate your device to portrait mode.</p>
  </div>

  <script>
    /* ========== AUDIO URLs ========== */
    var AUDIO_URLS = {
      correct_sound_effect: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3',
      incorrect_sound_effect: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3',
      sound_life_lost: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3',
      rounds_sound_effect: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3',
      victory_sound_effect: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3',
      game_complete_sound_effect: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3',
      game_over_sound_effect: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3',
      tap_sound: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3'
    };

    /* ========== STICKER GIFs ========== */
    var CORRECT_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var INCORRECT_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var ROUND_TRANSITION_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var VICTORY_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var GAME_COMPLETE_2_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var GAME_COMPLETE_1_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var GAME_OVER_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var RESTART_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-102.gif';

    /* ========== FALLBACK CONTENT ========== */
    var fallbackContent = {
      rounds: [
        { id: 'r1_add_easy', expression: '_ + _ = 17', slots: 2, correctValues: [8, 9], distractors: [5, 12, 3], operation: '+', result: 17, difficulty: 1, feedbackCorrect: 'Right! 8 + 9 = 17', feedbackWrong: 'Not quite. 8 + 9 = 17' },
        { id: 'r2_add_easy', expression: '_ + _ = 25', slots: 2, correctValues: [13, 12], distractors: [7, 18, 6], operation: '+', result: 25, difficulty: 1, feedbackCorrect: 'Right! 13 + 12 = 25', feedbackWrong: 'Not quite. 13 + 12 = 25' },
        { id: 'r3_sub_med', expression: '_ − _ = 14', slots: 2, correctValues: [23, 9], distractors: [15, 5, 19], operation: '-', result: 14, difficulty: 2, feedbackCorrect: 'Right! 23 − 9 = 14', feedbackWrong: 'Not quite. 23 − 9 = 14' },
        { id: 'r4_mul_med', expression: '_ × _ = 36', slots: 2, correctValues: [6, 6], distractors: [4, 9, 12], operation: '*', result: 36, difficulty: 2, feedbackCorrect: 'Right! 6 × 6 = 36', feedbackWrong: 'Not quite. 6 × 6 = 36' },
        { id: 'r5_mul_hard', expression: '_ × _ = 72', slots: 2, correctValues: [8, 9], distractors: [6, 12, 7], operation: '*', result: 72, difficulty: 3, feedbackCorrect: 'Right! 8 × 9 = 72', feedbackWrong: 'Not quite. 8 × 9 = 72' }
      ]
    };

    /* ========== GAME STATE ========== */
    function generateGameId() {
      return 'game_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    var gameState = {
      gameId: generateGameId(),
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 5,
      score: 0,
      lives: 3,
      totalLives: 3,
      attempts: [],
      events: [],
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      startTime: null,
      correctAnswer: null,
      content: null,
      duration_data: [],
      roundStartTime: null
    };
    window.gameState = gameState;

    /* ========== DnD STATE ========== */
    var dndManager = null;
    var dndDraggables = [];
    var dndDroppables = [];
    var slotValues = {};
    var isDragging = false;
    var tagLocationMap = {}; // tagId -> 'bank' | slotIdx string

    /* ========== GLOBAL TOUCH HANDLER ========== */
    document.addEventListener('touchmove', function(e) {
      if (isDragging) e.preventDefault();
    }, { passive: false });

    /* ========== UTILITY FUNCTIONS ========== */
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound + 1);
    }

    function trackEvent(eventName, data) {
      var evt = {
        event: eventName,
        timestamp: Date.now(),
        data: data || {}
      };
      gameState.events.push(evt);
    }

    function recordAttempt(round, userAnswer, correctAnswer, isCorrect, timeTaken) {
      var attempt = {
        round_number: gameState.currentRound + 1,
        round_id: round.id,
        question: round.expression,
        user_answer: userAnswer,
        correct_answer: correctAnswer,
        is_correct: isCorrect,
        time_taken: timeTaken,
        score: gameState.score,
        lives: gameState.lives,
        operation: round.operation,
        difficulty: round.difficulty,
        attempt_timestamp: Date.now()
      };
      gameState.attempts.push(attempt);
    }

    function getStars(score, total) {
      if (total === 0) return 0;
      var pct = Math.round((score / total) * 100);
      if (pct >= 90) return 3;
      if (pct >= 60) return 2;
      if (score >= 1) return 1;
      return 0;
    }

    function shuffleArray(arr) {
      var shuffled = arr.slice();
      for (var i = shuffled.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = shuffled[i];
        shuffled[i] = shuffled[j];
        shuffled[j] = temp;
      }
      return shuffled;
    }

    function evaluateExpression(values, operation) {
      if (values.length < 2) return null;
      var a = values[0];
      var b = values[1];
      if (operation === '+') return a + b;
      if (operation === '-') return a - b;
      if (operation === '*') return a * b;
      return null;
    }

    /* ========== WAIT FOR PACKAGES ========== */
    function waitForPackages() {
      return new Promise(function(resolve) {
        var timeout = 180000;
        var start = Date.now();
        function check() {
          if (typeof FeedbackManager !== 'undefined' && typeof ScreenLayout !== 'undefined' && typeof TimerComponent !== 'undefined') {
            resolve(true);
          } else if (Date.now() - start > timeout) {
            console.warn('Packages timed out after 180s');
            resolve(false);
          } else {
            setTimeout(check, 100);
          }
        }
        check();
      });
    }

    function waitForDndKit() {
      return new Promise(function(resolve) {
        if (window.__dndKit) return resolve(window.__dndKit);
        window.addEventListener('dndkit-loaded', function() {
          resolve(window.__dndKit);
        });
      });
    }

    /* ========== PROGRESS BAR ========== */
    var progressBarInstance = null;

    function createProgressBar() {
      try {
        if (typeof ProgressBarComponent !== 'undefined') {
          progressBarInstance = new ProgressBarComponent({
            containerId: 'progress-bar-container',
            totalRounds: gameState.totalRounds,
            totalLives: gameState.totalLives
          });
        }
      } catch (e) {
        console.warn('ProgressBar init error:', e);
      }
    }

    function updateProgressBar() {
      try {
        if (progressBarInstance && progressBarInstance.update) {
          progressBarInstance.update({
            currentRound: gameState.currentRound + 1,
            lives: gameState.lives,
            score: gameState.score
          });
        }
      } catch (e) {
        console.warn('ProgressBar update error:', e);
      }
    }

    /* ========== TRANSITION SCREEN ========== */
    var transitionScreenInstance = null;

    /* ========== TIMER ========== */
    var timerInstance = null;

    /* ========== POST MESSAGE ========== */
    function handlePostMessage(event) {
      var data = null;
      try {
        data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
      } catch (e) {
        return;
      }
      if (!data || !data.type) return;

      if (data.type === 'game_init') {
        gameState.phase = 'playing';
        if (data.content && data.content.rounds && data.content.rounds.length > 0) {
          gameState.content = data.content;
        } else {
          gameState.content = fallbackContent;
        }
        gameState.totalRounds = gameState.content.rounds.length;
        syncDOM();
        startGame();
      }
    }

    function sendPostMessage(type, data) {
      var msg = { type: type };
      if (data) {
        var keys = Object.keys(data);
        for (var i = 0; i < keys.length; i++) {
          msg[keys[i]] = data[keys[i]];
        }
      }
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(JSON.stringify(msg), '*');
        }
      } catch (e) {
        console.warn('postMessage error:', e);
      }
    }

    /* ========== GAME FUNCTIONS ========== */
    function setupGame() {
      gameState.content = gameState.content || fallbackContent;
      gameState.totalRounds = gameState.content.rounds.length;
      syncDOM();
    }

    function startGame() {
      gameState.phase = 'playing';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = true;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.startTime = Date.now();
      gameState.duration_data = [];
      gameState.content = gameState.content || fallbackContent;
      gameState.totalRounds = gameState.content.rounds.length;
      syncDOM();
      trackEvent('game_started');

      try {
        if (timerInstance && timerInstance.start) {
          timerInstance.start();
        }
      } catch (e) {}

      loadRound();
    }
    window.startGame = startGame;

    function loadRound() {
      var content = gameState.content || fallbackContent;
      var round = content.rounds[gameState.currentRound];
      if (!round) {
        endGame('victory');
        return;
      }

      gameState.roundStartTime = Date.now();
      gameState.correctAnswer = round.correctValues;
      slotValues = {};
      tagLocationMap = {};

      updateProgressBar();
      renderExpression(round);
      updateCheckButton();
      syncDOM();
      trackEvent('round_loaded', { round: gameState.currentRound + 1 });

      setupDragAndDrop(round);
    }

    function renderExpression(round) {
      var gameContent = document.getElementById('gameContent');
      if (!gameContent) return;

      var parts = round.expression.split('_');
      var expressionHTML = '<div class="expression-container" id="expression-box">';
      for (var i = 0; i < parts.length; i++) {
        if (i > 0) {
          expressionHTML += '<div class="expression-part"><div class="drop-zone" id="drop-zone-' + (i - 1) + '" data-slot="' + (i - 1) + '"></div></div>';
        }
        if (parts[i].trim()) {
          expressionHTML += '<div class="expression-part">' + parts[i].trim() + '</div>';
        }
      }
      expressionHTML += '</div>';

      var allNumbers = shuffleArray(round.correctValues.concat(round.distractors));
      expressionHTML += '<div class="tag-bank" id="tag-bank">';
      for (var j = 0; j < allNumbers.length; j++) {
        expressionHTML += '<div class="tag-slot" id="tag-slot-' + j + '">';
        expressionHTML += '<div class="number-tag" id="tag-' + j + '" data-value="' + allNumbers[j] + '" data-index="' + j + '">' + allNumbers[j] + '</div>';
        expressionHTML += '</div>';
      }
      expressionHTML += '</div>';

      expressionHTML += '<div class="check-btn-container">';
      expressionHTML += '<button class="check-btn" id="check-btn" disabled>Check</button>';
      expressionHTML += '</div>';

      gameContent.innerHTML = expressionHTML;

      // Initialize tagLocationMap — all tags start in bank
      for (var k = 0; k < allNumbers.length; k++) {
        tagLocationMap['tag-' + k] = 'bank';
      }

      var checkBtn = document.getElementById('check-btn');
      if (checkBtn) {
        checkBtn.addEventListener('click', handleCheck);
      }
    }

    function setupDragAndDrop(round) {
      destroyDndInstances();

      if (!window.__dndKit) {
        console.warn('dnd-kit not loaded yet');
        return;
      }

      var DragDropManager = window.__dndKit.DragDropManager;
      var Draggable = window.__dndKit.Draggable;
      var Droppable = window.__dndKit.Droppable;

      dndManager = new DragDropManager();
      dndDraggables = [];
      dndDroppables = [];

      // Create droppables for each slot
      for (var s = 0; s < round.slots; s++) {
        var zoneEl = document.getElementById('drop-zone-' + s);
        if (zoneEl) {
          var droppable = new Droppable({ id: 'drop-zone-' + s, element: zoneEl }, dndManager);
          dndDroppables.push(droppable);
        }
      }

      // Create droppable for the bank itself (for returning tags)
      var bankEl = document.getElementById('tag-bank');
      if (bankEl) {
        var bankDroppable = new Droppable({ id: 'tag-bank', element: bankEl }, dndManager);
        dndDroppables.push(bankDroppable);
      }

      // Create draggables for each tag
      var tags = document.querySelectorAll('.number-tag');
      for (var t = 0; t < tags.length; t++) {
        var tagEl = tags[t];
        var draggable = new Draggable({ id: tagEl.id, element: tagEl }, dndManager);
        dndDraggables.push(draggable);
      }

      // Monitor drag events
      dndManager.monitor.addEventListener('beforedragstart', function() {
        isDragging = true;
      });

      dndManager.monitor.addEventListener('dragend', function(event) {
        isDragging = false;
        var operation = event.operation;
        var source = operation.source;
        var target = operation.target;
        var canceled = event.canceled;

        if (!source || !source.element) return;

        var sourceEl = source.element;
        var sourceValue = sourceEl.getAttribute('data-value');
        var sourceIndex = sourceEl.getAttribute('data-index');
        var sourceTagId = sourceEl.id;

        // Use tagLocationMap to know where the tag was before dragging
        var sourceLocation = tagLocationMap[sourceTagId] || 'bank';
        var sourceFromZone = sourceLocation !== 'bank';
        var sourceSlotId = sourceFromZone ? sourceLocation : null;

        if (canceled || !target) {
          // Return to bank
          returnTagToBank(sourceEl, sourceIndex);
          if (sourceSlotId !== null) {
            clearSlot(sourceSlotId);
          }
          updateCheckButton();
          return;
        }

        var targetId = target.id;

        if (targetId === 'tag-bank') {
          // Dropping back to bank
          returnTagToBank(sourceEl, sourceIndex);
          if (sourceSlotId !== null) {
            clearSlot(sourceSlotId);
          }
          updateCheckButton();
          return;
        }

        // Dropping into a drop zone
        if (targetId.indexOf('drop-zone-') === 0) {
          var slotIdx = targetId.replace('drop-zone-', '');

          // Same zone — no-op
          if (sourceSlotId === slotIdx) {
            placeTagInZone(sourceEl, sourceIndex, slotIdx);
            updateCheckButton();
            return;
          }

          var zoneEl = document.getElementById(targetId);

          // Check if zone already has a tag
          var existingTag = zoneEl.querySelector('.number-tag');

          if (existingTag && existingTag !== sourceEl) {
            var existingIndex = existingTag.getAttribute('data-index');
            var existingValue = existingTag.getAttribute('data-value');
            var existingTagId = existingTag.id;

            if (sourceFromZone) {
              // SWAP: source came from another zone → existing tag goes to source's zone
              var sourceZoneEl = document.getElementById('drop-zone-' + sourceSlotId);

              // Move existing tag to the source zone
              sourceZoneEl.innerHTML = '';
              sourceZoneEl.appendChild(existingTag);
              sourceZoneEl.classList.add('has-tag');
              slotValues[sourceSlotId] = parseInt(existingValue, 10);
              tagLocationMap[existingTagId] = sourceSlotId;

              // Keep the existing tag's bank slot hidden
              var existBankSlot = document.getElementById('tag-slot-' + existingIndex);
              if (existBankSlot) {
                existBankSlot.classList.add('empty');
              }
            } else {
              // EVICT: source came from bank → existing tag goes back to bank
              returnTagToBank(existingTag, existingIndex);
            }
          } else if (sourceSlotId !== null) {
            // Source came from another zone, target is empty — clear source zone
            clearSlot(sourceSlotId);
          }

          // Place the dragged tag in the target zone
          placeTagInZone(sourceEl, sourceIndex, slotIdx);
          updateCheckButton();
          return;
        }

        // Dropped somewhere else — return to bank
        returnTagToBank(sourceEl, sourceIndex);
        if (sourceSlotId !== null) {
          clearSlot(sourceSlotId);
        }
        updateCheckButton();
      });
    }

    function placeTagInZone(tagEl, tagIndex, slotIdx) {
      var zoneEl = document.getElementById('drop-zone-' + slotIdx);
      if (!zoneEl) return;
      zoneEl.innerHTML = '';
      zoneEl.appendChild(tagEl);
      zoneEl.classList.add('has-tag');
      slotValues[slotIdx] = parseInt(tagEl.getAttribute('data-value'), 10);
      tagLocationMap[tagEl.id] = slotIdx;

      // Hide the bank slot
      var bankSlot = document.getElementById('tag-slot-' + tagIndex);
      if (bankSlot) {
        bankSlot.classList.add('empty');
      }
    }

    function clearSlot(slotIdx) {
      var zone = document.getElementById('drop-zone-' + slotIdx);
      if (zone) {
        zone.innerHTML = '';
        zone.classList.remove('has-tag');
      }
      delete slotValues[slotIdx];
    }

    function returnTagToBank(tagEl, tagIndex) {
      var bankSlot = document.getElementById('tag-slot-' + tagIndex);
      if (bankSlot) {
        bankSlot.innerHTML = '';
        bankSlot.appendChild(tagEl);
        bankSlot.classList.remove('empty');
      }
      tagLocationMap[tagEl.id] = 'bank';
    }

    function destroyDndInstances() {
      for (var i = 0; i < dndDraggables.length; i++) {
        try { dndDraggables[i].destroy(); } catch (e) {}
      }
      for (var j = 0; j < dndDroppables.length; j++) {
        try { dndDroppables[j].destroy(); } catch (e) {}
      }
      if (dndManager) {
        try { dndManager.destroy(); } catch (e) {}
      }
      dndDraggables = [];
      dndDroppables = [];
      dndManager = null;
    }

    function updateCheckButton() {
      var checkBtn = document.getElementById('check-btn');
      if (!checkBtn) return;

      var content = gameState.content || fallbackContent;
      var round = content.rounds[gameState.currentRound];
      if (!round) return;

      var allFilled = true;
      for (var s = 0; s < round.slots; s++) {
        if (slotValues[s] === undefined || slotValues[s] === null) {
          allFilled = false;
          break;
        }
      }
      checkBtn.disabled = !allFilled;
    }

    /* ========== CHECK ANSWER ========== */
    function handleCheck() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      gameState.isProcessing = true;

      var content = gameState.content || fallbackContent;
      var round = content.rounds[gameState.currentRound];
      if (!round) {
        gameState.isProcessing = false;
        return;
      }

      // Read values from slots
      var values = [];
      for (var s = 0; s < round.slots; s++) {
        values.push(slotValues[s]);
      }

      var result = evaluateExpression(values, round.operation);
      var isCorrect = result === round.result;
      var timeTaken = Date.now() - gameState.roundStartTime;

      // Record attempt
      recordAttempt(round, values.join(', '), round.correctValues.join(', '), isCorrect, timeTaken);
      trackEvent('answer_submitted', {
        round: gameState.currentRound + 1,
        values: values,
        correct: isCorrect
      });

      // Update score/lives
      if (isCorrect) {
        gameState.score++;
      } else {
        gameState.lives--;
      }
      syncDOM();
      updateProgressBar();

      // Duration data
      gameState.duration_data.push({
        round: gameState.currentRound + 1,
        duration: timeTaken
      });

      // Visual feedback on expression
      var expressionBox = document.getElementById('expression-box');

      if (isCorrect) {
        // Green border on zones
        var zones = document.querySelectorAll('.drop-zone');
        for (var z = 0; z < zones.length; z++) {
          zones[z].classList.add('correct-zone');
        }
        processCorrectAnswer(round);
      } else {
        // Red + shake on zones
        var zones2 = document.querySelectorAll('.drop-zone');
        for (var z2 = 0; z2 < zones2.length; z2++) {
          zones2[z2].classList.add('wrong-zone');
        }
        if (expressionBox) {
          expressionBox.classList.add('shake');
        }

        if (gameState.lives <= 0) {
          processGameOver(round);
        } else {
          processWrongAnswer(round);
        }
      }
    }

    function processCorrectAnswer(round) {
      (function() {
        try {
          FeedbackManager.sound.play('correct_sound_effect', { sticker: CORRECT_STICKER }).then(function() {
            return FeedbackManager.playDynamicFeedback({
              audio_content: round.feedbackCorrect,
              subtitle: round.feedbackCorrect,
              sticker: CORRECT_STICKER
            });
          }).then(function() {
            gameState.isProcessing = false;
            trackEvent('round_complete', { round: gameState.currentRound + 1, correct: true });
            advanceRound();
          }).catch(function(e) {
            console.warn('FeedbackManager error:', e);
            gameState.isProcessing = false;
            trackEvent('round_complete', { round: gameState.currentRound + 1, correct: true });
            advanceRound();
          });
        } catch (e) {
          console.warn('FeedbackManager error:', e);
          gameState.isProcessing = false;
          trackEvent('round_complete', { round: gameState.currentRound + 1, correct: true });
          advanceRound();
        }
      })();
    }

    function processWrongAnswer(round) {
      (function() {
        try {
          FeedbackManager.sound.play('incorrect_sound_effect', { sticker: INCORRECT_STICKER }).then(function() {
            return FeedbackManager.playDynamicFeedback({
              audio_content: round.feedbackWrong,
              subtitle: round.feedbackWrong,
              sticker: INCORRECT_STICKER
            });
          }).then(function() {
            gameState.isProcessing = false;
            trackEvent('round_complete', { round: gameState.currentRound + 1, correct: false });
            advanceRound();
          }).catch(function(e) {
            console.warn('FeedbackManager error:', e);
            gameState.isProcessing = false;
            trackEvent('round_complete', { round: gameState.currentRound + 1, correct: false });
            advanceRound();
          });
        } catch (e) {
          console.warn('FeedbackManager error:', e);
          gameState.isProcessing = false;
          trackEvent('round_complete', { round: gameState.currentRound + 1, correct: false });
          advanceRound();
        }
      })();
    }

    function processGameOver(round) {
      (function() {
        gameState.isProcessing = false;
        trackEvent('round_complete', { round: gameState.currentRound + 1, correct: false });
        endGame('game_over');
      })();
    }

    function advanceRound() {
      gameState.currentRound++;

      if (gameState.currentRound >= gameState.totalRounds) {
        endGame('victory');
        return;
      }

      if (gameState.lives <= 0) {
        endGame('game_over');
        return;
      }

      // Show round transition
      showRoundTransition(function() {
        loadRound();
      });
    }

    function showRoundTransition(callback) {
      try {
        if (transitionScreenInstance && transitionScreenInstance.show) {
          transitionScreenInstance.show({
            title: 'Round ' + (gameState.currentRound + 1),
            sticker: ROUND_TRANSITION_STICKER,
            duration: 2000,
            onComplete: function() {
              try {
                FeedbackManager.sound.play('rounds_sound_effect').catch(function() {});
              } catch (e) {}
              if (callback) callback();
            }
          });
          return;
        }
      } catch (e) {
        console.warn('TransitionScreen error:', e);
      }

      // Fallback: just delay
      try {
        FeedbackManager.sound.play('rounds_sound_effect').catch(function() {});
      } catch (e) {}
      setTimeout(function() {
        if (callback) callback();
      }, 1500);
    }

    /* ========== END GAME ========== */
    function endGame(reason) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.phase = 'ended';

      destroyDndInstances();

      try {
        if (timerInstance && timerInstance.stop) {
          timerInstance.stop();
        }
      } catch (e) {}

      var totalTime = Date.now() - (gameState.startTime || Date.now());
      var stars = getStars(gameState.score, gameState.totalRounds);
      var accuracy = gameState.totalRounds > 0 ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0;
      var roundsCompleted = gameState.currentRound + (reason === 'victory' ? 0 : 0);

      trackEvent('game_complete', {
        reason: reason,
        score: gameState.score,
        totalRounds: gameState.totalRounds,
        stars: stars,
        accuracy: accuracy
      });

      // Send game_complete postMessage
      sendPostMessage('game_complete', {
        gameId: gameState.gameId,
        metrics: {
          score: gameState.score,
          totalRounds: gameState.totalRounds,
          stars: stars,
          accuracy: accuracy,
          lives_remaining: gameState.lives,
          total_lives: gameState.totalLives,
          duration: totalTime,
          duration_data: gameState.duration_data,
          attempts: gameState.attempts,
          events: gameState.events
        },
        completedAt: new Date().toISOString()
      });

      // Play end-of-game audio and show results
      if (reason === 'game_over') {
        try {
          FeedbackManager.sound.play('game_over_sound_effect', { sticker: GAME_OVER_STICKER }).then(function() {
            showResults(reason, stars);
          }).catch(function() {
            showResults(reason, stars);
          });
        } catch (e) {
          showResults(reason, stars);
        }
      } else {
        var soundKey = stars >= 3 ? 'victory_sound_effect' : 'game_complete_sound_effect';
        var sticker = stars >= 3 ? VICTORY_STICKER : (stars >= 2 ? GAME_COMPLETE_2_STICKER : GAME_COMPLETE_1_STICKER);
        try {
          FeedbackManager.sound.play(soundKey, { sticker: sticker }).then(function() {
            showResults(reason, stars);
          }).catch(function() {
            showResults(reason, stars);
          });
        } catch (e) {
          showResults(reason, stars);
        }
      }
    }
    window.endGame = endGame;

    function showResults(reason, stars) {
      var resultsScreen = document.getElementById('results-screen');
      if (!resultsScreen) return;

      var sticker;
      var title;
      if (reason === 'game_over') {
        sticker = GAME_OVER_STICKER;
        title = 'Game Over';
      } else if (stars >= 3) {
        sticker = VICTORY_STICKER;
        title = 'Amazing!';
      } else if (stars >= 2) {
        sticker = GAME_COMPLETE_2_STICKER;
        title = 'Great Job!';
      } else {
        sticker = GAME_COMPLETE_1_STICKER;
        title = 'Good Try!';
      }

      var starsHTML = '';
      for (var i = 0; i < 3; i++) {
        starsHTML += i < stars ? '\u2B50' : '\u2606';
      }

      resultsScreen.innerHTML = '' +
        '<img class="results-sticker" src="' + sticker + '" alt="Result">' +
        '<div class="results-stars">' + starsHTML + '</div>' +
        '<div class="results-title">' + title + '</div>' +
        '<div class="results-score">Score: ' + gameState.score + ' / ' + gameState.totalRounds + '</div>' +
        '<div class="results-rounds">Rounds completed: ' + Math.min(gameState.currentRound + 1, gameState.totalRounds) + ' / ' + gameState.totalRounds + '</div>' +
        '<button class="play-again-btn" onclick="restartGame()">Play Again</button>';

      resultsScreen.classList.remove('hidden');
      syncDOM();
    }

    function restartGame() {
      var resultsScreen = document.getElementById('results-screen');
      if (resultsScreen) {
        resultsScreen.classList.add('hidden');
      }

      gameState.gameId = generateGameId();
      gameState.phase = 'playing';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = true;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.startTime = Date.now();
      gameState.duration_data = [];

      syncDOM();
      trackEvent('game_restarted');

      try {
        if (timerInstance && timerInstance.reset) {
          timerInstance.reset();
        }
        if (timerInstance && timerInstance.start) {
          timerInstance.start();
        }
      } catch (e) {}

      loadRound();
    }
    window.restartGame = restartGame;

    function nextRound() {
      advanceRound();
    }
    window.nextRound = nextRound;

    /* Expose DnD helpers for testing */
    window.placeTagInZone = placeTagInZone;
    window.clearSlot = clearSlot;
    window.returnTagToBank = returnTagToBank;
    window.updateCheckButton = updateCheckButton;

    /* ========== DOMContentLoaded ========== */
    document.addEventListener('DOMContentLoaded', function() {
      (function() {
        // Step 1: wait for packages
        waitForPackages().then(function(loaded) {
          // Step 2: init FeedbackManager
          try {
            if (typeof FeedbackManager !== 'undefined' && FeedbackManager.init) {
              FeedbackManager.init({
                sounds: AUDIO_URLS
              });
            }
          } catch (e) {
            console.warn('FeedbackManager init error:', e);
          }

          // Step 3: SignalCollector
          var signalCollector = null;
          try {
            if (typeof SignalCollector !== 'undefined') {
              signalCollector = new SignalCollector();
            }
          } catch (e) {}

          // Step 4: ScreenLayout.inject
          try {
            if (typeof ScreenLayout !== 'undefined' && ScreenLayout.inject) {
              ScreenLayout.inject('app', {
                sections: {
                  header: { id: 'header-slot' },
                  questionText: { id: 'questionText-slot' },
                  progressBar: { id: 'progressBar-slot' },
                  playArea: { id: 'playArea-slot' },
                  transitionScreen: { id: 'transitionScreen-slot' }
                }
              });
            } else {
              buildFallbackLayout();
            }
          } catch (e) {
            console.warn('ScreenLayout error:', e);
            buildFallbackLayout();
          }

          // Step 5: inject timer container into header slot
          var headerSlot = document.getElementById('header-slot');
          if (headerSlot) {
            headerSlot.innerHTML = '<div id="timer-container"></div>';
          }

          // Step 6: Build play area HTML
          var playAreaSlot = document.getElementById('playArea-slot');
          if (playAreaSlot) {
            playAreaSlot.innerHTML = '<div id="gameContent"></div>';
          }

          // Add question text
          var questionSlot = document.getElementById('questionText-slot');
          if (questionSlot) {
            questionSlot.innerHTML = '<div class="question-label">Fill in the blanks!</div>';
          }

          // Add progress bar container
          var progressSlot = document.getElementById('progressBar-slot');
          if (progressSlot) {
            progressSlot.innerHTML = '<div id="progress-bar-container"></div>';
          }

          // Step 7: TimerComponent
          try {
            if (typeof TimerComponent !== 'undefined') {
              timerInstance = new TimerComponent({
                containerId: 'timer-container',
                autoStart: false
              });
            }
          } catch (e) {
            console.warn('TimerComponent error:', e);
          }

          // Step 8: InteractionManager
          try {
            if (typeof InteractionManager !== 'undefined') {
              var interactionManager = new InteractionManager();
            }
          } catch (e) {}

          // Step 9: VisibilityTracker
          try {
            if (typeof VisibilityTracker !== 'undefined') {
              var visibilityTracker = new VisibilityTracker();
            }
          } catch (e) {}

          // Step 10: createProgressBar
          createProgressBar();

          // Step 11: TransitionScreenComponent
          try {
            if (typeof TransitionScreenComponent !== 'undefined') {
              transitionScreenInstance = new TransitionScreenComponent({
                containerId: 'transitionScreen-slot'
              });
            }
          } catch (e) {
            console.warn('TransitionScreen init error:', e);
          }

          // Step 12: Audio preloading
          try {
            if (typeof FeedbackManager !== 'undefined' && FeedbackManager.preload) {
              FeedbackManager.preload(Object.values(AUDIO_URLS));
            }
          } catch (e) {}

          // Step 13: Register postMessage listener
          window.addEventListener('message', handlePostMessage);

          // Step 14: Send game_ready
          sendPostMessage('game_ready', { gameId: gameState.gameId });

          // Step 15: setupGame
          setupGame();

        });

        // Wait for dnd-kit in parallel
        waitForDndKit().then(function(kit) {
          // dnd-kit loaded and available at window.__dndKit
        });

        // Standalone fallback: runs independently of waitForPackages
        // If no game_init received in 2s, build fallback layout and start
        setTimeout(function() {
          if (!gameState.isActive && !gameState.gameEnded) {
            // Build fallback layout if ScreenLayout didn't load
            if (!document.getElementById('gameContent')) {
              buildFallbackLayout();
              var headerSlot = document.getElementById('header-slot');
              if (headerSlot) headerSlot.innerHTML = '<div id="timer-container"></div>';
              var playAreaSlot = document.getElementById('playArea-slot');
              if (playAreaSlot) playAreaSlot.innerHTML = '<div id="gameContent"></div>';
              var questionSlot = document.getElementById('questionText-slot');
              if (questionSlot) questionSlot.innerHTML = '<div class="question-label">Fill in the blanks!</div>';
              var progressSlot = document.getElementById('progressBar-slot');
              if (progressSlot) progressSlot.innerHTML = '<div id="progress-bar-container"></div>';
            }
            gameState.content = fallbackContent;
            gameState.totalRounds = fallbackContent.rounds.length;
            setupGame();
            startGame();
          }
        }, 2000);
      })();
    });

    /* ========== FALLBACK LAYOUT ========== */
    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      app.innerHTML = '' +
        '<div id="header-slot"></div>' +
        '<div id="questionText-slot"></div>' +
        '<div id="progressBar-slot"></div>' +
        '<div id="playArea-slot"></div>' +
        '<div id="transitionScreen-slot" class="hidden"></div>';
    }
  </script>
</body>
</html>
