<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sum Quiz</title>
  <style>
    :root {
      --ink: #270F36;
      --gray: #6b6b70;
      --border: #d7d5e0;
      --bg: #faf9fb;
      --primary: #2F66E6;
      --correct: #3fb060;
      --correct-bg: #e6fbe9;
      --wrong: #e5564a;
      --wrong-bg: #fde7e5;
      --input-border: #b9b7c5;
      --input-focus: #2F66E6;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      margin: 0 auto;
      padding: 16px 16px 320px;  /* bottom padding ensures we can scroll input above keyboard */
      background: var(--bg);
      color: var(--ink);
      max-width: 520px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .instr { font-size: 14px; color: var(--gray); margin: 0 0 16px; }

    .status {
      font-size: 13px; color: var(--gray); margin-bottom: 12px;
    }
    .status strong { color: var(--ink); }

    .progress {
      display: flex; gap: 4px; margin-bottom: 18px;
    }
    .progress-seg {
      flex: 1; height: 6px; background: var(--border); border-radius: 3px;
      transition: background 200ms;
    }
    .progress-seg.filled { background: var(--primary); }
    .progress-seg.correct { background: var(--correct); }
    .progress-seg.wrong { background: var(--wrong); }

    .question-card {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      margin-bottom: 16px;
    }
    .round-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--gray); font-weight: 700; margin-bottom: 12px;
    }
    .expression {
      font-size: 36px; font-weight: 700; color: var(--ink);
      margin-bottom: 20px;
      font-variant-numeric: tabular-nums;
    }

    /* --- Auto-growing input --- */
    .input-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; flex-wrap: wrap;
    }
    .input-wrap {
      position: relative;
      display: inline-block;
    }
    .num-input {
      width: 72px;
      min-width: 72px;
      max-width: 300px;
      height: 56px;
      padding: 0 14px;
      font-size: 28px; font-weight: 700;
      font-family: inherit;
      text-align: center;
      color: var(--ink);
      background: #fff;
      border: 2px solid var(--input-border);
      border-radius: 12px;
      outline: none;
      transition: width 140ms ease-out, border-color 180ms;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: textfield;
      font-variant-numeric: tabular-nums;
    }
    .num-input::-webkit-outer-spin-button,
    .num-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .num-input:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(47, 102, 230, 0.18);
    }
    .num-input.correct {
      border-color: var(--correct);
      background: var(--correct-bg);
      color: var(--correct);
    }
    .num-input.wrong {
      border-color: var(--wrong);
      background: var(--wrong-bg);
      color: var(--wrong);
      animation: shake 340ms;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      50% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
    }

    .submit-btn {
      height: 56px;
      padding: 0 22px;
      font-size: 16px; font-weight: 700;
      color: #fff; background: var(--primary);
      border: none; border-radius: 12px;
      cursor: pointer;
      transition: opacity 180ms, transform 100ms;
      touch-action: manipulation;
    }
    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .submit-btn:active:not(:disabled) { transform: scale(0.97); }

    .feedback {
      min-height: 24px;
      text-align: center;
      font-size: 14px; font-weight: 600;
      margin-top: 10px;
    }
    .feedback.correct { color: var(--correct); }
    .feedback.wrong { color: var(--wrong); }

    .win-banner {
      display: none;
      margin-top: 18px; padding: 20px;
      background: linear-gradient(135deg, #d4f5dd, #b0ead4);
      border: 2px solid var(--correct);
      border-radius: 14px;
      text-align: center;
    }
    .win-banner.visible { display: block; }
    .win-banner h2 { margin: 0 0 6px; color: var(--correct); font-size: 18px; }
    .win-banner p { margin: 0 0 12px; color: var(--ink); }
    .win-banner button {
      padding: 10px 22px;
      background: var(--correct); color: #fff;
      border: none; border-radius: 10px;
      font-weight: 700; cursor: pointer; font-size: 15px;
    }

    /* Scroll margin so focus+scrollIntoView doesn't hide under top UI chrome */
    .input-wrap { scroll-margin-top: 24px; scroll-margin-bottom: 280px; }
  </style>
</head>
<body>
  <h1>Sum Quiz</h1>
  <p class="instr">Type each answer and press Enter or Submit.</p>

  <div class="status" data-testid="status">
    Round <strong data-testid="round-num">1</strong>/5 ·
    Score: <strong data-testid="score">0</strong>/5
  </div>

  <div class="progress" data-testid="progress">
    <div class="progress-seg" data-testid="seg-1"></div>
    <div class="progress-seg" data-testid="seg-2"></div>
    <div class="progress-seg" data-testid="seg-3"></div>
    <div class="progress-seg" data-testid="seg-4"></div>
    <div class="progress-seg" data-testid="seg-5"></div>
  </div>

  <div class="question-card" data-testid="question-card">
    <div class="round-label" data-testid="round-label">Round 1 of 5</div>
    <div class="expression" data-testid="expression">&nbsp;</div>
    <div class="input-row">
      <span class="input-wrap">
        <input
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          class="num-input"
          data-testid="answer-input"
          id="answerInput"
          placeholder="?"
          aria-label="Your answer"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
      </span>
      <button class="submit-btn" data-testid="submit-btn" id="submitBtn" disabled>Submit</button>
    </div>
    <div class="feedback" data-testid="feedback" id="feedback">&nbsp;</div>
  </div>

  <div class="win-banner" data-testid="win-banner" id="winBanner">
    <h2>Quiz complete!</h2>
    <p>Score: <strong data-testid="final-score">0</strong> / 5</p>
    <button data-testid="play-again-btn" id="playAgainBtn">Play Again</button>
  </div>

  <script>
    'use strict';

    var ROUNDS = [
      { a: 5,  b: 7,  answer: 12 },
      { a: 9,  b: 6,  answer: 15 },
      { a: 13, b: 8,  answer: 21 },
      { a: 24, b: 17, answer: 41 },
      { a: 48, b: 27, answer: 75 }
    ];

    var state = {
      currentRound: 0,
      score: 0,
      attempts: [],
      completed: false
    };
    window.sumQuizState = state;

    var input = document.getElementById('answerInput');
    var submitBtn = document.getElementById('submitBtn');
    var feedback = document.getElementById('feedback');
    var expr = document.querySelector('[data-testid="expression"]');
    var roundLabel = document.querySelector('[data-testid="round-label"]');
    var roundNumEl = document.querySelector('[data-testid="round-num"]');
    var scoreEl = document.querySelector('[data-testid="score"]');
    var winBanner = document.getElementById('winBanner');
    var finalScore = document.querySelector('[data-testid="final-score"]');
    var inputWrap = input.parentElement;

    // --- Auto-grow width ---
    // Approx per-char width for our 28px bold tabular-nums font; clamp to [72, 300].
    var MIN_W = 72;
    var MAX_W = 300;
    var CHAR_W = 22;  // visual width per digit at this font size
    var BASE_PADDING = 28;  // horizontal padding + border

    function updateInputWidth() {
      var len = input.value.length;
      var target = len === 0 ? MIN_W : Math.min(MAX_W, Math.max(MIN_W, len * CHAR_W + BASE_PADDING));
      input.style.width = target + 'px';
    }

    input.addEventListener('input', function() {
      // numeric-only guard (mobile keyboards sometimes send other chars)
      var cleaned = input.value.replace(/[^0-9-]/g, '');
      if (cleaned !== input.value) input.value = cleaned;
      updateInputWidth();
      submitBtn.disabled = input.value.length === 0;
      // clear transient feedback colors on edit
      input.classList.remove('correct', 'wrong');
      feedback.className = 'feedback';
      feedback.innerHTML = '&nbsp;';
    });

    // --- Auto-focus + scroll-into-view on tap ---
    // Both via pointerdown (mobile) and click (desktop + keyboard)
    function focusAndScroll() {
      input.focus({ preventScroll: true });
      // Give the browser a tick to resolve focus/virtual-keyboard layout
      setTimeout(function() {
        inputWrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    }
    input.addEventListener('click', focusAndScroll);
    input.addEventListener('focus', function() {
      // programmatic or tab focus: still scroll into view
      setTimeout(function() {
        inputWrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    });

    // --- Submit handling ---
    input.addEventListener('keydown', function(ev) {
      if (ev.key === 'Enter' && !submitBtn.disabled) {
        ev.preventDefault();
        submit();
      }
    });
    submitBtn.addEventListener('click', submit);

    function submit() {
      if (state.completed) return;
      var raw = input.value.trim();
      if (!raw) return;
      var given = parseInt(raw, 10);
      var round = ROUNDS[state.currentRound];
      var correct = given === round.answer;

      state.attempts.push({
        round: state.currentRound + 1,
        given: given,
        correct: correct,
        expected: round.answer
      });

      if (correct) {
        state.score += 1;
        input.classList.add('correct');
        feedback.className = 'feedback correct';
        feedback.textContent = 'Correct! ' + round.a + ' + ' + round.b + ' = ' + round.answer;
        markSeg(state.currentRound, 'correct');
        scoreEl.textContent = state.score;
        submitBtn.disabled = true;
        setTimeout(nextRound, 900);
      } else {
        input.classList.add('wrong');
        feedback.className = 'feedback wrong';
        feedback.textContent = 'The correct answer is ' + round.answer + '.';
        markSeg(state.currentRound, 'wrong');
        submitBtn.disabled = true;
        setTimeout(nextRound, 1400);
      }
    }

    function markSeg(i, cls) {
      var seg = document.querySelector('[data-testid="seg-' + (i + 1) + '"]');
      if (seg) {
        seg.classList.remove('filled', 'correct', 'wrong');
        seg.classList.add(cls);
      }
    }

    function nextRound() {
      state.currentRound += 1;
      if (state.currentRound >= ROUNDS.length) {
        endGame();
        return;
      }
      renderRound();
    }

    function renderRound() {
      var r = ROUNDS[state.currentRound];
      expr.textContent = r.a + ' + ' + r.b + ' = ?';
      roundLabel.textContent = 'Round ' + (state.currentRound + 1) + ' of ' + ROUNDS.length;
      roundNumEl.textContent = state.currentRound + 1;
      input.value = '';
      input.classList.remove('correct', 'wrong');
      feedback.className = 'feedback';
      feedback.innerHTML = '&nbsp;';
      submitBtn.disabled = true;
      updateInputWidth();
      // Move focus to the input for the next round
      focusAndScroll();
      // Mark active progress segment
      var active = document.querySelector('[data-testid="seg-' + (state.currentRound + 1) + '"]');
      if (active && !active.classList.contains('correct') && !active.classList.contains('wrong')) {
        active.classList.add('filled');
      }
    }

    function endGame() {
      state.completed = true;
      finalScore.textContent = state.score;
      winBanner.classList.add('visible');
      document.querySelector('.question-card').style.display = 'none';
    }

    document.getElementById('playAgainBtn').addEventListener('click', function() {
      state.currentRound = 0;
      state.score = 0;
      state.attempts = [];
      state.completed = false;
      scoreEl.textContent = '0';
      document.querySelectorAll('.progress-seg').forEach(function(s) {
        s.classList.remove('filled', 'correct', 'wrong');
      });
      winBanner.classList.remove('visible');
      document.querySelector('.question-card').style.display = '';
      renderRound();
    });

    // Init
    renderRound();

    // Expose internals for testing
    window.__sumQuiz = {
      state: state,
      ROUNDS: ROUNDS,
      MIN_W: MIN_W,
      MAX_W: MAX_W,
      CHAR_W: CHAR_W,
      BASE_PADDING: BASE_PADDING,
      updateInputWidth: updateInputWidth,
      getInputWidth: function() { return parseFloat(getComputedStyle(input).width); }
    };
  </script>
</body>
</html>
