<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group Ten</title>
  <style>
    :root {
      --primary: #2F66E6;
      --ink: #270F36;
      --gray: #6b6b70;
      --border: #d7d5e0;
      --bg: #faf9fb;
      --tag-bg: #fff8d6;
      --tag-border: #d8b43b;
      --cluster-bg: #f7f4ff;
      --cluster-border: #b7aed9;
      --cluster-hover: #e9e1ff;
      --correct-bg: #e6fbe9;
      --correct-border: #3fb060;
      --wrong-border: #e5564a;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      margin: 0; padding: 16px;
      background: var(--bg);
      color: var(--ink);
      max-width: 520px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
    }
    h1 { font-size: 22px; margin: 4px 0 4px; }
    .instr { font-size: 14px; color: var(--gray); margin: 0 0 14px; }
    .status {
      font-size: 13px; color: var(--gray); margin-bottom: 10px;
    }
    .status strong { color: var(--ink); }
    .bank-label, .zone-label {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--gray); font-weight: 600; margin: 8px 0 6px;
    }
    #bank {
      display: flex; flex-wrap: wrap; gap: 8px;
      min-height: 64px;
      background: #fff;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 12px;
      transition: background 180ms, min-height 180ms;
    }
    #bank.drag-over { background: #f0f6ff; border-color: var(--primary); }
    #bank:empty::before {
      content: 'All tags placed';
      color: var(--gray); font-size: 13px; font-style: italic;
      display: block; width: 100%; text-align: center; padding: 12px 0;
    }
    .zone {
      margin-top: 14px;
      background: #ffffff;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 10px;
    }
    .clusters {
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .cluster {
      flex: 1 1 140px;
      min-width: 140px;
      min-height: 120px;
      background: var(--cluster-bg);
      border: 2px dashed var(--cluster-border);
      border-radius: 12px;
      padding: 10px;
      transition: background 180ms, border-color 180ms, transform 180ms;
      position: relative;
    }
    .cluster.drag-over {
      background: var(--cluster-hover);
      border-color: var(--primary);
    }
    .cluster.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      border-style: solid;
    }
    .cluster.wrong-flash {
      animation: shake 400ms ease-out;
      border-color: var(--wrong-border);
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .cluster-head {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; font-weight: 700;
      margin-bottom: 8px;
    }
    .cluster-title { color: var(--ink); }
    .cluster-sum {
      font-size: 12px; font-weight: 600; color: var(--gray);
      background: rgba(255,255,255,0.6);
      padding: 2px 8px; border-radius: 8px;
    }
    .cluster.correct .cluster-sum {
      color: var(--correct-border);
      background: #ffffff;
    }
    .cluster-body {
      display: flex; flex-wrap: wrap; gap: 6px;
      min-height: 54px;
      align-content: flex-start;
    }
    .cluster-body:empty::before {
      content: 'Drop tags here';
      color: var(--gray); font-size: 12px; font-style: italic;
      opacity: 0.5; width: 100%; text-align: center; padding-top: 16px;
    }
    .tag {
      display: inline-flex;
      align-items: center; justify-content: center;
      min-width: 44px; min-height: 44px;
      padding: 0 12px;
      background: var(--tag-bg);
      border: 2px solid var(--tag-border);
      border-radius: 24px;
      font-weight: 700; font-size: 18px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      transition: transform 140ms, box-shadow 140ms;
    }
    .tag:active, .tag.dragging-origin { cursor: grabbing; }
    .tag.dragging-origin {
      opacity: 0;
      pointer-events: none;
    }
    .tag.ghost {
      position: fixed; z-index: 9999;
      pointer-events: none;
      box-shadow: 0 10px 24px rgba(20, 8, 50, 0.25);
      transform: scale(1.05);
      opacity: 1;
    }
    .win-banner {
      display: none;
      margin-top: 16px;
      padding: 18px;
      background: linear-gradient(135deg, #d4f5dd, #b0ead4);
      border: 2px solid var(--correct-border);
      border-radius: 14px;
      text-align: center;
    }
    .win-banner.visible { display: block; }
    .win-banner h2 { margin: 0 0 8px; color: var(--correct-border); }
    .win-banner button {
      margin-top: 8px;
      padding: 10px 20px;
      background: var(--correct-border);
      color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Group Ten</h1>
  <p class="instr">Drag numbers so every group's sum equals <strong>10</strong>.</p>
  <div class="status" data-testid="status">
    Clusters populated: <strong data-testid="populated-count">0</strong> · Correct: <strong data-testid="correct-count">0</strong>/3
  </div>

  <div class="bank-label">Numbers</div>
  <div id="bank" data-testid="bank"></div>

  <div class="zone-label">Groups (sum to 10)</div>
  <div class="zone">
    <div class="clusters" id="clusters"></div>
  </div>

  <div class="win-banner" data-testid="win-banner" id="winBanner">
    <h2>Nice! All three groups make 10.</h2>
    <button data-testid="play-again-btn" id="playAgainBtn">Play Again</button>
  </div>

  <script>
    'use strict';

    // ----- Content -----
    var TAGS = [
      { id: 't1', value: 1 },
      { id: 't2', value: 9 },
      { id: 't3', value: 3 },
      { id: 't4', value: 7 },
      { id: 't5', value: 4 },
      { id: 't6', value: 6 }
    ];
    var CLUSTER_IDS = ['c1', 'c2', 'c3'];
    var TARGET = 10;

    // ----- State -----
    var state = {
      location: {},             // tagId -> 'bank' | clusterId
      attempts: [],             // { tagId, from, to, sum, correct }
      completed: false
    };
    TAGS.forEach(function(t) { state.location[t.id] = 'bank'; });
    window.groupTenState = state;

    // ----- Helpers -----
    function tagsIn(loc) {
      return TAGS.filter(function(t) { return state.location[t.id] === loc; });
    }
    function clusterSum(cid) {
      return tagsIn(cid).reduce(function(a, t) { return a + t.value; }, 0);
    }
    function populatedClusterCount() {
      return CLUSTER_IDS.filter(function(cid) { return tagsIn(cid).length > 0; }).length;
    }
    function correctClusterCount() {
      return CLUSTER_IDS.filter(function(cid) {
        var ts = tagsIn(cid);
        return ts.length >= 2 && ts.reduce(function(a,t){return a+t.value;}, 0) === TARGET;
      }).length;
    }
    function isSolved() {
      var allPlaced = TAGS.every(function(t) { return state.location[t.id] !== 'bank'; });
      return allPlaced && correctClusterCount() === CLUSTER_IDS.length;
    }

    // ----- Rendering -----
    function render() {
      renderBank();
      renderClusters();
      renderStatus();
      renderWin();
    }
    function renderBank() {
      var bank = document.getElementById('bank');
      bank.innerHTML = '';
      tagsIn('bank').forEach(function(t) { bank.appendChild(makeTag(t)); });
    }
    function renderClusters() {
      var holder = document.getElementById('clusters');
      holder.innerHTML = '';
      CLUSTER_IDS.forEach(function(cid, i) {
        var ts = tagsIn(cid);
        var sum = clusterSum(cid);
        var isCorrect = ts.length >= 2 && sum === TARGET;
        var div = document.createElement('div');
        div.className = 'cluster' + (isCorrect ? ' correct' : '');
        div.dataset.testid = 'cluster-' + cid;
        div.dataset.clusterId = cid;

        var head = document.createElement('div');
        head.className = 'cluster-head';
        head.innerHTML =
          '<span class="cluster-title">Group ' + (i + 1) + '</span>' +
          '<span class="cluster-sum" data-testid="sum-' + cid + '">Sum: ' +
          sum + (isCorrect ? ' ✓' : '') + '</span>';
        div.appendChild(head);

        var body = document.createElement('div');
        body.className = 'cluster-body';
        body.dataset.clusterBody = cid;
        ts.forEach(function(t) { body.appendChild(makeTag(t)); });
        div.appendChild(body);

        holder.appendChild(div);
      });
    }
    function renderStatus() {
      document.querySelector('[data-testid="populated-count"]').textContent = populatedClusterCount();
      document.querySelector('[data-testid="correct-count"]').textContent = correctClusterCount();
    }
    function renderWin() {
      var banner = document.getElementById('winBanner');
      if (isSolved()) {
        banner.classList.add('visible');
        state.completed = true;
      } else {
        banner.classList.remove('visible');
        state.completed = false;
      }
    }

    function makeTag(t) {
      var el = document.createElement('div');
      el.className = 'tag';
      el.textContent = t.value;
      el.dataset.tagId = t.id;
      el.dataset.testid = 'tag-' + t.id;
      el.setAttribute('role', 'button');
      el.setAttribute('aria-label', 'Number ' + t.value);
      el.addEventListener('pointerdown', onPointerDown);
      return el;
    }

    // ----- Drag -----
    var drag = null;

    function onPointerDown(ev) {
      if (drag) return;
      var tagEl = ev.currentTarget;
      var rect = tagEl.getBoundingClientRect();
      var ghost = tagEl.cloneNode(true);
      ghost.classList.add('ghost');
      ghost.style.left = rect.left + 'px';
      ghost.style.top = rect.top + 'px';
      ghost.style.width = rect.width + 'px';
      ghost.style.height = rect.height + 'px';
      document.body.appendChild(ghost);
      tagEl.classList.add('dragging-origin');

      drag = {
        tagId: tagEl.dataset.tagId,
        pointerId: ev.pointerId,
        origin: state.location[tagEl.dataset.tagId],
        offsetX: ev.clientX - rect.left,
        offsetY: ev.clientY - rect.top,
        ghost: ghost,
        tagEl: tagEl,
        lastX: ev.clientX,
        lastY: ev.clientY
      };

      try { tagEl.setPointerCapture(ev.pointerId); } catch(e) {}
      document.addEventListener('pointermove', onPointerMove);
      document.addEventListener('pointerup', onPointerUp);
      document.addEventListener('pointercancel', onPointerCancel);
      ev.preventDefault();
    }

    function onPointerMove(ev) {
      if (!drag || ev.pointerId !== drag.pointerId) return;
      drag.lastX = ev.clientX;
      drag.lastY = ev.clientY;
      drag.ghost.style.left = (ev.clientX - drag.offsetX) + 'px';
      drag.ghost.style.top = (ev.clientY - drag.offsetY) + 'px';
      updateDragOverHints(ev.clientX, ev.clientY);
    }

    function updateDragOverHints(x, y) {
      // ghost has pointer-events:none so elementFromPoint sees through it
      clearDragOver();
      var under = document.elementFromPoint(x, y);
      if (!under) return;
      var cluster = under.closest('.cluster');
      if (cluster) { cluster.classList.add('drag-over'); return; }
      var bank = under.closest('#bank');
      if (bank) bank.classList.add('drag-over');
    }
    function clearDragOver() {
      document.querySelectorAll('.drag-over').forEach(function(el) {
        el.classList.remove('drag-over');
      });
    }

    function onPointerUp(ev) {
      if (!drag || ev.pointerId !== drag.pointerId) return;
      cleanupListeners();
      clearDragOver();

      var under = document.elementFromPoint(ev.clientX, ev.clientY);
      var cluster = under ? under.closest('.cluster') : null;
      var bank = under ? under.closest('#bank') : null;
      var newLoc = null;
      if (cluster) newLoc = cluster.dataset.clusterId;
      else if (bank) newLoc = 'bank';

      drag.ghost.remove();
      drag.tagEl.classList.remove('dragging-origin');

      if (newLoc && newLoc !== drag.origin) {
        var tag = TAGS.find(function(t){ return t.id === drag.tagId; });
        state.location[drag.tagId] = newLoc;
        // Record attempt only for drops INTO a cluster (not bank returns)
        if (newLoc !== 'bank') {
          var sum = clusterSum(newLoc);
          var clusterTags = tagsIn(newLoc);
          var isCorrect = clusterTags.length >= 2 && sum === TARGET;
          var isOverflow = sum > TARGET;
          state.attempts.push({
            tagId: drag.tagId,
            from: drag.origin,
            to: newLoc,
            sum: sum,
            count: clusterTags.length,
            correct: isCorrect,
            overflow: isOverflow
          });
          // If drop caused overflow (> 10), flash wrong
          if (isOverflow) {
            var el = document.querySelector('[data-testid="cluster-' + newLoc + '"]');
            if (el) {
              el.classList.add('wrong-flash');
              setTimeout(function() { if (el) el.classList.remove('wrong-flash'); }, 500);
            }
          }
        }
      }
      drag = null;
      render();
    }

    function onPointerCancel(ev) {
      if (!drag) return;
      cleanupListeners();
      clearDragOver();
      drag.ghost.remove();
      drag.tagEl.classList.remove('dragging-origin');
      drag = null;
    }
    function cleanupListeners() {
      document.removeEventListener('pointermove', onPointerMove);
      document.removeEventListener('pointerup', onPointerUp);
      document.removeEventListener('pointercancel', onPointerCancel);
    }

    // ----- Restart -----
    document.getElementById('playAgainBtn').addEventListener('click', function() {
      TAGS.forEach(function(t) { state.location[t.id] = 'bank'; });
      state.attempts = [];
      state.completed = false;
      render();
    });

    // ----- Init -----
    render();

    // Expose internals for testing
    window.__groupTen = {
      state: state,
      TAGS: TAGS,
      CLUSTER_IDS: CLUSTER_IDS,
      TARGET: TARGET,
      clusterSum: clusterSum,
      tagsIn: tagsIn,
      populatedClusterCount: populatedClusterCount,
      correctClusterCount: correctClusterCount,
      isSolved: isSolved
    };
  </script>
</body>
</html>
