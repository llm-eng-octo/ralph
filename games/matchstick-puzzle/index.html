<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Matchstick Puzzle</title>

  <!-- ====== 1. SentryConfig package ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({ release: 'matchstick-puzzle@1.0.0' }));
    }
  </script>
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>
  <script>window.addEventListener('load', initSentry);</script>

  <!-- ====== CDN packages ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <!-- ====== DnD Kit via ESM (R1: async, independent) ====== -->
  <script type="module">
    import * as dndKit from 'https://esm.sh/@dnd-kit/dom@beta';
    window.__dndKit = dndKit;
    window.dispatchEvent(new Event('dnd-kit-loaded'));
  </script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-text-primary: #4a4a4a;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
      --mathai-success: #219653;
      --mathai-error: #E35757;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; margin: 0; padding: 0; overscroll-behavior: none; }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-light-gray);
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: var(--mathai-game-max-width);
      margin: 0 auto;
      background: var(--mathai-white);
      position: relative;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    /* ====== Game header ====== */
    .game-header { text-align: center; padding: 12px 16px 4px; }
    .round-indicator { font-size: var(--mathai-font-size-small); color: var(--mathai-gray); margin-bottom: 4px; }
    .instruction-text { font-size: var(--mathai-font-size-body); color: var(--mathai-text-primary); line-height: 1.5; }
    .instruction-text strong { font-weight: 700; }

    /* ====== Moves counter ====== */
    .moves-section { padding: 8px 24px 4px; max-width: 320px; margin: 0 auto; width: 100%; }
    .moves-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .moves-label { font-size: var(--mathai-font-size-small); color: var(--mathai-gray); }
    .moves-number { font-size: var(--mathai-font-size-body); font-weight: 700; color: var(--mathai-text-primary); }
    .moves-bar-bg { height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
    .moves-bar-fill { height: 100%; background: var(--mathai-orange); border-radius: 3px; transition: width 0.3s ease; }

    /* ====== Digit display area ====== */
    .digits-area {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
      gap: 24px;
      flex: 1;
      min-height: 240px;
    }

    .digit-container {
      position: relative;
      width: 120px;
      height: 220px;
    }

    /* ====== Segment drop zones ====== */
    .segment {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    /* Empty segment placeholder — subtle dashed outline */
    .segment.seg-empty {
      border: 1.5px dashed rgba(0,0,0,0.12);
      border-radius: 3px;
      overflow: hidden;
    }

    .segment.seg-occupied {
      border: 1.5px solid transparent;
      overflow: visible;
    }

    /* Segment positions within digit container (76x140)
       Horizontal segments: full width between verticals
       Vertical segments: full height between horizontals */
    .seg-a { top: 0; left: 20px; width: 80px; height: 20px; }
    .seg-f { top: 18px; left: 0;  width: 22px; height: 88px; }
    .seg-b { top: 18px; left: 98px; width: 22px; height: 88px; }
    .seg-g { top: 100px; left: 20px; width: 80px; height: 20px; }
    .seg-e { top: 118px; left: 0;  width: 22px; height: 88px; }
    .seg-c { top: 118px; left: 98px; width: 22px; height: 88px; }
    .seg-d { top: 200px; left: 20px; width: 80px; height: 20px; }

    /* Highlight on drag hover */
    .segment.drop-highlight {
      background: rgba(155, 81, 224, 0.15);
      border-color: var(--mathai-purple) !important;
      border-style: solid !important;
    }

    /* Correct/wrong feedback */
    .segment.seg-correct .matchstick img { filter: hue-rotate(90deg) brightness(1.2); }
    .segment.seg-wrong .matchstick img { filter: hue-rotate(-30deg) saturate(2); }

    /* ====== Matchstick (draggable tag) ====== */
    .matchstick {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      touch-action: none;
      z-index: 10;
      position: relative;
    }

    .matchstick:active { cursor: grabbing; }
    .matchstick.dragging { opacity: 0.4; z-index: 1000; }

    .matchstick img {
      pointer-events: none;
      display: block;
    }

    /* Vertical matchstick — image is naturally vertical, just fill */
    .seg-v .matchstick img {
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    /* Horizontal matchstick — rotate natural vertical image 90deg */
    .seg-h .matchstick img {
      width: 20px;
      height: 80px;
      object-fit: fill;
      transform: rotate(90deg);
    }

    /* ====== Reset button ====== */
    .controls-area {
      display: flex;
      justify-content: flex-end;
      padding: 8px 24px 16px;
    }

    .btn-reset {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--mathai-white);
      border: 1.5px solid #e0e0e0;
      border-radius: var(--mathai-border-radius-button);
      padding: 8px 16px;
      font-size: var(--mathai-font-size-small);
      font-weight: 600;
      font-family: var(--mathai-font-family);
      color: var(--mathai-text-primary);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-reset:active { background: var(--mathai-light-gray); }
    .btn-reset .reset-icon { font-size: 18px; color: var(--mathai-orange); }

    /* ====== Animations ====== */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .shake-wrong { animation: shake 0.4s ease; }

    @keyframes segPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .seg-pop { animation: segPop 0.25s ease; }

    /* ====== Results screen ====== */
    #results-screen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100; background: var(--mathai-white);
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
    }
    .results-stars { font-size: 48px; margin-bottom: 16px; }
    .results-title { font-size: var(--mathai-font-size-title); font-weight: 700; color: var(--mathai-primary); margin-bottom: 8px; }
    .results-subtitle { font-size: var(--mathai-font-size-subtitle); color: var(--mathai-gray); margin-bottom: 24px; }
    .results-metrics { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
    .results-metric { font-size: var(--mathai-font-size-body); color: var(--mathai-text-primary); margin-bottom: 8px; }
    .btn-primary {
      background: var(--mathai-purple); color: var(--mathai-white); border: none;
      border-radius: var(--mathai-border-radius-button); padding: 14px 48px;
      font-size: var(--mathai-font-size-button); font-weight: 700;
      font-family: var(--mathai-font-family); cursor: pointer;
    }

    /* Transition overlay */
    .simple-transition-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 90;
      background: rgba(255,255,255,0.95);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    .simple-transition-overlay h2 { font-size: 28px; color: var(--mathai-primary); }
    .simple-transition-overlay p { font-size: 16px; color: var(--mathai-gray); }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-round="0"></div>

  <script>
    'use strict';

    /* ====== Constants ====== */
    var STICK_IMG = 'https://sets-gamify-assets.s3.ap-south-1.amazonaws.com/dev/home-explore/document/1737447515650.png';

    /* Seven-segment digit definitions:
         aaa
        f   b
         ggg
        e   c
         ddd
    */
    var DIGIT_SEGMENTS = {
      '0': { a:1, b:1, c:1, d:1, e:1, f:1, g:0 },
      '1': { a:0, b:1, c:1, d:0, e:0, f:0, g:0 },
      '2': { a:1, b:1, c:0, d:1, e:1, f:0, g:1 },
      '3': { a:1, b:1, c:1, d:1, e:0, f:0, g:1 },
      '4': { a:0, b:1, c:1, d:0, e:0, f:1, g:1 },
      '5': { a:1, b:0, c:1, d:1, e:0, f:1, g:1 },
      '6': { a:1, b:0, c:1, d:1, e:1, f:1, g:1 },
      '7': { a:1, b:1, c:1, d:0, e:0, f:0, g:0 },
      '8': { a:1, b:1, c:1, d:1, e:1, f:1, g:1 },
      '9': { a:1, b:1, c:1, d:1, e:0, f:1, g:1 }
    };

    /* Orientation: h=horizontal, v=vertical */
    var SEG_ORIENTATION = { a:'h', b:'v', c:'v', d:'h', e:'v', f:'v', g:'h' };
    var SEG_LETTERS = ['a','b','c','d','e','f','g'];

    /* ====== gameState ====== */
    var gameState = {
      gameId: 'matchstick-puzzle',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 5,
      score: 0,
      attempts: [],
      events: [],
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      startTime: null,
      roundStartTime: null,
      correctAnswer: '',
      content: null,
      duration_data: { startTime: null, pausedTime: 0 },
      attemptNumber: 0,
      /* Matchstick-specific */
      movesLeft: 0,
      maxMoves: 0,
      segmentState: {},   /* { 'd0-a': true/false, ... } */
      targetState: {},    /* target segment state for checking */
      stickLocations: {}  /* R2: stick ID → segment ID */
    };
    window.gameState = gameState;

    /* ====== Fallback content — 5 rounds ====== */
    var fallbackContent = {
      rounds: [
        {
          id: 'r1_matchstick_easy',
          difficulty: 1,
          sourceNumber: '9',
          targetNumber: '0',
          moves: 1
        },
        {
          id: 'r2_matchstick_easy',
          difficulty: 1,
          sourceNumber: '3',
          targetNumber: '5',
          moves: 1
        },
        {
          id: 'r3_matchstick_medium',
          difficulty: 2,
          sourceNumber: '5',
          targetNumber: '2',
          moves: 2
        },
        {
          id: 'r4_matchstick_medium',
          difficulty: 2,
          sourceNumber: '16',
          targetNumber: '73',
          moves: 2
        },
        {
          id: 'r5_matchstick_hard',
          difficulty: 3,
          sourceNumber: '69',
          targetNumber: '96',
          moves: 2
        }
      ]
    };

    /* ====== Module-scope vars ====== */
    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var dndKitLib = null;
    var dndManager = null;
    var dndDraggables = [];
    var dndDroppables = [];
    var lastLoadedRound = -1;
    var isDragging = false;

    /* Sticker + SFX URLs */
    var CORRECT_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var INCORRECT_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var ROUND_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var VICTORY_3_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var VICTORY_2_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var VICTORY_1_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var GAME_OVER_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';

    /* ====== Helpers ====== */
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-round', gameState.currentRound);
    }

    function trackEvent(name, data) {
      gameState.events.push({ event_name: name, timestamp: Date.now(), data: data || {} });
    }

    function recordAttempt(data) {
      gameState.attempts.push({
        question_id: data.question_id || ('r' + (gameState.currentRound + 1)),
        round_number: gameState.currentRound + 1,
        student_answer: data.student_answer || '',
        correct_answer: data.correct_answer || '',
        is_correct: data.is_correct !== undefined ? data.is_correct : false,
        response_time_ms: Date.now() - (gameState.roundStartTime || Date.now()),
        score_delta: data.score_delta || 0,
        misconception_tag: data.misconception_tag || null,
        difficulty_level: data.difficulty_level || 1,
        hint_used: data.hint_used || false,
        attempt_number: data.attempt_number || 1,
        metadata: data.metadata || {}
      });
    }

    function getStars(score) {
      var total = gameState.totalRounds;
      if (score >= Math.ceil(total * 0.9)) return 3;
      if (score >= Math.ceil(total * 0.6)) return 2;
      if (score >= 1) return 1;
      return 0;
    }

    function getRounds() {
      if (gameState.content && gameState.content.rounds && gameState.content.rounds.length >= gameState.totalRounds) {
        return gameState.content.rounds;
      }
      return fallbackContent.rounds;
    }

    /* Build segment state from a number string */
    function buildSegmentState(numStr) {
      var state = {};
      for (var d = 0; d < numStr.length; d++) {
        var digit = numStr[d];
        var segs = DIGIT_SEGMENTS[digit];
        for (var s = 0; s < SEG_LETTERS.length; s++) {
          var letter = SEG_LETTERS[s];
          state['d' + d + '-' + letter] = segs[letter] ? true : false;
        }
      }
      return state;
    }

    /* ====== waitForPackages ====== */
    function waitForPackages() {
      return new Promise(function(resolve) {
        var startTime = Date.now();
        function check() {
          var fm = typeof FeedbackManager !== 'undefined';
          var tc = typeof TimerComponent !== 'undefined';
          var vt = typeof VisibilityTracker !== 'undefined';
          var sc = typeof SignalCollector !== 'undefined';
          if (fm && tc && vt && sc) { resolve(true); return; }
          if (Date.now() - startTime > 180000) { resolve(false); return; }
          setTimeout(check, 100);
        }
        check();
      });
    }

    /* ====== waitForDndKit (R1: independent) ====== */
    function waitForDndKit() {
      return new Promise(function(resolve) {
        if (window.__dndKit) return resolve(window.__dndKit);
        var handler = function() {
          window.removeEventListener('dnd-kit-loaded', handler);
          resolve(window.__dndKit);
        };
        window.addEventListener('dnd-kit-loaded', handler);
        setTimeout(function() {
          window.removeEventListener('dnd-kit-loaded', handler);
          resolve(window.__dndKit || null);
        }, 10000);
      });
    }

    /* ====== FeedbackManager helpers ====== */
    function playNewCardsSFX() {
      try { FeedbackManager.sound.play('new_cards').catch(function() {}); } catch (e) {}
    }

    /* ====== handlePostMessage ====== */
    function handlePostMessage(event) {
      if (!event.data || !event.data.type) return;
      if (event.data.type === 'game_init') {
        gameState.phase = 'playing';
        if (event.data.data) {
          gameState.content = event.data.data;
          if (event.data.data.rounds) {
            gameState.totalRounds = event.data.data.rounds.length;
          }
        }
        syncDOM();
        setupGame();
        startGame();
      }
    }

    /* ====== startGame ====== */
    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = Date.now();
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.phase = 'gameplay';
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();
      showRoundTransition();
    }
    window.startGame = startGame;

    function setupGame() {
      gameState.correctAnswer = 'all_segments_correct';
      syncDOM();
    }

    /* ====== loadRound ====== */
    function loadRound() {
      if (lastLoadedRound === gameState.currentRound) return;
      lastLoadedRound = gameState.currentRound;

      gameState.isProcessing = false;
      gameState.isActive = true;
      syncDOM();

      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      if (!round) return;

      gameState.roundStartTime = Date.now();
      gameState.correctAnswer = 'all_segments_correct';
      gameState.attemptNumber = 0;

      /* Build initial and target segment states from digit definitions */
      gameState.segmentState = buildSegmentState(round.sourceNumber);
      gameState.targetState = buildSegmentState(round.targetNumber);
      gameState.movesLeft = round.moves;
      gameState.maxMoves = round.moves;
      gameState.stickLocations = {};

      var gameContent = document.getElementById('gameContent');
      if (!gameContent) return;

      buildRoundUI(gameContent, round);
      playNewCardsSFX();

      if (dndKitLib) {
        setTimeout(function() { setupDnD(round); }, 100);
      }
    }
    window.loadRound = loadRound;

    /* ====== buildRoundUI ====== */
    function buildRoundUI(container, round) {
      var html = '';

      /* Header */
      html += '<div class="game-header">';
      html += '<div class="round-indicator">Round ' + (gameState.currentRound + 1) + ' of ' + gameState.totalRounds + '</div>';
      html += '<div class="instruction-text">Move any <strong>' + round.moves + ' stick' + (round.moves > 1 ? 's' : '') + '</strong> to change ' + round.sourceNumber + ' to <strong>' + round.targetNumber + '</strong></div>';
      html += '</div>';

      /* Moves counter */
      html += '<div class="moves-section">';
      html += '<div class="moves-header"><span class="moves-label">Moves left</span><span class="moves-number" id="movesNumber">' + round.moves + '</span></div>';
      html += '<div class="moves-bar-bg"><div class="moves-bar-fill" id="movesBar" style="width: 100%"></div></div>';
      html += '</div>';

      /* Digits display */
      html += '<div class="digits-area" id="digitsArea">';
      for (var d = 0; d < round.sourceNumber.length; d++) {
        html += '<div class="digit-container" id="digit-' + d + '">';
        for (var s = 0; s < SEG_LETTERS.length; s++) {
          var letter = SEG_LETTERS[s];
          var segId = 'd' + d + '-' + letter;
          var orientation = SEG_ORIENTATION[letter];
          var isOccupied = gameState.segmentState[segId];
          var stateClass = isOccupied ? 'seg-occupied' : 'seg-empty';

          html += '<div class="segment seg-' + letter + ' seg-' + orientation + ' ' + stateClass + '" id="seg-' + segId + '" data-seg-id="' + segId + '">';
          if (isOccupied) {
            var stickId = 'stick-' + segId;
            gameState.stickLocations[stickId] = segId;
            html += '<div class="matchstick" id="' + stickId + '" data-stick-id="' + stickId + '">';
            html += '<img src="' + STICK_IMG + '" alt="matchstick" draggable="false" />';
            html += '</div>';
          }
          html += '</div>';
        }
        html += '</div>';
      }
      html += '</div>';

      /* Reset button */
      html += '<div class="controls-area">';
      html += '<button class="btn-reset" id="btnReset"><span class="reset-icon">\u21BB</span> Reset</button>';
      html += '</div>';

      container.innerHTML = html;

      /* Reset handler */
      var btnReset = document.getElementById('btnReset');
      if (btnReset) {
        btnReset.addEventListener('click', function() {
          if (!gameState.gameEnded) resetRound();
        });
      }
    }

    /* ====== DnD Setup (R1, R2, R3 compliant) ====== */
    function cleanupDnD() {
      if (dndManager) {
        try { dndManager.destroy(); } catch (e) {}
        dndManager = null;
      }
      for (var i = 0; i < dndDraggables.length; i++) {
        try { dndDraggables[i].destroy(); } catch (e) {}
      }
      for (var i = 0; i < dndDroppables.length; i++) {
        try { dndDroppables[i].destroy(); } catch (e) {}
      }
      dndDraggables = [];
      dndDroppables = [];
    }

    function setupDnD(round) {
      cleanupDnD();
      if (!dndKitLib) return;

      var DragDropManagerClass = dndKitLib.DragDropManager;
      var DraggableClass = dndKitLib.Draggable;
      var DroppableClass = dndKitLib.Droppable;
      var PointerSensorClass = dndKitLib.PointerSensor;
      var PointerConstraints = dndKitLib.PointerActivationConstraints;

      var managerConfig = {};
      if (PointerSensorClass && PointerConstraints) {
        managerConfig.sensors = [
          PointerSensorClass.configure({
            activationConstraints: [
              new PointerConstraints.Distance({ value: 3 })
            ]
          })
        ];
      }

      dndManager = new DragDropManagerClass(managerConfig);

      /* Make all segments droppable */
      for (var d = 0; d < round.sourceNumber.length; d++) {
        for (var s = 0; s < SEG_LETTERS.length; s++) {
          var segId = 'd' + d + '-' + SEG_LETTERS[s];
          var segEl = document.getElementById('seg-' + segId);
          if (segEl) {
            var droppable = new DroppableClass({ id: segId, element: segEl }, dndManager);
            dndDroppables.push(droppable);
          }
        }
      }

      /* Make occupied segments' sticks draggable */
      for (var stickId in gameState.stickLocations) {
        var stickEl = document.getElementById(stickId);
        if (stickEl) {
          var draggable = new DraggableClass({
            id: stickId,
            element: stickEl,
            data: { stickId: stickId }
          }, dndManager);
          dndDraggables.push(draggable);
        }
      }

      /* Drag start */
      dndManager.monitor.addEventListener('dragstart', function(event) {
        isDragging = true;
        var srcEl = event.operation.source.element;
        if (srcEl) srcEl.classList.add('dragging');
      });

      /* Auto edge-scrolling */
      dndManager.monitor.addEventListener('dragmove', function(event) {
        var pos = event.operation.position;
        if (!pos || !pos.current) return;
        var y = pos.current.y;
        var vh = window.innerHeight;
        if (y < 60) window.scrollBy(0, -8);
        else if (y > vh - 60) window.scrollBy(0, 8);
      });

      /* Drag end — main logic */
      dndManager.monitor.addEventListener('dragend', function(event) {
        isDragging = false;
        var operation = event.operation;
        var source = operation.source;
        var target = operation.target;
        var canceled = event.canceled;

        var srcEl = source.element;
        if (srcEl) srcEl.classList.remove('dragging');

        if (gameState.isProcessing || gameState.gameEnded || !gameState.isActive) return;
        if (gameState.movesLeft <= 0) return;

        var stickId = source.id;
        /* R2: Read source from tracking data */
        var sourceSegId = gameState.stickLocations[stickId];

        /* Return stick to its source segment (undo @dnd-kit displacement) */
        var srcSegEl = document.getElementById('seg-' + sourceSegId);
        if (srcSegEl && srcEl && srcEl.parentNode !== srcSegEl) {
          srcSegEl.appendChild(srcEl);
        }

        /* Cancel or no target → no-op */
        if (canceled || !target) return;

        var targetSegId = target.id;

        /* Same segment → no-op */
        if (targetSegId === sourceSegId) return;

        /* Target must be empty */
        if (gameState.segmentState[targetSegId]) return;

        /* === Valid move: transfer stick === */
        doMoveStick(stickId, sourceSegId, targetSegId);
      });
    }

    /* ====== Move a stick between segments ====== */
    function doMoveStick(stickId, fromSegId, toSegId) {
      var stickEl = document.getElementById(stickId);
      var fromSegEl = document.getElementById('seg-' + fromSegId);
      var toSegEl = document.getElementById('seg-' + toSegId);

      /* Update segment state */
      gameState.segmentState[fromSegId] = false;
      gameState.segmentState[toSegId] = true;

      /* R2: Update stick location tracking */
      gameState.stickLocations[stickId] = toSegId;

      /* Update source segment styling */
      if (fromSegEl) {
        fromSegEl.classList.remove('seg-occupied');
        fromSegEl.classList.add('seg-empty');
      }

      /* Move stick element to target — orientation is handled by parent seg-h/seg-v class */
      if (stickEl && toSegEl) {
        toSegEl.appendChild(stickEl);
        toSegEl.classList.remove('seg-empty');
        toSegEl.classList.add('seg-occupied');

        /* Pop animation */
        toSegEl.classList.add('seg-pop');
        setTimeout(function() { toSegEl.classList.remove('seg-pop'); }, 250);
      }

      /* Decrement moves */
      gameState.movesLeft--;
      updateMovesUI();

      /* If no moves left, auto-check after delay */
      if (gameState.movesLeft <= 0) {
        setTimeout(function() {
          checkAnswer();
        }, 600);
      }
    }

    /* ====== Update moves counter UI ====== */
    function updateMovesUI() {
      var numEl = document.getElementById('movesNumber');
      var barEl = document.getElementById('movesBar');
      if (numEl) numEl.textContent = gameState.movesLeft;
      if (barEl) {
        var pct = gameState.maxMoves > 0 ? (gameState.movesLeft / gameState.maxMoves) * 100 : 0;
        barEl.style.width = pct + '%';
      }
    }

    /* ====== checkAnswer ====== */
    function checkAnswer() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      gameState.isProcessing = true;
      gameState.attemptNumber++;

      var allCorrect = true;
      var studentAnswer = {};

      for (var segId in gameState.targetState) {
        var expected = gameState.targetState[segId];
        var actual = gameState.segmentState[segId];
        studentAnswer[segId] = actual;

        var segEl = document.getElementById('seg-' + segId);

        if (actual !== expected) {
          allCorrect = false;
          if (segEl && actual) segEl.classList.add('seg-wrong');
        } else {
          if (segEl && actual) segEl.classList.add('seg-correct');
        }
      }

      var rounds = getRounds();
      var round = rounds[gameState.currentRound];

      recordAttempt({
        question_id: round.id,
        student_answer: JSON.stringify(studentAnswer),
        correct_answer: round.targetNumber,
        is_correct: allCorrect,
        score_delta: allCorrect ? 1 : 0,
        difficulty_level: round.difficulty || 1,
        attempt_number: gameState.attemptNumber
      });

      trackEvent('answer_submitted', {
        round: gameState.currentRound + 1,
        correct: allCorrect,
        attempt: gameState.attemptNumber
      });

      if (allCorrect) {
        gameState.score += 1;
        syncDOM();
        trackEvent('round_complete', { round: gameState.currentRound + 1 });

        try {
          FeedbackManager.sound.play('all_correct', { sticker: CORRECT_STICKER }).then(function() {
            return FeedbackManager.playDynamicFeedback({
              audio_content: 'Perfect! You solved the matchstick puzzle!',
              subtitle: 'Perfect!',
              sticker: CORRECT_STICKER
            });
          }).catch(function() {}).then(function() {
            gameState.isProcessing = false;
            nextRound();
          });
        } catch (e) {
          gameState.isProcessing = false;
          nextRound();
        }
      } else {
        /* Wrong — shake, feedback, let user reset */
        var digitsArea = document.getElementById('digitsArea');
        if (digitsArea) {
          digitsArea.classList.add('shake-wrong');
          setTimeout(function() { digitsArea.classList.remove('shake-wrong'); }, 400);
        }

        try {
          FeedbackManager.sound.play('incorrect_sound_effect', { sticker: INCORRECT_STICKER }).then(function() {
            return FeedbackManager.playDynamicFeedback({
              audio_content: 'Not quite! Tap Reset to try again.',
              subtitle: 'Not quite!',
              sticker: INCORRECT_STICKER
            });
          }).catch(function() {});
        } catch (e) {}

        /* Clear feedback styling after delay, allow reset */
        setTimeout(function() {
          for (var segId in gameState.segmentState) {
            var segEl = document.getElementById('seg-' + segId);
            if (segEl) segEl.classList.remove('seg-correct', 'seg-wrong');
          }
          gameState.isProcessing = false;
        }, 2000);
      }
    }
    window.checkAnswer = checkAnswer;

    /* ====== resetRound ====== */
    function resetRound() {
      lastLoadedRound = -1;
      loadRound();
    }
    window.resetRound = resetRound;

    /* ====== nextRound ====== */
    function nextRound() {
      gameState.currentRound += 1;
      syncDOM();

      if (gameState.currentRound >= gameState.totalRounds) {
        endGame('victory');
        return;
      }

      if (progressBar) {
        try { progressBar.update(gameState.currentRound, 0); } catch (e) {}
      }

      showRoundTransition();
    }
    window.nextRound = nextRound;

    /* ====== showRoundTransition ====== */
    function showRoundTransition() {
      var roundNum = gameState.currentRound + 1;
      var audioStopped = false;
      var dismissed = false;

      function onTransitionDismissed() {
        if (dismissed) return;
        dismissed = true;
        audioStopped = true;
        try { FeedbackManager.sound.stopAll(); FeedbackManager._stopCurrentDynamic(); } catch (e) {}
        if (transitionScreen) { try { transitionScreen.hide(); } catch (e) {} }
        var tsScreen = document.querySelector('.mathai-ts-screen.active');
        if (tsScreen) tsScreen.classList.remove('active');
        loadRound();
      }

      if (transitionScreen) {
        transitionScreen.show({
          icons: ['\uD83E\uDDE9'],
          title: 'Round ' + roundNum,
          subtitle: roundNum === 1 ? 'Move matchsticks to form the target number!' : 'Next puzzle!',
          buttons: [{ text: 'Start', onClick: onTransitionDismissed }],
          persist: true
        });

        setTimeout(function() {
          var tsBtns = document.querySelectorAll('.mathai-ts-btn');
          for (var i = 0; i < tsBtns.length; i++) {
            tsBtns[i].addEventListener('click', onTransitionDismissed);
          }
        }, 100);

        try {
          FeedbackManager.sound.play('rounds_sound_effect', { sticker: ROUND_STICKER }).then(function() {
            if (audioStopped) return;
            return FeedbackManager.playDynamicFeedback({
              audio_content: 'Round ' + roundNum,
              subtitle: 'Round ' + roundNum,
              sticker: ROUND_STICKER
            });
          }).catch(function() {});
        } catch (e) {}
      } else {
        showSimpleTransition(roundNum, function() { loadRound(); });
      }
    }

    function showSimpleTransition(roundNum, onDismiss) {
      var overlay = document.createElement('div');
      overlay.className = 'simple-transition-overlay';
      overlay.innerHTML = '<h2>Round ' + roundNum + '</h2><p>Move the matchsticks!</p><button class="btn-primary">Start</button>';
      overlay.querySelector('button').addEventListener('click', function() {
        overlay.remove();
        onDismiss();
      });
      document.body.appendChild(overlay);
    }

    /* ====== endGame ====== */
    function endGame(reason) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.phase = 'results';
      syncDOM();

      cleanupDnD();

      var stars = getStars(gameState.score);
      var elapsed = Math.round((Date.now() - gameState.startTime) / 1000);
      var accuracy = gameState.totalRounds > 0 ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0;

      trackEvent('game_end', { score: gameState.score, totalRounds: gameState.totalRounds, stars: stars, elapsed: elapsed });

      var completeData = {
        type: 'game_complete',
        gameId: gameState.gameId,
        metrics: { score: gameState.score, totalRounds: gameState.totalRounds, stars: stars, accuracy: accuracy, duration: elapsed },
        completedAt: Date.now(),
        attempts: gameState.attempts,
        events: gameState.events
      };
      try { window.parent.postMessage(completeData, '*'); } catch (e) {}

      showResults(stars, accuracy, elapsed);

      var stickerMap = { 3: VICTORY_3_STICKER, 2: VICTORY_2_STICKER, 1: VICTORY_1_STICKER, 0: GAME_OVER_STICKER };
      var sfxId = stars >= 1 ? 'victory_sound_effect' : 'game_over_sound_effect';
      try {
        FeedbackManager.sound.play(sfxId, { sticker: stickerMap[stars] }).then(function() {
          var msg = stars === 3 ? 'Amazing! 3 stars! Matchstick master!' : stars === 2 ? 'Great job! 2 stars!' : stars === 1 ? 'Good effort! 1 star!' : 'Keep practicing!';
          return FeedbackManager.playDynamicFeedback({ audio_content: msg, subtitle: msg, sticker: stickerMap[stars] });
        }).catch(function() {});
      } catch (e) {}
    }
    window.endGame = endGame;

    /* ====== showResults ====== */
    function showResults(stars, accuracy, elapsed) {
      var starStr = '';
      for (var i = 0; i < stars; i++) starStr += '\u2B50';
      if (stars === 0) starStr = '\u2606';

      var titles = ['Keep Trying!', 'Nice Work!', 'Great Job!', 'Puzzle Master!'];
      var gameContent = document.getElementById('gameContent');
      if (gameContent) gameContent.innerHTML = '';

      var rs = document.createElement('div');
      rs.id = 'results-screen';
      rs.innerHTML =
        '<div class="results-stars">' + starStr + '</div>' +
        '<div class="results-title">' + titles[stars] + '</div>' +
        '<div class="results-subtitle">You solved ' + gameState.score + ' of ' + gameState.totalRounds + ' puzzles</div>' +
        '<div class="results-metrics">' +
          '<div class="results-metric">Accuracy: ' + accuracy + '%</div>' +
          '<div class="results-metric">Time: ' + elapsed + 's</div>' +
          '<div class="results-metric">Stars: ' + starStr + '</div>' +
        '</div>' +
        '<button class="btn-primary" onclick="window.restartGame()">Play Again</button>';

      var app = document.getElementById('app');
      if (app) app.appendChild(rs);
    }

    /* ====== resetGame ====== */
    function resetGame() {
      gameState.phase = 'start_screen';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.startTime = null;
      gameState.roundStartTime = null;
      gameState.attemptNumber = 0;
      gameState.movesLeft = 0;
      gameState.segmentState = {};
      gameState.targetState = {};
      gameState.stickLocations = {};
      gameState.duration_data = { startTime: null, pausedTime: 0 };
      lastLoadedRound = -1;

      cleanupDnD();

      var rs = document.getElementById('results-screen');
      if (rs) rs.remove();

      if (progressBar) { try { progressBar.destroy(); } catch (e) {} progressBar = null; }
      createProgressBar();
      if (signalCollector) { try { signalCollector.reset(); } catch (e) {} }

      syncDOM();
      startGame();
    }
    window.restartGame = resetGame;

    /* ====== createProgressBar ====== */
    function createProgressBar() {
      try {
        if (typeof ProgressBarComponent !== 'undefined') {
          progressBar = new ProgressBarComponent({ slotId: 'mathai-progress-slot', totalRounds: gameState.totalRounds, totalLives: 1 });
        }
      } catch (e) {}
    }

    /* ====== buildFallbackLayout ====== */
    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      app.innerHTML = '<div id="mathai-progress-slot"></div>' +
        '<div id="mathai-transition-slot"></div>' +
        '<div id="gameContent" style="flex: 1; display: flex; flex-direction: column;"></div>';
    }

    /* ====== Touch handler (Behaviour 8) ====== */
    document.addEventListener('touchmove', function(e) {
      if (isDragging) e.preventDefault();
    }, { passive: false });

    /* ====== Programmatic move for tests ====== */
    function programmaticMove(fromSegId, toSegId) {
      /* Validate source is occupied */
      if (!gameState.segmentState[fromSegId]) return false;
      /* Validate target is empty */
      if (gameState.segmentState[toSegId]) return false;
      /* Validate moves left */
      if (gameState.movesLeft <= 0) return false;

      /* Find stick in fromSegId */
      var stickId = null;
      for (var id in gameState.stickLocations) {
        if (gameState.stickLocations[id] === fromSegId) {
          stickId = id;
          break;
        }
      }
      if (!stickId) return false;

      doMoveStick(stickId, fromSegId, toSegId);
      return true;
    }
    window.programmaticMove = programmaticMove;

    /* ====== DOMContentLoaded init ====== */
    document.addEventListener('DOMContentLoaded', function() {
      window.addEventListener('message', handlePostMessage);
      try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

      waitForPackages().then(function(loaded) {
        try {
          if (typeof FeedbackManager !== 'undefined') {
            FeedbackManager.init().then(function() {
              FeedbackManager.sound.preload([
                { id: 'correct_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
                { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                { id: 'rounds_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                { id: 'all_correct', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506764346.mp3' },
                { id: 'new_cards', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432104595.mp3' }
              ]).catch(function() {});
            }).catch(function() {});
          }

          if (typeof SignalCollector !== 'undefined') {
            signalCollector = new SignalCollector({ gameId: 'matchstick-puzzle' });
          }

          if (typeof ScreenLayout !== 'undefined') {
            ScreenLayout.inject('app', {
              sections: { header: true, questionText: false, progressBar: true, playArea: true, transitionScreen: true }
            });
          } else {
            buildFallbackLayout();
          }

          if (typeof VisibilityTracker !== 'undefined') {
            visibilityTracker = new VisibilityTracker({
              onInactive: function() { try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {} },
              onResume: function() { try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {} }
            });
          }

          createProgressBar();

          if (typeof TransitionScreenComponent !== 'undefined') {
            transitionScreen = new TransitionScreenComponent({ autoInject: true });
          }

          setupGame();
        } catch (e) {
          console.error('[init] ' + e.message);
        }
      });

      waitForDndKit().then(function(lib) {
        if (lib) { dndKitLib = lib; console.log('[dnd-kit] loaded'); }
      });

      setTimeout(function() {
        if (!gameState.isActive && !gameState.gameEnded) {
          if (!document.getElementById('gameContent')) buildFallbackLayout();
          gameState.content = fallbackContent;
          gameState.totalRounds = fallbackContent.rounds.length;
          setupGame();
          startGame();
        }
      }, 2000);

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = resetGame;
      window.nextRound = nextRound;
      window.startGame = startGame;
      window.getRounds = getRounds;
      window.loadRound = loadRound;
      window.checkAnswer = checkAnswer;
    });
  </script>
</body>
</html>
