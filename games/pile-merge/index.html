<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pile Merge</title>
  <style>
    :root {
      --ink: #270F36;
      --gray: #6b6b70;
      --border: #d7d5e0;
      --bg: #faf9fb;
      --pileA-bg: #fff3e0;
      --pileA-border: #e59a3a;
      --pileB-bg: #e0f2ff;
      --pileB-border: #4a90d0;
      --target-bg: #eefbe9;
      --target-border: #3fb060;
      --drag-over: #fffde0;
      --tag-bg: #ffffff;
      --tag-border: #bbbbc0;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      margin: 0 auto; padding: 16px;
      background: var(--bg);
      color: var(--ink);
      max-width: 520px;
      -webkit-font-smoothing: antialiased;
    }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .instr { font-size: 14px; color: var(--gray); margin: 0 0 12px; }
    .status {
      font-size: 13px; color: var(--gray); margin-bottom: 10px;
    }
    .status strong { color: var(--ink); }

    .piles-row {
      display: flex; gap: 10px; margin-bottom: 14px;
    }
    .zone {
      flex: 1 1 0;
      min-width: 0;
      background: #fff;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 10px;
      transition: background 180ms, border-color 180ms;
    }
    .zone.drag-over {
      background: var(--drag-over);
      border-color: var(--ink);
      border-style: solid;
    }
    .zone-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .zone-title {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--gray); font-weight: 700;
    }
    .zone-count {
      font-size: 11px; color: var(--gray);
      background: #fff; padding: 2px 8px; border-radius: 10px;
      border: 1px solid var(--border);
    }
    .pile-a { background: var(--pileA-bg); border-color: var(--pileA-border); }
    .pile-b { background: var(--pileB-bg); border-color: var(--pileB-border); }
    .target { background: var(--target-bg); border-color: var(--target-border); }
    .target.solved { border-style: solid; box-shadow: 0 0 0 3px rgba(63,176,96,0.2); }

    .zone-body {
      display: flex; flex-wrap: wrap; gap: 6px;
      min-height: 60px;
      align-content: flex-start;
    }
    .zone-body:empty::before {
      content: 'empty';
      color: var(--gray); font-size: 12px; font-style: italic;
      opacity: 0.5; width: 100%; text-align: center; padding-top: 18px;
    }

    .tag {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 44px; min-height: 44px;
      padding: 0 12px;
      background: var(--tag-bg);
      border: 2px solid var(--tag-border);
      border-radius: 24px;
      font-weight: 700; font-size: 17px;
      cursor: grab; user-select: none;
      touch-action: none;
      transition: transform 140ms;
    }
    .tag[data-origin="pileA"] { border-color: var(--pileA-border); color: #a6661a; }
    .tag[data-origin="pileB"] { border-color: var(--pileB-border); color: #1e5a8a; }

    .tag:active { cursor: grabbing; }
    .tag.dragging-origin { opacity: 0; pointer-events: none; }
    .tag.ghost {
      position: fixed; z-index: 9999;
      pointer-events: none;
      box-shadow: 0 10px 24px rgba(20, 8, 50, 0.25);
      transform: scale(1.06);
    }

    .win-banner {
      display: none;
      margin-top: 14px; padding: 16px;
      background: linear-gradient(135deg, #d4f5dd, #b0ead4);
      border: 2px solid var(--target-border);
      border-radius: 14px;
      text-align: center;
    }
    .win-banner.visible { display: block; }
    .win-banner h2 { margin: 0 0 6px; color: var(--target-border); font-size: 18px; }
    .win-banner button {
      margin-top: 8px; padding: 8px 16px;
      background: var(--target-border); color: #fff;
      border: none; border-radius: 10px;
      font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Pile Merge</h1>
  <p class="instr">Drag tags from <strong>any pile</strong> into <strong>Final</strong>. Tags can also move between the two piles.</p>
  <div class="status" data-testid="status">
    Pile A: <strong data-testid="pileA-count">0</strong> ·
    Pile B: <strong data-testid="pileB-count">0</strong> ·
    Final: <strong data-testid="target-count">0</strong>/6
  </div>

  <div class="piles-row">
    <div class="zone pile-a" data-testid="zone-pileA" data-zone-id="pileA">
      <div class="zone-head">
        <span class="zone-title">Pile A</span>
        <span class="zone-count" data-testid="pileA-badge">0</span>
      </div>
      <div class="zone-body" data-zone-body="pileA"></div>
    </div>
    <div class="zone pile-b" data-testid="zone-pileB" data-zone-id="pileB">
      <div class="zone-head">
        <span class="zone-title">Pile B</span>
        <span class="zone-count" data-testid="pileB-badge">0</span>
      </div>
      <div class="zone-body" data-zone-body="pileB"></div>
    </div>
  </div>

  <div class="zone target" data-testid="zone-target" data-zone-id="target" id="targetZone">
    <div class="zone-head">
      <span class="zone-title">Final</span>
      <span class="zone-count" data-testid="target-badge">0</span>
    </div>
    <div class="zone-body" data-zone-body="target"></div>
  </div>

  <div class="win-banner" data-testid="win-banner" id="winBanner">
    <h2>Merged! All 6 tags in Final.</h2>
    <button data-testid="play-again-btn" id="playAgainBtn">Play Again</button>
  </div>

  <script>
    'use strict';

    // Tags have an `origin` (immutable) used for color coding;
    // `location` changes as user moves them.
    var TAGS = [
      { id: 'a1', value: 1, origin: 'pileA' },
      { id: 'a2', value: 3, origin: 'pileA' },
      { id: 'a3', value: 5, origin: 'pileA' },
      { id: 'b1', value: 2, origin: 'pileB' },
      { id: 'b2', value: 4, origin: 'pileB' },
      { id: 'b3', value: 6, origin: 'pileB' }
    ];
    var ZONES = ['pileA', 'pileB', 'target'];

    var state = {
      location: {},     // tagId -> 'pileA' | 'pileB' | 'target'
      pickEvents: []    // { tagId, from, to }
    };
    TAGS.forEach(function(t) { state.location[t.id] = t.origin; });

    function tagsIn(zone) {
      return TAGS.filter(function(t) { return state.location[t.id] === zone; });
    }

    function render() {
      ZONES.forEach(function(z) {
        var body = document.querySelector('[data-zone-body="' + z + '"]');
        body.innerHTML = '';
        tagsIn(z).forEach(function(t) { body.appendChild(makeTag(t)); });
        // counters
        var count = tagsIn(z).length;
        var badge = document.querySelector('[data-testid="' + z + '-badge"]');
        var statusEl = document.querySelector('[data-testid="' + z + '-count"]');
        if (badge) badge.textContent = count;
        if (statusEl) statusEl.textContent = count;
      });
      // win banner
      var won = tagsIn('target').length === TAGS.length;
      var banner = document.getElementById('winBanner');
      var target = document.getElementById('targetZone');
      if (won) {
        banner.classList.add('visible');
        target.classList.add('solved');
      } else {
        banner.classList.remove('visible');
        target.classList.remove('solved');
      }
    }

    function makeTag(t) {
      var el = document.createElement('div');
      el.className = 'tag';
      el.textContent = t.value;
      el.dataset.tagId = t.id;
      el.dataset.origin = t.origin;
      el.dataset.testid = 'tag-' + t.id;
      el.setAttribute('role', 'button');
      el.setAttribute('aria-label', 'Tag ' + t.value + ' from ' + t.origin);
      el.addEventListener('pointerdown', onPointerDown);
      return el;
    }

    // ----- Drag -----
    var drag = null;

    function onPointerDown(ev) {
      if (drag) return;
      var tagEl = ev.currentTarget;
      var rect = tagEl.getBoundingClientRect();
      var ghost = tagEl.cloneNode(true);
      ghost.classList.add('ghost');
      ghost.style.left = rect.left + 'px';
      ghost.style.top = rect.top + 'px';
      ghost.style.width = rect.width + 'px';
      ghost.style.height = rect.height + 'px';
      document.body.appendChild(ghost);
      tagEl.classList.add('dragging-origin');

      drag = {
        tagId: tagEl.dataset.tagId,
        pointerId: ev.pointerId,
        origin: state.location[tagEl.dataset.tagId],
        offsetX: ev.clientX - rect.left,
        offsetY: ev.clientY - rect.top,
        ghost: ghost,
        tagEl: tagEl
      };
      try { tagEl.setPointerCapture(ev.pointerId); } catch(e) {}
      document.addEventListener('pointermove', onPointerMove);
      document.addEventListener('pointerup', onPointerUp);
      document.addEventListener('pointercancel', onPointerCancel);
      ev.preventDefault();
    }

    function onPointerMove(ev) {
      if (!drag || ev.pointerId !== drag.pointerId) return;
      drag.ghost.style.left = (ev.clientX - drag.offsetX) + 'px';
      drag.ghost.style.top = (ev.clientY - drag.offsetY) + 'px';
      clearDragOver();
      var under = document.elementFromPoint(ev.clientX, ev.clientY);
      var zone = under ? under.closest('.zone') : null;
      if (zone) zone.classList.add('drag-over');
    }
    function clearDragOver() {
      document.querySelectorAll('.zone.drag-over').forEach(function(z) {
        z.classList.remove('drag-over');
      });
    }

    function onPointerUp(ev) {
      if (!drag || ev.pointerId !== drag.pointerId) return;
      cleanupListeners();
      clearDragOver();
      var under = document.elementFromPoint(ev.clientX, ev.clientY);
      var zone = under ? under.closest('.zone') : null;
      var newLoc = zone ? zone.dataset.zoneId : null;

      drag.ghost.remove();
      drag.tagEl.classList.remove('dragging-origin');

      if (newLoc && newLoc !== drag.origin) {
        state.location[drag.tagId] = newLoc;
        state.pickEvents.push({
          tagId: drag.tagId,
          from: drag.origin,
          to: newLoc
        });
      }
      drag = null;
      render();
    }

    function onPointerCancel(ev) {
      if (!drag) return;
      cleanupListeners();
      clearDragOver();
      drag.ghost.remove();
      drag.tagEl.classList.remove('dragging-origin');
      drag = null;
    }
    function cleanupListeners() {
      document.removeEventListener('pointermove', onPointerMove);
      document.removeEventListener('pointerup', onPointerUp);
      document.removeEventListener('pointercancel', onPointerCancel);
    }

    document.getElementById('playAgainBtn').addEventListener('click', function() {
      TAGS.forEach(function(t) { state.location[t.id] = t.origin; });
      state.pickEvents = [];
      render();
    });

    render();

    window.__pileMerge = {
      state: state,
      TAGS: TAGS,
      ZONES: ZONES,
      tagsIn: tagsIn
    };
  </script>
</body>
</html>
