<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Matching Doubles</title>

  <!-- ====== 1. SentryConfig package (MUST be first script) ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

  <!-- ====== 2. initSentry() definition (inline) ====== -->
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({
        release: 'matching-doubles@1.0.0'
      }));
    }
  </script>

  <!-- ====== 3. Sentry SDK (3 scripts, NO integrity attribute) ====== -->
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

  <!-- ====== 4. Initialize Sentry on load ====== -->
  <script>window.addEventListener('load', initSentry);</script>

  <!-- ====== 5-7. Game CDN packages (exact order: feedback-manager, components, helpers) ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    /* ====== 1. :root variables ====== */
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;
      --mathai-primary: #270f36;
      --mathai-level-text: #270F63;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-bg-selected: #E8E0FF;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-cell-border-selected: #9B51E0;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;
      --mathai-padding-large: 56px 40px;
      --mathai-padding-medium: 16px 24px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;
    }

    /* ====== 2. Reset ====== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ====== 3. html, body ====== */
    html, body {
      width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }

    /* ====== 4. #app ====== */
    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    /* Preview-wrapper scroll compatibility: the preview body must own
       vertical scrolling so gameplay surfaces still pan correctly. */
    #mathai-preview-slot {
      height: 100dvh;
      overflow: hidden;
    }

    #mathai-preview-slot .mathai-preview-body {
      height: 100dvh;
      box-sizing: border-box;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* ====== 5. Hidden utility ====== */
    .hidden { display: none !important; }

    /* ====== 6. Gameplay styles ====== */
    #gameContent {
      padding: 8px 12px 32px 12px;
    }

    .md-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-column-gap: 28px;
      width: 100%;
      max-width: 420px;
      margin: 12px auto 0 auto;
      padding: 0 8px;
    }

    .md-col {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .md-col-label {
      font-size: var(--mathai-font-size-small);
      font-weight: 700;
      color: var(--mathai-gray);
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .md-tile {
      min-height: 56px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--mathai-white);
      border: 2px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-card);
      font-size: 22px;
      font-weight: 700;
      color: var(--mathai-text-primary);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      padding: 8px 6px;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 10px;
      transition: transform 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
    }

    .md-tile:last-child {
      margin-bottom: 0;
    }

    .md-tile:active {
      transform: scale(0.97);
    }

    .md-tile.selected {
      background: var(--mathai-cell-bg-selected);
      border-color: var(--mathai-cell-border-selected);
      color: var(--mathai-purple);
    }

    .md-tile.locked {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
      color: var(--mathai-green);
      pointer-events: none;
      cursor: default;
    }

    .md-tile.correct-pulse {
      animation: correctPulse 0.2s ease;
    }

    .md-tile.wrong-flash {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-red);
    }

    .md-tile.shake {
      animation: shake 0.6s ease;
    }

    .md-col.isProcessing .md-tile:not(.locked) {
      opacity: 0.6;
      pointer-events: none;
    }

    .md-round-indicator {
      font-size: var(--mathai-font-size-small);
      font-weight: 600;
      color: var(--mathai-gray);
      text-align: center;
      margin: 4px 0 4px 0;
    }

    /* ====== 7. Landscape lock overlay ====== */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white, #ffffff);
        color: var(--mathai-primary, #270f36);
        font-family: var(--mathai-font-family, system-ui, -apple-system, sans-serif);
        font-size: var(--mathai-font-size-subtitle, 18px);
        text-align: center;
        padding: 24px;
      }
    }

    /* ====== 8. Micro-animations ====== */
    @keyframes correctPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-6px); }
      30% { transform: translateX(6px); }
      45% { transform: translateX(-5px); }
      60% { transform: translateX(5px); }
      80% { transform: translateX(-3px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes starPop {
      0%   { transform: scale(0); }
      60%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .fade-in { animation: fadeIn 0.3s ease forwards; }
    .star-earned { animation: starPop 0.4s ease forwards; }

    /* ====== 9. Touch targets ====== */
    button,
    .md-tile,
    [role="button"],
    input[type="submit"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    /* ====== 10. Gesture suppression ====== */
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="3" data-round="0"></div>

  <script>
    /* ====== 1. gameState initialization ====== */
    var gameState = {
      gameId: 'matching-doubles',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 9,
      score: 0,
      lives: 3,
      totalLives: 3,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      duration_data: {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      },
      roundStartTime: null,
      correctAnswer: null,
      /* Game-specific state */
      currentRoundObj: null,
      pairsMatchedInRound: 0,
      lockedLeftValues: [],
      lockedRightValues: [],
      selectedLeftValue: null,
      totalPairsMatched: 0,
      totalWrongMatches: 0,
      attemptIndexInRound: 0,
      timerElapsedMs: 0,
      finalElapsedMs: 0,
      previewResult: null,
      stars: 0
    };

    /* ====== 2. window.gameState ====== */
    window.gameState = gameState;

    /* ====== 3. fallbackContent (byte-for-byte per spec lines 176-266) ====== */
    var fallbackContent = {
      previewInstruction:
        '<p><strong>Match the doubles!</strong> Tap a number on the left, then tap its <em>double</em> (\u00D72) on the right. Finish all 9 rounds before you run out of 3 lives. The faster you finish, the more stars you earn!</p>',
      previewAudioText:
        'Match the doubles! Tap a number on the left, then tap its double on the right. Finish all nine rounds before you lose your three lives. The faster you finish, the more stars you earn.',
      previewAudio: null,
      showGameOnPreview: false,
      rounds: [
        {
          round: 1, stage: 1, type: 'A',
          left: [3, 5, 8],
          right: [16, 6, 10],
          pairs: { '3': 6, '5': 10, '8': 16 },
          misconception_tags: {}
        },
        {
          round: 2, stage: 1, type: 'A',
          left: [4, 7, 9],
          right: [18, 8, 14],
          pairs: { '4': 8, '7': 14, '9': 18 },
          misconception_tags: {}
        },
        {
          round: 3, stage: 1, type: 'A',
          left: [2, 6, 9],
          right: [18, 4, 12],
          pairs: { '2': 4, '6': 12, '9': 18 },
          misconception_tags: {}
        },
        {
          round: 4, stage: 2, type: 'A',
          left: [6, 11, 15, 22],
          right: [44, 12, 30, 22],
          pairs: { '6': 12, '11': 22, '15': 30, '22': 44 },
          misconception_tags: {}
        },
        {
          round: 5, stage: 2, type: 'A',
          left: [9, 13, 18, 25],
          right: [36, 18, 50, 26],
          pairs: { '9': 18, '13': 26, '18': 36, '25': 50 },
          misconception_tags: {}
        },
        {
          round: 6, stage: 2, type: 'A',
          left: [8, 14, 20, 27],
          right: [28, 40, 54, 16],
          pairs: { '8': 16, '14': 28, '20': 40, '27': 54 },
          misconception_tags: {}
        },
        {
          round: 7, stage: 3, type: 'A',
          left: [15, 18, 21, 24, 30],
          right: [36, 17, 42, 60, 30, 48],
          pairs: { '15': 30, '18': 36, '21': 42, '24': 48, '30': 60 },
          misconception_tags: {
            '17': 'double-add-instead'
          }
        },
        {
          round: 8, stage: 3, type: 'A',
          left: [17, 23, 28, 35, 40],
          right: [46, 29, 56, 80, 70, 34, 55],
          pairs: { '17': 34, '23': 46, '28': 56, '35': 70, '40': 80 },
          misconception_tags: {
            '29': 'double-next-number',
            '55': 'double-off-by-one'
          }
        },
        {
          round: 9, stage: 3, type: 'A',
          left: [19, 26, 33, 42, 50],
          right: [38, 52, 44, 66, 84, 100, 51],
          pairs: { '19': 38, '26': 52, '33': 66, '42': 84, '50': 100 },
          misconception_tags: {
            '44': 'double-add-instead',
            '51': 'double-next-number'
          }
        }
      ]
    };

    /* ====== 4. Module-scope vars ====== */
    var timer = null;
    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var interactionManager = null;

    /* ====== Sticker URLs ====== */
    var STICKER_CORRECT = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_INCORRECT = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_VICTORY = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_COMPLETE_2 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_COMPLETE_1 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_RESTART = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-102.gif';
    var STICKER_LEVEL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';

    /* ====== Stage labels ====== */
    function getStageLabel(stage) {
      if (stage === 1) return 'Warm-up';
      if (stage === 2) return 'Standard';
      return 'Confusability';
    }
    function getStageVO(stage) {
      if (stage === 1) return 'Tap a number, then tap its double!';
      if (stage === 2) return 'Bigger numbers. Keep doubling!';
      return 'Watch for tricky distractors!';
    }

    /* ====== 5. syncDOM ====== */
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound);
      /* Mirror phase onto #gameContent for archetype/test queries */
      var gc = document.getElementById('gameContent');
      if (gc) gc.setAttribute('data-phase', gameState.phase);
    }

    /* ====== 6. trackEvent ====== */
    function trackEvent(type, data) {
      var evt = Object.assign({ event: type, timestamp: Date.now() }, data || {});
      gameState.events.push(evt);
    }

    /* ====== 7. recordAttempt ====== */
    function recordAttempt(roundIndex, userInput, correct, metadata) {
      var rounds = getRounds();
      var round = rounds[roundIndex];
      var md = metadata || {};
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
        input_of_user: userInput,
        correct: correct,
        round_number: roundIndex + 1,
        question_id: 'r' + (roundIndex + 1),
        correct_answer: md.correct_answer != null ? md.correct_answer : null,
        response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
        misconception_tag: correct ? null : (md.misconception_tag || null),
        difficulty_level: round ? (round.stage || 1) : 1,
        is_retry: md.is_retry || false,
        metadata: md
      };
      gameState.attempts.push(attempt);
      gameState.duration_data.attempts.push({
        round: roundIndex + 1,
        timestamp: Date.now()
      });
    }

    /* ====== 8. getStars (time-only, per spec) ====== */
    function getStars() {
      /* 1-star floor when game ends via lives=0 */
      if (gameState.lives <= 0) return 1;
      var elapsedMs = gameState.finalElapsedMs || gameState.timerElapsedMs || 0;
      var elapsedS = elapsedMs / 1000;
      if (elapsedS <= 60) return 3;
      if (elapsedS <= 90) return 2;
      return 1;
    }

    /* ====== 9. getRounds ====== */
    function getRounds() {
      if (gameState.content && gameState.content.rounds &&
          gameState.content.rounds.length >= gameState.totalRounds) {
        return gameState.content.rounds;
      }
      return fallbackContent.rounds;
    }

    /* ====== 10. waitForPackages ====== */
    async function waitForPackages() {
      var startTime = Date.now();
      var timeout = 120000;
      while (
        typeof FeedbackManager === 'undefined' ||
        typeof TimerComponent === 'undefined' ||
        typeof VisibilityTracker === 'undefined' ||
        typeof SignalCollector === 'undefined' ||
        typeof ScreenLayout === 'undefined' ||
        typeof TransitionScreenComponent === 'undefined' ||
        typeof PreviewScreenComponent === 'undefined' ||
        typeof ProgressBarComponent === 'undefined'
      ) {
        if (Date.now() - startTime > timeout) {
          throw new Error('[waitForPackages] Packages failed to load within ' + timeout + 'ms');
        }
        await new Promise(function(r) { setTimeout(r, 50); });
      }
      return true;
    }

    /* ====== 11. Audio helpers ====== */
    function preloadAudio() {
      try {
        FeedbackManager.sound.preload([
          { id: 'correct_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
          { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
          { id: 'sound_life_lost', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
          { id: 'rounds_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
          { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
          { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
          { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
          { id: 'tap_sound', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' },
          { id: 'sound_bubble_select', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3' },
          { id: 'sound_bubble_deselect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758712800721.mp3' },
          { id: 'all_correct', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506764346.mp3' },
          { id: 'new_cards', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432104595.mp3' }
        ]);
      } catch (e) {
        console.error('[preload] Audio preload error:', e.message);
      }
    }

    /* ====== 12. handlePostMessage ====== */
    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      if (event.data.type === 'game_init') {
        gameState.phase = 'playing';
        syncDOM();
        if (event.data.content) {
          gameState.content = event.data.content;
          if (event.data.content.rounds && event.data.content.rounds.length > 0) {
            gameState.totalRounds = event.data.content.rounds.length;
          }
        }
        gameState.signalConfig = event.data.signalConfig || {};
        if (event.data.signalConfig && signalCollector) {
          try {
            signalCollector.sessionId = event.data.signalConfig.sessionId;
            signalCollector.studentId = event.data.signalConfig.studentId;
            signalCollector.contentSetId = event.data.signalConfig.contentSetId;
            signalCollector.flushUrl = event.data.signalConfig.flushUrl;
            signalCollector.playId = event.data.signalConfig.playId;
            signalCollector.gameId = event.data.signalConfig.gameId || 'matching-doubles';
            signalCollector.startFlushing();
          } catch (e) {
            console.error('[signalCollector] Config error:', e.message);
          }
        }
        if (progressBar) {
          createProgressBar();
        }
      }
    }

    /* ====== 13. createProgressBar helper ====== */
    function createProgressBar() {
      try { if (progressBar) progressBar.destroy(); } catch(e) {}
      try {
        progressBar = new ProgressBarComponent({
          slotId: 'mathai-progress-slot',
          totalRounds: gameState.totalRounds,
          totalLives: Math.max(1, gameState.totalLives)
        });
        progressBar.show();
        progressBar.update(0, gameState.totalLives);
      } catch (e) {
        console.error('[progressBar] create error:', e.message);
      }
    }

    /* ====== 14. Create Timer (hidden host for TimerComponent; preview header mirrors it) ====== */
    function createTimer() {
      try {
        /* Ensure a host node for TimerComponent exists (off-screen; preview header
           reads timerInstance each frame and mirrors display). */
        var host = document.getElementById('timer-container');
        if (!host) {
          host = document.createElement('div');
          host.id = 'timer-container';
          host.style.position = 'absolute';
          host.style.left = '-9999px';
          host.style.top = '-9999px';
          host.style.width = '1px';
          host.style.height = '1px';
          host.style.overflow = 'hidden';
          host.setAttribute('aria-hidden', 'true');
          document.body.appendChild(host);
        }
        timer = new TimerComponent('timer-container', {
          timerType: 'increase',
          format: 'min',
          startTime: 0,
          endTime: 100000,
          autoStart: false,
          onEnd: function() { /* never fires in count-up with huge endTime */ }
        });
      } catch (e) {
        console.error('[timer] create error:', e.message);
        timer = null;
      }
    }

    function getTimerElapsedMs() {
      /* GEN-TIMER-GETTIME: TimerComponent has no getTime/getCurrentTime method.
         Valid methods: start/stop/pause/resume/reset/destroy. For elapsed time
         use Date.now() - gameState.startTime. */
      return gameState.startTime ? (Date.now() - gameState.startTime) : 0;
    }

    /* ====== 15. Inject game HTML into #gameContent ====== */
    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="md-round-indicator" id="roundIndicator" aria-live="polite"></div>' +
        '<div class="md-columns" id="mdColumns">' +
          '<div class="md-col" id="mdColLeft" data-side="left">' +
            '<div class="md-col-label">Number</div>' +
            '<div class="md-col-tiles" id="mdLeftTiles"></div>' +
          '</div>' +
          '<div class="md-col" id="mdColRight" data-side="right">' +
            '<div class="md-col-label">Double</div>' +
            '<div class="md-col-tiles" id="mdRightTiles"></div>' +
          '</div>' +
        '</div>';
    }

    /* ====== Render round skeleton (initial state for preview) ====== */
    function renderInitialState() {
      var rounds = getRounds();
      var round = rounds[0];
      if (!round) return;
      gameState.currentRoundObj = round;
      gameState.correctAnswer = null;
      gameState.selectedLeftValue = null;
      gameState.lockedLeftValues = [];
      gameState.lockedRightValues = [];
      gameState.pairsMatchedInRound = 0;
      gameState.attemptIndexInRound = 0;
      paintRoundTiles(round);
    }

    /* Shared renderer: draws left+right columns for a round */
    function paintRoundTiles(round) {
      var leftHost = document.getElementById('mdLeftTiles');
      var rightHost = document.getElementById('mdRightTiles');
      var indicator = document.getElementById('roundIndicator');
      if (indicator) {
        indicator.textContent = 'Round ' + (round.round || (gameState.currentRound + 1)) + ' of ' + gameState.totalRounds;
      }
      if (!leftHost || !rightHost) return;
      leftHost.innerHTML = '';
      rightHost.innerHTML = '';

      var i;
      for (i = 0; i < round.left.length; i++) {
        var leftVal = round.left[i];
        var lt = document.createElement('div');
        lt.className = 'md-tile fade-in';
        lt.setAttribute('role', 'button');
        lt.setAttribute('tabindex', '0');
        lt.setAttribute('data-side', 'left');
        lt.setAttribute('data-value', String(leftVal));
        lt.setAttribute('data-testid', 'left-' + i);
        lt.setAttribute('aria-label', 'Number ' + leftVal + ', left column');
        lt.setAttribute('aria-pressed', 'false');
        lt.textContent = String(leftVal);
        lt.addEventListener('click', handleLeftTileTap);
        leftHost.appendChild(lt);
      }
      for (i = 0; i < round.right.length; i++) {
        var rightVal = round.right[i];
        var rt = document.createElement('div');
        rt.className = 'md-tile fade-in';
        rt.setAttribute('role', 'button');
        rt.setAttribute('tabindex', '0');
        rt.setAttribute('data-side', 'right');
        rt.setAttribute('data-value', String(rightVal));
        rt.setAttribute('data-testid', 'right-' + i);
        rt.setAttribute('aria-label', 'Double ' + rightVal + ', right column');
        rt.setAttribute('aria-pressed', 'false');
        rt.textContent = String(rightVal);
        rt.addEventListener('click', handleRightTileTap);
        rightHost.appendChild(rt);
      }
    }

    /* ====== 16. renderRound (loadRound) ====== */
    function renderRound() {
      gameState.isProcessing = false;
      gameState.isActive = true;
      gameState.phase = 'gameplay';

      /* Reset per-round state */
      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      if (!round) return;
      gameState.currentRoundObj = round;
      gameState.correctAnswer = null;
      gameState.selectedLeftValue = null;
      gameState.lockedLeftValues = [];
      gameState.lockedRightValues = [];
      gameState.pairsMatchedInRound = 0;
      gameState.attemptIndexInRound = 0;
      gameState.roundStartTime = Date.now();

      syncDOM();

      /* Clear any lingering sticker/subtitle */
      try {
        if (FeedbackManager && FeedbackManager.feedback) {
          FeedbackManager.feedback.hideAll();
        }
      } catch(e) {}

      /* Ensure gameContent visible after transition screen */
      var gc = document.getElementById('gameContent');
      if (gc) gc.style.display = '';

      paintRoundTiles(round);

      if (progressBar) {
        try {
          progressBar.update(gameState.currentRound, Math.max(0, gameState.lives));
        } catch(e) {}
      }

      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('content_render', {
            screen: 'gameplay',
            content_snapshot: {
              round: round.round,
              stage: round.stage,
              pairs: round.left.length
            }
          });
        } catch(e) {}
      }

      /* Ambient "new cards" SFX (fire-and-forget) */
      try { FeedbackManager.sound.play('new_cards').catch(function(){}); } catch(e) {}

      syncDOM();
    }

    /* ====== 17. Left tile tap handler ====== */
    function handleLeftTileTap(e) {
      if (gameState.isProcessing || gameState.gameEnded || !gameState.isActive) return;
      var tile = e.currentTarget;
      if (tile.classList.contains('locked')) return;

      var value = Number(tile.getAttribute('data-value'));

      /* If this value is already selected, DESELECT it */
      if (gameState.selectedLeftValue === value) {
        gameState.selectedLeftValue = null;
        tile.classList.remove('selected');
        tile.setAttribute('aria-pressed', 'false');
        try { FeedbackManager.sound.play('sound_bubble_deselect').catch(function(){}); } catch(e) {}
        return;
      }

      /* Clear any previously-selected left tile */
      var leftHost = document.getElementById('mdLeftTiles');
      if (leftHost) {
        var prev = leftHost.querySelectorAll('.md-tile.selected');
        for (var i = 0; i < prev.length; i++) {
          prev[i].classList.remove('selected');
          prev[i].setAttribute('aria-pressed', 'false');
        }
      }

      gameState.selectedLeftValue = value;
      tile.classList.add('selected');
      tile.setAttribute('aria-pressed', 'true');
      try { FeedbackManager.sound.play('sound_bubble_select').catch(function(){}); } catch(e) {}
    }

    /* ====== 18. Right tile tap handler (commit match) ====== */
    function handleRightTileTap(e) {
      if (gameState.isProcessing || gameState.gameEnded || !gameState.isActive) return;
      var tile = e.currentTarget;
      if (tile.classList.contains('locked')) return;

      /* Need a selected left tile first */
      if (gameState.selectedLeftValue == null) {
        /* soft bubble to signal "pick a left first" */
        try { FeedbackManager.sound.play('sound_bubble_select').catch(function(){}); } catch(e) {}
        return;
      }

      gameState.isProcessing = true;

      var rightVal = Number(tile.getAttribute('data-value'));
      var leftVal = gameState.selectedLeftValue;
      var round = gameState.currentRoundObj;
      var expected = round.pairs[String(leftVal)];
      var isCorrect = (expected === rightVal);

      gameState.attemptIndexInRound = gameState.attemptIndexInRound + 1;

      /* Find matching left DOM tile */
      var leftHost = document.getElementById('mdLeftTiles');
      var leftTile = null;
      if (leftHost) {
        var lts = leftHost.querySelectorAll('.md-tile');
        for (var i = 0; i < lts.length; i++) {
          if (Number(lts[i].getAttribute('data-value')) === leftVal &&
              !lts[i].classList.contains('locked')) {
            leftTile = lts[i];
            break;
          }
        }
      }

      /* Misconception tag (wrong only) */
      var misconceptionTag = null;
      if (!isCorrect && round.misconception_tags) {
        misconceptionTag = round.misconception_tags[String(rightVal)] || null;
      }

      /* recordAttempt synchronously BEFORE SFX (per plan) */
      recordAttempt(gameState.currentRound, {
        left_value: leftVal,
        right_value: rightVal
      }, isCorrect, {
        round: round.round,
        stage: round.stage,
        type: 'A',
        left_value: leftVal,
        right_value: rightVal,
        is_correct: isCorrect,
        misconception_tag: misconceptionTag,
        attempt_index: gameState.attemptIndexInRound,
        pairs_matched_in_round: gameState.pairsMatchedInRound,
        lives_remaining: gameState.lives,
        elapsed_ms: getTimerElapsedMs(),
        correct_answer: expected,
        is_retry: false
      });

      trackEvent('answer_submitted', {
        round: gameState.currentRound + 1,
        left_value: leftVal,
        right_value: rightVal,
        correct: isCorrect
      });

      if (isCorrect) {
        handleCorrectMatch(leftTile, tile, leftVal, rightVal);
      } else {
        handleWrongMatch(leftTile, tile, leftVal, rightVal);
      }
    }

    /* ====== Correct match: lock pair, fire-and-forget SFX ====== */
    function handleCorrectMatch(leftTile, rightTile, leftVal, rightVal) {
      gameState.selectedLeftValue = null;
      gameState.pairsMatchedInRound = gameState.pairsMatchedInRound + 1;
      gameState.totalPairsMatched = gameState.totalPairsMatched + 1;
      gameState.score = gameState.totalPairsMatched;
      gameState.lockedLeftValues.push(leftVal);
      gameState.lockedRightValues.push(rightVal);
      syncDOM();

      if (leftTile) {
        leftTile.classList.remove('selected');
        leftTile.classList.add('locked', 'correct-pulse');
        leftTile.setAttribute('aria-pressed', 'false');
        leftTile.setAttribute('aria-disabled', 'true');
      }
      if (rightTile) {
        rightTile.classList.add('locked', 'correct-pulse');
        rightTile.setAttribute('aria-disabled', 'true');
      }

      /* Clear pulse after 200ms */
      setTimeout(function() {
        if (leftTile) leftTile.classList.remove('correct-pulse');
        if (rightTile) rightTile.classList.remove('correct-pulse');
      }, 220);

      /* Check round completion BEFORE firing SFX so victory-path can skip round-complete SFX */
      var round = gameState.currentRoundObj;
      var roundComplete = (gameState.pairsMatchedInRound >= round.left.length);

      if (roundComplete) {
        /* Capture final elapsed ms AT this moment for victory-path star calc */
        gameState.timerElapsedMs = getTimerElapsedMs();

        if (gameState.currentRound >= gameState.totalRounds - 1) {
          /* Final round → Victory path: skip both correct SFX and round-complete SFX */
          gameState.finalElapsedMs = gameState.timerElapsedMs;
          gameState.isProcessing = false;
          trackEvent('round_complete', { round: gameState.currentRound + 1, all_pairs_matched: true });
          endGame(true);
          return;
        }

        /* Non-final round: fire correct SFX (fire-and-forget), then awaited round-complete */
        try {
          FeedbackManager.sound.play('correct_sound_effect', { sticker: STICKER_CORRECT })
            .catch(function(){});
        } catch(e) {}

        advanceAfterRoundComplete();
        return;
      }

      /* Mid-round correct: fire-and-forget SFX + sticker, NO TTS, NO subtitle */
      try {
        FeedbackManager.sound.play('correct_sound_effect', { sticker: STICKER_CORRECT })
          .catch(function(){});
      } catch(e) {}

      /* Input unblocks immediately — student can tap next left */
      gameState.isProcessing = false;
      trackEvent('round_complete', { round: gameState.currentRound + 1, pair_matched: true });
    }

    /* ====== Round-complete → awaited SFX + sticker + subtitle, then advance ====== */
    async function advanceAfterRoundComplete() {
      gameState.phase = 'round_complete';
      syncDOM();

      try {
        await Promise.all([
          FeedbackManager.sound.play('all_correct', {
            sticker: STICKER_ROUND,
            subtitle: 'Round complete!'
          }),
          new Promise(function(r) { setTimeout(r, 1500); })
        ]);
      } catch(e) {
        console.error('[audio] round-complete SFX error:', e.message);
      }

      gameState.isProcessing = false;
      trackEvent('round_complete', { round: gameState.currentRound + 1, all_pairs_matched: true });

      /* Advance */
      gameState.currentRound = gameState.currentRound + 1;
      if (gameState.currentRound >= gameState.totalRounds) {
        /* Safety path — should have been handled in handleCorrectMatch */
        endGame(true);
        return;
      }
      if (gameState.lives <= 0) {
        endGame(false);
        return;
      }
      /* Progress bar reflects round advance (rounds completed = current index) */
      if (progressBar) {
        try { progressBar.update(gameState.currentRound, Math.max(0, gameState.lives)); } catch(e) {}
      }
      showRoundIntro();
    }

    /* ====== Wrong match: shake + red flash + lives-- + fire-and-forget wrong SFX ====== */
    function handleWrongMatch(leftTile, rightTile, leftVal, rightVal) {
      gameState.lives = gameState.lives - 1;
      gameState.totalWrongMatches = gameState.totalWrongMatches + 1;
      syncDOM();

      if (leftTile) {
        leftTile.classList.add('wrong-flash', 'shake');
      }
      if (rightTile) {
        rightTile.classList.add('wrong-flash', 'shake');
      }

      /* Progress bar: hearts decrement only */
      if (progressBar) {
        try { progressBar.update(gameState.currentRound, Math.max(0, gameState.lives)); } catch(e) {}
      }

      /* Last life lost? Skip wrong SFX, render Game Over first, send postMessage, then audio */
      if (gameState.lives <= 0) {
        /* Clean flash state before leaving gameplay */
        setTimeout(function() {
          if (leftTile) {
            leftTile.classList.remove('wrong-flash', 'shake', 'selected');
            leftTile.setAttribute('aria-pressed', 'false');
          }
          if (rightTile) {
            rightTile.classList.remove('wrong-flash', 'shake');
          }
        }, 620);
        gameState.selectedLeftValue = null;
        gameState.isProcessing = false;
        trackEvent('round_complete', { round: gameState.currentRound + 1, out_of_lives: true });
        /* Capture elapsed at game-over moment */
        gameState.timerElapsedMs = getTimerElapsedMs();
        gameState.finalElapsedMs = gameState.timerElapsedMs;
        endGame(false);
        return;
      }

      /* Fire wrong SFX (fire-and-forget) per multi-step rule */
      try {
        FeedbackManager.sound.play('incorrect_sound_effect', { sticker: STICKER_INCORRECT })
          .catch(function(){});
      } catch(e) {}

      /* Deselect tiles after shake completes */
      setTimeout(function() {
        if (leftTile) {
          leftTile.classList.remove('wrong-flash', 'shake', 'selected');
          leftTile.setAttribute('aria-pressed', 'false');
        }
        if (rightTile) {
          rightTile.classList.remove('wrong-flash', 'shake');
        }
        gameState.selectedLeftValue = null;
        gameState.isProcessing = false;
      }, 620);

      trackEvent('round_complete', { round: gameState.currentRound + 1, wrong_match: true });
    }

    /* ====== Round intro transition (awaited) ====== */
    async function showRoundIntro() {
      var roundNum = gameState.currentRound + 1;
      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      if (!round) return;

      var pairs = round.left.length;
      var stage = round.stage || 1;
      var stageLabel = getStageLabel(stage);
      var stageVO = getStageVO(stage);
      var subtitle = stageLabel + ' \u00B7 ' + pairs + ' pairs';
      var audioStopped = false;

      try {
        await transitionScreen.show({
          title: 'Round ' + roundNum,
          subtitle: subtitle,
          icons: ['\uD83C\uDFAF'],
          buttons: [{
            text: 'Start',
            primary: true,
            action: function() {
              audioStopped = true;
              try { FeedbackManager.sound.pause(); FeedbackManager._stopCurrentDynamic(); } catch(e) {}
              try { FeedbackManager.feedback.hideAll(); } catch(e) {}
              try { transitionScreen.hide(); } catch(e) {}
              renderRound();
            }
          }],
          persist: true,
          onMounted: function() {
            (async function() {
              try {
                await FeedbackManager.sound.play('rounds_sound_effect', { sticker: STICKER_ROUND });
                if (audioStopped) return;
                await FeedbackManager.playDynamicFeedback({
                  audio_content: stageVO,
                  subtitle: stageVO.length > 60 ? stageVO.substring(0, 57) + '...' : stageVO,
                  sticker: STICKER_ROUND
                });
              } catch(e) {}
            })();
          }
        });
      } catch(e) {
        console.error('[transition] round intro error:', e.message);
      }
    }

    /* ====== 19. endGame ====== */
    function endGame(won) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;

      /* Pause the timer so later reads are stable */
      try {
        if (timer && typeof timer.pause === 'function') timer.pause();
      } catch(e) {}

      /* Capture final elapsed if not already set */
      if (!gameState.finalElapsedMs) {
        gameState.finalElapsedMs = getTimerElapsedMs();
      }
      gameState.timerElapsedMs = gameState.finalElapsedMs;

      gameState.phase = won ? 'results' : 'game_over';
      syncDOM();

      gameState.stars = getStars();

      trackEvent('game_end', {
        won: won,
        pairs: gameState.totalPairsMatched,
        wrong: gameState.totalWrongMatches,
        stars: gameState.stars,
        elapsed_ms: gameState.finalElapsedMs
      });

      /* Compute tries per round */
      var tries = [];
      for (var r = 0; r < gameState.totalRounds; r++) {
        var count = 0;
        for (var a = 0; a < gameState.attempts.length; a++) {
          if (gameState.attempts[a].round_number === r + 1) count++;
        }
        if (count > 0) tries.push({ round: r + 1, tries: count });
      }

      var totalAttempts = gameState.attempts.length;
      var correctAttempts = 0;
      for (var k = 0; k < gameState.attempts.length; k++) {
        if (gameState.attempts[k].correct) correctAttempts++;
      }
      var accuracy = totalAttempts > 0 ? Math.round((correctAttempts / totalAttempts) * 100) : 0;

      /* Seal signal collector */
      if (signalCollector) {
        try { signalCollector.seal(); } catch(e) {}
      }

      /* game_complete postMessage BEFORE audio */
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: {
              accuracy: accuracy,
              time: Math.round(gameState.finalElapsedMs / 1000),
              stars: gameState.stars,
              attempts: gameState.attempts,
              duration_data: gameState.duration_data,
              totalLives: gameState.totalLives,
              tries: tries
            },
            completedAt: Date.now(),
            previewResult: gameState.previewResult || null,
            game_id: 'matching-doubles',
            outcome: won ? 'victory' : 'game_over',
            final_elapsed_ms: gameState.finalElapsedMs,
            rounds_completed: won ? gameState.totalRounds : gameState.currentRound,
            total_pairs_matched: gameState.totalPairsMatched,
            total_wrong_matches: gameState.totalWrongMatches,
            lives_remaining: Math.max(0, gameState.lives),
            preview_duration_ms: gameState.previewResult && gameState.previewResult.duration
              ? Math.round(gameState.previewResult.duration * 1000)
              : 0,
            signal_event_count: signalCollector ? (signalCollector.getEventCount ? signalCollector.getEventCount() : 0) : 0,
            signal_metadata: signalCollector ? (signalCollector.getMetadata ? signalCollector.getMetadata() : {}) : {}
          }
        }, '*');
      } catch(e) {
        console.error('[postMessage] game_complete error:', e.message);
      }

      /* Destroy preview screen (once, here — PART-039) */
      try { if (previewScreen) previewScreen.destroy(); } catch(e) {}

      /* Stop (do not destroy) timer so restart can reset it */
      try { if (timer && typeof timer.stop === 'function') timer.stop(); } catch(e) {}

      /* Show end screen */
      if (won) {
        showVictory();
      } else {
        showGameOver();
      }
    }

    /* ====== Victory screen ====== */
    async function showVictory() {
      var stars = gameState.stars;
      var audioStopped = false;
      var elapsedS = Math.round(gameState.finalElapsedMs / 1000);

      var voText;
      if (stars === 3) voText = 'Lightning fast doubling!';
      else if (stars === 2) voText = 'Nice work!';
      else voText = 'You finished — let\u2019s get faster next time!';

      var buttons = [];
      buttons.push({
        text: 'Play Again',
        action: function() {
          audioStopped = true;
          try { FeedbackManager.sound.pause(); FeedbackManager._stopCurrentDynamic(); } catch(e) {}
          try { FeedbackManager.feedback.hideAll(); } catch(e) {}
          try { transitionScreen.hide(); } catch(e) {}
          restartGame();
        }
      });
      buttons.push({
        text: 'Claim Stars',
        primary: true,
        action: function() {
          audioStopped = true;
          try { FeedbackManager.sound.pause(); FeedbackManager._stopCurrentDynamic(); } catch(e) {}
          try { FeedbackManager.feedback.hideAll(); } catch(e) {}
          try { transitionScreen.hide(); } catch(e) {}
          showStarsCollected();

      });

      try {
        await transitionScreen.show({
          title: 'Victory \uD83C\uDF89',
          subtitle: subtitle,
          stars: stars,
          buttons: buttons,
          persist: true,
          onMounted: function() {
            (async function() {
              var sfxId = stars === 3 ? 'victory_sound_effect' : 'game_complete_sound_effect';
              var sticker = stars === 3 ? STICKER_VICTORY : (stars === 2 ? STICKER_COMPLETE_2 : STICKER_COMPLETE_1);
              try {
                await FeedbackManager.sound.play(sfxId, { sticker: sticker });
                if (audioStopped) return;
                await FeedbackManager.playDynamicFeedback({
                  audio_content: voText,
                  subtitle: voText.length > 60 ? voText.substring(0, 57) + '...' : voText,
                  sticker: sticker
                });
              } catch(e) {}
            })();
          }
        });
      } catch(e) {
        console.error('[transition] victory error:', e.message);
      }
    }

    /* ====== Game over screen ====== */
    async function showGameOver() {
      var audioStopped = false;
      var pairs = gameState.totalPairsMatched;
      var totalPairsPossible = 0;
      var rounds = getRounds();
      for (var i = 0; i < rounds.length; i++) {
        totalPairsPossible += rounds[i].left.length;

            text: 'Try Again',

    /* ====== Stars collected screen ====== */
    async function showStarsCollected() {
      var stars = gameState.stars;
      try {
        await transitionScreen.show({
          title: 'Yay!\n' + stars + ' Star' + (stars > 1 ? 's' : '') + ' Collected!',
          styles: { title: { whiteSpace: 'pre-line' } },

            } catch(e) {}

    /* ====== 20. setupGame ====== */
    function setupGame() {
      var content = gameState.content || fallbackContent;

      /* 1. Render Round 1 grid skeleton into #gameContent FIRST */
      injectGameHTML();
      renderInitialState();

      /* 2. Show preview LAST */
      if (previewScreen) {
        try {
          previewScreen.show({
            instruction: content.previewInstruction || fallbackContent.previewInstruction,
            audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
            showGameOnPreview: content.showGameOnPreview === true,
            timerConfig: { type: 'increase', startTime: 0, endTime: 100000 },
            timerInstance: timer || null,
            onComplete: function(previewData) {
              startGameAfterPreview(previewData);
            }
          });
        } catch(e) {
          console.error('[preview] show error:', e.message);
        }
      }
    }

    /* ====== 21. startGameAfterPreview ====== */
    async function startGameAfterPreview(previewData) {
      gameState.previewResult = previewData;
      gameState.duration_data.preview = gameState.duration_data.preview || [];
      gameState.duration_data.preview.push({
        duration: previewData ? previewData.duration : 0
      });

      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.phase = 'round_intro';
      syncDOM();

      /* Start the count-up timer */
      try {
        if (timer && typeof timer.start === 'function') timer.start();
      } catch(e) {}

      trackEvent('game_start', { totalRounds: gameState.totalRounds });

      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' });
        } catch(e) {}
      }

      if (progressBar) {
        try {
          progressBar.show();
          progressBar.update(0, gameState.totalLives);
        } catch(e) {}
      }

      /* Directly into Round 1 intro (preview IS the welcome per PART-039) */
      await showRoundIntro();
    }

    /* ====== startGame (standalone fallback — no preview, no transitions) ====== */
    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.phase = 'gameplay';
      gameState.pairsMatchedInRound = 0;
      gameState.lockedLeftValues = [];
      gameState.lockedRightValues = [];
      gameState.selectedLeftValue = null;
      gameState.totalPairsMatched = 0;
      gameState.totalWrongMatches = 0;
      gameState.attemptIndexInRound = 0;
      gameState.timerElapsedMs = 0;
      gameState.finalElapsedMs = 0;

      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();

      try {
        if (timer && typeof timer.start === 'function') timer.start();
      } catch(e) {}

      if (progressBar) {
        try {
          progressBar.show();
          progressBar.update(0, gameState.totalLives);
        } catch(e) {}
      }

      renderRound();
    }

    /* ====== 22. restartGame ====== */
    function restartGame() {
      /* Stop all audio */
      try { FeedbackManager.sound.pause(); } catch(e) {}
      try { FeedbackManager.stream.stopAll(); } catch(e) {}
      try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}

      /* Reset timer to 0 */
      try {
        if (timer) {
          if (typeof timer.reset === 'function') timer.reset();
          if (typeof timer.stop === 'function') timer.stop();
        }
      } catch(e) {}

      /* Reset state (PART-039: do NOT re-show preview) */
      gameState.phase = 'round_intro';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.roundStartTime = null;
      gameState.correctAnswer = null;
      gameState.currentRoundObj = null;
      gameState.pairsMatchedInRound = 0;
      gameState.lockedLeftValues = [];
      gameState.lockedRightValues = [];
      gameState.selectedLeftValue = null;
      gameState.totalPairsMatched = 0;
      gameState.totalWrongMatches = 0;
      gameState.attemptIndexInRound = 0;
      gameState.timerElapsedMs = 0;
      gameState.finalElapsedMs = 0;
      gameState.stars = 0;
      gameState.duration_data = {
        startTime: new Date().toISOString(),
        preview: gameState.duration_data.preview || [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      };

      /* Reset signal collector */
      if (signalCollector) {
        try { signalCollector.reset(); } catch(e) {}
      }

      /* Recreate progress bar */
      createProgressBar();

      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();

      /* Ensure game DOM present */
      if (!document.getElementById('gameContent') ||
          !document.getElementById('mdLeftTiles')) {
        injectGameHTML();
      }

      /* Restart the timer */
      try {
        if (timer && typeof timer.start === 'function') timer.start();
      } catch(e) {}

      /* Skip preview + welcome on restart → first round intro */
      showRoundIntro();
    }

    /* ====== Fallback layout builder ====== */
    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      app.innerHTML =
        '<div id="mathai-progress-slot"></div>' +
        '<div class="game-stack">' +
          '<div id="gameContent"></div>' +
          '<div id="mathai-transition-slot"></div>' +
        '</div>';
    }

    /* ====== DOMContentLoaded — init sequence ====== */
    document.addEventListener('DOMContentLoaded', async function() {
      try {
        /* 1. await waitForPackages() */
        var packagesLoaded = await waitForPackages();

        if (packagesLoaded) {
          /* 2. await FeedbackManager.init() */
          try { await FeedbackManager.init(); } catch(e) {
            console.error('[init] FeedbackManager.init error:', e.message);
          }

          /* 3. SignalCollector creation */
          try {
            signalCollector = new SignalCollector({ gameId: 'matching-doubles' });
          } catch(e) {
            console.error('[init] SignalCollector error:', e.message);
          }

          /* 4. ScreenLayout slot injection -- preview wrapper mode */
          try {
            ScreenLayout.inject('app', {
              slots: {
                previewScreen: true,
                progressBar: true,
                transitionScreen: true
              }
            });
          } catch(e) {
            console.error('[init] ScreenLayout.inject error:', e.message);
          }

          /* 5. InteractionManager creation */
          try {
            interactionManager = new InteractionManager({
              selector: '#gameContent',
              disableOnAudioFeedback: false,
              disableOnEvaluation: true
            });
            window.interactionManager = interactionManager;
          } catch(e) {
            console.error('[init] InteractionManager error:', e.message);
          }

          /* 6. TimerComponent creation (count-up, no limit) */
          createTimer();

          /* 7. VisibilityTracker creation */
          try {
            visibilityTracker = new VisibilityTracker({
              onInactive: function() {
                try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch(e) {}
                try { if (timer && typeof timer.pause === 'function') timer.pause({ fromVisibilityTracker: true }); } catch(e) {}
                try { if (previewScreen) previewScreen.pause(); } catch(e) {}
                if (gameState.isActive && !gameState.gameEnded) {
                  gameState.phase = 'paused';
                  syncDOM();
                }
              },
              onResume: function() {
                try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch(e) {}
                try { if (timer && typeof timer.resume === 'function') timer.resume({ fromVisibilityTracker: true }); } catch(e) {}
                try { if (previewScreen) previewScreen.resume(); } catch(e) {}
                if (gameState.isActive && !gameState.gameEnded && gameState.phase === 'paused') {
                  gameState.phase = 'gameplay';
                  syncDOM();
                }
              },
              autoShowPopup: true
            });
          } catch(e) {
            console.error('[init] VisibilityTracker error:', e.message);
          }

          /* 8. ProgressBar */
          createProgressBar();

          /* 9. TransitionScreenComponent creation */
          try {
            transitionScreen = new TransitionScreenComponent({
              autoInject: true,
              slotId: 'mathai-transition-slot',
              gameContentId: 'gameContent'
            });
          } catch(e) {
            console.error('[init] TransitionScreen error:', e.message);
          }

          /* 10. PreviewScreenComponent creation */
          try {
            previewScreen = new PreviewScreenComponent({
              slotId: 'mathai-preview-slot'
            });
          } catch(e) {
            console.error('[init] PreviewScreen error:', e.message);
          }

          /* 11. Audio preloading */
          preloadAudio();

          /* 12. Register handlePostMessage listener BEFORE game_ready */
          window.addEventListener('message', handlePostMessage);

          /* 13. Send game_ready postMessage */
          window.parent.postMessage({ type: 'game_ready' }, '*');

          /* 14. setupGame (preview IS first screen per PART-039) */
          setupGame();
        }
      } catch (e) {
        console.error('[init] ' + e.message);
        /* Packages failed — build fallback layout */
        try {
          buildFallbackLayout();
          window.addEventListener('message', handlePostMessage);
          window.parent.postMessage({ type: 'game_ready' }, '*');
        } catch (e2) {
          console.error('[init] fallback error:', e2.message);
        }
      }

      /* Standalone fallback — runs INDEPENDENTLY of waitForPackages */
      setTimeout(function() {
        /* Standalone-fallback gate: abort if preview is live */
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (!gameState.isActive && !gameState.gameEnded) {
          if (!document.getElementById('gameContent')) {
            buildFallbackLayout();
          }
          gameState.content = fallbackContent;
          gameState.totalRounds = fallbackContent.rounds.length;
          if (!document.getElementById('mdLeftTiles')) {
            injectGameHTML();
          }
          startGame();
        }
      }, 2000);

      /* Window exposures */
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.nextRound = function() {
        /* Manually advance one round (test-harness hook) */
        if (gameState.gameEnded) return;
        gameState.currentRound = gameState.currentRound + 1;
        if (gameState.currentRound >= gameState.totalRounds) {
          endGame(true);
          return;
        }
        renderRound();
      };
      window.startGame = startGame;
      window.loadRound = renderRound;
      window.signalCollector = signalCollector;

      /* Debug / test harness functions */
      window.debugGame = function() {
        return JSON.parse(JSON.stringify({
          phase: gameState.phase,
          currentRound: gameState.currentRound,
          totalRounds: gameState.totalRounds,
          score: gameState.score,
          lives: gameState.lives,
          totalLives: gameState.totalLives,
          isActive: gameState.isActive,
          isProcessing: gameState.isProcessing,
          gameEnded: gameState.gameEnded,
          attempts: gameState.attempts.length,
          events: gameState.events.length,
          totalPairsMatched: gameState.totalPairsMatched,
          totalWrongMatches: gameState.totalWrongMatches,
          pairsMatchedInRound: gameState.pairsMatchedInRound,
          selectedLeftValue: gameState.selectedLeftValue,
          timerElapsedMs: getTimerElapsedMs(),
          stars: getStars()
        }));
      };
      window.debugAudio = function() {
        try {
          return {
            feedbackManagerReady: typeof FeedbackManager !== 'undefined',
            initCalled: true
          };
        } catch(e) {
          return { error: e.message };
        }
      };
      window.testAudio = function() {
        try { FeedbackManager.sound.play('tap_sound'); return true; } catch(e) { return false; }
      };
      window.testPause = function() {
        try { FeedbackManager.sound.pause(); return true; } catch(e) { return false; }
      };
      window.testResume = function() {
        try { FeedbackManager.sound.resume(); return true; } catch(e) { return false; }
      };
    });
  </script>
</body>
</html>
