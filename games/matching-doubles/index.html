<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matching Doubles</title>

  <!-- ====== Game CDN packages (mandatory order: feedback-manager, components, helpers) ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 20px;
      --mathai-primary: #270f36;
      --mathai-level-text: #270F63;
      --mathai-purple: #9B51E0;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-amber: #E8A317;
      --mathai-yellow: #FFDE49;
      --mathai-soft-grey: #7A8088;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-card-bg: #FFF8EC;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #2A2438;
      --mathai-text-muted: #5A5666;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #E5F8EE;
      --mathai-cell-bg-amber: #FFF1D6;
      --mathai-cell-bg-grey: #ECEEF1;
      --mathai-cell-bg-red: #FFE3E3;
      --mathai-cell-border-green: #22A06B;
      --mathai-cell-border-amber: #E8A317;
      --mathai-cell-border-grey: #7A8088;
      --mathai-cell-border-red: #E35757;
      --mathai-accent-blue: #4A6FFF;
      --mathai-tile-bg: #FFFFFF;
      --mathai-tile-border: #D9DCE3;
      --mathai-tile-selected-bg: #E8EEFF;
      --mathai-tile-selected-border: #4A6FFF;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 26px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 22px;
      --mathai-font-size-tile: 22px;
      --mathai-padding-large: 28px 20px;
      --mathai-padding-medium: 16px 20px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 20px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 12px;
      --mathai-border-radius-card: 16px;
      --mathai-success: #22A06B;
      --mathai-error: #E35757;
      --mathai-warning: #E8A317;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    #mathai-preview-slot {
      height: 100dvh;
      overflow: hidden;
      position: relative; /* positioning context for absolute-centered #timer-container */
    }
    #mathai-preview-slot .mathai-preview-body {
      height: 100dvh;
      box-sizing: border-box;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .hidden { display: none !important; }

    /* ====== Game-specific styles ====== */
    .md-stack {
      width: 100%;
      padding: 12px 16px 24px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .md-prompt-card {
      background: var(--mathai-card-bg);
      border: 2px solid #F0E1C0;
      border-radius: var(--mathai-border-radius-card);
      padding: 14px 16px;
      text-align: center;
      margin-bottom: 14px;
    }

    .md-stage-chip {
      display: inline-block;
      font-size: var(--mathai-font-size-small);
      font-weight: 700;
      color: var(--mathai-text-muted);
      background: var(--mathai-light-gray);
      border-radius: 999px;
      padding: 4px 12px;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .md-prompt {
      font-size: var(--mathai-font-size-subtitle);
      font-weight: 700;
      color: var(--mathai-primary);
      line-height: 1.35;
    }

    .md-grid {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      margin-top: 4px;
    }

    .md-col {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      flex: 1 1 0;
      min-width: 0;
      max-width: 180px;
    }

    .md-col-left {
      margin-right: 8px;
    }

    .md-col-right {
      margin-left: 8px;
    }

    .md-col-label {
      text-align: center;
      font-size: var(--mathai-font-size-small);
      font-weight: 700;
      color: var(--mathai-text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .md-tile {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 54px;
      padding: 10px 8px;
      margin-bottom: 10px;
      border: 2px solid var(--mathai-tile-border);
      background: var(--mathai-tile-bg);
      color: var(--mathai-text-primary);
      border-radius: var(--mathai-border-radius-button);
      font-family: var(--mathai-font-family);
      font-size: var(--mathai-font-size-tile);
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      -webkit-user-select: none;
      user-select: none;
      transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    .md-tile:last-child {
      margin-bottom: 0;
    }

    .md-tile:active {
      transform: scale(0.97);
    }

    .md-tile.selected {
      background: var(--mathai-tile-selected-bg);
      border-color: var(--mathai-tile-selected-border);
      color: var(--mathai-accent-blue);
      box-shadow: 0 0 0 3px rgba(74, 111, 255, 0.18);
    }

    .md-tile.locked {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
      color: var(--mathai-success);
      cursor: default;
      opacity: 1;
      animation: mdPulse 0.35s ease;
    }
    .md-tile.locked:active {
      transform: none;
    }

    .md-tile.wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-error);
      animation: mdShake 0.55s ease;
    }

    .md-tile[disabled],
    .md-tile.disabled {
      pointer-events: none;
    }

    @keyframes mdPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes mdShake {
      0%, 100% { transform: translateX(0); }
      15%      { transform: translateX(-6px); }
      30%      { transform: translateX(6px); }
      45%      { transform: translateX(-5px); }
      60%      { transform: translateX(5px); }
      75%      { transform: translateX(-3px); }
      90%      { transform: translateX(3px); }
    }

    @keyframes mdFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .md-tile.fresh {
      animation: mdFadeIn 0.2s ease;
    }

    /* Touch targets */
    button,
    [role="button"],
    input[type="submit"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    /* Timer — absolute-positioned at top-center of the preview slot, independent of the
       preview header's flex flow. Matches the canonical React TimerComponent pattern when
       `showInActionBar: true` (position:absolute; top:0.5rem; left:50%; translateX(-50%)). */
    #timer-container {
      position: absolute;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      pointer-events: none;
    }
    #timer-container > * { pointer-events: auto; }
    #timer-container .timer-wrapper { padding: 0 !important; margin: 0 !important; }
    #timer-container .timer-display {
      width: auto !important;
      height: auto !important;
      padding: 0 !important;
      font-size: 16px !important;
      font-weight: 700 !important;
      color: var(--mathai-primary) !important;
      font-family: var(--mathai-font-family) !important;
    }
    /* Hide CDN's empty preview-timer-text span to avoid visual duplication */
    #previewTimerText { display: none !important; }

    /* Landscape lock */
    .md-landscape-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--mathai-white);
      color: var(--mathai-primary);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-size: var(--mathai-font-size-subtitle);
      font-weight: 600;
    }
    @media screen and (max-height: 500px) and (orientation: landscape) {
      .md-landscape-overlay { display: flex; }
    }

    @media (max-width: 360px) {
      .md-tile { font-size: 18px; min-height: 48px; padding: 8px 6px; }
    }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-round="1" data-lives="3"></div>

  <div class="md-landscape-overlay">
    <div>
      <div style="font-size: 36px; margin-bottom: 8px;">&#x1F4F1;</div>
      Please rotate to portrait to play
    </div>
  </div>

  <script>
    /* ====== gameState ====== */
    var gameState = {
      gameId: 'matching-doubles',
      phase: 'start_screen',
      currentRound: 1,
      totalRounds: 9,
      totalLives: 3,
      lives: 3,
      score: 0,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      duration_data: {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      },
      roundStartTime: null,
      correctAnswer: null,
      previewResult: null,
      stars: 0,
      /* matching-doubles specific */
      lockedPairs: {},          /* { "<leftValue>": <rightValue>, ... } — current round only */
      selectedLeft: null,       /* left value currently selected (or null) */
      selectedRight: null,      /* right value currently selected (or null) */
      totalPairsMatched: 0,     /* cumulative across all rounds */
      totalWrongMatches: 0,     /* cumulative across all rounds */
      finalTimeSeconds: null,   /* set in endGame */
      roundsData: [],           /* [{round, attempts, wrongAttempts, misconceptions}] */
      currentRoundAttempts: 0,
      currentRoundWrong: 0,
      currentRoundMisconceptions: []
    };
    window.gameState = gameState;

    /* ====== fallbackContent (verbatim from spec Content Structure) ====== */
    var fallbackContent = {
      previewInstruction:
        '<p><strong>Match the doubles!</strong> Tap a number on the left, then tap its <em>double</em> (&times;2) on the right. Finish all 9 rounds before you run out of 3 lives. The faster you finish, the more stars you earn!</p>',
      previewAudioText:
        'Match the doubles! Tap a number on the left, then tap its double on the right. Finish all nine rounds before you lose your three lives. The faster you finish, the more stars you earn.',
      previewAudio: null,
      showGameOnPreview: false,
      rounds: [
        /* Stage 1: Warm-up (no distractors) */
        {
          round: 1, stage: 1, type: 'A',
          left:  [3, 5, 8],
          right: [16, 6, 10],
          pairs: { '3': 6, '5': 10, '8': 16 },
          misconception_tags: {}
        },
        {
          round: 2, stage: 1, type: 'A',
          left:  [4, 7, 9],
          right: [18, 8, 14],
          pairs: { '4': 8, '7': 14, '9': 18 },
          misconception_tags: {}
        },
        {
          round: 3, stage: 1, type: 'A',
          left:  [2, 6, 9],
          right: [18, 4, 12],
          pairs: { '2': 4, '6': 12, '9': 18 },
          misconception_tags: {}
        },
        /* Stage 2: Standard */
        {
          round: 4, stage: 2, type: 'A',
          left:  [6, 11, 15, 22],
          right: [44, 12, 30, 22],
          pairs: { '6': 12, '11': 22, '15': 30, '22': 44 },
          misconception_tags: {}
        },
        {
          round: 5, stage: 2, type: 'A',
          left:  [9, 13, 18, 25],
          right: [36, 18, 50, 26],
          pairs: { '9': 18, '13': 26, '18': 36, '25': 50 },
          misconception_tags: {}
        },
        {
          round: 6, stage: 2, type: 'A',
          left:  [8, 14, 20, 27],
          right: [28, 40, 54, 16],
          pairs: { '8': 16, '14': 28, '20': 40, '27': 54 },
          misconception_tags: {}
        },
        /* Stage 3: Confusability (distractors) */
        {
          round: 7, stage: 3, type: 'A',
          left:  [15, 18, 21, 24, 30],
          right: [36, 17, 42, 60, 30, 48],
          pairs: { '15': 30, '18': 36, '21': 42, '24': 48, '30': 60 },
          misconception_tags: { '17': 'double-add-instead' }
        },
        {
          round: 8, stage: 3, type: 'A',
          left:  [17, 23, 28, 35, 40],
          right: [46, 29, 56, 80, 70, 34, 55],
          pairs: { '17': 34, '23': 46, '28': 56, '35': 70, '40': 80 },
          misconception_tags: { '29': 'double-next-number', '55': 'double-off-by-one' }
        },
        {
          round: 9, stage: 3, type: 'A',
          left:  [19, 26, 33, 42, 50],
          right: [38, 52, 44, 66, 84, 100, 51],
          pairs: { '19': 38, '26': 52, '33': 66, '42': 84, '50': 100 },
          misconception_tags: { '44': 'double-add-instead', '51': 'double-next-number' }
        }
      ]
    };

    /* ====== Module-scope vars ====== */
    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var timer = null;
    var interactionManager = null;

    /* ====== Sticker URLs (from feedback/reference/feedbackmanager-api.md) ====== */
    var STICKER_CORRECT  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_WRONG    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND    = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_VICTORY  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_COMPLETE_2 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_COMPLETE_1 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_RESTART  = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-102.gif';

    /* ====== syncDOM ====== */
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-round', gameState.currentRound);
      app.setAttribute('data-stage', getCurrentStage());
      app.setAttribute('data-lives', gameState.lives);
      try {
        document.body.setAttribute('data-phase', gameState.phase);
        document.body.setAttribute('data-lives', gameState.lives);
      } catch (e) {}
    }

    function getCurrentStage() {
      var rounds = getRounds();
      var idx = Math.max(0, Math.min(gameState.currentRound - 1, rounds.length - 1));
      return rounds[idx] && rounds[idx].stage ? rounds[idx].stage : 1;
    }

    /* ====== trackEvent ====== */
    function trackEvent(type, data) {
      var evt = { event: type, timestamp: Date.now() };
      if (data && typeof data === 'object') {
        for (var k in data) if (Object.prototype.hasOwnProperty.call(data, k)) evt[k] = data[k];
      }
      gameState.events.push(evt);
    }

    /* ====== recordAttempt ====== */
    function recordAttempt(data) {
      var rIdx = gameState.currentRound;
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
        input_of_user: data.userAnswer,
        correct: data.correct === true,
        round_number: rIdx,
        question_id: data.question_id || ('r' + rIdx + '_left_' + data.leftValue),
        correct_answer: data.correctAnswer,
        response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
        misconception_tag: data.misconception_tag || null,
        difficulty_level: getCurrentStage(),
        is_retry: false,
        metadata: {
          left_tile_value: data.leftValue,
          right_tile_value: data.rightValue,
          lives_remaining: gameState.lives,
          stage: getCurrentStage(),
          round_type: 'A',
          attempt_number_in_round: gameState.currentRoundAttempts
        }
      };
      gameState.attempts.push(attempt);
      gameState.duration_data.attempts.push({
        round: rIdx,
        timestamp: Date.now(),
        correct: attempt.correct
      });
    }

    /* ====== getRounds ====== */
    function getRounds() {
      if (gameState.content && gameState.content.rounds &&
          gameState.content.rounds.length >= gameState.totalRounds) {
        return gameState.content.rounds;
      }
      return fallbackContent.rounds;
    }

    /* ====== getStars — time-only star tiers (per spec) ====== */
    function getStars() {
      if (gameState.lives <= 0) return 1;
      var t = gameState.finalTimeSeconds;
      if (t === null || typeof t !== 'number') return 1;
      if (t <= 60) return 3;
      if (t <= 90) return 2;
      return 1;
    }
    function calcStars() { return getStars(); }
    window.calcStars = calcStars;

    /* ====== waitForPackages ====== */
    function waitForPackages() {
      return new Promise(function(resolve, reject) {
        var startTime = Date.now();
        var maxWait = 180000;
        function check() {
          try {
            if (typeof FeedbackManager !== 'undefined' &&
                typeof VisibilityTracker !== 'undefined' &&
                typeof ScreenLayout !== 'undefined' &&
                typeof ProgressBarComponent !== 'undefined' &&
                typeof TransitionScreenComponent !== 'undefined' &&
                typeof PreviewScreenComponent !== 'undefined' &&
                typeof TimerComponent !== 'undefined') {
              resolve(true);
              return;
            }
            if (Date.now() - startTime > maxWait) {
              throw new Error('waitForPackages() timeout after 180s — CDN packages failed to load');
            }
            setTimeout(check, 50);
          } catch (err) {
            reject(err);
          }
        }
        check();
      });
    }

    /* ====== Audio preload ====== */
    function preloadAudio() {
      try {
        FeedbackManager.sound.preload([
          { id: 'correct_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
          { id: 'incorrect_sound_effect',    url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
          { id: 'sound_life_lost',           url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
          { id: 'rounds_sound_effect',       url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
          { id: 'victory_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
          { id: 'game_complete_sound_effect',url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
          { id: 'game_over_sound_effect',    url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
          { id: 'all_correct',               url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506764346.mp3' },
          { id: 'sound_bubble_select',       url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3' },
          { id: 'sound_bubble_deselect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758712800721.mp3' },
          { id: 'new_cards',                 url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432104595.mp3' }
        ]);
      } catch (e) {
        console.error('[preload] Audio preload error:', e.message);
      }
    }

    /* ====== handlePostMessage ====== */
    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      if (event.data.type === 'game_init') {
        gameState.phase = 'playing';
        syncDOM();
        var d = event.data;
        if (d.content) {
          gameState.content = d.content;
          if (d.content.rounds && d.content.rounds.length > 0) {
            gameState.totalRounds = d.content.rounds.length;
          }
        }
        gameState.signalConfig = d.signalConfig || {};
        if (gameState.signalConfig && signalCollector) {
          try {
            signalCollector.flushUrl = gameState.signalConfig.flushUrl || signalCollector.flushUrl;
            signalCollector.playId = gameState.signalConfig.playId || signalCollector.playId;
            signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId || 'matching-doubles';
            signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
            signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
            signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
            if (gameState.signalConfig.gameSessionId) signalCollector.gameSessionId = gameState.signalConfig.gameSessionId;
            if (signalCollector.startFlushing) signalCollector.startFlushing();
          } catch (e) {
            console.error('[signalCollector] Config error:', e.message);
          }
        }
        if (progressBar) {
          createProgressBar();
        }
      }
    }

    /* ====== createProgressBar ====== */
    function createProgressBar() {
      try { if (progressBar) progressBar.destroy(); } catch (e) {}
      try {
        progressBar = new ProgressBarComponent({
          slotId: 'mathai-progress-slot',
          totalRounds: gameState.totalRounds,
          totalLives: gameState.totalLives,
          showLives: true
        });
        progressBar.show();
        progressBar.update(Math.max(0, gameState.currentRound - 1), Math.max(0, gameState.lives));
      } catch (e) {
        console.error('[progressBar] create error:', e.message);
      }
    }

    /* ====== injectGameHTML ====== */
    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="md-stack" id="mdStack">' +
          '<div class="md-grid" id="mdGrid" data-testid="md-grid">' +
            '<div class="md-col md-col-left" id="mdColLeft">' +
              '<div class="md-col-label">Number</div>' +
              '<div id="mdTilesLeft"></div>' +
            '</div>' +
            '<div class="md-col md-col-right" id="mdColRight">' +
              '<div class="md-col-label">Double</div>' +
              '<div id="mdTilesRight"></div>' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    function stageLabel(stage) {
      if (stage === 1) return 'Warm-up';
      if (stage === 2) return 'Standard';
      if (stage === 3) return 'Confusability';
      return 'Round';
    }

    /* ====== renderRound — build tiles for current round into #gameContent ====== */
    function renderRound() {
      gameState.isProcessing = false;
      gameState.isActive = true;
      gameState.phase = 'playing';
      gameState.roundStartTime = Date.now();
      gameState.lockedPairs = {};
      gameState.selectedLeft = null;
      gameState.selectedRight = null;
      gameState.currentRoundAttempts = 0;
      gameState.currentRoundWrong = 0;
      gameState.currentRoundMisconceptions = [];

      var rounds = getRounds();
      var round = rounds[Math.max(0, gameState.currentRound - 1)];
      if (!round) return;

      gameState.correctAnswer = round.pairs;

      if (!document.getElementById('mdTilesLeft')) {
        injectGameHTML();
      }

      var stageChip = document.getElementById('mdStageChip');
      if (stageChip) {
        stageChip.textContent = 'Round ' + gameState.currentRound + ' \u00B7 ' + stageLabel(round.stage);
      }

      var leftHost = document.getElementById('mdTilesLeft');
      var rightHost = document.getElementById('mdTilesRight');
      if (leftHost) leftHost.innerHTML = '';
      if (rightHost) rightHost.innerHTML = '';

      var i;
      if (leftHost) {
        for (i = 0; i < round.left.length; i++) {
          var lVal = round.left[i];
          var lBtn = document.createElement('button');
          lBtn.type = 'button';
          lBtn.className = 'md-tile fresh';
          lBtn.setAttribute('data-side', 'left');
          lBtn.setAttribute('data-value', String(lVal));
          lBtn.setAttribute('data-index', String(i));
          lBtn.setAttribute('data-testid', 'md-tile-left-' + i);
          lBtn.setAttribute('aria-label', 'Left tile ' + lVal);
          lBtn.textContent = String(lVal);
          lBtn.addEventListener('click', onTileTap);
          leftHost.appendChild(lBtn);
        }
      }
      if (rightHost) {
        for (i = 0; i < round.right.length; i++) {
          var rVal = round.right[i];
          var rBtn = document.createElement('button');
          rBtn.type = 'button';
          rBtn.className = 'md-tile fresh';
          rBtn.setAttribute('data-side', 'right');
          rBtn.setAttribute('data-value', String(rVal));
          rBtn.setAttribute('data-index', String(i));
          rBtn.setAttribute('data-testid', 'md-tile-right-' + i);
          rBtn.setAttribute('aria-label', 'Right tile ' + rVal);
          rBtn.textContent = String(rVal);
          rBtn.addEventListener('click', onTileTap);
          rightHost.appendChild(rBtn);
        }
      }

      /* Ambient new-cards SFX (fire-and-forget) */
      try {
        FeedbackManager.sound.play('new_cards', {}).catch(function() {});
      } catch (e) {}

      if (progressBar) {
        try {
          progressBar.update(Math.max(0, gameState.currentRound - 1), Math.max(0, gameState.lives));
        } catch (e) {}
      }

      syncDOM();
    }
    window.loadRound = renderRound;
    window.renderRound = renderRound;

    /* ====== onTileTap — core interaction handler ====== */
    function onTileTap(ev) {
      if (gameState.isProcessing) return;
      if (!gameState.isActive) return;
      if (gameState.gameEnded) return;

      var el = ev.currentTarget;
      if (!el) return;
      if (el.classList.contains('locked')) return;
      if (el.classList.contains('wrong')) return;

      var side = el.getAttribute('data-side');
      var value = Number(el.getAttribute('data-value'));
      var idx = Number(el.getAttribute('data-index'));

      if (side === 'left') {
        handleLeftTap(el, value, idx);
      } else if (side === 'right') {
        handleRightTap(el, value, idx);
      }
    }

    function handleLeftTap(el, value, idx) {
      /* Re-tap of already-selected left => deselect */
      if (gameState.selectedLeft &&
          gameState.selectedLeft.value === value &&
          gameState.selectedLeft.index === idx) {
        el.classList.remove('selected');
        gameState.selectedLeft = null;
        try { FeedbackManager.sound.play('sound_bubble_deselect', {}).catch(function() {}); } catch (e) {}
        return;
      }

      /* A different left tile was selected before — deselect the prior, select the new. */
      if (gameState.selectedLeft) {
        var priorEl = findTileEl('left', gameState.selectedLeft.value, gameState.selectedLeft.index);
        if (priorEl) priorEl.classList.remove('selected');
        try { FeedbackManager.sound.play('sound_bubble_deselect', {}).catch(function() {}); } catch (e) {}
      }

      el.classList.add('selected');
      gameState.selectedLeft = { value: value, index: idx };
      try { FeedbackManager.sound.play('sound_bubble_select', {}).catch(function() {}); } catch (e) {}
    }

    function handleRightTap(el, rightValue, rightIdx) {
      /* Right tap with no left selected — no-op, no audio. */
      if (!gameState.selectedLeft) return;

      var leftValue = gameState.selectedLeft.value;
      var leftIdx = gameState.selectedLeft.index;
      var leftEl = findTileEl('left', leftValue, leftIdx);

      var expectedDouble = leftValue * 2;
      var isCorrect = (rightValue === expectedDouble);

      /* Increment attempt counters BEFORE recordAttempt */
      gameState.currentRoundAttempts += 1;

      if (isCorrect) {
        /* ====== CORRECT MATCH — fire-and-forget (multi-step, CASE 5) ====== */
        if (leftEl) { leftEl.classList.remove('selected'); leftEl.classList.add('locked'); leftEl.setAttribute('disabled', 'disabled'); }
        el.classList.add('locked'); el.setAttribute('disabled', 'disabled');

        gameState.lockedPairs[String(leftValue)] = rightValue;
        gameState.totalPairsMatched += 1;
        gameState.score = gameState.totalPairsMatched;
        gameState.selectedLeft = null;

        try {
          recordAttempt({
            userAnswer: rightValue,
            correctAnswer: expectedDouble,
            correct: true,
            leftValue: leftValue,
            rightValue: rightValue,
            misconception_tag: null,
            question_id: 'r' + gameState.currentRound + '_left_' + leftValue
          });
        } catch (e) { console.error('[recordAttempt] error:', e.message); }

        trackEvent('answer_submitted', {
          round: gameState.currentRound,
          correct: true,
          response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
          leftValue: leftValue,
          rightValue: rightValue
        });

        try {
          FeedbackManager.sound.play('correct_sound_effect', { sticker: STICKER_CORRECT })
            .catch(function(e) { console.error('Audio error:', e && e.message); });
        } catch (e) {}

        syncDOM();

        /* Check round completion */
        var rounds = getRounds();
        var round = rounds[Math.max(0, gameState.currentRound - 1)];
        var requiredPairs = round.left.length;
        if (Object.keys(gameState.lockedPairs).length >= requiredPairs) {
          onRoundComplete();
        }
      } else {
        /* ====== WRONG MATCH ====== */
        var currentRoundObj = getRounds()[Math.max(0, gameState.currentRound - 1)];
        var tagMap = (currentRoundObj && currentRoundObj.misconception_tags) || {};
        var tag = tagMap[String(rightValue)] || null;

        gameState.lives = Math.max(0, gameState.lives - 1);
        gameState.totalWrongMatches += 1;
        gameState.currentRoundWrong += 1;
        if (tag) gameState.currentRoundMisconceptions.push(tag);

        try {
          recordAttempt({
            userAnswer: rightValue,
            correctAnswer: expectedDouble,
            correct: false,
            leftValue: leftValue,
            rightValue: rightValue,
            misconception_tag: tag,
            question_id: 'r' + gameState.currentRound + '_left_' + leftValue
          });
        } catch (e) { console.error('[recordAttempt] error:', e.message); }

        trackEvent('answer_submitted', {
          round: gameState.currentRound,
          correct: false,
          response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
          leftValue: leftValue,
          rightValue: rightValue,
          misconception_tag: tag
        });

        if (leftEl) leftEl.classList.add('wrong');
        el.classList.add('wrong');

        /* Update progress bar (hearts) BEFORE audio, per data-contract order */
        syncDOM();
        if (progressBar) {
          try { progressBar.update(Math.max(0, gameState.currentRound - 1), Math.max(0, gameState.lives)); } catch (e) {}
        }

        /* Case 8: last life => skip wrong SFX entirely, jump to game_over */
        if (gameState.lives === 0) {
          /* brief visual flash still, then endGame */
          setTimeout(function() {
            if (leftEl) { leftEl.classList.remove('wrong'); leftEl.classList.remove('selected'); }
            if (el) { el.classList.remove('wrong'); }
            gameState.selectedLeft = null;
            endGame('game_over');
          }, 450);
          return;
        }

        /* Wrong SFX with minimum-duration wrapper — ensures full playback before continuing */
        (async function() {
          try {
            await Promise.all([
              FeedbackManager.sound.play('sound_life_lost', { sticker: STICKER_WRONG }),
              new Promise(function(r) { setTimeout(r, 1500); })
            ]);
          } catch (e) {}
        })();

        /* Clear the wrong visual + deselect both tiles after shake */
        setTimeout(function() {
          if (leftEl) {
            leftEl.classList.remove('wrong');
            leftEl.classList.remove('selected');
          }
          if (el) {
            el.classList.remove('wrong');
          }
          gameState.selectedLeft = null;
        }, 600);
      }
    }

    function findTileEl(side, value, index) {
      var host = side === 'left' ? document.getElementById('mdTilesLeft') : document.getElementById('mdTilesRight');
      if (!host) return null;
      var children = host.children;
      for (var i = 0; i < children.length; i++) {
        var c = children[i];
        if (c.getAttribute('data-side') === side &&
            Number(c.getAttribute('data-value')) === value &&
            Number(c.getAttribute('data-index')) === index) {
          return c;
        }
      }
      return null;
    }

    /* ====== onRoundComplete — awaited SFX+subtitle, then advance ====== */
    async function onRoundComplete() {
      if (gameState.isProcessing) return;
      gameState.isProcessing = true;
      gameState.phase = 'round_complete';
      syncDOM();

      /* Progress bar: bump rounds-completed IMMEDIATELY (before feedback/SFX) so the
         bar fills in sync with the last-pair lock. On round 9 this paints "9/9" before
         any round-complete audio or the victory screen. PART-023 semantic. */
      if (progressBar) {
        try { progressBar.update(gameState.currentRound, Math.max(0, gameState.lives)); } catch (e) {}
      }

      /* Record round data */
      gameState.roundsData.push({
        round: gameState.currentRound,
        attempts: gameState.currentRoundAttempts,
        wrongAttempts: gameState.currentRoundWrong,
        misconceptions: gameState.currentRoundMisconceptions.slice()
      });

      trackEvent('round_complete', { round: gameState.currentRound });

      /* Awaited round-complete SFX with min-duration wrap (PART-017) */
      try {
        await Promise.all([
          FeedbackManager.sound.play('all_correct', {
            sticker: STICKER_CORRECT,
            subtitle: 'Round complete!'
          }),
          new Promise(function(r) { setTimeout(r, 1500); })
        ]);
      } catch (e) { console.error('[round-complete audio] error:', e && e.message); }

      gameState.isProcessing = false;

      if (gameState.currentRound < gameState.totalRounds) {
        nextRound();
      } else {
        endGame('victory');
      }
    }

    /* ====== nextRound — cleanup FIRST, then state mutation, then renderRound ====== */
    async function nextRound() {
      /* Cleanup FIRST — before any state mutation (feedback cross-cutting rule 10) */
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}

      gameState.currentRound += 1;
      gameState.lockedPairs = {};
      gameState.selectedLeft = null;
      gameState.selectedRight = null;
      gameState.isProcessing = false;
      gameState.phase = 'round_intro';
      syncDOM();

      if (progressBar) {
        try { progressBar.update(Math.max(0, gameState.currentRound - 1), Math.max(0, gameState.lives)); } catch (e) {}
      }

      await showRoundIntro();
      renderRound();
    }

    /* ====== showRoundIntro — sequential awaited SFX -> dynamic TTS, auto-advance ====== */
    async function showRoundIntro() {
      var roundNum = gameState.currentRound;
      var rounds = getRounds();
      var round = rounds[Math.max(0, gameState.currentRound - 1)];
      var stageTxt = round ? stageLabel(round.stage) : '';

      if (!transitionScreen) {
        return;
      }

      /* audioStopped flag pattern — in case visibility pause / end-game interrupts mid-sequence */
      var audioStopped = false;

      try {
        await transitionScreen.show({
          title: 'Round ' + roundNum,
          subtitle: stageTxt,
          icons: ['\uD83C\uDFAF'],
          onMounted: function() {
            (async function() {
              try {
                await FeedbackManager.sound.play('rounds_sound_effect', { sticker: STICKER_ROUND });
                if (audioStopped) return;
                await FeedbackManager.playDynamicFeedback({
                  audio_content: 'Round ' + roundNum,
                  subtitle: 'Round ' + roundNum,
                  sticker: STICKER_ROUND
                });
              } catch (e) { /* non-blocking */ }
              try { transitionScreen.hide(); } catch (e) {}
            })();
          }
        });
      } catch (e) {
        console.error('[transition] round intro error:', e && e.message);
      }
    }

    /* ====== endGame — screen first, game_complete BEFORE audio ====== */
    function endGame(reason) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;

      /* Cleanup FIRST — before state mutation (feedback cross-cutting rule 10) */
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}

      gameState.isActive = false;

      var outcome;
      if (reason === 'game_over') outcome = 'game_over';
      else if (reason === 'victory' || reason === true) outcome = 'victory';
      else outcome = 'victory';

      /* Pause + read final elapsed */
      try {
        if (timer) {
          timer.pause();
          gameState.finalTimeSeconds = Math.floor(timer.getTimeTaken ? timer.getTimeTaken() : ((Date.now() - (gameState.startTime || Date.now())) / 1000));
        } else if (gameState.startTime) {
          gameState.finalTimeSeconds = Math.floor((Date.now() - gameState.startTime) / 1000);
        } else {
          gameState.finalTimeSeconds = 0;
        }
      } catch (e) {
        gameState.finalTimeSeconds = gameState.startTime ? Math.floor((Date.now() - gameState.startTime) / 1000) : 0;
      }

      /* Stars: forced 1 on game_over or lives==0, else time-based */
      if (outcome === 'game_over' || gameState.lives === 0) {
        gameState.stars = 1;
      } else if (gameState.finalTimeSeconds <= 60) {
        gameState.stars = 3;
      } else if (gameState.finalTimeSeconds <= 90) {
        gameState.stars = 2;
      } else {
        gameState.stars = 1;
      }

      gameState.phase = outcome === 'game_over' ? 'game_over' : 'results';
      syncDOM();

      trackEvent('game_end', {
        outcome: outcome,
        stars: gameState.stars,
        lives: gameState.lives,
        score: gameState.totalPairsMatched || 0,
        rounds_played: gameState.currentRound,
        time: gameState.finalTimeSeconds
      });

      var totalAttempts = gameState.attempts.length;
      var correctAttempts = 0;
      for (var i = 0; i < gameState.attempts.length; i++) {
        if (gameState.attempts[i].correct) correctAttempts++;
      }
      var accuracy = totalAttempts > 0 ? Math.round((correctAttempts / totalAttempts) * 100) : 0;

      var tries = [];
      for (var r = 0; r < gameState.totalRounds; r++) {
        var count = 0;
        for (var a = 0; a < gameState.attempts.length; a++) {
          if (gameState.attempts[a].round_number === r + 1) count++;
        }
        if (count > 0) tries.push({ round: r + 1, tries: count });
      }

      var sealResult = null;
      if (signalCollector) {
        try { if (signalCollector.seal) sealResult = signalCollector.seal(); } catch (e) {}
      }

      /* game_complete postMessage BEFORE audio */
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            outcome: outcome,
            metrics: {
              accuracy: accuracy,
              time: gameState.finalTimeSeconds,
              stars: gameState.stars,
              attempts: gameState.attempts,
              duration_data: gameState.duration_data,
              totalLives: gameState.totalLives,
              tries: tries
            },
            completedAt: Date.now(),
            previewResult: gameState.previewResult || null,
            /* Matching-Doubles-specific analytics (forward-compat extras) */
            reason: outcome,
            finalTimeSeconds: gameState.finalTimeSeconds,
            totalRoundsCompleted: outcome === 'victory' ? gameState.totalRounds : (gameState.currentRound - 1),
            totalPairsMatched: gameState.totalPairsMatched,
            totalWrongMatches: gameState.totalWrongMatches,
            livesRemaining: gameState.lives,
            roundsData: gameState.roundsData.slice(),
            signal_event_count: sealResult && typeof sealResult.signal_event_count === 'number'
              ? sealResult.signal_event_count
              : (signalCollector && signalCollector.getEventCount ? signalCollector.getEventCount() : 0),
            signal_metadata: sealResult && sealResult.signal_metadata ? sealResult.signal_metadata : null
          }
        }, '*');
      } catch (e) {
        console.error('[postMessage] game_complete error:', e.message);
      }

      /* Top-level CustomEvent (parity with other shipped games) */
      try {
        window.dispatchEvent(new CustomEvent('game_complete', {
          detail: {
            outcome: outcome,
            stars: gameState.stars,
            rounds: outcome === 'game_over' ? (gameState.currentRound - 1) : gameState.totalRounds,
            time: gameState.finalTimeSeconds
          }
        }));
      } catch (e) {}

      /* Destroy preview screen (session-final cleanup, exactly once). Must NOT be reached on restart. */
      if (previewScreen) {
        try { previewScreen.destroy(); } catch (e) {}
        previewScreen = null;
      }

      /* Render screen FIRST, then play audio */
      if (outcome === 'game_over') {
        showGameOver();
      } else {
        showVictory();
      }
    }
    window.endGame = endGame;

    /* ====== Game Over screen ====== */
    async function showGameOver() {
      if (!transitionScreen) return;
      var totalPairsPossible = computeTotalPairsThroughRound(gameState.currentRound);
      var subtitle = 'You matched ' + gameState.totalPairsMatched + ' of ' + totalPairsPossible + ' pairs.';
      var audioStopped = false;
      try {
        await transitionScreen.show({
          icons: ['\uD83D\uDE14'],
          title: 'Game Over',
          subtitle: subtitle,
          sticker: STICKER_GAMEOVER,
          buttons: [{
            text: 'Try Again',
            primary: true,
            action: function() {
              audioStopped = true;
              try { FeedbackManager.sound.pause(); FeedbackManager._stopCurrentDynamic(); } catch (e) {}
              try { transitionScreen.hide(); } catch (e) {}
              showMotivation();
            }
          }],
          persist: true,
          onMounted: function() {
            (async function() {
              try {
                await FeedbackManager.sound.play('game_over_sound_effect', { sticker: STICKER_GAMEOVER });
                if (audioStopped) return;
                await FeedbackManager.playDynamicFeedback({
                  audio_content: 'Good try! Let\u2019s practice those doubles again!',
                  subtitle: 'Good try!',
                  sticker: STICKER_GAMEOVER
                });
              } catch (e) {}
            })();
          }
        });
      } catch (e) {
        console.error('[transition] game_over error:', e && e.message);
      }
    }

    function computeTotalPairsThroughRound(roundNum) {
      /* Total pairs possible in all rounds completed + current round */
      var rounds = getRounds();
      var total = 0;
      for (var i = 0; i < Math.min(rounds.length, Math.max(0, roundNum)); i++) {
        total += rounds[i].left.length;
      }
      return total;
    }

    /* ====== Victory screen ====== */
    async function showVictory() {
      if (!transitionScreen) return;
      var stars = gameState.stars;
      var timeS = gameState.finalTimeSeconds;
      var subtitle = 'Completed in ' + timeS + 's';
      var sfxId = stars === 3 ? 'victory_sound_effect' : 'game_complete_sound_effect';
      var sticker = stars === 3 ? STICKER_VICTORY : (stars === 2 ? STICKER_COMPLETE_2 : STICKER_COMPLETE_1);
      var voText;
      if (stars === 3) voText = 'Lightning fast doubling!';
      else if (stars === 2) voText = 'Nice work!';
      else voText = 'You finished \u2014 let\u2019s get faster next time!';

      var audioStopped = false;
      var buttons = [];
      if (stars < 3) {
        buttons.push({
          text: 'Play Again',
          action: function() {
            audioStopped = true;
            try { FeedbackManager.sound.pause(); FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            showMotivation();
          }
        });
      }
      buttons.push({
        text: 'Claim Stars',
        primary: true,
        action: function() {
          audioStopped = true;
          try { FeedbackManager.sound.pause(); FeedbackManager._stopCurrentDynamic(); } catch (e) {}
          try { transitionScreen.hide(); } catch (e) {}
          showStarsCollected();
        }
      });

      try {
        await transitionScreen.show({
          title: 'Victory \uD83C\uDF89',
          subtitle: subtitle,
          stars: stars,
          sticker: sticker,
          buttons: buttons,
          persist: true,
          onMounted: function() {
            (async function() {
              try {
                await FeedbackManager.sound.play(sfxId, { sticker: sticker });
                if (audioStopped) return;
                await FeedbackManager.playDynamicFeedback({
                  audio_content: voText,
                  subtitle: voText.length > 60 ? voText.substring(0, 57) + '...' : voText,
                  sticker: sticker
                });
              } catch (e) {}
            })();
          }
        });
      } catch (e) {
        console.error('[transition] victory error:', e && e.message);
      }
    }

    async function showMotivation() {
      /* Motivation screen — copy defaults verbatim from default-transition-screens.md */
      if (!transitionScreen) {
        restartToRound1();
        return;
      }
      try {
        await transitionScreen.show({
          title: 'Ready to improve your score? \u26A1',
          subtitle: 'Take another shot \u2014 you\u2019ve got this!',
          buttons: [{
            text: 'I\u2019m ready! \uD83D\uDE4C',
            primary: true,
            action: function() {
              try { FeedbackManager.sound.pause(); FeedbackManager._stopCurrentDynamic(); } catch (e) {}
              try { transitionScreen.hide(); } catch (e) {}
              restartToRound1();
            }
          }],
          persist: true,
          onMounted: function() {
            try {
              FeedbackManager.sound.play('rounds_sound_effect', { sticker: STICKER_RESTART })
                .catch(function() {});
            } catch (e) {}
          }
        });
      } catch (e) {
        restartToRound1();
      }
    }

    /* ====== Stars Collected screen — 2.5s auto-dismiss ====== */
    async function showStarsCollected() {
      if (!transitionScreen) return;
      var stars = gameState.stars;
      try {
        await transitionScreen.show({
          title: 'Yay! \uD83C\uDF89\n' + stars + ' Star' + (stars === 1 ? '' : 's') + ' collected!',
          styles: { title: { whiteSpace: 'pre-line' } },
          duration: 2500,
          sticker: STICKER_VICTORY,
          onMounted: function() {
            try {
              FeedbackManager.sound.play('victory_sound_effect', { sticker: STICKER_VICTORY })
                .catch(function() {});
            } catch (e) {}
          }
        });
      } catch (e) {}
      /* After auto-dismiss, notify host to exit */
      try { window.parent.postMessage({ type: 'game_exit' }, '*'); } catch (e) {}
    }

    /* ====== restartToRound1 — MUST NOT re-show or destroy preview ====== */
    function restartToRound1() {
      /* Cleanup FIRST */
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      gameState.phase = 'round_intro';
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.roundStartTime = null;
      gameState.correctAnswer = null;
      gameState.stars = 0;
      gameState.finalTimeSeconds = null;
      gameState.lockedPairs = {};
      gameState.selectedLeft = null;
      gameState.selectedRight = null;
      gameState.totalPairsMatched = 0;
      gameState.totalWrongMatches = 0;
      gameState.roundsData = [];
      gameState.currentRoundAttempts = 0;
      gameState.currentRoundWrong = 0;
      gameState.currentRoundMisconceptions = [];
      gameState.duration_data = {
        startTime: new Date().toISOString(),
        preview: gameState.duration_data && gameState.duration_data.preview ? gameState.duration_data.preview : [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      };
      syncDOM();

      if (signalCollector) {
        try { if (signalCollector.reset) signalCollector.reset(); } catch (e) {}
      }

      /* Rebuild progress bar so hearts/rounds reset cleanly */
      createProgressBar();

      /* Timer: reset + start (do NOT recreate) */
      try {
        if (timer) {
          if (timer.reset) timer.reset();
          if (timer.start) timer.start();
        }
      } catch (e) {}

      if (!document.getElementById('mdTilesLeft')) {
        injectGameHTML();
      }

      trackEvent('game_restart', { totalRounds: gameState.totalRounds });

      /* Show Round 1 intro + render Round 1 — NEVER re-show preview */
      (async function() {
        await showRoundIntro();
        renderRound();
      })();
    }
    window.restartGame = restartToRound1;
    window.restartToRound1 = restartToRound1;

    /* ====== setupGame — render DOM FIRST, then show preview ====== */
    function setupGame() {
      /* 1. Inject game DOM so preview overlay covers a real screen */
      injectGameHTML();

      /* 2. Populate Round 1 tiles inside the static DOM so the preview non-interactable state shows real content. */
      var rounds = getRounds();
      if (rounds && rounds.length > 0) {
        var r0 = rounds[0];
        gameState.correctAnswer = r0.pairs;

        var stageChip = document.getElementById('mdStageChip');
        if (stageChip) stageChip.textContent = 'Round 1 \u00B7 ' + stageLabel(r0.stage);

        var leftHost = document.getElementById('mdTilesLeft');
        var rightHost = document.getElementById('mdTilesRight');
        if (leftHost) leftHost.innerHTML = '';
        if (rightHost) rightHost.innerHTML = '';
        var i;
        if (leftHost) {
          for (i = 0; i < r0.left.length; i++) {
            var lv = r0.left[i];
            var lbtn = document.createElement('button');
            lbtn.type = 'button';
            lbtn.className = 'md-tile';
            lbtn.setAttribute('data-side', 'left');
            lbtn.setAttribute('data-value', String(lv));
            lbtn.setAttribute('data-index', String(i));
            lbtn.textContent = String(lv);
            leftHost.appendChild(lbtn);
          }
        }
        if (rightHost) {
          for (i = 0; i < r0.right.length; i++) {
            var rv = r0.right[i];
            var rbtn = document.createElement('button');
            rbtn.type = 'button';
            rbtn.className = 'md-tile';
            rbtn.setAttribute('data-side', 'right');
            rbtn.setAttribute('data-value', String(rv));
            rbtn.setAttribute('data-index', String(i));
            rbtn.textContent = String(rv);
            rightHost.appendChild(rbtn);
          }
        }
      }

      syncDOM();

      var content = gameState.content || fallbackContent;

      /* 3. Preview LAST */
      if (previewScreen) {
        previewScreen.show({
          instruction: content.previewInstruction || fallbackContent.previewInstruction,
          audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
          showGameOnPreview: content.showGameOnPreview === true,
          timerConfig: { type: 'increase', startTime: 0, endTime: 100000 },
          timerInstance: timer || null,
          onComplete: function(previewData) {
            startGameAfterPreview(previewData);
          }
        });
      } else {
        startGameAfterPreview(null);
      }
    }

    /* ====== startGameAfterPreview ====== */
    async function startGameAfterPreview(previewData) {
      if (gameState.isActive) return;
      gameState.previewResult = previewData || null;
      gameState.duration_data.preview = gameState.duration_data.preview || [];
      gameState.duration_data.preview.push({ duration: previewData ? previewData.duration : 0 });

      /* Hide preview instruction text — CDN component keeps it rendered after skip */
      try {
        var pi = document.getElementById('previewInstruction');
        if (pi) pi.style.display = 'none';
      } catch (e) {}

      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.phase = 'round_intro';
      syncDOM();

      trackEvent('game_start', { totalRounds: gameState.totalRounds });

      if (signalCollector) {
        try { signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}
      }

      /* Start the count-up timer */
      try { if (timer && timer.start) timer.start(); } catch (e) {}

      if (progressBar) {
        try {
          progressBar.show();
          progressBar.update(0, gameState.lives);
        } catch (e) {}
      }

      /* Round 1 intro → render Round 1 */
      await showRoundIntro();
      renderRound();
    }

    /* ====== Standalone startGame (fallback only — when waitForPackages times out) ====== */
    function startGame() {
      if (gameState.isActive) return;
      try { var pi = document.getElementById('previewInstruction'); if (pi) pi.style.display = 'none'; } catch (e) {}
      gameState.isActive = true;
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.phase = 'playing';
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();

      if (progressBar) {
        try { progressBar.show(); progressBar.update(0, gameState.lives); } catch (e) {}
      }
      renderRound();
    }
    window.startGame = startGame;

    /* ====== Fallback layout builder ====== */
    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      app.innerHTML =
        '<div class="mathai-layout-root" style="width:100%;min-height:100dvh;display:flex;flex-direction:column;">' +
          '<div id="mathai-progress-slot"></div>' +
          '<div id="timer-container"></div>' +
          '<div id="gameContent"></div>' +
          '<div id="mathai-transition-slot"></div>' +
        '</div>';
    }

    /* ====== debug helpers ====== */
    window.debugGame = function() {
      return {
        phase: gameState.phase,
        currentRound: gameState.currentRound,
        lives: gameState.lives,
        totalPairsMatched: gameState.totalPairsMatched,
        totalWrongMatches: gameState.totalWrongMatches,
        isActive: gameState.isActive,
        isProcessing: gameState.isProcessing,
        gameEnded: gameState.gameEnded,
        finalTimeSeconds: gameState.finalTimeSeconds,
        stars: gameState.stars
      };
    };
    window.debugAudio = function() {
      return {
        feedbackManagerLoaded: typeof FeedbackManager !== 'undefined',
        canPlay: (typeof FeedbackManager !== 'undefined' && FeedbackManager.canPlayAudio) ? FeedbackManager.canPlayAudio() : false
      };
    };
    window.testAudio = function() {
      try { FeedbackManager.sound.play('correct_sound_effect', { sticker: STICKER_CORRECT }); } catch (e) {}
    };
    window.testPause = function() {
      try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {}
      try { if (timer) timer.pause({ fromVisibilityTracker: true }); } catch (e) {}
    };
    window.testResume = function() {
      try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {}
      try { if (timer) timer.resume({ fromVisibilityTracker: true }); } catch (e) {}
    };

    /* ====== DOMContentLoaded — init sequence ====== */
    document.addEventListener('DOMContentLoaded', async function() {
      var packagesLoaded = false;
      try {
        packagesLoaded = await waitForPackages();
      } catch (e) {
        console.error('[init] ' + e.message);
        packagesLoaded = false;
      }

      try {
        if (packagesLoaded) {
          /* 1. FeedbackManager.init */
          try { await FeedbackManager.init({ sound: { sounds: [] }, stream: { streams: [] } }); }
          catch (e) { console.error('[init] FeedbackManager.init error:', e.message); }

          /* 2. SignalCollector */
          try {
            if (typeof SignalCollector !== 'undefined') {
              signalCollector = new SignalCollector({ gameId: 'matching-doubles' });
            } else if (typeof MathAIHelpers !== 'undefined' && MathAIHelpers.SignalCollector) {
              signalCollector = new MathAIHelpers.SignalCollector({ gameId: 'matching-doubles' });
            }
            window.signalCollector = signalCollector;
          } catch (e) {
            console.error('[init] SignalCollector error:', e.message);
          }

          /* 3. ScreenLayout.inject — previewScreen MANDATORY per PART-039 */
          try {
            ScreenLayout.inject('app', {
              slots: {
                previewScreen: true,
                progressBar: true,
                transitionScreen: true
              }
            });
          } catch (e) {
            console.error('[init] ScreenLayout.inject error:', e.message);
          }

          /* 4. Timer container — mount as direct child of #mathai-preview-slot (positioned ancestor).
             Kept OUT of the header's flex flow so absolute top-center positioning is stable
             regardless of left/right slot widths. Same principle as PART-006 + canonical React
             TimerComponent showInActionBar:true. */
          try {
            var timerRoot = document.getElementById('mathai-preview-slot')
              || document.getElementById('app');
            if (timerRoot && !document.getElementById('timer-container')) {
              var tc = document.createElement('div');
              tc.id = 'timer-container';
              timerRoot.appendChild(tc);
            }
          } catch (e) {}

          /* 5. TimerComponent (count-up, no effective limit) */
          try {
            timer = new TimerComponent('timer-container', {
              timerType: 'increase',
              format: 'min',
              startTime: 0,
              endTime: 100000,
              autoStart: false,
              onEnd: function() { /* never fires in this game; defensive no-op */ }
            });
            window.timer = timer;
          } catch (e) {
            console.error('[init] TimerComponent error:', e.message);
          }

          /* 6. VisibilityTracker — built-in PopupComponent renders the pause popup */
          try {
            visibilityTracker = new VisibilityTracker({
              popupProps: {
                title: 'Game Paused',
                description: 'Tap Resume to continue.',
                primaryText: 'Resume'
              },
              onInactive: function() {
                try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {}
                try { if (timer) timer.pause({ fromVisibilityTracker: true }); } catch (e) {}
                try { if (previewScreen) previewScreen.pause(); } catch (e) {}
                gameState.duration_data.inActiveTime.push({ start: Date.now() });
              },
              onResume: function() {
                try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {}
                try { if (timer) timer.resume({ fromVisibilityTracker: true }); } catch (e) {}
                try { if (previewScreen) previewScreen.resume(); } catch (e) {}
                var last = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
                if (last && !last.end) {
                  last.end = Date.now();
                  gameState.duration_data.totalInactiveTime += (last.end - last.start);
                }
              }
            });
          } catch (e) {
            console.error('[init] VisibilityTracker error:', e.message);
          }

          /* 7. Progress bar */
          createProgressBar();

          /* 8. Transition screen */
          try {
            transitionScreen = new TransitionScreenComponent({
              autoInject: true,
              slotId: 'mathai-transition-slot',
              gameContentId: 'gameContent'
            });
          } catch (e) {
            console.error('[init] TransitionScreen error:', e.message);
          }

          /* 9. Preview screen */
          try {
            previewScreen = new PreviewScreenComponent({
              slotId: 'mathai-preview-slot'
            });
          } catch (e) {
            console.error('[init] PreviewScreen error:', e.message);
          }

          /* 10. Preload SFX */
          preloadAudio();

          /* 11. Wait for audio permission (once) */
          try {
            await new Promise(function(resolve) {
              if (FeedbackManager.canPlayAudio && FeedbackManager.canPlayAudio()) return resolve();
              var tick = setInterval(function() {
                if (FeedbackManager.canPlayAudio && FeedbackManager.canPlayAudio()) {
                  clearInterval(tick);
                  resolve();
                }
              }, 200);
              setTimeout(function() { clearInterval(tick); resolve(); }, 15000);
            });
          } catch (e) {}

          /* 12. Register message listener BEFORE game_ready */
          window.addEventListener('message', handlePostMessage);

          /* 13. Send game_ready */
          try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

          /* 14. setupGame — renders DOM first, preview last */
          setupGame();
        } else {
          /* Packages failed — fallback */
          buildFallbackLayout();
          injectGameHTML();
          window.addEventListener('message', handlePostMessage);
          try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
        }
      } catch (e) {
        console.error('[init] outer error:', e && e.message);
      }

      /* ===== Standalone setTimeout fallback — runs independently of waitForPackages ===== */
      setTimeout(function() {
        /* PART-039 Standalone-fallback gate: abort if a live preview is mounted */
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (!gameState.isActive && !gameState.gameEnded) {
          if (!document.getElementById('gameContent')) {
            buildFallbackLayout();
          }
          gameState.content = fallbackContent;
          gameState.totalRounds = fallbackContent.rounds.length;
          injectGameHTML();
          startGame();
        }
      }, 2000);

      /* Window exposures (data-contract) */
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartToRound1;
      window.loadRound = renderRound;
    });
  </script>
</body>
</html>
