<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Matching Doubles</title>

  <!-- 1. SentryConfig package -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

  <!-- 2. initSentry() definition -->
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({
        release: 'matching-doubles@1.0.0'
      }));
    }
  </script>

  <!-- 3. Sentry SDK -->
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

  <!-- 4. Initialize Sentry on load -->
  <script>window.addEventListener('load', initSentry);</script>

  <!-- 5-7. Game CDN packages -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      /* Layout */
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;

      /* Brand */
      --mathai-primary: #270f36;
      --mathai-level-text: #270F63;
      --mathai-purple: #9B51E0;

      /* Action */
      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;

      /* Neutrals */
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;

      /* Feedback */
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;

      /* Semantic */
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;

      /* Typography */
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;

      /* Spacing */
      --mathai-padding-large: 56px 40px;
      --mathai-padding-medium: 16px 24px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100dvh;
      overflow-x: hidden;
      overscroll-behavior: none;
      margin: 0;
      padding: 0;
    }

    @supports not (height: 100dvh) {
      html, body { height: 100vh; }
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }

    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }

    button,
    .tile,
    [role="button"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    /* Layout overrides */
    .mathai-layout-root {
      max-width: var(--mathai-game-max-width);
      margin: 0 auto;
    }

    /* Transition screen active state */
    .mathai-ts-screen.active { display: flex; }
    .mathai-ts-card { max-width: 420px; }

    /* Gameplay container */
    #gameContent {
      width: 100%;
      padding: 10px 14px 24px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    /* Timer row */
    .timer-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      width: 100%;
      margin-bottom: 8px;
      min-height: 28px;
    }

    #gameTimerContainer {
      font-size: var(--mathai-font-size-body);
      font-weight: 700;
      color: var(--mathai-primary);
      padding: 4px 10px;
      background: var(--mathai-light-gray);
      border-radius: var(--mathai-border-radius-small);
      min-width: 60px;
      text-align: center;
    }

    .round-prompt {
      font-size: var(--mathai-font-size-subtitle);
      font-weight: 600;
      color: var(--mathai-primary);
      text-align: center;
      margin-bottom: 14px;
      line-height: 1.35;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-column-gap: 16px;
      grid-row-gap: 10px;
      width: 100%;
      align-items: start;
    }

    .match-column {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .match-column .tile {
      margin-bottom: 10px;
    }

    .match-column .tile:last-child {
      margin-bottom: 0;
    }

    .column-label {
      font-size: var(--mathai-font-size-small);
      font-weight: 600;
      color: var(--mathai-gray);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .tile {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 56px;
      padding: 10px 8px;
      background: var(--mathai-white);
      color: var(--mathai-primary);
      border: 2px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-card);
      font-family: var(--mathai-font-family);
      font-size: var(--mathai-font-size-large);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    .tile:active {
      transform: scale(0.97);
    }

    .tile.tile-selected {
      background: var(--mathai-cell-bg-yellow);
      border-color: var(--mathai-yellow);
      color: var(--mathai-primary);
    }

    .tile.locked-pair {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
      color: var(--mathai-green);
      pointer-events: none;
      cursor: default;
      animation: pulseLock 0.3s ease;
    }

    .tile.tile-wrong-flash {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-red);
    }

    .tile.shake-wrong {
      animation: shake 0.6s ease;
    }

    .tile:disabled,
    .tile.disabled {
      opacity: 0.6;
      pointer-events: none;
    }

    /* Animations */
    @keyframes pulseLock {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes scoreBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes starPop {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    @keyframes heartBreak {
      0% { transform: scale(1); opacity: 1; }
      30% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.5); opacity: 0; color: var(--mathai-red); }
    }

    .score-bounce { animation: scoreBounce 0.4s ease; }
    .shake-anim { animation: shake 0.5s ease; }
    .heart-break { animation: heartBreak 0.6s ease forwards; }
    .star-earned { animation: starPop 0.4s ease forwards; }
    .fade-in { animation: fadeIn 0.35s ease; }

    .selected-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-red);
      color: var(--mathai-red);
    }

    .selected-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-green);
      color: var(--mathai-green);
    }

    .correct-reveal {
      font-size: 15px;
      font-weight: 600;
      color: var(--mathai-green);
      text-align: center;
      margin-top: 8px;
      animation: fadeIn 0.35s ease;
    }

    .correct-reveal.hidden { display: none; }

    /* Landscape overlay */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white, #ffffff);
        color: var(--mathai-primary, #270f36);
        font-family: var(--mathai-font-family, system-ui, -apple-system, sans-serif);
        font-size: var(--mathai-font-size-subtitle, 18px);
        text-align: center;
        padding: 24px;
      }
    }

    /* Results / game-over fallback overlay (hidden; TransitionScreen is primary) */
    #results-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      display: none;
    }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="3" data-round="0"></div>
  <div id="results-screen" class="hidden"></div>

  <script>
    /* ========================= 1. Constants ========================= */

    var STICKER_CORRECT = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_INCORRECT = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_MOTIVATE = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_CELEBRATE = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_SAD = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_GAME_COMPLETE_2 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_GAME_COMPLETE_1 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';

    var SFX_CORRECT = 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3';
    var SFX_INCORRECT = 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3';
    var SFX_ROUNDS = 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3';
    var SFX_VICTORY = 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3';
    var SFX_GAME_COMPLETE = 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3';
    var SFX_GAME_OVER = 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3';
    var SFX_BUBBLE_SELECT = 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3';
    var SFX_BUBBLE_DESELECT = 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758712800721.mp3';
    var SFX_ALL_CORRECT = 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506764346.mp3';

    /* ========================= 2. Fallback Content ========================= */

    var fallbackContent = {
      previewInstruction: '<p><strong>Match the doubles!</strong> Tap a number on the left, then tap its <em>double</em> (&times;2) on the right. Finish all 9 rounds before you run out of 3 lives. The faster you finish, the more stars you earn!</p>',
      previewAudioText: 'Match the doubles! Tap a number on the left, then tap its double on the right. Finish all nine rounds before you lose your three lives. The faster you finish, the more stars you earn.',
      previewAudio: null,
      showGameOnPreview: false,
      rounds: [
        { round: 1, stage: 1, type: 'A', id: 'r1_doubles_small', difficulty: 1,
          left: [3, 5, 8],
          right: [16, 6, 10],
          pairs: { '3': 6, '5': 10, '8': 16 },
          misconception_tags: {} },
        { round: 2, stage: 1, type: 'A', id: 'r2_doubles_small', difficulty: 1,
          left: [4, 7, 9],
          right: [18, 8, 14],
          pairs: { '4': 8, '7': 14, '9': 18 },
          misconception_tags: {} },
        { round: 3, stage: 1, type: 'A', id: 'r3_doubles_small', difficulty: 1,
          left: [2, 6, 9],
          right: [18, 4, 12],
          pairs: { '2': 4, '6': 12, '9': 18 },
          misconception_tags: {} },
        { round: 4, stage: 2, type: 'A', id: 'r4_doubles_mid', difficulty: 2,
          left: [6, 11, 15, 22],
          right: [44, 12, 30, 22],
          pairs: { '6': 12, '11': 22, '15': 30, '22': 44 },
          misconception_tags: {} },
        { round: 5, stage: 2, type: 'A', id: 'r5_doubles_mid', difficulty: 2,
          left: [9, 13, 18, 25],
          right: [36, 18, 50, 26],
          pairs: { '9': 18, '13': 26, '18': 36, '25': 50 },
          misconception_tags: {} },
        { round: 6, stage: 2, type: 'A', id: 'r6_doubles_mid', difficulty: 2,
          left: [8, 14, 20, 27],
          right: [28, 40, 54, 16],
          pairs: { '8': 16, '14': 28, '20': 40, '27': 54 },
          misconception_tags: {} },
        { round: 7, stage: 3, type: 'A', id: 'r7_doubles_distractor', difficulty: 3,
          left: [15, 18, 21, 24, 30],
          right: [36, 17, 42, 60, 30, 48],
          pairs: { '15': 30, '18': 36, '21': 42, '24': 48, '30': 60 },
          misconception_tags: { '17': 'double-add-instead' } },
        { round: 8, stage: 3, type: 'A', id: 'r8_doubles_distractor', difficulty: 3,
          left: [17, 23, 28, 35, 40],
          right: [46, 29, 56, 80, 70, 34, 55],
          pairs: { '17': 34, '23': 46, '28': 56, '35': 70, '40': 80 },
          misconception_tags: { '29': 'double-next-number', '55': 'double-off-by-one' } },
        { round: 9, stage: 3, type: 'A', id: 'r9_doubles_distractor', difficulty: 3,
          left: [19, 26, 33, 42, 50],
          right: [38, 52, 44, 66, 84, 100, 51],
          pairs: { '19': 38, '26': 52, '33': 66, '42': 84, '50': 100 },
          misconception_tags: { '44': 'double-add-instead', '51': 'double-next-number' } }
      ]
    };

    /* ========================= 3. gameState ========================= */

    var gameState = {
      gameId: 'matching-doubles',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 9,
      score: 0,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      lives: 3,
      totalLives: 3,
      correctAnswer: null,
      content: null,
      roundStartTime: null,
      selectedLeft: null,
      selectedLeftEl: null,
      pairsLockedThisRound: 0,
      totalPairsMatched: 0,
      stars: 0,
      streak: 0,
      consecutiveWrongs: 0,
      previewResult: null,
      voGameStartPlayed: false,
      duration_data: {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      }
    };
    window.gameState = gameState;

    /* ========================= 4. Module-scope refs ========================= */

    var timer = null;
    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var interactionManager = null;
    var cachedGameContent = null;

    /* ========================= 5. syncDOM ========================= */

    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', Math.max(0, gameState.lives));
      app.setAttribute('data-round', gameState.currentRound);
    }

    /* ========================= 6. trackEvent ========================= */

    function trackEvent(eventName, payload) {
      try {
        var ev = {
          event: eventName,
          timestamp: Date.now(),
          payload: payload || {}
        };
        gameState.events.push(ev);
        if (signalCollector && typeof signalCollector.recordViewEvent === 'function') {
          try { signalCollector.recordViewEvent(eventName, payload || {}); } catch (e) {}
        }
      } catch (e) {
        console.error('trackEvent error: ' + e.message);
      }
    }

    /* ========================= 7. recordAttempt ========================= */

    function recordAttempt(roundIndex, userInput, correct, metadata) {
      var rounds = getRounds();
      var round = rounds[roundIndex] || {};
      metadata = metadata || {};
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) : 0,
        input_of_user: userInput,
        correct: !!correct,
        round_number: roundIndex + 1,
        question_id: round.id || ('r' + (roundIndex + 1)),
        correct_answer: metadata.correct_answer !== undefined ? metadata.correct_answer : (round.pairs || null),
        response_time_ms: gameState.roundStartTime ? (Date.now() - gameState.roundStartTime) : 0,
        misconception_tag: correct ? null : (metadata.misconception_tag || null),
        difficulty_level: round.difficulty || round.stage || 1,
        is_retry: !!metadata.is_retry,
        metadata: metadata
      };
      gameState.attempts.push(attempt);
      gameState.duration_data.attempts.push({
        round: roundIndex + 1,
        timestamp: Date.now()
      });
    }

    /* ========================= 8. getStars ========================= */

    function getStars() {
      // Time-only star rating per spec
      if (gameState.lives <= 0) return 1;
      if (gameState.startTime == null) return 1;
      var elapsedMs = (gameState.endTime || Date.now()) - gameState.startTime;
      if (elapsedMs <= 60000) return 3;
      if (elapsedMs <= 90000) return 2;
      return 1;
    }
    window.calcStars = getStars;

    /* ========================= 9. getRounds ========================= */

    function getRounds() {
      if (gameState.content && gameState.content.rounds &&
          gameState.content.rounds.length >= gameState.totalRounds) {
        return gameState.content.rounds;
      }
      return fallbackContent.rounds;
    }

    /* ========================= 10. waitForPackages ========================= */

    function waitForPackages() {
      return new Promise(function(resolve, reject) {
        var start = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ready = (typeof FeedbackManager !== 'undefined') &&
                      (typeof TimerComponent !== 'undefined') &&
                      (typeof VisibilityTracker !== 'undefined') &&
                      (typeof SignalCollector !== 'undefined');
          if (ready) return resolve(true);
          if (Date.now() - start > TIMEOUT_MS) {
            return reject(new Error('waitForPackages timeout'));
          }
          setTimeout(check, 150);
        }
        check();
      });
    }

    /* ========================= 11. FeedbackManager helpers ========================= */

    function preloadAudio() {
      if (typeof FeedbackManager === 'undefined') return Promise.resolve();
      var list = [
        { id: 'correct_sound_effect', url: SFX_CORRECT },
        { id: 'incorrect_sound_effect', url: SFX_INCORRECT },
        { id: 'sound_life_lost', url: SFX_INCORRECT },
        { id: 'rounds_sound_effect', url: SFX_ROUNDS },
        { id: 'sound_rounds', url: SFX_ROUNDS },
        { id: 'sound_welcome', url: SFX_ROUNDS },
        { id: 'victory_sound_effect', url: SFX_VICTORY },
        { id: 'sound_game_victory', url: SFX_VICTORY },
        { id: 'game_complete_sound_effect', url: SFX_GAME_COMPLETE },
        { id: 'sound_game_complete', url: SFX_GAME_COMPLETE },
        { id: 'game_over_sound_effect', url: SFX_GAME_OVER },
        { id: 'sound_game_over', url: SFX_GAME_OVER },
        { id: 'sound_motivation', url: SFX_ROUNDS },
        { id: 'sound_stars_collected', url: SFX_VICTORY },
        { id: 'sound_tile_select', url: SFX_BUBBLE_SELECT },
        { id: 'sound_tile_deselect', url: SFX_BUBBLE_DESELECT },
        { id: 'all_correct', url: SFX_ALL_CORRECT }
      ];
      if (fallbackContent.previewAudio) {
        list.push({ id: 'preview_audio', url: fallbackContent.previewAudio });
      }
      try {
        return FeedbackManager.sound.preload(list);
      } catch (e) {
        return Promise.resolve();
      }
    }

    function playSfxFireAndForget(id, sticker) {
      try {
        var opts = sticker ? { sticker: sticker } : {};
        var p = FeedbackManager.sound.play(id, opts);
        if (p && typeof p.catch === 'function') {
          p.catch(function(e) { console.error('SFX error ' + id + ': ' + e.message); });
        }
      } catch (e) {
        console.error('playSfx error: ' + e.message);
      }
    }

    /* ========================= 12. handlePostMessage ========================= */

    function handlePostMessage(event) {
      if (!event || !event.data) return;
      var msg = event.data;
      if (msg.type === 'game_init') {
        gameState.phase = 'playing';
        if (msg.content && msg.content.rounds && msg.content.rounds.length >= gameState.totalRounds) {
          gameState.content = msg.content;
        } else {
          gameState.content = fallbackContent;
        }
        gameState.totalRounds = (gameState.content && gameState.content.rounds) ? gameState.content.rounds.length : 9;

        // SignalCollector config
        if (msg.config && msg.config.signalConfig && signalCollector) {
          var sc = msg.config.signalConfig;
          try {
            signalCollector.playId = sc.playId;
            signalCollector.gameId = sc.gameId || 'matching-doubles';
            signalCollector.sessionId = sc.sessionId;
            signalCollector.contentSetId = sc.contentSetId;
            signalCollector.studentId = sc.studentId;
            signalCollector.flushUrl = sc.flushUrl;
            if (typeof signalCollector.startFlushing === 'function') signalCollector.startFlushing();
          } catch (e) {}
        }
        syncDOM();
        if (!gameState.isActive && !gameState.gameEnded) {
          setupGame();
        }
      }
    }

    /* ========================= 13. render ========================= */

    function render() {
      syncDOM();
    }

    /* ========================= 14. Progress bar helper ========================= */

    function createProgressBar() {
      if (typeof ProgressBarComponent === 'undefined') return;
      try { if (progressBar && typeof progressBar.destroy === 'function') progressBar.destroy(); } catch (e) {}
      try {
        progressBar = new ProgressBarComponent({
          slotId: 'mathai-progress-slot',
          totalRounds: gameState.totalRounds,
          totalLives: Math.max(1, gameState.totalLives)
        });
        if (typeof progressBar.show === 'function') progressBar.show();
        progressBar.update(0, gameState.totalLives);
      } catch (e) {
        console.error('progressBar init: ' + e.message);
      }
    }

    /* ========================= 15. Play-area injection ========================= */

    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="timer-row">' +
          '<div id="gameTimerContainer" data-testid="timer-display">00:00</div>' +
        '</div>' +
        '<h2 class="round-prompt" data-testid="round-prompt">Which numbers are doubles?</h2>' +
        '<div class="match-grid" id="matchGrid">' +
          '<div class="match-column" id="leftColumn"></div>' +
          '<div class="match-column" id="rightColumn"></div>' +
        '</div>';
      cachedGameContent = gc;
    }

    function renderInitialState() {
      // Render Round 1 tiles as initial state before preview (showGameOnPreview is false, but required by PART-039 order rule)
      renderRoundTiles(0);
    }

    function renderRoundTiles(roundIndex) {
      var rounds = getRounds();
      var round = rounds[roundIndex];
      if (!round) return;
      var leftCol = document.getElementById('leftColumn');
      var rightCol = document.getElementById('rightColumn');
      if (!leftCol || !rightCol) return;

      leftCol.className = 'match-column fade-in';
      rightCol.className = 'match-column fade-in';
      leftCol.innerHTML = '';
      rightCol.innerHTML = '';

      var i, btn, val;
      for (i = 0; i < round.left.length; i++) {
        val = round.left[i];
        btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tile tile-left';
        btn.setAttribute('data-tile', 'left-' + val);
        btn.setAttribute('data-value', String(val));
        btn.setAttribute('data-side', 'left');
        btn.setAttribute('data-testid', 'tile-left-' + val);
        btn.id = 'tile-left-' + val;
        btn.textContent = String(val);
        btn.addEventListener('click', onLeftTileTap);
        leftCol.appendChild(btn);
      }
      for (i = 0; i < round.right.length; i++) {
        val = round.right[i];
        btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tile tile-right';
        btn.setAttribute('data-tile', 'right-' + val);
        btn.setAttribute('data-value', String(val));
        btn.setAttribute('data-side', 'right');
        btn.setAttribute('data-testid', 'tile-right-' + val);
        btn.id = 'tile-right-' + val + '-idx' + i;
        btn.textContent = String(val);
        btn.addEventListener('click', onRightTileTap);
        rightCol.appendChild(btn);
      }

      // expose correct answer for the round
      gameState.correctAnswer = round.pairs;
    }

    /* ========================= 16. Tile tap handlers ========================= */

    function onLeftTileTap(e) {
      if (gameState.isProcessing || gameState.gameEnded || !gameState.isActive) return;
      var tile = e.currentTarget;
      if (!tile || tile.classList.contains('locked-pair')) return;
      var val = parseInt(tile.getAttribute('data-value'), 10);

      if (gameState.selectedLeft === val) {
        // deselect
        tile.classList.remove('tile-selected');
        gameState.selectedLeft = null;
        gameState.selectedLeftEl = null;
        playSfxFireAndForget('sound_tile_deselect', null);
        return;
      }

      // deselect prior left (if any)
      if (gameState.selectedLeftEl) {
        gameState.selectedLeftEl.classList.remove('tile-selected');
      }
      tile.classList.add('tile-selected');
      gameState.selectedLeft = val;
      gameState.selectedLeftEl = tile;
      playSfxFireAndForget('sound_tile_select', null);
    }

    function onRightTileTap(e) {
      if (gameState.isProcessing || gameState.gameEnded || !gameState.isActive) return;
      var tile = e.currentTarget;
      if (!tile || tile.classList.contains('locked-pair')) return;
      if (gameState.selectedLeft === null) {
        // no left selected — micro feedback only
        playSfxFireAndForget('sound_tile_select', null);
        return;
      }
      var rightVal = parseInt(tile.getAttribute('data-value'), 10);
      var leftVal = gameState.selectedLeft;
      var leftEl = gameState.selectedLeftEl;
      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      if (!round) return;

      var expected = round.pairs[String(leftVal)];
      var isCorrect = (expected === rightVal);

      if (isCorrect) {
        handleCorrectMatch(leftEl, tile, leftVal, rightVal);
      } else {
        handleWrongMatch(leftEl, tile, leftVal, rightVal, round);
      }
    }

    function handleCorrectMatch(leftEl, rightEl, leftVal, rightVal) {
      // Update state
      gameState.pairsLockedThisRound++;
      gameState.totalPairsMatched++;
      gameState.score = gameState.totalPairsMatched;
      gameState.streak++;
      gameState.consecutiveWrongs = 0;
      gameState.selectedLeft = null;
      gameState.selectedLeftEl = null;

      // Visual
      leftEl.classList.remove('tile-selected');
      leftEl.classList.add('locked-pair');
      rightEl.classList.add('locked-pair');

      // Record attempt BEFORE audio
      recordAttempt(gameState.currentRound, { left: leftVal, right: rightVal }, true, {
        correct_answer: rightVal,
        left_value: leftVal,
        right_value: rightVal
      });
      trackEvent('answer_submitted', {
        round: gameState.currentRound + 1,
        correct: true,
        response_time_ms: gameState.roundStartTime ? (Date.now() - gameState.roundStartTime) : 0
      });

      syncDOM();
      try { if (progressBar) progressBar.update(gameState.currentRound, Math.max(0, gameState.lives)); } catch (e) {}

      // Fire-and-forget SFX + sticker (multi-step, no TTS, no block)
      playSfxFireAndForget('correct_sound_effect', STICKER_CORRECT);

      // Round complete check
      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      if (gameState.pairsLockedThisRound >= round.left.length) {
        // Round complete path (awaited)
        onRoundComplete();
      }
    }

    function handleWrongMatch(leftEl, rightEl, leftVal, rightVal, round) {
      // Apply visual first
      leftEl.classList.remove('tile-selected');
      leftEl.classList.add('shake-wrong');
      leftEl.classList.add('tile-wrong-flash');
      rightEl.classList.add('shake-wrong');
      rightEl.classList.add('tile-wrong-flash');

      // Lives
      gameState.lives = Math.max(0, gameState.lives - 1);
      gameState.streak = 0;
      gameState.consecutiveWrongs++;

      // Misconception tag
      var tag = null;
      if (round.misconception_tags && round.misconception_tags[String(rightVal)]) {
        tag = round.misconception_tags[String(rightVal)];
      }

      // Record attempt BEFORE audio
      recordAttempt(gameState.currentRound, { left: leftVal, right: rightVal }, false, {
        correct_answer: round.pairs[String(leftVal)],
        left_value: leftVal,
        right_value: rightVal,
        misconception_tag: tag
      });
      trackEvent('answer_submitted', {
        round: gameState.currentRound + 1,
        correct: false,
        misconception_tag: tag,
        response_time_ms: gameState.roundStartTime ? (Date.now() - gameState.roundStartTime) : 0
      });

      syncDOM();
      try { if (progressBar) progressBar.update(gameState.currentRound, Math.max(0, gameState.lives)); } catch (e) {}

      gameState.selectedLeft = null;
      gameState.selectedLeftEl = null;

      if (gameState.lives <= 0) {
        // Game over: skip wrong SFX, go straight to game_over path (CASE 8)
        setTimeout(function() {
          try {
            leftEl.classList.remove('shake-wrong');
            leftEl.classList.remove('tile-wrong-flash');
            rightEl.classList.remove('shake-wrong');
            rightEl.classList.remove('tile-wrong-flash');
          } catch (e) {}
        }, 600);
        endGame(false);
        return;
      }

      // Lives remaining — fire-and-forget wrong SFX + sticker
      playSfxFireAndForget('incorrect_sound_effect', STICKER_INCORRECT);

      // Clear visual after 600ms
      setTimeout(function() {
        try {
          leftEl.classList.remove('shake-wrong');
          leftEl.classList.remove('tile-wrong-flash');
          rightEl.classList.remove('shake-wrong');
          rightEl.classList.remove('tile-wrong-flash');
        } catch (e) {}
      }, 600);
    }

    /* ========================= 17. onRoundComplete ========================= */

    async function onRoundComplete() {
      gameState.isProcessing = true;
      trackEvent('round_complete', { round: gameState.currentRound + 1 });
      syncDOM();

      try {
        await FeedbackManager.sound.play('all_correct', { sticker: STICKER_CELEBRATE });
        await FeedbackManager.playDynamicFeedback({
          audio_content: 'Round complete!',
          subtitle: 'Round complete!',
          sticker: STICKER_CELEBRATE
        });
      } catch (e) {
        console.error('round complete audio: ' + e.message);
      }

      gameState.pairsLockedThisRound = 0;
      var nextRoundIdx = gameState.currentRound + 1;
      gameState.isProcessing = false;

      if (nextRoundIdx >= gameState.totalRounds) {
        endGame(true);
        return;
      }

      gameState.currentRound = nextRoundIdx;
      syncDOM();
      try { if (progressBar) progressBar.update(gameState.currentRound, Math.max(0, gameState.lives)); } catch (e) {}
      await showRoundIntro(gameState.currentRound);
      loadRound(gameState.currentRound);
    }

    /* ========================= 18. Round intro ========================= */

    async function showRoundIntro(roundIdx) {
      if (!transitionScreen) return;
      try {
        FeedbackManager.sound.stopAll();
      } catch (e) {}
      try {
        await transitionScreen.show({
          icons: ['🔢'],
          title: 'Round ' + (roundIdx + 1),
          duration: 1600,
          onMounted: function() {
            try {
              FeedbackManager.sound.play('sound_rounds', { sticker: STICKER_MOTIVATE })
                .catch(function(e) {});
            } catch (e) {}
          }
        });
      } catch (e) {
        console.error('showRoundIntro: ' + e.message);
      }
      try { transitionScreen.hide(); } catch (e) {}
    }

    /* ========================= 19. Welcome transition ========================= */

    async function showWelcome() {
      if (!transitionScreen) return;
      var audioStopped = false;
      var resolvePromise;
      var donePromise = new Promise(function(res) { resolvePromise = res; });

      try {
        var welcomeShow = transitionScreen.show({
          icons: ['🎯'],
          title: 'Round 1',
          subtitle: "Let's double some numbers!",
          buttons: [
            {
              text: "Let's go! 🚀",
              onClick: function() {
                audioStopped = true;
                try { FeedbackManager.sound.stopAll(); } catch (e) {}
                try { FeedbackManager._stopCurrentDynamic(); } catch (e) {}
                try { transitionScreen.hide(); } catch (e) {}
                resolvePromise();
              }
            }
          ],
          persist: true,
          onMounted: function() {
            (async function() {
              try {
                await FeedbackManager.sound.play('sound_welcome', { sticker: STICKER_MOTIVATE });
                if (audioStopped) return;
                await FeedbackManager.playDynamicFeedback({
                  audio_content: "Let's double some numbers!",
                  subtitle: "Let's double some numbers!",
                  sticker: STICKER_MOTIVATE
                });
              } catch (e) {}
            })();
          }
        });
        if (welcomeShow && typeof welcomeShow.then === 'function') {
          welcomeShow.then(function() { resolvePromise(); });
        }
      } catch (e) {
        console.error('showWelcome: ' + e.message);
        resolvePromise();
      }
      await donePromise;
      gameState.voGameStartPlayed = true;
    }

    /* ========================= 20. loadRound ========================= */

    function loadRound(roundIdx) {
      gameState.isProcessing = false;
      gameState.isActive = true;
      gameState.currentRound = roundIdx;
      gameState.pairsLockedThisRound = 0;
      gameState.selectedLeft = null;
      gameState.selectedLeftEl = null;
      gameState.roundStartTime = Date.now();
      syncDOM();
      renderRoundTiles(roundIdx);
      try { if (progressBar) progressBar.update(gameState.currentRound, Math.max(0, gameState.lives)); } catch (e) {}
    }
    window.loadRound = loadRound;

    /* ========================= 21. nextRound (exposed for harness) ========================= */

    function nextRound() {
      if (gameState.gameEnded) return;
      var next = gameState.currentRound + 1;
      if (next >= gameState.totalRounds) {
        endGame(true);
        return;
      }
      gameState.currentRound = next;
      loadRound(next);
    }
    window.nextRound = nextRound;

    /* ========================= 22. startGame ========================= */

    function startGame() {
      if (gameState.isActive) return;
      gameState.phase = 'gameplay';
      gameState.isActive = true;
      gameState.gameEnded = false;
      gameState.isProcessing = false;
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.lives = gameState.totalLives;
      gameState.totalPairsMatched = 0;
      gameState.pairsLockedThisRound = 0;
      gameState.selectedLeft = null;
      gameState.selectedLeftEl = null;
      gameState.stars = 0;
      if (gameState.startTime == null) gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();

      if (timer && typeof timer.start === 'function') {
        try { timer.start(); } catch (e) {}
      }
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();
      try { if (progressBar) progressBar.update(0, gameState.totalLives); } catch (e) {}

      // Load round 0 (render tiles) and show welcome
      (async function() {
        try {
          loadRound(0);
          await showWelcome();
          await showRoundIntro(0);
          // After round intro, ensure gameplay is ready
          loadRound(0);
        } catch (e) {
          console.error('startGame flow: ' + e.message);
        }
      })();
    }
    window.startGame = startGame;

    /* ========================= 23. setupGame (renders DOM then shows preview) ========================= */

    function setupGame() {
      if (!gameState.content) gameState.content = fallbackContent;
      // 1. Ensure gameContent exists
      if (!document.getElementById('gameContent')) {
        buildFallbackLayout();
      }
      // 2. Inject gameplay DOM BEFORE preview.show
      injectGameHTML();
      renderInitialState();

      // 3. Show preview last
      if (previewScreen && typeof previewScreen.show === 'function') {
        try {
          var content = gameState.content || fallbackContent;
          previewScreen.show({
            instruction: content.previewInstruction || fallbackContent.previewInstruction,
            audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
            showGameOnPreview: content.showGameOnPreview === true,
            timerConfig: null,
            timerInstance: null,
            onComplete: function(previewData) {
              startGameAfterPreview(previewData);
            }
          });
        } catch (e) {
          console.error('preview.show: ' + e.message);
          // Fall back to direct start
          startGameAfterPreview({ duration: 0 });
        }
      } else {
        startGameAfterPreview({ duration: 0 });
      }
    }

    /* ========================= 24. startGameAfterPreview ========================= */

    function startGameAfterPreview(previewData) {
      if (gameState.isActive) return;
      previewData = previewData || { duration: 0 };
      gameState.previewResult = previewData;
      gameState.duration_data.preview = gameState.duration_data.preview || [];
      gameState.duration_data.preview.push({ duration: previewData.duration || 0 });

      gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();
      if (timer && typeof timer.start === 'function') {
        try { timer.start(); } catch (e) {}
      }
      startGame();
    }
    window.startGameAfterPreview = startGameAfterPreview;

    /* ========================= 25. buildFallbackLayout ========================= */

    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      if (document.getElementById('gameContent')) return;
      var wrapper = document.createElement('div');
      wrapper.className = 'page-center';
      wrapper.innerHTML =
        '<div id="mathai-preview-slot"></div>' +
        '<div class="game-stack">' +
          '<div id="mathai-progress-slot"></div>' +
          '<div id="gameContent"></div>' +
          '<div id="mathai-transition-slot"></div>' +
        '</div>';
      app.appendChild(wrapper);
    }

    /* ========================= 26. endGame ========================= */

    function endGame(won) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.endTime = Date.now();

      if (timer && typeof timer.pause === 'function') {
        try { timer.pause({ fromVisibilityTracker: false }); } catch (e) {}
      }

      gameState.phase = won ? 'results' : 'game_over';
      // Stars (time-only)
      if (!won) {
        gameState.stars = 1;
      } else {
        gameState.stars = getStars();
      }
      gameState.score = gameState.totalPairsMatched;

      syncDOM();
      trackEvent('game_end', {
        won: won,
        score: gameState.score,
        stars: gameState.stars,
        rounds_played: gameState.currentRound + 1,
        lives: gameState.lives
      });

      // Seal signals if available
      var signalMeta = null;
      var signalEventCount = 0;
      try {
        if (signalCollector && typeof signalCollector.seal === 'function') {
          var sealed = signalCollector.seal();
          if (sealed) {
            signalMeta = sealed.metadata || sealed;
            signalEventCount = sealed.eventCount || 0;
          }
        }
      } catch (e) {}

      // Render end screen FIRST (before postMessage + audio)
      if (won) {
        showVictory(signalMeta, signalEventCount);
      } else {
        showGameOver(signalMeta, signalEventCount);
      }

      // PART-039: destroy() called exactly once at session-final endGame()
      try {
        if (previewScreen && typeof previewScreen.destroy === 'function') {
          previewScreen.destroy();
        }
      } catch (e) {}
    }
    window.endGame = endGame;

    /* ========================= 27. postGameComplete ========================= */

    function postGameComplete(won, signalMeta, signalEventCount) {
      try {
        var elapsedMs = (gameState.endTime || Date.now()) - (gameState.startTime || Date.now());
        var timeSec = Math.round(elapsedMs / 1000);
        var accuracy = Math.round((gameState.totalPairsMatched / 36) * 100);
        var payload = {
          type: 'game_complete',
          data: {
            metrics: {
              accuracy: accuracy,
              time: timeSec,
              stars: gameState.stars,
              attempts: gameState.attempts,
              duration_data: gameState.duration_data,
              totalLives: gameState.totalLives,
              tries: computeTriesPerRound(gameState.attempts),
              score: gameState.totalPairsMatched,
              totalQuestions: 36,
              timeSpent: elapsedMs,
              gameStatus: won ? 'victory' : 'game_over'
            },
            completedAt: Date.now(),
            previewResult: gameState.previewResult || null,
            signal_event_count: signalEventCount || 0,
            signal_metadata: signalMeta || null
          }
        };
        window.parent.postMessage(payload, '*');
      } catch (e) {
        console.error('postGameComplete: ' + e.message);
      }
    }

    function computeTriesPerRound(attempts) {
      var counts = {};
      for (var i = 0; i < attempts.length; i++) {
        var r = attempts[i].round_number;
        counts[r] = (counts[r] || 0) + 1;
      }
      var out = [];
      for (var k in counts) {
        if (counts.hasOwnProperty(k)) {
          out.push({ round: parseInt(k, 10), tries: counts[k] });
        }
      }
      return out;
    }

    /* ========================= 28. showVictory ========================= */

    async function showVictory(signalMeta, signalEventCount) {
      var elapsedMs = (gameState.endTime || Date.now()) - (gameState.startTime || Date.now());
      var elapsedSeconds = Math.round(elapsedMs / 1000);
      var stars = gameState.stars;
      var subtitle = 'Completed in ' + elapsedSeconds + 's — all ' + gameState.totalPairsMatched + ' pairs matched!';
      var tierVO;
      if (stars === 3) tierVO = 'Lightning fast doubling!';
      else if (stars === 2) tierVO = 'Nice work!';
      else tierVO = "You finished — let's get faster next time!";

      // Build buttons set per screens.md
      var audioStopped = false;
      var buttons;
      if (stars === 3) {
        buttons = [
          {
            text: 'Claim Stars',
            onClick: function() {
              audioStopped = true;
              try { FeedbackManager.sound.stopAll(); } catch (e) {}
              try { FeedbackManager._stopCurrentDynamic(); } catch (e) {}
              try { transitionScreen.hide(); } catch (e) {}
              showStarsCollected();
            }
          }
        ];
      } else {
        buttons = [
          {
            text: 'Play Again',
            onClick: function() {
              audioStopped = true;
              try { FeedbackManager.sound.stopAll(); } catch (e) {}
              try { FeedbackManager._stopCurrentDynamic(); } catch (e) {}
              try { transitionScreen.hide(); } catch (e) {}
              showMotivation();
            }
          },
          {
            text: 'Claim Stars',
            onClick: function() {
              audioStopped = true;
              try { FeedbackManager.sound.stopAll(); } catch (e) {}
              try { FeedbackManager._stopCurrentDynamic(); } catch (e) {}
              try { transitionScreen.hide(); } catch (e) {}
              showStarsCollected();
            }
          }
        ];
      }

      // 1) Render screen first
      if (transitionScreen) {
        try {
          transitionScreen.show({
            stars: stars,
            title: 'Victory 🎉',
            subtitle: subtitle,
            buttons: buttons,
            persist: true,
            onMounted: function() {
              // 3) Audio after postMessage
              (async function() {
                try {
                  var sfxId = stars === 3 ? 'sound_game_victory' : 'sound_game_complete';
                  var sticker = stars === 3 ? STICKER_CELEBRATE : (stars === 2 ? STICKER_GAME_COMPLETE_2 : STICKER_GAME_COMPLETE_1);
                  await FeedbackManager.sound.play(sfxId, { sticker: sticker });
                  if (audioStopped) return;
                  await FeedbackManager.playDynamicFeedback({
                    audio_content: tierVO,
                    subtitle: tierVO,
                    sticker: sticker
                  });
                } catch (e) {}
              })();
            }
          });
        } catch (e) {
          console.error('showVictory: ' + e.message);
        }
      }

      // 2) postMessage BEFORE audio
      postGameComplete(true, signalMeta, signalEventCount);

      try {
        if (progressBar) progressBar.update(gameState.totalRounds, Math.max(0, gameState.lives));
      } catch (e) {}
    }

    /* ========================= 29. showGameOver ========================= */

    async function showGameOver(signalMeta, signalEventCount) {
      var audioStopped = false;
      if (transitionScreen) {
        try {
          transitionScreen.show({
            icons: ['😔'],
            title: 'Game Over',
            subtitle: 'You ran out of lives!',
            buttons: [
              {
                text: 'Try Again',
                onClick: function() {
                  audioStopped = true;
                  try { FeedbackManager.sound.stopAll(); } catch (e) {}
                  try { FeedbackManager._stopCurrentDynamic(); } catch (e) {}
                  try { transitionScreen.hide(); } catch (e) {}
                  showMotivation();
                }
              }
            ],
            persist: true,
            onMounted: function() {
              (async function() {
                try {
                  await FeedbackManager.sound.play('sound_game_over', { sticker: STICKER_SAD });
                  if (audioStopped) return;
                  await FeedbackManager.playDynamicFeedback({
                    audio_content: "Good try — let's practice those doubles again!",
                    subtitle: "Good try — let's practice those doubles again!",
                    sticker: STICKER_SAD
                  });
                } catch (e) {}
              })();
            }
          });
        } catch (e) {
          console.error('showGameOver: ' + e.message);
        }
      }

      // postMessage BEFORE audio (audio is queued in onMounted, so this still precedes play)
      postGameComplete(false, signalMeta, signalEventCount);
    }

    /* ========================= 30. showMotivation ========================= */

    async function showMotivation() {
      if (!transitionScreen) { restartToRound1(); return; }
      try {
        transitionScreen.show({
          title: 'Ready to improve your score? ⚡',
          buttons: [
            {
              text: "I'm ready! 🙌",
              onClick: function() {
                try { FeedbackManager.sound.stopAll(); } catch (e) {}
                try { FeedbackManager._stopCurrentDynamic(); } catch (e) {}
                try { transitionScreen.hide(); } catch (e) {}
                restartToRound1();
              }
            }
          ],
          persist: true,
          onMounted: function() {
            try {
              FeedbackManager.sound.play('sound_motivation', { sticker: STICKER_MOTIVATE })
                .catch(function(e) {});
            } catch (e) {}
          }
        });
      } catch (e) {
        console.error('showMotivation: ' + e.message);
        restartToRound1();
      }
    }

    /* ========================= 31. showStarsCollected ========================= */

    function showStarsCollected() {
      if (!transitionScreen) {
        try { window.parent.postMessage({ type: 'game_exit' }, '*'); } catch (e) {}
        return;
      }
      try {
        transitionScreen.show({
          title: 'Yay! 🎉\nStars collected!',
          duration: 2500,
          styles: { title: { whiteSpace: 'pre-line', lineHeight: '1.3' } },
          onMounted: function() {
            try {
              FeedbackManager.sound.play('sound_stars_collected', { sticker: STICKER_CELEBRATE })
                .catch(function(e) {});
            } catch (e) {}
          }
        });
      } catch (e) {
        console.error('showStarsCollected: ' + e.message);
      }
      setTimeout(function() {
        try { transitionScreen.hide(); } catch (e) {}
        try { window.parent.postMessage({ type: 'game_exit' }, '*'); } catch (e) {}
      }, 2500);
    }

    /* ========================= 32. restartToRound1 / restartGame ========================= */

    function restartToRound1() {
      // Stop all audio
      try { FeedbackManager.sound.stopAll(); } catch (e) {}
      try { FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try { if (FeedbackManager.stream && FeedbackManager.stream.stopAll) FeedbackManager.stream.stopAll(); } catch (e) {}

      // Reset state
      gameState.phase = 'start_screen';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.duration_data = {
        startTime: null,
        preview: gameState.duration_data.preview || [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      };
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.lives = gameState.totalLives;
      gameState.totalPairsMatched = 0;
      gameState.pairsLockedThisRound = 0;
      gameState.selectedLeft = null;
      gameState.selectedLeftEl = null;
      gameState.stars = 0;
      gameState.startTime = null;
      gameState.endTime = null;
      gameState.streak = 0;
      gameState.consecutiveWrongs = 0;

      // Timer reset
      try { if (timer && typeof timer.reset === 'function') timer.reset(); } catch (e) {}

      // SignalCollector reset (do NOT seal+re-instantiate)
      try { if (signalCollector && typeof signalCollector.reset === 'function') signalCollector.reset(); } catch (e) {}

      // Progress bar reset
      createProgressBar();

      // Re-inject gameplay DOM (preview is NOT re-shown per PART-039)
      injectGameHTML();
      renderRoundTiles(0);

      syncDOM();

      // Kick off: start timer, then enter Round 1 gameplay directly
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();
      if (timer && typeof timer.start === 'function') {
        try { timer.start(); } catch (e) {}
      }
      gameState.phase = 'gameplay';
      gameState.isActive = true;
      gameState.gameEnded = false;
      trackEvent('game_start', { totalRounds: gameState.totalRounds, restart: true });
      syncDOM();
      loadRound(0);
    }
    window.restartGame = restartToRound1;

    /* ========================= 33. Debug functions ========================= */

    window.debugGame = function() {
      return {
        phase: gameState.phase,
        currentRound: gameState.currentRound,
        lives: gameState.lives,
        pairsLockedThisRound: gameState.pairsLockedThisRound,
        totalPairsMatched: gameState.totalPairsMatched,
        score: gameState.score,
        stars: gameState.stars,
        isActive: gameState.isActive,
        isProcessing: gameState.isProcessing,
        gameEnded: gameState.gameEnded,
        selectedLeft: gameState.selectedLeft,
        attemptsCount: gameState.attempts.length
      };
    };

    window.debugAudio = function() {
      try {
        return {
          feedbackManager: typeof FeedbackManager !== 'undefined',
          canPlay: typeof FeedbackManager !== 'undefined' && FeedbackManager.canPlayAudio ? FeedbackManager.canPlayAudio() : false
        };
      } catch (e) { return { error: e.message }; }
    };

    window.testAudio = function(id) {
      try {
        return FeedbackManager.sound.play(id || 'correct_sound_effect', { sticker: STICKER_CORRECT });
      } catch (e) { return null; }
    };

    window.testPause = function() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.pauseAll(); } catch (e) {}
      try { if (timer) timer.pause({ fromVisibilityTracker: true }); } catch (e) {}
    };

    window.testResume = function() {
      try { FeedbackManager.sound.resume(); } catch (e) {}
      try { FeedbackManager.stream.resumeAll(); } catch (e) {}
      try { if (timer) timer.resume({ fromVisibilityTracker: true }); } catch (e) {}
    };

    /* ========================= 34. DOMContentLoaded ========================= */

    document.addEventListener('DOMContentLoaded', function() {
      // 1. Register message listener BEFORE sending game_ready
      window.addEventListener('message', handlePostMessage);

      // 2. Send game_ready
      try {
        window.parent.postMessage({ type: 'game_ready' }, '*');
      } catch (e) {}

      // 3. Start CDN init
      waitForPackages().then(function() {
        return FeedbackManager.init();
      }).then(function() {
        // SignalCollector
        try {
          if (typeof SignalCollector !== 'undefined') {
            signalCollector = new SignalCollector({
              gameId: 'matching-doubles',
              sessionId: 'session-' + Date.now(),
              playId: 'play-' + Date.now(),
              contentSetId: 'default',
              studentId: 'anonymous',
              flushUrl: null
            });
            window.signalCollector = signalCollector;
          }
        } catch (e) {}

        // ScreenLayout
        try {
          if (typeof ScreenLayout !== 'undefined' && ScreenLayout.inject) {
            ScreenLayout.inject('app', {
              slots: {
                previewScreen: true,
                progressBar: true,
                transitionScreen: true
              }
            });
          } else {
            buildFallbackLayout();
          }
        } catch (e) {
          buildFallbackLayout();
        }

        // Inject timer container — actually placed inside #gameContent when injectGameHTML runs.
        // Build play-area HTML now so that #gameTimerContainer exists
        injectGameHTML();

        // Timer (count-up, manual start)
        try {
          if (typeof TimerComponent !== 'undefined') {
            timer = new TimerComponent('gameTimerContainer', {
              timerType: 'increase',
              format: 'min',
              startTime: 0,
              autoStart: false
            });
          }
        } catch (e) {}

        // InteractionManager (if available)
        try {
          if (typeof InteractionManager !== 'undefined') {
            interactionManager = new InteractionManager();
          }
        } catch (e) {}

        // VisibilityTracker — created AFTER timer so tracker can reference it
        try {
          if (typeof VisibilityTracker !== 'undefined') {
            visibilityTracker = new VisibilityTracker({
              onInactive: function() {
                try { FeedbackManager.sound.pause(); } catch (e) {}
                try { FeedbackManager.stream.pauseAll(); } catch (e) {}
                try { if (timer && !gameState.gameEnded) timer.pause({ fromVisibilityTracker: true }); } catch (e) {}
                try { if (previewScreen && previewScreen.pause) previewScreen.pause(); } catch (e) {}
              },
              onResume: function() {
                try { FeedbackManager.sound.resume(); } catch (e) {}
                try { FeedbackManager.stream.resumeAll(); } catch (e) {}
                try { if (timer && !gameState.gameEnded) timer.resume({ fromVisibilityTracker: true }); } catch (e) {}
                try { if (previewScreen && previewScreen.resume) previewScreen.resume(); } catch (e) {}
              }
            });
          }
        } catch (e) {}

        // ProgressBar
        createProgressBar();

        // TransitionScreen
        try {
          if (typeof TransitionScreenComponent !== 'undefined') {
            transitionScreen = new TransitionScreenComponent({ autoInject: true });
          }
        } catch (e) {}

        // PreviewScreen
        try {
          if (typeof PreviewScreenComponent !== 'undefined') {
            previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' });
          }
        } catch (e) {}

        // Audio preload
        return preloadAudio();
      }).then(function() {
        // Start the game flow (preview first, then welcome, rounds...)
        if (!gameState.isActive && !gameState.gameEnded) {
          if (!gameState.content) gameState.content = fallbackContent;
          gameState.totalRounds = fallbackContent.rounds.length;
          setupGame();
        }
      }).catch(function(e) {
        console.error('[init] ' + e.message);
      });

      // 4. Standalone fallback — runs independently; gated against live preview
      setTimeout(function() {
        // If preview is active, abort — the real flow is live
        try {
          if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        } catch (e) {}
        if (!gameState.isActive && !gameState.gameEnded) {
          if (!document.getElementById('gameContent')) {
            buildFallbackLayout();
          }
          if (!gameState.content) gameState.content = fallbackContent;
          gameState.totalRounds = fallbackContent.rounds.length;
          injectGameHTML();
          if (!previewScreen) {
            // No CDN available — start gameplay directly
            startGameAfterPreview({ duration: 0 });
          } else {
            setupGame();
          }
        }
      }, 5000);

      // Window exposures
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartToRound1;
      window.nextRound = nextRound;
      window.startGame = startGame;
      window.loadRound = loadRound;
      window.startGameAfterPreview = startGameAfterPreview;
    });
  </script>
</body>
</html>
