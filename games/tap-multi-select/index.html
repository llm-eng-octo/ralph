<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pick the Evens</title>

<!-- STEP 1: SentryConfig package -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

<!-- STEP 2: initSentry() function definition -->
<script>
function initSentry() {
  try {
    if (typeof SentryConfig !== 'undefined' && SentryConfig.enabled && typeof Sentry !== 'undefined') {
      Sentry.init({
        dsn: SentryConfig.dsn,
        environment: SentryConfig.environment,
        release: "tap-multi-select@1.0.0",
        tracesSampleRate: SentryConfig.tracesSampleRate,
        sampleRate: SentryConfig.sampleRate,
        maxBreadcrumbs: 50,
        ignoreErrors: [
          "ResizeObserver loop limit exceeded",
          "ResizeObserver loop completed with undelivered notifications",
          "Non-Error promise rejection captured",
          "Script error.",
          "Load failed",
          "Failed to fetch"
        ]
      });
    }
  } catch (e) { console.error('Sentry init failed:', e.message); }
}
</script>

<!-- STEP 3: Sentry SDK v10.23.0 -->
<script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

<!-- STEP 4: Initialize on load -->
<script>window.addEventListener('load', initSentry);</script>

<!-- STEP 5-7: Game packages -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100dvh; overflow: hidden; overscroll-behavior: none; }
@supports not (height: 100dvh) { html, body { height: 100vh; } }
body {
  font-family: var(--mathai-font-family);
  background: var(--mathai-white);
  color: var(--mathai-text-primary);
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

/* === LAYOUT ROOT === */
.mathai-layout-root { max-width: 480px; margin: 0 auto; }

/* === PLAY AREA LAYOUT === */
.mathai-layout-playarea {
  display: flex;
  flex-direction: column !important;
  align-items: center !important;
  padding: 0 20px 32px !important;
}

.mathai-ts-screen.active {
  flex: 1;
  align-items: center;
  justify-content: flex-start;
  padding-top: 16px;
}

.mathai-ts-card {
  min-height: 50dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* === GAME PLAY AREA === */
.game-play-area {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
}

/* === QUESTION DISPLAY === */
.question-display {
  text-align: center;
  padding: 16px;
  margin-bottom: 16px;
}

.question-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--mathai-primary);
  font-family: var(--mathai-font-family);
}

/* === TILE GRID === */
.tile-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 400px;
  width: 100%;
}

/* === INDIVIDUAL TILE === */
.tile {
  padding: 14px 20px;
  margin: 6px;
  border: 2px solid var(--mathai-border-gray);
  border-radius: 24px;
  cursor: pointer;
  font-size: var(--mathai-font-size-body);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  background: var(--mathai-white);
  color: var(--mathai-text-primary);
  transition: all 0.2s ease;
  min-width: 64px;
  min-height: 48px;
  text-align: center;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.tile:active { transform: scale(0.95); }

/* Tile states */
.tile.selected {
  background: var(--mathai-cell-bg-yellow);
  border-color: #f0c800;
  transform: scale(1.05);
}

.tile.correct {
  background: var(--mathai-cell-bg-green);
  border-color: var(--mathai-cell-border-green);
}

.tile.incorrect {
  background: var(--mathai-cell-bg-red);
  border-color: var(--mathai-cell-border-red);
}

.tile.missed {
  background: var(--mathai-cell-bg-green);
  border-color: var(--mathai-cell-border-green);
  opacity: 0.7;
}

.tile.disabled { pointer-events: none; opacity: 0.6; }

/* Interaction disabled */
.tile-grid.interaction-disabled .tile { pointer-events: none; }

/* === SUBMIT BUTTON === */
.submit-area {
  margin-top: 20px;
  text-align: center;
}

/* === INSTRUCTION AREA === */
.instruction-area { text-align: center; }

.instruction-text {
  font-size: var(--mathai-font-size-small);
  color: var(--mathai-text-primary, #000000);
  margin-bottom: 4px;
  line-height: 1.4;
}

.instruction-sub { font-size: 13px; color: var(--mathai-text-primary, #000000); }

.instruction-highlight {
  font-size: var(--mathai-font-size-small);
  color: var(--mathai-text-primary, #000000);
  margin-top: 4px;
}

/* === RESULTS METRICS === */
.results-metrics {
  display: flex;
  flex-direction: column;
  text-align: center;
  margin-bottom: 8px;
}

.metric-row { padding: 4px 0; }
.metric-label { color: var(--mathai-gray); font-size: var(--mathai-font-size-small); }
.metric-value-large { font-size: 32px; font-weight: 700; color: var(--mathai-primary); }
.metric-hint { font-size: var(--mathai-font-size-small); color: var(--mathai-blue); margin-top: 4px; }

/* === BUTTON OVERRIDES === */
.game-btn {
  padding: 14px 32px;
  font-size: var(--mathai-font-size-button);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  border: none;
  border-radius: var(--mathai-border-radius-button);
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--mathai-white);
}

.btn-primary { background: var(--mathai-green); }
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(33, 150, 83, 0.4);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-secondary { background: var(--mathai-blue); }
.btn-secondary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}

.hidden { display: none !important; }

/* === MICRO-ANIMATIONS === */
@keyframes scoreBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes starPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

.shake-wrong { animation: shake 0.5s ease-in-out; }
.score-bounce { animation: scoreBounce 0.4s ease; }
.fade-in { animation: fadeIn 0.35s ease; }

/* === LANDSCAPE LOCK === */
@media (orientation: landscape) and (max-height: 500px) {
  .landscape-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--mathai-white); z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--mathai-text-primary);
    text-align: center; padding: 20px;
  }
}
</style>
</head>
<body>
<div id="app" data-phase="start_screen" data-score="0" data-lives="0"></div>

<script>
/* ============================================================
   GAME STATE
   ============================================================ */
window.gameState = {
  gameId: 'tap-multi-select',
  phase: 'start_screen',
  currentRound: 0,
  totalRounds: 5,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  lives: 0,
  totalLives: 0,
  currentLevel: 1,
  selectedItems: [],
  roundTimes: [],
  roundStartTime: null,
  isProcessing: false,
  gameEnded: false,
  correctAnswer: null,
  streak: 0,
  consecutiveWrongs: 0,
  contentSetId: null
};

var timer = null;
var visibilityTracker = null;
var progressBar = null;
var transitionScreen = null;
var previewScreen = null;
var signalCollector = null;

/* ============================================================
   FALLBACK CONTENT (5 rounds)
   ============================================================ */
var fallbackContent = {
  rounds: [
    {
      round: 1,
      question: "Select all even numbers",
      numbers: [3, 8, 12, 7, 20, 15, 4, 11],
      correctIndices: [1, 2, 4, 6],
      difficulty_level: 1
    },
    {
      round: 2,
      question: "Select all even numbers",
      numbers: [5, 14, 9, 22, 31, 6, 17, 10],
      correctIndices: [1, 3, 5, 7],
      difficulty_level: 1
    },
    {
      round: 3,
      question: "Select all even numbers",
      numbers: [18, 27, 33, 44, 51, 60, 13, 2],
      correctIndices: [0, 3, 5, 7],
      difficulty_level: 2
    },
    {
      round: 4,
      question: "Select all even numbers",
      numbers: [42, 55, 68, 71, 84, 39, 16, 93],
      correctIndices: [0, 2, 4, 6],
      difficulty_level: 2
    },
    {
      round: 5,
      question: "Select all even numbers",
      numbers: [101, 200, 37, 156, 89, 74, 63, 48],
      correctIndices: [1, 3, 5, 7],
      difficulty_level: 3
    }
  ]
};

/* ============================================================
   HELPERS
   ============================================================ */
function getRounds() {
  return gameState.content ? gameState.content.rounds : fallbackContent.rounds;
}

function waitForPackages() {
  return new Promise(function(resolve, reject) {
    var timeout = 10000;
    var start = Date.now();
    var check = setInterval(function() {
      if (
        typeof TimerComponent !== 'undefined' &&
        typeof VisibilityTracker !== 'undefined' &&
        typeof SignalCollector !== 'undefined'
      ) {
        clearInterval(check);
        resolve();
      } else if (Date.now() - start > timeout) {
        clearInterval(check);
        reject(new Error('Packages failed to load within ' + timeout + 'ms'));
      }
    }, 100);
  });
}

/* === syncDOMState === */
function syncDOMState() {
  var app = document.getElementById('app');
  if (!app) return;
  app.setAttribute('data-phase', gameState.phase);
  app.setAttribute('data-score', gameState.score);
  app.setAttribute('data-lives', Math.max(0, gameState.lives));
  app.setAttribute('data-round', gameState.currentRound);
}

/* === calcStars (no lives, based on accuracy) === */
function calcStars() {
  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var total = gameState.totalRounds;
  if (total === 0) return 1;
  var ratio = correct / total;
  return ratio >= 1 ? 3 : ratio >= 0.6 ? 2 : ratio > 0 ? 1 : 0;
}
window.calcStars = calcStars;

/* === getStars alias === */
function getStars() {
  return calcStars();
}
window.getStars = getStars;

/* ============================================================
   RECORD ATTEMPT (12 fields)
   ============================================================ */
function recordAttempt(roundIndex, userInput, correct, metadata) {
  var round = getRounds()[roundIndex];
  var attempt = {
    attempt_timestamp: Date.now(),
    time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
    input_of_user: userInput,
    correct: correct,
    round_number: roundIndex + 1,
    question_id: 'r' + (roundIndex + 1),
    correct_answer: gameState.correctAnswer,
    response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
    misconception_tag: correct ? null : (metadata.misconception_tag || 'wrong-selection'),
    difficulty_level: round.difficulty_level || 1,
    is_retry: metadata.is_retry || false,
    metadata: metadata
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({
    round: roundIndex + 1,
    timestamp: Date.now()
  });
}

/* === trackEvent === */
function trackEvent(type, target, data) {
  var evt = { type: type, target: target, timestamp: Date.now() };
  if (data) {
    var keys = Object.keys(data);
    for (var i = 0; i < keys.length; i++) { evt[keys[i]] = data[keys[i]]; }
  }
  gameState.events.push(evt);
}

/* === computeTriesPerRound === */
function computeTriesPerRound(attempts) {
  var rounds = {};
  attempts.forEach(function(a) {
    var r = a.round_number;
    rounds[r] = (rounds[r] || 0) + 1;
  });
  return Object.keys(rounds).map(function(r) {
    return { round: Number(r), triesCount: rounds[r] };
  });
}

/* === createProgressBar === */
function createProgressBar() {
  if (progressBar) progressBar.destroy();
  progressBar = new ProgressBarComponent({
    slotId: 'mathai-progress-slot',
    totalRounds: gameState.totalRounds,
    totalLives: gameState.totalLives
  });
}

/* === updateSubmitButton === */
function updateSubmitButton() {
  var btn = document.getElementById('submit-btn');
  if (!btn) return;
  btn.disabled = gameState.selectedItems.length === 0;
}

/* ============================================================
   TILE TAP HANDLER — toggle select/deselect
   ============================================================ */
function handleTileTap(index) {
  if (!gameState.isActive) return;
  if (gameState.isProcessing) return;
  if (gameState.gameEnded) return;

  var roundData = getRounds()[gameState.currentRound];
  var tileEl = document.querySelectorAll('.tile')[index];
  if (!tileEl) return;

  var selectedIdx = gameState.selectedItems.indexOf(index);

  if (selectedIdx !== -1) {
    /* === DESELECT === */
    gameState.selectedItems.splice(selectedIdx, 1);
    tileEl.classList.remove('selected');

    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_bubble_deselect'); } catch(e) {}

    trackEvent('tile_deselect', 'tile-' + index, {
      tileValue: roundData.numbers[index]
    });
  } else {
    /* === SELECT === */
    gameState.selectedItems.push(index);
    tileEl.classList.add('selected');

    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_bubble_select'); } catch(e) {}

    trackEvent('tile_select', 'tile-' + index, {
      tileValue: roundData.numbers[index]
    });
  }

  updateSubmitButton();
}

/* ============================================================
   SUBMIT HANDLER — batch evaluate all selections
   ============================================================ */
async function handleSubmit() {
  if (!gameState.isActive) return;
  if (gameState.isProcessing) return;
  if (gameState.gameEnded) return;
  if (gameState.selectedItems.length === 0) return;

  gameState.isProcessing = true;

  var roundData = getRounds()[gameState.currentRound];
  var correctSet = roundData.correctIndices;
  var selected = gameState.selectedItems.slice();

  /* Determine correctness: selected must match correctIndices exactly */
  var isCorrect = true;

  /* Check if every selected item is in correctSet */
  for (var i = 0; i < selected.length; i++) {
    if (correctSet.indexOf(selected[i]) === -1) {
      isCorrect = false;
      break;
    }
  }
  /* Check if every correct item is selected */
  if (isCorrect) {
    for (var j = 0; j < correctSet.length; j++) {
      if (selected.indexOf(correctSet[j]) === -1) {
        isCorrect = false;
        break;
      }
    }
  }

  /* Timer + metrics */
  if (timer) timer.pause();
  var roundTimeMs = Date.now() - gameState.roundStartTime;
  var roundTimeSec = roundTimeMs / 1000;
  gameState.roundTimes.push(roundTimeSec);

  /* Disable submit button */
  var submitBtn = document.getElementById('submit-btn');
  if (submitBtn) submitBtn.disabled = true;

  /* Get selected values for recording */
  var selectedValues = [];
  for (var sv = 0; sv < selected.length; sv++) {
    selectedValues.push(roundData.numbers[selected[sv]]);
  }

  var correctValues = [];
  for (var cv = 0; cv < correctSet.length; cv++) {
    correctValues.push(roundData.numbers[correctSet[cv]]);
  }

  if (isCorrect) {
    await handleCorrectAnswer(selected, selectedValues, roundTimeMs, roundTimeSec);
  } else {
    await handleWrongAnswer(selected, selectedValues, correctSet, correctValues, roundTimeMs, roundTimeSec);
  }
}

/* ============================================================
   CORRECT ANSWER HANDLER
   ============================================================ */
async function handleCorrectAnswer(selected, selectedValues, roundTimeMs, roundTimeSec) {
  var roundData = getRounds()[gameState.currentRound];

  /* Visual: mark selected tiles green */
  var tileEls = document.querySelectorAll('.tile');
  for (var i = 0; i < selected.length; i++) {
    var tile = tileEls[selected[i]];
    if (tile) { tile.classList.remove('selected'); tile.classList.add('correct'); }
  }

  if (signalCollector) signalCollector.recordViewEvent('feedback_display', {
    screen: 'gameplay',
    content_snapshot: { feedback_type: 'correct', round: gameState.currentRound + 1, selected: selectedValues },
    components: { progress: { current: gameState.currentRound, total: gameState.totalRounds } },
    metadata: { trigger: 'user_action' }
  });

  gameState.score++;
  gameState.streak++;
  gameState.consecutiveWrongs = 0;
  syncDOMState();

  /* Record attempt */
  recordAttempt(gameState.currentRound, selectedValues, true, {
    round: gameState.currentRound + 1,
    timeTaken: roundTimeSec,
    is_retry: false
  });

  if (signalCollector) signalCollector.recordCustomEvent('round_solved', {
    round: gameState.currentRound + 1,
    correct: true,
    answer: selectedValues,
    correct_answer: gameState.correctAnswer,
    time_ms: roundTimeMs
  });

  trackEvent('correct_answer', 'game', {
    round: gameState.currentRound + 1,
    timeTaken: Math.round(roundTimeSec)
  });

  /* Feedback: SFX (awaited) -> Dynamic TTS (awaited) */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.sound.play('sound_correct', {
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif',
          duration: 2,
          type: 'IMAGE_GIF'
        }
      });
      var backdrop = document.getElementById('popup-backdrop');
      if (backdrop) backdrop.style.display = 'none';
    }
  } catch (e) { console.error('Correct SFX error:', e.message); }

  var ttsText = 'Great job! You found all the even numbers!';
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.playDynamicFeedback({
        audio_content: ttsText,
        subtitle: ttsText,
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif',
          duration: 2,
          type: 'IMAGE_GIF'
        }
      });
      var backdrop = document.getElementById('popup-backdrop');
      if (backdrop) backdrop.style.display = 'none';
    }
  } catch (e) { console.error('Correct TTS error:', e.message); }

  /* Advance */
  gameState.currentRound++;
  if (progressBar) progressBar.update(gameState.currentRound, gameState.lives);
  gameState.isProcessing = false;

  if (gameState.currentRound >= gameState.totalRounds) {
    showGameComplete();
  } else {
    startRound();
  }
}

/* ============================================================
   WRONG ANSWER HANDLER
   ============================================================ */
async function handleWrongAnswer(selected, selectedValues, correctSet, correctValues, roundTimeMs, roundTimeSec) {
  var roundData = getRounds()[gameState.currentRound];
  var tileEls = document.querySelectorAll('.tile');

  /* Highlight wrong selections red */
  for (var i = 0; i < selected.length; i++) {
    var tile = tileEls[selected[i]];
    if (tile) {
      tile.classList.remove('selected');
      if (correctSet.indexOf(selected[i]) !== -1) {
        tile.classList.add('correct');
      } else {
        tile.classList.add('incorrect', 'shake-wrong');
      }
    }
  }

  /* Highlight missed correct items */
  for (var j = 0; j < correctSet.length; j++) {
    if (selected.indexOf(correctSet[j]) === -1) {
      var missedTile = tileEls[correctSet[j]];
      if (missedTile) { missedTile.classList.add('missed'); }
    }
  }

  if (signalCollector) signalCollector.recordViewEvent('feedback_display', {
    screen: 'gameplay',
    content_snapshot: { feedback_type: 'incorrect', round: gameState.currentRound + 1, selected: selectedValues, correct: correctValues },
    components: { progress: { current: gameState.currentRound, total: gameState.totalRounds } },
    metadata: { trigger: 'user_action' }
  });

  gameState.streak = 0;
  gameState.consecutiveWrongs++;
  syncDOMState();

  /* Record attempt */
  recordAttempt(gameState.currentRound, selectedValues, false, {
    round: gameState.currentRound + 1,
    timeTaken: roundTimeSec,
    misconception_tag: 'wrong-selection',
    is_retry: false
  });

  if (signalCollector) signalCollector.recordCustomEvent('round_solved', {
    round: gameState.currentRound + 1,
    correct: false,
    answer: selectedValues,
    correct_answer: gameState.correctAnswer
  });

  trackEvent('incorrect_answer', 'game', {
    round: gameState.currentRound + 1,
    selected: selectedValues,
    correct: correctValues
  });

  /* Feedback: SFX (awaited) -> Dynamic TTS (awaited) */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.sound.play('sound_wrong', {
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif',
          duration: 2,
          type: 'IMAGE_GIF'
        }
      });
      var backdrop = document.getElementById('popup-backdrop');
      if (backdrop) backdrop.style.display = 'none';
    }
  } catch (e) { console.error('Wrong SFX error:', e.message); }

  var ttsText = 'Not quite. The even numbers were ' + correctValues.join(', ') + '.';
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.playDynamicFeedback({
        audio_content: ttsText,
        subtitle: ttsText,
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif',
          duration: 2,
          type: 'IMAGE_GIF'
        }
      });
      var backdrop = document.getElementById('popup-backdrop');
      if (backdrop) backdrop.style.display = 'none';
    }
  } catch (e) { console.error('Wrong TTS error:', e.message); }

  /* Advance (no lives — always continue) */
  gameState.currentRound++;
  if (progressBar) progressBar.update(gameState.currentRound, gameState.lives);
  gameState.isProcessing = false;

  if (gameState.currentRound >= gameState.totalRounds) {
    showGameComplete();
  } else {
    startRound();
  }
}

/* ============================================================
   START ROUND
   ============================================================ */
async function startRound() {
  var roundData = getRounds()[gameState.currentRound];
  if (!roundData) return;

  gameState.phase = 'playing';
  gameState.selectedItems = [];
  gameState.correctAnswer = roundData.correctIndices.map(function(idx) { return roundData.numbers[idx]; });
  syncDOMState();

  /* Render question */
  var questionEl = document.getElementById('question-text');
  if (questionEl) questionEl.textContent = roundData.question;

  /* Render tiles */
  var tileGrid = document.getElementById('tile-grid');
  tileGrid.innerHTML = '';
  for (var i = 0; i < roundData.numbers.length; i++) {
    var tile = document.createElement('div');
    tile.className = 'tile fade-in';
    tile.textContent = roundData.numbers[i];
    tile.setAttribute('data-signal-id', 'tile-' + i);
    tile.setAttribute('data-index', i);
    tile.setAttribute('data-testid', 'tile-' + i);
    tile.onclick = (function(idx) {
      return function() { handleTileTap(idx); };
    })(i);
    tileGrid.appendChild(tile);
  }

  /* Reset submit button */
  updateSubmitButton();

  /* Show game content, hide transition */
  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) gameContentEl.style.display = '';
  if (transitionScreen) transitionScreen.hide();

  /* Timer */
  if (timer) {
    timer.resume();
    timer.reset();
    timer.start();
  }
  gameState.roundStartTime = Date.now();

  if (signalCollector) signalCollector.recordViewEvent('content_render', {
    screen: 'gameplay',
    content_snapshot: { round: gameState.currentRound + 1, question: roundData.question, number_count: roundData.numbers.length },
    components: { timer: { value: 0, state: 'running' }, progress: { current: gameState.currentRound, total: gameState.totalRounds } },
    metadata: { trigger: 'round_start' }
  });

  trackEvent('question_shown', 'game', {
    round: gameState.currentRound + 1,
    question: roundData.question
  });

  /* Dynamic TTS: question — does NOT block input */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      FeedbackManager.playDynamicFeedback({
        audio_content: roundData.question,
        subtitle: roundData.question
      });
    }
  } catch (e) { console.error('Round start TTS error:', e.message); }

  /* New cards SFX */
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_new_cards'); } catch(e) {}
}

/* ============================================================
   END GAME
   ============================================================ */
function endGame(isGameOver) {
  if (gameState.gameEnded) return;
  if (!gameState.isActive) return;
  gameState.isActive = false;
  gameState.gameEnded = true;
  gameState.duration_data.currentTime = new Date().toISOString();

  if (timer) { timer.pause(); }

  var stars = isGameOver ? 0 : calcStars();
  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var total = gameState.attempts.length;
  var accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
  var timeTaken = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;
  var avgTime = gameState.roundTimes.length > 0
    ? gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length
    : 0;

  gameState.phase = isGameOver ? 'gameover' : 'results';
  syncDOMState();

  var metrics = {
    accuracy: accuracy,
    time: timeTaken,
    stars: stars,
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    totalLives: gameState.totalLives,
    tries: computeTriesPerRound(gameState.attempts),
    avgTimePerRound: Math.round(avgTime * 10) / 10,
    roundTimes: gameState.roundTimes
  };

  trackEvent('game_end', 'game', { metrics: metrics });

  var signalResult = signalCollector ? signalCollector.seal() : { event_count: 0, metadata: {} };

  window.parent.postMessage({
    type: 'game_complete',
    data: {
      metrics: metrics,
      attempts: gameState.attempts,
      completedAt: Date.now(),
      signal_event_count: signalResult.event_count,
      signal_metadata: signalResult.metadata
    }
  }, '*');

  if (timer) { timer.destroy(); timer = null; }
  if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.stopAll(); } catch(e) {}
}
window.endGame = endGame;

/* === handlePostMessage === */
function handlePostMessage(event) {
  if (!event.data || event.data.type !== 'game_init') return;

  gameState.phase = 'playing';
  syncDOMState();

  var d = event.data.data || event.data;
  if (d.content) gameState.content = d.content;

  var sc = gameState.signalConfig = d.signalConfig || {};
  if (signalCollector && sc.flushUrl) {
    signalCollector.flushUrl = sc.flushUrl;
    signalCollector.playId = sc.playId || null;
    signalCollector.gameId = sc.gameId || signalCollector.gameId;
    signalCollector.sessionId = sc.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = sc.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = sc.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  setupGame();
}

/* === Visibility handlers === */
function onInactiveHandler() {
  gameState.duration_data.inActiveTime.push({ start: Date.now() });
  if (signalCollector) {
    signalCollector.pause();
    signalCollector.recordCustomEvent('visibility_hidden', {});
  }
  if (timer) timer.pause({ fromVisibilityTracker: true });
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.pause(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.pauseAll(); } catch(e) {}
  trackEvent('game_paused', 'system');
}

function onResumeHandler() {
  var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
  if (lastInactive && !lastInactive.end) {
    lastInactive.end = Date.now();
    gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
  }
  if (signalCollector) {
    signalCollector.resume();
    signalCollector.recordCustomEvent('visibility_visible', {});
  }
  if (timer && timer.isPaused) timer.resume({ fromVisibilityTracker: true });
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.resume(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.resumeAll(); } catch(e) {}
  trackEvent('game_resumed', 'system');
}

      }
    } catch (e) { console.error('Sound preload error:', e.message); }

    window.addEventListener('message', handlePostMessage);

    window.parent.postMessage({ type: 'game_ready' }, '*');

    /* 2s standalone fallback */
    setTimeout(function() {
      if (gameState.phase === 'start_screen' && !gameState.isActive) {
        setupGame();
      }
    }, 2000);

    setupGame();
  } catch (error) {
    console.error('Initialization failed:', error.message);
  }
});
</script>
</body>
</html>
