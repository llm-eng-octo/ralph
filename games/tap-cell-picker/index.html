<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Row Sums</title>

<!-- STEP 1: SentryConfig package -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

<!-- STEP 2: initSentry() function definition -->
<script>
function initSentry() {
  try {
    if (typeof SentryConfig !== 'undefined' && SentryConfig.enabled && typeof Sentry !== 'undefined') {
      Sentry.init({
        dsn: SentryConfig.dsn,
        environment: SentryConfig.environment,
        release: "tap-cell-picker@1.0.0",
        tracesSampleRate: SentryConfig.tracesSampleRate,
        sampleRate: SentryConfig.sampleRate,
        maxBreadcrumbs: 50,
        ignoreErrors: [
          "ResizeObserver loop limit exceeded",
          "ResizeObserver loop completed with undelivered notifications",
          "Non-Error promise rejection captured",
          "Script error.",
          "Load failed",
          "Failed to fetch"
        ]
      });
    }
  } catch (e) { console.error('Sentry init failed:', e.message); }
}
</script>

<!-- STEP 3: Sentry SDK v10.23.0 -->
<script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

<!-- STEP 4: Initialize on load -->
<script>window.addEventListener('load', initSentry);</script>

<!-- STEP 5-7: Game packages -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100dvh; overflow: hidden; overscroll-behavior: none; }
@supports not (height: 100dvh) { html, body { height: 100vh; } }
body {
  font-family: var(--mathai-font-family);
  background: var(--mathai-white);
  color: var(--mathai-text-primary);
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

/* === LAYOUT ROOT === */
.mathai-layout-root { max-width: 480px; margin: 0 auto; }

/* === PLAY AREA LAYOUT === */
.mathai-layout-playarea {
  display: flex;
  flex-direction: column !important;
  align-items: center !important;
  padding: 0 20px 32px !important;
}

.mathai-ts-screen.active {
  flex: 1;
  align-items: center;
  justify-content: flex-start;
  padding-top: 16px;
}

.mathai-ts-card {
  min-height: 50dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* === GAME PLAY AREA === */
.game-play-area {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
}

/* === PUZZLE DISPLAY === */
.puzzle-container {
  width: 100%;
  max-width: 360px;
  margin: 0 auto;
}

.row-group {
  display: flex;
  flex-direction: row;
  align-items: center;
  margin-bottom: 8px;
}

.row-target {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--mathai-white, #ffffff);
  background: var(--mathai-blue, #667eea);
  border-radius: 8px;
  margin-right: 8px;
  flex-shrink: 0;
}

.row-cells {
  display: flex;
  flex-direction: row;
}

/* === GRID CELL === */
.grid-cell {
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--mathai-border-gray, #e0e0e0);
  border-radius: 8px;
  margin-right: 8px;
  font-size: 20px;
  font-weight: 600;
  font-family: var(--mathai-font-family);
  background: var(--mathai-white, #ffffff);
  color: var(--mathai-text-primary, #4a4a4a);
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.2s ease, background 0.2s ease;
}

.grid-cell:last-child { margin-right: 0; }

.cell-locked {
  background: var(--mathai-cell-bg-grey, #E0E0E0);
  color: var(--mathai-primary, #270f36);
  cursor: default;
  pointer-events: none;
  font-weight: 700;
}

.cell-selected {
  border-color: var(--mathai-blue, #667eea);
  border-width: 3px;
  background: #eef1ff;
}

.cell-violation {
  border-color: var(--mathai-red, #E35757);
  background: var(--mathai-cell-bg-red, #FFD9D9);
}

.cell-correct {
  border-color: var(--mathai-cell-border-green, #27ae60);
  background: var(--mathai-cell-bg-green, #D9F8D9);
}

.cell-filled {
  color: var(--mathai-blue, #667eea);
  font-weight: 700;
}

/* === NUMBER PICKER === */
.number-picker {
  display: none;
  flex-direction: row;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 16px;
  padding: 8px;
  background: #f8f8fc;
  border-radius: 12px;
  border: 1px solid var(--mathai-border-gray, #e0e0e0);
  max-width: 360px;
  width: 100%;
}

.number-picker.visible {
  display: flex;
}

.picker-btn {
  width: 44px;
  height: 44px;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--mathai-border-gray, #e0e0e0);
  border-radius: 10px;
  margin: 4px;
  font-size: 18px;
  font-weight: 600;
  font-family: var(--mathai-font-family);
  background: var(--mathai-white, #ffffff);
  color: var(--mathai-text-primary, #4a4a4a);
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s ease;
}

.picker-btn:active {
  transform: scale(0.92);
  background: var(--mathai-cell-bg-yellow, #FCF6D7);
}

/* === INSTRUCTION AREA === */
.instruction-area { text-align: center; }
.instruction-text {
  font-size: var(--mathai-font-size-small);
  color: var(--mathai-text-primary, #000000);
  margin-bottom: 4px;
  line-height: 1.4;
}
.instruction-sub { font-size: 13px; color: var(--mathai-text-primary, #000000); }
.instruction-highlight {
  font-size: var(--mathai-font-size-small);
  color: var(--mathai-text-primary, #000000);
  margin-top: 4px;
}

/* === RESULTS METRICS === */
.results-metrics {
  display: flex;
  flex-direction: column;
  text-align: center;
  margin-bottom: 8px;
}
.metric-row { padding: 4px 0; }
.metric-label { color: var(--mathai-gray); font-size: var(--mathai-font-size-small); }
.metric-value-large { font-size: 32px; font-weight: 700; color: var(--mathai-primary); }
.metric-hint { font-size: var(--mathai-font-size-small); color: var(--mathai-blue); margin-top: 4px; }

/* === BUTTON OVERRIDES === */
.game-btn {
  padding: 14px 32px;
  font-size: var(--mathai-font-size-button);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  border: none;
  border-radius: var(--mathai-border-radius-button);
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--mathai-white);
}
.btn-primary { background: var(--mathai-green); }
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(33, 150, 83, 0.4);
}
.btn-secondary { background: var(--mathai-blue); }
.btn-secondary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}

.hidden { display: none !important; }

/* === MICRO-ANIMATIONS === */
@keyframes scoreBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes starPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes cellPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(33, 150, 83, 0.4); }
  50% { box-shadow: 0 0 12px 4px rgba(33, 150, 83, 0.6); }
}

.shake-wrong { animation: shake 0.5s ease-in-out; }
.score-bounce { animation: scoreBounce 0.4s ease; }
.fade-in { animation: fadeIn 0.35s ease; }
.cell-pulse { animation: cellPulse 0.6s ease-in-out 2; }

/* === LANDSCAPE LOCK === */
@media (orientation: landscape) and (max-height: 500px) {
  .landscape-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--mathai-white); z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--mathai-text-primary);
    text-align: center; padding: 20px;
  }
}
</style>
</head>
<body>
<div id="app" data-phase="start_screen" data-score="0" data-lives="0"></div>

<script>
/* ============================================================
   GAME STATE
   ============================================================ */
window.gameState = {
  gameId: 'tap-cell-picker',
  phase: 'start_screen',
  currentRound: 0,
  totalRounds: 3,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  lives: 0,
  totalLives: 0,
  roundTimes: [],
  roundStartTime: null,
  isProcessing: false,
  gameEnded: false,
  correctAnswer: null,
  streak: 0,
  consecutiveWrongs: 0,
  contentSetId: null,
  selectedCell: null,
  grid: [],
  lockedCells: []
};

var timer = null;
var visibilityTracker = null;
var progressBar = null;
var transitionScreen = null;
var previewScreen = null;
var signalCollector = null;

/* ============================================================
   FALLBACK CONTENT — 3 rounds
   ============================================================ */
var fallbackContent = {
  rounds: [
    {
      round: 1,
      rows: [
        { target: 10, cells: [3, null, 2], answers: [null, 5, null] },
        { target: 12, cells: [null, 4, null], answers: [3, null, 5] }
      ],
      grid: [[3, null, 2], [null, 4, null]],
      solution: [[3, 5, 2], [3, 4, 5]],
      difficulty_level: 1
    },
    {
      round: 2,
      rows: [
        { target: 15, cells: [null, 6, 4], answers: [5, null, null] },
        { target: 9, cells: [2, null, 3], answers: [null, 4, null] }
      ],
      grid: [[null, 6, 4], [2, null, 3]],
      solution: [[5, 6, 4], [2, 4, 3]],
      difficulty_level: 1
    },
    {
      round: 3,
      rows: [
        { target: 18, cells: [7, null, 5], answers: [null, 6, null] },
        { target: 11, cells: [null, 3, null], answers: [4, null, 4] }
      ],
      grid: [[7, null, 5], [null, 3, null]],
      solution: [[7, 6, 5], [4, 3, 4]],
      difficulty_level: 2
    }
  ]
};

/* ============================================================
   HELPERS
   ============================================================ */
function getRounds() {
  return gameState.content ? gameState.content.rounds : fallbackContent.rounds;
}

function waitForPackages() {
  return new Promise(function(resolve, reject) {
    var timeout = 10000;
    var start = Date.now();
    var check = setInterval(function() {
      if (
        typeof FeedbackManager !== 'undefined' &&
        typeof TimerComponent !== 'undefined' &&
        typeof VisibilityTracker !== 'undefined' &&
        typeof SignalCollector !== 'undefined'
      ) {
        clearInterval(check);
        resolve();
      } else if (Date.now() - start > timeout) {
        clearInterval(check);
        reject(new Error('Packages failed to load within ' + timeout + 'ms'));
      }
    }, 100);
  });
}

/* === syncDOMState === */
function syncDOMState() {
  var app = document.getElementById('app');
  if (!app) return;
  app.setAttribute('data-phase', gameState.phase);
  app.setAttribute('data-score', gameState.score);
  app.setAttribute('data-lives', Math.max(0, gameState.lives));
  app.setAttribute('data-round', gameState.currentRound);
}

/* === calcStars === */
function calcStars() {
  var total = gameState.totalRounds;
  if (gameState.score === 0) return 0;
  if (gameState.score >= total) return 3;
  if (gameState.score >= total - 1) return 2;
  return 1;
}
window.calcStars = calcStars;

/* === getStars (alias) === */
function getStars() {
  return calcStars();
}
window.getStars = getStars;

/* ============================================================
   RECORD ATTEMPT (12 fields)
   ============================================================ */
function recordAttempt(roundIndex, userInput, correct, metadata) {
  var round = getRounds()[roundIndex];
  var attempt = {
    attempt_timestamp: Date.now(),
    time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
    input_of_user: userInput,
    correct: correct,
    round_number: roundIndex + 1,
    question_id: 'r' + (roundIndex + 1),
    correct_answer: buildCorrectAnswer(round),
    response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
    misconception_tag: correct ? null : (metadata.misconception_tag || 'wrong-sum'),
    difficulty_level: round.difficulty_level || 1,
    is_retry: metadata.is_retry || false,
    metadata: metadata
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({
    round: roundIndex + 1,
    timestamp: Date.now()
  });
}

function buildCorrectAnswer(round) {
  var answer = [];
  for (var r = 0; r < round.rows.length; r++) {
    var row = round.rows[r];
    var rowAnswer = [];
    for (var c = 0; c < row.cells.length; c++) {
      if (row.cells[c] !== null) {
        rowAnswer.push(row.cells[c]);
      } else {
        rowAnswer.push(row.answers[c]);
      }
    }
    answer.push(rowAnswer);
  }
  return answer;
}

/* === trackEvent === */
function trackEvent(type, target, data) {
  var evt = { type: type, target: target, timestamp: Date.now() };
  if (data) {
    var keys = Object.keys(data);
    for (var i = 0; i < keys.length; i++) { evt[keys[i]] = data[keys[i]]; }
  }
  gameState.events.push(evt);
}

/* === computeTriesPerRound === */
function computeTriesPerRound(attempts) {
  var rounds = {};
  attempts.forEach(function(a) {
    var r = a.round_number;
    rounds[r] = (rounds[r] || 0) + 1;
  });
  return Object.keys(rounds).map(function(r) {
    return { round: Number(r), triesCount: rounds[r] };
  });
}

/* === createProgressBar === */
function createProgressBar() {
  if (typeof ProgressBarComponent === 'undefined') return;
  if (progressBar) progressBar.destroy();
  progressBar = new ProgressBarComponent({
    slotId: 'mathai-progress-slot',
    totalRounds: gameState.totalRounds,
    totalLives: gameState.totalLives
  });
}

/* ============================================================
   GRID HELPERS
   ============================================================ */
function initGrid(roundData) {
  var grid = [];
  var locked = [];
  for (var r = 0; r < roundData.rows.length; r++) {
    var row = roundData.rows[r];
    var gridRow = [];
    var lockRow = [];
    for (var c = 0; c < row.cells.length; c++) {
      if (row.cells[c] !== null) {
        gridRow.push(row.cells[c]);
        lockRow.push(true);
      } else {
        gridRow.push(null);
        lockRow.push(false);
      }
    }
    grid.push(gridRow);
    locked.push(lockRow);
  }
  gameState.grid = grid;
  gameState.lockedCells = locked;
}

function isGridFull() {
  for (var r = 0; r < gameState.grid.length; r++) {
    for (var c = 0; c < gameState.grid[r].length; c++) {
      if (gameState.grid[r][c] === null) return false;
    }
  }
  return true;
}

function checkConstraints() {
  var roundData = getRounds()[gameState.currentRound];
  var violations = [];
  for (var r = 0; r < gameState.grid.length; r++) {
    var rowCells = gameState.grid[r];
    var target = roundData.rows[r].target;
    var rowFull = true;
    var sum = 0;
    for (var c = 0; c < rowCells.length; c++) {
      if (rowCells[c] === null) {
        rowFull = false;
      } else {
        sum += rowCells[c];
      }
    }
    if (rowFull && sum !== target) {
      for (var c2 = 0; c2 < rowCells.length; c2++) {
        if (!gameState.lockedCells[r][c2]) {
          violations.push({ row: r, col: c2 });
        }
      }
    }
  }
  return violations;
}

function isPuzzleSolved() {
  if (!isGridFull()) return false;
  var violations = checkConstraints();
  return violations.length === 0;
}

/* ============================================================
   RENDER GRID
   ============================================================ */
function renderGrid() {
  var roundData = getRounds()[gameState.currentRound];
  var container = document.getElementById('grid-container');
  if (!container) return;
  container.innerHTML = '';

  for (var r = 0; r < roundData.rows.length; r++) {
    var rowGroup = document.createElement('div');
    rowGroup.className = 'row-group fade-in';

    var targetEl = document.createElement('div');
    targetEl.className = 'row-target';
    targetEl.textContent = roundData.rows[r].target;
    rowGroup.appendChild(targetEl);

    var rowCells = document.createElement('div');
    rowCells.className = 'row-cells';

    for (var c = 0; c < gameState.grid[r].length; c++) {
      var cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.setAttribute('data-row', r);
      cell.setAttribute('data-col', c);
      cell.setAttribute('data-testid', 'cell-' + r + '-' + c);
      cell.setAttribute('data-signal-id', 'cell-' + r + '-' + c);

      if (gameState.lockedCells[r][c]) {
        cell.classList.add('cell-locked');
        cell.textContent = gameState.grid[r][c];
      } else {
        var val = gameState.grid[r][c];
        if (val !== null) {
          cell.textContent = val;
          cell.classList.add('cell-filled');
        }
        (function(row, col) {
          cell.onclick = function(e) {
            e.stopPropagation();
            handleCellTap(row, col);
          };
        })(r, c);
      }

      rowCells.appendChild(cell);
    }

    rowGroup.appendChild(rowCells);
    container.appendChild(rowGroup);
  }

  highlightViolations();
}

function highlightViolations() {
  var violations = checkConstraints();
  var allCells = document.querySelectorAll('.grid-cell');
  for (var i = 0; i < allCells.length; i++) {
    allCells[i].classList.remove('cell-violation');
  }
  for (var v = 0; v < violations.length; v++) {
    var viol = violations[v];
    var cellEl = document.querySelector('[data-row="' + viol.row + '"][data-col="' + viol.col + '"]');
    if (cellEl) {
      cellEl.classList.add('cell-violation');
    }
  }
}

function highlightSelectedCell() {
  var allCells = document.querySelectorAll('.grid-cell');
  for (var i = 0; i < allCells.length; i++) {
    allCells[i].classList.remove('cell-selected');
  }
  if (gameState.selectedCell) {
    var sel = document.querySelector('[data-row="' + gameState.selectedCell.row + '"][data-col="' + gameState.selectedCell.col + '"]');
    if (sel) {
      sel.classList.add('cell-selected');
    }
  }
}

/* ============================================================
   NUMBER PICKER
   ============================================================ */
function showPicker() {
  var picker = document.getElementById('number-picker');
  if (picker) picker.classList.add('visible');
}

function hidePicker() {
  var picker = document.getElementById('number-picker');
  if (picker) picker.classList.remove('visible');
}

function handlePickerTap(num) {
  if (!gameState.isActive) return;
  if (gameState.isProcessing) return;
  if (gameState.gameEnded) return;
  if (!gameState.selectedCell) return;

  var row = gameState.selectedCell.row;
  var col = gameState.selectedCell.col;

  gameState.grid[row][col] = num;

  /* Fire-and-forget tap SFX */
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_bubble_select'); } catch(e) {}

  trackEvent('number_placed', 'cell-' + row + '-' + col, {
    row: row,
    col: col,
    value: num
  });

  /* Dismiss picker, deselect cell */
  gameState.selectedCell = null;
  hidePicker();
  renderGrid();

  /* Check if puzzle is solved */
  if (isPuzzleSolved()) {
    handlePuzzleSolved();
  }
}

/* ============================================================
   CELL TAP HANDLER — P15 pattern
   ============================================================ */
function handleCellTap(row, col) {
  if (!gameState.isActive) return;
  if (gameState.isProcessing) return;
  if (gameState.gameEnded) return;

  /* Locked cells are non-interactive (also handled by pointer-events, but guard) */
  if (gameState.lockedCells[row] && gameState.lockedCells[row][col]) return;

  var currentVal = gameState.grid[row][col];

  /* If same cell is already selected and has a value -> clear (undo) */
  if (gameState.selectedCell && gameState.selectedCell.row === row && gameState.selectedCell.col === col) {
    if (currentVal !== null) {
      gameState.grid[row][col] = null;
      gameState.selectedCell = null;
      hidePicker();

      try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_bubble_deselect'); } catch(e) {}

      trackEvent('cell_cleared', 'cell-' + row + '-' + col, {
        row: row,
        col: col,
        clearedValue: currentVal
      });

      renderGrid();
      return;
    }
    /* Same empty cell tapped again, just dismiss */
    gameState.selectedCell = null;
    hidePicker();
    highlightSelectedCell();
    return;
  }

  /* If cell has a value and is being tapped fresh -> clear it */
  if (currentVal !== null) {
    gameState.grid[row][col] = null;

    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_bubble_deselect'); } catch(e) {}

    trackEvent('cell_cleared', 'cell-' + row + '-' + col, {
      row: row,
      col: col,
      clearedValue: currentVal
    });

    gameState.selectedCell = null;
    hidePicker();
    renderGrid();
    return;
  }

  /* Empty cell: select it and show picker */
  gameState.selectedCell = { row: row, col: col };
  highlightSelectedCell();
  showPicker();

  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_bubble_select'); } catch(e) {}

  trackEvent('cell_selected', 'cell-' + row + '-' + col, {
    row: row,
    col: col
  });
}

/* ============================================================
   OUTSIDE CLICK — dismiss picker, deselect
   ============================================================ */
function handleOutsideClick(e) {
  if (!gameState.selectedCell) return;

  var gridContainer = document.getElementById('grid-container');
  var pickerEl = document.getElementById('number-picker');

  if (gridContainer && gridContainer.contains(e.target)) return;
  if (pickerEl && pickerEl.contains(e.target)) return;

  gameState.selectedCell = null;
  hidePicker();
  highlightSelectedCell();
}

/* ============================================================
   PUZZLE SOLVED — awaited SFX -> TTS
   ============================================================ */
async function handlePuzzleSolved() {
  gameState.isProcessing = true;

  /* Mark all editable cells correct */
  var allCells = document.querySelectorAll('.grid-cell');
  for (var i = 0; i < allCells.length; i++) {
    if (!allCells[i].classList.contains('cell-locked')) {
      allCells[i].classList.add('cell-correct', 'cell-pulse');
      allCells[i].style.pointerEvents = 'none';
    }
  }

  if (timer) timer.pause();
  var roundTimeMs = Date.now() - gameState.roundStartTime;
  var roundTimeSec = roundTimeMs / 1000;
  gameState.roundTimes.push(roundTimeSec);
  gameState.score++;
  gameState.streak++;
  gameState.consecutiveWrongs = 0;
  syncDOMState();

  /* Build user input from grid */
  var userInput = [];
  for (var r = 0; r < gameState.grid.length; r++) {
    userInput.push(gameState.grid[r].slice());
  }

  recordAttempt(gameState.currentRound, userInput, true, {
    round: gameState.currentRound + 1,
    timeTaken: roundTimeSec,
    is_retry: false
  });

  if (signalCollector) signalCollector.recordViewEvent('feedback_display', {
    screen: 'gameplay',
    content_snapshot: { feedback_type: 'correct', round: gameState.currentRound + 1, grid: userInput },
    components: { progress: { current: gameState.currentRound, total: gameState.totalRounds } },
    metadata: { trigger: 'user_action' }
  });

  if (signalCollector) signalCollector.recordCustomEvent('round_solved', {
    round: gameState.currentRound + 1,
    correct: true,
    answer: userInput,
    time_ms: roundTimeMs
  });

  trackEvent('correct_answer', 'game', {
    round: gameState.currentRound + 1,
    timeTaken: Math.round(roundTimeSec)
  });

  /* Awaited SFX */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.sound.play('sound_correct', {
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif',
          duration: 2,
          type: 'IMAGE_GIF'
        }
      });
    }
  } catch (e) { console.error('Correct SFX error:', e.message); }

  /* Awaited TTS */
  var roundData = getRounds()[gameState.currentRound];
  var ttsText = 'Correct! All rows add up to their targets!';
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.playDynamicFeedback({
        audio_content: ttsText,
        subtitle: ttsText,
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif',
          duration: 2,
          type: 'IMAGE_GIF'
        }
      });
    }
  } catch (e) { console.error('Correct TTS error:', e.message); }

  /* Advance */
  gameState.currentRound++;
  if (progressBar) progressBar.update(gameState.currentRound, gameState.lives);
  gameState.isProcessing = false;

  if (gameState.currentRound >= gameState.totalRounds) {
    showGameComplete();
  } else {
    startRound();
  }
}

/* ============================================================
   START ROUND
   ============================================================ */
async function startRound() {
  var roundData = getRounds()[gameState.currentRound];
  if (!roundData) return;

  gameState.phase = 'playing';
  gameState.selectedCell = null;
  gameState.correctAnswer = buildCorrectAnswer(roundData);
  syncDOMState();

  initGrid(roundData);
  renderGrid();
  hidePicker();

  /* Show game content, hide transition */
  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) gameContentEl.style.display = '';
  if (transitionScreen) transitionScreen.hide();

  /* Timer */
  if (timer) {
    timer.resume();
    timer.reset();
    timer.start();
  }
  gameState.roundStartTime = Date.now();

  if (signalCollector) signalCollector.recordViewEvent('content_render', {
    screen: 'gameplay',
    content_snapshot: { round: gameState.currentRound + 1, rows: roundData.rows.length },
    components: { timer: { value: 0, state: 'running' }, progress: { current: gameState.currentRound, total: gameState.totalRounds } },
    metadata: { trigger: 'round_start' }
  });

  trackEvent('question_shown', 'game', {
    round: gameState.currentRound + 1
  });

  /* Dynamic TTS: does NOT block input */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      FeedbackManager.playDynamicFeedback({
        audio_content: 'Round ' + (gameState.currentRound + 1) + '. Fill in the missing numbers!',
        subtitle: 'Fill in the missing numbers!'
      });
    }
  } catch (e) { console.error('Round start TTS error:', e.message); }

  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.play('sound_new_cards'); } catch(e) {}
}

window.startGame = startGame;

/* ============================================================
   END GAME
   ============================================================ */
function endGame(isGameOver) {
  if (gameState.gameEnded) return;
  if (!gameState.isActive) return;
  gameState.isActive = false;
  gameState.gameEnded = true;
  gameState.duration_data.currentTime = new Date().toISOString();

  if (timer) { timer.pause(); }

  var stars = isGameOver ? 0 : calcStars();
  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var total = gameState.attempts.length;
  var accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
  var timeTaken = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;
  var avgTime = gameState.roundTimes.length > 0
    ? gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length
    : 0;

  gameState.phase = isGameOver ? 'gameover' : 'results';
  syncDOMState();

  var metrics = {
    accuracy: accuracy,
    time: timeTaken,
    stars: stars,
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    totalLives: gameState.totalLives,
    tries: computeTriesPerRound(gameState.attempts),
    avgTimePerRound: Math.round(avgTime * 10) / 10,
    roundTimes: gameState.roundTimes
  };

  trackEvent('game_end', 'game', { metrics: metrics });

  var signalResult = signalCollector ? signalCollector.seal() : { event_count: 0, metadata: {} };

  window.parent.postMessage({
    type: 'game_complete',
    data: {
      metrics: metrics,
      attempts: gameState.attempts,
      completedAt: Date.now(),
      signal_event_count: signalResult.event_count,
      signal_metadata: signalResult.metadata
    }
  }, '*');

  if (timer) { timer.destroy(); timer = null; }
  if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.stopAll(); } catch(e) {}
}

/* === showGameComplete === */
async function showGameComplete() {
  var avgTime = gameState.roundTimes.length > 0
    ? gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length
    : 0;

  endGame(false);

  var stars = calcStars();
  var avgDisplay = avgTime.toFixed(1);

  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) gameContentEl.style.display = 'none';

  var stickerUrls = {
    3: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif',
    2: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif',
    1: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif'
  };

  var metricsHTML =
    '<div class="results-metrics">' +
      '<div class="metric-row">' +
        '<span class="metric-label">Puzzles solved</span>' +
      '</div>' +
      '<div class="metric-value-large">' + gameState.score + ' / ' + gameState.totalRounds + '</div>' +
      '<p class="metric-hint">Average time: ' + avgDisplay + 's per round</p>' +
    '</div>';

  if (transitionScreen) transitionScreen.show({
    stars: stars,
    title: stars === 3 ? 'Amazing!' : stars === 2 ? 'Great Job!' : 'Well Done!',
    content: metricsHTML,
    buttons: [{
      text: stars >= 3 ? 'Play Again' : 'Retry for more stars',
      type: 'secondary',
      action: function() { restartGame(); }
    }],
    persist: true
  });

  if (signalCollector) signalCollector.recordViewEvent('screen_transition', {
    screen: 'results',
    content_snapshot: { stars: stars, avg_time: avgDisplay },
    components: { progress: { current: gameState.totalRounds, total: gameState.totalRounds } },
    metadata: { trigger: 'user_action', transition_from: 'gameplay' }
  });

  /* Victory audio: SFX -> VO sequential */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.sound.play('sound_game_victory', {
        sticker: { image: stickerUrls[stars] || stickerUrls[1], duration: 5, type: 'IMAGE_GIF' }
      });
      await FeedbackManager.playDynamicFeedback({
        audio_content: stars === 3 ? 'Amazing! You solved all puzzles!' : stars === 2 ? 'Great job! All puzzles completed!' : 'Well done! Try again to solve them all!',
        subtitle: stars === 3 ? 'Amazing!' : stars === 2 ? 'Great job!' : 'Well done!',
        sticker: { image: stickerUrls[stars] || stickerUrls[1], duration: 3, type: 'IMAGE_GIF' }
      });
    }
  } catch (e) { console.error('Victory audio error:', e.message); }
}

/* ============================================================
   RESTART GAME
   ============================================================ */
function restartGame() {
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.stopAll(); } catch(e) {}

  var sessionId = 'session_' + Date.now();
  var studentId = null;
  if (typeof window.gameVariableState !== 'undefined' && window.gameVariableState) {
    sessionId = window.gameVariableState.sessionId || sessionId;
    studentId = window.gameVariableState.studentId || null;
  }

  if (typeof SignalCollector !== 'undefined') {
    signalCollector = new SignalCollector({
      sessionId: sessionId,
      studentId: studentId,
      gameId: gameState.gameId || null,
      contentSetId: gameState.contentSetId || null
    });
    window.signalCollector = signalCollector;

    if (gameState.signalConfig && gameState.signalConfig.flushUrl) {
      signalCollector.flushUrl = gameState.signalConfig.flushUrl;
      signalCollector.playId = gameState.signalConfig.playId || null;
      signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId;
      signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
      signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
      signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
      signalCollector.startFlushing();
    }
  }

  window.gameState.phase = 'start_screen';
  window.gameState.currentRound = 0;
  window.gameState.score = 0;
  window.gameState.attempts = [];
  window.gameState.events = [];
  window.gameState.isActive = true;
  window.gameState.gameEnded = false;
  window.gameState.startTime = Date.now();
  window.gameState.lives = 0;
  window.gameState.selectedCell = null;
  window.gameState.grid = [];
  window.gameState.lockedCells = [];
  window.gameState.roundTimes = [];
  window.gameState.roundStartTime = null;
  window.gameState.isProcessing = false;
  window.gameState.streak = 0;
  window.gameState.consecutiveWrongs = 0;
  window.gameState.correctAnswer = null;
  window.gameState.duration_data = {
    startTime: new Date().toISOString(),
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  };

  syncDOMState();

  /* Re-create timer */
  if (typeof TimerComponent !== 'undefined') {
    timer = new TimerComponent('timer-container', {
      timerType: 'increase',
      format: 'min',
      startTime: 0,
      endTime: 100000,
      autoStart: false,
      onEnd: function() {}
    });
  }

  /* Re-create visibility tracker */
  if (typeof VisibilityTracker !== 'undefined') {
    visibilityTracker = new VisibilityTracker({
      onInactive: onInactiveHandler,
      onResume: onResumeHandler,
      popupProps: { title: 'Game Paused', description: 'Click Resume to continue.', primaryText: 'Resume' }
    });
  }

  createProgressBar();
  if (progressBar) progressBar.update(0, gameState.lives);

  trackEvent('game_start', 'game', { totalRounds: gameState.totalRounds });

  showWelcomeScreen();
}

/* === handlePostMessage === */
function handlePostMessage(event) {
  if (!event.data || event.data.type !== 'game_init') return;

  gameState.phase = 'playing';
  syncDOMState();

  var d = event.data.data || event.data;
  if (d.content) gameState.content = d.content;

  var sc = gameState.signalConfig = d.signalConfig || {};
  if (signalCollector && sc.flushUrl) {
    signalCollector.flushUrl = sc.flushUrl;
    signalCollector.playId = sc.playId || null;
    signalCollector.gameId = sc.gameId || signalCollector.gameId;
    signalCollector.sessionId = sc.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = sc.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = sc.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  setupGame();
}

/* === Visibility handlers === */
function onInactiveHandler() {
  gameState.duration_data.inActiveTime.push({ start: Date.now() });
  if (signalCollector) {
    signalCollector.pause();
    signalCollector.recordCustomEvent('visibility_hidden', {});
  }
  if (timer) timer.pause({ fromVisibilityTracker: true });
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.pause(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.pauseAll(); } catch(e) {}
  trackEvent('game_paused', 'system');
}

function onResumeHandler() {
  var inactiveArr = gameState.duration_data.inActiveTime;
  var lastInactive = inactiveArr[inactiveArr.length - 1];
  if (lastInactive && !lastInactive.end) {
    lastInactive.end = Date.now();
    gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
  }
  if (signalCollector) {
    signalCollector.resume();
    signalCollector.recordCustomEvent('visibility_visible', {});
  }
  if (timer && timer.isPaused) timer.resume({ fromVisibilityTracker: true });
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.resume(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.resumeAll(); } catch(e) {}
  trackEvent('game_resumed', 'system');
}

    '<div class="game-play-area">' +
      '<div class="puzzle-container" id="grid-container" data-signal-id="grid-container"></div>' +
      '<div class="number-picker" id="number-picker" data-signal-id="number-picker"></div>' +
    '</div>';

  /* Build picker buttons 1-9 */
  var pickerEl = document.getElementById('number-picker');
  for (var n = 1; n <= 9; n++) {
    var btn = document.createElement('button');
    btn.className = 'picker-btn';
    btn.textContent = n;
    btn.setAttribute('data-testid', 'picker-' + n);
    btn.setAttribute('data-signal-id', 'picker-' + n);
    (function(num) {
      btn.onclick = function(e) {
        e.stopPropagation();
        handlePickerTap(num);
      };
    })(n);
    pickerEl.appendChild(btn);
  }

  /* Outside click listener */
  document.addEventListener('click', handleOutsideClick);

  timer = new TimerComponent('timer-container', {
    timerType: 'increase',
    format: 'min',
    startTime: 0,
    endTime: 100000,
    autoStart: false,
    onEnd: function() {}
  });

  var interactionManager = new InteractionManager({
    selector: '.puzzle-container',
    disableOnAudioFeedback: false,
    disableOnEvaluation: true
  });
  window.interactionManager = interactionManager;

  visibilityTracker = new VisibilityTracker({
    onInactive: onInactiveHandler,
    onResume: onResumeHandler,
    popupProps: {
      title: 'Game Paused',
      description: 'Click Resume to continue.',
      primaryText: 'Resume'
    }
  });

  createProgressBar();

  transitionScreen = new TransitionScreenComponent({ autoInject: true });

  try {
    if (typeof FeedbackManager !== 'undefined') await FeedbackManager.sound.preload([
      { id: 'sound_bubble_select', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3' },
      { id: 'sound_bubble_deselect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758712800721.mp3' },
      { id: 'sound_correct', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
      { id: 'sound_game_victory', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
      { id: 'sound_new_cards', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432104595.mp3' },
      { id: 'vo_game_start', url: 'https://cdn.mathai.ai/mathai-assets/dev/worksheet/audio/abfbe256-6b2a-4aa1-9cd7-bae00a464ca7.mp3' }
    ]);
  } catch (e) { console.error('Sound preload error:', e.message); }

  window.addEventListener('message', handlePostMessage);

  window.parent.postMessage({ type: 'game_ready' }, '*');

  setupGame();
});
</script>
</body>
</html>
