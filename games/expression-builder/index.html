<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Expression Builder</title>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/sentry-config/index.js"></script>
  <script>
    if (typeof initSentry === 'function') { try { initSentry(); } catch(e) {} }
  </script>
  <script src="https://browser.sentry-cdn.com/7.119.0/bundle.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/7.119.0/httpclient.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/7.119.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script>window.addEventListener('load', function() { if (typeof initSentry === 'function') { try { initSentry(); } catch(e) {} } });</script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>
  <style>
    :root {
      --mathai-primary: #270f36;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-text-primary: #4a4a4a;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;
      --mathai-game-max-width: 480px;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', sans-serif;
      --mathai-font-size-body: 16px;
      --mathai-border-radius: 24px;
      --mathai-cell-bg-green: rgba(33,150,83,0.12);
      --mathai-cell-bg-red: rgba(227,87,87,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100dvh;
      overflow-x: hidden;
      overscroll-behavior: none;
      font-family: var(--mathai-font-family);
      font-size: var(--mathai-font-size-body);
      background: #f5f0ff;
      color: var(--mathai-text-primary);
    }

    @supports not (height: 100dvh) {
      html, body { height: 100vh; }
    }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    /* ============ START SCREEN ============ */
    .start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 32px 24px;
      text-align: center;
      animation: fadeIn 400ms ease-out;
    }

    .start-icon {
      font-size: 64px;
      margin-bottom: 24px;
    }

    .start-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--mathai-primary);
      margin-bottom: 12px;
    }

    .start-subtitle {
      font-size: 16px;
      color: var(--mathai-gray);
      margin-bottom: 40px;
      line-height: 1.5;
      max-width: 300px;
    }

    .btn-primary {
      background: var(--mathai-purple);
      color: var(--mathai-white);
      border: none;
      border-radius: 16px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 52px;
      min-width: 180px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn-primary:active { transform: scale(0.96); opacity: 0.9; }

    /* ============ GAMEPLAY ============ */
    .gameplay-screen {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 16px;
      animation: fadeIn 350ms ease-out;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .round-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--mathai-purple);
    }

    .score-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--mathai-primary);
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: #e0d4f0;
      border-radius: 3px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--mathai-purple);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .instruction-text {
      font-size: 16px;
      color: var(--mathai-gray);
      text-align: center;
      margin-bottom: 24px;
    }

    /* Expression area */
    .expression-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 24px 16px;
      background: var(--mathai-white);
      border-radius: 20px;
      box-shadow: 0 2px 12px rgba(39,15,54,0.08);
      margin-bottom: 32px;
      min-height: 80px;
    }

    .expr-part {
      font-size: 28px;
      font-weight: 700;
      color: var(--mathai-primary);
      line-height: 1;
    }

    .drop-slot {
      width: 56px;
      height: 56px;
      border: 3px dashed var(--mathai-purple);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--mathai-purple);
      background: rgba(155,81,224,0.06);
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
      position: relative;
      touch-action: none;
    }

    .drop-slot.drag-over {
      border-color: var(--mathai-green);
      background: var(--mathai-cell-bg-green);
      transform: scale(1.08);
    }

    .drop-slot.filled {
      border-style: solid;
      border-color: var(--mathai-purple);
      background: rgba(155,81,224,0.12);
      cursor: pointer;
    }

    .drop-slot.correct-slot {
      border-color: var(--mathai-green);
      background: var(--mathai-cell-bg-green);
      color: var(--mathai-green);
    }

    .drop-slot.wrong-slot {
      border-color: var(--mathai-red);
      background: var(--mathai-cell-bg-red);
      color: var(--mathai-red);
      animation: shake 0.4s ease;
    }

    /* Number tags (draggable) */
    .number-tray {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 24px;
      gap: 0;
    }

    .number-tag {
      width: 56px;
      height: 56px;
      background: var(--mathai-purple);
      color: var(--mathai-white);
      border: none;
      border-radius: 14px;
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      touch-action: none;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      z-index: 1;
      margin: 6px;
    }

    .number-tag:active { cursor: grabbing; }

    .number-tag.dragging {
      opacity: 0.85;
      transform: scale(1.12);
      box-shadow: 0 8px 24px rgba(155,81,224,0.35);
      z-index: 100;
      pointer-events: none;
    }

    .number-tag.placed {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.9);
    }

    .number-tag.distractor {
      background: var(--mathai-orange);
    }

    /* Check button */
    .check-btn-wrap {
      display: flex;
      justify-content: center;
      margin-top: auto;
      padding-bottom: 24px;
    }

    .btn-check {
      background: var(--mathai-green);
      color: var(--mathai-white);
      border: none;
      border-radius: 16px;
      padding: 14px 48px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 52px;
      min-width: 180px;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.15s ease;
    }

    .btn-check.enabled {
      opacity: 1;
      pointer-events: auto;
    }

    .btn-check:active { transform: scale(0.96); }

    /* Feedback area */
    .feedback-area {
      text-align: center;
      min-height: 40px;
      margin-bottom: 8px;
    }

    .feedback-text {
      font-size: 16px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 12px;
      display: inline-block;
      animation: fadeIn 300ms ease-out;
    }

    .feedback-text.correct {
      color: var(--mathai-green);
      background: var(--mathai-cell-bg-green);
    }

    .feedback-text.wrong {
      color: var(--mathai-red);
      background: var(--mathai-cell-bg-red);
    }

    .correct-reveal {
      color: var(--mathai-green);
      font-weight: 600;
      margin-top: 8px;
      font-size: 14px;
    }

    /* ============ TRANSITION SCREEN ============ */
    .transition-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 32px 24px;
      text-align: center;
      animation: fadeIn 400ms ease-out;
    }

    .transition-round {
      font-size: 20px;
      font-weight: 700;
      color: var(--mathai-purple);
      margin-bottom: 8px;
    }

    .transition-msg {
      font-size: 16px;
      color: var(--mathai-gray);
      margin-bottom: 16px;
    }

    /* ============ RESULTS SCREEN ============ */
    .results-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 32px 24px;
      text-align: center;
      animation: fadeIn 400ms ease-out;
    }

    .results-icon { font-size: 56px; margin-bottom: 16px; }

    .results-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--mathai-primary);
      margin-bottom: 8px;
    }

    .results-subtitle {
      font-size: 16px;
      color: var(--mathai-gray);
      margin-bottom: 24px;
    }

    .stars-row {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .star {
      font-size: 40px;
      margin: 0 4px;
      opacity: 0.25;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .star.earned {
      opacity: 1;
      animation: starPop 0.4s ease-out;
    }

    .stat-row {
      display: flex;
      justify-content: space-around;
      width: 100%;
      max-width: 280px;
      margin-bottom: 32px;
    }

    .stat-item { text-align: center; }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--mathai-purple);
    }

    .stat-label {
      font-size: 13px;
      color: var(--mathai-gray);
    }

    /* ============ LANDSCAPE OVERLAY ============ */
    .landscape-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--mathai-primary);
      color: var(--mathai-white);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 18px;
      text-align: center;
      padding: 24px;
    }

    @media (orientation: landscape) and (max-height: 500px) {
      .landscape-overlay { display: flex; }
    }

    /* ============ ANIMATIONS ============ */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-6px); } 40%,80% { transform: translateX(6px); } }
    @keyframes scoreBounce { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    @keyframes starPop { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes confettiFall { 0% { transform: translateY(-100%) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

    .score-bounce { animation: scoreBounce 0.35s ease; }

    /* Hide all screens by default */
    .screen { display: none; }
    .screen.active { display: flex; }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-round="0">

    <!-- Start Screen -->
    <div id="startScreen" class="screen active start-screen">
      <div class="start-icon">🧩</div>
      <div class="start-title">Expression Builder</div>
      <div class="start-subtitle">Drag the number tags into the blanks to complete each expression. Can you solve all 5?</div>
      <button class="btn-primary" id="btnStart">Let's Go!</button>
    </div>

    <!-- Transition Screen (round intro) -->
    <div id="transitionScreen" class="screen transition-screen">
      <div class="transition-round" id="transRound"></div>
      <div class="transition-msg" id="transMsg"></div>
    </div>

    <!-- Gameplay Screen -->
    <div id="gameplayScreen" class="screen gameplay-screen">
      <div class="game-header">
        <span class="round-label" id="roundLabel">Round 1 / 5</span>
        <span class="score-label" id="scoreLabel">Score: 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="instruction-text">Drag the numbers into the blanks</div>
      <div class="expression-container" id="expressionArea"></div>
      <div class="number-tray" id="numberTray"></div>
      <div class="feedback-area" id="feedbackArea"></div>
      <div class="check-btn-wrap">
        <button class="btn-check" id="btnCheck">Check</button>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="resultsScreen" class="screen results-screen">
      <div class="results-icon" id="resultsIcon"></div>
      <div class="results-title" id="resultsTitle"></div>
      <div class="results-subtitle" id="resultsSubtitle"></div>
      <div class="stars-row" id="starsRow"></div>
      <div class="stat-row">
        <div class="stat-item">
          <div class="stat-value" id="statScore"></div>
          <div class="stat-label">Score</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statAccuracy"></div>
          <div class="stat-label">Accuracy</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statTime"></div>
          <div class="stat-label">Time</div>
        </div>
      </div>
      <button class="btn-primary" id="btnReplay">Play Again</button>
    </div>

    <!-- Landscape overlay -->
    <div class="landscape-overlay">
      <div style="font-size:48px;margin-bottom:16px;">📱</div>
      <div>Please rotate your device to portrait mode</div>
    </div>
  </div>

  <script>
    var CORRECT_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var INCORRECT_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var VICTORY_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var GAME_OVER_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var ROUND_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';

    var fallbackContent = {
      rounds: [
        {
          id: 'r1',
          difficulty: 'easy',
          blanks: [8, 9],
          operator: '+',
          result: 17,
          distractors: [6, 11],
          feedbackCorrect: 'Great! 8 + 9 = 17',
          feedbackWrong: 'Not quite! 8 + 9 = 17'
        },
        {
          id: 'r2',
          difficulty: 'easy',
          blanks: [15, 7],
          operator: '-',
          result: 8,
          distractors: [12, 3],
          feedbackCorrect: 'Nice! 15 - 7 = 8',
          feedbackWrong: 'Think again! 15 - 7 = 8'
        },
        {
          id: 'r3',
          difficulty: 'medium',
          blanks: [6, 4],
          operator: '*',
          result: 24,
          distractors: [8, 5],
          feedbackCorrect: 'Awesome! 6 × 4 = 24',
          feedbackWrong: 'The answer is 6 × 4 = 24'
        },
        {
          id: 'r4',
          difficulty: 'medium',
          blanks: [12, 5],
          operator: '+',
          result: 17,
          distractors: [9, 14],
          feedbackCorrect: 'Well done! 12 + 5 = 17',
          feedbackWrong: 'Not quite! 12 + 5 = 17'
        },
        {
          id: 'r5',
          difficulty: 'hard',
          blanks: [7, 3],
          operator: '*',
          result: 21,
          distractors: [9, 4],
          feedbackCorrect: 'Brilliant! 7 × 3 = 21',
          feedbackWrong: 'Close! 7 × 3 = 21'
        }
      ]
    };

    var gameState = {
      gameId: 'expression-builder',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 5,
      score: 0,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      content: null,
      duration_data: { startTime: null },
      isProcessing: false,
      gameEnded: false,
      correctAnswer: null,
      roundStartTime: null,
      slotValues: []
    };

    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', String(gameState.score));
      app.setAttribute('data-round', String(gameState.currentRound));
    }

    function trackEvent(name, data) {
      gameState.events.push({
        event: name,
        timestamp: Date.now(),
        data: data || {}
      });
    }

    function recordAttempt(userInput, isCorrect, round) {
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: Date.now() - gameState.startTime,
        input_of_user: userInput,
        correct: isCorrect,
        round_number: gameState.currentRound + 1,
        question_id: 'r' + (gameState.currentRound + 1),
        correct_answer: gameState.correctAnswer,
        response_time_ms: Date.now() - gameState.roundStartTime,
        misconception_tag: null,
        difficulty_level: round.difficulty === 'easy' ? 1 : round.difficulty === 'medium' ? 2 : 3,
        is_retry: false,
        metadata: {
          operator: round.operator,
          result: round.result,
          blanks: round.blanks
        }
      };
      gameState.attempts.push(attempt);
    }

    function getStars(score) {
      var pct = Math.round((score / gameState.totalRounds) * 100);
      if (pct >= 80) return 3;
      if (pct >= 60) return 2;
      if (pct >= 40) return 1;
      return 0;
    }

    function getRounds() {
      if (gameState.content && gameState.content.rounds && gameState.content.rounds.length >= gameState.totalRounds) {
        return gameState.content.rounds;
      }
      return fallbackContent.rounds;
    }

    function getOperatorDisplay(op) {
      if (op === '*') return '\u00D7';
      if (op === '/') return '\u00F7';
      return op;
    }

    function showScreen(screenId) {
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) {
        screens[i].classList.remove('active');
      }
      document.getElementById(screenId).classList.add('active');
    }

    function shuffleArray(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    function updateProgress() {
      var pct = (gameState.currentRound / gameState.totalRounds) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('roundLabel').textContent = 'Round ' + (gameState.currentRound + 1) + ' / ' + gameState.totalRounds;
      document.getElementById('scoreLabel').textContent = 'Score: ' + gameState.score;
    }

    function updateCheckButton() {
      var btn = document.getElementById('btnCheck');
      var allFilled = true;
      var slots = document.querySelectorAll('.drop-slot');
      for (var i = 0; i < slots.length; i++) {
        if (!slots[i].getAttribute('data-value')) {
          allFilled = false;
          break;
        }
      }
      if (allFilled) {
        btn.classList.add('enabled');
      } else {
        btn.classList.remove('enabled');
      }
    }

    // ===== DRAG AND DROP (P6 Spec: clone-based, setPointerCapture, edge-scroll, eviction) =====
    var EDGE_SCROLL_THRESHOLD = 60;
    var EDGE_SCROLL_SPEED = 6;

    var dragState = {
      activeItem: null,
      clone: null,
      pointerId: null,
      offsetX: 0,
      offsetY: 0,
      scrollRAF: null,
      sourceSlot: null  // non-null when dragging FROM a filled slot (zone-to-zone)
    };

    // Attach listeners once on document (never add/remove per drag)
    document.addEventListener('pointerdown', onPointerDown);
    document.addEventListener('pointermove', onPointerMove);
    document.addEventListener('pointerup', onPointerUp);
    document.addEventListener('pointercancel', onPointerUp);

    function onPointerDown(e) {
      if (gameState.isProcessing || dragState.activeItem) return;

      // Check if tapping a filled slot to start zone-to-zone drag
      var slotEl = e.target.closest && e.target.closest('.drop-slot.filled');
      if (slotEl) {
        e.preventDefault();
        startDragFromSlot(slotEl, e);
        return;
      }

      // Check if tapping a draggable number tag
      var tag = e.target.closest && e.target.closest('.number-tag');
      if (!tag || tag.classList.contains('placed')) return;
      e.preventDefault();
      startDrag(tag, e, null);
    }

    function startDragFromSlot(slot, e) {
      // Find the original tag that was placed here
      var val = slot.getAttribute('data-value');
      var tags = document.querySelectorAll('.number-tag');
      var originalTag = null;
      for (var t = 0; t < tags.length; t++) {
        if (tags[t].getAttribute('data-number') === val && tags[t].classList.contains('placed')) {
          originalTag = tags[t];
          break;
        }
      }
      if (!originalTag) return;

      // Clear the slot
      slot.removeAttribute('data-value');
      slot.textContent = '';
      slot.classList.remove('filled', 'correct-slot', 'wrong-slot');
      slot.onclick = null;

      // Restore tag visibility so it can be re-dragged
      originalTag.classList.remove('placed');

      // Start dragging from this position (sourceSlot tracks origin for eviction context)
      startDrag(originalTag, e, slot);
      updateCheckButton();
    }

    function startDrag(item, e, sourceSlot) {
      item.setPointerCapture(e.pointerId);
      dragState.pointerId = e.pointerId;
      dragState.activeItem = item;
      dragState.sourceSlot = sourceSlot;

      var rect = item.getBoundingClientRect();
      dragState.offsetX = e.clientX - rect.left;
      dragState.offsetY = e.clientY - rect.top;

      // Create clone BEFORE hiding original (so clone doesn't inherit inline opacity: 0)
      var clone = item.cloneNode(true);

      // Now hide original (opacity: 0, keeps layout space)
      item.style.opacity = '0';
      clone.classList.add('dragging');
      clone.style.position = 'fixed';
      clone.style.left = (e.clientX - dragState.offsetX) + 'px';
      clone.style.top = (e.clientY - dragState.offsetY) + 'px';
      clone.style.width = rect.width + 'px';
      clone.style.height = rect.height + 'px';
      clone.style.margin = '0';
      clone.style.zIndex = '1000';
      clone.style.pointerEvents = 'none';
      document.body.appendChild(clone);
      dragState.clone = clone;
    }

    function onPointerMove(e) {
      if (!dragState.clone) return;
      e.preventDefault();

      // Move clone
      dragState.clone.style.left = (e.clientX - dragState.offsetX) + 'px';
      dragState.clone.style.top = (e.clientY - dragState.offsetY) + 'px';

      // Hit-detect drop zone under pointer using elementFromPoint
      var hitEl = document.elementFromPoint(e.clientX, e.clientY);
      var hoverSlot = hitEl && hitEl.closest ? hitEl.closest('.drop-slot') : null;

      // Update drag-over highlights
      var slots = document.querySelectorAll('.drop-slot');
      for (var i = 0; i < slots.length; i++) {
        if (slots[i] === hoverSlot) {
          slots[i].classList.add('drag-over');
        } else {
          slots[i].classList.remove('drag-over');
        }
      }

      // Edge-scrolling
      handleEdgeScroll(e.clientY);
    }

    function handleEdgeScroll(clientY) {
      var viewportHeight = window.innerHeight;
      if (dragState.scrollRAF) {
        cancelAnimationFrame(dragState.scrollRAF);
        dragState.scrollRAF = null;
      }
      if (clientY < EDGE_SCROLL_THRESHOLD) {
        scrollLoop(-EDGE_SCROLL_SPEED);
      } else if (clientY > viewportHeight - EDGE_SCROLL_THRESHOLD) {
        scrollLoop(EDGE_SCROLL_SPEED);
      }
    }

    function scrollLoop(delta) {
      window.scrollBy(0, delta);
      dragState.scrollRAF = requestAnimationFrame(function() { scrollLoop(delta); });
    }

    function onPointerUp(e) {
      if (!dragState.clone || !dragState.activeItem) return;

      // Stop edge-scrolling
      if (dragState.scrollRAF) {
        cancelAnimationFrame(dragState.scrollRAF);
        dragState.scrollRAF = null;
      }

      // Release pointer capture
      try { dragState.activeItem.releasePointerCapture(dragState.pointerId); } catch(err) {}

      // Hit-detect drop target (clone already has pointer-events: none)
      var hitEl = document.elementFromPoint(e.clientX, e.clientY);
      var slot = hitEl && hitEl.closest ? hitEl.closest('.drop-slot') : null;

      if (slot) {
        // Swap rule: if slot is occupied AND we came from another slot, swap the occupants
        var occupantVal = slot.getAttribute('data-value');
        if (occupantVal && dragState.sourceSlot) {
          // Find the occupant's original tag
          var occupantTag = null;
          var tags = document.querySelectorAll('.number-tag');
          for (var t = 0; t < tags.length; t++) {
            if (tags[t].getAttribute('data-number') === occupantVal && tags[t].classList.contains('placed')) {
              occupantTag = tags[t];
              break;
            }
          }

          // Place occupant into the source slot (swap)
          if (occupantTag) {
            dragState.sourceSlot.setAttribute('data-value', occupantVal);
            dragState.sourceSlot.textContent = occupantVal;
            dragState.sourceSlot.classList.add('filled');
            // occupantTag stays .placed — it just moved slots
            var srcSlot = dragState.sourceSlot;
            srcSlot.onclick = function() {
              if (gameState.isProcessing) return;
              evictFromSlot(srcSlot);
              updateCheckButton();
            };
          }
        } else if (occupantVal) {
          // Eviction: dropping from tray onto occupied slot — evict occupant back to tray
          evictFromSlot(slot);
        }

        // Place dragged item in target slot
        var val = dragState.activeItem.getAttribute('data-number');
        slot.setAttribute('data-value', val);
        slot.textContent = val;
        slot.classList.add('filled');
        dragState.activeItem.classList.add('placed');
        dragState.activeItem.style.opacity = '';

        // Allow tapping slot to remove (without starting drag)
        slot.onclick = function() {
          if (gameState.isProcessing) return;
          evictFromSlot(slot);
          updateCheckButton();
        };

        // Fire-and-forget SFX for mid-round drop (multi-step)
        try {
          if (typeof FeedbackManager !== 'undefined' && FeedbackManager.sound) {
            FeedbackManager.sound.play('correct_sound_effect', { sticker: ROUND_STICKER }).catch(function() {});
          }
        } catch(err) {}

        updateCheckButton();
      } else {
        // Snap back — restore original
        dragState.activeItem.style.opacity = '';
        // If came from a slot, slot was already cleared in startDragFromSlot
        resortSource();
      }

      // Clean up clone
      if (dragState.clone && dragState.clone.parentNode) {
        dragState.clone.parentNode.removeChild(dragState.clone);
      }

      // Remove all drag-over highlights
      var allSlots = document.querySelectorAll('.drop-slot');
      for (var s = 0; s < allSlots.length; s++) {
        allSlots[s].classList.remove('drag-over');
      }

      // Reset drag state
      dragState.activeItem = null;
      dragState.clone = null;
      dragState.pointerId = null;
      dragState.sourceSlot = null;
    }

    // Evict occupant from a slot back to the source tray
    function evictFromSlot(slot) {
      var removedVal = slot.getAttribute('data-value');
      slot.removeAttribute('data-value');
      slot.textContent = '';
      slot.classList.remove('filled', 'correct-slot', 'wrong-slot');
      slot.onclick = null;

      // Restore the original tag
      var tags = document.querySelectorAll('.number-tag');
      for (var t = 0; t < tags.length; t++) {
        if (tags[t].getAttribute('data-number') === removedVal && tags[t].classList.contains('placed')) {
          tags[t].classList.remove('placed');
          break;
        }
      }
      resortSource();
    }

    // Re-sort source tray by data-original-index so returned items go back to their original positions
    function resortSource() {
      var tray = document.getElementById('numberTray');
      if (!tray) return;
      var items = Array.prototype.slice.call(tray.querySelectorAll('.number-tag'));
      items.sort(function(a, b) {
        return parseInt(a.dataset.originalIndex || 0, 10) - parseInt(b.dataset.originalIndex || 0, 10);
      });
      items.forEach(function(item) { tray.appendChild(item); });
    }

    // ===== ROUND LOADING =====
    function loadRound() {
      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      gameState.roundStartTime = Date.now();
      gameState.correctAnswer = round.blanks.join(', ');
      gameState.slotValues = [];
      syncDOM();
      updateProgress();

      // Clear feedback
      document.getElementById('feedbackArea').innerHTML = '';

      // Build expression: _ op _ = result
      var exprArea = document.getElementById('expressionArea');
      exprArea.innerHTML = '';

      // Slot 1
      var slot1 = document.createElement('div');
      slot1.className = 'drop-slot';
      slot1.setAttribute('data-slot-index', '0');
      exprArea.appendChild(slot1);

      // Operator
      var opEl = document.createElement('span');
      opEl.className = 'expr-part';
      opEl.textContent = ' ' + getOperatorDisplay(round.operator) + ' ';
      exprArea.appendChild(opEl);

      // Slot 2
      var slot2 = document.createElement('div');
      slot2.className = 'drop-slot';
      slot2.setAttribute('data-slot-index', '1');
      exprArea.appendChild(slot2);

      // Equals
      var eqEl = document.createElement('span');
      eqEl.className = 'expr-part';
      eqEl.textContent = ' = ';
      exprArea.appendChild(eqEl);

      // Result
      var resEl = document.createElement('span');
      resEl.className = 'expr-part';
      resEl.textContent = String(round.result);
      exprArea.appendChild(resEl);

      // Number tray: correct answers + distractors, shuffled
      var tray = document.getElementById('numberTray');
      tray.innerHTML = '';
      var allNumbers = round.blanks.concat(round.distractors);
      var shuffled = shuffleArray(allNumbers);

      for (var i = 0; i < shuffled.length; i++) {
        var tag = document.createElement('div');
        tag.className = 'number-tag';
        if (round.distractors.indexOf(shuffled[i]) !== -1 && round.blanks.indexOf(shuffled[i]) === -1) {
          // Only mark as distractor if NOT also a correct answer
        }
        tag.setAttribute('data-number', String(shuffled[i]));
        tag.setAttribute('data-original-index', String(i));
        tag.textContent = String(shuffled[i]);
        tray.appendChild(tag);
      }

      // Reset check button
      document.getElementById('btnCheck').classList.remove('enabled');

      showScreen('gameplayScreen');
    }

    // ===== CHECK ANSWER =====
    async function checkAnswer() {
      if (gameState.isProcessing) return;
      if (gameState.gameEnded) return;
      gameState.isProcessing = true;

      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      var slots = document.querySelectorAll('.drop-slot');
      var val0 = parseInt(slots[0].getAttribute('data-value'), 10);
      var val1 = parseInt(slots[1].getAttribute('data-value'), 10);

      // Evaluate the expression
      var computedResult;
      if (round.operator === '+') computedResult = val0 + val1;
      else if (round.operator === '-') computedResult = val0 - val1;
      else if (round.operator === '*') computedResult = val0 * val1;
      else if (round.operator === '/') computedResult = val0 / val1;

      var isCorrect = computedResult === round.result;
      var userInput = val0 + ' ' + round.operator + ' ' + val1;

      // Record attempt
      recordAttempt(userInput, isCorrect, round);
      trackEvent('answer_submitted', { correct: isCorrect, userInput: userInput });

      var feedbackArea = document.getElementById('feedbackArea');

      if (isCorrect) {
        gameState.score++;
        syncDOM();

        // Visual: green slots
        slots[0].classList.add('correct-slot');
        slots[1].classList.add('correct-slot');

        // Score bounce
        var scoreEl = document.getElementById('scoreLabel');
        scoreEl.textContent = 'Score: ' + gameState.score;
        scoreEl.classList.remove('score-bounce');
        void scoreEl.offsetWidth;
        scoreEl.classList.add('score-bounce');

        feedbackArea.innerHTML = '<div class="feedback-text correct">' + round.feedbackCorrect + '</div>';

        // Awaited SFX + TTS (single-step completion)
        try {
          if (typeof FeedbackManager !== 'undefined' && FeedbackManager.sound) {
            await FeedbackManager.sound.play('correct_sound_effect', { sticker: CORRECT_STICKER });
          }
        } catch(e) { console.error('Audio error:', e); }

        try {
          if (typeof FeedbackManager !== 'undefined' && FeedbackManager.playDynamicFeedback) {
            await FeedbackManager.playDynamicFeedback({
              audio_content: round.feedbackCorrect,
              subtitle: round.feedbackCorrect,
              sticker: CORRECT_STICKER
            });
          }
        } catch(e) { console.error('TTS error:', e); }

      } else {
        // Visual: red slots
        slots[0].classList.add('wrong-slot');
        slots[1].classList.add('wrong-slot');

        feedbackArea.innerHTML = '<div class="feedback-text wrong">' + round.feedbackWrong + '</div>' +
          '<div class="correct-reveal">Answer: ' + round.blanks[0] + ' ' + getOperatorDisplay(round.operator) + ' ' + round.blanks[1] + ' = ' + round.result + '</div>';

        try {
          if (typeof FeedbackManager !== 'undefined' && FeedbackManager.sound) {
            await FeedbackManager.sound.play('incorrect_sound_effect', { sticker: INCORRECT_STICKER });
          }
        } catch(e) { console.error('Audio error:', e); }

        try {
          if (typeof FeedbackManager !== 'undefined' && FeedbackManager.playDynamicFeedback) {
            await FeedbackManager.playDynamicFeedback({
              audio_content: round.feedbackWrong,
              subtitle: round.feedbackWrong,
              sticker: INCORRECT_STICKER
            });
          }
        } catch(e) { console.error('TTS error:', e); }
      }

      gameState.isProcessing = false;
      trackEvent('round_complete', { score: gameState.score, round: gameState.currentRound + 1 });

      // Advance
      if (gameState.currentRound >= gameState.totalRounds - 1) {
        // Short delay then end
        setTimeout(function() { endGame(); }, 800);
      } else {
        gameState.currentRound++;
        syncDOM();
        // Show transition screen
        setTimeout(function() { showTransition(); }, 800);
      }
    }

    // ===== TRANSITION BETWEEN ROUNDS =====
    function showTransition() {
      gameState.phase = 'transition';
      syncDOM();

      document.getElementById('transRound').textContent = 'Round ' + (gameState.currentRound + 1);
      var messages = ['Keep going!', 'You got this!', 'Nice work so far!', 'Almost there!'];
      document.getElementById('transMsg').textContent = messages[Math.min(gameState.currentRound - 1, messages.length - 1)];
      showScreen('transitionScreen');

      // Play round transition SFX
      try {
        if (typeof FeedbackManager !== 'undefined' && FeedbackManager.sound) {
          FeedbackManager.sound.play('rounds_sound_effect', { sticker: ROUND_STICKER }).catch(function() {});
        }
      } catch(e) {}

      setTimeout(function() {
        gameState.phase = 'gameplay';
        syncDOM();
        loadRound();
      }, 1500);
    }

    // ===== END GAME =====
    async function endGame() {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.phase = 'results';
      syncDOM();

      var accuracy = Math.round((gameState.score / gameState.totalRounds) * 100);
      var stars = getStars(gameState.score);
      var timeMs = Date.now() - gameState.startTime;
      var timeSec = Math.round(timeMs / 1000);

      // Results UI
      var icon = stars >= 2 ? '🏆' : stars === 1 ? '👏' : '💪';
      var title = stars === 3 ? 'Perfect!' : stars === 2 ? 'Great Job!' : stars === 1 ? 'Good Try!' : 'Keep Practicing!';
      var subtitle = gameState.score + ' out of ' + gameState.totalRounds + ' correct';

      document.getElementById('resultsIcon').textContent = icon;
      document.getElementById('resultsTitle').textContent = title;
      document.getElementById('resultsSubtitle').textContent = subtitle;
      document.getElementById('statScore').textContent = gameState.score + '/' + gameState.totalRounds;
      document.getElementById('statAccuracy').textContent = accuracy + '%';
      document.getElementById('statTime').textContent = timeSec + 's';

      // Stars
      var starsRow = document.getElementById('starsRow');
      starsRow.innerHTML = '';
      for (var i = 0; i < 3; i++) {
        var starEl = document.createElement('span');
        starEl.className = 'star' + (i < stars ? ' earned' : '');
        starEl.textContent = '\u2B50';
        starEl.style.animationDelay = (i * 0.15) + 's';
        starsRow.appendChild(starEl);
      }

      showScreen('resultsScreen');

      // game_complete postMessage
      window.parent.postMessage({
        type: 'game_complete',
        data: {
          metrics: {
            accuracy: accuracy,
            time: timeMs,
            stars: stars,
            attempts: gameState.attempts.length,
            duration_data: gameState.duration_data
          },
          completedAt: Date.now()
        }
      }, '*');

      trackEvent('game_complete', { score: gameState.score, accuracy: accuracy, stars: stars });

      // Victory/game-over audio
      var sfxId = stars >= 1 ? 'victory_sound_effect' : 'game_over_sound_effect';
      var sticker = stars >= 1 ? VICTORY_STICKER : GAME_OVER_STICKER;
      try {
        if (typeof FeedbackManager !== 'undefined' && FeedbackManager.sound) {
          await FeedbackManager.sound.play(sfxId, { sticker: sticker });
        }
      } catch(e) { console.error('End audio error:', e); }
    }

    // ===== START / RESTART =====
    function startGame() {
      gameState.phase = 'gameplay';
      gameState.isActive = true;
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = Date.now();
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.gameEnded = false;
      gameState.isProcessing = false;
      syncDOM();
      trackEvent('game_started', {});
      loadRound();
    }

    function restartGame() {
      // Stop any playing audio
      try {
        if (typeof FeedbackManager !== 'undefined') {
          if (FeedbackManager.sound && FeedbackManager.sound.stopAll) FeedbackManager.sound.stopAll();
          if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic();
        }
      } catch(e) {}
      startGame();
    }

    // ===== INIT =====
    function setupGame() {
      startGame();
    }

    function handlePostMessage(event) {
      if (!event.data || !event.data.type) return;
      if (event.data.type === 'game_init') {
        if (event.data.content) {
          gameState.content = event.data.content;
        }
        setupGame();
      }
    }

    document.addEventListener('DOMContentLoaded', async function() {
      // Init FeedbackManager
      try {
        if (typeof FeedbackManager !== 'undefined' && FeedbackManager.init) {
          await FeedbackManager.init();
        }
      } catch(e) { console.error('FeedbackManager init error:', e); }

      // Preload sounds
      try {
        if (typeof FeedbackManager !== 'undefined' && FeedbackManager.sound && FeedbackManager.sound.preload) {
          await FeedbackManager.sound.preload([
            { id: 'correct_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
            { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
            { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
            { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
            { id: 'rounds_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' }
          ]);
        }
      } catch(e) { console.error('Preload error:', e); }

      // Button handlers
      document.getElementById('btnStart').addEventListener('click', function() {
        if (typeof FeedbackManager !== 'undefined' && FeedbackManager.sound && FeedbackManager.sound.stopAll) {
          try { FeedbackManager.sound.stopAll(); } catch(e) {}
        }
        setupGame();
      });

      document.getElementById('btnCheck').addEventListener('click', function() {
        checkAnswer();
      });

      document.getElementById('btnReplay').addEventListener('click', function() {
        restartGame();
      });

      // Register postMessage listener BEFORE game_ready
      window.addEventListener('message', handlePostMessage);

      // Send game_ready
      window.parent.postMessage({ type: 'game_ready' }, '*');

      // Fallback: if no game_init within 1000ms, start standalone
      setTimeout(function() {
        if (gameState.phase === 'start_screen') {
          // Don't auto-start, let user click "Let's Go!"
        }
      }, 1000);

      // Expose globals
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = startGame;
    });
  </script>
</body>
</html>
