<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kakuro Unlimited</title>

  <!-- ====== 1. SentryConfig package ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

  <!-- ====== 2. initSentry() definition ====== -->
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({ release: 'kakuro-unlimited@1.0.0' }));
    }
  </script>

  <!-- ====== 3. Sentry SDK ====== -->
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

  <!-- ====== 4. Initialize Sentry on load ====== -->
  <script>window.addEventListener('load', initSentry);</script>

  <!-- ====== 5-7. Game CDN packages ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <!-- ====== 8. DnD Kit via ESM ====== -->
  <script type="module">
    import * as dndKit from 'https://esm.sh/@dnd-kit/dom@beta';
    window.__dndKit = dndKit;
    window.dispatchEvent(new Event('dnd-kit-loaded'));
  </script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;
      --mathai-primary: #270f36;
      --mathai-level-text: #270F63;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;
      --mathai-padding-large: 56px 40px;
      --mathai-padding-medium: 16px 24px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-light-gray);
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: var(--mathai-game-max-width);
      margin: 0 auto;
      background: var(--mathai-white);
      position: relative;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    /* Game header */
    .game-header {
      text-align: center;
      padding: 8px 16px;
    }

    .round-indicator {
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      margin-bottom: 4px;
    }

    .instruction-text {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-text-primary);
      line-height: 1.4;
    }

    .instruction-text strong {
      font-weight: 700;
    }

    /* Kakuro grid */
    .grid-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .kakuro-grid {
      display: grid;
      border: 2px solid #333;
      border-radius: 4px;
      background: #333;
      gap: 2px;
    }

    /* Cell base */
    .k-cell {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 20px;
      font-weight: 700;
    }

    /* Black/wall cell */
    .k-cell.wall {
      background: #333;
    }

    /* Clue cell — diagonal split */
    .k-cell.clue {
      background: #333;
      position: relative;
    }

    .k-cell.clue::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom right, transparent calc(50% - 1px), #555 calc(50% - 1px), #555 calc(50% + 1px), transparent calc(50% + 1px));
    }

    .clue-down {
      position: absolute;
      bottom: 4px;
      left: 4px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      z-index: 2;
    }

    .clue-across {
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      z-index: 2;
    }

    /* Empty (fillable) cell — drop zone */
    .k-cell.empty {
      background: var(--mathai-white);
      border: none;
      transition: background-color 0.2s ease;
    }

    .k-cell.empty.drop-highlight {
      background: rgba(155, 81, 224, 0.1);
    }

    .k-cell.empty.has-tag {
      background: rgba(155, 81, 224, 0.06);
    }

    .k-cell.empty.cell-correct {
      background: var(--mathai-cell-bg-green);
    }

    .k-cell.empty.cell-correct .number-tag {
      background: var(--mathai-success);
    }

    .k-cell.empty.cell-wrong {
      background: var(--mathai-cell-bg-red);
    }

    .k-cell.empty.cell-wrong .number-tag {
      background: var(--mathai-error);
    }

    /* Number tag — draggable tile */
    .number-tag {
      width: 44px;
      height: 44px;
      border-radius: var(--mathai-border-radius-small);
      background: var(--mathai-purple);
      color: var(--mathai-white);
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      touch-action: none;
      transition: transform 0.15s ease, opacity 0.15s ease;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .number-tag:active {
      cursor: grabbing;
      transform: scale(1.1);
    }

    .number-tag.dragging {
      opacity: 0.5;
      z-index: 1000;
    }

    /* Number bank */
    .bank-container {
      padding: 8px 16px;
      flex-shrink: 0;
    }

    .bank-label {
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      text-align: center;
      margin-bottom: 4px;
    }

    .bank-area {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--mathai-light-gray);
      border-radius: var(--mathai-border-radius-card);
      min-height: 56px;
    }

    /* Tag slot in bank — never collapses */
    .tag-slot {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Submit button */
    .submit-container {
      padding: 12px 16px;
      display: flex;
      justify-content: center;
    }

    .btn-submit {
      background: var(--mathai-purple);
      color: var(--mathai-white);
      border: none;
      border-radius: var(--mathai-border-radius-button);
      padding: 12px 40px;
      font-size: var(--mathai-font-size-button);
      font-weight: 700;
      font-family: var(--mathai-font-family);
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.1s ease;
      min-width: 160px;
    }

    .btn-submit:active {
      transform: scale(0.97);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Animations */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .shake-wrong {
      animation: shake 0.4s ease;
    }

    @keyframes cellPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .cell-pop {
      animation: cellPop 0.3s ease;
    }

    @keyframes scoreBounce {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* Results screen */
    #results-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      background: var(--mathai-white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .results-stars { font-size: 48px; margin-bottom: 16px; }
    .results-title { font-size: var(--mathai-font-size-title); font-weight: 700; color: var(--mathai-primary); margin-bottom: 8px; }
    .results-subtitle { font-size: var(--mathai-font-size-subtitle); color: var(--mathai-gray); margin-bottom: 24px; }
    .results-metrics { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
    .results-metric { font-size: var(--mathai-font-size-body); color: var(--mathai-text-primary); margin-bottom: 8px; }
    .btn-primary {
      background: var(--mathai-purple);
      color: var(--mathai-white);
      border: none;
      border-radius: var(--mathai-border-radius-button);
      padding: 14px 48px;
      font-size: var(--mathai-font-size-button);
      font-weight: 700;
      font-family: var(--mathai-font-family);
      cursor: pointer;
    }

    /* Simple transition overlay */
    .simple-transition-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 90;
      background: rgba(255,255,255,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .simple-transition-overlay h2 {
      font-size: 28px;
      color: var(--mathai-primary);
    }

    .simple-transition-overlay p {
      font-size: 16px;
      color: var(--mathai-gray);
    }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-round="0"></div>

  <script>
    'use strict';

    /* ====== 1. gameState ====== */
    var gameState = {
      gameId: 'kakuro-unlimited',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 3,
      score: 0,
      attempts: [],
      events: [],
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      startTime: null,
      roundStartTime: null,
      correctAnswer: '',
      content: null,
      duration_data: { startTime: null, pausedTime: 0 },
      placedValues: {},
      attemptNumber: 0
    };
    window.gameState = gameState;

    /* ====== 2. Fallback content — 3 Kakuro puzzles ====== */
    /*
      Grid encoding:
        'W'          = wall (black)
        'C:a\\d'     = clue cell: a=across clue, d=down clue (0 means no clue in that direction)
        'E:answer'   = empty cell to fill, answer is the correct digit

      numberPool: always [1..9] — tags are unlimited, player can use any digit any number of times.
      Kakuro rules (no repeated digits in a run) are enforced by puzzle design, not by tag availability.
    */
    var fallbackContent = {
      rounds: [
        {
          id: 'r1_kakuro_easy',
          difficulty: 1,
          gridRows: 4,
          gridCols: 4,
          grid: [
            ['W',      'C:0\\4',  'C:0\\6',  'W'       ],
            ['C:3\\0', 'E:1',     'E:2',     'W'       ],
            ['C:7\\0', 'E:3',     'E:4',     'C:0\\6'  ],
            ['W',      'W',       'C:6\\0',  'E:6'     ]
          ],
          numberPool: [1, 2, 3, 4, 5, 6, 7, 8, 9],
          clues: [
            { dir: 'across', row: 1, sum: 3, cells: [[1,1],[1,2]] },
            { dir: 'across', row: 2, sum: 7, cells: [[2,1],[2,2]] },
            { dir: 'across', row: 3, sum: 6, cells: [[3,3]] },
            { dir: 'down', row: 0, col: 1, sum: 4, cells: [[1,1],[2,1]] },
            { dir: 'down', row: 0, col: 2, sum: 6, cells: [[1,2],[2,2]] },
            { dir: 'down', row: 2, col: 3, sum: 6, cells: [[2,3],[3,3]] }
          ]
        },
        {
          id: 'r2_kakuro_medium',
          difficulty: 2,
          gridRows: 4,
          gridCols: 5,
          grid: [
            ['W',       'C:0\\4',  'C:0\\11', 'W',       'W'       ],
            ['C:7\\0',  'E:3',     'E:4',     'C:0\\10', 'W'       ],
            ['C:10\\0', 'E:1',     'E:7',     'E:2',     'C:0\\1'  ],
            ['W',       'W',       'C:9\\0',  'E:8',     'E:1'     ]
          ],
          numberPool: [1, 2, 3, 4, 5, 6, 7, 8, 9],
          clues: [
            { dir: 'across', row: 1, sum: 7, cells: [[1,1],[1,2]] },
            { dir: 'across', row: 2, sum: 10, cells: [[2,1],[2,2],[2,3]] },
            { dir: 'across', row: 3, sum: 9, cells: [[3,2],[3,3],[3,4]] },
            { dir: 'down', row: 0, col: 1, sum: 4, cells: [[1,1],[2,1]] },
            { dir: 'down', row: 0, col: 2, sum: 11, cells: [[1,2],[2,2]] },
            { dir: 'down', row: 1, col: 3, sum: 10, cells: [[2,3],[3,3]] },
            { dir: 'down', row: 2, col: 4, sum: 1, cells: [[2,4],[3,4]] }
          ]
        },
        {
          id: 'r3_kakuro_hard',
          difficulty: 3,
          gridRows: 5,
          gridCols: 5,
          grid: [
            ['W',       'C:0\\17', 'C:0\\15', 'W',       'W'       ],
            ['C:16\\0', 'E:9',     'E:7',     'C:0\\6',  'W'       ],
            ['C:15\\0', 'E:8',     'E:3',     'E:4',     'W'       ],
            ['W',       'C:7\\0',  'E:5',     'E:2',     'W'       ],
            ['W',       'W',       'W',       'W',       'W'       ]
          ],
          numberPool: [1, 2, 3, 4, 5, 6, 7, 8, 9],
          clues: [
            { dir: 'across', row: 1, sum: 16, cells: [[1,1],[1,2]] },
            { dir: 'across', row: 2, sum: 15, cells: [[2,1],[2,2],[2,3]] },
            { dir: 'across', row: 3, sum: 7, cells: [[3,2],[3,3]] },
            { dir: 'down', row: 0, col: 1, sum: 17, cells: [[1,1],[2,1]] },
            { dir: 'down', row: 0, col: 2, sum: 15, cells: [[1,2],[2,2],[3,2]] },
            { dir: 'down', row: 1, col: 3, sum: 6, cells: [[2,3],[3,3]] }
          ]
        }
      ]
    };

    /* ====== 3. Module-scope vars ====== */
    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var dndKitLib = null;
    var dndManager = null;
    var dndDraggables = [];
    var dndDroppables = [];
    /* Clone counter for unique IDs */
    var cloneCounter = 0;
    /* Guard against double-loadRound (race with transition callbacks) */
    var lastLoadedRound = -1;

    /* Sticker + SFX URLs */
    var CORRECT_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var INCORRECT_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var ROUND_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var VICTORY_3_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var VICTORY_2_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var VICTORY_1_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var GAME_OVER_STICKER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';

    /* ====== 4. syncDOM ====== */
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-round', gameState.currentRound);
    }

    /* ====== 5. trackEvent ====== */
    function trackEvent(name, data) {
      gameState.events.push({ event_name: name, timestamp: Date.now(), data: data || {} });
    }

    /* ====== 6. recordAttempt ====== */
    function recordAttempt(data) {
      gameState.attempts.push({
        question_id: data.question_id || ('r' + (gameState.currentRound + 1)),
        round_number: gameState.currentRound + 1,
        student_answer: data.student_answer || '',
        correct_answer: data.correct_answer || '',
        is_correct: data.is_correct !== undefined ? data.is_correct : false,
        response_time_ms: Date.now() - (gameState.roundStartTime || Date.now()),
        score_delta: data.score_delta || 0,
        misconception_tag: data.misconception_tag || null,
        difficulty_level: data.difficulty_level || 1,
        hint_used: data.hint_used || false,
        attempt_number: data.attempt_number || 1,
        metadata: data.metadata || {}
      });
    }

    /* ====== 7. getStars ====== */
    function getStars(score) {
      var total = gameState.totalRounds;
      if (score >= Math.ceil(total * 0.9)) return 3;
      if (score >= Math.ceil(total * 0.6)) return 2;
      if (score >= 1) return 1;
      return 0;
    }

    /* ====== 8. getRounds ====== */
    function getRounds() {
      if (gameState.content && gameState.content.rounds && gameState.content.rounds.length >= gameState.totalRounds) {
        return gameState.content.rounds;
      }
      return fallbackContent.rounds;
    }

    /* ====== 9. waitForPackages ====== */
    function waitForPackages() {
      return new Promise(function(resolve) {
        var startTime = Date.now();
        function check() {
          var fm = typeof FeedbackManager !== 'undefined';
          var tc = typeof TimerComponent !== 'undefined';
          var vt = typeof VisibilityTracker !== 'undefined';
          var sc = typeof SignalCollector !== 'undefined';
          if (fm && tc && vt && sc) { resolve(true); return; }
          if (Date.now() - startTime > 180000) { resolve(false); return; }
          setTimeout(check, 100);
        }
        check();
      });
    }

    /* ====== 9b. waitForDndKit (R1: independent of waitForPackages) ====== */
    function waitForDndKit() {
      return new Promise(function(resolve) {
        if (window.__dndKit) return resolve(window.__dndKit);
        var handler = function() {
          window.removeEventListener('dnd-kit-loaded', handler);
          resolve(window.__dndKit);
        };
        window.addEventListener('dnd-kit-loaded', handler);
        setTimeout(function() {
          window.removeEventListener('dnd-kit-loaded', handler);
          resolve(window.__dndKit || null);
        }, 10000);
      });
    }

    /* ====== 10. FeedbackManager helpers ====== */
    function playCorrectSFX() {
      try { FeedbackManager.sound.play('correct_sound_effect', { sticker: CORRECT_STICKER }).catch(function() {}); } catch (e) {}
    }

    function playWrongSFX() {
      try { FeedbackManager.sound.play('incorrect_sound_effect', { sticker: INCORRECT_STICKER }).catch(function() {}); } catch (e) {}
    }

    function playAllCorrectSFX() {
      return new Promise(function(resolve) {
        try { FeedbackManager.sound.play('all_correct', { sticker: CORRECT_STICKER }).then(resolve).catch(resolve); } catch (e) { resolve(); }
      });
    }

    function playRoundSFX() {
      return new Promise(function(resolve) {
        try { FeedbackManager.sound.play('rounds_sound_effect', { sticker: ROUND_STICKER }).then(resolve).catch(resolve); } catch (e) { resolve(); }
      });
    }

    function playNewCardsSFX() {
      try { FeedbackManager.sound.play('new_cards').catch(function() {}); } catch (e) {}
    }

    /* ====== 11. handlePostMessage ====== */
    function handlePostMessage(event) {
      if (!event.data || !event.data.type) return;
      if (event.data.type === 'game_init') {
        gameState.phase = 'playing';
        if (event.data.data) {
          gameState.content = event.data.data;
          if (event.data.data.rounds) {
            gameState.totalRounds = event.data.data.rounds.length;
          }
        }
        syncDOM();
        setupGame();
        startGame();
      }
    }

    /* ====== 12. render ====== */
    function render() {
      var gameContent = document.getElementById('gameContent');
      if (!gameContent) return;
      if (gameState.phase === 'start_screen') {
        gameContent.innerHTML = '';
      } else if (gameState.phase === 'gameplay' || gameState.phase === 'playing') {
        loadRound();
      }
    }

    /* ====== 13. startGame ====== */
    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = Date.now();
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.phase = 'gameplay';
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();
      showRoundTransition();
    }
    window.startGame = startGame;

    /* ====== 13b. setupGame ====== */
    function setupGame() {
      gameState.correctAnswer = 'all_cells_filled';
      syncDOM();
    }

    /* ====== 14. loadRound ====== */
    function loadRound() {
      /* Guard: prevent double-load of same round (race with transition callbacks) */
      if (lastLoadedRound === gameState.currentRound) return;
      lastLoadedRound = gameState.currentRound;

      gameState.isProcessing = false;
      gameState.isActive = true;
      syncDOM();

      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      if (!round) return;

      gameState.roundStartTime = Date.now();
      gameState.correctAnswer = 'all_cells_correct';
      gameState.placedValues = {};
      gameState.attemptNumber = 0;

      var gameContent = document.getElementById('gameContent');
      if (!gameContent) return;

      buildRoundUI(gameContent, round);
      playNewCardsSFX();

      /* R3: DnD setup deferred until library loaded */
      if (dndKitLib) {
        setTimeout(function() { setupDnD(round); }, 100);
      }
    }
    window.loadRound = loadRound;

    /* ====== 15. buildRoundUI ====== */
    function buildRoundUI(container, round) {
      var html = '';

      /* Header */
      html += '<div class="game-header">';
      html += '<div class="round-indicator">Round ' + (gameState.currentRound + 1) + ' of ' + gameState.totalRounds + '</div>';
      html += '<div class="instruction-text">Drag <strong>number tiles</strong> into the empty cells. Each run must sum to its clue! Tiles are <strong>unlimited</strong> — use any number as many times as needed.</div>';
      html += '</div>';

      /* Grid */
      html += '<div class="grid-container">';
      html += '<div class="kakuro-grid" id="kakuroGrid" style="grid-template-columns: repeat(' + round.gridCols + ', 52px); grid-template-rows: repeat(' + round.gridRows + ', 52px);">';

      for (var r = 0; r < round.gridRows; r++) {
        for (var c = 0; c < round.gridCols; c++) {
          var cellData = round.grid[r][c];

          if (cellData === 'W') {
            html += '<div class="k-cell wall"></div>';
          } else if (cellData.indexOf('C:') === 0) {
            var clueStr = cellData.substring(2);
            var clueParts = clueStr.split('\\');
            var acrossClue = parseInt(clueParts[0]);
            var downClue = parseInt(clueParts[1]);
            html += '<div class="k-cell clue">';
            if (downClue > 0) html += '<span class="clue-down">' + downClue + '</span>';
            if (acrossClue > 0) html += '<span class="clue-across">' + acrossClue + '</span>';
            html += '</div>';
          } else if (cellData.indexOf('E:') === 0) {
            html += '<div class="k-cell empty" id="cell-' + r + '-' + c + '" data-row="' + r + '" data-col="' + c + '" data-answer="' + cellData.substring(2) + '"></div>';
          }
        }
      }

      html += '</div>';
      html += '</div>';

      /* Number bank — always shows digits 1-9, never collapses */
      html += '<div class="bank-container">';
      html += '<div class="bank-label">Drag tiles (unlimited)</div>';
      html += '<div class="bank-area" id="numberBank">';
      for (var i = 0; i < round.numberPool.length; i++) {
        var num = round.numberPool[i];
        html += '<div class="tag-slot" id="slot-' + i + '">';
        html += '<div class="number-tag bank-tag" id="bank-tag-' + i + '" data-value="' + num + '" data-bank-index="' + i + '">' + num + '</div>';
        html += '</div>';
      }
      html += '</div>';
      html += '</div>';

      /* Submit button */
      html += '<div class="submit-container">';
      html += '<button class="btn-submit" id="btnSubmit" disabled>Check Answer</button>';
      html += '</div>';

      container.innerHTML = html;

      /* Submit handler */
      var btnSubmit = document.getElementById('btnSubmit');
      if (btnSubmit) {
        btnSubmit.addEventListener('click', function() {
          if (!gameState.isProcessing && !gameState.gameEnded) {
            checkAnswer(round);
          }
        });
      }
    }

    /* ====== 16. DnD Setup — Unlimited tags variant ====== */
    function cleanupDnD() {
      if (dndManager) {
        try { dndManager.destroy(); } catch (e) {}
        dndManager = null;
      }
      for (var i = 0; i < dndDraggables.length; i++) {
        try { dndDraggables[i].destroy(); } catch (e) {}
      }
      for (var i = 0; i < dndDroppables.length; i++) {
        try { dndDroppables[i].destroy(); } catch (e) {}
      }
      dndDraggables = [];
      dndDroppables = [];
      cloneCounter = 0;
    }

    /* Create a clone tag element in a cell and make it draggable */
    function createCloneInCell(value, cellKey) {
      var cellEl = document.getElementById('cell-' + cellKey);
      if (!cellEl) return null;

      cloneCounter++;
      var cloneId = 'clone-' + cloneCounter;

      var cloneEl = document.createElement('div');
      cloneEl.className = 'number-tag';
      cloneEl.id = cloneId;
      cloneEl.setAttribute('data-value', value);
      cloneEl.setAttribute('data-clone', 'true');
      cloneEl.textContent = value;

      cellEl.appendChild(cloneEl);
      cellEl.classList.add('has-tag');
      cellEl.classList.add('cell-pop');
      setTimeout(function() { cellEl.classList.remove('cell-pop'); }, 300);
      cellEl.classList.remove('cell-correct', 'cell-wrong');

      /* Update state */
      gameState.placedValues[cellKey] = { cloneId: cloneId, value: value };

      /* Make the clone draggable */
      if (dndManager && dndKitLib) {
        var DraggableClass = dndKitLib.Draggable;
        var draggable = new DraggableClass({
          id: cloneId,
          element: cloneEl,
          data: { value: value, isClone: true, cellKey: cellKey }
        }, dndManager);
        dndDraggables.push(draggable);
      }

      return cloneId;
    }

    /* Remove a clone from its cell */
    function destroyClone(cloneId, cellKey) {
      var cloneEl = document.getElementById(cloneId);
      if (cloneEl) cloneEl.remove();

      var cellEl = document.getElementById('cell-' + cellKey);
      if (cellEl) {
        cellEl.classList.remove('has-tag', 'cell-correct', 'cell-wrong');
      }

      delete gameState.placedValues[cellKey];
    }

    function setupDnD(round) {
      cleanupDnD();
      if (!dndKitLib) return;

      var DragDropManagerClass = dndKitLib.DragDropManager;
      var DraggableClass = dndKitLib.Draggable;
      var DroppableClass = dndKitLib.Droppable;
      var PointerSensorClass = dndKitLib.PointerSensor;
      var PointerConstraints = dndKitLib.PointerActivationConstraints;

      /* Behaviour 8: PointerSensor with 3px distance, no delay */
      var managerConfig = {};
      if (PointerSensorClass && PointerConstraints) {
        managerConfig.sensors = [
          PointerSensorClass.configure({
            activationConstraints: [
              new PointerConstraints.Distance({ value: 3 })
            ]
          })
        ];
      }

      dndManager = new DragDropManagerClass(managerConfig);

      /* Make empty cells droppable */
      for (var r = 0; r < round.gridRows; r++) {
        for (var c = 0; c < round.gridCols; c++) {
          var cellEl = document.getElementById('cell-' + r + '-' + c);
          if (cellEl) {
            var droppable = new DroppableClass({
              id: 'cell-' + r + '-' + c,
              element: cellEl
            }, dndManager);
            dndDroppables.push(droppable);
          }
        }
      }

      /* Make bank droppable (for returning clones — destroys them) */
      var bankEl = document.getElementById('numberBank');
      if (bankEl) {
        var bankDroppable = new DroppableClass({ id: 'bank', element: bankEl }, dndManager);
        dndDroppables.push(bankDroppable);
      }

      /* Make bank tags draggable — these never leave the bank */
      for (var i = 0; i < round.numberPool.length; i++) {
        var tagEl = document.getElementById('bank-tag-' + i);
        if (tagEl) {
          var draggable = new DraggableClass({
            id: 'bank-tag-' + i,
            element: tagEl,
            data: { value: round.numberPool[i], bankIndex: i, isClone: false }
          }, dndManager);
          dndDraggables.push(draggable);
        }
      }

      /* Drag start — visual feedback */
      dndManager.monitor.addEventListener('dragstart', function(event) {
        isDragging = true;
        var srcEl = event.operation.source.element;
        if (srcEl) srcEl.classList.add('dragging');
      });

      /* Behaviour 7: Auto edge-scrolling during drag */
      dndManager.monitor.addEventListener('dragmove', function(event) {
        var pos = event.operation.position;
        if (!pos || !pos.current) return;
        var y = pos.current.y;
        var vh = window.innerHeight;
        var threshold = 60;
        if (y < threshold) {
          window.scrollBy(0, -8);
        } else if (y > vh - threshold) {
          window.scrollBy(0, 8);
        }
      });

      /* Main dragend handler */
      dndManager.monitor.addEventListener('dragend', function(event) {
        isDragging = false;
        var operation = event.operation;
        var source = operation.source;
        var target = operation.target;
        var canceled = event.canceled;

        var srcEl = source.element;
        if (srcEl) srcEl.classList.remove('dragging');

        if (gameState.isProcessing || gameState.gameEnded || !gameState.isActive) return;

        var sourceId = source.id;
        var value = source.data.value;
        var isClone = source.data.isClone;
        var sourceCellKey = source.data.cellKey; // only set for clones

        /* === BANK TAG DRAG === */
        if (!isClone) {
          /* Bank tag: always stays in bank. On valid drop → create clone in cell. */
          /* Return bank tag to its slot (it may have been displaced by @dnd-kit) */
          var bankIndex = source.data.bankIndex;
          var slotEl = document.getElementById('slot-' + bankIndex);
          if (slotEl && srcEl && srcEl.parentNode !== slotEl) {
            slotEl.appendChild(srcEl);
          }

          if (canceled || !target || target.id === 'bank') {
            /* Dropped nowhere or back on bank — no-op */
            updateSubmitButton(round);
            return;
          }

          /* Dropped on a cell */
          var cellKey = target.id.replace('cell-', '');
          var existing = gameState.placedValues[cellKey];

          /* If cell occupied, remove old clone first */
          if (existing) {
            destroyClone(existing.cloneId, cellKey);
          }

          /* Create new clone in the cell */
          createCloneInCell(value, cellKey);
          updateSubmitButton(round);
          return;
        }

        /* === CLONE TAG DRAG === */
        /* Clone was dragged from a cell */

        /* Return clone to its source cell first (undo @dnd-kit displacement) */
        var srcCellEl = document.getElementById('cell-' + sourceCellKey);
        if (srcCellEl && srcEl && srcEl.parentNode !== srcCellEl) {
          srcCellEl.appendChild(srcEl);
        }

        if (canceled || !target) {
          /* Dropped outside → remove clone (return to nothing) */
          destroyClone(sourceId, sourceCellKey);
          updateSubmitButton(round);
          return;
        }

        if (target.id === 'bank') {
          /* Dropped on bank → remove clone */
          destroyClone(sourceId, sourceCellKey);
          updateSubmitButton(round);
          return;
        }

        var targetCellKey = target.id.replace('cell-', '');

        if (targetCellKey === sourceCellKey) {
          /* Dropped on same cell → no-op */
          updateSubmitButton(round);
          return;
        }

        /* Dropped on another cell */
        var targetExisting = gameState.placedValues[targetCellKey];
        var targetValue = targetExisting ? targetExisting.value : null;

        /* Remove clone from source cell */
        destroyClone(sourceId, sourceCellKey);

        /* If target occupied, remove that clone too (swap) */
        if (targetExisting) {
          destroyClone(targetExisting.cloneId, targetCellKey);
        }

        /* Create new clone in target cell with the dragged value */
        createCloneInCell(value, targetCellKey);

        /* Swap: place target's value back in source cell */
        if (targetValue !== null) {
          createCloneInCell(targetValue, sourceCellKey);
        }

        updateSubmitButton(round);
      });
    }

    /* ====== 17. Submit button ====== */
    function updateSubmitButton(round) {
      var btnSubmit = document.getElementById('btnSubmit');
      if (!btnSubmit) return;

      var totalEmpty = 0;
      for (var r = 0; r < round.gridRows; r++) {
        for (var c = 0; c < round.gridCols; c++) {
          if (round.grid[r][c].indexOf('E:') === 0) totalEmpty++;
        }
      }

      var filledCount = Object.keys(gameState.placedValues).length;
      btnSubmit.disabled = (filledCount < totalEmpty);
    }

    /* ====== 18. checkAnswer ====== */
    function checkAnswer(round) {
      if (gameState.isProcessing || gameState.gameEnded) return;
      gameState.isProcessing = true;
      gameState.attemptNumber++;

      var allCorrect = true;
      var studentAnswer = {};

      /* Check each empty cell */
      for (var r = 0; r < round.gridRows; r++) {
        for (var c = 0; c < round.gridCols; c++) {
          var cellData = round.grid[r][c];
          if (cellData.indexOf('E:') !== 0) continue;

          var correctVal = parseInt(cellData.substring(2));
          var cellKey = r + '-' + c;
          var placed = gameState.placedValues[cellKey];
          var cellEl = document.getElementById('cell-' + cellKey);

          if (!placed) {
            allCorrect = false;
            continue;
          }

          studentAnswer[cellKey] = placed.value;

          if (placed.value === correctVal) {
            if (cellEl) cellEl.classList.add('cell-correct');
          } else {
            allCorrect = false;
            if (cellEl) cellEl.classList.add('cell-wrong');
          }
        }
      }

      /* Record attempt */
      recordAttempt({
        question_id: round.id,
        student_answer: JSON.stringify(studentAnswer),
        correct_answer: 'all_cells_correct',
        is_correct: allCorrect,
        score_delta: allCorrect ? 1 : 0,
        difficulty_level: round.difficulty || 1,
        attempt_number: gameState.attemptNumber
      });

      trackEvent('answer_submitted', {
        round: gameState.currentRound + 1,
        correct: allCorrect,
        attempt: gameState.attemptNumber
      });

      if (allCorrect) {
        gameState.score += 1;
        syncDOM();
        trackEvent('round_complete', { round: gameState.currentRound + 1 });

        var audioStopped = false;
        try {
          FeedbackManager.sound.play('all_correct', { sticker: CORRECT_STICKER }).then(function() {
            if (audioStopped) return;
            return FeedbackManager.playDynamicFeedback({
              audio_content: 'Perfect! All numbers add up!',
              subtitle: 'Perfect!',
              sticker: CORRECT_STICKER
            });
          }).catch(function() {}).then(function() {
            gameState.isProcessing = false;
            nextRound();
          });
        } catch (e) {
          gameState.isProcessing = false;
          nextRound();
        }
      } else {
        var grid = document.getElementById('kakuroGrid');
        if (grid) {
          grid.classList.add('shake-wrong');
          setTimeout(function() { grid.classList.remove('shake-wrong'); }, 400);
        }

        try {
          FeedbackManager.sound.play('incorrect_sound_effect', { sticker: INCORRECT_STICKER }).then(function() {
            return FeedbackManager.playDynamicFeedback({
              audio_content: 'Not quite, check the sums again.',
              subtitle: 'Not quite!',
              sticker: INCORRECT_STICKER
            });
          }).catch(function() {});
        } catch (e) {}

        setTimeout(function() {
          for (var r = 0; r < round.gridRows; r++) {
            for (var c = 0; c < round.gridCols; c++) {
              var cellEl = document.getElementById('cell-' + r + '-' + c);
              if (cellEl) cellEl.classList.remove('cell-wrong');
            }
          }
          gameState.isProcessing = false;
        }, 2000);
      }
    }
    window.checkAnswer = checkAnswer;

    /* ====== 19. nextRound ====== */
    function nextRound() {
      gameState.currentRound += 1;
      syncDOM();

      if (gameState.currentRound >= gameState.totalRounds) {
        endGame('victory');
        return;
      }

      if (progressBar) {
        try { progressBar.update(gameState.currentRound, 0); } catch (e) {}
      }

      showRoundTransition();
    }
    window.nextRound = nextRound;

    /* ====== 20. showRoundTransition ====== */
    function showRoundTransition() {
      var roundNum = gameState.currentRound + 1;
      var audioStopped = false;
      var dismissed = false;

      function onTransitionDismissed() {
        if (dismissed) return;
        dismissed = true;
        audioStopped = true;
        try {
          FeedbackManager.sound.stopAll();
          FeedbackManager._stopCurrentDynamic();
        } catch (e) {}
        if (transitionScreen) {
          try { transitionScreen.hide(); } catch (e) {}
        }
        var tsScreen = document.querySelector('.mathai-ts-screen.active');
        if (tsScreen) tsScreen.classList.remove('active');
        loadRound();
      }

      if (transitionScreen) {
        transitionScreen.show({
          icons: ['\uD83D\uDD22'],
          title: 'Round ' + roundNum,
          subtitle: roundNum === 1 ? 'Fill in the numbers so each run adds up!' : 'New puzzle incoming!',
          buttons: [{ text: 'Start', onClick: onTransitionDismissed }],
          persist: true
        });

        setTimeout(function() {
          var tsBtns = document.querySelectorAll('.mathai-ts-btn');
          for (var i = 0; i < tsBtns.length; i++) {
            tsBtns[i].addEventListener('click', onTransitionDismissed);
          }
        }, 100);

        try {
          FeedbackManager.sound.play('rounds_sound_effect', { sticker: ROUND_STICKER }).then(function() {
            if (audioStopped) return;
            return FeedbackManager.playDynamicFeedback({
              audio_content: 'Round ' + roundNum,
              subtitle: 'Round ' + roundNum,
              sticker: ROUND_STICKER
            });
          }).catch(function() {});
        } catch (e) {}
      } else {
        showSimpleTransition(roundNum, function() { loadRound(); });
      }
    }

    function showSimpleTransition(roundNum, onDismiss) {
      var overlay = document.createElement('div');
      overlay.className = 'simple-transition-overlay';
      overlay.innerHTML = '<h2>Round ' + roundNum + '</h2><p>Fill in the numbers!</p><button class="btn-primary">Start</button>';
      overlay.querySelector('button').addEventListener('click', function() {
        overlay.remove();
        onDismiss();
      });
      document.body.appendChild(overlay);
    }

    /* ====== 21. endGame ====== */
    function endGame(reason) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.phase = 'results';
      syncDOM();

      cleanupDnD();

      var stars = getStars(gameState.score);
      var elapsed = Math.round((Date.now() - gameState.startTime) / 1000);
      var accuracy = gameState.totalRounds > 0 ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0;

      trackEvent('game_end', {
        score: gameState.score,
        totalRounds: gameState.totalRounds,
        stars: stars,
        elapsed: elapsed
      });

      var completeData = {
        type: 'game_complete',
        gameId: gameState.gameId,
        metrics: {
          score: gameState.score,
          totalRounds: gameState.totalRounds,
          stars: stars,
          accuracy: accuracy,
          duration: elapsed
        },
        completedAt: Date.now(),
        attempts: gameState.attempts,
        events: gameState.events
      };
      try { window.parent.postMessage(completeData, '*'); } catch (e) {}

      showResults(stars, accuracy, elapsed);

      var stickerMap = { 3: VICTORY_3_STICKER, 2: VICTORY_2_STICKER, 1: VICTORY_1_STICKER, 0: GAME_OVER_STICKER };
      var sfxId = stars >= 1 ? 'victory_sound_effect' : 'game_over_sound_effect';
      try {
        FeedbackManager.sound.play(sfxId, { sticker: stickerMap[stars] }).then(function() {
          var msg = stars === 3 ? 'Amazing! 3 stars! You solved all puzzles!' : stars === 2 ? 'Great job! 2 stars!' : stars === 1 ? 'Good effort! 1 star!' : 'Keep practicing!';
          return FeedbackManager.playDynamicFeedback({ audio_content: msg, subtitle: msg, sticker: stickerMap[stars] });
        }).catch(function() {});
      } catch (e) {}
    }
    window.endGame = endGame;

    /* ====== 22. showResults ====== */
    function showResults(stars, accuracy, elapsed) {
      var starStr = '';
      for (var i = 0; i < stars; i++) starStr += '\u2B50';
      if (stars === 0) starStr = '\u2606';

      var titles = ['Keep Trying!', 'Nice Work!', 'Great Job!', 'Kakuro Master!'];
      var gameContent = document.getElementById('gameContent');
      if (gameContent) gameContent.innerHTML = '';

      var rs = document.createElement('div');
      rs.id = 'results-screen';
      rs.innerHTML =
        '<div class="results-stars">' + starStr + '</div>' +
        '<div class="results-title">' + titles[stars] + '</div>' +
        '<div class="results-subtitle">You completed ' + gameState.score + ' of ' + gameState.totalRounds + ' rounds</div>' +
        '<div class="results-metrics">' +
          '<div class="results-metric">Accuracy: ' + accuracy + '%</div>' +
          '<div class="results-metric">Time: ' + elapsed + 's</div>' +
          '<div class="results-metric">Stars: ' + starStr + '</div>' +
        '</div>' +
        '<button class="btn-primary" onclick="window.restartGame()">Play Again</button>';

      var app = document.getElementById('app');
      if (app) app.appendChild(rs);
    }

    /* ====== 23. resetGame ====== */
    function resetGame() {
      gameState.phase = 'start_screen';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.startTime = null;
      gameState.roundStartTime = null;
      gameState.placedValues = {};
      gameState.attemptNumber = 0;
      gameState.duration_data = { startTime: null, pausedTime: 0 };
      lastLoadedRound = -1;

      cleanupDnD();

      var rs = document.getElementById('results-screen');
      if (rs) rs.remove();

      if (progressBar) {
        try { progressBar.destroy(); } catch (e) {}
        progressBar = null;
      }
      createProgressBar();

      if (signalCollector) {
        try { signalCollector.reset(); } catch (e) {}
      }

      syncDOM();
      startGame();
    }
    window.restartGame = resetGame;

    /* ====== 24. createProgressBar ====== */
    function createProgressBar() {
      try {
        if (typeof ProgressBarComponent !== 'undefined') {
          progressBar = new ProgressBarComponent({
            slotId: 'mathai-progress-slot',
            totalRounds: gameState.totalRounds,
            totalLives: 1
          });
        }
      } catch (e) {}
    }

    /* ====== 25. buildFallbackLayout ====== */
    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      app.innerHTML = '<div id="mathai-progress-slot"></div>' +
        '<div id="mathai-transition-slot"></div>' +
        '<div id="gameContent" style="flex: 1; display: flex; flex-direction: column;"></div>';
    }

    /* ====== Behaviour 8: Global touch handler — only preventDefault while dragging ====== */
    var isDragging = false;
    document.addEventListener('touchmove', function(e) {
      if (isDragging) e.preventDefault();
    }, { passive: false });

    /* ====== Programmatic placement for tests ====== */
    function programmaticPlace(value, row, col) {
      var cellKey = row + '-' + col;

      /* If cell occupied, remove old clone */
      var existing = gameState.placedValues[cellKey];
      if (existing) {
        destroyClone(existing.cloneId, cellKey);
      }

      /* Create a clone in the cell */
      createCloneInCell(value, cellKey);
    }
    window.programmaticPlace = programmaticPlace;

    /* ====== 26. DOMContentLoaded init ====== */
    document.addEventListener('DOMContentLoaded', function() {
      /* 1. Register postMessage listener FIRST */
      window.addEventListener('message', handlePostMessage);

      /* 2. Signal ready */
      try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

      /* 3. Wait for CDN packages */
      waitForPackages().then(function(loaded) {
        try {
          /* 4. FeedbackManager init + preload */
          if (typeof FeedbackManager !== 'undefined') {
            FeedbackManager.init().then(function() {
              FeedbackManager.sound.preload([
                { id: 'correct_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
                { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                { id: 'rounds_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                { id: 'all_correct', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506764346.mp3' },
                { id: 'new_cards', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432104595.mp3' },
                { id: 'tap_sound', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
              ]).catch(function() {});
            }).catch(function() {});
          }

          /* 5. SignalCollector */
          if (typeof SignalCollector !== 'undefined') {
            signalCollector = new SignalCollector({ gameId: 'kakuro-unlimited' });
          }

          /* 6. ScreenLayout */
          if (typeof ScreenLayout !== 'undefined') {
            ScreenLayout.inject('app', {
              sections: {
                header: true,
                questionText: false,
                progressBar: true,
                playArea: true,
                transitionScreen: true
              }
            });
          } else {
            buildFallbackLayout();
          }

          /* 7. VisibilityTracker */
          if (typeof VisibilityTracker !== 'undefined') {
            visibilityTracker = new VisibilityTracker({
              onInactive: function() {
                try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {}
              },
              onResume: function() {
                try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {}
              }
            });
          }

          /* 8. ProgressBar */
          createProgressBar();

          /* 9. TransitionScreen */
          if (typeof TransitionScreenComponent !== 'undefined') {
            transitionScreen = new TransitionScreenComponent({ autoInject: true });
          }

          setupGame();
        } catch (e) {
          console.error('[init] ' + e.message);
        }
      });

      /* 10. Wait for DnD kit (R1: independent of CDN packages) */
      waitForDndKit().then(function(lib) {
        if (lib) {
          dndKitLib = lib;
          console.log('[dnd-kit] loaded');
        }
      });

      /* 11. Standalone fallback — runs INDEPENDENTLY */
      setTimeout(function() {
        if (!gameState.isActive && !gameState.gameEnded) {
          if (!document.getElementById('gameContent')) {
            buildFallbackLayout();
          }
          gameState.content = fallbackContent;
          gameState.totalRounds = fallbackContent.rounds.length;
          setupGame();
          startGame();
        }
      }, 2000);

      /* 12. Window exposures */
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = resetGame;
      window.nextRound = nextRound;
      window.startGame = startGame;
      window.getRounds = getRounds;
      window.loadRound = loadRound;
      window.checkAnswer = checkAnswer;
    });
  </script>
</body>
</html>
