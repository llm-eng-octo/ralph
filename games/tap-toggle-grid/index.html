<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Light the Grid</title>

<!-- STEP 1: SentryConfig package -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

<!-- STEP 2: initSentry() function definition -->
<script>
function initSentry() {
  try {
    if (typeof SentryConfig !== 'undefined' && SentryConfig.enabled && typeof Sentry !== 'undefined') {
      Sentry.init({
        dsn: SentryConfig.dsn,
        environment: SentryConfig.environment,
        release: "tap-toggle-grid@1.0.0",
        tracesSampleRate: SentryConfig.tracesSampleRate,
        sampleRate: SentryConfig.sampleRate,
        maxBreadcrumbs: 50,
        ignoreErrors: [
          "ResizeObserver loop limit exceeded",
          "ResizeObserver loop completed with undelivered notifications",
          "Non-Error promise rejection captured",
          "Script error.",
          "Load failed",
          "Failed to fetch"
        ]
      });
    }
  } catch (e) { console.error('Sentry init failed:', e.message); }
}
</script>

<!-- STEP 3: Sentry SDK v10.23.0 -->
<script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

<!-- STEP 4: Initialize on load -->
<script>window.addEventListener('load', initSentry);</script>

<!-- STEP 5-7: Game packages -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100dvh; overflow: hidden; overscroll-behavior: none; }
@supports not (height: 100dvh) { html, body { height: 100vh; } }
body {
  font-family: var(--mathai-font-family);
  background: var(--mathai-white);
  color: var(--mathai-text-primary);
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

/* === LAYOUT ROOT === */
.mathai-layout-root { max-width: 480px; margin: 0 auto; }

/* === PLAY AREA LAYOUT === */
.mathai-layout-playarea {
  display: flex;
  flex-direction: column !important;
  align-items: center !important;
  padding: 0 20px 32px !important;
}

.mathai-ts-screen.active {
  flex: 1;
  align-items: center;
  justify-content: flex-start;
  padding-top: 16px;
}

.mathai-ts-card {
  min-height: 50dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* === GAME PLAY AREA === */
.game-play-area {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
}

/* === SECTION LABELS === */
.section-label {
  font-size: 16px;
  font-weight: 600;
  color: var(--mathai-text-primary, #333);
  font-family: var(--mathai-font-family);
  margin-bottom: 8px;
  text-align: center;
}

/* === TARGET GRID (read-only, smaller) === */
.target-grid-wrapper {
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.target-grid {
  display: flex;
  flex-wrap: wrap;
  width: 132px;
}

.target-cell {
  width: 40px;
  height: 40px;
  margin: 2px;
  border: 2px solid var(--mathai-border-gray, #e0e0e0);
  border-radius: 6px;
  background: var(--mathai-white, #ffffff);
}

.target-cell.cell-filled {
  background: var(--mathai-blue, #667eea);
  border-color: var(--mathai-blue, #667eea);
}

/* === INTERACTIVE GRID === */
.interactive-grid-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.interactive-grid {
  display: flex;
  flex-wrap: wrap;
  width: 180px;
}

.grid-cell {
  width: 52px;
  height: 52px;
  margin: 4px;
  border: 2px solid var(--mathai-border-gray, #e0e0e0);
  border-radius: 8px;
  background: var(--mathai-white, #ffffff);
  cursor: pointer;
  touch-action: manipulation;
  transition: all 0.2s ease;
  min-width: 44px;
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
}

.grid-cell:active { transform: scale(0.95); }

.grid-cell.cell-filled {
  background: var(--mathai-blue, #667eea);
  border-color: var(--mathai-blue, #667eea);
}

.grid-cell.cell-locked {
  background: var(--mathai-gray, #999);
  border-color: var(--mathai-gray, #999);
  pointer-events: none;
  cursor: default;
  opacity: 0.6;
}

.grid-cell.constraint-violation {
  border-color: var(--mathai-red, #e74c3c);
  box-shadow: 0 0 8px rgba(231, 76, 60, 0.4);
}

.grid-cell.correct {
  background: var(--mathai-cell-bg-green, #d4edda);
  border-color: var(--mathai-cell-border-green, #28a745);
}

.grid-cell.disabled { pointer-events: none; opacity: 0.6; }

.interactive-grid.interaction-disabled .grid-cell { pointer-events: none; }

/* === STATUS TEXT === */
.status-text {
  text-align: center;
  margin-top: 12px;
  font-size: 14px;
  color: var(--mathai-gray, #999);
  font-family: var(--mathai-font-family);
  min-height: 20px;
}

/* === INSTRUCTION AREA === */
.instruction-area { text-align: center; }

.instruction-text {
  font-size: var(--mathai-font-size-small, 14px);
  color: var(--mathai-text-primary, #000000);
  margin-bottom: 4px;
  line-height: 1.4;
}

.instruction-sub { font-size: 13px; color: var(--mathai-text-primary, #000000); }

/* === RESULTS METRICS === */
.results-metrics {
  display: flex;
  flex-direction: column;
  text-align: center;
  margin-bottom: 8px;
}

.metric-row { padding: 4px 0; }
.metric-label { color: var(--mathai-gray, #999); font-size: var(--mathai-font-size-small, 14px); }
.metric-value-large { font-size: 32px; font-weight: 700; color: var(--mathai-primary, #333); }
.metric-hint { font-size: var(--mathai-font-size-small, 14px); color: var(--mathai-blue, #667eea); margin-top: 4px; }

/* === BUTTON OVERRIDES === */
.game-btn {
  padding: 14px 32px;
  font-size: var(--mathai-font-size-button, 16px);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  border: none;
  border-radius: var(--mathai-border-radius-button, 12px);
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--mathai-white, #fff);
}

.btn-primary { background: var(--mathai-green, #219653); }
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(33, 150, 83, 0.4);
}

.btn-secondary { background: var(--mathai-blue, #667eea); }
.btn-secondary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}

.hidden { display: none !important; }

/* === MICRO-ANIMATIONS === */
@keyframes scoreBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes starPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes solutionGlow {
  0%, 100% { box-shadow: 0 0 4px rgba(33, 150, 83, 0.3); }
  50% { box-shadow: 0 0 16px rgba(33, 150, 83, 0.7); }
}

@keyframes confettiFall {
  0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.shake-wrong { animation: shake 0.5s ease-in-out; }
.score-bounce { animation: scoreBounce 0.4s ease; }
.fade-in { animation: fadeIn 0.35s ease; }

/* === LANDSCAPE LOCK === */
@media (orientation: landscape) and (max-height: 500px) {
  .landscape-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--mathai-white, #fff); z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--mathai-text-primary, #333);
    text-align: center; padding: 20px;
  }
}
</style>
</head>
<body>
<div id="app" data-phase="start_screen" data-score="0" data-lives="0"></div>

<script>
/* ============================================================
   GAME STATE (PART-007)
   ============================================================ */
window.gameState = {
  gameId: 'tap-toggle-grid',
  phase: 'start_screen',
  currentRound: 0,
  totalRounds: 5,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  lives: 0,
  totalLives: 0,
  currentLevel: 1,
  roundTimes: [],
  roundStartTime: null,
  isProcessing: false,
  gameEnded: false,
  correctAnswer: null,
  streak: 0,
  consecutiveWrongs: 0,
  contentSetId: null,
  grid: [
    [false, false, false],
    [false, false, false],
    [false, false, false]
  ]
};

var timer = null;
var visibilityTracker = null;
var progressBar = null;
var transitionScreen = null;
var previewScreen = null;
var signalCollector = null;

/* ============================================================
   FALLBACK CONTENT (5 rounds with different target patterns)
   ============================================================ */
var fallbackContent = {
  rounds: [
    {
      round: 1,
      name: 'Cross',
      filledCells: [[0,1],[1,0],[1,1],[1,2],[2,1]],
      targetPattern: [[0,1],[1,0],[1,1],[1,2],[2,1]],
      difficulty_level: 1
    },
    {
      round: 2,
      name: 'L Shape',
      filledCells: [[0,0],[1,0],[2,0],[2,1],[2,2]],
      targetPattern: [[0,0],[1,0],[2,0],[2,1],[2,2]],
      difficulty_level: 1
    },
    {
      round: 3,
      name: 'Diagonal',
      filledCells: [[0,0],[1,1],[2,2]],
      targetPattern: [[0,0],[1,1],[2,2]],
      difficulty_level: 1
    },
    {
      round: 4,
      name: 'Corners',
      filledCells: [[0,0],[0,2],[2,0],[2,2]],
      targetPattern: [[0,0],[0,2],[2,0],[2,2]],
      difficulty_level: 2
    },
    {
      round: 5,
      name: 'T Shape',
      filledCells: [[0,0],[0,1],[0,2],[1,1],[2,1]],
      targetPattern: [[0,0],[0,1],[0,2],[1,1],[2,1]],
      difficulty_level: 2
    }
  ]
};

/* ============================================================
   HELPERS
   ============================================================ */
function getRounds() {
  if (gameState.content && gameState.content.rounds) {
    return gameState.content.rounds;
  }
  return fallbackContent.rounds;
}

function waitForPackages() {
  return new Promise(function(resolve, reject) {
    var timeout = 10000;
    var start = Date.now();
    var check = setInterval(function() {
      if (
        typeof FeedbackManager !== 'undefined' &&
        typeof TimerComponent !== 'undefined' &&
        typeof VisibilityTracker !== 'undefined' &&
        typeof SignalCollector !== 'undefined'
      ) {
        clearInterval(check);
        resolve();
      } else if (Date.now() - start > timeout) {
        clearInterval(check);
        reject(new Error('Packages failed to load within ' + timeout + 'ms'));
      }
    }, 100);
  });
}

/* === syncDOMState (PART-007 + test harness) === */
function syncDOMState() {
  var app = document.getElementById('app');
  if (!app) return;
  app.setAttribute('data-phase', gameState.phase);
  app.setAttribute('data-score', gameState.score);
  app.setAttribute('data-lives', Math.max(0, gameState.lives));
  app.setAttribute('data-round', gameState.currentRound);
}

/* === calcStars (FM-11: must be on window) === */
function calcStars() {
  if (gameState.roundTimes.length === 0) return 1;
  var avgTime = gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length;
  return avgTime <= 5 ? 3 : avgTime <= 10 ? 2 : 1;
}
window.calcStars = calcStars;

/* ============================================================
   RECORD ATTEMPT (PART-009 — 12 fields)
   ============================================================ */
function recordAttempt(roundIndex, userInput, correct, metadata) {
  var round = getRounds()[roundIndex];
  var attempt = {
    attempt_timestamp: Date.now(),
    time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
    input_of_user: userInput,
    correct: correct,
    round_number: roundIndex + 1,
    question_id: 'r' + (roundIndex + 1),
    correct_answer: round.filledCells,
    response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
    misconception_tag: correct ? null : (metadata.misconception_tag || null),
    difficulty_level: round.difficulty_level || 1,
    is_retry: metadata.is_retry || false,
    metadata: metadata
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({
    round: roundIndex + 1,
    timestamp: Date.now()
  });
}

/* === trackEvent (PART-010) === */
function trackEvent(type, target, data) {
  var evt = { type: type, target: target, timestamp: Date.now() };
  if (data) {
    var keys = Object.keys(data);
    for (var i = 0; i < keys.length; i++) { evt[keys[i]] = data[keys[i]]; }
  }
  gameState.events.push(evt);
}

/* === computeTriesPerRound === */
function computeTriesPerRound(attempts) {
  var rounds = {};
  attempts.forEach(function(a) {
    var r = a.round_number;
    rounds[r] = (rounds[r] || 0) + 1;
  });
  return Object.keys(rounds).map(function(r) {
    return { round: Number(r), triesCount: rounds[r] };
  });
}

/* === createProgressBar (PART-023) === */
function createProgressBar() {
  if (typeof ProgressBarComponent === 'undefined') return;
  if (progressBar) progressBar.destroy();
  progressBar = new ProgressBarComponent({
    slotId: 'mathai-progress-slot',
    totalRounds: gameState.totalRounds,
    totalLives: gameState.totalLives
  });
}

/* ============================================================
   GRID HELPERS
   ============================================================ */
function resetGrid() {
  gameState.grid = [
    [false, false, false],
    [false, false, false],
    [false, false, false]
  ];
}

function buildTargetPattern(filledCells) {
  var pattern = [
    [false, false, false],
    [false, false, false],
    [false, false, false]
  ];
  for (var i = 0; i < filledCells.length; i++) {
    var r = filledCells[i][0];
    var c = filledCells[i][1];
    pattern[r][c] = true;
  }
  return pattern;
}

function gridsMatch(gridA, gridB) {
  for (var r = 0; r < 3; r++) {
    for (var c = 0; c < 3; c++) {
      if (gridA[r][c] !== gridB[r][c]) return false;
    }
  }
  return true;
}

function countViolations(userGrid, targetGrid) {
  var violations = [];
  for (var r = 0; r < 3; r++) {
    for (var c = 0; c < 3; c++) {
      if (userGrid[r][c] !== targetGrid[r][c]) {
        violations.push([r, c]);
      }
    }
  }
  return violations;
}

/* ============================================================
   CELL TAP HANDLER — P8 Click-to-Toggle
   ============================================================ */
async function handleCellTap(row, col) {
  /* Universal guards */
  if (!gameState.isActive) return;
  if (gameState.isProcessing) return;
  if (gameState.gameEnded) return;

  var roundData = getRounds()[gameState.currentRound];
  if (!roundData) return;

  /* P8 Req 4: Locked/pre-filled cells must not be interactive */
  /* (No locked cells in this game, but guard is here for completeness) */

  /* P8 Req 1: Toggle cell between filled and empty */
  gameState.grid[row][col] = !gameState.grid[row][col];

  /* Update visual */
  var cellId = 'cell-' + row + '-' + col;
  var cellEl = document.getElementById(cellId);
  if (cellEl) {
    if (gameState.grid[row][col]) {
      cellEl.classList.add('cell-filled');
    } else {
      cellEl.classList.remove('cell-filled');
    }
  }

  trackEvent('cell_toggle', cellId, {
    row: row,
    col: col,
    filled: gameState.grid[row][col],
    round: gameState.currentRound + 1
  });

  /* P8 Req 2: After every toggle, run constraint validation */
  var targetPattern = buildTargetPattern(roundData.filledCells);
  var violations = countViolations(gameState.grid, targetPattern);

  /* Clear previous violation highlights */
  var allCells = document.querySelectorAll('.grid-cell');
  for (var i = 0; i < allCells.length; i++) {
    allCells[i].classList.remove('constraint-violation');
  }

  /* Highlight violations */
  for (var v = 0; v < violations.length; v++) {
    var vr = violations[v][0];
    var vc = violations[v][1];
    var vEl = document.getElementById('cell-' + vr + '-' + vc);
    if (vEl) {
      vEl.classList.add('constraint-violation');
    }
  }

  /* Update status text */
  var statusEl = document.getElementById('status-text');
  if (statusEl) {
    if (violations.length === 0) {
      statusEl.textContent = '';
    } else {
      statusEl.textContent = violations.length + ' cell' + (violations.length !== 1 ? 's' : '') + ' differ from target';
    }
  }

  /* P8 Req 5: No per-toggle audio */

  /* P8 Req 3: If zero violations AND win condition met -> puzzle solved */
  if (violations.length === 0 && gridsMatch(gameState.grid, targetPattern)) {
    await handlePuzzleSolved();
  }
}

/* ============================================================
   PUZZLE SOLVED HANDLER
   ============================================================ */
async function handlePuzzleSolved() {
  gameState.isProcessing = true;
  var roundData = getRounds()[gameState.currentRound];

  /* Visual: mark all cells as correct */
  var allCells = document.querySelectorAll('.grid-cell');
  for (var i = 0; i < allCells.length; i++) {
    allCells[i].classList.add('correct');
    allCells[i].classList.remove('constraint-violation');
  }

  /* Disable interaction */
  var gridEl = document.getElementById('interactive-grid');
  if (gridEl) gridEl.classList.add('interaction-disabled');

  if (signalCollector) signalCollector.recordViewEvent('feedback_display', {
    screen: 'gameplay',
    content_snapshot: { feedback_type: 'correct', round: gameState.currentRound + 1, pattern: roundData.name },
    components: { progress: { current: gameState.currentRound, total: gameState.totalRounds } },
    metadata: { trigger: 'user_action' }
  });

  /* Timer + metrics */
  if (timer) timer.pause();
  var roundTimeMs = Date.now() - gameState.roundStartTime;
  var roundTimeSec = roundTimeMs / 1000;
  gameState.roundTimes.push(roundTimeSec);
  gameState.score++;
  gameState.streak++;
  gameState.consecutiveWrongs = 0;
  syncDOMState();

  /* Record attempt */
  var userFilledCells = [];
  for (var r = 0; r < 3; r++) {
    for (var c = 0; c < 3; c++) {
      if (gameState.grid[r][c]) {
        userFilledCells.push([r, c]);
      }
    }
  }
  recordAttempt(gameState.currentRound, userFilledCells, true, {
    round: gameState.currentRound + 1,
    pattern: roundData.name,
    timeTaken: roundTimeSec,
    is_retry: false
  });

  if (signalCollector) signalCollector.recordCustomEvent('round_solved', {
    round: gameState.currentRound + 1,
    correct: true,
    answer: userFilledCells,
    correct_answer: roundData.filledCells,
    time_ms: roundTimeMs
  });

  trackEvent('correct_answer', 'game', {
    round: gameState.currentRound + 1,
    pattern: roundData.name,
    timeTaken: Math.round(roundTimeSec)
  });

  /* P8 Req 3: Awaited SFX -> TTS on puzzle solve */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.sound.play('sound_correct', {
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif',
          duration: 2,
          type: 'IMAGE_GIF'
        }
      });
    }
  } catch (e) { console.error('Correct SFX error:', e.message); }

  var ttsText = 'Great! You matched the ' + roundData.name + ' pattern!';
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.playDynamicFeedback({
        audio_content: ttsText,
        subtitle: ttsText,
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif',
          duration: 2,
          type: 'IMAGE_GIF'
        }
      });
    }
  } catch (e) { console.error('Correct TTS error:', e.message); }

  /* Advance */
  gameState.currentRound++;
  if (progressBar) progressBar.update(gameState.currentRound, gameState.lives);
  gameState.isProcessing = false;

  if (gameState.currentRound >= gameState.totalRounds) {
    showGameComplete();
  } else {
    startRound();
  }
}

/* ============================================================
   START ROUND
   ============================================================ */
async function startRound() {
  var roundData = getRounds()[gameState.currentRound];
  if (!roundData) return;

  gameState.phase = 'playing';
  resetGrid();
  gameState.correctAnswer = roundData.filledCells;
  syncDOMState();

  var targetPattern = buildTargetPattern(roundData.filledCells);

  /* Render target grid */
  var targetGridEl = document.getElementById('target-grid');
  if (targetGridEl) {
    targetGridEl.innerHTML = '';
    for (var tr = 0; tr < 3; tr++) {
      for (var tc = 0; tc < 3; tc++) {
        var tCell = document.createElement('div');
        tCell.className = 'target-cell';
        if (targetPattern[tr][tc]) {
          tCell.classList.add('cell-filled');
        }
        targetGridEl.appendChild(tCell);
      }
    }
  }

  /* Render interactive grid */
  var interactiveGridEl = document.getElementById('interactive-grid');
  if (interactiveGridEl) {
    interactiveGridEl.innerHTML = '';
    interactiveGridEl.classList.remove('interaction-disabled');
    for (var ir = 0; ir < 3; ir++) {
      for (var ic = 0; ic < 3; ic++) {
        var gCell = document.createElement('div');
        gCell.className = 'grid-cell fade-in';
        gCell.id = 'cell-' + ir + '-' + ic;
        gCell.setAttribute('data-signal-id', 'cell-' + ir + '-' + ic);
        gCell.setAttribute('data-testid', 'cell-' + ir + '-' + ic);
        gCell.setAttribute('data-row', ir);
        gCell.setAttribute('data-col', ic);
        gCell.onclick = (function(r, c) {
          return function() { handleCellTap(r, c); };
        })(ir, ic);
        interactiveGridEl.appendChild(gCell);
      }
    }
  }

  /* Reset status text */
  var statusEl = document.getElementById('status-text');
  if (statusEl) statusEl.textContent = '';

  /* Show game content, hide transition */
  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) gameContentEl.style.display = '';
  if (transitionScreen) transitionScreen.hide();

  /* Timer */
  if (timer) {
    timer.resume();
    timer.reset();
    timer.start();
  }
  gameState.roundStartTime = Date.now();

  if (signalCollector) signalCollector.recordViewEvent('content_render', {
    screen: 'gameplay',
    content_snapshot: { round: gameState.currentRound + 1, pattern: roundData.name, filled_count: roundData.filledCells.length },
    components: { timer: { value: 0, state: 'running' }, progress: { current: gameState.currentRound, total: gameState.totalRounds } },
    metadata: { trigger: 'round_start' }
  });

  trackEvent('question_shown', 'game', {
    round: gameState.currentRound + 1,
    pattern: roundData.name
  });

  /* Dynamic TTS: pattern name — does NOT block input */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      FeedbackManager.playDynamicFeedback({
        audio_content: 'Match the ' + roundData.name + ' pattern',
        subtitle: 'Match the ' + roundData.name + ' pattern'
      });
    }
  } catch (e) { console.error('Round start TTS error:', e.message); }
}

/* ============================================================
   SCREEN FUNCTIONS
   ============================================================ */

/* === Welcome Screen === */
async function showWelcomeScreen() {
  if (timer) { timer.pause(); timer.reset(); }

  gameState.phase = 'start_screen';
  syncDOMState();

  var questionSlot = document.getElementById('mathai-question-slot');
  if (questionSlot) questionSlot.style.display = '';

  if (transitionScreen) transitionScreen.show({
    title: 'Light the Grid',
    subtitle: 'Toggle cells to match the target pattern!',
    buttons: [{
      text: 'Start Game',
      type: 'primary',
      action: function() { handleStartGame(); }
    }],
    persist: true
  });

  if (signalCollector) signalCollector.recordViewEvent('screen_transition', {
    screen: 'ready',
    content_snapshot: { title: 'Light the Grid' },
    components: {},
    metadata: { trigger: 'user_action', transition_from: 'none' }
  });

  /* Audio readiness + welcome VO */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await new Promise(function(resolve) {
        if (FeedbackManager.canPlayAudio()) return resolve();
        var check = setInterval(function() {
          if (FeedbackManager.canPlayAudio()) { clearInterval(check); resolve(); }
        }, 200);
        setTimeout(function() { clearInterval(check); resolve(); }, 15000);
      });
      await FeedbackManager.sound.play('vo_game_start', {
        sticker: {
          image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif',
          duration: 5,
          type: 'IMAGE_GIF'
        }
      });
    }
  } catch (e) { console.error('Welcome VO error:', e.message); }
}

/* === handleStartGame === */
function handleStartGame() {
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  startRound();
}

/* === startGame (exposed on window for test harness) === */
function startGame() {
  /* Fallback DOM: if ScreenLayout.inject() never ran (e.g. test env), build game DOM */
  if (!document.getElementById('gameContent')) {
    var app = document.getElementById('app');
    if (app) {
      app.innerHTML =
        '<div id="mathai-header-slot"><div id="timer-container" style="display:flex;justify-content:center;align-items:center;padding:8px 0;"></div></div>' +
        '<div id="mathai-question-slot"></div>' +
        '<div id="mathai-progress-slot"></div>' +
        '<div id="gameContent">' +
          '<div class="game-play-area">' +
            '<div class="target-grid-wrapper" data-signal-id="target-grid-wrapper">' +
              '<div class="section-label">Target Pattern</div>' +
              '<div class="target-grid" id="target-grid"></div>' +
            '</div>' +
            '<div class="interactive-grid-wrapper" data-signal-id="interactive-grid-wrapper">' +
              '<div class="section-label">Your Grid</div>' +
              '<div class="interactive-grid" id="interactive-grid" data-signal-id="interactive-grid"></div>' +
              '<div class="status-text" id="status-text"></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div id="mathai-transition-slot"></div>';
    }
  }
  if (!transitionScreen) {
    transitionScreen = { show: function() {}, hide: function() {} };
  }
  if (!gameState.content) {
    gameState.content = fallbackContent;
    gameState.totalRounds = fallbackContent.rounds.length;
  }
  setupGame();
  gameState.phase = 'playing';
  syncDOMState();
  startRound();
}
window.startGame = startGame;

/* ============================================================
   END GAME (PART-011)
   ============================================================ */
function endGame(isGameOver) {
  if (gameState.gameEnded) return;
  if (!gameState.isActive) return;
  gameState.isActive = false;
  gameState.gameEnded = true;
  gameState.duration_data.currentTime = new Date().toISOString();

  if (timer) { timer.pause(); }

  var stars = isGameOver ? 0 : calcStars();
  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var total = gameState.attempts.length;
  var accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
  var timeTaken = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;
  var avgTime = gameState.roundTimes.length > 0
    ? gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length
    : 0;

  gameState.phase = isGameOver ? 'gameover' : 'results';
  syncDOMState();

  var metrics = {
    accuracy: accuracy,
    time: timeTaken,
    stars: stars,
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    totalLives: gameState.totalLives,
    tries: computeTriesPerRound(gameState.attempts),
    avgTimePerRound: Math.round(avgTime * 10) / 10,
    roundTimes: gameState.roundTimes
  };

  trackEvent('game_end', 'game', { metrics: metrics });

  var signalResult = signalCollector ? signalCollector.seal() : { event_count: 0, metadata: {} };

  window.parent.postMessage({
    type: 'game_complete',
    data: {
      metrics: metrics,
      attempts: gameState.attempts,
      completedAt: Date.now(),
      signal_event_count: signalResult.event_count,
      signal_metadata: signalResult.metadata
    }
  }, '*');

  if (timer) { timer.destroy(); timer = null; }
  if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.stopAll(); } catch(e) {}
}

/* === showGameComplete === */
async function showGameComplete() {
  var avgTime = gameState.roundTimes.length > 0
    ? gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length
    : 0;

  endGame(false);

  var stars = calcStars();
  var avgDisplay = avgTime.toFixed(1);

  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) gameContentEl.style.display = 'none';

  var stickerUrls = {
    3: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif',
    2: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif',
    1: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif'
  };

  var metricsHTML =
    '<div class="results-metrics">' +
      '<div class="metric-row">' +
        '<span class="metric-label">Average time per round</span>' +
      '</div>' +
      '<div class="metric-value-large">' + avgDisplay + 's</div>' +
      '<p class="metric-hint">5 seconds or less = 3 stars</p>' +
    '</div>';

  if (transitionScreen) transitionScreen.show({
    stars: stars,
    title: stars === 3 ? 'Amazing!' : stars === 2 ? 'Great Job!' : 'Well Done!',
    content: metricsHTML,
    buttons: [{
      text: stars >= 3 ? 'Play Again' : 'Retry for more stars',
      type: 'secondary',
      action: function() { restartGame(); }
    }],
    persist: true
  });

  if (signalCollector) signalCollector.recordViewEvent('screen_transition', {
    screen: 'results',
    content_snapshot: { stars: stars, avg_time: avgDisplay },
    components: { progress: { current: gameState.totalRounds, total: gameState.totalRounds } },
    metadata: { trigger: 'user_action', transition_from: 'gameplay' }
  });

  /* Victory audio: SFX -> VO sequential */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.sound.play('sound_game_victory', {
        sticker: { image: stickerUrls[stars] || stickerUrls[1], duration: 5, type: 'IMAGE_GIF' }
      });
      await FeedbackManager.playDynamicFeedback({
        audio_content: stars === 3 ? 'Amazing! Super fast!' : stars === 2 ? 'Great job! You completed all rounds!' : 'Well done! Try again for a faster time!',
        subtitle: stars === 3 ? 'Super fast!' : stars === 2 ? 'Great job!' : 'Well done!',
        sticker: { image: stickerUrls[stars] || stickerUrls[1], duration: 3, type: 'IMAGE_GIF' }
      });
    }
  } catch (e) { console.error('Victory audio error:', e.message); }
}

/* ============================================================
   RESTART GAME
   ============================================================ */
function restartGame() {
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.stopAll(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.stopAll(); } catch(e) {}

  var sessionId = 'session_' + Date.now();
  var studentId = null;
  if (typeof window.gameVariableState !== 'undefined' && window.gameVariableState) {
    sessionId = window.gameVariableState.sessionId || sessionId;
    studentId = window.gameVariableState.studentId || null;
  }

  signalCollector = new SignalCollector({
    sessionId: sessionId,
    studentId: studentId,
    gameId: gameState.gameId || null,
    contentSetId: gameState.contentSetId || null
  });
  window.signalCollector = signalCollector;

  if (gameState.signalConfig && gameState.signalConfig.flushUrl) {
    signalCollector.flushUrl = gameState.signalConfig.flushUrl;
    signalCollector.playId = gameState.signalConfig.playId || null;
    signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId;
    signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  window.gameState.phase = 'start_screen';
  window.gameState.currentRound = 0;
  window.gameState.score = 0;
  window.gameState.attempts = [];
  window.gameState.events = [];
  window.gameState.isActive = true;
  window.gameState.gameEnded = false;
  window.gameState.startTime = Date.now();
  window.gameState.lives = 0;
  window.gameState.currentLevel = 1;
  window.gameState.roundTimes = [];
  window.gameState.roundStartTime = null;
  window.gameState.isProcessing = false;
  window.gameState.streak = 0;
  window.gameState.consecutiveWrongs = 0;
  window.gameState.correctAnswer = null;
  resetGrid();
  window.gameState.duration_data = {
    startTime: new Date().toISOString(),
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  };

  syncDOMState();

  /* Re-create timer */
  timer = new TimerComponent('timer-container', {
    timerType: 'increase',
    format: 'min',
    startTime: 0,
    endTime: 100000,
    autoStart: false,
    onEnd: function() {}
  });

  /* Re-create visibility tracker */
  visibilityTracker = new VisibilityTracker({
    onInactive: onInactiveHandler,
    onResume: onResumeHandler,
    popupProps: { title: 'Game Paused', description: 'Click Resume to continue.', primaryText: 'Resume' }
  });

  createProgressBar();
  if (progressBar) progressBar.update(0, gameState.lives);

  trackEvent('game_start', 'game', { totalRounds: gameState.totalRounds });

  showWelcomeScreen();
}

/* ============================================================
   SETUP GAME
   ============================================================ */
function setupGame() {
  if (!gameState.content) {
    gameState.content = fallbackContent;
  }

  gameState.totalRounds = gameState.content.rounds.length;
  gameState.startTime = Date.now();
  gameState.isActive = true;
  gameState.gameEnded = false;
  gameState.currentRound = 0;
  gameState.score = 0;
  gameState.attempts = [];
  gameState.events = [];
  gameState.lives = 0;
  gameState.currentLevel = 1;
  gameState.roundTimes = [];
  gameState.roundStartTime = null;
  gameState.isProcessing = false;
  gameState.streak = 0;
  gameState.consecutiveWrongs = 0;
  resetGrid();
  gameState.duration_data.startTime = new Date().toISOString();

  syncDOMState();

  createProgressBar();
  if (progressBar) progressBar.update(0, gameState.lives);

  trackEvent('game_start', 'game', { totalRounds: gameState.totalRounds });

  updateInstructions();
  showWelcomeScreen();
}

/* === handlePostMessage (PART-008) === */
function handlePostMessage(event) {
  if (!event.data || event.data.type !== 'game_init') return;

  gameState.phase = 'playing';
  syncDOMState();

  var d = event.data.data || event.data;
  if (d.content) gameState.content = d.content;

  var sc = gameState.signalConfig = d.signalConfig || {};
  if (signalCollector && sc.flushUrl) {
    signalCollector.flushUrl = sc.flushUrl;
    signalCollector.playId = sc.playId || null;
    signalCollector.gameId = sc.gameId || signalCollector.gameId;
    signalCollector.sessionId = sc.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = sc.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = sc.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  setupGame();
}

/* === updateInstructions === */
function updateInstructions() {
  var slot = document.getElementById('mathai-question-slot');
  if (!slot) return;
  slot.innerHTML =
    '<div class="instruction-area">' +
      '<p class="instruction-text">Tap cells to toggle them on or off.</p>' +
      '<p class="instruction-text instruction-sub">Match the target pattern shown above.</p>' +
    '</div>';
}

/* === Visibility handlers (PART-005) === */
function onInactiveHandler() {
  gameState.duration_data.inActiveTime.push({ start: Date.now() });
  if (signalCollector) {
    signalCollector.pause();
    signalCollector.recordCustomEvent('visibility_hidden', {});
  }
  if (timer) timer.pause({ fromVisibilityTracker: true });
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.pause(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.pauseAll(); } catch(e) {}
  trackEvent('game_paused', 'system');
}

function onResumeHandler() {
  var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
  if (lastInactive && !lastInactive.end) {
    lastInactive.end = Date.now();
    gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
  }
  if (signalCollector) {
    signalCollector.resume();
    signalCollector.recordCustomEvent('visibility_visible', {});
  }
  if (timer && timer.isPaused) timer.resume({ fromVisibilityTracker: true });
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.resume(); } catch(e) {}
  try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.resumeAll(); } catch(e) {}
  trackEvent('game_resumed', 'system');
}

/* ============================================================
   DEBUG FUNCTIONS (PART-012)
   ============================================================ */
window.debugGame = function() {
  console.log('Game State:', JSON.stringify(gameState, null, 2));
};

  try {
    if (typeof FeedbackManager !== 'undefined') {
      console.log('Audio State:', JSON.stringify({
        sound: FeedbackManager.sound.getState(),
        stream: FeedbackManager.stream.getState()
      }, null, 2));
    }

};

window.testAudio = async function(id) {
  console.log('Testing audio:', id);
  try { if (typeof FeedbackManager !== 'undefined') await FeedbackManager.sound.play(id); }
  catch (e) { console.error('Audio test failed:', e.message); }
};

window.testPause = function() {
  if (visibilityTracker) {
    visibilityTracker.triggerInactive();
  } else {
    if (timer) timer.pause();
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.pause(); } catch(e) {}
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.pauseAll(); } catch(e) {}
  }
  console.log('testPause triggered');
};

window.testResume = function() {
  if (visibilityTracker) {
    visibilityTracker.triggerResume();
  } else {
    if (timer && timer.isPaused) timer.resume();
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.sound.resume(); } catch(e) {}
    try { if (typeof FeedbackManager !== 'undefined') FeedbackManager.stream.resumeAll(); } catch(e) {}
  }
  console.log('testResume triggered');
};

window.verifySentry = function() {
  var checks = {
    sdkLoaded: typeof Sentry !== 'undefined',
    configLoaded: typeof SentryConfig !== 'undefined',
    initialized: typeof Sentry !== 'undefined' && Sentry.getClient() !== undefined
  };
  console.log('Sentry Status:', JSON.stringify(checks, null, 2));
  return checks;
};

window.testSentry = function() {
  try {
    throw new Error('Test error from testSentry()');
  } catch (error) {
    if (typeof Sentry !== 'undefined') Sentry.captureException(error, { tags: { test: true } });
    console.log('Test error sent to Sentry.');
  }
};

window.loadRound = function(n) {
  gameState.currentRound = n - 1;
  gameState.isActive = true;
  gameState.gameEnded = false;
  gameState.isProcessing = false;
  startRound();
};

/* ============================================================
   DOMContentLoaded (PART-004)
   ============================================================ */
window.addEventListener('DOMContentLoaded', async function() {
  try {
    await waitForPackages();
  } catch (e) {
    console.error('Package load failed, continuing after 2s fallback:', e.message);
    await new Promise(function(resolve) { setTimeout(resolve, 2000); });
  }

  try {
    if (typeof FeedbackManager !== 'undefined') await FeedbackManager.init();
  } catch (e) { console.error('FeedbackManager init error:', e.message); }

  var sessionId = 'session_' + Date.now();
  var studentId = null;
  if (typeof window.gameVariableState !== 'undefined' && window.gameVariableState) {
    sessionId = window.gameVariableState.sessionId || sessionId;
    studentId = window.gameVariableState.studentId || null;
  }

  try {
    signalCollector = new SignalCollector({
      sessionId: sessionId,
      studentId: studentId,
      gameId: gameState.gameId || null,
      contentSetId: gameState.contentSetId || null
    });
    window.signalCollector = signalCollector;
  } catch (e) { console.error('SignalCollector init error:', e.message); }

  try {
    ScreenLayout.inject('app', {
      sections: {
        header: true,
        questionText: true,
        progressBar: true,
        playArea: true,
        transitionScreen: true
      },
      styles: {
        header: { background: 'var(--mathai-white, #ffffff)' },
        questionText: { padding: '16px 20px', maxWidth: '600px', marginLeft: 'auto', marginRight: 'auto', width: '100%' },
        progressBar: { padding: '0 20px', maxWidth: '600px', marginLeft: 'auto', marginRight: 'auto', marginTop: '8px', width: '100%' }
      }
    });
  } catch (e) { console.error('ScreenLayout error:', e.message); }

  var headerSlot = document.getElementById('mathai-header-slot');
  if (headerSlot) {
    headerSlot.innerHTML = '<div id="timer-container" style="display:flex;justify-content:center;align-items:center;padding:8px 0;"></div>';
  }

  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) {
    gameContentEl.innerHTML =
      '<div class="game-play-area">' +
        '<div class="target-grid-wrapper" data-signal-id="target-grid-wrapper">' +
          '<div class="section-label">Target Pattern</div>' +
          '<div class="target-grid" id="target-grid"></div>' +
        '</div>' +
        '<div class="interactive-grid-wrapper" data-signal-id="interactive-grid-wrapper">' +
          '<div class="section-label">Your Grid</div>' +
          '<div class="interactive-grid" id="interactive-grid" data-signal-id="interactive-grid"></div>' +
          '<div class="status-text" id="status-text"></div>' +
        '</div>' +
      '</div>';
  }

  try {
    timer = new TimerComponent('timer-container', {
      timerType: 'increase',
      format: 'min',
      startTime: 0,
      endTime: 100000,
      autoStart: false,
      onEnd: function() {}
    });
  } catch (e) { console.error('Timer init error:', e.message); }

  try {
    var interactionManager = new InteractionManager({
      selector: '.interactive-grid',
      disableOnAudioFeedback: false,
      disableOnEvaluation: true
    });
    window.interactionManager = interactionManager;
  } catch (e) { console.error('InteractionManager init error:', e.message); }

  try {
    visibilityTracker = new VisibilityTracker({
      onInactive: onInactiveHandler,
      onResume: onResumeHandler,
      popupProps: {
        title: 'Game Paused',
        description: 'Click Resume to continue.',
        primaryText: 'Resume'
      }
    });
  } catch (e) { console.error('VisibilityTracker init error:', e.message); }

  createProgressBar();

  try {
    transitionScreen = new TransitionScreenComponent({ autoInject: true });
  } catch (e) { console.error('TransitionScreen init error:', e.message); }

  try {
    if (typeof FeedbackManager !== 'undefined') {
      await FeedbackManager.sound.preload([
        { id: 'sound_correct', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
        { id: 'sound_game_victory', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
        { id: 'vo_game_start', url: 'https://cdn.mathai.ai/mathai-assets/dev/worksheet/audio/abfbe256-6b2a-4aa1-9cd7-bae00a464ca7.mp3' }
      ]);
    }
  } catch (e) { console.error('Sound preload error:', e.message); }

  window.addEventListener('message', handlePostMessage);

  window.parent.postMessage({ type: 'game_ready' }, '*');

  setupGame();
});

/* === Standalone fallback: auto-start if not started after 5s === */
setTimeout(function() {
  if (!gameState.isActive && !gameState.gameEnded) {
    startGame();
  }
}, 5000);
