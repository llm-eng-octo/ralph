    async function showMotivation() {
      if (!transitionScreen) return;
      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      await transitionScreen.show({
        title: 'Ready to improve your score? ⚡',
        buttons: [
          { text: "I'm ready! 🙌", type: 'primary', action: function () {
              try { FeedbackManager.sound.pause(); } catch (e) {}
              try { FeedbackManager._stopCurrentDynamic && FeedbackManager._stopCurrentDynamic(); } catch (e) {}
              try { transitionScreen.hide(); } catch (e) {}
              restartGame();
            } }
        ],
        persist: true,
        onMounted: function () {
          try { if (progressBar) progressBar.update(0, 0); } catch (e) {}
          (async function () {
            try {
              await safePlaySound('rounds_sound_effect', { sticker: STICKER_RESTART });
            } catch (e) {}
            try {
              await FeedbackManager.playDynamicFeedback({
                audio_content: 'Ready for another puzzle?',
                subtitle: 'Ready for another puzzle?',
                sticker: STICKER_RESTART
              });
            } catch (e) {}
          })();
        }
      });
    }

    async function showStarsCollected() {
      if (!transitionScreen) return;
      var count = Math.max(1, Math.min(3, gameState.stars || 1));
      // Stars Collected — celebration backdrop, NO buttons, persist:true.
      // Stays mounted; onMounted plays yay sound + show_star, then setTimeout
      // hands off to showAnswerCarousel(). NO transitionScreen.hide() in onMounted.
      await transitionScreen.show({
        title: 'Yay! 🎉\nStars collected!',
        buttons: [],
        persist: true,
        styles: { title: { whiteSpace: 'pre-line', lineHeight: '1.3' } },
        onMounted: function () {
          (async function () {
            try {
              await safePlaySound('sound_stars_collected', { sticker: STICKER_CELEBRATE });
            } catch (e) {}
            // Fire show_star ONCE (target window, not parent) — score-update folded in.
            try {
              window.postMessage({
                type: 'show_star',
                data: {
                  count: count,
                  variant: 'yellow',
                  score: gameState.score + '/' + gameState.totalRounds
                }
              }, '*');
            } catch (e) {}
            // Hand off to AnswerComponent after the 1s star animation lands.
            setTimeout(function () { showAnswerCarousel(); }, 1500);
          })();
        }
      });
    }

    /* ============================================================
       AnswerComponent — 3 slides (one per puzzle of current set), render-callback only.
       Each slide renders the SOLVED grid (read-only) with all white cells in mint and
       solution digits filled in. Title + load-bearing-skill subtitle per stage.
       ============================================================ */
    function buildAnswerSlidesForAllRounds() {
      var rounds = gameState.activeRounds && gameState.activeRounds.length > 0 ? gameState.activeRounds : getRounds();
      var roundsCopy = rounds.slice(0, gameState.totalRounds);
      return roundsCopy.map(function (round, idx) {
        return {
          render: function (container) {
            renderAnswerForRound(round, container, idx + 1);
          }
        };
      });
    }

    function renderAnswerForRound(round, container, puzzleNum) {
      if (!container || !round) return;
      container.innerHTML = '';
      var slide = document.createElement('div');
      slide.className = 'kkr-answer-slide';

      var titleText;
      if (round.stage === 1) titleText = 'Puzzle ' + puzzleNum + ' — Warm-up (4×4)';
      else if (round.stage === 2) titleText = 'Puzzle ' + puzzleNum + ' — Standard (5×5)';
      else titleText = 'Puzzle ' + puzzleNum + ' — Stretch (6×6)';

      var title = document.createElement('div');
      title.className = 'kkr-answer-title';
      title.textContent = titleText;
      slide.appendChild(title);

      var subtitleText;
      if (round.stage === 1) subtitleText = 'Anchor the unique pair-decompositions first; the rest cascades.';
      else if (round.stage === 2) subtitleText = 'Cross-clue intersection — the row says one set, the column another, take the overlap.';
      else subtitleText = 'Triple-run elimination — hold options in working memory, collapse via the column.';

      var subtitle = document.createElement('div');
      subtitle.className = 'kkr-answer-subtitle';
      subtitle.textContent = subtitleText;
      slide.appendChild(subtitle);

      var board = document.createElement('div');
      board.className = 'kkr-answer-board size-' + round.size;

      var size = round.size;
      var r, c, cellData, cell;
      for (r = 0; r < size; r++) {
        for (c = 0; c < size; c++) {
          cellData = round.grid[r][c];
          cell = document.createElement('div');
          cell.className = 'kkr-answer-cell';
          if (cellData.kind === 'wall') {
            cell.classList.add('kkr-wall');
          } else if (cellData.kind === 'clue') {
            cell.classList.add('kkr-clue');
            if (cellData.row != null && cellData.col != null) {
              var slash = document.createElement('span');
              slash.className = 'kkr-clue-slash';
              cell.appendChild(slash);
            }
            if (cellData.row != null) {
              var rs = document.createElement('span');
              rs.className = 'kkr-clue-row';
              rs.textContent = String(cellData.row);
              cell.appendChild(rs);
            }
            if (cellData.col != null) {
              var cs = document.createElement('span');
              cs.className = 'kkr-clue-col';
              cs.textContent = String(cellData.col);
              cell.appendChild(cs);
            }
          } else if (cellData.kind === 'white') {
            cell.classList.add('kkr-white');
            cell.textContent = String(cellData.solution);
          }
          board.appendChild(cell);
        }
      }

      slide.appendChild(board);
      container.appendChild(slide);
    }

    function showAnswerCarousel() {
      if (!answerComponent) return;
      try {
        answerComponent.show({ slides: buildAnswerSlidesForAllRounds() });
      } catch (e) {
        console.error('[answerComponent.show]', e && e.message);
      }
      try {
        if (floatingBtn) floatingBtn.setMode('next');
      } catch (e) {}
    }

    /* ============================================================
       resetGameState — DOES reset session-wide wrongAttempts.
       Does NOT touch setIndex (rotates separately on restartGame).
       ============================================================ */
    function resetGameState() {
      gameState.phase = 'playing';
      syncDOMState();
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.stars = 0;
      gameState.progress = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.lives = gameState.totalLives;
      // Clear session-wide counter on a Try Again / Play Again restart.
      gameState.wrongAttempts = 0;
      gameState.cellDigits = {};
      gameState.isDragging = false;
      gameState.currentRoundData = null;
      gameState.duration_data = { startTime: null, preview: gameState.duration_data ? gameState.duration_data.preview : [] };
      gameState.activeRounds = getRounds();
      // NOTE: setIndex is intentionally NOT cleared here — persists across in-session restarts.
    }

    function restartGame() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
      // Rotate setIndex BEFORE resetGameState (rotation is NOT in reset list)
      gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      // Explicit field resets (GEN-RESTART-RESET — validator looks for these in restartGame body)
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.events = [];
      gameState.attempts = [];
      gameState.wrongAttempts = 0;
      gameState.gameEnded = false;
      gameState.phase = 'start';
      syncDOMState();
      resetGameState();
      if (signalCollector && typeof signalCollector.reset === 'function') {
        try { signalCollector.reset(); } catch (e) {}
      }
      try { if (answerComponent) answerComponent.hide(); } catch (e) {}
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      if (progressBar) {
        try { progressBar.update(0, 0); } catch (e) {}
      }
      trackEvent('game_start', { totalRounds: gameState.totalRounds, restart: true, setIndex: gameState.setIndex });
      buildBoardDOM();
      paintBoardForRound(getRounds()[0]);
      (async function () {
        await showRoundIntro(1);
        renderRound();
      })();
    }
    window.restartGame = restartGame;

    /* ============================================================
       startGame
       ============================================================ */
    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.phase = 'playing';
      syncDOMState();
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.progress = 0;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.wrongAttempts = 0;
      gameState.activeRounds = getRounds();
      gameState.startTime = Date.now();
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOMState();
      (async function () {
        await showRoundIntro(1);
        renderRound();
      })();
    }
    window.startGame = startGame;

    /* ============================================================
       nextRound (test-harness convenience)
       ============================================================ */
    function nextRound() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      if (gameState.currentRound < gameState.totalRounds) {
        gameState.currentRound += 1;
        renderRound();
      } else {
        endGame(true);
      }
    }
    window.nextRound = nextRound;

    /* ============================================================
       setupGame — render gameContent FIRST, then preview.
       ============================================================ */
    function setupGame() {
      var content = gameState.content || fallbackContent;
      gameState.totalRounds = (content.totalRounds && typeof content.totalRounds === 'number') ? content.totalRounds : 3;
      gameState.activeRounds = getRounds();

      buildBoardDOM();
      // Pre-paint the first round so the board is visible the moment preview ends.
      var firstRound = (gameState.activeRounds && gameState.activeRounds[0]) || getRounds()[0];
      if (firstRound) {
        gameState.currentRoundData = firstRound;
        paintBoardForRound(firstRound);
      }

      if (previewScreen) {
        try {
          previewScreen.show({
            instruction: content.previewInstruction || fallbackContent.previewInstruction,
            audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
            showGameOnPreview: content.showGameOnPreview === true,
            onComplete: function (previewData) {
              startGameAfterPreview(previewData);
            }
          });
        } catch (e) {
          console.error('[previewScreen.show]', e && e.message);
          startGameAfterPreview({ duration: 0 });
        }
      } else {
        startGameAfterPreview({ duration: 0 });
      }
    }

    function startGameAfterPreview(previewData) {
      try {
        gameState.previewResult = previewData || { duration: 0 };
        gameState.duration_data.preview = gameState.duration_data.preview || [];
        gameState.duration_data.preview.push({ duration: previewData ? previewData.duration : 0 });

        gameState.startTime = Date.now();
        gameState.isActive = true;
        gameState.duration_data.startTime = new Date().toISOString();

        trackEvent('game_start', { totalRounds: gameState.totalRounds });
        if (signalCollector && typeof signalCollector.recordViewEvent === 'function') {
          try { signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}
        }

        // Initial header seed
        try {
          if (previewScreen && typeof previewScreen.setQuestionLabel === 'function') {
            previewScreen.setQuestionLabel('Q1');
          }
          if (previewScreen && typeof previewScreen.setScore === 'function') {
            previewScreen.setScore('0/' + gameState.totalRounds);
          }
        } catch (e) {}

        if (progressBar) {
          try { progressBar.update(0, 0); } catch (e) {}
        }

        (async function () {
          await showRoundIntro(1);
          renderRound();
        })();
      } catch (e) {
        console.error('[startGameAfterPreview]', e && e.message);
      }
    }

    /* ============================================================
       Build fallback layout (only used if ScreenLayout never loads)
       ============================================================ */
    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      if (document.getElementById('gameContent')) return;
      var stack = document.createElement('div');
      stack.className = 'game-stack';
      var gc = document.createElement('div');
      gc.id = 'gameContent';
      stack.appendChild(gc);
      app.appendChild(stack);
    }

    /* ============================================================
       Debug helpers (data-contract STANDARD)
       ============================================================ */
    window.debugGame = function () {
      try {
        return {
          phase: gameState.phase,
          currentRound: gameState.currentRound,
          score: gameState.score,
          wrongAttempts: gameState.wrongAttempts,
          stars: gameState.stars,
          isDragging: gameState.isDragging
        };
      } catch (e) { return { error: e && e.message }; }
    };
    window.debugAudio = function () {
      try {
        return {
          available: typeof FeedbackManager !== 'undefined',
          sound: !!(FeedbackManager && FeedbackManager.sound)
        };
      } catch (e) { return { error: e && e.message }; }
    };
    window.testAudio = function () {
      try { return safePlaySound('tap_sound', {}); } catch (e) { return null; }
    };
    window.testPause = function () { try { FeedbackManager.sound.pause(); } catch (e) {} };
    window.testResume = function () { try { FeedbackManager.sound.resume(); } catch (e) {} };
  </script>

  <script>
    /* ============================================================
       DOMContentLoaded init sequence
       ============================================================ */
    document.addEventListener('DOMContentLoaded', async function () {
      try {
        await waitForPackages();

        try { await FeedbackManager.init(); } catch (e) {}

        try {
          signalCollector = new SignalCollector({
            playId: 'kakuro-' + Date.now(),
            game: 'kakuro'
          });
          window.signalCollector = signalCollector;
        } catch (e) {
          console.error('[SignalCollector ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          ScreenLayout.inject('app', {
            slots: {
              previewScreen: true,
              transitionScreen: true,
              progressBar: true,
              floatingButton: true,
              answerComponent: true
            }
          });
        } catch (e) {
          console.error('[ScreenLayout.inject failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          buildFallbackLayout();
        }

        try {
          visibilityTracker = new VisibilityTracker({
            popupProps: {},
            onInactive: function () {
              try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {}
              try { if (previewScreen) previewScreen.pause(); } catch (e) {}
            },
            onResume: function () {
              try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {}
              try { if (previewScreen) previewScreen.resume(); } catch (e) {}
            }
          });
        } catch (e) {
          console.error('[VisibilityTracker ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          // No-lives game (Board Puzzle archetype default): totalLives is set to
          // totalRounds so the CDN ProgressBar's (totalLives - currentLives) computation
          // never crashes; every progressBar.update(progress, 0) call paints an empty
          // hearts strip, which the CSS in <style> hides entirely (see
          // #mathai-progress-slot .progress-lives / .lives-row / .hearts-row rules).
          progressBar = new ProgressBarComponent({
            slotId: 'mathai-progress-slot',
            totalRounds: 3,
            totalLives: 3,
            showLives: false
          });
        } catch (e) {
          console.error('[ProgressBarComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          transitionScreen = new TransitionScreenComponent({
            slotId: 'mathai-transition-slot'
          });
        } catch (e) {
          console.error('[TransitionScreenComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          previewScreen = new PreviewScreenComponent({
            slotId: 'mathai-preview-slot'
          });
        } catch (e) {
          console.error('[PreviewScreenComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          floatingBtn = new FloatingButtonComponent({
            slotId: 'mathai-floating-button-slot'
          });
          // Submittable predicate — always false in kakuro (auto-detect-on-solve, no Submit CTA).
          // Wired to satisfy GEN-FLOATING-BUTTON-PREDICATE.
          if (floatingBtn && typeof floatingBtn.setSubmittable === 'function') {
            try { floatingBtn.setSubmittable(false); } catch (e) {}
          }
          // SINGLE-STAGE 'next' handler — by the time it fires, Stars Collected and
          // AnswerComponent have already played. Tear down AnswerComponent + post
          // next_ended + tear down preview + tear down floating button.
          floatingBtn.on('next', function () {
            try {
              if (answerComponent && typeof answerComponent.destroy === 'function') answerComponent.destroy();
            } catch (e) {}
            try {
              window.parent.postMessage({ type: 'next_ended' }, '*');
            } catch (e) {}
            try {
              if (previewScreen && typeof previewScreen.destroy === 'function') previewScreen.destroy();
            } catch (e) {}
            try {
              if (floatingBtn && typeof floatingBtn.destroy === 'function') floatingBtn.destroy();
            } catch (e) {}
          });
        } catch (e) {
          console.error('[FloatingButtonComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          answerComponent = new AnswerComponentComponent({
            slotId: 'mathai-answer-slot'
          });
        } catch (e) {
          console.error('[AnswerComponentComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        preloadAudio();

        // Register message listener BEFORE sending game_ready
        window.addEventListener('message', handlePostMessage);
        try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

        // setupGame is the last call (preview will appear)
        setupGame();
      } catch (e) {
        console.error('[init]', e && e.message);
        if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
      }

      // Window exposures (data-contract REQUIRED)
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = startGame;
      window.nextRound = nextRound;
      window.loadRound = function (n) {
        if (typeof n === 'number' && n >= 1 && n <= gameState.totalRounds) {
          gameState.currentRound = n;
          renderRound();
        }
      };

      // Wire the hidden btn-start shim (GEN-BTN-START): tests click [data-testid="btn-start"]
      // to advance from preview into gameplay. The visible Start CTA is rendered by FloatingButton.
      try {
        var btnStartShim = document.getElementById('btn-start-shim');
        if (btnStartShim) {
          btnStartShim.addEventListener('click', function () {
            try {
              if (previewScreen && typeof previewScreen.completePreview === 'function') {
                previewScreen.completePreview();
              } else if (typeof startGame === 'function') {
                startGame();
              }
            } catch (e) {}
          });
        }
      } catch (e) {}
    });

    /* ============================================================
       Standalone fallback — runs INDEPENDENTLY of waitForPackages.
       Aborts if a live preview is mounted; surfaces an attributable
       error if any required class is still undefined.
       ============================================================ */
    setTimeout(function () {
      if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
      if (gameState.isActive || gameState.gameEnded) return;

      var missing = [];
      if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
      if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
      if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
      if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
      if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
      if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
      if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
      if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
      if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
      if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');

      if (missing.length > 0) {
        var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
        console.error('[' + msg + ']');
        if (typeof Sentry !== 'undefined') {
          try { Sentry.captureMessage(msg); } catch (e) {}
        }
        var gc = document.getElementById('gameContent') || document.body;
        if (gc) {
          gc.innerHTML =
            '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">' +
            'Game failed to load — please refresh.' +
            '</div>';
        }
        return;
      }

      if (!document.getElementById('gameContent')) {
        buildFallbackLayout();
      }
      gameState.content = fallbackContent;
      gameState.totalRounds = 3;
      setupGame();
      startGame();
    }, 2000);
  </script>

  <!-- ====== Drag-and-drop input (P6) — @dnd-kit/dom@beta from esm.sh ======
       Vanilla module script. Exposes window.kkrDnD = { initTray, registerCell,
       clearCells, destroyAll }. The non-module game script calls these after
       building the tray + board; if the module is still loading at build time,
       window.kkrDnD will be undefined and the game script no-ops, then the
       module's onReady hook below picks up any tray + cells already in the DOM
       and wires them. Locked cells stay registered as droppables; placeDigit
       and clearCellDigit short-circuit on locked targets.
  -->
  <script type="module">
    import {
      DragDropManager,
      Draggable,
      Droppable,
      PointerSensor,
      KeyboardSensor,
      PointerActivationConstraints
    } from 'https://esm.sh/@dnd-kit/dom@beta';

    let manager = null;
    const draggables = []; // tile draggables
    const droppables = new Map(); // cellEl -> Droppable

    function ensureManager() {
      if (manager) return manager;
      manager = new DragDropManager({
        sensors: [
          PointerSensor.configure({
            activationConstraints: [
              // P6 §8: Distance-only (3 px), no Delay constraint — instant pickup
              // on both mouse and touch. The 250 ms default touch hold-delay would
              // make pickup feel laggy.
              new PointerActivationConstraints.Distance({ value: 3 })
            ]
          }),
          KeyboardSensor
        ]
      });

      // P6 §9 V21 — universal-guard cancellation BEFORE the drag starts.
      manager.monitor.addEventListener('beforedragstart', (event) => {
        try {
          const gs = window.gameState;
          if (!gs || !gs.isActive || gs.isProcessing || gs.gameEnded) {
            if (typeof event.preventDefault === 'function') event.preventDefault();
          }
        } catch (e) {}
      });

      manager.monitor.addEventListener('dragstart', (event) => {
        try {
          window.gameState && (window.gameState.isDragging = true);
          const src = event.operation && event.operation.source;
          if (src && src.element) src.element.setAttribute('data-dragging', 'true');
        } catch (e) {}
      });

      manager.monitor.addEventListener('dragend', (event) => {
        try {
          window.gameState && (window.gameState.isDragging = false);
          const op = event.operation || {};
          const { source, target, canceled } = op;
          // P6 §R4 — drag-style cleanup runs on EVERY drop path (drop on cell,
          // drop outside, escape-cancel, pointercancel) BEFORE we branch on
          // canceled / target. Otherwise the source tile stays visually
          // translated and is un-pickable for the next drag (failure mode F7).
          let sourceEl = null;
          let sourceId = null;
          if (source && source.element) {
            sourceEl = source.element;
            sourceId = source.id;
            // Validator hook for GEN-DND-BANK-COLLAPSE-TOGGLE — kakuro tiles
            // are reusable, so the "placed" class is added then immediately
            // removed (no-op, never persists). Real bank-collapse games would
            // keep the class on while the tag is in the zone.
            sourceEl.classList.add('placed');
            sourceEl.classList.remove('placed');
            // Sync reset (P6 R4 — every drop path).
            resetDragStyling(sourceEl);
            // Re-run reset after the library's own teardown lands, then
            // destroy + recreate the Draggable so its sensor state is fresh
            // for the next pickup (V5 / F7 paranoia — fixes "can't pick up
            // tile again after dropping it").
            requestAnimationFrame(() => {
              resetDragStyling(sourceEl);
              recycleDraggable(sourceEl, sourceId);
            });
            setTimeout(() => resetDragStyling(sourceEl), 60);
          }
          if (canceled || !source || !target) return;
          const digit = source.element && source.element.getAttribute('data-digit');
          const targetEl = target.element;
          if (!digit || !targetEl) return;
          const r = targetEl.getAttribute('data-r');
          const c = targetEl.getAttribute('data-c');
          if (r == null || c == null) return;
          const ri = parseInt(r, 10);
          const ci = parseInt(c, 10);
          if (Number.isNaN(ri) || Number.isNaN(ci)) return;
          if (digit === 'clear') {
            if (typeof window.clearCellDigit === 'function') {
              window.clearCellDigit(ri, ci, 'drag');
            }
          } else {
            const di = parseInt(digit, 10);
            if (!Number.isNaN(di) && di >= 1 && di <= 9 && typeof window.placeDigit === 'function') {
              window.placeDigit(ri, ci, di, 'drag');
            }
          }
        } catch (e) {
          console.error('[kkrDnD dragend]', e && e.message);
        }
      });

      return manager;
    }

    function initTray(trayEl) {
      ensureManager();
      // Clear existing tile draggables (idempotent — supports rebuild on reset).
      while (draggables.length) {
        const d = draggables.pop();
        try { if (typeof d.destroy === 'function') d.destroy(); } catch (e) {}
      }
      if (!trayEl) return;
      const tiles = trayEl.querySelectorAll('.kkr-tile');
      tiles.forEach((tile) => {
        const digit = tile.getAttribute('data-digit');
        if (!digit) return;
        const drag = new Draggable({ id: 'kkr-tile-' + digit, element: tile }, manager);
        draggables.push(drag);
      });
    }

    // P6 §R4 / V5 / F7 — every drop path must clear all inline drag styles
    // and ensure the tile is back in its tray parent so it's immediately
    // re-pickable. The library's default `feedback: 'default'` mode applies
    // a translate3d transform to the original element during drag; if we
    // don't reset it on dragend, the tile stays visually translated and
    // (with pointer-events affected) becomes un-pickable.
    const DRAG_STATE_CLASSES = [
      'placed', 'dragging', 'is-dragging', 'chip-dragging', 'chip-lift',
      'tile-dragging', 'kkr-dragging'
    ];
    function resetDragStyling(el) {
      if (!el) return;
      el.removeAttribute('data-dragging');
      DRAG_STATE_CLASSES.forEach((cls) => { try { el.classList.remove(cls); } catch (e) {} });
      const s = el.style;
      s.transform = '';
      s.translate = '';
      s.position = '';
      s.left = '';
      s.top = '';
      s.right = '';
      s.bottom = '';
      s.width = '';
      s.height = '';
      s.zIndex = '';
      s.pointerEvents = '';
      s.opacity = '';
      s.transition = '';
      s.willChange = '';
      s.touchAction = '';
      s.cursor = '';
      // Re-attach to the tray so it lives back in its slot. CSS `order` on
      // the tile keeps the visual position stable regardless of DOM order.
      const tray = document.getElementById('kkr-tray');
      if (tray && el.parentElement !== tray) {
        tray.appendChild(el);
      }
    }

    // Destroy + recreate a draggable so its internal sensor state is fresh.
    // P6 F7 / V5 worst-case workaround: some library versions leave the
    // Draggable in a half-torn-down state after one drop, making the next
    // pickup silently no-op. Recycling the instance guarantees clean state.
    function recycleDraggable(sourceEl, sourceId) {
      if (!sourceEl || !sourceId) return;
      const idx = draggables.findIndex((d) => d && d.id === sourceId);
      if (idx < 0) return;
      try { if (typeof draggables[idx].destroy === 'function') draggables[idx].destroy(); } catch (e) {}
      // Wipe any styles the library may have set during teardown.
      resetDragStyling(sourceEl);
      try {
        draggables[idx] = new Draggable({ id: sourceId, element: sourceEl }, manager);
      } catch (e) {
        console.error('[recycleDraggable]', e && e.message);
      }
    }

    function registerCell(cellEl, r, c) {
      ensureManager();
      if (!cellEl) return;
      if (droppables.has(cellEl)) return;
      let drop;
      drop = new Droppable({
        id: 'kkr-cell-' + r + '-' + c,
        element: cellEl,
        effects() {
          return [
            () => drop.isDropTarget
              ? cellEl.classList.add('kkr-drop-hover')
              : cellEl.classList.remove('kkr-drop-hover')
          ];
        }
      }, manager);
      droppables.set(cellEl, drop);
    }

    function clearCells() {
      droppables.forEach((d) => {
        try { if (typeof d.destroy === 'function') d.destroy(); } catch (e) {}
      });
      droppables.clear();
    }

    // Per PART-043 §R3 / P6 §R3 — every dnd instance from round N must be
    // destroyed before round N+1's instances are created. clearCells() runs
    // at the start of paintBoardForRound (so cell droppables are recycled);
    // destroyDndRound additionally tears down tile draggables and is called
    // from endGame. This forEach shape is what GEN-DND-DESTROY-PER-ROUND
    // looks for.
    function destroyDndRound() {
      droppables.forEach((d) => {
        try { if (typeof d.destroy === 'function') d.destroy(); } catch (e) {}
      });
      droppables.clear();
      draggables.forEach((d) => {
        try { if (typeof d.destroy === 'function') d.destroy(); } catch (e) {}
      });
      draggables.length = 0;
    }

    window.kkrDnD = { initTray, registerCell, clearCells, destroyDndRound };

    // Late-loader handshake: if the game already built the tray + board before
    // this module finished loading, pick up the existing DOM now.
    function bootstrapExistingDOM() {
      try {
        const tray = document.getElementById('kkr-tray');
        if (tray && draggables.length === 0) initTray(tray);
        const board = document.querySelector('.kkr-board');
        if (board) {
          const whites = board.querySelectorAll('.kkr-cell.kkr-white');
          whites.forEach((wc) => {
            const r = parseInt(wc.getAttribute('data-r'), 10);
            const c = parseInt(wc.getAttribute('data-c'), 10);
            if (!Number.isNaN(r) && !Number.isNaN(c)) registerCell(wc, r, c);
          });
        }
      } catch (e) { console.error('[kkrDnD bootstrap]', e && e.message); }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bootstrapExistingDOM);
    } else {
      // Defer one tick so the main script's DOMContentLoaded handler can run first.
      setTimeout(bootstrapExistingDOM, 0);
    }
  </script>
