    function renderBoardForRound(round) {
      clearBoard();
      var tableArea = document.getElementById('tableArea');
      if (!tableArea || !round) return;

      tableArea.className = 'table-area stage-' + round.stage;

      var surface = document.createElement('div');
      surface.className = 'table-surface';
      tableArea.appendChild(surface);

      if (STAGE_HAS_HEAD[round.stage]) {
        var headLbl = document.createElement('div');
        headLbl.className = 'table-head-label head';
        headLbl.textContent = 'HEAD';
        tableArea.appendChild(headLbl);
      }
      if (STAGE_HAS_FOOT[round.stage]) {
        var footLbl = document.createElement('div');
        footLbl.className = 'table-head-label foot';
        footLbl.textContent = 'FOOT';
        tableArea.appendChild(footLbl);
      }

      var positions = SEAT_POSITIONS[round.stage];
      var i;
      for (i = 0; i < round.seats.length; i++) {
        var seatNum = String(round.seats[i]);
        var pos = positions[seatNum];
        if (!pos) continue;
        var seat = document.createElement('div');
        seat.className = 'seat';
        seat.id = 'seat-' + seatNum;
        seat.style.left = pos.x + 'px';
        seat.style.top = pos.y + 'px';
        seat.setAttribute('data-seat', seatNum);
        var seatNumEl = document.createElement('div');
        seatNumEl.className = 'seat-num';
        seatNumEl.textContent = seatNum;
        seat.appendChild(seatNumEl);
        tableArea.appendChild(seat);
        seatEls[seatNum] = seat;
        seatChipWrap[seatNum] = seat;
      }

      var poolRow = document.getElementById('poolRow');
      var ci;
      for (ci = 0; ci < round.chips.length; ci++) {
        var c = round.chips[ci];
        var slot = document.createElement('div');
        slot.className = 'pool-slot';
        slot.id = 'pool-slot-' + c.id;
        slot.setAttribute('data-chip', c.id);
        var chipEl = document.createElement('div');
        chipEl.className = 'chip';
        chipEl.id = 'chip-' + c.id;
        chipEl.setAttribute('data-chip', c.id);
        var av = document.createElement('div');
        av.className = 'chip-avatar';
        av.textContent = c.avatar;
        chipEl.appendChild(av);
        var nm = document.createElement('div');
        nm.className = 'chip-name';
        nm.textContent = c.name;
        chipEl.appendChild(nm);
        slot.appendChild(chipEl);
        poolRow.appendChild(slot);
        poolSlotEls[c.id] = slot;
        chipEls[c.id] = chipEl;
      }
    }

    function renderClues(round) {
      var cluePanel = document.getElementById('cluePanel');
      if (!cluePanel || !round) return;
      cluePanel.innerHTML = '';
      var ol = document.createElement('ol');
      var i;
      for (i = 0; i < round.clues.length; i++) {
        var li = document.createElement('li');
        li.id = 'clue-' + i;
        li.setAttribute('data-clue-idx', String(i));
        var num = document.createElement('span');
        num.className = 'clue-num';
        num.textContent = (i + 1) + '.';
        var txt = document.createElement('span');
        txt.className = 'clue-text';
        txt.textContent = round.clues[i].text;
        li.appendChild(num);
        li.appendChild(txt);
        ol.appendChild(li);
      }
      cluePanel.appendChild(ol);
    }

    function renderStageLabel(round) {
      var lbl = document.getElementById('stageLabel');
      if (!lbl || !round) return;
      lbl.textContent = 'Puzzle ' + gameState.currentRound + ' of ' + gameState.totalRounds + ' • Stage ' + round.stage;
    }

    function clearFeedbackLine() {
      var fl = document.getElementById('feedbackLine');
      if (!fl) return;
      fl.textContent = '';
      fl.classList.remove('correct');
      fl.classList.remove('wrong');
    }

    function setFeedbackLine(text, kind) {
      var fl = document.getElementById('feedbackLine');
      if (!fl) return;
      fl.textContent = text || '';
      fl.classList.remove('correct');
      fl.classList.remove('wrong');
      if (kind === 'correct') fl.classList.add('correct');
      if (kind === 'wrong') fl.classList.add('wrong');
    }

    function clearAllSeatVisuals() {
      Object.keys(seatEls).forEach(function (k) {
        var s = seatEls[k];
        if (!s) return;
        s.classList.remove('drop-hover');
        s.classList.remove('flash-correct');
        s.classList.remove('glow-wrong');
      });
    }

    function clearViolatedClueMarkers() {
      var lis = document.querySelectorAll('#cluePanel li.violated');
      var i;
      for (i = 0; i < lis.length; i++) lis[i].classList.remove('violated');
    }

    /* ============================================================
       Place / unseat helpers (move chip DOM)
       ============================================================ */
    function placeChipInSeat(chipId, seatNum) {
      var chip = chipEls[chipId];
      var seat = seatChipWrap[String(seatNum)];
      if (!chip || !seat) return;
      seat.appendChild(chip);
      chip.classList.add('in-seat');
      chip.style.position = '';
      chip.style.left = '';
      chip.style.top = '';
      chip.style.transform = '';
      // Update placement / chipLocation
      gameState.placement[String(seatNum)] = chipId;
      gameState.chipLocation[chipId] = String(seatNum);
      seat.classList.add('filled');
      // Hide/empty source pool slot
      var slot = poolSlotEls[chipId];
      if (slot) slot.classList.add('empty');
    }

    function returnChipToPool(chipId) {
      var chip = chipEls[chipId];
      var slot = poolSlotEls[chipId];
      if (!chip || !slot) return;
      slot.appendChild(chip);
      slot.classList.remove('empty');
      chip.classList.remove('in-seat');
      chip.style.position = '';
      chip.style.left = '';
      chip.style.top = '';
      chip.style.transform = '';
      chip.style.width = '';
      chip.style.height = '';
      chip.style.zIndex = '';
      var prevSeat = gameState.chipLocation[chipId];
      if (prevSeat && prevSeat !== 'pool') {
        gameState.placement[prevSeat] = null;
        var seat = seatChipWrap[prevSeat];
        if (seat) seat.classList.remove('filled');
      }
      gameState.chipLocation[chipId] = 'pool';
    }

    function vacateSeat(seatNum) {
      var seat = seatChipWrap[String(seatNum)];
      if (seat) seat.classList.remove('filled');
      gameState.placement[String(seatNum)] = null;
    }

    function findChipForSeat(seatNum) {
      return gameState.placement[String(seatNum)] || null;
    }

    /* ============================================================
       dnd-kit: build / destroy per round
       ============================================================ */
    function destroyDndForRound() {
      try {
        var i;
        for (i = 0; i < dndDraggables.length; i++) {
          if (dndDraggables[i] && typeof dndDraggables[i].destroy === 'function') {
            try { dndDraggables[i].destroy(); } catch (e) {}
          }
        }
      } catch (e) {}
      try {
        var j;
        for (j = 0; j < dndDroppables.length; j++) {
          if (dndDroppables[j] && typeof dndDroppables[j].destroy === 'function') {
            try { dndDroppables[j].destroy(); } catch (e) {}
          }
        }
      } catch (e) {}
      dndDraggables = [];
      dndDroppables = [];
    }

    function buildDndForRound(round) {
      destroyDndForRound();
      if (!dndManager || !round) return;

      // Draggables: one per chip
      var i;
      for (i = 0; i < round.chips.length; i++) {
        var c = round.chips[i];
        var chipEl = chipEls[c.id];
        if (!chipEl) continue;
        try {
          var d = new window.DnDKit.Draggable({
            id: 'chip-' + c.id,
            element: chipEl,
            data: { chipId: c.id }
          }, dndManager);
          dndDraggables.push(d);
        } catch (e) {
          console.error('[Draggable ctor]', e && e.message);
        }
      }

      // Droppables: one per seat
      var k;
      for (k = 0; k < round.seats.length; k++) {
        var seatNum = String(round.seats[k]);
        var seatEl = seatEls[seatNum];
        if (!seatEl) continue;
        try {
          var dr = new window.DnDKit.Droppable({
            id: 'seat-' + seatNum,
            element: seatEl,
            data: { seatNum: seatNum, kind: 'seat' }
          }, dndManager);
          dndDroppables.push(dr);
        } catch (e) {
          console.error('[Droppable ctor seat]', e && e.message);
        }
      }

      // Pool tray itself is also a droppable (return-to-pool)
      var poolWrap = document.getElementById('poolWrap');
      if (poolWrap) {
        try {
          var pd = new window.DnDKit.Droppable({
            id: 'pool-tray',
            element: poolWrap,
            data: { kind: 'pool' }
          }, dndManager);
          dndDroppables.push(pd);
        } catch (e) {
          console.error('[Droppable ctor pool]', e && e.message);
        }
      }
    }

    function handleDragStart(event) {
      try {
        if (!gameState.isActive || gameState.isProcessing || gameState.gameEnded || gameState.awaitingNext) {
          if (event && typeof event.preventDefault === 'function') event.preventDefault();
          return;
        }
        var op = event && event.operation;
        if (op && op.source && op.source.element) {
          op.source.element.classList.add('dragging');
        }
      } catch (e) {}
    }

    function handleDragEnd(event) {
      try {
        var op = event && event.operation;
        if (!op) return;
        var src = op.source;
        var tgt = op.target;
        var canceled = op.canceled;
        if (src && src.element) src.element.classList.remove('dragging');

        if (!src || !src.data) return;
        var chipId = src.data.chipId;
        if (!chipId) return;
        var prevLoc = gameState.chipLocation[chipId] || 'pool';

        // Cancelled drop or no target → snap back
        if (canceled || !tgt || !tgt.data) {
          if (prevLoc === 'pool') {
            returnChipToPool(chipId);
          } else {
            placeChipInSeat(chipId, prevLoc);
          }
          refreshSubmittable();
          return;
        }

        var kind = tgt.data.kind;

        // Drop on pool tray → return to pool
        if (kind === 'pool') {
          if (prevLoc !== 'pool') {
            vacateSeat(prevLoc);
          }
          returnChipToPool(chipId);
          safePlaySound('sound_bubble_deselect', {});
          refreshSubmittable();
          return;
        }

        if (kind === 'seat') {
          var tgtSeat = tgt.data.seatNum;
          // Same-seat drop → snap back into seat
          if (prevLoc === tgtSeat) {
            placeChipInSeat(chipId, tgtSeat);
            refreshSubmittable();
            return;
          }
          var existingChipId = gameState.placement[tgtSeat] || null;
          if (existingChipId) {
            if (prevLoc !== 'pool') {
              // Swap: existing chip moves to source seat
              vacateSeat(prevLoc);
              placeChipInSeat(existingChipId, prevLoc);
            } else {
              // Existing chip returns to pool
              returnChipToPool(existingChipId);
            }
          } else {
            if (prevLoc !== 'pool') vacateSeat(prevLoc);
          }
          placeChipInSeat(chipId, tgtSeat);
          safePlaySound('sound_bubble_select', {});
          refreshSubmittable();
          return;
        }

        // Unknown drop kind → snap back
        if (prevLoc === 'pool') returnChipToPool(chipId);
        else placeChipInSeat(chipId, prevLoc);
        refreshSubmittable();
      } catch (e) {
        console.error('[handleDragEnd]', e && e.message);
        if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
      }
    }

    /* ============================================================
       Clue evaluation
       ============================================================ */
    function evaluateClues(round, placement) {
      var results = [];
      var chipSeat = {};  // chipId → seatNum (or null)
      Object.keys(placement || {}).forEach(function (s) {
        if (placement[s]) chipSeat[placement[s]] = s;
      });

      var i;
      for (i = 0; i < round.clues.length; i++) {
        var cl = round.clues[i];
        var ok = true;
        var seatsInClue = [];
        var args = cl.args || [];
        try {
          if (cl.kind === 'seat-pin') {
            var who = args[0];
            var pinSeat = String(args[1]);
            ok = (chipSeat[who] === pinSeat);
            if (chipSeat[who]) seatsInClue.push(chipSeat[who]);
            seatsInClue.push(pinSeat);
          } else if (cl.kind === 'head-of-table') {
            var whoH = args[0];
            var headSeat = String(round.headSeat);
            ok = (chipSeat[whoH] === headSeat);
            if (chipSeat[whoH]) seatsInClue.push(chipSeat[whoH]);
            seatsInClue.push(headSeat);
          } else if (cl.kind === 'next-to') {
            var a = args[0], b = args[1];
            var sa = chipSeat[a], sb = chipSeat[b];
            if (!sa || !sb) ok = false;
            else {
              var adj = round.adjacency[sa] || [];
              ok = adj.indexOf(parseInt(sb, 10)) !== -1;
              seatsInClue.push(sa); seatsInClue.push(sb);
            }
          } else if (cl.kind === 'across-from') {
            var a2 = args[0], b2 = args[1];
            var sa2 = chipSeat[a2], sb2 = chipSeat[b2];
            if (!sa2 || !sb2) ok = false;
            else {
              var ax = round.acrossFrom[sa2];
              ok = (ax !== null && ax !== undefined && String(ax) === sb2);
              seatsInClue.push(sa2); seatsInClue.push(sb2);
            }
          } else if (cl.kind === 'left-of') {
            var aL = args[0], bL = args[1];
            var saL = chipSeat[aL], sbL = chipSeat[bL];
            if (!saL || !sbL) ok = false;
            else {
              var ln = round.leftNeighbour[sbL];
              ok = (ln !== null && ln !== undefined && String(ln) === saL);
              seatsInClue.push(saL); seatsInClue.push(sbL);
            }
          } else if (cl.kind === 'between') {
            var x = args[0], y = args[1], z = args[2];
            var sx = chipSeat[x], sy = chipSeat[y], sz = chipSeat[z];
            if (!sx || !sy || !sz) ok = false;
            else {
              var adjX = round.adjacency[sx] || [];
              var adjY = round.adjacency[sy] || [];
              var xAdjY = adjX.indexOf(parseInt(sy, 10)) !== -1;
              var xAdjZ = adjX.indexOf(parseInt(sz, 10)) !== -1;
              var yAdjZ = adjY.indexOf(parseInt(sz, 10)) !== -1;
              ok = (xAdjY && xAdjZ && !yAdjZ);
              seatsInClue.push(sx); seatsInClue.push(sy); seatsInClue.push(sz);
            }
          } else if (cl.kind === 'not-next-to') {
            var aN = args[0], bN = args[1];
            var saN = chipSeat[aN], sbN = chipSeat[bN];
            if (!saN || !sbN) ok = false;
            else {
              var adjN = round.adjacency[saN] || [];
              ok = adjN.indexOf(parseInt(sbN, 10)) === -1;
              seatsInClue.push(saN); seatsInClue.push(sbN);
            }
          } else {
            ok = true;
          }
        } catch (e) {
          ok = false;
        }
        results.push({ idx: i, kind: cl.kind, satisfied: !!ok, seats: seatsInClue });
      }
      return results;
    }

    function pickWorstViolatedTag(round, results) {
      var priority = ['seat-pin', 'head-of-table', 'between', 'left-of', 'across-from', 'not-next-to', 'next-to'];
      var i, j;
      for (i = 0; i < priority.length; i++) {
        for (j = 0; j < results.length; j++) {
          if (!results[j].satisfied && results[j].kind === priority[i]) {
            var tagMap = round.misconception_tags || FULL_TAGS;
            return tagMap[results[j].kind] || null;
          }
        }
      }
      return null;
    }

    /* ============================================================
       Submittable predicate — all required SEATS filled
       ============================================================ */
    function allSeatsFilled() {
      var round = getCurrentRound();
      if (!round) return false;
      var i;
      for (i = 0; i < round.seats.length; i++) {
        if (!gameState.placement[String(round.seats[i])]) return false;
      }
      return true;
    }

    function refreshSubmittable() {
      try {
        if (floatingBtn && typeof floatingBtn.setSubmittable === 'function') {
          var ok = allSeatsFilled() && !gameState.isProcessing && !gameState.gameEnded && !gameState.awaitingNext;
          floatingBtn.setSubmittable(!!ok);
        }
      } catch (e) {}
    }

    /* ============================================================
       handleCheck — main submit handler
       ============================================================ */
    async function handleCheck() {
      if (gameState.isProcessing || gameState.gameEnded || gameState.awaitingNext) return;
      if (!allSeatsFilled()) return;
      gameState.isProcessing = true;
      refreshSubmittable();

      var round = getCurrentRound();
      var results = evaluateClues(round, gameState.placement);
      var allOk = true;
      var i;
      var violatedSeats = {};
      var distractorPlaced = false;
      if (round.answer && round.answer.distractor) {
        // Distractor is placed iff its chipLocation is not 'pool'
        var dLoc = gameState.chipLocation[round.answer.distractor];
        if (dLoc && dLoc !== 'pool') distractorPlaced = true;
      }
      for (i = 0; i < results.length; i++) {
        if (!results[i].satisfied) {
          allOk = false;
          var ss = results[i].seats || [];
          var k;
          for (k = 0; k < ss.length; k++) violatedSeats[ss[k]] = true;
        }
      }
      // Distractor placed AND a non-distractor is missing → mark distractor's seat as part of the violation
      if (distractorPlaced) allOk = false;

      var tag;
      if (distractorPlaced) {
        tag = 'distractor-not-recognised';
      } else {
        tag = pickWorstViolatedTag(round, results);
      }

      if (allOk) {
        gameState.firstCheckCorrect = (gameState.firstCheckCorrect || 0) + 1;
        gameState.score = gameState.firstCheckCorrect;
      }
      refreshHeader();

      recordAttempt(round, allOk, tag);
      trackEvent('answer_submitted', {
        round: gameState.currentRound,
        set: round && round.set,
        is_correct: allOk,
        misconception_tag: tag,
        violated_clue_count: results.filter(function (r) { return !r.satisfied; }).length,
        distractor_placed: distractorPlaced
      });

      // Progress bar bumps FIRST (memory rule)
      gameState.progress = (gameState.progress || 0) + 1;
      if (progressBar) {
        try { progressBar.update(gameState.progress, 0); } catch (e) {}
      }

      if (allOk) {
        // Green flash on every seat
        var keys = Object.keys(seatEls);
        var ki;
        for (ki = 0; ki < keys.length; ki++) {
          (function (key, kIdx) {
            setTimeout(function () {
              if (seatEls[key]) seatEls[key].classList.add('flash-correct');
            }, kIdx * 60);
          })(keys[ki], ki);
        }
        setFeedbackLine("Yes! That's the right seating.", 'correct');
        try {
          await Promise.all([
            safePlaySound('correct_sound_effect', { sticker: STICKER_CELEBRATE }),
            new Promise(function (r) { setTimeout(r, 1500); })
          ]);
        } catch (e) {}
        try {
          await FeedbackManager.playDynamicFeedback({
            audio_content: "Yes! That's the right seating.",
            subtitle: "Yes! That's the right seating.",
            sticker: STICKER_CELEBRATE
          });
        } catch (e) {}
        trackEvent('round_complete', {
          round: gameState.currentRound, is_correct: true, score: gameState.score
        });
        // Auto-advance
        gameState.isProcessing = false;
        if (gameState.currentRound < gameState.totalRounds) {
          gameState.currentRound += 1;
          await showRoundIntro(gameState.currentRound);
          renderRound();
        } else {
          endGame(true);
        }
      } else {
        // Glow violated seats red + mark violated clues
        Object.keys(violatedSeats).forEach(function (seatNum) {
          var s = seatEls[seatNum];
          if (s) s.classList.add('glow-wrong');
        });
        var lis = document.querySelectorAll('#cluePanel li');
        var li, idx;
        for (li = 0; li < lis.length; li++) {
          idx = parseInt(lis[li].getAttribute('data-clue-idx'), 10);
          if (results[idx] && !results[idx].satisfied) lis[li].classList.add('violated');
        }
        setFeedbackLine("Oh no — that's not quite right!", 'wrong');
        try {
          await Promise.all([
            safePlaySound('incorrect_sound_effect', { sticker: STICKER_SAD }),
            new Promise(function (r) { setTimeout(r, 1500); })
          ]);
        } catch (e) {}
        try {
          await FeedbackManager.playDynamicFeedback({
            audio_content: "Oh no — that's not quite right!",
            subtitle: "Oh no — that's not quite right!",
            sticker: STICKER_SAD
          });
        } catch (e) {}
        trackEvent('round_complete', {
          round: gameState.currentRound, is_correct: false, score: gameState.score
        });
        // No retry — student taps NEXT
        gameState.isProcessing = false;
        gameState.awaitingNext = 'wrong';
        try {
          if (floatingBtn) {
            if (typeof floatingBtn.setLabels === 'function') {
              try { floatingBtn.setLabels({ submit: 'CHECK', next: 'Next puzzle' }); } catch (e) {}
            }
            floatingBtn.setMode('next');
          }
        } catch (e) {}
      }
    }

    /* ============================================================
       advanceFromWrong — student tapped NEXT after a wrong CHECK
       ============================================================ */
    async function advanceFromWrong() {
      gameState.awaitingNext = null;
      if (gameState.currentRound < gameState.totalRounds) {
        gameState.currentRound += 1;
        await showRoundIntro(gameState.currentRound);
        renderRound();
      } else {
        endGame(false);
      }
    }

    /* ============================================================
       Round intro
       ============================================================ */
    async function showRoundIntro(n) {
      try { FeedbackManager.sound['stopAll'](); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { FeedbackManager._stopCurrentDynamic && FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      if (!transitionScreen) return;
      var title = 'Puzzle ' + n + ' of ' + gameState.totalRounds;
      await transitionScreen.show({
        title: title,
        icons: ['🪑'],
        buttons: [],
        persist: false,
        onMounted: function () {
          (async function () {
            try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND }); } catch (e) {}
            try {
              await FeedbackManager.playDynamicFeedback({
                audio_content: title, subtitle: title, sticker: STICKER_ROUND
              });
            } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
          })();
        }
      });
      await new Promise(function (r) { setTimeout(r, 2400); });
      try { transitionScreen.hide(); } catch (e) {}
    }

    /* ============================================================
       renderRound
       ============================================================ */
    function renderRound() {
      gameState.isProcessing = false;
      gameState.isActive = true;
      gameState.awaitingNext = null;
      gameState.placement = {};
      gameState.chipLocation = {};
      gameState.roundStartTime = Date.now();
      gameState.phase = 'playing';
      syncDOM();

      var round = getCurrentRound();
      if (!round) return;

      gameState.correctAnswer = JSON.stringify(round.solution || {});

      renderStageLabel(round);
      renderClues(round);
      renderBoardForRound(round);
      clearFeedbackLine();

      // Initialize chip locations
      var ci;
      for (ci = 0; ci < round.chips.length; ci++) {
        gameState.chipLocation[round.chips[ci].id] = 'pool';
      }
      var si;
      for (si = 0; si < round.seats.length; si++) {
        gameState.placement[String(round.seats[si])] = null;
      }

      buildDndForRound(round);

      // Reset FloatingButton labels & mode
      try {
        if (floatingBtn) {
          if (typeof floatingBtn.setLabels === 'function') {
            try { floatingBtn.setLabels({ submit: 'CHECK', next: 'Next puzzle' }); } catch (e) {}
          }
          floatingBtn.setMode('submit');
        }
      } catch (e) {}

      refreshHeader();
      refreshSubmittable();

      if (progressBar) {
        try { progressBar.update(gameState.progress || 0, 0); } catch (e) {}
      }
    }

    /* ============================================================
       Victory / Stars Collected / AnswerComponent chain
       ============================================================ */
    async function showVictory(success) {
      if (!transitionScreen) return;
      var stars = gameState.stars;
      var subtitle;
      if (stars === 3) subtitle = 'Perfect! You solved every puzzle on the first try.';
      else if (stars === 2) subtitle = 'Nice work — you solved most of them on the first try.';
      else subtitle = 'Great job finishing all 7 puzzles!';

      var stickerForVictory;
      if (stars === 3) stickerForVictory = STICKER_VICTORY_3;
      else if (stars === 2) stickerForVictory = STICKER_VICTORY_2;
      else stickerForVictory = STICKER_VICTORY_1;

      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}

      var playAgainAct = function () {
        try { transitionScreen.hide(); } catch (e) {}
        restartGame();
      };
      var claimStarsAct = function () {
        try { transitionScreen.hide(); } catch (e) {}
        showStarsCollected();
      };

      await transitionScreen.show({
        title: 'Victory 🎉',
        subtitle: subtitle,
        stars: stars,
        buttons: stars < 3
          ? [
              { text: 'Play Again', type: 'secondary', action: playAgainAct },
              { text: 'Claim Stars', type: 'primary', action: claimStarsAct }
            ]
          : [
              { text: 'Play Again', type: 'secondary', action: claimStarsAct, hidden: true },
              { text: 'Claim Stars', type: 'primary', action: claimStarsAct }
            ],
        persist: true,
        onMounted: function () {
          (async function () {
            try {
              await safePlaySound('victory_sound_effect', { sticker: stickerForVictory });
            } catch (e) {}
            try {
              await FeedbackManager.playDynamicFeedback({
                audio_content: subtitle, subtitle: subtitle, sticker: stickerForVictory
              });
            } catch (e) {}
          })();
        }
      });
    }

    async function showStarsCollected() {
      if (!transitionScreen) return;
      var count = Math.max(1, Math.min(3, gameState.stars || 1));
      await transitionScreen.show({
        title: 'Yay! 🎉\nStars collected!',
        buttons: [],
        persist: true,
        styles: { title: { whiteSpace: 'pre-line', lineHeight: '1.3' } },
        onMounted: function () {
          (async function () {
            try {
              await safePlaySound('victory_sound_effect', { sticker: STICKER_CELEBRATE });
            } catch (e) {}
            try {
              window.postMessage({
                type: 'show_star',
                data: {
                  count: count,
                  variant: 'yellow',
                  score: gameState.score + '/' + gameState.totalRounds
                }
              }, '*');
            } catch (e) {}
            setTimeout(function () { showAnswerCarousel(); }, 1500);
          })();
        }
      });
    }

    function buildAnswerSlidesForAllRounds() {
      var rounds = gameState.activeRounds && gameState.activeRounds.length > 0 ? gameState.activeRounds : getRounds();
      var roundsCopy = rounds.slice(0, gameState.totalRounds);
      return roundsCopy.map(function (round, idx) {
        return {
          render: function (container) {
            renderAnswerForRound(round, container, idx + 1);
          }
        };
      });
    }

    function stageSubtitle(stage) {
      if (stage === 1) return 'Reading one clue at a time.';
      if (stage === 2) return 'Two clues together pin one seat.';
      return 'Find the friend with no clue, set them aside, then solve.';
    }

    function chipById(round, id) {
      var i;
      for (i = 0; i < round.chips.length; i++) {
        if (round.chips[i].id === id) return round.chips[i];
      }
      return null;
    }

    function renderAnswerForRound(round, container, roundNum) {
      if (!container || !round) return;
      container.innerHTML = '';
      var slide = document.createElement('div');
      slide.className = 'answer-slide';

      var title = document.createElement('div');
      title.className = 'answer-title';
      title.textContent = 'Puzzle ' + roundNum;
      slide.appendChild(title);

      var sub = document.createElement('div');
      sub.className = 'answer-subtitle';
      sub.textContent = stageSubtitle(round.stage);
      slide.appendChild(sub);

      var area = document.createElement('div');
      area.className = 'answer-table-area stage-' + round.stage;

      var surface = document.createElement('div');
      surface.className = 'answer-table-surface';
      area.appendChild(surface);

      // Smaller seat positions for the answer (scale to 240x240/260)
      var positions = SEAT_POSITIONS[round.stage];
      var scaleX = 240 / 300;
      var scaleY = (round.stage === 1 ? 240 / 300 : 260 / 320);
      var i;
      for (i = 0; i < round.seats.length; i++) {
        var seatNum = String(round.seats[i]);
        var pos = positions[seatNum];
        if (!pos) continue;
        var seat = document.createElement('div');
        seat.className = 'answer-seat';
        // Adjust for smaller seat size (50 vs 64) — center-shift
        var sx = Math.round(pos.x * scaleX) + 7;
        var sy = Math.round(pos.y * scaleY) + 7;
        seat.style.left = sx + 'px';
        seat.style.top = sy + 'px';
        var seatNumEl = document.createElement('div');
        seatNumEl.className = 'seat-num';
        seatNumEl.textContent = seatNum;
        seat.appendChild(seatNumEl);
        var chipId = round.solution[seatNum];
        var c = chipById(round, chipId);
        if (c) {
          var av = document.createElement('div');
          av.className = 'answer-avatar';
          av.textContent = c.avatar;
          seat.appendChild(av);
          var nm = document.createElement('div');
          nm.className = 'answer-name';
          nm.textContent = c.name;
          seat.appendChild(nm);
        }
        area.appendChild(seat);
      }
      slide.appendChild(area);

      var ul = document.createElement('ul');
      ul.className = 'answer-clue-list';
      var ci;
      for (ci = 0; ci < round.clues.length; ci++) {
        var li = document.createElement('li');
        li.textContent = round.clues[ci].text;
        ul.appendChild(li);
      }
      slide.appendChild(ul);

      if (round.answer && round.answer.distractor) {
        var dc = chipById(round, round.answer.distractor);
        var dist = document.createElement('div');
        dist.className = 'answer-distractor';
        dist.textContent = (dc ? dc.avatar + ' ' + dc.name : round.answer.distractor) + ' was the friend with no clue (not used).';
        slide.appendChild(dist);
      }

      container.appendChild(slide);
    }

    function showAnswerCarousel() {
      if (!answerComponent) return;
      try {
        answerComponent.show({ slides: buildAnswerSlidesForAllRounds() });
      } catch (e) {
        console.error('[answerComponent.show]', e && e.message);
      }
      gameState.awaitingNext = 'final';
      try {
        if (floatingBtn) {
          if (typeof floatingBtn.setLabels === 'function') {
            try { floatingBtn.setLabels({ submit: 'CHECK', next: 'Next' }); } catch (e) {}
          }
          floatingBtn.setMode('next');
        }
      } catch (e) {}
    }

    /* ============================================================
       resetGameState + restartGame
       ============================================================ */
    function resetGameState() {
      gameState.phase = 'playing';
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.stars = 0;
      gameState.progress = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.awaitingNext = null;
      gameState.placement = {};
      gameState.chipLocation = {};
      gameState.firstCheckCorrect = 0;
      gameState.duration_data = {
        startTime: null,
        preview: gameState.duration_data ? gameState.duration_data.preview : []
      };
      gameState.activeRounds = getRounds();
    }

    function restartGame() {
      try { FeedbackManager.sound['stopAll'](); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
      gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      resetGameState();
      if (signalCollector && typeof signalCollector.reset === 'function') {
        try { signalCollector.reset(); } catch (e) {}
      }
      try { if (answerComponent) answerComponent.hide(); } catch (e) {}
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      if (progressBar) {
        try { progressBar.update(0, 0); } catch (e) {}
      }
      trackEvent('game_start', {
        totalRounds: gameState.totalRounds, restart: true, setIndex: gameState.setIndex
      });
      (async function () {
        await showRoundIntro(1);
        renderRound();
      })();
    }
    window.restartGame = restartGame;

    /* ============================================================
       startGame
       ============================================================ */
    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.phase = 'playing';
      gameState.currentRound = 1;
      gameState.score = 0;
      gameState.firstCheckCorrect = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.progress = 0;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.activeRounds = getRounds();
      gameState.startTime = Date.now();
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();
      (async function () {
        await showRoundIntro(1);
        renderRound();
      })();
    }
    window.startGame = startGame;

    /* ============================================================
       nextRound — test-harness convenience
       ============================================================ */
    function nextRound() {
      try { FeedbackManager.sound['stopAll'](); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      gameState.awaitingNext = null;
      if (gameState.currentRound < gameState.totalRounds) {
        gameState.currentRound += 1;
        renderRound();
      } else {
        endGame(true);
      }
    }
    window.nextRound = nextRound;

    /* ============================================================
       setupGame
       ============================================================ */
    function setupGame() {
      var content = gameState.content || fallbackContent;
      gameState.totalRounds = (content.totalRounds && typeof content.totalRounds === 'number') ? content.totalRounds : 7;
      gameState.activeRounds = getRounds();

      buildBoardDOM();
      // Pre-render the first round so the board is visible the moment preview ends
      (function () {
        var r = getCurrentRound();
        if (r) {
          renderStageLabel(r);
          renderClues(r);
          renderBoardForRound(r);
          var ci;
          for (ci = 0; ci < r.chips.length; ci++) {
            gameState.chipLocation[r.chips[ci].id] = 'pool';
          }
          var si;
          for (si = 0; si < r.seats.length; si++) {
            gameState.placement[String(r.seats[si])] = null;
          }
        }
      })();

      if (previewScreen) {
        try {
          previewScreen.show({
            instruction: content.previewInstruction || fallbackContent.previewInstruction,
            audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
            showGameOnPreview: content.showGameOnPreview === true,
            onComplete: function (previewData) {
              startGameAfterPreview(previewData);
            }
          });
        } catch (e) {
          console.error('[previewScreen.show]', e && e.message);
          startGameAfterPreview({ duration: 0 });
        }
      } else {
        startGameAfterPreview({ duration: 0 });
      }
    }

    function startGameAfterPreview(previewData) {
      try {
        gameState.previewResult = previewData || { duration: 0 };
        gameState.duration_data.preview = gameState.duration_data.preview || [];
        gameState.duration_data.preview.push({ duration: previewData ? previewData.duration : 0 });
        gameState.startTime = Date.now();
        gameState.isActive = true;
        gameState.phase = 'playing';
        syncDOM();
        // Seed PreviewScreen header
        try {
          if (previewScreen && typeof previewScreen.setQuestionLabel === 'function') {
            previewScreen.setQuestionLabel('Q1');
          }
          if (previewScreen && typeof previewScreen.setScore === 'function') {
            previewScreen.setScore('0/' + gameState.totalRounds);
          }
        } catch (e1) {}
        trackEvent('game_start', { totalRounds: gameState.totalRounds });
        (async function () {
          await showRoundIntro(1);
          renderRound();
        })();
      } catch (e) {
        console.error('[startGameAfterPreview]', e && e.message);
      }
    }

    /* ============================================================
       Fallback layout if ScreenLayout unavailable
       ============================================================ */
    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      app.innerHTML = '';
      var stack = document.createElement('div');
      stack.className = 'game-stack';
      var gc = document.createElement('div');
      gc.id = 'gameContent';
      stack.appendChild(gc);
      app.appendChild(stack);
    }
  </script>

  <!-- ====== dnd-kit module-script ====== -->
  <script type="module">
    import { DragDropManager, Draggable, Droppable, Feedback, PointerSensor, PointerActivationConstraints } from 'https://esm.sh/@dnd-kit/dom@beta';
    window.DnDKit = {
      DragDropManager: DragDropManager,
      Draggable: Draggable,
      Droppable: Droppable,
      Feedback: Feedback,
      PointerSensor: PointerSensor,
      PointerActivationConstraints: PointerActivationConstraints
    };
    window.dispatchEvent(new Event('dndkit-ready'));
  </script>

  <script>
    /* ============================================================
       DOMContentLoaded init sequence
       ============================================================ */
    document.addEventListener('DOMContentLoaded', async function () {
      try {
        await waitForPackages();

        await new Promise(function (resolve) {
          if (window.DnDKit && window.DnDKit.DragDropManager) return resolve();
          window.addEventListener('dndkit-ready', function () { resolve(); }, { once: true });
          setTimeout(resolve, 5000);
        });

        try { await FeedbackManager.init(); } catch (e) {}

        try {
          signalCollector = new SignalCollector({
            playId: 'logic-seat-puzzle-' + Date.now(),
            game: 'logic-seat-puzzle'
          });
          window.signalCollector = signalCollector;
        } catch (e) {
          console.error('[SignalCollector ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          ScreenLayout.inject('app', {
            slots: {
              previewScreen: true,
              transitionScreen: true,
              progressBar: true,
              floatingButton: true,
              answerComponent: true
            }
          });
        } catch (e) {
          console.error('[ScreenLayout.inject failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          buildFallbackLayout();
        }

        try {
          visibilityTracker = new VisibilityTracker({
            popupProps: {},
            onInactive: function () {
              try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {}
              try { if (previewScreen) previewScreen.pause(); } catch (e) {}
            },
            onResume: function () {
              try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {}
              try { if (previewScreen) previewScreen.resume(); } catch (e) {}
            }
          });
        } catch (e) {
          console.error('[VisibilityTracker ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          progressBar = new ProgressBarComponent({
            slotId: 'mathai-progress-slot',
            totalRounds: 7,
            totalLives: 7,
            showLives: false
          });
        } catch (e) {
          console.error('[ProgressBarComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          transitionScreen = new TransitionScreenComponent({
            slotId: 'mathai-transition-slot'
          });
        } catch (e) {
          console.error('[TransitionScreenComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          previewScreen = new PreviewScreenComponent({
            slotId: 'mathai-preview-slot'
          });
        } catch (e) {
          console.error('[PreviewScreenComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          floatingBtn = new FloatingButtonComponent({
            slotId: 'mathai-floating-button-slot'
          });
          if (floatingBtn && typeof floatingBtn.setLabels === 'function') {
            try { floatingBtn.setLabels({ submit: 'CHECK', next: 'Next puzzle' }); } catch (e) {}
          }
          floatingBtn.on('submit', async function () {
            if (gameState.isProcessing || gameState.gameEnded) return;
            try { await handleCheck(); }
            catch (e) { console.error('[handleCheck]', e && e.message); }
          });
          floatingBtn.on('next', function () {
            try {
              if (gameState.awaitingNext === 'wrong') {
                advanceFromWrong();
                return;
              }
              if (gameState.awaitingNext === 'final') {
                try {
                  if (answerComponent && typeof answerComponent.destroy === 'function') answerComponent.destroy();
                } catch (e) {}
                try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
                try {
                  if (previewScreen && typeof previewScreen.destroy === 'function') previewScreen.destroy();
                } catch (e) {}
                try {
                  if (floatingBtn && typeof floatingBtn.destroy === 'function') floatingBtn.destroy();
                } catch (e) {}
                gameState.awaitingNext = null;
              }
            } catch (e) {
              console.error('[next handler]', e && e.message);
            }
          });
        } catch (e) {
          console.error('[FloatingButtonComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          answerComponent = new AnswerComponentComponent({
            slotId: 'mathai-answer-slot'
          });
        } catch (e) {
          console.error('[AnswerComponentComponent ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }

        try {
          var PointerSensor = window.DnDKit.PointerSensor;
          var PointerActivationConstraints = window.DnDKit.PointerActivationConstraints;
          dndManager = new window.DnDKit.DragDropManager({
            sensors: [
              PointerSensor.configure({
                activationConstraints: [
                  new PointerActivationConstraints.Distance({ value: 3 })
                ]
              })
            ]
          });
          dndManager.monitor.addEventListener('dragend', handleDragEnd);
          dndManager.monitor.addEventListener('dragstart', handleDragStart);
        } catch (e) {
          console.error('[DragDropManager ctor failed]', e && e.message, e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          try {
            dndManager = new window.DnDKit.DragDropManager();
            dndManager.monitor.addEventListener('dragend', handleDragEnd);
            dndManager.monitor.addEventListener('dragstart', handleDragStart);
          } catch (er) {
            console.error('[DragDropManager fallback ctor failed]', er && er.message, er);
          }
        }

        preloadAudio();

        window.addEventListener('message', handlePostMessage);
        try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

        window.__alfredBootstrapped = true;
        setupGame();
      } catch (e) {
        console.error('[init]', e && e.message);
        if (typeof Sentry !== 'undefined') { try { Sentry.captureException(e); } catch (er) {} }
      }

      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = startGame;
      window.nextRound = nextRound;
      // Test-harness helpers (place a chip programmatically + run check)
      window.testPlaceChipInSeat = function (chipId, seatNum) {
        try { placeChipInSeat(chipId, seatNum); refreshSubmittable(); } catch (e) {}
      };
      window.testReturnChipToPool = function (chipId) {
        try { returnChipToPool(chipId); refreshSubmittable(); } catch (e) {}
      };
      window.testHandleCheck = function () { return handleCheck(); };
      window.testAdvanceFromWrong = function () { return advanceFromWrong(); };
      window.loadRound = function (n) {
        if (typeof n === 'number' && n >= 1 && n <= gameState.totalRounds) {
          gameState.currentRound = n;
          renderRound();
        }
      };
      window.debugGame = function () {
        return {
          phase: gameState.phase,
          currentRound: gameState.currentRound,
          totalRounds: gameState.totalRounds,
          score: gameState.score,
          firstCheckCorrect: gameState.firstCheckCorrect,
          stars: gameState.stars,
          isActive: gameState.isActive,
          isProcessing: gameState.isProcessing,
          gameEnded: gameState.gameEnded,
          awaitingNext: gameState.awaitingNext,
          placement: gameState.placement,
          chipLocation: gameState.chipLocation,
          setIndex: gameState.setIndex
        };
      };
      window.debugAudio = function () {
        return {
          available: typeof FeedbackManager !== 'undefined',
          isProcessing: gameState.isProcessing
        };
      };
      window.testAudio = function () {
        try { return safePlaySound('tap_sound', {}); } catch (e) { return Promise.resolve(); }
      };
      window.testPause = function () {
        try { FeedbackManager.sound.pause(); } catch (e) {}
      };
      window.testResume = function () {
        try { FeedbackManager.sound.resume(); } catch (e) {}
      };
    });

    /* ============================================================
       Standalone fallback
       ============================================================ */
    setTimeout(function () {
      if (window.__alfredBootstrapped) return;
      if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
      if (gameState.isActive || gameState.gameEnded) return;

      var missing = [];
      if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
      if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
      if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
      if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
      if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
      if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
      if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
      if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
      if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
      if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');

      if (missing.length > 0) {
        var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
        console.error('[' + msg + ']');
        if (typeof Sentry !== 'undefined') {
          try { Sentry.captureMessage(msg); } catch (e) {}
        }
        var gc = document.getElementById('gameContent') || document.body;
        if (gc) {
          gc.innerHTML =
            '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">' +
            'Game failed to load — please refresh.' +
            '</div>';
        }
        return;
      }

      if (!document.getElementById('gameContent')) {
        buildFallbackLayout();
      }
      gameState.content = fallbackContent;
      gameState.totalRounds = fallbackContent.rounds.length / 3;
      setupGame();
      startGame();
    }, 2000);
  </script>
