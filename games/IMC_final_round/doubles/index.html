    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100dvh;
      overflow-x: hidden;
      overscroll-behavior: none;
    }
    @supports not (height: 100dvh) {
      html, body { height: 100vh; }
    }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }
    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }
    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    /* Preview wrapper scroll compatibility */
    #mathai-preview-slot {
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }
    #mathai-preview-slot .mathai-preview-body {
      height: 100dvh;
      box-sizing: border-box;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* Timer absolute-centered at top of the persistent header area
       (mounted as a child of #mathai-preview-slot per PART-006). */
    #timer-container {
      position: absolute;
      top: 0.75rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      pointer-events: none;
    }
    #timer-container > * { pointer-events: auto; }
    #timer-container .timer-wrapper { padding: 0 !important; margin: 0 !important; background: transparent !important; }
    #timer-container .timer-display {
      width: auto !important;
      height: auto !important;
      min-width: 0 !important;
      padding: 2px 10px !important;
      font-size: 16px !important;
      font-weight: 700 !important;
      color: var(--mathai-primary) !important;
      font-family: var(--mathai-font-family) !important;
      background: var(--mathai-cell-bg-yellow) !important;
      border-radius: 999px !important;
      box-shadow: none !important;
    }

    /* Lives override — dark hearts instead of red.
       ProgressBar renders lives as ❤️ / 🤍 emojis inside .mathai-pb-lives.
       We swap ❤️ → 🖤 at runtime via MutationObserver (see HEART_OVERRIDE below)
       so filled hearts read dark while empty hearts stay light. */
    #mathai-progress-slot .mathai-pb-lives {
      letter-spacing: 1px;
    }
    /* Fallback for any future SVG-based renderer */
    #mathai-progress-slot .heart,
    #mathai-progress-slot [class*="heart"],
    #mathai-progress-slot [class*="Heart"] {
      color: var(--doubles-heart-dark) !important;
    }
    #mathai-progress-slot svg path[fill] {
      fill: var(--doubles-heart-dark) !important;
    }
    #mathai-progress-slot .lost,
    #mathai-progress-slot .empty,
    #mathai-progress-slot [class*="lost"],
    #mathai-progress-slot [class*="empty"] {
      color: var(--doubles-heart-empty) !important;
      opacity: 0.55 !important;
    }

    /* Gameplay area */
    #gameContent {
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 8px 16px 16px;
    }

    .doubles-stage {
      text-align: center;
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 6px 0 4px;
    }

    .doubles-prompt-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 12px 18px;
    }
    .doubles-prompt-label {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-gray);
      margin-bottom: 6px;
    }
    .doubles-prompt {
      font-size: 44px;
      font-weight: 800;
      color: var(--mathai-primary);
      letter-spacing: -0.01em;
      animation: fadeIn 0.35s ease;
    }

    .doubles-options {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      max-width: 360px;
      margin: 16px auto 24px;
    }
    .option-btn {
      display: block;
      width: 100%;
      min-height: 56px;
      margin-top: 12px;
      padding: 14px 18px;
      border: 2px solid var(--mathai-border-gray);
      background: var(--mathai-white);
      color: var(--mathai-primary);
      font-family: var(--mathai-font-family);
      font-size: 22px;
      font-weight: 700;
      border-radius: 999px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease, transform 120ms ease;
      -webkit-appearance: none;
      appearance: none;
    }
    .option-btn:first-child { margin-top: 0; }
    .option-btn:hover:not(.disabled):not(:disabled) {
      border-color: var(--mathai-purple);
    }
    .option-btn:active:not(.disabled):not(:disabled) {
      transform: scale(0.98);
    }
    .option-btn.selected-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
      color: var(--mathai-green);
    }
    .option-btn.selected-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-red);
      animation: shake 0.5s ease;
    }
    .option-btn.disabled,
    .option-btn:disabled {
      opacity: 0.6;
      pointer-events: none;
      cursor: not-allowed;
    }

    .doubles-answer-card {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      padding: 14px 12px 18px;
      text-align: center;
    }
    .doubles-answer-prompt {
      font-size: 24px;
      font-weight: 800;
      color: var(--mathai-primary);
      margin-bottom: 12px;
    }
    .doubles-answer-options {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      margin-top: 8px;
    }

      width: 100%;
      min-height: 48px;
      margin-top: 8px;
      padding: 10px 14px;
      border: 2px solid var(--mathai-border-gray);
      background: var(--mathai-white);
      color: var(--mathai-primary);
      font-family: var(--mathai-font-family);

      pointer-events: none;

      color: var(--mathai-green);

      font-size: var(--mathai-font-size-body);
      color: var(--mathai-text-primary);
      font-weight: 600;

    .option-btn,
    [role="button"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    /* Gesture suppression */
    #app {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }

    /* Landscape lock */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white);
        color: var(--mathai-primary);
        font-family: var(--mathai-font-family);
        font-size: var(--mathai-font-size-subtitle);
        text-align: center;
        padding: 24px;
      }
    }

    /* Animations */
    @keyframes scoreBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes starPop {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @keyframes heartBreak {
      0% { transform: scale(1); opacity: 1; }
      30% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.5); opacity: 0; color: var(--mathai-red); }
    }
    @keyframes streakGlow {
      0% { box-shadow: 0 0 0 rgba(255, 193, 7, 0); }
      50% { box-shadow: 0 0 16px rgba(255, 193, 7, 0.5); }
      100% { box-shadow: 0 0 0 rgba(255, 193, 7, 0); }
    }
    @keyframes confettiFall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .score-bounce { animation: scoreBounce 0.4s ease; }
    .shake-wrong { animation: shake 0.5s ease; }
    .heart-break { animation: heartBreak 0.6s ease forwards; }
    .star-earned { animation: starPop 0.4s ease forwards; }
    .streak-glow { animation: streakGlow 0.6s ease; }
    .fade-in { animation: fadeIn 0.35s ease; }

    .selected-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-red);
      color: var(--mathai-red);
    }
    .selected-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-green);
      color: var(--mathai-green);
    }
  </style>

    function getAvailableSets(rounds) {
      var seen = {}; var out = [];
      for (var i = 0; i < rounds.length; i++) {
        var s = rounds[i].set;
        if (s && !seen[s]) { seen[s] = true; out.push(s); }
      }
      return out.length ? out : ['A'];
    }

    function getRounds() {
      var src = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(src);
      var setKey = sets[gameState.setIndex % sets.length];
      var filtered = [];
      for (var i = 0; i < src.length; i++) {
        if (src[i].set === setKey) filtered.push(src[i]);
      }
      // Sort by round number for deterministic order
      filtered.sort(function (a, b) { return a.round - b.round; });
      return filtered;
    }

    function shuffleArray(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    function getCorrectCount() {
      var c = 0;
      for (var i = 0; i < gameState.attempts.length; i++) {
        if (gameState.attempts[i].correct === true) c++;
      }
      return c;
    }

    function getAvgCorrectMs() {
      var sum = 0; var n = 0;
      for (var i = 0; i < gameState.attempts.length; i++) {
        var a = gameState.attempts[i];
        if (a.correct === true && typeof a.response_time_ms === 'number') {
          sum += a.response_time_ms; n++;
        }
      }
      return n === 0 ? 0 : Math.round(sum / n);
    }

    function getStars() {
      var correctCount = getCorrectCount();
      if (correctCount === 0) return 0;
      var avg = getAvgCorrectMs();
      if (avg < 2000) return 3;
      if (avg <= 3500) return 2;
      return 1;
    }

    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound + 1);
    }

    function trackEvent(name, payload) {
      try {
        gameState.events.push({ event: name, ts: Date.now(), data: payload || {} });
      } catch (e) {}
      try {
        if (signalCollector && signalCollector.recordEvent) {
          signalCollector.recordEvent(name, payload || {});
        }
      } catch (e) {}
    }

    function recordAttempt(input, correct, misconceptionTag, responseMs) {
      var round = gameState.activeRounds[gameState.currentRound];
      var qid = round ? round.id : ('r' + (gameState.currentRound + 1));
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) : 0,
        input_of_user: input,
        correct: correct === true,
        round_number: gameState.currentRound + 1,
        question_id: qid,
        correct_answer: round ? round.correctValue : null,
        response_time_ms: typeof responseMs === 'number' ? responseMs : 0,
        misconception_tag: misconceptionTag || null,
        difficulty_level: round ? (round.stage || 1) : 1,
        is_retry: false,
        metadata: { set: round ? round.set : null, n: round ? round.n : null }
      };
      gameState.attempts.push(attempt);
      try {
        if (signalCollector && signalCollector.recordAttempt) {
          signalCollector.recordAttempt(attempt);
        }
      } catch (e) {}
    }

    function postGameComplete() {
      if (gameState._gameCompletePosted) return;
      gameState._gameCompletePosted = true;
      var correctCount = getCorrectCount();
      var attempted = gameState.attempts.length;
      var accuracy = attempted === 0 ? 0 : Math.round((correctCount / attempted) * 100);
      var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
      var triesByRound = gameState.attempts.map(function (a) {
        return { round: a.round_number, correct: a.correct === true };
      });
      var metrics = {
        accuracy: accuracy,
        time: Math.round(elapsedMs / 1000),
        stars: gameState.stars,
        attempts: gameState.attempts.slice(),
        duration_data: gameState.duration_data,
        totalLives: gameState.lives,
        tries: triesByRound,
        score: gameState.score,
        avgCorrectMs: getAvgCorrectMs(),
        correctCount: correctCount
      };
      // Seal SignalCollector for analytics meta (PART-010)
      var signalSealed = { event_count: gameState.events.length, metadata: {} };
      try {
        if (signalCollector && typeof signalCollector.seal === 'function') {
          var sealed = signalCollector.seal();
          if (sealed) {
            if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count;
            if (sealed.metadata) signalSealed.metadata = sealed.metadata;
          }
        }
      } catch (e0) {}
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: metrics,
            completedAt: Date.now(),
            signal_event_count: signalSealed.event_count,
            signal_metadata: signalSealed.metadata
          }
        }, '*');
      } catch (e) {}
    }

    function playDynamicFeedback(opts) {

            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&

          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            try { throw new Error('waitForPackages timeout'); } catch (rethrown) { reject(err); return; }
            return reject(err);
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    /* ====================================================================== */
    /* Round rendering                                                           */
    /* ====================================================================== */
    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="doubles-stage" id="doublesStageLabel"></div>' +
        '<div class="doubles-prompt-block">' +
          '<div class="doubles-prompt-label">What is</div>' +
          '<div class="doubles-prompt" id="doublesPrompt">Double of —</div>' +
        '</div>' +
        '<div class="doubles-options" id="doublesOptions"></div>';
    }

    function renderInitialState() {
      var promptEl = document.getElementById('doublesPrompt');
      var stageEl = document.getElementById('doublesStageLabel');
      var optsEl = document.getElementById('doublesOptions');
      if (promptEl) promptEl.textContent = 'Double of —';
      if (stageEl) stageEl.textContent = '';
      if (optsEl) optsEl.innerHTML = '';
    }

    function renderRound(roundIdxOneBased) {
      // Cross-Cutting Rule 10 cleanup
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      gameState.currentRound = roundIdxOneBased - 1;
      gameState.isActive = true;
      gameState.phase = 'gameplay';
      // Mint a new round token so any in-flight stale button click is rejected
      gameState.roundToken = (gameState.roundToken || 0) + 1;
      syncDOM();

      var round = gameState.activeRounds[gameState.currentRound];
      if (!round) { return; }

      gameState.correctAnswer = round.correctValue;

      // Randomise option positions, keep the misconception map aligned.
      var indexedOpts = [];
      for (var i = 0; i < round.options.length; i++) {
        indexedOpts.push({ value: round.options[i], origIndex: i });
      }
      var shuffled = shuffleArray(indexedOpts);
      var displayed = [];
      var correctDisplayIdx = 0;
      var miscMap = {};
      for (var k = 0; k < shuffled.length; k++) {
        var v = shuffled[k].value;
        displayed.push(v);
        if (v === round.correctValue) correctDisplayIdx = k;
        var tag = round.misconception_tags && round.misconception_tags[String(v)];
        if (tag) miscMap[String(v)] = tag;
      }
      gameState.currentDisplayedOptions = displayed;
      gameState.currentCorrectDisplayIdx = correctDisplayIdx;
      gameState.currentMisconceptionMap = miscMap;

      // Paint UI
      var stageEl = document.getElementById('doublesStageLabel');
      if (stageEl) {
        stageEl.textContent = 'Round ' + roundIdxOneBased + ' of ' + gameState.totalRounds + ' · Stage ' + (round.stage || 1);
      }
      var promptEl = document.getElementById('doublesPrompt');
      if (promptEl) {
        promptEl.textContent = round.prompt;
        promptEl.classList.remove('fade-in');
        // force reflow to retrigger animation
        void promptEl.offsetWidth;
        promptEl.classList.add('fade-in');
      }
      var optsEl = document.getElementById('doublesOptions');
      if (optsEl) {
        optsEl.innerHTML = '';
        for (var b = 0; b < displayed.length; b++) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'option-btn';
          btn.textContent = String(displayed[b]);
          btn.setAttribute('data-value', String(displayed[b]));
          btn.setAttribute('data-display-index', String(b));
          btn.setAttribute('data-round-token', String(gameState.roundToken));
          btn.addEventListener('click', onOptionTap);
          optsEl.appendChild(btn);
        }
      }
      // Open the input gate AFTER buttons are mounted with the current token
      gameState.roundStartMs = Date.now();
      gameState.isProcessing = false;

      // Stopwatch — resume / reset semantics: continuous count-up
      try {
        gameState.timerIntentionallyPaused = false;
        if (timer) {
          if (roundIdxOneBased === 1 && !gameState._timerStarted) {
            try { timer.start(); } catch (e) {}
            gameState._timerStarted = true;
          } else {
            try { timer.resume(); } catch (e) {}
          }
        }
      } catch (e) {}

      // Round-prompt ambient SFX (fire-and-forget) per CASE 17
      try {
        var p = safePlaySound('tap_sound', { sticker: null });
        if (p && p.catch) p.catch(function () {});
      } catch (e) {}

      trackEvent('round_start', { round: roundIdxOneBased, set: round.set, n: round.n });
    }

    /* ====================================================================== */
    /* Tap handler                                                               */
    /* ====================================================================== */
    function onOptionTap(ev) {
      if (gameState.isProcessing || gameState.gameEnded) return;
      var btn = ev.currentTarget;
      if (btn.classList.contains('disabled') || btn.disabled) return;
      // Round-token guard — block stale-button clicks delivered after the round changed
      var btnRoundToken = btn.getAttribute('data-round-token');
      if (btnRoundToken !== String(gameState.roundToken || '')) return;
      var tappedValueStr = btn.getAttribute('data-value');
      var tappedValue = parseInt(tappedValueStr, 10);
      var displayIdx = parseInt(btn.getAttribute('data-display-index'), 10);
      handleAnswer(tappedValue, tappedValueStr, displayIdx, btn);
    }

    function handleAnswer(tappedValue, tappedValueStr, displayIdx, btnEl) {
      gameState.isProcessing = true;
      var responseMs = Date.now() - gameState.roundStartMs;

      // Pause stopwatch during feedback
      try {
        gameState.timerIntentionallyPaused = true;
        if (timer && timer.pause) timer.pause();
      } catch (e) {}

      var round = gameState.activeRounds[gameState.currentRound];
      var isCorrect = tappedValue === round.correctValue;

      // Record response time keyed by round number (1-based)
      gameState.responseMsByRound[gameState.currentRound + 1] = responseMs;

      // Disable all option buttons immediately
      var allBtns = document.querySelectorAll('#doublesOptions .option-btn');
      for (var i = 0; i < allBtns.length; i++) {
        allBtns[i].classList.add('disabled');
      }

      if (isCorrect) {
        if (btnEl) btnEl.classList.add('selected-correct');
        gameState.score += 1;
        gameState.progress = gameState.currentRound + 1;
        // ProgressBar bumps FIRST in round-complete
        try {
          if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives));
        } catch (e) {}
        syncDOM();
        recordAttempt(tappedValueStr, true, null, responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: true, value: tappedValue });
        runCorrectFeedbackAndAdvance(round);
      } else {
        if (btnEl) btnEl.classList.add('selected-wrong');
        // also highlight the correct pill so student sees it
        var allBtns2 = document.querySelectorAll('#doublesOptions .option-btn');
        for (var j = 0; j < allBtns2.length; j++) {
          if (parseInt(allBtns2[j].getAttribute('data-value'), 10) === round.correctValue) {
            allBtns2[j].classList.add('selected-correct');
          }
        }
        gameState.lives = Math.max(0, gameState.lives - 1);
        gameState.progress = gameState.currentRound + 1;
        // ProgressBar bumps FIRST in round-complete (heart dim co-occurs)
        try {
          if (progressBar) progressBar.update(gameState.progress, Math.max(0, gameState.lives));
        } catch (e) {}
        syncDOM();
        var miscTag = gameState.currentMisconceptionMap[tappedValueStr] || null;
        recordAttempt(tappedValueStr, false, miscTag, responseMs);
        trackEvent('answer_submitted', { round: gameState.currentRound + 1, correct: false, value: tappedValue, misconception_tag: miscTag });
        runWrongFeedbackAndAdvance(round);
      }
    }

    function runCorrectFeedbackAndAdvance(round) {
      (async function () {
        try {
          await awaitedFeedbackSound('correct_sound_effect', { sticker: STICKER_CORRECT });
        } catch (e) {}
        try {
          await playDynamicFeedback({
            audio_content: round.correctTTS,
            subtitle: round.correctSubtitle,
            sticker: STICKER_CORRECT
          });
        } catch (e) {}
        advanceAfterFeedback();
      })();
    }

    function runWrongFeedbackAndAdvance(round) {
      (async function () {
        try {
          await awaitedFeedbackSound('incorrect_sound_effect', { sticker: STICKER_SAD });
        } catch (e) {}
        try {
          await playDynamicFeedback({
            audio_content: round.wrongTTS,
            subtitle: round.wrongSubtitle,
            sticker: STICKER_SAD
          });
        } catch (e) {}
        advanceAfterFeedback();
      })();
    }

    function advanceAfterFeedback() {
      var roundJustPlayed = gameState.currentRound + 1; // 1-based
      // CASE 8 — last life lost goes to game over BEFORE advancing
      if (gameState.lives === 0) {
        // Post game_complete BEFORE end-game audio (CASE 8 contract)
        gameState.stars = getStars();
        postGameComplete();
        endGame(false);
        return;
      }

      if (roundJustPlayed === gameState.totalRounds) {
        // Final round complete with lives > 0 → Victory path
        endGame(true);
        return;
      }

      // Inter-stage breather between R5↔R6 and R10↔R11 (lives > 0 only)
      if (roundJustPlayed === 5 || roundJustPlayed === 10) {
        showStageBreather(roundJustPlayed === 5 ? 1 : 2);
        return;
      }

      // Otherwise: next round intro
      showRoundIntro(roundJustPlayed + 1);
    }

    /* ====================================================================== */
    /* Round intro                                                               */
    /* ====================================================================== */
    async function showRoundIntro(n) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      var ttsText = 'Round ' + n;
      await transitionScreen.show({
        title: 'Round ' + n,
        icons: [],
        persist: true,
        buttons: [],
        onMounted: function () {
          (async function () {
            try {
              await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND });
            } catch (e) {}
            try {
              await playDynamicFeedback({
                audio_content: ttsText,
                subtitle: ttsText,
                sticker: STICKER_ROUND
              });
            } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          })();
        }
      });

      // Safety timeout if audio stalls. Use `<` not `!==` so we only fire if the
      // game has not YET reached round n. Once it has advanced, do nothing —
      // a stale `!==` check would yank the game backwards across rounds.
      setTimeout(function () {
        try {
          if (gameState.gameEnded) return;
          if (gameState.currentRound + 1 < n) {
            try { transitionScreen.hide(); } catch (e) {}
            renderRound(n);
          }
        } catch (e) {}
      }, 9000);
    }

    /* ====================================================================== */
    /* Stage breather                                                            */
    /* ====================================================================== */
    async function showStageBreather(stageJustFinished) {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      var nextRoundNum = stageJustFinished === 1 ? 6 : 11;
      var avg = getAvgCorrectMs();

      var subtitle;
      if (correctCount === 0) {
        subtitle = 'No correct answers yet — aim for under 2 seconds for three stars.';
      } else {
        subtitle = 'Average so far: ' + (avg / 1000).toFixed(1) + ' seconds. Aim for under 2 seconds for three stars.';
      }

      await transitionScreen.show({
        title: 'Stage ' + stageJustFinished + ' complete',
        subtitle: subtitle,
        icons: ['🎯'],
        persist: true,
        buttons: [{
          text: "I'm ready",
          type: 'primary',
          action: function () {

            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            showRoundIntro(nextRoundNum);
          }
        }],
        onMounted: function () {
          (async function () {
            try {
              await safePlaySound('sound_level_transition', { sticker: STICKER_LEVEL });
            } catch (e) {}

              await playDynamicFeedback({
                audio_content: subtitle,
                subtitle: subtitle,
                sticker: STICKER_LEVEL
              });
            } catch (e) {}
          })();
        }
      });
    }

    /* ====================================================================== */
    /* End-of-game                                                               */
    /* ====================================================================== */
    function endGame(victory) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;

      // Stop the timer at end of gameplay (PART-006 mandatory rule)
      try {
        gameState.timerIntentionallyPaused = true;
        if (timer && timer.pause) timer.pause();
      } catch (e) {}

      gameState.stars = getStars();

      if (victory) {
        gameState.phase = 'results';
        syncDOM();
        postGameComplete();
        showVictory();
      } else {
        gameState.phase = 'game_over';
        syncDOM();
        postGameComplete();
        showGameOver();
      }
      trackEvent('game_end', { victory: victory, stars: gameState.stars, score: gameState.score });
    }

    function _victoryClaimAction() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
      try { transitionScreen.hide(); } catch (e) {}
      showStarsCollected();
    }
    function _victoryPlayAgainAction() {

    async function showVictory() {

      try { if (floatingBtn) floatingBtn.setMode('hidden'); } catch (e) {}
      await transitionScreen.show({

    /* ====================================================================== */
    /* Answer carousel                                                           */
    /* ====================================================================== */
    function renderAnswerSlide(container, round) {
      if (!container || !round || !round.answer) return;
      var a = round.answer;
      var html = '';
      html += '<div class="doubles-answer-card">';
      html += '<div class="doubles-answer-prompt">' + escapeHTML(a.prompt) + '</div>';
      html += '<div class="doubles-answer-options">';
      for (var i = 0; i < a.options.length; i++) {
        var cls = (i === a.correctIndex) ? 'doubles-answer-pill solved-correct' : 'doubles-answer-pill';
        html += '<div class="' + cls + '">' + escapeHTML(String(a.options[i])) + '</div>';
      }
      html += '</div>';
      html += '<div class="doubles-answer-explanation">' + escapeHTML(a.explanation) + '</div>';
      html += '</div>';
      container.innerHTML = html;
    }

    function escapeHTML(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function buildAnswerSlidesForAllRounds() {
      var rounds = gameState.activeRounds;
      var slides = [];
      for (var i = 0; i < rounds.length; i++) {
        (function (r) {
          slides.push({
            render: function (container) { renderAnswerSlide(container, r); }
          });
        })(rounds[i]);
      }
      return slides;
    }

    function showAnswerCarousel() {
      try {
        answerComponent.show({ slides: buildAnswerSlidesForAllRounds() });
      } catch (e) {}
      try {
        if (floatingBtn) floatingBtn.setMode('next');
      } catch (e) {}
      // The carousel renders below the Stars Collected card; on short viewports
      // the player would have to scroll to discover it. Pull it into view.
      try {
        setTimeout(function () {
          var slot = document.getElementById('mathai-answer-slot');
          if (slot && slot.scrollIntoView) {
            slot.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 200);
      } catch (e) {}
    }

    /* ====================================================================== */
    /* setupGame                                                                 */
    /* ====================================================================== */
    function setupGame() {
      var content = gameState.content || fallbackContent;
      gameState.content = content;
      gameState.totalRounds = content.totalRounds || 15;
      gameState.totalLives = content.totalLives || 3;
      gameState.lives = gameState.totalLives;
      gameState.activeRounds = getRounds();

      injectGameHTML();
      renderInitialState();

      // Show the preview LAST (after game DOM is rendered)
      try {
        previewScreen.show({
          instruction: content.previewInstruction || fallbackContent.previewInstruction,
          audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
          showGameOnPreview: content.showGameOnPreview === true,
          onComplete: function (previewData) { startGameAfterPreview(previewData); }
        });
      } catch (e) {
        console.error('[previewScreen.show failed]', e && e.message, e);
        if (typeof Sentry !== 'undefined') Sentry.captureException(e);
      }
    }

    function startGameAfterPreview(previewData) {
      gameState.previewResult = previewData || {};
      gameState.duration_data.preview = gameState.duration_data.preview || [];
      gameState.duration_data.preview.push({ duration: (previewData && previewData.duration) || 0 });

      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();

      // Show + initialize progress bar (start at 0)
      try {
        if (progressBar) {
          progressBar.show();
          progressBar.update(0, gameState.totalLives);
        }
      } catch (e) {}

      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex] });
      try {
        if (signalCollector && signalCollector.recordViewEvent) {
          signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' });
        }
      } catch (e) {}

      showWelcome();
    }

        icons: ['👋'],

        buttons: [{
          text: "Let's go!",
          type: 'primary',

            try { if (FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            showRoundIntro(1);
          }
        }],
        onMounted: function () {
          (async function () {
            try {
              await safePlaySound('sound_level_transition', { sticker: STICKER_LEVEL });
            } catch (e) {}
            try {
              await playDynamicFeedback({

              });

          })();

    /* ====================================================================== */
    /* Restart                                                                   */
    /* ====================================================================== */
    function resetGameState() {
      gameState.phase = 'gameplay';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.responseMsByRound = {};
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState._gameCompletePosted = false;
      gameState.stars = 0;
      gameState.correctAnswer = null;
      gameState.progress = 0;
      gameState.duration_data = { startTime: null, endTime: null, preview: gameState.duration_data.preview || [] };
      gameState.activeRounds = getRounds();
      gameState._timerStarted = false;
      gameState.timerIntentionallyPaused = false;

      // Reset stopwatch to 00:00 and pause
      try {
        if (timer) {
          if (timer.reset) timer.reset();
          if (timer.pause) timer.pause();
        }
      } catch (e) {}

      // Tear down AnswerComponent state
      try {
        if (answerComponent && answerComponent.update) {
          answerComponent.update({ slides: [] });
        }
        if (answerComponent && answerComponent.hide) answerComponent.hide();
      } catch (e) {}
    }

    function restartGame() {
      // Rotate set BEFORE resetGameState — new round-slice in place before round 1
      var sets = getAvailableSets((gameState.content && gameState.content.rounds) || fallbackContent.rounds);
      gameState.setIndex = (gameState.setIndex + 1) % sets.length;
      resetGameState();

      try { if (signalCollector && signalCollector.reset) signalCollector.reset(); } catch (e) {}

      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();

      // Safety-net reset of progress bar
      try { if (progressBar) progressBar.update(0, gameState.totalLives); } catch (e) {}

      trackEvent('game_start', { totalRounds: gameState.totalRounds, set: SETS[gameState.setIndex], restart: true });
      // Skip Preview + Welcome → straight to Round 1 intro
      showRoundIntro(1);
    }

    /* ====================================================================== */
    /* Postmessage handling                                                      */
    /* ====================================================================== */
    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      var t = event.data.type;
      var data = event.data.data || {};
      if (t === 'game_init') {
        gameState.phase = 'playing';
        if (data.content) gameState.content = data.content;
        // PART-010: store signalConfig from game_init data
        gameState.signalConfig = data.signalConfig || {};
        if (data.signalConfig && signalCollector && signalCollector.applyConfig) {
          try { signalCollector.applyConfig(data.signalConfig); } catch (e) {}
        }
        if (data.signalConfig) {
          gameState._signalConfig = data.signalConfig;
        }
        try {
          if (signalCollector) {
            signalCollector.gameId = 'doubles';
            if (data.sessionId) signalCollector.sessionId = data.sessionId;
            if (data.studentId) signalCollector.studentId = data.studentId;
            if (data.contentSetId) signalCollector.contentSetId = data.contentSetId;
            if (data.signalConfig && data.signalConfig.flushUrl) signalCollector.flushUrl = data.signalConfig.flushUrl;
            if (data.signalConfig && data.signalConfig.playId) signalCollector.playId = data.signalConfig.playId;
            if (signalCollector.startFlushing) {
              try { signalCollector.startFlushing(); } catch (e) {}
            }
          }
        } catch (e) {}
        syncDOM();
        setupGame();
      }
    }

    /* ====================================================================== */
    /* DOMContentLoaded                                                          */
    /* ====================================================================== */
    document.addEventListener('DOMContentLoaded', function () {
      // 1. Kick off package readiness gate
      waitForPackages().then(function () {
        try {
          // 2. FeedbackManager.init
          var initP = FeedbackManager.init && FeedbackManager.init();
          var doInit = initP && initP.then ? initP : Promise.resolve();
          doInit.then(function () {
            try {
              // 3. SignalCollector
              try {
                signalCollector = new SignalCollector({
                  sessionId: 'doubles-' + Date.now(),
                  studentId: 'standalone',
                  gameId: 'doubles',
                  contentSetId: 'fallback'
                });
                window.signalCollector = signalCollector;
              } catch (e) {
                console.error('[SignalCollector ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              // 4. ScreenLayout.inject
              try {
                ScreenLayout.inject('app', {
                  slots: {
                    previewScreen: true,
                    progressBar: true,
                    transitionScreen: true,
                    floatingButton: true,
                    answerComponent: true
                  }
                });
              } catch (e) {
                console.error('[ScreenLayout.inject failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              // 5. Mount timer container inside preview header center
              mountTimerInsideHeader();

              // 6. Build play-area HTML
              injectGameHTML();
              renderInitialState();

              // 7. TimerComponent (count-up, autoStart: false)
              try {
                timer = new TimerComponent('timer-container', {
                  timerType: 'increase',
                  format: 'min',
                  startTime: 0,
                  autoStart: false
                });
              } catch (e) {
                console.error('[TimerComponent ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              // 9. VisibilityTracker — pause overlay via built-in PopupComponent (CASE 14/15)
              try {
                visibilityTracker = new VisibilityTracker({
                  popupProps: {
                    title: 'Paused',
                    description: 'Tap Resume to continue.',
                    primaryText: 'Resume'
                  },
                  onInactive: function () {
                    try { FeedbackManager.sound.pause(); } catch (e) {}
                    try { FeedbackManager.stream.pauseAll(); } catch (e) {}
                    try {
                      if (timer && !gameState.timerIntentionallyPaused) timer.pause();
                    } catch (e) {}
                    try { if (previewScreen) previewScreen.pause(); } catch (e) {}
                  },
                  onResume: function () {
                    try { FeedbackManager.sound.resume(); } catch (e) {}
                    try { FeedbackManager.stream.resumeAll(); } catch (e) {}
                    try {
                      if (timer && !gameState.timerIntentionallyPaused) timer.resume();
                    } catch (e) {}
                    try { if (previewScreen) previewScreen.resume(); } catch (e) {}
                  }
                });
              } catch (e) {
                console.error('[VisibilityTracker ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              // 10. ProgressBar
              try {
                progressBar = new ProgressBarComponent({
                  slotId: 'mathai-progress-slot',
                  totalRounds: 15,
                  totalLives: 3
                });
              } catch (e) {
                console.error('[ProgressBarComponent ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              // HEART_OVERRIDE — swap rendered red ❤️ with dark 🖤 inside the
              // ProgressBar's lives span. Empty 🤍 hearts stay untouched (light).
              try {
                var slot = document.getElementById('mathai-progress-slot');
                if (slot) {
                  var swapHearts = function () {
                    var span = slot.querySelector('.mathai-pb-lives');
                    if (!span) return;
                    var current = span.textContent || '';
                    var swapped = current.replace(/❤️|❤/g, '🖤');
                    if (swapped !== current) span.textContent = swapped;
                  };
                  swapHearts();
                  var heartObserver = new MutationObserver(swapHearts);
                  heartObserver.observe(slot, { childList: true, subtree: true, characterData: true });
                }
              } catch (e) {}

              // 11. TransitionScreen
              try {
                transitionScreen = new TransitionScreenComponent({
                  slotId: 'mathai-transition-slot'
                });
              } catch (e) {
                console.error('[TransitionScreenComponent ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              // 12. PreviewScreen
              try {
                previewScreen = new PreviewScreenComponent({
                  slotId: 'mathai-preview-slot'
                });
              } catch (e) {
                console.error('[PreviewScreenComponent ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              // FloatingButton
              try {
                floatingBtn = new FloatingButtonComponent({
                  slotId: 'mathai-floating-button-slot'
                });
              } catch (e) {
                console.error('[FloatingButtonComponent ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              // AnswerComponent
              try {
                answerComponent = new AnswerComponentComponent({
                  slotId: 'mathai-answer-slot'
                });
              } catch (e) {
                console.error('[AnswerComponentComponent ctor failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              // Wire FloatingButton 'next' single-stage exit
              try {
                if (floatingBtn && floatingBtn.on) {
                  floatingBtn.on('next', function () {
                    try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
                    try { if (answerComponent) answerComponent.destroy(); } catch (e) {}
                    try { if (previewScreen) previewScreen.destroy(); } catch (e) {}
                    try { if (floatingBtn) floatingBtn.destroy(); } catch (e) {}
                  });
                }
              } catch (e) {}

              // 13. Audio preload
              try {
                FeedbackManager.sound.preload([
                  { id: 'correct_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
                  { id: 'incorrect_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                  { id: 'sound_life_lost',          url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
                  { id: 'rounds_sound_effect',      url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
                  { id: 'sound_level_transition',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1756742499143.mp3' },
                  { id: 'victory_sound_effect',     url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
                  { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
                  { id: 'game_over_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
                  { id: 'tap_sound',                url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
                ]);
              } catch (e) {
                console.error('[FeedbackManager.preload failed]', e && e.message, e);
                if (typeof Sentry !== 'undefined') Sentry.captureException(e);
              }

              // 14. Register message listener BEFORE game_ready
              window.addEventListener('message', handlePostMessage);

              // 15. Send game_ready
              try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

              // 16. setupGame
              setupGame();
            } catch (e) {
              console.error('[init inner] ' + (e && e.message), e);
              if (typeof Sentry !== 'undefined') Sentry.captureException(e);
            }
          }, function (e) {
            console.error('[FeedbackManager.init failed]', e && e.message, e);
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
          });
        } catch (e) {
          console.error('[init outer] ' + (e && e.message), e);
          if (typeof Sentry !== 'undefined') Sentry.captureException(e);
        }
      }, function (err) {
        console.error('[waitForPackages rejected] ' + (err && err.message));
        if (typeof Sentry !== 'undefined') Sentry.captureException(err);
      });

      /* Standalone fallback — runs INDEPENDENTLY of waitForPackages */
      setTimeout(function () {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;

        var missing = [];
        if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
        if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
        if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
        if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
        if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
        if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
        if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
        if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
        if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
        if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');
        if (missing.length > 0) {
          var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
          console.error('[' + msg + ']');
          if (typeof Sentry !== 'undefined') Sentry.captureMessage(msg);
          var gc = document.getElementById('gameContent') || document.getElementById('app') || document.body;
          if (gc) {
            gc.innerHTML =
              '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">' +
              'Game failed to load — please refresh.' +
              '</div>';
          }
          return;
        }
        // All classes defined — but we did NOT reach the inner init flow
        // (waitForPackages resolved late). The inner flow is the source of
        // truth and will boot via game_init / setupGame. Nothing else to do.
      }, 2000);

      /* Window exposures */
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.startGame = setupGame;
      window.renderRound = renderRound;
      // Harness convenience: jump-to-round helper. NOTE: do NOT declare a local
      // `function loadRound() {}` — function declarations auto-attach to window
      // and would shadow this assignment, causing infinite recursion.
      window.loadRound = function (n) {
        try { renderRound(n); } catch (e) {}
      };
      window.debugGame = function () { return gameState; };
      window.debugAudio = function () { return FeedbackManager; };
      window.testAudio = function () { return safePlaySound('correct_sound_effect', { sticker: STICKER_CORRECT }); };
      window.testPause = function () {
        try { if (visibilityTracker && visibilityTracker.triggerInactive) visibilityTracker.triggerInactive(); } catch (e) {}
      };
      window.testResume = function () {
        try { if (visibilityTracker && visibilityTracker.triggerResume) visibilityTracker.triggerResume(); } catch (e) {}
      };
    });

    /* ====================================================================== */
    /* Mount the timer DIV as a direct child of #mathai-preview-slot              */
    /* (positioned ancestor) per PART-006 — CSS absolute-centers it top-center.  */
    /* ====================================================================== */
    function mountTimerInsideHeader() {
      var slot = document.getElementById('mathai-preview-slot');
      if (!slot) return;
      var existing = document.getElementById('timer-container');
      if (existing) {
        if (existing.parentNode !== slot) slot.appendChild(existing);
        return;
      }
      var div = document.createElement('div');
      div.id = 'timer-container';
      slot.appendChild(div);
    }
  </script>
</body>
</html>
