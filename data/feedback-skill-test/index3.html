<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jelly Doods</title>

  <!-- 1. SentryConfig package -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

  <!-- 2. initSentry() function definition -->
  <script>
    function initSentry() {
      try {
        if (typeof Sentry === 'undefined' || typeof SentryConfig === 'undefined') return;
        var config = SentryConfig.getConfig ? SentryConfig.getConfig() : {};
        if (!config.dsn) return;
        Sentry.init({
          dsn: config.dsn,
          environment: config.environment || 'production',
          release: config.release || 'game_jelly_doods@1.0.0',
          integrations: [
            Sentry.browserTracingIntegration ? Sentry.browserTracingIntegration() : null,
            Sentry.replayIntegration ? Sentry.replayIntegration() : null,
            Sentry.captureConsoleIntegration ? Sentry.captureConsoleIntegration({ levels: ['error'] }) : null,
            Sentry.browserProfilingIntegration ? Sentry.browserProfilingIntegration() : null
          ].filter(Boolean),
          tracesSampleRate: config.tracesSampleRate || 0.1,
          replaysSessionSampleRate: config.replaysSessionSampleRate || 0.1,
          replaysOnErrorSampleRate: config.replaysOnErrorSampleRate || 1.0,
          profilesSampleRate: config.profilesSampleRate || 0.1
        });
      } catch (e) {
        console.error('Sentry init error:', JSON.stringify({ error: e.message }, null, 2));
      }
    }
  </script>

  <!-- 3. Sentry SDK -->
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

  <!-- 4. Initialize Sentry on load -->
  <script>window.addEventListener('load', initSentry);</script>

  <!-- 5-7. Game packages -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    /* === CSS Variables (PART-020) === */
    :root {
      --mathai-green: #219653;
      --mathai-light-green: #EAFBF1;
      --mathai-red: #E35757;
      --mathai-light-red: #FDECEC;
      --mathai-blue: #2563eb;
      --mathai-light-blue: #EBF0FF;
      --mathai-orange: #F2994A;
      --mathai-light-orange: #FFF3E0;
      --mathai-gray: #828282;
      --mathai-light-gray: #F2F2F2;
      --mathai-border-gray: #E0E0E0;
      --mathai-white: #FFFFFF;
      --mathai-text-primary: #4a4a4a;
      --mathai-font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mathai-font-size-title: 24px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-label: 14px;
      --mathai-font-size-small: 12px;

      /* Jelly colors */
      --jelly-red: #FF6B6B;
      --jelly-red-light: #FFD4D4;
      --jelly-blue: #4DABF7;
      --jelly-blue-light: #D0EBFF;
      --jelly-yellow: #FFD43B;
      --jelly-yellow-light: #FFF3BF;
    }

    /* === ScreenLayout v2 overrides === */
    .mathai-layout-root { max-width: 480px; margin: 0 auto; }

    .mathai-layout-playarea {
      flex-direction: column !important;
      align-items: center !important;
      padding: 8px 16px !important;
      overflow-y: auto !important;
    }

    /* === Transition Screen overrides === */
    .mathai-ts-screen.active {
      flex: 1;
      justify-content: flex-start;
      padding-top: 16px;
    }
    .mathai-ts-card {
      min-height: 50dvh;
    }
    .mathai-ts-btn {
      min-height: 44px !important;
    }

    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary, #4a4a4a);
      -webkit-font-smoothing: antialiased;
    }

    /* === Hidden utility === */
    .hidden { display: none !important; }

    /* === Game Block === */
    .game-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 16px;
      gap: 12px;
    }

    /* === Instruction Area === */
    .instruction-area {
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
      padding: 0 4px;
      text-align: center;
    }

    .instruction-text {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-text-primary, #4a4a4a);
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .instruction-text strong { font-weight: 700; }

    .instruction-text-sub {
      font-size: var(--mathai-font-size-label);
      color: var(--mathai-gray);
      line-height: 1.4;
    }

    /* === Stats Bar === */
    .stats-bar {
      display: flex;
      gap: 24px;
      justify-content: center;
      width: 100%;
      max-width: 340px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-label {
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: var(--mathai-font-size-title);
      font-weight: 700;
      color: var(--mathai-text-primary, #4a4a4a);
    }

    /* === Grid (4x4) === */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols), 1fr);
      gap: 4px;
      max-width: 320px;
      width: 100%;
      margin: 0 auto;
      background: #DDD;
      border-radius: 12px;
      padding: 4px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .grid-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--mathai-white);
      transition: all 0.2s ease;
      overflow: hidden;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    .grid-cell.has-piece {
      cursor: pointer;
    }

    .grid-cell.empty {
      cursor: default;
    }

    /* Jelly piece styling */
    .jelly-piece {
      width: 85%;
      height: 85%;
      border-radius: 30%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: transform 0.15s ease;
      position: relative;
    }

    .jelly-piece::after {
      content: '';
      position: absolute;
      top: 15%;
      left: 25%;
      width: 30%;
      height: 20%;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
    }

    /* Color variants */
    .jelly-piece.color-red { background: var(--jelly-red); }
    .jelly-piece.color-blue { background: var(--jelly-blue); }
    .jelly-piece.color-yellow { background: var(--jelly-yellow); }

    /* Selected state */
    .grid-cell.selected {
      outline: 3px solid var(--mathai-blue);
      outline-offset: -1px;
    }

    .grid-cell.selected .jelly-piece {
      transform: scale(1.05);
    }

    /* Merge animation */
    @keyframes mergeFlash {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(0); opacity: 0; }
    }

    .jelly-piece.merging {
      animation: mergeFlash 0.4s ease forwards;
    }

    /* === Buttons (PART-022) === */
    .btn-container {
      display: flex;
      gap: 12px;
      justify-content: center;
      width: 100%;
      max-width: 340px;
      margin: 4px auto 0;
    }

    .game-btn {
      padding: 12px 32px;
      border: none;
      border-radius: 12px;
      font-size: var(--mathai-font-size-body);
      font-weight: 600;
      font-family: var(--mathai-font-family);
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 44px;
      flex: 1;
    }

    .btn-primary {
      background: var(--mathai-green);
      color: var(--mathai-white);
    }
    .btn-primary:hover { filter: brightness(0.9); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: var(--mathai-light-gray);
      color: var(--mathai-text-primary, #4a4a4a);
      border: 2px solid #ddd;
    }
    .btn-secondary:hover { background: #e8e8e8; }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

    .question-text-container {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      padding: 4px 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    /* ========================================
       Jelly Doods — game_jelly_doods
       ======================================== */

    // Sticker URLs
    var CORRECT_STICKER_URL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-20.gif';
    var VICTORY_STICKER_URL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-98.gif';
    var GAME_COMPLETE_STICKER_URL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-25.gif';
    var WELCOME_STICKER_URL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1743761988949-44.gif';

    // Fallback content
    var fallbackContent = {
      puzzle: {
        grid: [
          [null,                     {color:'red', id:1},    null,                    null],
          [{color:'yellow', id:1},   null,                   {color:'blue', id:1},    null],
          [null,                     null,                   null,                    {color:'yellow', id:2}],
          [{color:'red', id:2},      null,                   {color:'blue', id:2},    null]
        ],
        colors: ['red', 'blue', 'yellow'],
        optimalMoves: 5,
        solution: [
          { piece: {row: 0, col: 1}, direction: 'down' },
          { piece: {row: 3, col: 0}, direction: 'right' },
          { piece: {row: 1, col: 2}, direction: 'down' },
          { piece: {row: 1, col: 0}, direction: 'right' },
          { piece: {row: 2, col: 3}, direction: 'up' }
        ]
      }
    };

    // Game State (PART-007)
    window.gameState = {
      gameId: 'game_jelly_doods',
      contentSetId: null,
      signalConfig: {},
      sessionHistory: [],
      currentRound: 0,
      totalRounds: 1,
      score: 0,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      gameEnded: false,
      content: null,
      duration_data: {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0,
        currentTime: null
      },
      grid: [],
      moveCount: 0,
      optimalMoves: 0,
      moveHistory: [],
      puzzleData: null,
      solved: false,
      selectedPiece: null,
      currentDynamicAudio: null,
      voGameStartPlayed: false,
      isProcessing: false
    };

    var timer = null;
    var visibilityTracker = null;
    var signalCollector = null;
    var transitionScreen = null;
    var visibilityTrackerConfig = null;

    // === Helper Functions ===

    function deepCopyGrid(grid) {
      return JSON.parse(JSON.stringify(grid));
    }

    function gridSnapshot(grid) {
      var result = [];
      for (var r = 0; r < grid.length; r++) {
        var rowArr = [];
        for (var c = 0; c < grid[r].length; c++) {
          rowArr.push(grid[r][c] ? grid[r][c].color : null);
        }
        result.push(rowArr);
      }
      return result;
    }

    function countPieces(grid) {
      var count = 0;
      for (var r = 0; r < grid.length; r++) {
        for (var c = 0; c < grid[r].length; c++) {
          if (grid[r][c] !== null) count++;
        }
      }
      return count;
    }

    function formatTime(seconds) {
      var mins = Math.floor(seconds / 60);
      var secs = seconds % 60;
      return mins + ':' + (secs < 10 ? '0' : '') + secs;
    }

    // === waitForPackages (PART-003) ===

    async function waitForPackages() {
      var timeout = 10000;
      var interval = 50;
      var elapsed = 0;
      while (
        typeof ScreenLayout === 'undefined' ||
        typeof TransitionScreenComponent === 'undefined' ||
        typeof FeedbackManager === 'undefined' ||
        typeof VisibilityTracker === 'undefined' ||
        typeof SignalCollector === 'undefined' ||
        typeof TimerComponent === 'undefined'
      ) {
        if (elapsed >= timeout) throw new Error('Packages failed to load within 10s');
        await new Promise(function(resolve) { setTimeout(resolve, interval); });
        elapsed += interval;
      }
      console.log('[game_jelly_doods] All packages loaded');
    }

    // === Event Tracking ===

    function trackEvent(type, target, data) {
      var event = { type: type, target: target, timestamp: Date.now(), data: data || {} };
      gameState.events.push(event);
      console.log('Event:', JSON.stringify(event, null, 2));
    }

    function recordAttempt(data) {
      var attempt = {
        attempt_timestamp: new Date().toISOString(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) / 1000 : 0,
        input_of_user: data.input_of_user,
        attempt_number: gameState.attempts.length + 1,
        correct: data.correct,
        metadata: data.metadata
      };
      gameState.attempts.push(attempt);
    }

    // === Grid Rendering ===

    function renderGrid() {
      var gridEl = document.getElementById('game-grid');
      if (!gridEl) return;
      gridEl.innerHTML = '';
      for (var r = 0; r < 4; r++) {
        for (var c = 0; c < 4; c++) {
          var cell = document.createElement('div');
          cell.className = 'grid-cell';
          cell.setAttribute('data-row', r);
          cell.setAttribute('data-col', c);
          cell.setAttribute('data-signal-id', 'cell-' + r + '-' + c);

          var piece = gameState.grid[r] ? gameState.grid[r][c] : null;
          if (piece !== null && piece !== undefined) {
            cell.className += ' has-piece';
            var jellyDiv = document.createElement('div');
            jellyDiv.className = 'jelly-piece color-' + piece.color;
            cell.appendChild(jellyDiv);
          } else {
            cell.className += ' empty';
          }

          if (gameState.selectedPiece && gameState.selectedPiece.row === r && gameState.selectedPiece.col === c) {
            cell.className += ' selected';
          }

          gridEl.appendChild(cell);
        }
      }

      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('content_render', {
            screen: 'gameplay',
            content_snapshot: {
              grid_state: gridSnapshot(gameState.grid),
              move_count: gameState.moveCount,
              pieces_remaining: countPieces(gameState.grid),
              trigger: 'round_start'
            },
            components: {
              timer: timer ? { value: timer.getCurrentTime(), state: 'running' } : null,
              progress: { current: 1, total: 1 }
            }
          });
        } catch(e) {}
      }
    }

    // === Grid Listeners (attached ONCE) ===

    var gridListenersAttached = false;
    var swipeStartX = 0;
    var swipeStartY = 0;
    var SWIPE_THRESHOLD = 30;

    function attachGridListeners() {
      if (gridListenersAttached) return;
      gridListenersAttached = true;
      var grid = document.getElementById('game-grid');
      if (!grid) return;

      grid.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        var cellEl = e.target.closest('.grid-cell');
        if (!cellEl) return;
        var r = parseInt(cellEl.getAttribute('data-row'));
        var c = parseInt(cellEl.getAttribute('data-col'));
        handleCellTap(r, c);
        swipeStartX = e.clientX;
        swipeStartY = e.clientY;
      });

      document.addEventListener('pointerup', function(e) {
        if (!gameState.isActive || gameState.solved || gameState.isProcessing) return;
        if (!gameState.selectedPiece) return;
        var dx = e.clientX - swipeStartX;
        var dy = e.clientY - swipeStartY;
        if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) return;
        if (Math.abs(dx) > Math.abs(dy)) {
          handleSwipe(dx > 0 ? 'right' : 'left');
        } else {
          handleSwipe(dy > 0 ? 'down' : 'up');
        }
      });
    }

    // === Cell Tap Handler ===

    function handleCellTap(row, col) {
      if (!gameState.isActive || gameState.solved || gameState.isProcessing) return;
      if (!gameState.grid[row] || gameState.grid[row][col] === null || gameState.grid[row][col] === undefined) return;

      // Toggle deselect
      if (gameState.selectedPiece && gameState.selectedPiece.row === row && gameState.selectedPiece.col === col) {
        gameState.selectedPiece = null;
        var allCells = document.querySelectorAll('.grid-cell');
        for (var i = 0; i < allCells.length; i++) {
          allCells[i].classList.remove('selected');
        }
        return;
      }

      gameState.selectedPiece = { row: row, col: col };

      // Update selection highlight WITHOUT full re-render
      var allCells = document.querySelectorAll('.grid-cell');
      for (var i = 0; i < allCells.length; i++) {
        allCells[i].classList.remove('selected');
      }
      var targetCell = document.querySelector('.grid-cell[data-row="' + row + '"][data-col="' + col + '"]');
      if (targetCell) {
        targetCell.classList.add('selected');
      }

      // Play tap SFX (fire-and-forget)
      try { FeedbackManager.sound.play('correct_sound_effect').catch(function(e) {}); } catch(e) {}

      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('visual_update', {
            screen: 'gameplay',
            content_snapshot: {
              type: 'piece_selected',
              selected_cell: { row: row, col: col },
              piece_color: gameState.grid[row][col] ? gameState.grid[row][col].color : null
            }
          });
        } catch(e) {}
      }
    }

    // === Swipe Handler ===

    function handleSwipe(direction) {
      if (!gameState.isActive || gameState.solved || gameState.isProcessing) return;
      if (!gameState.selectedPiece) return;

      var row = gameState.selectedPiece.row;
      var col = gameState.selectedPiece.col;
      var piece = gameState.grid[row][col];
      if (!piece) return;

      var savedGrid = deepCopyGrid(gameState.grid);
      var savedMoveCount = gameState.moveCount;

      var dr = 0, dc = 0;
      if (direction === 'up') dr = -1;
      else if (direction === 'down') dr = 1;
      else if (direction === 'left') dc = -1;
      else if (direction === 'right') dc = 1;

      var destRow = row, destCol = col;
      var merged = false;
      var mergeTargetRow = -1, mergeTargetCol = -1;

      while (true) {
        var nextRow = destRow + dr;
        var nextCol = destCol + dc;

        // Check bounds
        if (nextRow < 0 || nextRow > 3 || nextCol < 0 || nextCol > 3) break;

        var occupant = gameState.grid[nextRow][nextCol];
        if (occupant !== null && occupant !== undefined) {
          // Check same color → merge
          if (occupant.color === piece.color) {
            merged = true;
            mergeTargetRow = nextRow;
            mergeTargetCol = nextCol;
            gameState.grid[nextRow][nextCol] = null;
          }
          // Different color or same color (after marking merge) → blocked
          break;
        }

        // Empty cell — advance
        destRow = nextRow;
        destCol = nextCol;
      }

      // No movement check
      if (destRow === row && destCol === col && !merged) return;

      // Save undo
      gameState.moveHistory.push({ grid: savedGrid, moveCount: savedMoveCount });

      // Move piece
      gameState.grid[row][col] = null;
      if (!merged) {
        gameState.grid[destRow][destCol] = piece;
      }

      gameState.moveCount++;
      gameState.selectedPiece = null;

      // Update display
      var moveCounter = document.getElementById('move-counter');
      if (moveCounter) moveCounter.textContent = '' + gameState.moveCount;
      var undoBtn = document.getElementById('btn-undo');
      if (undoBtn) undoBtn.disabled = false;

      trackEvent('piece_slide', 'grid', { from: {row: row, col: col}, to: {row: destRow, col: destCol}, direction: direction, color: piece.color });
      if (merged) {
        trackEvent('piece_merge', 'grid', { color: piece.color, moveCount: gameState.moveCount });
      }

      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('visual_update', {
            screen: 'gameplay',
            content_snapshot: {
              type: merged ? 'piece_merged' : 'piece_slid',
              from: { row: row, col: col },
              to: { row: destRow, col: destCol },
              direction: direction,
              color: piece.color,
              pieces_remaining: countPieces(gameState.grid),
              trigger: 'user_action'
            }
          });
        } catch(e) {}
      }

      // Merge animation
      if (merged) {
        gameState.isProcessing = true;
        var originCell = document.querySelector('.grid-cell[data-row="' + row + '"][data-col="' + col + '"]');
        var targetCell = document.querySelector('.grid-cell[data-row="' + mergeTargetRow + '"][data-col="' + mergeTargetCol + '"]');
        if (originCell) { var oj = originCell.querySelector('.jelly-piece'); if (oj) oj.classList.add('merging'); }
        if (targetCell) { var tj = targetCell.querySelector('.jelly-piece'); if (tj) tj.classList.add('merging'); }
        setTimeout(function() {
          gameState.isProcessing = false;
          renderGrid();
          checkSolved();
        }, 400);
      } else {
        renderGrid();
        checkSolved();
      }
    }

    // === Check Solved ===

    function checkSolved() {
      var remaining = countPieces(gameState.grid);
      if (remaining === 0) {
        gameState.solved = true;
        handlePuzzleSolved();
      }
    }

    // === Handle Puzzle Solved ===

    async function handlePuzzleSolved() {
      if (gameState.isProcessing) return;
      gameState.isProcessing = true;

      try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}

      gameState.score = 1;
      var totalTime = Math.round((Date.now() - gameState.startTime) / 1000);

      recordAttempt({
        input_of_user: gameState.moveCount + ' moves',
        correct: true,
        metadata: {
          round: 1,
          question: 'Solve the jelly sliding puzzle',
          correctAnswer: gameState.optimalMoves + ' moves',
          validationType: 'function'
        }
      });

      trackEvent('puzzle_solved', 'game', { moves: gameState.moveCount, optimal: gameState.optimalMoves, time: totalTime });

      if (signalCollector) {
        try {
          signalCollector.recordCustomEvent('round_solved', { correct: true, moves: gameState.moveCount });
          signalCollector.recordViewEvent('feedback_display', {
            screen: 'gameplay',
            content_snapshot: {
              feedback_type: 'correct',
              message: 'Wonderful! Puzzle solved!',
              audio_id: 'dynamic_feedback'
            }
          });
        } catch(e) {}
      }

      // Play correct SFX with sticker
      try {
        await FeedbackManager.sound.play('correct_sound_effect', {
          sticker: { image: CORRECT_STICKER_URL, duration: 2, type: 'IMAGE_GIF' }
        });
      } catch(e) { console.error('Correct SFX error:', JSON.stringify({ error: e.message }, null, 2)); }

      // Play dynamic TTS
      try {
        gameState.currentDynamicAudio = FeedbackManager.playDynamicFeedback({
          audio_content: 'wonderful! you solved the puzzle!',
          subtitle: 'Wonderful! Puzzle solved!',
          sticker: CORRECT_STICKER_URL
        });
        await gameState.currentDynamicAudio;
      } catch(e) { console.error('Feedback error:', JSON.stringify({ error: e.message }, null, 2)); }
      gameState.currentDynamicAudio = null;

      setTimeout(function() { endGame(); }, 500);
    }

    // === Undo Move ===

    function undoMove() {
      if (!gameState.isActive || gameState.solved || gameState.isProcessing) return;
      if (gameState.moveHistory.length === 0) return;

      var previous = gameState.moveHistory.pop();
      gameState.grid = previous.grid;
      gameState.moveCount = previous.moveCount;
      gameState.selectedPiece = null;

      var moveCounter = document.getElementById('move-counter');
      if (moveCounter) moveCounter.textContent = '' + gameState.moveCount;
      var undoBtn = document.getElementById('btn-undo');
      if (undoBtn) undoBtn.disabled = gameState.moveHistory.length === 0;

      trackEvent('undo_move', 'game', { moveCount: gameState.moveCount });
      renderGrid();
    }

    // === Reset Puzzle ===

    function resetPuzzle() {
      if (!gameState.isActive || gameState.isProcessing) return;

      gameState.grid = deepCopyGrid(gameState.puzzleData.grid);
      gameState.moveCount = 0;
      gameState.moveHistory = [];
      gameState.selectedPiece = null;
      gameState.solved = false;

      var moveCounter = document.getElementById('move-counter');
      if (moveCounter) moveCounter.textContent = '0';
      var undoBtn = document.getElementById('btn-undo');
      if (undoBtn) undoBtn.disabled = true;

      trackEvent('reset_puzzle', 'game', {});
      if (signalCollector) {
        try { signalCollector.recordCustomEvent('reset_puzzle', {}); } catch(e) {}
      }
      renderGrid();
    }

    // === Setup Puzzle ===

    function setupPuzzle() {
      var puzzleData = gameState.content.puzzle;
      gameState.grid = deepCopyGrid(puzzleData.grid);
      gameState.optimalMoves = puzzleData.optimalMoves;
      gameState.puzzleData = {
        grid: deepCopyGrid(puzzleData.grid),
        optimalMoves: puzzleData.optimalMoves,
        colors: puzzleData.colors,
        solution: puzzleData.solution
      };
      gameState.moveCount = 0;
      gameState.moveHistory = [];
      gameState.solved = false;
      gameState.selectedPiece = null;

      var moveCounter = document.getElementById('move-counter');
      if (moveCounter) moveCounter.textContent = '0';
      var optimalDisplay = document.getElementById('optimal-display');
      if (optimalDisplay) optimalDisplay.textContent = '' + puzzleData.optimalMoves;
      var undoBtn = document.getElementById('btn-undo');
      if (undoBtn) undoBtn.disabled = true;

      renderGrid();

      var gameScreen = document.getElementById('game-screen');
      if (gameScreen) gameScreen.classList.remove('hidden');

      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('screen_transition', {
            screen: 'gameplay',
            metadata: { transition_from: 'start' }
          });
        } catch(e) {}
      }
    }

    // === Start Game ===

    function startGame() {
      try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
      try { FeedbackManager.sound.stopAll(); } catch(e) {}
      if (transitionScreen) { try { transitionScreen.hide(); } catch(e) {} }

      if (!gameState.content) gameState.content = fallbackContent;

      gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.isActive = true;
      gameState.gameEnded = false;

      if (timer) {
        try {
          timer.resume();
          timer.reset();
          timer.start();
        } catch(e) {}
      }

      trackEvent('game_start', 'game');
      setupPuzzle();
    }

    // === Show Results ===

    function showResults(metrics, stars) {
      var starsHTML = '';
      for (var i = 0; i < 3; i++) {
        if (i < stars) {
          starsHTML += '<span style="font-size:36px;">⭐</span>';
        } else {
          starsHTML += '<span style="font-size:36px;opacity:0.3;">☆</span>';
        }
      }

      var metricsHTML = ''
        + '<div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:16px;">'
        + '  <div style="display:flex;gap:8px;justify-content:center;">' + starsHTML + '</div>'
        + '  <div style="width:100%;max-width:280px;display:flex;flex-direction:column;gap:12px;">'
        + '    <div style="display:flex;justify-content:space-between;padding:8px 12px;background:var(--mathai-light-gray);border-radius:8px;">'
        + '      <span style="font-size:14px;color:var(--mathai-gray);">Moves Used</span>'
        + '      <span style="font-size:14px;font-weight:700;">' + metrics.movesUsed + '</span>'
        + '    </div>'
        + '    <div style="display:flex;justify-content:space-between;padding:8px 12px;background:var(--mathai-light-gray);border-radius:8px;">'
        + '      <span style="font-size:14px;color:var(--mathai-gray);">Optimal Moves</span>'
        + '      <span style="font-size:14px;font-weight:700;">' + metrics.optimalMoves + '</span>'
        + '    </div>'
        + '    <div style="display:flex;justify-content:space-between;padding:8px 12px;background:var(--mathai-light-gray);border-radius:8px;">'
        + '      <span style="font-size:14px;color:var(--mathai-gray);">Time</span>'
        + '      <span style="font-size:14px;font-weight:700;">' + formatTime(metrics.time) + '</span>'
        + '    </div>'
        + '    <div style="display:flex;justify-content:space-between;padding:8px 12px;background:var(--mathai-light-gray);border-radius:8px;">'
        + '      <span style="font-size:14px;color:var(--mathai-gray);">Accuracy</span>'
        + '      <span style="font-size:14px;font-weight:700;">' + metrics.accuracy + '%</span>'
        + '    </div>'
        + '  </div>'
        + '</div>';

      var buttonText = stars >= 3 ? 'Play Again' : 'Retry for more stars';

      transitionScreen.show({
        title: stars >= 3 ? 'Excellent!' : (stars >= 2 ? 'Good Try!' : 'Keep Practicing!'),
        content: metricsHTML,
        persist: true,
        buttons: [{
          text: buttonText,
          type: stars >= 3 ? 'primary' : 'secondary',
          action: function() {
            try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
            try { FeedbackManager.sound.stopAll(); } catch(e) {}
            transitionScreen.hide();
            restartGame();
          }
        }]
      });
    }

    // === End Game ===

    async function endGame() {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;

      if (timer) { try { timer.pause(); } catch(e) {} }

      gameState.duration_data.currentTime = new Date().toISOString();
      var timeTaken = Math.round((Date.now() - gameState.startTime) / 1000);
      var ratio = gameState.optimalMoves > 0 ? gameState.moveCount / gameState.optimalMoves : 1;
      var stars = ratio <= 1.0 ? 3 : ratio <= 1.5 ? 2 : 1;
      var accuracy = gameState.moveCount > 0 ? Math.round((gameState.optimalMoves / gameState.moveCount) * 100) : 0;
      if (accuracy > 100) accuracy = 100;

      var metrics = {
        accuracy: accuracy,
        time: timeTaken,
        stars: stars,
        attempts: gameState.attempts,
        duration_data: gameState.duration_data,
        movesUsed: gameState.moveCount,
        optimalMoves: gameState.optimalMoves
      };

      console.log('Game End Metrics:', JSON.stringify(metrics, null, 2));
      trackEvent('game_end', 'game', metrics);

      // 1. recordViewEvent BEFORE seal
      var sealResult = null;
      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('screen_transition', {
            screen: 'results',
            metadata: { transition_from: 'gameplay' }
          });
          sealResult = signalCollector.seal();
        } catch(e) {}
      }

      // Add signal data from seal result
      var signalEventCount = (sealResult && typeof sealResult.eventCount === 'number') ? sealResult.eventCount : 0;
      var signalMetadata = (sealResult && sealResult.metadata) ? sealResult.metadata : {};

      // Add recommended fields
      metrics.totalLives = 1;
      metrics.tries = [gameState.attempts.length];

      // 2. Show results screen
      showResults(metrics, stars);

      // 3. postMessage BEFORE audio
      window.parent.postMessage({
        type: 'game_complete',
        data: {
          metrics: metrics,
          attempts: gameState.attempts,
          completedAt: Date.now(),
          signal_event_count: signalEventCount,
          signal_metadata: signalMetadata
        }
      }, '*');

      // 4. Play end-game audio based on stars
      try {
        if (stars >= 3) {
          await FeedbackManager.sound.play('victory_sound_effect', {
            sticker: { image: VICTORY_STICKER_URL, duration: 3, type: 'IMAGE_GIF' }
          });
          await FeedbackManager.sound.play('victory');
        } else if (stars >= 2) {
          await FeedbackManager.sound.play('game_complete_sound_effect', {
            sticker: { image: GAME_COMPLETE_STICKER_URL, duration: 3, type: 'IMAGE_GIF' }
          });
          await FeedbackManager.sound.play('game_complete_2_star');
        } else {
          await FeedbackManager.sound.play('game_complete_sound_effect', {
            sticker: { image: GAME_COMPLETE_STICKER_URL, duration: 3, type: 'IMAGE_GIF' }
          });
          await FeedbackManager.sound.play('game_complete_1_star');
        }
      } catch(e) { console.error('End game audio error:', JSON.stringify({ error: e.message }, null, 2)); }

      // 5. Guarded cleanup
      if (gameState.gameEnded) {
        if (timer) { try { timer.destroy(); } catch(e) {} timer = null; }
        if (visibilityTracker) { try { visibilityTracker.destroy(); } catch(e) {} visibilityTracker = null; }
        try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
      }
    }

    // === Restart Game ===

    function restartGame() {
      // Push session snapshot
      if (!gameState.sessionHistory) gameState.sessionHistory = [];
      gameState.sessionHistory.push({
        score: gameState.score,
        moves: gameState.moveCount,
        optimalMoves: gameState.optimalMoves,
        attempts: gameState.attempts.slice(0),
        timestamp: Date.now()
      });

      // Preserve fields
      var preserved = {
        content: gameState.content,
        contentSetId: gameState.contentSetId,
        signalConfig: gameState.signalConfig,
        sessionHistory: gameState.sessionHistory,
        voGameStartPlayed: gameState.voGameStartPlayed
      };

      // Reset gameplay fields
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.grid = [];
      gameState.moveCount = 0;
      gameState.moveHistory = [];
      gameState.solved = false;
      gameState.selectedPiece = null;
      gameState.isActive = false;
      gameState.gameEnded = false;
      gameState.isProcessing = false;
      gameState.currentDynamicAudio = null;
      gameState.startTime = null;
      gameState.duration_data = {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0,
        currentTime: null
      };

      // Restore preserved
      gameState.content = preserved.content;
      gameState.contentSetId = preserved.contentSetId;
      gameState.signalConfig = preserved.signalConfig;
      gameState.sessionHistory = preserved.sessionHistory;
      gameState.voGameStartPlayed = preserved.voGameStartPlayed;

      // Recreate SignalCollector
      try {
        signalCollector = new SignalCollector({
          sessionId: (window.gameVariableState && window.gameVariableState.sessionId) ? window.gameVariableState.sessionId : 'session_' + Date.now(),
          studentId: (window.gameVariableState && window.gameVariableState.studentId) ? window.gameVariableState.studentId : null,
          gameId: gameState.gameId,
          contentSetId: gameState.contentSetId
        });
        window.signalCollector = signalCollector;
        if (gameState.signalConfig && gameState.signalConfig.flushUrl) {
          signalCollector.flushUrl = gameState.signalConfig.flushUrl;
          signalCollector.playId = gameState.signalConfig.playId || null;
          signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
          signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
          signalCollector.startFlushing();
        }
      } catch(e) { console.error('SignalCollector restart error:', JSON.stringify({ error: e.message }, null, 2)); }

      // Recreate VisibilityTracker
      if (visibilityTrackerConfig) {
        try { visibilityTracker = new VisibilityTracker(visibilityTrackerConfig); } catch(e) {}
      }

      // Recreate Timer
      try {
        var timerContainer = document.getElementById('timer-container');
        if (!timerContainer) {
          var headerSlot = document.getElementById('mathai-header-slot');
          if (headerSlot) {
            timerContainer = document.createElement('div');
            timerContainer.id = 'timer-container';
            headerSlot.appendChild(timerContainer);
          }
        }
        timer = new TimerComponent('timer-container', {
          timerType: 'increase', format: 'min', startTime: 0, autoStart: false, endTime: 100000
        });
      } catch(e) {}

      trackEvent('game_restart', 'game');

      // Show start screen
      transitionScreen.show({
        icons: ['\uD83E\uDDCA'], iconSize: 'large',
        title: 'Jelly Doods', subtitle: 'Slide & merge the jellies!',
        persist: true,
        buttons: [{
          text: "I'm ready!",
          type: 'primary',
          action: function() {
            try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
            try { FeedbackManager.sound.stopAll(); } catch(e) {}
            transitionScreen.hide();
            startGame();
          }
        }]
      });
    }

    // === PostMessage Handler ===

    function handlePostMessage(event) {
      if (!event.data || event.data.type !== 'game_init') return;
      var d = event.data.data;
      gameState.content = d.content;
      if (d.gameId) gameState.gameId = d.gameId;
      gameState.contentSetId = d.contentSetId || null;
      gameState.signalConfig = d.signalConfig || {};

      if (signalCollector && gameState.signalConfig) {
        signalCollector.gameId = gameState.gameId;
        signalCollector.contentSetId = gameState.contentSetId;
        if (gameState.signalConfig.flushUrl) {
          signalCollector.flushUrl = gameState.signalConfig.flushUrl;
          signalCollector.playId = gameState.signalConfig.playId || null;
          signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
          signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
          signalCollector.startFlushing();
        }
      }

      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('screen_transition', {
            screen: 'start',
            metadata: { transition_from: 'loading', content_loaded: true }
          });
        } catch(e) {}
      }

      console.log('Content received:', JSON.stringify(gameState.content, null, 2));
    }

          gameState.currentDynamicAudio = null;
        }

      } catch (error) {
        console.error('Initialization failed:', JSON.stringify({ error: error.message }, null, 2));
        if (typeof Sentry !== 'undefined') {
          Sentry.captureException(error, { tags: { phase: 'initialization', severity: 'critical' } });
        }
      }
    });
  </script>
</body>
</html>
