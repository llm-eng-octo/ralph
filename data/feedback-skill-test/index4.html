<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Connect</title>

  <!-- PART-030: SentryConfig package -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

  <!-- PART-030: initSentry + global error handlers -->
  <script>
    function initSentry() {
      if (typeof SentryConfig !== 'undefined' && SentryConfig.enabled && typeof Sentry !== 'undefined') {
        Sentry.init({
          dsn: SentryConfig.dsn,
          environment: SentryConfig.environment,
          release: 'game_connect@1.0.0',
          tracesSampleRate: SentryConfig.tracesSampleRate,
          sampleRate: SentryConfig.sampleRate,
          maxBreadcrumbs: 50,
          ignoreErrors: [
            'ResizeObserver loop limit exceeded',
            'ResizeObserver loop completed with undelivered notifications',
            'Non-Error promise rejection captured',
            'Script error.',
            'Load failed',
            'Failed to fetch'
          ]
        });
      }
    }

    window.addEventListener('error', function(event) {
      if (typeof Sentry !== 'undefined') {
        Sentry.captureException(event.error || new Error(event.message), {
          tags: { errorType: 'unhandled', severity: 'critical' },
          contexts: { errorEvent: { message: event.message, filename: event.filename, lineno: event.lineno } }
        });
      }
    });

    window.addEventListener('unhandledrejection', function(event) {
      if (typeof Sentry !== 'undefined') {
        Sentry.captureException(event.reason || new Error('Unhandled promise rejection'), {
          tags: { errorType: 'unhandled-promise', severity: 'critical' }
        });
      }
    });
  </script>

  <!-- PART-030: Sentry SDK scripts (v10.23.0) — exactly these 3 files -->
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

  <!-- Initialize Sentry on load -->
  <script>window.addEventListener('load', initSentry);</script>

  <!-- PART-002: Game packages (3 BUNDLED URLs — do NOT use individual package URLs) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    /* === CSS Variables (PART-020) === */
    :root {
      --mathai-green: #219653;
      --mathai-light-green: #EAFBF1;
      --mathai-red: #E35757;
      --mathai-light-red: #FDECEC;
      --mathai-blue: #2563eb;
      --mathai-light-blue: #EBF0FF;
      --mathai-gray: #828282;
      --mathai-light-gray: #F2F2F2;
      --mathai-white: #FFFFFF;
      --mathai-black: #1A1A2E;
      --mathai-border-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mathai-font-size-title: 24px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-label: 14px;
      --mathai-font-size-small: 12px;
    }

    /* === Hidden utility === */
    .hidden { display: none !important; }

    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-light-gray);
      color: var(--mathai-black);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* === Screen Layout (PART-021) === */
    .page-center {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      width: 100%;
    }
    .game-wrapper {
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--mathai-white);
      position: relative;
    }
    .game-stack {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* === Game Block === */
    .game-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 16px;
    }

    /* === Instruction Area === */
    .instruction-area {
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
      padding: 0 4px;
    }

    .instruction-text {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-black);
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .instruction-text strong { font-weight: 700; }

    .instruction-text-sub {
      font-size: var(--mathai-font-size-label);
      color: var(--mathai-gray);
      line-height: 1.4;
    }

    .question-text-container {
      padding: 8px 16px;
      text-align: center;
    }

    /* === Grid === */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols), 1fr);
      gap: 2px;
      max-width: 340px;
      width: 100%;
      margin: 0 auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .grid-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: var(--mathai-font-size-label);
      font-weight: 600;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      overflow: hidden;
      transition: background 0.1s ease, border-color 0.1s ease;
      border-radius: 6px;
      border: 2px solid var(--mathai-border-gray);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
    }

    /* START cell */
    .grid-cell.start-cell {
      background: var(--mathai-light-green);
      border-color: var(--mathai-green);
      color: var(--mathai-green);
      font-weight: 700;
    }

    /* END cell */
    .grid-cell.end-cell {
      background: var(--mathai-light-red);
      border-color: var(--mathai-red);
      color: var(--mathai-red);
      font-weight: 700;
    }

    /* Cell is part of drawn path */
    .grid-cell.path {
      background: var(--mathai-light-blue);
      border-color: var(--mathai-blue);
      animation: cellPop 0.15s ease-out;
    }

    /* Current head of path */
    .grid-cell.path-head {
      background: var(--mathai-blue);
      color: var(--mathai-white);
    }

    /* Completed puzzle */
    .grid-cell.complete {
      background: var(--mathai-light-green);
      border-color: var(--mathai-green);
      color: var(--mathai-green);
      animation: completePulse 0.4s ease-out;
    }

    /* Dead end indicator */
    .grid-cell.dead-end {
      border-color: var(--mathai-red);
      animation: deadEndFlash 1s ease forwards;
    }

    @keyframes deadEndFlash {
      0% { border-color: var(--mathai-red); }
      100% { border-color: var(--mathai-border-gray); }
    }

    @keyframes cellPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes completePulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes resetFlash {
      0% { background: var(--mathai-light-red); border-color: var(--mathai-red); }
      100% { background: var(--mathai-white); border-color: var(--mathai-border-gray); }
    }

    .grid-cell.resetting {
      animation: resetFlash 0.4s ease-out forwards;
    }

    /* === Buttons (PART-022) === */
    .btn-container {
      display: flex;
      gap: 12px;
      justify-content: center;
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
    }

    .game-btn {
      padding: 12px 32px;
      border: none;
      border-radius: 12px;
      font-size: var(--mathai-font-size-body);
      font-weight: 600;
      font-family: var(--mathai-font-family);
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 44px;
      flex: 1;
    }

    .btn-primary {
      background: var(--mathai-green);
      color: var(--mathai-white);
    }
    .btn-primary:hover { filter: brightness(0.9); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: var(--mathai-light-gray);
      color: var(--mathai-black);
      border: 2px solid #ddd;
    }
    .btn-secondary:hover { background: #e8e8e8; }

    /* === Results metrics === */
    .results-metrics {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      width: 100%;
      max-width: 340px;
    }
    .results-stars {
      text-align: center;
      font-size: 36px;
      margin-bottom: 8px;
    }
    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--mathai-light-gray);
      border-radius: 8px;
      font-size: var(--mathai-font-size-label);
    }
    .metric-label {
      color: var(--mathai-gray);
      font-weight: 500;
    }
    .metric-value {
      color: var(--mathai-black);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    /* ============================================
       PART-017: Sticker URLs
       ============================================ */
    var CORRECT_STICKER_URL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-20.gif';
    var INCORRECT_STICKER_URL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-28.gif';
    var VICTORY_STICKER_URL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-98.gif';
    var GAME_COMPLETE_STICKER_URL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-25.gif';
    var GAME_OVER_STICKER_URL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-95.gif';
    var ROUND_STICKER_1 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1743761988949-44.gif';
    var ROUND_STICKER_2 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1743761988949-47.gif';
    var ROUND_STICKER_3 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1743761988949-52.gif';
    var ROUND_STICKERS = [ROUND_STICKER_1, ROUND_STICKER_2, ROUND_STICKER_3];

    /* ============================================
       PART-007: Game State Object
       ============================================ */
    window.gameState = {
      gameId: 'game_connect',
      contentSetId: null,
      signalConfig: null,
      sessionHistory: [],
      currentRound: 0,
      totalRounds: 3,
      score: 0,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      gameEnded: false,
      isProcessing: false,
      content: null,
      duration_data: {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0,
        currentTime: null
      },
      lives: 3,
      totalLives: 3,
      path: [],
      gridSize: 3,
      startCell: null,
      endCell: null,
      solutionPath: [],
      roundStartTime: null,
      roundTimes: [],
      isDragging: false,
      totalCells: 9,
      currentDynamicAudio: null,
      voGameStartPlayed: false
    };

    var timer = null;
    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var visibilityTrackerConfig = null;
    var questionSlotId = null;

    /* ============================================
       PART-028: Fallback Content
       ============================================ */
    var fallbackContent = {
      rounds: [
        {
          gridSize: 3,
          startCell: { row: 0, col: 0 },
          endCell: { row: 2, col: 2 },
          solutionPath: [
            {row:0,col:0},{row:0,col:1},{row:0,col:2},
            {row:1,col:2},{row:1,col:1},{row:1,col:0},
            {row:2,col:0},{row:2,col:1},{row:2,col:2}
          ]
        },
        {
          gridSize: 4,
          startCell: { row: 0, col: 0 },
          endCell: { row: 3, col: 0 },
          solutionPath: [
            {row:0,col:0},{row:0,col:1},{row:0,col:2},{row:0,col:3},
            {row:1,col:3},{row:1,col:2},{row:1,col:1},{row:1,col:0},
            {row:2,col:0},{row:2,col:1},{row:2,col:2},{row:2,col:3},
            {row:3,col:3},{row:3,col:2},{row:3,col:1},{row:3,col:0}
          ]
        },
        {
          gridSize: 4,
          startCell: { row: 0, col: 1 },
          endCell: { row: 2, col: 2 },
          solutionPath: [
            {row:0,col:1},{row:0,col:0},{row:1,col:0},{row:2,col:0},
            {row:3,col:0},{row:3,col:1},{row:3,col:2},{row:3,col:3},
            {row:2,col:3},{row:1,col:3},{row:0,col:3},{row:0,col:2},
            {row:1,col:2},{row:1,col:1},{row:2,col:1},{row:2,col:2}
          ]
        }
      ]
    };

    /* ============================================
       PART-003: waitForPackages
       ============================================ */
    async function waitForPackages() {
      var timeout = 10000;
      var start = Date.now();
      while (
        typeof ScreenLayout === 'undefined' ||
        typeof ProgressBarComponent === 'undefined' ||
        typeof TransitionScreenComponent === 'undefined' ||
        typeof TimerComponent === 'undefined' ||
        typeof FeedbackManager === 'undefined' ||
        typeof VisibilityTracker === 'undefined' ||
        typeof SignalCollector === 'undefined'
      ) {
        if (Date.now() - start > timeout) throw new Error('Package loading timeout after 10s');
        await new Promise(function(resolve) { setTimeout(resolve, 50); });
      }
      console.log('All packages loaded');
    }

    /* ============================================
       Utility Functions
       ============================================ */
    function isAdjacent(r1, c1, r2, c2) {
      return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
    }

    function isCellInPath(row, col) {
      for (var i = 0; i < gameState.path.length; i++) {
        if (gameState.path[i].row === row && gameState.path[i].col === col) return true;
      }
      return false;
    }

    function hasValidAdjacentMoves(row, col) {
      var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (var i = 0; i < dirs.length; i++) {
        var nr = row + dirs[i][0];
        var nc = col + dirs[i][1];
        if (nr >= 0 && nr < gameState.gridSize && nc >= 0 && nc < gameState.gridSize && !isCellInPath(nr, nc)) {
          return true;
        }
      }
      return false;
    }

    function getCellElement(row, col) {
      return document.querySelector('.grid-cell[data-row="' + row + '"][data-col="' + col + '"]');
    }

    function formatTime(seconds) {
      var mins = Math.floor(seconds / 60);
      var secs = seconds % 60;
      return mins + ':' + (secs < 10 ? '0' : '') + secs;
    }

    function computeTriesPerRound(attempts) {
      var triesMap = {};
      for (var i = 0; i < attempts.length; i++) {
        var round = (attempts[i].metadata && attempts[i].metadata.round) ? attempts[i].metadata.round : 1;
        if (!triesMap[round]) triesMap[round] = 0;
        triesMap[round]++;
      }
      var result = [];
      for (var r = 1; r <= gameState.totalRounds; r++) {
        result.push(triesMap[r] || 0);
      }
      return result;
    }

    /* ============================================
       PART-010: Event Tracking
       ============================================ */
    function trackEvent(type, target, data) {
      var eventData = data || {};
      var event = {
        type: type,
        target: target,
        timestamp: Date.now(),
        data: eventData
      };
      gameState.events.push(event);
      console.log('Event: ' + JSON.stringify(event));
      if (typeof Sentry !== 'undefined') {
        try { Sentry.addBreadcrumb({ category: 'game_event', message: type, data: eventData }); } catch(e) {}
      }
    }

    /* ============================================
       PART-009: Attempt Tracking
       ============================================ */
    function recordAttempt(data) {
      var attempt = {
        timestamp: Date.now(),
        round: gameState.currentRound + 1,
        input_of_user: data.input_of_user,
        correct: data.correct,
        metadata: data.metadata || {}
      };
      gameState.attempts.push(attempt);
      gameState.duration_data.attempts.push({ timestamp: new Date().toISOString() });
      console.log('Attempt: ' + JSON.stringify(attempt));
    }

    /* ============================================
       setupGame
       ============================================ */
    function setupGame() {
      if (!gameState.content) {
        gameState.content = fallbackContent;
      }
      gameState.totalRounds = gameState.content.rounds.length;
    }

    /* ============================================
       createProgressBar helper (destroy-before-create)
       ============================================ */
    function createProgressBar() {
      if (progressBar) {
        try { progressBar.destroy(); } catch(e) {}
        progressBar = null;
      }
      progressBar = new ProgressBarComponent({
        autoInject: true,
        totalRounds: gameState.totalRounds,
        totalLives: gameState.totalLives
      });
    }

    /* ============================================
       updateQuestionText
       ============================================ */
    function updateQuestionText(roundData) {
      if (questionSlotId) {
        var questionSlot = document.getElementById(questionSlotId);
        if (questionSlot) {
          questionSlot.innerHTML = '<div class="question-text-container">'
            + '<p class="instruction-text"><strong>Round ' + (gameState.currentRound + 1) + '</strong> — '
            + roundData.gridSize + '×' + roundData.gridSize + ' Grid</p>'
            + '<p class="instruction-text-sub">Draw a path from S to E covering every cell!</p>'
            + '</div>';
        }
      }
    }

    /* ============================================
       Grid & Interaction
       ============================================ */
    var gridListenersAttached = false;

    function createGrid(roundData) {
      var grid = document.getElementById('game-grid');
      grid.innerHTML = '';
      grid.style.setProperty('--cols', roundData.gridSize);

      for (var row = 0; row < roundData.gridSize; row++) {
        for (var col = 0; col < roundData.gridSize; col++) {
          var cell = document.createElement('div');
          cell.className = 'grid-cell';
          cell.setAttribute('data-row', row);
          cell.setAttribute('data-col', col);
          cell.setAttribute('data-signal-id', 'cell-' + row + '-' + col);

          if (row === roundData.startCell.row && col === roundData.startCell.col) {
            cell.classList.add('start-cell');
            cell.textContent = 'S';
          }
          if (row === roundData.endCell.row && col === roundData.endCell.col) {
            cell.classList.add('end-cell');
            cell.textContent = 'E';
          }

          grid.appendChild(cell);
        }
      }

      // Pointer events on grid for pointerdown (use event delegation — safe to re-add since innerHTML clears old nodes)
      grid.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        var cellEl = e.target.closest('.grid-cell');
        if (!cellEl) return;
        var r = parseInt(cellEl.getAttribute('data-row'));
        var c = parseInt(cellEl.getAttribute('data-col'));
        handleDragStart(r, c);
      });

      // Document-level listeners — attach ONCE to prevent listener leak across rounds
      if (!gridListenersAttached) {
        gridListenersAttached = true;

        // pointermove on document for mobile drag support
        document.addEventListener('pointermove', function(e) {
          if (!gameState.isDragging) return;
          e.preventDefault();
          var el = document.elementFromPoint(e.clientX, e.clientY);
          if (!el) return;
          var cellEl = el.closest ? el.closest('.grid-cell') : null;
          if (!cellEl) return;
          var r = parseInt(cellEl.getAttribute('data-row'));
          var c = parseInt(cellEl.getAttribute('data-col'));
          handleDragMove(r, c);
        });

        // pointerup + pointercancel on document
        document.addEventListener('pointerup', function(e) {
          if (gameState.isDragging) {
            handleDragEnd();
          }
        });

        document.addEventListener('pointercancel', function(e) {
          if (gameState.isDragging) {
            handleDragEnd();
          }
        });
      }
    }

    function handleDragStart(row, col) {
      if (!gameState.isActive || gameState.isProcessing) return;

      if (gameState.path.length > 0) {
        // Allow continuing from path head
        var head = gameState.path[gameState.path.length - 1];
        if (head.row === row && head.col === col) {
          gameState.isDragging = true;
        }
        return;
      }

      if (!gameState.startCell) return;
      if (row !== gameState.startCell.row || col !== gameState.startCell.col) return;

      gameState.isDragging = true;
      addToPath(row, col);
    }

    function handleDragMove(row, col) {
      if (!gameState.isDragging || !gameState.isActive || gameState.isProcessing) return;
      if (gameState.path.length === 0) return;

      var head = gameState.path[gameState.path.length - 1];

      // Check backtrack: if moving to second-to-last cell, remove head
      if (gameState.path.length >= 2) {
        var prev = gameState.path[gameState.path.length - 2];
        if (prev.row === row && prev.col === col) {
          // Backtrack: remove current head
          var removed = gameState.path.pop();
          var removedCell = getCellElement(removed.row, removed.col);
          if (removedCell) {
            removedCell.classList.remove('path', 'path-head');
          }
          // Set new head
          var newHead = gameState.path[gameState.path.length - 1];
          var newHeadCell = getCellElement(newHead.row, newHead.col);
          if (newHeadCell) {
            newHeadCell.classList.add('path-head');
          }
          return;
        }
      }

      // Already in path? ignore
      if (isCellInPath(row, col)) return;

      // Must be adjacent to head
      if (!isAdjacent(head.row, head.col, row, col)) return;

      addToPath(row, col);
    }

    function addToPath(row, col) {
      gameState.path.push({ row: row, col: col });

      // Remove path-head from previous head
      if (gameState.path.length > 1) {
        var prevHead = gameState.path[gameState.path.length - 2];
        var prevCell = getCellElement(prevHead.row, prevHead.col);
        if (prevCell) {
          prevCell.classList.remove('path-head');
        }
      }

      // Add path + path-head to new cell
      var cellEl = getCellElement(row, col);
      if (cellEl) {
        cellEl.classList.add('path', 'path-head');
      }

      trackEvent('cell_visited', 'grid', { row: row, col: col, pathLength: gameState.path.length });

      // Fire-and-forget cell tap sound
      try { FeedbackManager.sound.play('correct_sound_effect').catch(function(e) {}); } catch(e) {}

      // SignalCollector view event
      if (signalCollector) {
        signalCollector.recordViewEvent('visual_update', {
          screen: 'gameplay',
          content_snapshot: {
            type: 'cell_selected',
            selected_cell: { row: row, col: col },
            path_length: gameState.path.length,
            total_cells: gameState.totalCells,
            trigger: 'user_action'
          }
        });
      }

      // Check puzzle complete
      if (row === gameState.endCell.row && col === gameState.endCell.col && gameState.path.length === gameState.totalCells) {
        handlePuzzleComplete();
      }
    }

    function handleDragEnd() {
      gameState.isDragging = false;

      // Check dead end
      if (gameState.path.length > 0 && gameState.path.length < gameState.totalCells) {
        var head = gameState.path[gameState.path.length - 1];
        if (!hasValidAdjacentMoves(head.row, head.col)) {
          trackEvent('dead_end', 'grid', { pathLength: gameState.path.length, totalCells: gameState.totalCells });

          // Visual dead end indicator on head
          var headCell = getCellElement(head.row, head.col);
          if (headCell) {
            headCell.classList.add('dead-end');
          }
        }
      }
    }

    /* ============================================
       Game Flow Functions
       ============================================ */
    function startGame() {
      try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
      try { FeedbackManager.sound.pause(); } catch(e) {}
      if (transitionScreen) transitionScreen.hide();

      setupGame();
      gameState.currentRound = 0;
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.isActive = true;
      gameState.gameEnded = false;

      trackEvent('game_start', 'game');

      if (timer) {
        timer.resume();
        timer.reset();
        timer.start();
      }

      setupRound();
    }

    function setupRound() {
      var roundData = gameState.content.rounds[gameState.currentRound];
      gameState.gridSize = roundData.gridSize;
      gameState.startCell = roundData.startCell;
      gameState.endCell = roundData.endCell;
      gameState.solutionPath = roundData.solutionPath;
      gameState.path = [];
      gameState.totalCells = roundData.gridSize * roundData.gridSize;
      gameState.isDragging = false;
      gameState.roundStartTime = Date.now();

      createGrid(roundData);
      updateQuestionText(roundData);

      if (progressBar) {
        progressBar.update(gameState.currentRound, gameState.lives);
      }

      // Show game screen
      var gameScreen = document.getElementById('game-screen');
      if (gameScreen) gameScreen.classList.remove('hidden');

      trackEvent('round_start', 'game', { round: gameState.currentRound + 1, gridSize: roundData.gridSize });

      // SignalCollector view event
      if (signalCollector) {
        signalCollector.recordViewEvent('content_render', {
          screen: 'gameplay',
          content_snapshot: {
            round: gameState.currentRound + 1,
            gridSize: roundData.gridSize,
            startCell: roundData.startCell,
            endCell: roundData.endCell,
            trigger: 'round_start'
          },
          components: {
            timer: timer ? { value: timer.getCurrentTime(), state: timer.isRunning ? 'running' : 'paused' } : null,
            progress: { current: gameState.currentRound, total: gameState.totalRounds }
          }
        });
      }
    }

    function startRound() {
      if (timer) {
        timer.resume();
        timer.reset();
        timer.start();
      }
      setupRound();
    }

    async function handleReset() {
      if (!gameState.isActive || gameState.isProcessing) return;
      gameState.isProcessing = true;

      // Add resetting class to all path cells
      var pathCells = document.querySelectorAll('.grid-cell.path');
      for (var i = 0; i < pathCells.length; i++) {
        pathCells[i].classList.add('resetting');
      }

      // Clear path classes
      var allCells = document.querySelectorAll('.grid-cell');
      for (var j = 0; j < allCells.length; j++) {
        allCells[j].classList.remove('path', 'path-head', 'dead-end');
      }

      gameState.path = [];
      gameState.isDragging = false;
      gameState.lives--;

      if (progressBar) {
        progressBar.update(gameState.currentRound, gameState.lives);
      }

      trackEvent('path_reset', 'grid', { round: gameState.currentRound + 1, livesRemaining: gameState.lives });
      trackEvent('life_lost', 'game', { livesRemaining: gameState.lives });

      recordAttempt({
        input_of_user: { action: 'reset', round: gameState.currentRound + 1 },
        correct: false,
        metadata: {
          round: gameState.currentRound + 1,
          question: 'Connect ' + gameState.gridSize + 'x' + gameState.gridSize + ' path',
          correctAnswer: 'Hamiltonian path',
          validationType: 'function'
        }
      });

      // SignalCollector feedback view event
      if (signalCollector) {
        signalCollector.recordViewEvent('feedback_display', {
          screen: 'gameplay',
          content_snapshot: { feedback_type: 'reset', message: 'Path reset! Try again.', audio_id: 'incorrect_sound_effect' }
        });
      }

      // Play incorrect feedback BEFORE checking game over
      try {
        await FeedbackManager.sound.play('incorrect_sound_effect', {
          sticker: { image: INCORRECT_STICKER_URL, duration: 2, type: 'IMAGE_GIF' }
        });
      } catch(e) {}

      // Remove resetting class
      var resettingCells = document.querySelectorAll('.grid-cell.resetting');
      for (var k = 0; k < resettingCells.length; k++) {
        resettingCells[k].classList.remove('resetting');
      }

      gameState.isProcessing = false;

      if (gameState.lives <= 0) {
        handleGameOver();
      }
    }

    async function handlePuzzleComplete() {
      if (gameState.isProcessing) return;
      gameState.isProcessing = true;
      gameState.isDragging = false;

      var roundTime = Math.round((Date.now() - gameState.roundStartTime) / 1000);
      gameState.roundTimes.push(roundTime);
      gameState.score++;

      // Update progress bar immediately
      if (progressBar) {
        progressBar.update(gameState.currentRound + 1, gameState.lives);
      }

      // Mark all cells complete
      var allCells = document.querySelectorAll('.grid-cell');
      for (var i = 0; i < allCells.length; i++) {
        allCells[i].classList.remove('path', 'path-head', 'start-cell', 'end-cell');
        allCells[i].classList.add('complete');
      }

      recordAttempt({
        input_of_user: { action: 'puzzle_complete', path: gameState.path.slice() },
        correct: true,
        metadata: {
          round: gameState.currentRound + 1,
          question: 'Connect ' + gameState.gridSize + 'x' + gameState.gridSize + ' path',
          correctAnswer: 'Hamiltonian path',
          validationType: 'function'
        }
      });

      trackEvent('puzzle_complete', 'game', { round: gameState.currentRound + 1, time: roundTime });

      if (signalCollector) {
        signalCollector.recordCustomEvent('round_solved', { correct: true, round: gameState.currentRound + 1 });
      }

      if (signalCollector) {
        signalCollector.recordViewEvent('feedback_display', {
          screen: 'gameplay',
          content_snapshot: { feedback_type: 'correct', message: 'Path complete!', audio_id: 'correct_sound_effect' }
        });
      }

      // Play correct sound with sticker
      try {
        await FeedbackManager.sound.play('correct_sound_effect', {
          sticker: { image: CORRECT_STICKER_URL, duration: 2, type: 'IMAGE_GIF' }
        });
      } catch(e) {}

      // Play dynamic TTS
      try {
        gameState.currentDynamicAudio = FeedbackManager.playDynamicFeedback({
          audio_content: 'Excellent! Path complete!',
          subtitle: 'Path complete!',
          sticker: CORRECT_STICKER_URL
        });
        await gameState.currentDynamicAudio;
      } catch(e) {}
      gameState.currentDynamicAudio = null;

      gameState.isProcessing = false;

      setTimeout(function() { nextRound(); }, 500);
    }

    function nextRound() {
      gameState.currentRound++;

      if (gameState.currentRound >= gameState.totalRounds) {
        endGame();
        return;
      }

      if (timer) timer.pause();

      var lastRoundTime = gameState.roundTimes[gameState.roundTimes.length - 1];

      if (signalCollector) {
        signalCollector.recordViewEvent('screen_transition', {
          screen: 'transition',
          metadata: { transition_from: 'gameplay' }
        });
      }

      try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}

      transitionScreen.show({
        icons: ['🔗'], iconSize: 'normal',
        title: 'Round ' + (gameState.currentRound + 1),
        subtitle: 'Round ' + gameState.currentRound + ' completed in ' + lastRoundTime + 's',
        persist: true,
        buttons: [{ text: "Let's Go!", type: 'primary', action: function() {
          try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
          try { FeedbackManager.sound.stopAll(); } catch(e) {}
          transitionScreen.hide();
          startRound();
        }}]
      });

      // Fire-and-forget round VO
      gameState.currentDynamicAudio = FeedbackManager.playDynamicFeedback({
        audio_content: 'Round ' + (gameState.currentRound + 1) + '! Keep going!',
        subtitle: 'Round ' + (gameState.currentRound + 1),
        sticker: ROUND_STICKERS[gameState.currentRound % ROUND_STICKERS.length]
      });
    }

    async function handleGameOver() {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;

      if (timer) timer.pause();
      gameState.duration_data.currentTime = new Date().toISOString();

      var timeTaken = Math.round((Date.now() - gameState.startTime) / 1000);

      trackEvent('game_over', 'game', { livesRemaining: 0, roundsCompleted: gameState.currentRound });

      var sealResult = null;
      if (signalCollector) {
        signalCollector.recordViewEvent('screen_transition', {
          screen: 'game_over',
          metadata: { transition_from: 'gameplay' }
        });
        sealResult = signalCollector.seal();
      }

      // Show game over screen FIRST
      transitionScreen.show({
        icons: ['😔'], iconSize: 'large',
        title: 'Game Over',
        subtitle: 'All lives lost! You completed ' + gameState.score + ' round(s).',
        persist: true,
        buttons: [{ text: 'Try Again', type: 'primary', action: function() {
          try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
          try { FeedbackManager.sound.stopAll(); } catch(e) {}
          transitionScreen.hide();
          restartGame();
        }}]
      });

      // Build metrics
      var tries = computeTriesPerRound(gameState.attempts);
      var metrics = {
        score: gameState.score,
        totalRounds: gameState.totalRounds,
        accuracy: 0,
        stars: 0,
        timeTaken: timeTaken,
        lives: gameState.lives,
        totalLives: gameState.totalLives,
        roundTimes: gameState.roundTimes,
        tries: tries,
        triesPerRound: tries,
        duration_data: gameState.duration_data
      };

      // postMessage BEFORE audio
      var postData = { metrics: metrics, attempts: gameState.attempts, completedAt: Date.now() };
      if (sealResult) {
        postData.signal_event_count = (sealResult && sealResult.eventCount) ? sealResult.eventCount : 0;
        postData.signal_metadata = (sealResult && sealResult.metadata) ? sealResult.metadata : {};
      }
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: postData
        }, '*');
      } catch(e) {}

      // Play game over audio
      try {
        await FeedbackManager.sound.play('game_over_sound_effect', {
          sticker: { image: GAME_OVER_STICKER_URL, duration: 3, type: 'IMAGE_GIF' }
        });
      } catch(e) {}
      try {
        await FeedbackManager.sound.play('game_over');
      } catch(e) {}

      // Guarded cleanup
      if (gameState.gameEnded) {
        if (timer) { timer.destroy(); timer = null; }
        if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
        try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
        if (progressBar) { progressBar.destroy(); progressBar = null; }
      }
    }

    async function endGame() {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;

      if (timer) timer.pause();
      gameState.duration_data.currentTime = new Date().toISOString();

      var timeTaken = Math.round((Date.now() - gameState.startTime) / 1000);
      var accuracy = gameState.totalRounds > 0 ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0;

      // Star calculation based on lives
      var stars = 0;
      if (gameState.lives >= 3) stars = 3;
      else if (gameState.lives >= 2) stars = 2;
      else if (gameState.lives >= 1) stars = 1;
      else stars = 0;

      var tries = computeTriesPerRound(gameState.attempts);
      var metrics = {
        score: gameState.score,
        totalRounds: gameState.totalRounds,
        accuracy: accuracy,
        stars: stars,
        timeTaken: timeTaken,
        lives: gameState.lives,
        totalLives: gameState.totalLives,
        roundTimes: gameState.roundTimes,
        tries: tries,
        triesPerRound: tries,
        duration_data: gameState.duration_data
      };

      trackEvent('game_end', 'game', {
        score: gameState.score,
        totalRounds: gameState.totalRounds,
        stars: stars,
        timeTaken: timeTaken,
        lives: gameState.lives
      });

      if (typeof Sentry !== 'undefined') {
        try {
          Sentry.addBreadcrumb({ category: 'game', message: 'game_end', data: { stars: stars, score: gameState.score } });
        } catch(e) {}
      }

      // SignalCollector: recordViewEvent BEFORE seal
      var sealResult = null;
      if (signalCollector) {
        signalCollector.recordViewEvent('screen_transition', {
          screen: 'results',
          metadata: { transition_from: 'gameplay' }
        });
        sealResult = signalCollector.seal();
      }

      // Show results FIRST
      showResults(metrics, stars);

      // postMessage BEFORE audio
      var postData = { metrics: metrics, attempts: gameState.attempts, completedAt: Date.now() };
      if (sealResult) {
        postData.signal_event_count = (sealResult && sealResult.eventCount) ? sealResult.eventCount : 0;
        postData.signal_metadata = (sealResult && sealResult.metadata) ? sealResult.metadata : {};
      }
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: postData
        }, '*');
      } catch(e) {}

      // Play end-game audio based on stars
      try {
        if (stars >= 3) {
          await FeedbackManager.sound.play('victory_sound_effect', {
            sticker: { image: VICTORY_STICKER_URL, duration: 3, type: 'IMAGE_GIF' }
          });
          await FeedbackManager.sound.play('victory');
        } else if (stars >= 2) {
          await FeedbackManager.sound.play('game_complete_sound_effect', {
            sticker: { image: GAME_COMPLETE_STICKER_URL, duration: 3, type: 'IMAGE_GIF' }
          });
          await FeedbackManager.sound.play('game_complete_2_star');
        } else if (stars >= 1) {
          await FeedbackManager.sound.play('game_complete_sound_effect', {
            sticker: { image: GAME_COMPLETE_STICKER_URL, duration: 3, type: 'IMAGE_GIF' }
          });
          await FeedbackManager.sound.play('game_complete_1_star');
        }
      } catch(e) {}

      // Guarded cleanup
      if (gameState.gameEnded) {
        if (timer) { timer.destroy(); timer = null; }
        if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
        try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
        if (progressBar) { progressBar.destroy(); progressBar = null; }
      }
    }

    function showResults(metrics, stars) {
      var starText = '';
      for (var i = 0; i < 3; i++) {
        starText += i < stars ? '⭐' : '☆';
      }

      var avgRoundTime = gameState.roundTimes.length > 0
        ? Math.round(gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length)
        : 0;

      var metricsHTML = ''
        + '<div class="results-metrics">'
        + '  <div class="results-stars">' + starText + '</div>'
        + '  <div class="metric-row"><span class="metric-label">Rounds Completed</span><span class="metric-value">' + gameState.score + '/' + gameState.totalRounds + '</span></div>'
        + '  <div class="metric-row"><span class="metric-label">Lives Remaining</span><span class="metric-value">' + gameState.lives + '/' + gameState.totalLives + '</span></div>'
        + '  <div class="metric-row"><span class="metric-label">Total Time</span><span class="metric-value">' + formatTime(metrics.timeTaken) + '</span></div>'
        + '  <div class="metric-row"><span class="metric-label">Avg Round Time</span><span class="metric-value">' + formatTime(avgRoundTime) + '</span></div>'
        + '</div>';

      if (signalCollector) {
        signalCollector.recordViewEvent('content_render', {
          screen: 'results',
          content_snapshot: {
            score: gameState.score,
            totalRounds: gameState.totalRounds,
            stars: stars,
            accuracy: metrics.accuracy,
            livesRemaining: gameState.lives,
            trigger: 'game_end'
          }
        });
      }

      var titleText = stars >= 3 ? 'Excellent!' : (stars >= 2 ? 'Good Try!' : 'Keep Practicing!');
      var buttonText = stars >= 3 ? 'Play Again' : 'Retry for more stars';

      transitionScreen.show({
        title: titleText,
        content: metricsHTML,
        persist: true,
        buttons: [{ text: buttonText, type: stars >= 3 ? 'primary' : 'secondary', action: function() {
          try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
          try { FeedbackManager.sound.stopAll(); } catch(e) {}
          transitionScreen.hide();
          restartGame();
        }}]
      });
    }

    function restartGame() {
      // Push session snapshot
      gameState.sessionHistory.push({
        score: gameState.score,
        lives: gameState.lives,
        totalRounds: gameState.totalRounds,
        roundTimes: gameState.roundTimes.slice(),
        attempts: gameState.attempts.slice(),
        events: gameState.events.slice()
      });

      // Preserve across restart
      var preserved = {
        content: gameState.content,
        contentSetId: gameState.contentSetId,
        signalConfig: gameState.signalConfig,
        sessionHistory: gameState.sessionHistory,
        voGameStartPlayed: gameState.voGameStartPlayed
      };

      // Reset gameState
      gameState.currentRound = 0;
      gameState.totalRounds = 3;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.startTime = null;
      gameState.isActive = false;
      gameState.gameEnded = false;
      gameState.isProcessing = false;
      gameState.duration_data = {
        startTime: null, preview: [], attempts: [], evaluations: [],
        inActiveTime: [], totalInactiveTime: 0, currentTime: null
      };
      gameState.lives = 3;
      gameState.totalLives = 3;
      gameState.path = [];
      gameState.gridSize = 3;
      gameState.startCell = null;
      gameState.endCell = null;
      gameState.solutionPath = [];
      gameState.roundStartTime = null;
      gameState.roundTimes = [];
      gameState.isDragging = false;
      gameState.totalCells = 9;
      gameState.currentDynamicAudio = null;

      // Restore preserved
      gameState.content = preserved.content;
      gameState.contentSetId = preserved.contentSetId;
      gameState.signalConfig = preserved.signalConfig;
      gameState.sessionHistory = preserved.sessionHistory;
      gameState.voGameStartPlayed = preserved.voGameStartPlayed;

      // Recreate SignalCollector
      try {
        signalCollector = new SignalCollector({
          sessionId: (window.gameVariableState && window.gameVariableState.sessionId) ? window.gameVariableState.sessionId : 'session_' + Date.now(),
          studentId: (window.gameVariableState && window.gameVariableState.studentId) ? window.gameVariableState.studentId : null,
          gameId: gameState.gameId,
          contentSetId: gameState.contentSetId
        });
        window.signalCollector = signalCollector;
        if (gameState.signalConfig && gameState.signalConfig.flushUrl) {
          signalCollector.flushUrl = gameState.signalConfig.flushUrl;
          signalCollector.playId = gameState.signalConfig.playId || null;
          signalCollector.startFlushing();
        }
      } catch(e) {
        console.log('SignalCollector recreate error: ' + JSON.stringify({ error: e.message }));
      }

      // Recreate VisibilityTracker
      try {
        if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
        visibilityTracker = new VisibilityTracker(visibilityTrackerConfig);
      } catch(e) {
        console.log('VisibilityTracker recreate error: ' + JSON.stringify({ error: e.message }));
      }

      // Recreate Timer
      try {
        if (timer) { timer.destroy(); timer = null; }
        var timerContainer = document.getElementById('timer-container');
        if (!timerContainer) {
          var headerSlot = document.getElementById('mathai-header-slot');
          if (headerSlot) {
            timerContainer = document.createElement('div');
            timerContainer.id = 'timer-container';
            headerSlot.appendChild(timerContainer);
          }
        }
        timer = new TimerComponent('timer-container', {
          timerType: 'increase', format: 'min', startTime: 0, autoStart: false, endTime: 100000
        });
      } catch(e) {
        console.log('Timer recreate error: ' + JSON.stringify({ error: e.message }));
      }

      // Recreate ProgressBar
      setupGame();
      createProgressBar();
      if (progressBar) progressBar.update(0, gameState.lives);

      // Restore question text
      if (questionSlotId) {
        var questionSlot = document.getElementById(questionSlotId);
        if (questionSlot) {
          questionSlot.innerHTML = '<div class="question-text-container">'
            + '<p class="instruction-text"><strong>Connect</strong></p>'
            + '<p class="instruction-text-sub">Draw a path from START to END covering every cell!</p>'
            + '</div>';
        }
      }

      // Show start transition screen
      transitionScreen.show({
        icons: ['🔗'], iconSize: 'large', title: 'Connect',
        subtitle: 'Draw a path from START to END covering every cell!',
        persist: true,
        buttons: [{ text: "Let's Go!", type: 'primary', action: function() {
          try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
          try { FeedbackManager.sound.stopAll(); } catch(e) {}
          transitionScreen.hide();
          startGame();
        }}]
      });
    }

    function handlePostMessage(event) {
      if (!event.data || event.data.type !== 'game_init') return;
      var d = event.data.data;
      gameState.content = d.content;
      if (d.gameId) gameState.gameId = d.gameId;
      gameState.contentSetId = d.contentSetId || null;
      gameState.signalConfig = d.signalConfig || {};

      if (signalCollector && gameState.signalConfig && gameState.signalConfig.flushUrl) {
        signalCollector.flushUrl = gameState.signalConfig.flushUrl;
        signalCollector.playId = gameState.signalConfig.playId || null;
        signalCollector.gameId = gameState.gameId;
        signalCollector.contentSetId = gameState.contentSetId;
        signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
        signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
        signalCollector.startFlushing();
      }

      setupGame();
    }

    /* ============================================
       Window Exposure (RULE-001)
       ============================================ */
    window.startGame = startGame;
    window.setupRound = setupRound;
    window.handleReset = handleReset;
    window.restartGame = restartGame;
    window.handlePostMessage = handlePostMessage;
    window.computeTriesPerRound = computeTriesPerRound;

    /* ============================================
       PART-004: DOMContentLoaded Initialization
       ============================================ */
    window.addEventListener('DOMContentLoaded', async function() {
      try {
        // PART-030: Init Sentry first
        initSentry();

        // PART-003: Wait for packages

        // PART-017: Init FeedbackManager

        // PART-017: Preload static audio

          { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
          { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
          { id: 'victory', url: 'https://cdn.mathai.ai/mathai-assets/dev/worksheet/audio/e252bcc4-bd5f-4195-ad04-a02582095b6d.mp3' },
          { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
          { id: 'game_complete_1_star', url: 'https://cdn.mathai.ai/mathai-assets/dev/worksheet/audio/2ee85ea3-919b-4010-95a2-40bcd7d90d22.mp3' },
          { id: 'game_complete_2_star', url: 'https://cdn.mathai.ai/mathai-assets/dev/worksheet/audio/84f4ff34-6e59-43d6-9663-4d9936cad002.mp3' },
          { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
          { id: 'game_over', url: 'https://cdn.mathai.ai/mathai-assets/dev/worksheet/audio/5140e0b6-cada-4424-8e5d-f9cd06a0c83f.mp3' }
        ]);

        // PART-010: SignalCollector
        signalCollector = new SignalCollector({
          sessionId: (window.gameVariableState && window.gameVariableState.sessionId) ? window.gameVariableState.sessionId : 'session_' + Date.now(),
          studentId: (window.gameVariableState && window.gameVariableState.studentId) ? window.gameVariableState.studentId : null,
          gameId: gameState.gameId,
          contentSetId: gameState.contentSetId
        });
        window.signalCollector = signalCollector;

        // PART-036: EventCapture
        try { if (typeof EventCapture !== 'undefined') EventCapture.init(); } catch(e) {}

        // PART-025: ScreenLayout — sections API
        var layout = ScreenLayout.inject('app', {
          sections: { header: true, questionText: true, progressBar: true, playArea: true, transitionScreen: true }
        });

        // Store questionText slot ID
        questionSlotId = layout.questionText;

        // Build question text
        var questionSlot = document.getElementById(questionSlotId);
        if (questionSlot) {
          questionSlot.innerHTML = '<div class="question-text-container">'
            + '<p class="instruction-text"><strong>Connect</strong></p>'
            + '<p class="instruction-text-sub">Draw a path from START to END covering every cell!</p>'
            + '</div>';
        }

        // Inject timer container into header slot
        var headerSlot = document.getElementById('mathai-header-slot');
        if (headerSlot) {
          var timerContainer = document.createElement('div');
          timerContainer.id = 'timer-container';
          headerSlot.appendChild(timerContainer);
        }

        // Inject game HTML into #gameContent
        var gameContent = document.getElementById('gameContent');
        gameContent.innerHTML = ''
          + '<div id="game-screen" class="game-block">'
          + '  <div class="game-grid" id="game-grid" data-signal-id="game-grid" style="--cols: 3;"></div>'
          + '  <div class="btn-container">'
          + '    <button class="game-btn btn-secondary" id="btn-reset" data-signal-id="reset-button" onclick="handleReset()">Reset</button>'
          + '  </div>'
          + '</div>';

        // PART-006: TimerComponent
        timer = new TimerComponent('timer-container', {
          timerType: 'increase', format: 'min', startTime: 0, autoStart: false, endTime: 100000
        });

        // PART-038: InteractionManager
        if (typeof InteractionManager !== 'undefined') {
          window.interactionManager = new InteractionManager({
            selector: '.game-grid',
            disableOnAudioFeedback: false,
            disableOnEvaluation: true
          });
        }

        // PART-023: ProgressBar
        createProgressBar();
        if (progressBar) progressBar.update(0, gameState.lives);

        // PART-024: TransitionScreen
        transitionScreen = new TransitionScreenComponent({ autoInject: true });

        // PART-005: VisibilityTracker — config saved for reuse
        visibilityTrackerConfig = {
          onInactive: function() {
            if (gameState.gameEnded) return;
            var inactiveStart = Date.now();
            gameState.duration_data.inActiveTime.push({ start: inactiveStart });
            if (timer) { timer.pause({ fromVisibilityTracker: true }); }
            if (signalCollector) { signalCollector.pause(); signalCollector.recordCustomEvent('visibility_hidden', {}); }
            try { FeedbackManager.sound.pause(); } catch(e) {}
            try { FeedbackManager.stream.pauseAll(); } catch(e) {}
            trackEvent('game_paused', 'system');
          },
          onResume: function() {
            if (gameState.gameEnded) return;
            var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
            if (lastInactive && !lastInactive.end) {
              lastInactive.end = Date.now();
              gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
            }
            if (timer && timer.isPaused) { timer.resume({ fromVisibilityTracker: true }); }
            if (signalCollector) { signalCollector.resume(); signalCollector.recordCustomEvent('visibility_visible', {}); }
            try { FeedbackManager.sound.resume(); } catch(e) {}
            try { FeedbackManager.stream.resumeAll(); } catch(e) {}
            trackEvent('game_resumed', 'system');
          },
          popupProps: { title: 'Game Paused', description: 'Click Resume to continue.', primaryText: 'Resume' }
        };
        visibilityTracker = new VisibilityTracker(visibilityTrackerConfig);

        // Register postMessage listener BEFORE game_ready
        window.addEventListener('message', handlePostMessage);
        window.parent.postMessage({ type: 'game_ready' }, '*');

        // Poll canPlayAudio
        await new Promise(function(resolve) {
          if (FeedbackManager.canPlayAudio()) return resolve();
          var check = setInterval(function() {
            if (FeedbackManager.canPlayAudio()) { clearInterval(check); resolve(); }
          }, 200);
          setTimeout(function() { clearInterval(check); resolve(); }, 15000);
        });

        // Setup game (loads fallback content if none received)
        setupGame();

        // Show start screen
        transitionScreen.show({
          icons: ['🔗'], iconSize: 'large', title: 'Connect',
          subtitle: 'Draw a path from START to END covering every cell!',
          persist: true,
          buttons: [{ text: "Let's Go!", type: 'primary', action: function() {
            try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
            try { FeedbackManager.sound.stopAll(); } catch(e) {}
            transitionScreen.hide();
            startGame();
          }}]
        });

        // Welcome VO — only once
        if (!gameState.voGameStartPlayed) {
          gameState.voGameStartPlayed = true;
          try {
            gameState.currentDynamicAudio = FeedbackManager.playDynamicFeedback({
              audio_content: 'Welcome to Connect! Draw a path from start to end that covers every cell.',
              subtitle: 'Draw a path from START to END covering every cell!',
              sticker: ROUND_STICKER_1
            });
            await gameState.currentDynamicAudio;
          } catch(e) {}
          gameState.currentDynamicAudio = null;
        }

        // PART-012: Debug functions
        window.verifySentry = function() {
          if (typeof Sentry !== 'undefined' && Sentry.getClient && Sentry.getClient()) {
            console.log('Sentry is active: ' + JSON.stringify({ dsn: Sentry.getClient().getDsn() }));
            return true;
          }
          console.log('Sentry is NOT active');
          return false;
        };

        window.testSentry = function() {
          try {
            throw new Error('Test Sentry error from game_connect');
          } catch(e) {
            if (typeof Sentry !== 'undefined') Sentry.captureException(e);
            console.log('Test error sent to Sentry');
          }
        };

        window.getGameState = function() {
          console.log('GameState: ' + JSON.stringify(gameState, null, 2));
          return gameState;
        };

        window.getAttempts = function() {
          console.log('Attempts: ' + JSON.stringify(gameState.attempts, null, 2));
          return gameState.attempts;
        };

        window.getEvents = function() {
          console.log('Events: ' + JSON.stringify(gameState.events, null, 2));
          return gameState.events;
        };

        window.skipRound = function() {
          if (!gameState.isActive) return;
          gameState.score++;
          gameState.roundTimes.push(0);
          if (progressBar) progressBar.update(gameState.currentRound + 1, gameState.lives);
          nextRound();
        };

      } catch (error) {
        console.error('Initialization failed: ' + JSON.stringify({ error: error.message }, null, 2));
        if (typeof Sentry !== 'undefined') {
          Sentry.captureException(error, { tags: { phase: 'initialization', severity: 'critical' } });
        }
      }
    });
  </script>
</body>
</html>
