<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Doubles-Chain</title>
<style>
/* === CSS Variables (PART-020) === */
:root {
  --mathai-green: #4CAF50;
  --mathai-light-green: #E8F5E9;
  --mathai-red: #F44336;
  --mathai-light-red: #FFEBEE;
  --mathai-blue: #2196F3;
  --mathai-light-blue: #EBF0FF;
  --mathai-gray: #757575;
  --mathai-light-gray: #F5F5F5;
  --mathai-white: #FFFFFF;
  --mathai-black: #212121;
  --mathai-text-primary: #000000;
  --mathai-font-family: 'Nunito', sans-serif;
  --mathai-font-size-title: 24px;
  --mathai-font-size-body: 16px;
  --mathai-font-size-label: 14px;
  --mathai-font-size-small: 12px;
}

/* === Reset === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100dvh; overflow: hidden; }
body {
  font-family: var(--mathai-font-family);
  background: var(--mathai-white);
  color: var(--mathai-text-primary, #000000);
  -webkit-font-smoothing: antialiased;
}

.mathai-layout-root { max-width: 480px; margin: 0 auto; }

/* === ScreenLayout v2 overrides === */
.mathai-layout-playarea {
  flex-direction: column !important;
  align-items: center !important;
  padding: 8px 16px !important;
}

/* === Transition Screen overrides === */
.mathai-ts-screen.active {
  flex: 1;
  justify-content: flex-start;
  padding-top: 16px;
}
.mathai-ts-card {
  min-height: 50dvh;
}

/* === Question Text === */
.question-text-container {
  width: 100%;
  max-width: 340px;
  margin: 0 auto;
  padding: 8px 16px;
}
.instruction-text {
  font-size: var(--mathai-font-size-body);
  color: var(--mathai-text-primary, #000000);
  line-height: 1.5;
  margin-bottom: 4px;
}
.instruction-text strong { font-weight: 700; }
.instruction-text-sub {
  font-size: var(--mathai-font-size-body);
  color: var(--mathai-text-primary, #000000);
  line-height: 1.4;
  margin-bottom: 4px;
}

/* === Game Block === */
.game-block {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 16px;
  gap: 8px;
}

/* === Round Info === */
.round-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 340px;
  padding: 8px 0;
}
.round-label {
  font-size: var(--mathai-font-size-body);
  font-weight: 700;
  color: var(--mathai-text-primary, #000000);
}
.chain-progress {
  font-size: var(--mathai-font-size-label);
  color: var(--mathai-gray);
}

/* === Chain Grid === */
.chain-grid {
  display: grid;
  gap: 8px;
  width: 100%;
  max-width: 340px;
  justify-items: center;
}
.chain-grid.grid-3 { grid-template-columns: repeat(3, 1fr); }
.chain-grid.grid-4 { grid-template-columns: repeat(4, 1fr); }
.chain-grid.grid-5 { grid-template-columns: repeat(5, 1fr); }

/* === Grid Tile === */
.grid-tile {
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #E0E0E0;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 700;
  color: var(--mathai-text-primary, #000000);
  background: var(--mathai-white);
  cursor: pointer;
  transition: all 0.15s ease;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  min-width: 44px;
  min-height: 44px;
}

/* Responsive font sizes per grid size */
.chain-grid.grid-3 .grid-tile { font-size: 24px; }
.chain-grid.grid-4 .grid-tile { font-size: 20px; }
.chain-grid.grid-5 .grid-tile { font-size: 16px; }

.grid-tile:hover:not(.completed):not(.selected) {
  border-color: var(--mathai-blue);
  background: var(--mathai-light-blue);
}
.grid-tile:active:not(.completed) {
  transform: scale(0.95);
}

/* Selected (currently building chain) */
.grid-tile.selected {
  border-color: var(--mathai-blue);
  background: var(--mathai-light-blue);
  color: var(--mathai-blue);
}

/* Completed (chain found) */
.grid-tile.completed {
  border-color: var(--mathai-green);
  background: var(--mathai-light-green);
  color: var(--mathai-green);
  cursor: default;
  pointer-events: none;
}

/* Wrong (incorrect tap flash) */
.grid-tile.wrong {
  border-color: var(--mathai-red);
  background: var(--mathai-light-red);
  color: var(--mathai-red);
}

/* === Buttons === */
.game-btn {
  padding: 12px 32px;
  border: none;
  border-radius: 12px;
  font-size: var(--mathai-font-size-body);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  cursor: pointer;
  transition: all 0.2s ease;
  min-height: 44px;
  width: 100%;
  max-width: 340px;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary { background: var(--mathai-green); color: var(--mathai-white); }
.btn-primary:hover { filter: brightness(0.9); }
.btn-primary:active { transform: scale(0.97); }

/* === Results Metrics === */
.results-metrics {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 300px;
  margin: 16px auto;
}
.metric-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--mathai-light-gray);
}
.metric-label {
  font-size: var(--mathai-font-size-body);
  color: var(--mathai-gray);
}
.metric-value {
  font-size: var(--mathai-font-size-body);
  font-weight: 700;
  color: var(--mathai-text-primary, #000000);
}
</style>
</head>

<script>
/* ============================

var STICKER_URLS = {

var fallbackContent = {

    },

      chains: [
        { indices: [0, 11, 18, 6], values: [2, 4, 8, 16] },

      grid: [31, 5, 8, 33, 3, 27, 37, 2, 43, 7, 12, 17, 40, 4, 39, 10, 6, 29, 23, 14, 1, 20, 41, 28, 47],
      chains: [
        { indices: [4, 16, 10], values: [3, 6, 12] },

      ]
    }
  ],
  totalLives: 3
};

/* ============================
   GAME STATE (PART-007)
   ============================ */
window.gameState = {
  currentRound: 0,
  totalRounds: 5,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  lives: 3,
  totalLives: 3,
  phase: 'start',
  chainsFound: 0,
  requiredChains: 0,
  currentChainIndex: -1,       // -1 = no chain active; player picks by tapping any incomplete chain's first tile
  completedChainIndices: new Set(), // tracks which chain indices are done
  selectedTiles: [],
  completedTiles: new Set(),
  isProcessing: false,
  gameEnded: false,
  pendingEndProblem: null,
  gameId: 'doubles-chain',
  contentSetId: null,
  signalConfig: {},
  sessionHistory: []
};

/* Global module-scope variables */
var visibilityTracker = null;
var signalCollector = null;
var progressBar = null;
var transitionScreen = null;
var interactionManager = null;

/* ============================
   PART-003: waitForPackages
   ============================ */
function waitForPackages() {
  return new Promise(function(resolve, reject) {
    var maxWait = 15000;
    var interval = 200;
    var elapsed = 0;
    var check = setInterval(function() {
      var hasVisibility = typeof VisibilityTracker !== 'undefined';
      var hasSignal = typeof SignalCollector !== 'undefined';
      var hasFeedback = typeof FeedbackManager !== 'undefined';
      if (hasVisibility && hasSignal && hasFeedback) {
        clearInterval(check);
        resolve();
      } else {
        elapsed += interval;
        if (elapsed >= maxWait) {
          clearInterval(check);
          reject(new Error('Packages not loaded within ' + maxWait + 'ms'));
        }
      }
    }, interval);
  });
}

/* ============================
   PART-009: recordAttempt
   ============================ */
function recordAttempt(data) {
  try {
    var attempt = {
      timestamp: new Date().toISOString(),
      round: gameState.currentRound + 1,
      correct: data.correct,
      tileIndex: data.tileIndex || null,
      tileValue: data.tileValue || null,
      expectedValue: data.expectedValue || null,
      chainIndex: data.chainIndex || null,
      chainValues: data.chainValues || null
    };
    gameState.attempts.push(attempt);
    gameState.duration_data.attempts.push({
      timestamp: attempt.timestamp,
      correct: attempt.correct
    });
  } catch(e) {
    console.error(JSON.stringify({ error: 'recordAttempt failed', message: e.message }, null, 2));
  }
}

/* ============================
   PART-010: trackEvent
   ============================ */
function trackEvent(eventName, target, data) {
  try {
    var ev = {
      event: eventName,
      target: target || 'game',
      timestamp: new Date().toISOString(),
      data: data || {}
    };
    gameState.events.push(ev);
    console.log(JSON.stringify({ trackEvent: eventName, data: data }, null, 2));
  } catch(e) {
    console.error(JSON.stringify({ error: 'trackEvent failed', message: e.message }, null, 2));
  }
}

/* ============================
   PART-011: computeTries & metrics
   ============================ */
function computeTries() {
  try {
    var incorrect = gameState.attempts.filter(function(a) { return !a.correct; }).length;
    return incorrect;
  } catch(e) {
    return 0;
  }
}

function computeAccuracy() {
  try {
    var total = gameState.attempts.length;
    if (total === 0) return 100;
    var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
    return Math.round((correct / total) * 100);
  } catch(e) {
    return 0;
  }
}

/* ============================
   ProgressBar (PART-023)
   ============================ */
function createProgressBar() {
  try {
    if (progressBar) {
      progressBar.destroy();
      progressBar = null;
    }
    progressBar = new ProgressBarComponent({
      totalRounds: gameState.totalRounds,
      totalLives: gameState.totalLives,
      autoInject: true
    });
    progressBar.update(gameState.currentRound, gameState.lives);
  } catch(e) {
    console.error(JSON.stringify({ error: 'createProgressBar failed', message: e.message }, null, 2));
  }
}

/* ============================
   PostMessage Protocol (PART-008)
   ============================ */
function handlePostMessage(event) {
  try {
    if (!event.data || !event.data.type) return;
    if (event.data.type === 'game_init') {
      if (event.data.content && event.data.content.rounds) {
        gameState.content = event.data.content;
        gameState.totalRounds = gameState.content.rounds.length;
        if (event.data.content.totalLives) {
          gameState.totalLives = event.data.content.totalLives;
          gameState.lives = event.data.content.totalLives;
        }
        console.log(JSON.stringify({ message: 'game_init received', rounds: gameState.totalRounds }, null, 2));
      }
      if (event.data.gameId) gameState.gameId = event.data.gameId;
      if (event.data.contentSetId) gameState.contentSetId = event.data.contentSetId;
      if (event.data.signalConfig) {
        gameState.signalConfig = event.data.signalConfig;
        // Configure SignalCollector properties from signalConfig
        if (signalCollector) {
          var sc = event.data.signalConfig;
          if (sc.flushUrl) signalCollector.flushUrl = sc.flushUrl;
          if (sc.playId) signalCollector.playId = sc.playId;
          if (sc.gameId) signalCollector.gameId = sc.gameId;
          if (sc.sessionId) signalCollector.sessionId = sc.sessionId;
          if (sc.contentSetId) signalCollector.contentSetId = sc.contentSetId;
          if (sc.studentId) signalCollector.studentId = sc.studentId;
          // Start batch flushing after configuring flushUrl
          if (sc.flushUrl && typeof signalCollector.startFlushing === 'function') {
            signalCollector.startFlushing();
          }
        }
      }
    }
  } catch(e) {
    console.error(JSON.stringify({ error: 'handlePostMessage failed', message: e.message }, null, 2));
  }
}

/* ============================
   GAME FUNCTIONS
   ============================ */

function setupGame() {
  try {
    gameState.startTime = new Date().toISOString();
    gameState.duration_data.startTime = gameState.startTime;
    gameState.isActive = true;
    gameState.phase = 'start';

    if (progressBar) {
      progressBar.update(0, gameState.lives);
    }

    trackEvent('game_start', 'game');

    if (signalCollector) {
      signalCollector.recordViewEvent('screen_transition', {
        screen: 'gameplay',
        metadata: { transition_from: 'start' }
      });
    }

    showRoundTransition(1);
  } catch(e) {
    console.error(JSON.stringify({ error: 'setupGame failed', message: e.message }, null, 2));
    if (typeof Sentry !== 'undefined') Sentry.captureException(e);
  }
}

async function showRoundTransition(roundNumber) {
  try {
    gameState.phase = 'transition';

    var roundData = gameState.content.rounds[roundNumber - 1];
    var requiredChains = roundData ? roundData.requiredChains : 1;
    var subtitle = 'Find ' + requiredChains + ' chain' + (requiredChains > 1 ? 's' : '') + ' to win! \uD83D\uDD17';
    var buttonText = roundNumber === 1 ? "Let's go!" : "Next Round";

    // Audio readiness check on round 1
    if (roundNumber === 1) {
      await new Promise(function(resolve) {
        if (FeedbackManager.canPlayAudio()) return resolve();
        var check = setInterval(function() {
          if (FeedbackManager.canPlayAudio()) { clearInterval(check); resolve(); }
        }, 200);
        setTimeout(function() { clearInterval(check); resolve(); }, 15000);
      });
    }

    var audioStopped = false;

    transitionScreen.show({
      title: 'Round ' + roundNumber,
      subtitle: subtitle,
      buttons: [{
        text: buttonText,
        action: function() {
          audioStopped = true;
          try { FeedbackManager.sound.stopAll(); FeedbackManager._stopCurrentDynamic(); } catch(e) {}
          transitionScreen.hide();
          loadRound();
        }
      }],
      persist: true
    });

    // Sequential audio after showing transition
    try {
      await FeedbackManager.sound.play('rounds_sound_effect', {
        sticker: { image: STICKER_URLS['round_' + Math.min(roundNumber, 5)] || STICKER_URLS.round_1, duration: 2, type: 'IMAGE_GIF' }
      });
      if (audioStopped) return;
      await FeedbackManager.playDynamicFeedback({
        audio_content: 'Round ' + roundNumber + '. Find ' + requiredChains + ' chain' + (requiredChains > 1 ? 's' : ''),
        subtitle: 'Round ' + roundNumber,
        sticker: STICKER_URLS['round_' + Math.min(roundNumber, 5)] || STICKER_URLS.round_1
      });
    } catch(e) { console.error('Audio error:', JSON.stringify({ error: e.message }, null, 2)); }
  } catch(e) {
    console.error(JSON.stringify({ error: 'showRoundTransition failed', message: e.message }, null, 2));
    if (typeof Sentry !== 'undefined') Sentry.captureException(e);
  }
}

function loadRound() {
  try {
    // Flush deferred endProblem
    if (gameState.pendingEndProblem && signalCollector) {
      try {
        signalCollector.endProblem(gameState.pendingEndProblem.id, gameState.pendingEndProblem.outcome);
      } catch(e) {}
      gameState.pendingEndProblem = null;
    }

    var round = gameState.content.rounds[gameState.currentRound];
    if (!round) {
      console.error(JSON.stringify({ error: 'No round data', currentRound: gameState.currentRound }, null, 2));
      return;
    }

    if (signalCollector) {
      try {
        signalCollector.startProblem('round_' + (gameState.currentRound + 1), {
          round_number: gameState.currentRound + 1,
          gridSize: round.gridSize,
          requiredChains: round.requiredChains,
          chains: round.chains.map(function(c) { return { values: c.values, length: c.values.length }; })
        });
      } catch(e) {}
    }

    // Reset per-round state
    gameState.chainsFound = 0;
    gameState.currentChainIndex = -1;
    gameState.completedChainIndices = new Set();
    gameState.selectedTiles = [];
    gameState.completedTiles = new Set();
    gameState.requiredChains = round.requiredChains;

    // Update round-info UI
    var roundLabel = document.getElementById('round-label');
    var chainProgress = document.getElementById('chain-progress');
    if (roundLabel) roundLabel.textContent = 'Round ' + (gameState.currentRound + 1);
    if (chainProgress) {
      chainProgress.textContent = 'Find ' + gameState.requiredChains + ' chain' + (gameState.requiredChains > 1 ? 's' : '') + ' to win! \uD83D\uDD17';
    }

    renderGrid(round);

    // New content SFX — fire-and-forget
    try { FeedbackManager.sound.play('new_cards').catch(function(e) {}); } catch(e) {}

    if (signalCollector) {
      try {
        signalCollector.recordViewEvent('content_render', {
          screen: 'gameplay',
          content_snapshot: {
            round: gameState.currentRound + 1,
            gridSize: round.gridSize,
            requiredChains: round.requiredChains,
            chainLengths: round.chains.map(function(c) { return c.values.length; })
          }
        });
      } catch(e) {}
    }

    gameState.phase = 'playing';

    // Show the game screen
    var gameScreen = document.getElementById('game-screen');
    if (gameScreen) gameScreen.style.display = 'flex';
  } catch(e) {
    console.error(JSON.stringify({ error: 'loadRound failed', message: e.message }, null, 2));
    if (typeof Sentry !== 'undefined') Sentry.captureException(e);
  }
}

function renderGrid(round) {
  try {
    var grid = document.getElementById('chain-grid');
    if (!grid) return;
    grid.innerHTML = '';
    grid.className = 'chain-grid grid-' + round.gridSize;

    for (var i = 0; i < round.grid.length; i++) {
      var tile = document.createElement('div');
      tile.className = 'grid-tile';
      tile.setAttribute('data-index', i);
      tile.setAttribute('data-value', round.grid[i]);
      tile.setAttribute('data-signal-id', 'tile-' + i);
      tile.textContent = round.grid[i];
      (function(index) {
        tile.addEventListener('click', function() {
          handleTileTap(index);
        });
      })(i);
      grid.appendChild(tile);
    }
  } catch(e) {
    console.error(JSON.stringify({ error: 'renderGrid failed', message: e.message }, null, 2));
  }
}

async function handleTileTap(tileIndex) {
  try {
    if (!gameState.isActive || gameState.isProcessing) return;
    if (gameState.phase !== 'playing') return;
    if (gameState.completedTiles.has(tileIndex)) return;

    var round = gameState.content.rounds[gameState.currentRound];
    if (!round) return;

    // If all chains already found, ignore taps (waiting for roundComplete)
    if (gameState.chainsFound >= gameState.requiredChains) return;

    var tileValue = round.grid[tileIndex];

    trackEvent('tile_tap', 'grid', {
      tileIndex: tileIndex,
      tileValue: tileValue,
      selectedCount: gameState.selectedTiles.length
    });

    if (signalCollector) {
      try {
        signalCollector.recordViewEvent('visual_update', {
          type: 'tile_selected',
          tileIndex: tileIndex,
          selectedCount: gameState.selectedTiles.length
        });
      } catch(e) {}
    }

    // === NO CHAIN ACTIVE — player is picking which chain to start ===
    if (gameState.currentChainIndex === -1) {
      var matchedChainIdx = -1;
      for (var ci = 0; ci < round.chains.length; ci++) {
        if (gameState.completedChainIndices.has(ci)) continue;
        if (round.chains[ci].indices[0] === tileIndex) {
          matchedChainIdx = ci;
          break;
        }
      }

      if (matchedChainIdx !== -1) {
        // Fire-and-forget bubble select SFX for chain start
        try {
          FeedbackManager.sound.play('sound_bubble_select', {
            sticker: { image: STICKER_URLS.partial_correct, duration: 2, type: 'IMAGE_GIF' }
          }).catch(function(e) {});
        } catch(e) {}
        gameState.currentChainIndex = matchedChainIdx;
        gameState.selectedTiles.push(tileIndex);
        selectTile(tileIndex);
      } else {
        // Incorrect — not the start of any incomplete chain
        await handleIncorrect(tileIndex, tileValue, null);
      }
      return;
    }

    // === CHAIN ACTIVE — validate against current chain sequence ===
    var currentChain = round.chains[gameState.currentChainIndex];
    var expectedIndex = gameState.selectedTiles.length;

    if (tileIndex === currentChain.indices[expectedIndex]) {
      // Fire-and-forget correct SFX for mid-chain match
      try {
        FeedbackManager.sound.play('correct_sound_effect', {
          sticker: { image: STICKER_URLS.partial_correct, duration: 2, type: 'IMAGE_GIF' }
        }).catch(function(e) {});
      } catch(e) {}

      selectTile(tileIndex);
      gameState.selectedTiles.push(tileIndex);

      if (gameState.selectedTiles.length === currentChain.indices.length) {
        await chainComplete();
      }
    } else {
      var expectedVal = currentChain.values[expectedIndex];
      await handleIncorrect(tileIndex, tileValue, expectedVal);
    }
  } catch(e) {
    console.error(JSON.stringify({ error: 'handleTileTap failed', message: e.message }, null, 2));
    gameState.isProcessing = false;
    if (typeof Sentry !== 'undefined') Sentry.captureException(e);
  }
}

function selectTile(tileIndex) {
  try {
    var tile = document.querySelector('.grid-tile[data-index="' + tileIndex + '"]');
    if (tile) {
      tile.classList.add('selected');
    }
  } catch(e) {}
}

async function chainComplete() {
  try {
    gameState.isProcessing = true;

    var round = gameState.content.rounds[gameState.currentRound];
    var completedChain = round.chains[gameState.currentChainIndex];

    // Mark all selected tiles as completed
    for (var i = 0; i < gameState.selectedTiles.length; i++) {
      var idx = gameState.selectedTiles[i];
      gameState.completedTiles.add(idx);
      var tile = document.querySelector('.grid-tile[data-index="' + idx + '"]');
      if (tile) {
        tile.classList.remove('selected');
        tile.classList.add('completed');
      }
    }

    var completedChainIdx = gameState.currentChainIndex;
    gameState.completedChainIndices.add(completedChainIdx);
    gameState.chainsFound++;
    var completedChainValues = completedChain.values.slice();
    gameState.selectedTiles = [];
    gameState.currentChainIndex = -1; // unlock — player picks next chain freely

    recordAttempt({
      correct: true,
      chainIndex: completedChainIdx,
      chainValues: completedChainValues
    });

    trackEvent('chain_complete', 'grid', {
      chainIndex: completedChainIdx,
      chainValues: completedChainValues,
      chainsFound: gameState.chainsFound,
      chainsRemaining: gameState.requiredChains - gameState.chainsFound
    });

    if (signalCollector) {
      try {
        signalCollector.recordViewEvent('feedback_display', {
          feedback_type: 'correct',
          chainValues: completedChainValues,
          chainsFound: gameState.chainsFound
        });
        signalCollector.recordViewEvent('visual_update', {
          type: 'chain_completed',
          chainIndex: completedChainIdx,
          completedCount: gameState.chainsFound
        });
      } catch(e) {}
    }

    // Determine progress state
    var remaining = gameState.requiredChains - gameState.chainsFound;

    // Update chain-progress text immediately
    if (remaining > 0) {
      var chainProgressEl = document.getElementById('chain-progress');
      if (chainProgressEl) {
        chainProgressEl.textContent = remaining + ' more chain' + (remaining > 1 ? 's' : '') + ' to find! \uD83D\uDD17';
      }
    }

    gameState.pendingEndProblem = {
      id: 'round_' + (gameState.currentRound + 1),
      outcome: { correct: true, chainsFound: gameState.chainsFound, chainsRequired: gameState.requiredChains }
    };

    if (remaining > 0) {
      // Partial progress (CASE 10) — fire-and-forget, unlock immediately
      try {
        FeedbackManager.sound.play('soundChainComplete', {
          sticker: { image: STICKER_URLS.chain_progress, duration: 2, type: 'IMAGE_GIF' }
        }).catch(function(e) {});
      } catch(e) {}
      try {
        FeedbackManager.playDynamicFeedback({
          audio_content: remaining + ' more chain' + (remaining > 1 ? 's' : '') + ' to find!',
          subtitle: remaining + ' more chain' + (remaining > 1 ? 's' : '') + ' to find!',
          sticker: STICKER_URLS.chain_progress
        }).catch(function(e) {});
      } catch(e) {}
      gameState.isProcessing = false;
    } else if (!gameState.gameEnded) {
      // All chains found (CASE 6) — awaited, blocks until done
      gameState.isProcessing = true;
      try {
        await FeedbackManager.sound.play('all_correct', {
          sticker: { image: STICKER_URLS.all_chains_found, duration: 2, type: 'IMAGE_GIF' },
          subtitle: 'All chains found!'
        });
      } catch(e) {}
      gameState.isProcessing = false;
      roundComplete();
    }
  } catch(e) {
    console.error(JSON.stringify({ error: 'chainComplete failed', message: e.message }, null, 2));
    gameState.isProcessing = false;
    if (typeof Sentry !== 'undefined') Sentry.captureException(e);
  }
}

async function handleIncorrect(tileIndex, tileValue, expectedValue) {
  try {
    gameState.isProcessing = true;
    gameState.lives--;

    if (progressBar) {
      progressBar.update(gameState.currentRound, gameState.lives);
    }

    // Flash wrong on the tapped tile and all selected tiles
    var wrongTiles = gameState.selectedTiles.slice();
    if (tileIndex !== undefined && tileIndex !== null) {
      wrongTiles.push(tileIndex);
    }

    for (var i = 0; i < wrongTiles.length; i++) {
      var tile = document.querySelector('.grid-tile[data-index="' + wrongTiles[i] + '"]');
      if (tile) {
        tile.classList.add('wrong');
        tile.classList.remove('selected');
      }
    }

    // Clear selection and reset chain
    gameState.selectedTiles = [];
    gameState.currentChainIndex = -1; // reset so player can pick any chain again

    recordAttempt({
      correct: false,
      tileIndex: tileIndex,
      tileValue: tileValue,
      expectedValue: expectedValue
    });

    trackEvent('incorrect_tap', 'grid', {
      tileIndex: tileIndex,
      tileValue: tileValue,
      expectedValue: expectedValue,
      livesRemaining: gameState.lives
    });

    trackEvent('life_lost', 'game', { livesRemaining: gameState.lives });

    if (signalCollector) {
      try {
        signalCollector.recordViewEvent('feedback_display', {
          feedback_type: 'incorrect',
          tileValue: tileValue,
          expectedValue: expectedValue
        });
        signalCollector.recordViewEvent('visual_update', {
          type: 'selection_cleared',
          livesRemaining: gameState.lives
        });
      } catch(e) {}
    }

    // CASE 7/8 — wrong answer: ALWAYS play wrong SFX (even on last life)
    try {
      await Promise.all([
        FeedbackManager.sound.play('incorrect_sound_effect', {
          sticker: { image: STICKER_URLS.incorrect, duration: 2, type: 'IMAGE_GIF' },
          subtitle: 'Not quite'
        }),
        new Promise(function(r) { setTimeout(r, 1500); })
      ]);
    } catch(e) {}
    // Remove wrong class after audio
    for (var j = 0; j < wrongTiles.length; j++) {
      var t = document.querySelector('.grid-tile[data-index="' + wrongTiles[j] + '"]');
      if (t) t.classList.remove('wrong');
    }

    if (gameState.lives <= 0) {
      // Last life lost: wrong SFX already played above, now go to game over
      gameState.pendingEndProblem = {
        id: 'round_' + (gameState.currentRound + 1),
        outcome: { correct: false, reason: 'lives_exhausted', chainsFound: gameState.chainsFound }
      };
      gameState.isProcessing = false;
      await handleGameOver();
    } else {
      gameState.isProcessing = false;
    }
  } catch(e) {
    console.error(JSON.stringify({ error: 'handleIncorrect failed', message: e.message }, null, 2));
    gameState.isProcessing = false;
    if (typeof Sentry !== 'undefined') Sentry.captureException(e);
  }
}

function roundComplete() {
  try {
    gameState.currentRound++;
    gameState.score++;

    if (progressBar) {
      progressBar.update(gameState.currentRound, gameState.lives);
    }

    trackEvent('round_complete', 'game', {
      round: gameState.currentRound,
      livesRemaining: gameState.lives
    });

    if (signalCollector) {
      try {
        signalCollector.recordCustomEvent('round_solved', {
          round: gameState.currentRound,
          correct: true,
          chainsFound: gameState.chainsFound
        });
      } catch(e) {}
    }

    if (gameState.currentRound >= gameState.totalRounds) {
      endGame('victory');
    } else {
      showRoundTransition(gameState.currentRound + 1);
    }
  } catch(e) {
    console.error(JSON.stringify({ error: 'roundComplete failed', message: e.message }, null, 2));
    if (typeof Sentry !== 'undefined') Sentry.captureException(e);
  }
}

async function endGame(reason) {
  try {
    if (gameState.gameEnded) return;
    gameState.gameEnded = true;
    gameState.isActive = false;
    gameState.duration_data.currentTime = new Date().toISOString();

    var totalTime = gameState.startTime ? (Date.now() - new Date(gameState.startTime).getTime()) : 0;
    var accuracy = computeAccuracy();
    var tries = computeTries();
    var stars = gameState.lives;

    var metrics = {
      stars: stars,
      accuracy: accuracy,
      totalTime: totalTime,
      tries: tries,
      roundsCompleted: gameState.currentRound,
      totalRounds: gameState.totalRounds
    };

    trackEvent('game_end', 'game', {
      reason: reason,
      stars: stars,
      accuracy: accuracy,
      roundsCompleted: gameState.currentRound,
      totalRounds: gameState.totalRounds,
      tries: tries
    });

    // Flush pendingEndProblem
    if (gameState.pendingEndProblem && signalCollector) {
      try {
        signalCollector.endProblem(gameState.pendingEndProblem.id, gameState.pendingEndProblem.outcome);
      } catch(e) {}
      gameState.pendingEndProblem = null;
    }

    // recordViewEvent BEFORE seal
    if (signalCollector) {
      try {
        signalCollector.recordViewEvent('screen_transition', {
          screen: 'results',
          metadata: { transition_from: 'gameplay', reason: reason }
        });
      } catch(e) {}
    }

    // seal AFTER all events
    var signalPayload = null;
    if (signalCollector) {
      try {
        signalPayload = signalCollector.seal();
      } catch(e) {}
    }

    // SCREEN-FIRST
    showResults(metrics, reason);

    // postMessage
    try {
      window.parent.postMessage({
        type: 'game_complete',
        stars: stars,
        accuracy: accuracy,
        time: Math.round(totalTime / 1000),
        totalTime: totalTime,
        tries: tries,
        roundsCompleted: gameState.currentRound,
        totalRounds: gameState.totalRounds,
        completedAt: Date.now(),
        attempts: gameState.attempts,
        events: gameState.events,
        duration_data: gameState.duration_data,
        signals: signalPayload,
        signal_event_count: signalPayload ? (signalPayload.event_count || (signalPayload.events ? signalPayload.events.length : 0)) : 0,
        signal_metadata: signalPayload && signalPayload.metadata ? signalPayload.metadata : null
      }, '*');
    } catch(e) {}

    // End-game audio (CASE 11) — screen already rendered, postMessage already sent
    try {
      var sfxId = stars === 3 ? 'victory_sound_effect' : 'game_complete_sound_effect';
      var stickerUrl = stars === 3 ? STICKER_URLS.victory : (stars === 2 ? STICKER_URLS.complete_2_stars : STICKER_URLS.complete_1_star);
      var voText = stars === 3 ? 'Victory! 3 stars!' : (stars === 2 ? 'Well done! 2 stars!' : 'Good try! 1 star!');
      await FeedbackManager.sound.play(sfxId, { sticker: { image: stickerUrl, duration: 3, type: 'IMAGE_GIF' } });
      await FeedbackManager.playDynamicFeedback({ audio_content: voText, subtitle: voText, sticker: stickerUrl });
    } catch(e) {}

    // Guarded cleanup
    if (gameState.gameEnded) {
      if (progressBar) { progressBar.destroy(); progressBar = null; }
      if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
    }
  } catch(e) {
    console.error(JSON.stringify({ error: 'endGame failed', message: e.message }, null, 2));
    if (typeof Sentry !== 'undefined') Sentry.captureException(e);
  }
}

async function handleGameOver() {
  try {
    if (gameState.gameEnded) return;
    gameState.gameEnded = true;
    gameState.isActive = false;
    gameState.duration_data.currentTime = new Date().toISOString();

    var totalTime = gameState.startTime ? (Date.now() - new Date(gameState.startTime).getTime()) : 0;
    var accuracy = computeAccuracy();

    var stars = 0;

    var metrics = {

    if (signalCollector) {

        });
      } catch(e) {}
    }

    var signalPayload = null;
    if (signalCollector) {
      try {
        signalPayload = signalCollector.seal();
      } catch(e) {}
    }

    // SCREEN-FIRST
    showResults(metrics, 'game_over');

    // postMessage
    try {
      window.parent.postMessage({
        type: 'game_complete',
        stars: stars,
        accuracy: accuracy,
        time: Math.round(totalTime / 1000),
        totalTime: totalTime,
        tries: tries,
        roundsCompleted: gameState.currentRound,
        totalRounds: gameState.totalRounds,
        completedAt: Date.now(),
        attempts: gameState.attempts,
        events: gameState.events,
        duration_data: gameState.duration_data,
        signals: signalPayload,
        signal_event_count: signalPayload ? (signalPayload.event_count || (signalPayload.events ? signalPayload.events.length : 0)) : 0,
        signal_metadata: signalPayload && signalPayload.metadata ? signalPayload.metadata : null
      }, '*');
    } catch(e) {}

    // Game over audio (CASE 12) — screen already rendered, postMessage already sent
    try {
      await FeedbackManager.sound.play('game_over_sound_effect', { sticker: { image: STICKER_URLS.game_over_sfx, duration: 3, type: 'IMAGE_GIF' } });
      await FeedbackManager.playDynamicFeedback({
        audio_content: 'You completed ' + gameState.currentRound + ' rounds',
        subtitle: 'You completed ' + gameState.currentRound + ' rounds',
        sticker: STICKER_URLS.game_over_vo

    // Guarded cleanup
    if (gameState.gameEnded) {
      if (progressBar) { progressBar.destroy(); progressBar = null; }

    }
  } catch(e) {
    console.error(JSON.stringify({ error: 'handleGameOver failed', message: e.message }, null, 2));
    if (typeof Sentry !== 'undefined') Sentry.captureException(e);
  }
}

function showResults(metrics, reason) {
  try {
    var metricsHTML = '<div class="results-metrics">' +
      '<div class="metric-row"><span class="metric-label">Rounds Completed</span><span class="metric-value">' + metrics.roundsCompleted + '/' + metrics.totalRounds + '</span></div>' +
      '<div class="metric-row"><span class="metric-label">Wrong Attempts</span><span class="metric-value">' + metrics.tries + '</span></div>' +
      '<div class="metric-row"><span class="metric-label">Accuracy</span><span class="metric-value">' + metrics.accuracy + '%</span></div>' +
      '</div>';

    var title = reason === 'victory' ? 'Great Job!' : 'Game Over';
    var buttonText = 'Play Again';

    transitionScreen.show({
      stars: metrics.stars,
      title: title,
      content: metricsHTML,
      buttons: [{
        text: buttonText,
        action: function() {
          restartGame();
        }
      }],
      persist: true
    });
  } catch(e) {
    console.error(JSON.stringify({ error: 'showResults failed', message: e.message }, null, 2));
  }
}

function restartGame() {
  try {
    // Stop all audio on restart (CASE 13)
    try { FeedbackManager.sound.stopAll(); FeedbackManager._stopCurrentDynamic(); FeedbackManager.stream.stopAll(); } catch(e) {}

    // Push session to history
    gameState.sessionHistory.push({
      score: gameState.score,
      lives: gameState.lives,
      attempts: gameState.attempts.slice(),
      events: gameState.events.slice(),
      roundsCompleted: gameState.currentRound,
      timestamp: new Date().toISOString()
    });

    // Reset ALL gameState fields
    gameState.currentRound = 0;
    gameState.score = 0;
    gameState.lives = gameState.totalLives;
    gameState.attempts = [];
    gameState.events = [];
    gameState.startTime = null;
    gameState.isActive = false;
    gameState.chainsFound = 0;
    gameState.requiredChains = 0;
    gameState.currentChainIndex = -1;
    gameState.completedChainIndices = new Set();
    gameState.selectedTiles = [];
    gameState.completedTiles = new Set();
    gameState.isProcessing = false;
    gameState.gameEnded = false;
    gameState.pendingEndProblem = null;
    gameState.phase = 'start';
    gameState.duration_data = {
      startTime: null,
      preview: [],
      attempts: [],
      evaluations: [],
      inActiveTime: [],
      totalInactiveTime: 0,
      currentTime: null
    };

    // Recreate signalCollector
    try {
      signalCollector = new SignalCollector({
        sessionId: window.gameVariableState?.sessionId || 'session_' + Date.now(),
        studentId: window.gameVariableState?.studentId || null,
        templateId: gameState.gameId || null
      });
      window.signalCollector = signalCollector;
    } catch(e) {
      console.error(JSON.stringify({ error: 'recreate signalCollector failed', message: e.message }, null, 2));
    }

    // Recreate progressBar
    createProgressBar();

    // Recreate visibilityTracker
    try {
      if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
      visibilityTracker = new VisibilityTracker(window.visibilityTrackerConfig);
    } catch(e) {
      console.error(JSON.stringify({ error: 'recreate visibilityTracker failed', message: e.message }, null, 2));
    }

    setupGame();
  } catch(e) {
    console.error(JSON.stringify({ error: 'restartGame failed', message: e.message }, null, 2));
    if (typeof Sentry !== 'undefined') Sentry.captureException(e);
  }
}

      { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
      { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
      { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
      { id: 'sound_bubble_select', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3' },
      { id: 'sound_bubble_deselect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758712800721.mp3' },
      { id: 'all_correct', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506764346.mp3' },
      { id: 'soundChainComplete', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757501597903.mp3' },
      { id: 'soundPartialCorrect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757501548938.mp3' },
      { id: 'new_cards', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432104595.mp3' },
      { id: 'tap_sound', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' }
    ]);

    // SignalCollector
    signalCollector = new SignalCollector({
      sessionId: window.gameVariableState?.sessionId || 'session_' + Date.now(),
      studentId: window.gameVariableState?.studentId || null,
      templateId: gameState.gameId || null
    });
    window.signalCollector = signalCollector;

    // ScreenLayout v2
    var layout = ScreenLayout.inject('app', {
      sections: {
        header: true,
        questionText: true,
        progressBar: true,
        playArea: true,
        transitionScreen: true
      }
    });

    // Question text
    var questionSlot = document.getElementById(layout.questionText);
    if (questionSlot) {
      questionSlot.innerHTML = '<div class="question-text-container">' +
        '<p class="instruction-text">Make a chain of doubles! <strong>\uD83D\uDD17</strong></p>' +
        '<p class="instruction-text-sub">A chain has a minimum of 3 and a maximum of 5 numbers!</p>' +
        '<p class="instruction-text-sub">Complete all rounds without making any mistakes to win 3 stars!</p>' +
        '</div>';
    }

    // Game content
    var gameContent = document.getElementById('gameContent');
    if (gameContent) {
      gameContent.innerHTML = '<div id="game-screen" class="game-block">' +
        '<div class="round-info" id="round-info">' +
        '<span class="round-label" id="round-label">Round 1</span>' +
        '<span class="chain-progress" id="chain-progress">Find 1 chain to win! \uD83D\uDD17</span>' +
        '</div>' +
        '<div class="chain-grid" id="chain-grid" data-signal-id="chain-grid"></div>' +
        '</div>';
    }

    // InteractionManager
    interactionManager = new InteractionManager({
      selector: '.chain-grid',
      disableOnAudioFeedback: false,
      disableOnEvaluation: true
    });
    window.interactionManager = interactionManager;

    // VisibilityTracker
    var visibilityTrackerConfig = {
      onInactive: function() {
        var inactiveStart = Date.now();
        gameState.duration_data.inActiveTime.push({ start: inactiveStart });
        // Pause audio (CASE 14)
        try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch(e) {}
        if (signalCollector) {
          signalCollector.pause();
          signalCollector.recordCustomEvent('visibility_hidden', {});
        }
        trackEvent('game_paused', 'system');
      },
      onResume: function() {
        var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
        if (lastInactive && !lastInactive.end) {
          lastInactive.end = Date.now();
          gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
        }
        // Resume audio (CASE 15)
        try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch(e) {}
        if (signalCollector) {
          signalCollector.resume();
          signalCollector.recordCustomEvent('visibility_visible', {});
        }
        trackEvent('game_resumed', 'system');
      },
      popupProps: {
        title: 'Game Paused',
        description: 'Click Resume to continue.',
        primaryText: 'Resume'
      }
    };
    visibilityTracker = new VisibilityTracker(visibilityTrackerConfig);
    window.visibilityTrackerConfig = visibilityTrackerConfig;

    // ProgressBar
    createProgressBar();

    // TransitionScreen
    transitionScreen = new TransitionScreenComponent({ autoInject: true });

    // PostMessage listener BEFORE game_ready
    if (!gameState.content) gameState.content = fallbackContent;
    gameState.totalRounds = gameState.content.rounds.length;
    window.addEventListener('message', handlePostMessage);
    window.parent.postMessage({ type: 'game_ready' }, '*');

    // Start game (NO welcome screen — direct to Round 1)
    setupGame();
  } catch(e) {
    console.error(JSON.stringify({ error: 'Init error', message: e.message }, null, 2));
    if (typeof Sentry !== 'undefined') Sentry.captureException(e);
  }
});
</script>
</body>
</html>
